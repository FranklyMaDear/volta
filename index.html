<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Καφέ Βόλτα — Online Παραγγελίες</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{ --paper:#FBF4E4; --petrol:#0E5148; --citrus:#F08B33; --ink:#26201A; }
  body{font-family:sans-serif;background:var(--paper);color:var(--ink);padding:20px;}
  .drawer-foot{border-top:1px solid #ccc;padding:15px;margin-top:20px;}
  input, select {width:100%; padding:10px; margin:5px 0; border:1px solid #ccc; border-radius:8px;}
  .checkout{width:100%; padding:15px; background:var(--petrol); color:#fff; border:none; border-radius:8px; cursor:pointer;}
  .footer-info { margin-top: 30px; padding: 20px; border-top: 2px solid var(--petrol); font-size: 0.9rem; }
</style>
</head>
<body>

<h1>Καφέ Βόλτα</h1>
<p>Ωράριο: Καθημερινά 06:00 – 23:00</p>

<main id="menu"></main>

<div class="drawer-foot">
  <h3>Στοιχεία Παραγγελίας</h3>
  <input type="text" id="cigField" placeholder="Τσιγάρα (μάρκα αν θέλετε)">
  <input type="tel" id="phoneField" placeholder="Τηλέφωνο επικοινωνίας (Υποχρεωτικό)" required>
  <label>Πότε θα έρθετε;</label>
  <select id="timeField">
    <option value="Σε 10 λεπτά">Σε 10 λεπτά</option>
    <option value="Σε 20 λεπτά">Σε 20 λεπτά</option>
    <option value="Σε 30 λεπτά">Σε 30 λεπτά</option>
  </select>
  <button class="checkout" id="checkout">Ολοκλήρωση παραγγελίας</button>
</div>

<div class="footer-info">
  <p>📍 <b>Τοποθεσία:</b> Φήκη Τρικάλων</p>
  <p>📞 <b>Τηλέφωνο Καταστήματος:</b> 2310 000 000</p>
  <p>⏰ <b>Ωράριο:</b> Καθημερινά 06:00 – 23:00</p>
</div>

<script>
const PRODUCTS = [{n:"Espresso",p:1.50},{n:"Freddo Espresso",p:2.50},{n:"Cappuccino",p:2.50}];
const cart = new Map();

function renderMenu(){
  document.getElementById("menu").innerHTML = PRODUCTS.map(p => `
    <div style="margin-bottom:10px;">
      ${p.n} - ${p.p.toFixed(2)}€ 
      <button onclick="cart.set('${p.n}', (cart.get('${p.n}')||0)+1); alert('Προστέθηκε');">+ Προσθήκη</button>
    </div>`).join("");
}

document.getElementById("checkout").onclick = () => {
  const phone = document.getElementById("phoneField").value;
  if(!phone) { alert("Το τηλέφωνο είναι υποχρεωτικό!"); return; }
  
  let msg = `🚨 ΝΕΑ ΠΑΡΑΓΓΕΛΙΑ\n📞 Τηλ: ${phone}\n`;
  cart.forEach((q,n) => msg += `- ${q}x ${n}\n`);
  msg += `🚬 Τσιγάρα: ${document.getElementById("cigField").value || "Κανένα"}\n`;
  msg += `⏰ Παραλαβή: ${document.getElementById("timeField").value}`;

  fetch(`https://api.telegram.org/bot8991103662:AAEkcD1qR10eG4lG3T3Hy_YU-9Sz8EiqKF4/sendMessage`, {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({chat_id: '6968710468', text: msg})
  }).then(() => alert("Η παραγγελία εστάλη!"));
};

renderMenu();
</script>
</body>
</html>
