<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Drop 2048 · FranklyGames Edition</title>
    <style>
        /* Βασικοί κανόνες & Mobile First */
        :root {
            --panel: #8C6A4F; --panel-deep: #4A3423; --cream: #F7EFDC;
            --ink: #2F1B0D; --accent: #F2A03D; --good: #7FA653;
            --red: #C2542F; --blue: #4A7DBF;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            height: 100%; overflow: hidden; background: transparent;
            font-family: "Baloo 2", system-ui, sans-serif; color: var(--ink);
            user-select: none; touch-action: none;
        }

        /* ===== BACKGROUND (Εξοχή & Σύννεφα) ===== */
        #background {
            position: fixed; inset: 0; z-index: -2;
            background: linear-gradient(to bottom, #87CEEB 0%, #a0d8ef 45%, #7CFC00 45%, #32CD32 100%);
            pointer-events: none;
        }
        .cloud {
            position: fixed; z-index: 0; pointer-events: none;
            font-size: 75px; opacity: 0.8;
            animation: floatClouds 30s linear infinite;
        }
        .cloud1 { top: 60px; left: -80px; }
        .cloud2 { top: 110px; left: -120px; animation-delay: 15s; font-size: 55px; }
        @keyframes floatClouds {
            0% { transform: translateX(-100px); }
            100% { transform: translateX(calc(100vw + 150px)); }
        }
        .flower { position: fixed; z-index: 0; pointer-events: none; font-size: 45px; opacity: 0.9; }
        .flower1 { bottom: 5%; left: 3%; } .flower2 { bottom: 8%; left: 35%; }
        .flower3 { bottom: 2%; right: 20%; } .flower4 { bottom: 12%; right: 3%; }

        /* ===== ΗΛΙΟΣ ΜΕ ΠΡΟΣΩΠΟ ===== */
        .sun-container {
            position: fixed; top: 15px; right: 15px; width: 90px; height: 90px; z-index: 1;
            background: radial-gradient(circle at 35% 35%, #fff7a1, #ffcc00);
            border-radius: 50%; box-shadow: 0 0 40px #ffcc00;
            animation: sunFloat 5s ease-in-out infinite alternate;
        }
        @keyframes sunFloat { 0% { transform: translateY(0) scale(1); } 100% { transform: translateY(-8px) scale(1.05); } }
        .sun-face { position: relative; width: 100%; height: 100%; }
        .sun-face .eye { position: absolute; width: 10px; height: 15px; background: #111; border-radius: 50%; top: 25px; }
        .sun-face .eye.l { left: 22px; } .sun-face .eye.r { right: 22px; }
        .sun-face .nose { position: absolute; width: 10px; height: 12px; background: #e6a800; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); top: 42px; left: 50%; transform: translateX(-50%); }
        .sun-face .mouth { position: absolute; width: 25px; height: 8px; border-bottom: 4px solid #111; border-radius: 0 0 25px 25px; top: 55px; left: 50%; transform: translateX(-50%); }

        /* ===== CANVAS & GAME ===== */
        #game { position: fixed; inset: 0; display: block; z-index: 0; background: transparent; }

        /* ===== ΠΑΝΩ ΜΕΡΟΣ (HUD) ===== */
        .hud {
            position: fixed; left: 0; right: 0; top: 0; z-index: 5;
            padding: 4px 10px; display: flex; gap: 6px; align-items: center;
            background: rgba(11, 12, 16, 0.7); backdrop-filter: blur(6px);
            border-bottom: 2px solid rgba(255, 255, 255, 0.05); height: 40px;
        }
        .chip {
            background: var(--panel-deep); color: var(--cream); border-radius: 8px;
            padding: 2px 8px; font-weight: 800; font-size: 11px;
            box-shadow: 0 2px 0 rgba(0, 0, 0, .3); display: flex; align-items: center; gap: 4px;
            line-height: 1.2; pointer-events: none;
        }
        .chip .big { font-size: 13px; line-height: 1.1; }
        .spacer { flex: 1; }
        .hud-btn {
            background: var(--blue); border: none; cursor: pointer; color: #fff;
            border-radius: 8px; padding: 2px 12px; font-weight: 800; font-size: 12px;
            box-shadow: 0 2px 0 #2d5a7a; transition: transform .08s; font-family: inherit;
            display: flex; align-items: center; gap: 4px; line-height: 1.3; pointer-events: auto;
        }
        .hud-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #2d5a7a; }

        /* ===== ΚΑΤΩ ΜΕΡΟΣ (Κουμπιά & Σκορ) ===== */
        #bottomControls {
            position: fixed; left: 0; right: 0; bottom: 0; z-index: 5;
            height: 62px; padding: 6px 10px;
            display: flex; align-items: center; gap: 6px;
            background: rgba(11, 12, 16, 0.75); backdrop-filter: blur(6px);
            border-top: 2px solid rgba(255, 255, 255, 0.08);
        }
        .bottom-left { display: flex; gap: 4px; pointer-events: none; }
        .bottom-left .chip { font-size: 9px; padding: 2px 6px; background: rgba(74, 52, 35, 0.8); }
        .bottom-left .chip .big { font-size: 11px; }

        .bottom-center { flex: 1; display: flex; justify-content: center; gap: 5px; pointer-events: none; }
        
        .pbtn {
            pointer-events: auto; border: none; cursor: pointer;
            width: 42px; height: 42px; border-radius: 12px;
            background: var(--good); box-shadow: 0 3px 0 #5c7a3a;
            color: #fff; font-size: 20px; line-height: 1;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: inherit; transition: transform .08s;
        }
        .pbtn:active { transform: translateY(3px); box-shadow: 0 1px 0 #5c7a3a; }
        .pbtn.armed { outline: 3px solid var(--accent); background: var(--red); box-shadow: 0 3px 0 #8f3c20; }
        .pbtn.listening { outline: 3px solid #ff5555; animation: pulse 1s infinite; }
        .pbtn.muted { background: #666; box-shadow: 0 3px 0 #333; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }

        /* ===== TAMAGOTCHI UI (Πάνω από τα κουμπιά) ===== */
        #tamagotchi-ui {
            position: fixed; bottom: 68px; left: 10px; right: 10px; z-index: 5;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(8px);
            border-radius: 16px; padding: 6px 10px; border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; justify-content: space-around; align-items: center; gap: 4px;
            pointer-events: none;
        }
        .t-stat {
            pointer-events: auto; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            flex: 1; max-width: 70px; padding: 4px 2px; border-radius: 8px;
            transition: background 0.2s; background: rgba(255, 255, 255, 0.05);
        }
        .t-stat:active { background: rgba(255, 255, 255, 0.15); transform: scale(0.95); }
        .t-stat .icon { font-size: 14px; line-height: 1; }
        .t-stat .bar-wrap { width: 100%; height: 5px; background: rgba(255, 255, 255, 0.2); border-radius: 4px; overflow: hidden; }
        .t-stat .bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
        .t-stat .val { font-size: 10px; font-weight: 800; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }

        /* ===== TOAST & SPEECH ===== */
        #toast {
            position: fixed; bottom: 130px; left: 50%; transform: translateX(-50%);
            z-index: 15; pointer-events: none; background: var(--panel-deep);
            color: var(--cream); font-weight: 700; font-size: 13px; border-radius: 12px;
            padding: 6px 16px; opacity: 0; transition: opacity .25s; white-space: nowrap;
            box-shadow: 0 4px 12px rgba(0, 0, 0, .4);
        }
        #speech {
            position: fixed; z-index: 10; pointer-events: none; font-weight: 800; font-size: 18px;
            background: #ffffff; color: #333; padding: 6px 16px; border-radius: 18px;
            border: 3px solid var(--panel-deep); box-shadow: 0 4px 0 var(--panel-deep);
            transform: translate(-50%, -120%); opacity: 0;
            transition: opacity 0.2s ease-in-out, transform 0.2s ease-in-out;
            max-width: 70vw; white-space: normal; text-align: center;
        }
        #speech.visible { opacity: 1; transform: translate(-50%, -140%); }
        #speech::after { content: ""; position: absolute; top: 100%; left: 50%; margin-left: -10px; border-width: 10px; border-style: solid; border-color: #ffffff transparent transparent transparent; filter: drop-shadow(0 4px 0 var(--panel-deep)); }

        /* ===== SHOP MODAL (Mobile optimized) ===== */
        .overlay { position: fixed; inset: 0; background: rgba(11, 12, 16, .9); display: flex; align-items: center; justify-content: center; z-index: 20; backdrop-filter: blur(6px); }
        .card {
            background: var(--cream); border: 4px solid var(--panel-deep); border-radius: 20px;
            padding: 12px 10px; width: 92vw; max-height: 85vh;
            text-align: center; box-shadow: 0 10px 0 rgba(0, 0, 0, .4); animation: pop .25s cubic-bezier(.34, 1.56, .64, 1);
            display: flex; flex-direction: column; overflow: hidden;
        }
        @keyframes pop { from { transform: scale(.7); opacity: 0; } }
        .card h2 { font-size: 20px; margin-bottom: 4px; font-weight: 800; flex-shrink: 0; }
        .shop-tabs { display: flex; gap: 4px; margin-bottom: 6px; border-bottom: 2px solid rgba(0, 0, 0, 0.08); padding-bottom: 6px; overflow-x: auto; flex-shrink: 0; }
        .shop-tab { flex: 0 0 auto; padding: 4px 8px; font-weight: 800; font-size: 11px; border-radius: 8px; background: #E4D7BC; color: #8C6A4F; border: none; cursor: pointer; }
        .shop-tab.active { background: var(--accent); color: #fff; }
        .pet-subtabs { display: none; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; background: #f0e5d1; padding: 4px 6px; border-radius: 8px; justify-content: center; flex-shrink: 0; }
        .pet-subtabs.active { display: flex; }
        .pet-subtab { padding: 3px 6px; font-weight: 800; font-size: 9px; border-radius: 6px; background: var(--red); color: #fff; border: none; cursor: pointer; }
        .pet-subtab.active { background: #5c7a3a; }
        .shop-items { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; overflow-y: auto; padding-right: 4px; flex: 1; min-height: 0; }
        .shop-items::-webkit-scrollbar { width: 4px; }
        .shop-items::-webkit-scrollbar-thumb { background: var(--panel-deep); border-radius: 4px; }
        .shop-item { background: #E4D7BC; border: 2px solid #8C6A4F; border-radius: 10px; padding: 6px 4px; cursor: pointer; transition: transform 0.1s; text-align: center; }
        .shop-item:active { transform: scale(0.95); }
        .shop-item h3 { font-size: 12px; margin-bottom: 2px; color: var(--ink); line-height: 1.2; }
        .shop-item .price { font-weight: 800; color: #b8742a; font-size: 11px; }
        .shop-item.owned .price { color: var(--good); }
        .shop-item.equipped { border-color: var(--accent); background: #FFF5E1; }
        .btn { border: none; cursor: pointer; font-family: inherit; font-weight: 800; font-size: 15px; color: #fff; background: var(--accent); border-radius: 14px; padding: 8px 18px; box-shadow: 0 3px 0 #b8742a; transition: transform .08s; margin-top: 6px; width: 100%; flex-shrink: 0; }
        .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #b8742a; }
        .btn.secondary { background: var(--blue); box-shadow: 0 3px 0 #2d5a7a; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- ===== BACKGROUND ΕΞΟΧΗΣ ===== -->
    <div id="background"></div>
    <div class="cloud cloud1">☁️</div>
    <div class="cloud cloud2">☁️</div>
    <div class="flower flower1">🌸</div>
    <div class="flower flower2">🌼</div>
    <div class="flower flower3">🌻</div>
    <div class="flower flower4">🌷</div>
    
    <!-- ===== ΗΛΙΟΣ ===== -->
    <div class="sun-container"><div class="sun-face"><div class="eye l"></div><div class="eye r"></div><div class="nose"></div><div class="mouth"></div></div></div>

    <canvas id="game"></canvas>

    <!-- ===== ΠΑΝΩ HUD ===== -->
    <div class="hud">
        <div class="chip"><div><small>ΕΠΙΠΕΔΟ</small><span class="big" id="hudLevel">1</span></div></div>
        <div class="spacer"></div>
        <button class="hud-btn" id="btnShop">🛒 Κατάστημα</button>
    </div>

    <!-- ===== TAMAGOTCHI UI (Διαδραστικό) ===== -->
    <div id="tamagotchi-ui">
        <div class="t-stat" id="tEnergy" onclick="triggerAction('sleep')">
            <div class="icon">⚡</div>
            <div class="bar-wrap"><div class="bar-fill" style="width:70%; background:#FFD700;"></div></div>
            <div class="val">70</div>
        </div>
        <div class="t-stat" id="tHunger" onclick="triggerAction('feed')">
            <div class="icon">🍽️</div>
            <div class="bar-wrap"><div class="bar-fill" style="width:30%; background:#FFA500;"></div></div>
            <div class="val">30</div>
        </div>
        <div class="t-stat" id="tClean" onclick="triggerAction('wash')">
            <div class="icon">🧼</div>
            <div class="bar-wrap"><div class="bar-fill" style="width:80%; background:#00CED1;"></div></div>
            <div class="val">80</div>
        </div>
        <div class="t-stat" id="tToilet" onclick="triggerAction('toilet')">
            <div class="icon">🚽</div>
            <div class="bar-wrap"><div class="bar-fill" style="width:10%; background:#9370DB;"></div></div>
            <div class="val">10</div>
        </div>
    </div>

    <!-- ===== ΚΑΤΩ ΜΕΡΟΣ (Κουμπιά & Σκορ) ===== -->
    <div id="bottomControls">
        <div class="bottom-left">
            <div class="chip"><small>ΣΚΟΡ</small><span class="big" id="hudScore">0</span></div>
            <div class="chip">🪙<span class="big" id="hudCoins">0</span></div>
        </div>
        <div class="bottom-center">
            <button class="pbtn" id="btnMagnet">🧲</button>
            <button class="pbtn" id="btnHammer">🔨</button>
            <button class="pbtn" id="btnShuffle">🔄</button>
            <button class="pbtn" id="btnMic">🎤</button>
            <button class="pbtn" id="btnSound">🔊</button>
        </div>
    </div>

    <!-- ===== SPEECH & TOAST ===== -->
    <div id="speech"><span id="speechText"></span></div>
    <div id="toast"></div>

    <!-- ===== SHOP MODAL ===== -->
    <div class="overlay hidden" id="shopModal">
        <div class="card">
            <h2 style="margin-bottom:6px;">🛍️ Εξατομίκευση</h2>
            <div class="shop-tabs" id="mainTabs">
                <button class="shop-tab active" data-maintab="cubes">Κύβοι</button>
                <button class="shop-tab" data-maintab="boards">Ταμπλό</button>
                <button class="shop-tab" data-maintab="effects">Εφέ</button>
                <button class="shop-tab" data-maintab="sounds">Ήχοι</button>
                <button class="shop-tab" data-maintab="pet_color">Pet</button>
            </div>
            <div class="pet-subtabs" id="petSubTabs">
                <button class="pet-subtab active" data-subtab="pet_color">Χρώμα</button>
                <button class="pet-subtab" data-subtab="pet_head">Κεφάλι</button>
                <button class="pet-subtab" data-subtab="pet_face">Πρόσωπο</button>
                <button class="pet-subtab" data-subtab="pet_body">Σώμα</button>
                <button class="pet-subtab" data-subtab="pet_hands">Χέρια</button>
                <button class="pet-subtab" data-subtab="pet_props">Αντικείμενο</button>
                <button class="pet-subtab" data-subtab="pet_feet">Πόδια</button>
            </div>
            <div class="shop-items" id="shopContainer"></div>
            <button class="btn" id="btnCloseShop">Κλείσιμο</button>
        </div>
    </div>

    <!-- ===== WIN / LOSE MODALS ===== -->
    <div class="overlay hidden" id="winModal">
        <div class="card">
            <div style="font-size:35px; margin-bottom:4px;">🎉</div>
            <h2>Επίπεδο Ολοκληρώθηκε!</h2>
            <p id="winText" style="font-size: 14px;"></p>
            <button class="btn" id="btnNext">Συνέχεια ➜</button>
        </div>
    </div>
    <div class="overlay hidden" id="loseModal">
        <div class="card">
            <div style="font-size:35px; margin-bottom:4px;">😵</div>
            <h2>Γέμισε το ταμπλό!</h2>
            <p id="loseText" style="font-size: 14px;"></p>
            <button class="btn" id="btnRetry">Ξαναπροσπάθησε</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>

        //  MAIN GAME CODE (Fully Mobile-Optimized & Interactive Tamagotchi)
        // ============================================================

            'use strict';

            // === Game Config ===
            const COLS = 5, ROWS = 6, CELL = 1.0, GAP = 0.12;

                boards: [
                    { id: 'board_wood', name: 'Ξύλινο', price: 0, icon: '🟫', back: '#4A3423', cell: '#2F1B0D' },

                ],

                    { id: 'eff_flame', name: 'Φλόγα', price: 0, icon: '🔥' },
                    { id: 'eff_sparkle', name: 'Αστερόσκονη', price: 0, icon: '✨' },
                    { id: 'eff_smoke', name: 'Καπνός', price: 0, icon: '💨' },

                ],
                sounds: [
                    { id: 'snd_default', name: 'Default', price: 0, icon: '🔊' },

                    { id: 'snd_bell', name: 'Καμπάνα', price: 0, icon: '🔔' },

                pet_head: [

                    resolveMerges([{ c, r: targetR }]).then(() => {
                        if (checkWin()) { busy = false; spawnCurrent(); setAim(aimCol); return; }
                        if (isBoardFull()) { gameOver(); return; }
                        busy = false; spawnCurrent(); setAim(aimCol);
                    });
                });
            }
            
            function isBoardFull() {
                for (let c = 0; c < COLS; c++) for (let r = 0; r < ROWS; r++) if (!grid[c][r]) return false;
                return true;
            }

            async function resolveMerges(queue) {
                while (queue.length) {
                    const { c, r } = queue.shift();
                    const cell = grid[c][r]; if (!cell) continue;
                    const same = [{ c: c - 1, r }, { c: c + 1, r }, { c, r: r - 1 }, { c, r: r + 1 }].filter(n => n.c >= 0 && n.c < COLS && n.r >= 0 && n.r < ROWS && grid[n.c][n.r] && grid[n.c][n.r].value === cell.value);
                    if (!same.length) continue;
                    const newVal = cell.value * Math.pow(2, same.length);
                    score += newVal; save.score = score; coins += 1; save.coins = coins; updateHUD();
                    await new Promise(res => {
                        let left = same.length; const tp = cellPos(c, r);
                        same.forEach(n => {
                            const m = grid[n.c][n.r].mesh; grid[n.c][n.r] = null;
                            tween(m.position, { x: tp.x, y: tp.y }, 0.14, null, () => { boardGroup.remove(m); if (--left === 0) res(); });
                            tween(m.scale, { x: .5, y: .5, z: .5 }, 0.14);
                        });
                    });
                    playSound('merge');
                    if (newVal >= 64 && aziramWinTime <= 0) { aziramReactionTime = 1.2; showSpeech("WOW! " + newVal + "! 🤩", 1500); }
                    boardGroup.remove(cell.mesh); grid[c][r] = null;
                    const up = placeCube(c, r, newVal); up.mesh.scale.set(1.35, 1.35, 1.35); tween(up.mesh.scale, { x: 1, y: 1, z: 1 }, 0.22);
                    const moved = [];
                    for (let xc = 0; xc < COLS; xc++) {
                        let write = 0;
                        for (let xr = 0; xr < ROWS; xr++) {
                            if (grid[xc][xr]) {
                                if (xr !== write) { grid[xc][write] = grid[xc][xr]; grid[xc][xr] = null; tween(grid[xc][write].mesh.position, { y: cellPos(xc, write).y }, 0.15); moved.push({ c: xc, r: write }); }
                                write++;
                            }
                        }
                    }
                    queue.push({ c, r }, ...moved);
                    await new Promise(r => setTimeout(r, 120));
                }
                persist();
            }

            let winTimer = null, winShown = false;
            function checkWin() {
                const t = LEVELS[Math.min(level, LEVELS.length - 1)].target;
                let win = false;
                for (let c = 0; c < COLS; c++) for (let r = 0; r < ROWS; r++) if (grid[c][r] && grid[c][r].value >= t) { win = true; break; }
                if (!win) return false;
                if (!winShown) {
                    winShown = true; coins += 25; save.coins = coins;
                    best = Math.max(best, score); save.best = best; save.level = Math.min(level + 1, LEVELS.length - 1);
                    persist(); updateHUD();
                    document.getElementById("winText").innerHTML = `Έφτιαξες ${t}!<br>+25 🪙<br>Συνέχισε στο επόμενο!`;
                    playWinSound(); 
                    aziramWinTime = 6.0; showSpeech("Τα καταφέραμε! 🎉", 2500); speak("Μπράβο! Τα καταφέραμε!");
                    setTimeout(() => { document.getElementById("winModal").classList.remove("hidden"); }, 3000);
                }
                return true;
            }

            function gameOver() {
                busy = true; best = Math.max(best, score); save.best = best; save.score = 0; persist();
                showSpeech("Ωχ όχι! Γέμισε! 😭", 2000); speak("Ωχ όχι! Γέμισε το ταμπλό!");

            function onTap(e) {
                if (document.querySelector(".overlay:not(.hidden)")) return;
                lastActionTime = performance.now();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) / innerWidth * 2 - 1;
                const y = -((e.touches ? e.touches[0].clientY : e.clientY) / innerHeight * 2 - 1);
                pointer.set(x, y); raycaster.setFromCamera(pointer, camera);

                // 1. Έλεγχος αν πάτησε το Pet
                if (aziramPet) {
                    const petHits = raycaster.intersectObject(aziramPet, true);
                    if (petHits.length > 0 && aziramWinTime <= 0) {
                        if (petState === 'sleep') { petState = 'stand'; petStateTimer = 2.5; showSpeech("Ε; Ξύπνησα! 😳", 1500); speak("Ε; Ξύπνησα!"); return; }
                        aziramReactionTime = 1.0; showSpeech("Γεια σου! 😊", 1500); speak("Γεια σου!");
                        return;
                    }
                }

                // 2. Έλεγχος αν πάτησε ΠΑΝΩ ΣΤΟΝ ΚΥΒΟ
                if (currentCube && !busy) {
                    const cubeHits = raycaster.intersectObject(currentCube);
                    if (cubeHits.length > 0) {
                        launch(); // Ρίχνει τον κύβο
                        return;
                    }
                }

                // 3. Έλεγχος αν πάτησε στο ταμπλό (απλά μετακίνηση)
                const hit = new THREE.Vector3();
                raycaster.ray.intersectPlane(new THREE.Plane(new THREE.Vector3(0, 0, 1).applyQuaternion(boardGroup.quaternion), 0), hit);
                boardGroup.worldToLocal(hit);
                const c = Math.max(0, Math.min(COLS - 1, Math.round((hit.x + BOARD_W / 2 - CELL / 2) / (CELL + GAP))));
                const r = Math.round((BOARD_H / 2 - CELL / 2 - hit.y) / (CELL + GAP));

                if (hammerMode) {
                    if (r >= 0 && r < ROWS && grid[c][r]) {
                        hammerMode = false; playSound('drop'); // Δυνατό χτύπημα
                        const m = grid[c][r].mesh; grid[c][r] = null;
                        tween(m.scale, { x: .01, y: .01, z: .01 }, 0.18, null, () => boardGroup.remove(m));
                        busy = true;
                        setTimeout(() => { resolveMerges([]).then(() => { busy = false; updateHUD(); persist(); }); }, 180);
                    } else { hammerMode = false; updateHUD(); }
                    return;
                }
                setAim(c, true);
            }

            // === TAMAGOTCHI SYSTEM (Πλήρως Διαδραστικό) ===
            function updateTamagotchiStats() {
                const now = Date.now();
                const elapsed = (now - save.lastUpdate) / 1000;
                if (elapsed <= 0) return;
                const hour = new Date().getHours();
                if (hour >= 8 && hour < 22) save.energy = Math.max(0, (save.energy || 50) - elapsed * 0.25);
                else save.energy = Math.min(100, (save.energy || 50) + elapsed * 0.45);
                let hungerRate = 0.15; if (hour >= 7 && hour <= 8) hungerRate = 0.9; else if (hour >= 12 && hour <= 13) hungerRate = 0.9; else if (hour >= 19 && hour <= 20) hungerRate = 0.9;
                save.hunger = Math.min(100, (save.hunger || 50) + elapsed * hungerRate);
                save.cleanliness = Math.max(0, (save.cleanliness || 80) - elapsed * 0.12);
                if (hour >= 8 && hour < 22) save.toilet = Math.min(100, (save.toilet || 0) + elapsed * (100 / 10800));
                else save.toilet = Math.max(0, (save.toilet || 0) - elapsed * 0.3);
                save.lastUpdate = now; persist(); renderTamagotchiUI();
            }

            // === MAIN GAME LOOP ===
            let lastT = 0;
            function loop(t) {
                const dt = Math.min(0.05, (t - lastT) / 1000);
                lastT = t;
                if (!lastActionTime) lastActionTime = performance.now();
                stepAnims(dt); updateParticles(dt);

                if (Math.floor(t / 3000) > Math.floor((t - dt * 1000) / 3000)) { updateTamagotchiStats(); }

                if (aziramPet) {
                    // ... (Animation logic από προηγούμενο κώδικα, απλοποιημένο για χώρο) ...
                    // Aziram movements
                    if (aziramWinTime > 0) {
                        aziramWinTime -= dt;
                        aziramCore.position.y = Math.abs(Math.sin(t * 0.008)) * 1.2;
                        aziramPet.rotation.y += 0.1;
                    } else if (aziramReactionTime > 0) {
                        aziramReactionTime -= dt;
                    } else {
                        const now = performance.now();
                        const fill = (grid.flat().filter(c => c!==null).length) / (COLS*ROWS);
                        // Logik mood based on tamagotchi and board
                        if (save.energy < 20) aziramMood = 'tired';
                        else if (save.hunger > 80) aziramMood = 'hungry';
                        else if (fill >= 0.8) aziramMood = 'anxious';
                        else if (fill >= 0.65) aziramMood = 'angry';
                        else if (now - lastActionTime > 15000) aziramMood = 'bored';
                        else aziramMood = 'idle';

                        petStateTimer -= dt;
                        if (petStateTimer <= 0) {
                            const r = Math.random();
                            if (r < 0.4) { petState = 'walk'; wanderTargetX = -0.6 + Math.random() * 1.25; petStateTimer = 10; }
                            else if (r < 0.7) { petState = 'stand'; petStateTimer = 2 + Math.random() * 3; }
                            else { petState = 'hop'; petStateTimer = 1.3; }
                        }
                        if (petState === 'walk') {
                            aziramNdcX += Math.sign(wanderTargetX - aziramNdcX) * 0.11 * dt;
                            if (Math.abs(wanderTargetX - aziramNdcX) < 0.02) { petState = 'stand'; petStateTimer = 2 + Math.random() * 3; }
                        }
                        updateAziramScreenPosition();

                        // Animation Body
                        if (petState === 'walk') {
                            aziramCore.position.y = Math.abs(Math.sin(t * 0.012)) * 0.12;
                            aziramPet.rotation.y += (0.5 - aziramPet.rotation.y) * 0.08;
                        } else {
                            aziramPet.rotation.y += (-0.3 - aziramPet.rotation.y) * 0.1;
                            aziramCore.position.y = Math.sin(t * 0.002) * 0.15;
                        }
                    }
                    aziramCore.traverse(child => { if (child.userData && child.userData.onUpdate) child.userData.onUpdate(t); });
                }

                if (currentCube && !busy) currentCube.rotation.y = Math.sin(t * 0.002) * 0.12;
                if (renderer) renderer.render(scene, camera);
                requestAnimationFrame(loop);
            }

            // === INIT ===
            (async function() {
                await loadSave();
                coins = save.coins || 5000; level = save.level || 0; best = save.best || 0; score = save.score || 0;
                
                // UI Events
                document.getElementById('btnShop').onclick = () => { renderShop(); document.getElementById('shopModal').classList.remove('hidden'); };
                document.getElementById('btnCloseShop').onclick = () => { document.getElementById('shopModal').classList.add('hidden'); };
                
                document.getElementById('btnMagnet').onclick = () => {
                    if (busy) return;
                    let tilesByVal = {};
                    for (let c = 0; c < COLS; c++) for (let r = 0; r < ROWS; r++) if (grid[c][r]) { let v = grid[c][r].value; if (!tilesByVal[v]) tilesByVal[v] = []; tilesByVal[v].push({ c, r, cell: grid[c][r] }); }
                    let mg = Object.values(tilesByVal).filter(g => g.length > 1);
                    if (!mg.length) return toast("Κανένα ζευγάρι!");
                    busy = true;
                    let animsP = 0;
                    mg.forEach(group => {
                        const trg = group[0]; trg.newVal = trg.cell.value * Math.pow(2, group.length - 1);
                        group.slice(1).forEach(t => {
                            const m = t.cell.mesh; grid[t.c][t.r] = null; const tp = cellPos(trg.c, trg.r);
                            animsP++; tween(m.position, { x: tp.x, y: tp.y, z: 1.0 }, 0.35, null, () => { boardGroup.remove(m); if (--animsP === 0) { playSound('merge'); mg.forEach(g2 => { boardGroup.remove(g2[0].cell.mesh); grid[g2[0].c][g2[0].r] = null; score += g2[0].newVal; save.score = score; placeCube(g2[0].c, g2[0].r, g2[0].newVal); }); setTimeout(() => { resolveMerges([]).then(() => { busy = false; updateHUD(); persist(); }); }, 250); } });
                            tween(m.scale, { x: 0.3, y: 0.3, z: 0.3 }, 0.35);
                        });
                    });
                };
                document.getElementById('btnHammer').onclick = () => { if (busy) return; hammerMode = true; updateHUD(); toast("🔨 Επίλεξε κύβο"); };
                document.getElementById('btnShuffle').onclick = () => { if (busy || !currentCube) return; boardGroup.remove(currentCube); currentCube = null; spawnCurrent(); setAim(aimCol); updateHUD(); };

                document.getElementById('btnNext').onclick = () => { document.getElementById('winModal').classList.add('hidden'); level = Math.min(level + 1, LEVELS.length - 1); winShown = false; busy = false; updateHUD(); };
                document.getElementById('btnRetry').onclick = () => { document.getElementById('loseModal').classList.add('hidden'); busy = false; newBoard(); winShown = false; };

                document.querySelectorAll('.shop-tab').forEach(btn => { btn.onclick = (e) => { document.querySelectorAll('.shop-tab').forEach(b => b.classList.remove('active')); e.target.classList.add('active'); currentMainTab = e.target.dataset.maintab; renderShop(); }; });
                document.querySelectorAll('.pet-subtab').forEach(btn => { btn.onclick = (e) => { document.querySelectorAll('.pet-subtab').forEach(b => b.classList.remove('active')); e.target.classList.add('active'); currentPetSubTab = e.target.dataset.subtab; renderShop(); }; });

                initThree(); if (!renderer) return;
                newBoard(); updateHUD(); initMic(); renderTamagotchiUI();

                const cvs = document.getElementById("game");
                cvs.addEventListener("pointermove", (e) => { if (!busy && currentCube) setAim((e.touches ? e.touches[0].clientX : e.clientX) / innerWidth * 2 - 1); });
                cvs.addEventListener("pointerdown", onTap);

                setInterval(() => { updateTamagotchiStats(); }, 3000);
            })();
        })();
    </script>
</body>
</html>
