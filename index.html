<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Drop 2048 · Starfield Pure</title>
<style>
  :root{
    --bg:#0B0C10; --panel:#8C6A4F; --panel-deep:#4A3423;
    --cream:#F7EFDC;
    --ink:#2F1B0D; --accent:#F2A03D; --good:#7FA653; --coin:#F5C542;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{
    background:var(--bg);
    font-family:"Baloo 2","Comic Sans MS",system-ui,sans-serif;
    color:var(--ink); user-select:none; touch-action:none;
  }
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap');
  
  #game{position:fixed;inset:0;display:block; z-index:0;}
  
  .hud{position:fixed;left:0;right:0;top:0;padding:10px 12px;display:flex;gap:8px;align-items:center;pointer-events:none;z-index:5}
  .chip{
    background:var(--panel-deep);color:var(--cream);border-radius:14px;padding:6px 12px;
    font-weight:800;font-size:15px;box-shadow:0 3px 0 rgba(0,0,0,.3);display:flex;align-items:center;gap:6px;
  }
  .chip small{font-weight:600;opacity:.75;font-size:11px;display:block;line-height:1}
  .chip .big{font-size:17px;line-height:1.1}
  .spacer{flex:1}
  #missionBar{
    position:fixed;top:65px;left:50%;transform:translateX(-50%);z-index:5;pointer-events:none;
    background:var(--cream);border:3px solid var(--panel-deep);color:var(--ink);
    border-radius:16px;padding:7px 16px;font-weight:700;font-size:14px;box-shadow:0 4px 0 rgba(0,0,0,.3);
    white-space:nowrap;
  }
  #missionBar b{color:#C2542F}
  
  .powerbar{position:fixed;bottom:14px;left:0;right:0;display:flex;justify-content:center;gap:10px;z-index:5}
  .pbtn{
    pointer-events:auto;border:none;cursor:pointer;width:66px;height:66px;border-radius:18px;
    background:var(--good);box-shadow:0 4px 0 #5c7a3a;color:#fff;font-size:26px;line-height:1;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    font-family:inherit;transition:transform .08s;
  }
  .pbtn:active{transform:translateY(3px);box-shadow:0 1px 0 #5c7a3a}
  .pbtn .cost{font-size:11px;font-weight:800;background:rgba(0,0,0,.22);border-radius:8px;padding:1px 7px}
  .pbtn.armed{outline:4px solid var(--accent);background:#C2542F;box-shadow:0 4px 0 #8f3c20}
  
  .shop-tabs { display:flex; gap:5px; margin-bottom:10px; border-bottom:2px solid rgba(0,0,0,0.1); padding-bottom:10px; overflow-x:auto;}
  .shop-tab { flex:1; padding:8px 5px; font-weight:800; font-size:13px; border-radius:10px; background:#E4D7BC; color:#8C6A4F; border:none; cursor:pointer;}
  .shop-tab.active { background:var(--accent); color:#fff; box-shadow:0 3px 0 #b8742a; transform:translateY(-2px);}
  
  .shop-items { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-height: 40vh; overflow-y: auto; padding-bottom: 10px; padding-right:5px;}
  .shop-item { 
    background: #E4D7BC; border: 3px solid #8C6A4F; border-radius: 14px; padding: 10px; 
    cursor: pointer; transition: transform 0.1s; text-align:center;
  }
  .shop-item:active { transform: scale(0.95); }
  .shop-item h3 { font-size: 14px; margin-bottom: 5px; color: var(--ink); line-height:1.2;}
  .shop-item .price { font-weight: 800; color: #b8742a; font-size:13px;}
  .shop-item.owned .price { color: var(--good); }
  .shop-item.equipped { border-color: var(--accent); background: #FFF5E1; box-shadow:0 0 10px rgba(242,160,61,0.5);}

  .overlay{position:fixed;inset:0;background:rgba(11,12,16,.85);display:flex;align-items:center;justify-content:center;z-index:20;backdrop-filter:blur(4px)}
  .card{
    background:var(--cream);border:4px solid var(--panel-deep);border-radius:26px;padding:22px 20px;
    width:min(380px,92vw);text-align:center;box-shadow:0 10px 0 rgba(0,0,0,.4);
    animation:pop .25s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes pop{from{transform:scale(.7);opacity:0}}
  .card h2{font-size:22px; margin-bottom:6px;font-weight:800}
  .btn{
    border:none;cursor:pointer;font-family:inherit;font-weight:800;font-size:16px;color:#fff;
    background:var(--accent);border-radius:16px;padding:12px 30px;box-shadow:0 4px 0 #b8742a;transition:transform .08s; margin-top:10px; width:100%;
  }
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 #b8742a}
  .hidden{display:none!important}
  
  #toast{
    position:fixed;bottom:96px;left:50%;transform:translateX(-50%);z-index:15;pointer-events:none;
    background:var(--panel-deep);color:var(--cream);font-weight:700;font-size:14px;border-radius:14px;
    padding:8px 16px;opacity:0;transition:opacity .25s;white-space:nowrap;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div class="hud">
  <div class="chip"><div><small>ΕΠΙΠΕΔΟ</small><span class="big" id="hudLevel">1</span></div></div>
  <div class="chip"><div><small>ΣΚΟΡ</small><span class="big" id="hudScore">0</span></div></div>
  <div class="spacer"></div>
  <button class="chip" id="btnShop" style="cursor:pointer; border:none; outline:none; background:var(--accent); pointer-events:auto;">🛒 Κατάστημα</button>
  <div class="chip">🪙 <span class="big" id="hudCoins">0</span></div>
</div>
<div id="missionBar">🎯 Αποστολή: <b id="missionText"></b></div>

<div class="powerbar">
  <button class="pbtn" id="btnMagnet">🧲<span class="cost">Δωρεάν</span></button>
  <button class="pbtn" id="btnHammer">🔨<span class="cost">Δωρεάν</span></button>
  <button class="pbtn" id="btnShuffle">🔄<span class="cost">Δωρεάν</span></button>
</div>

<div id="toast"></div>

<div class="overlay hidden" id="shopModal">
  <div class="card">
    <h2 style="margin-bottom:15px;">🛍️ Εξατομίκευση</h2>
    <div class="shop-tabs">
      <button class="shop-tab active" data-tab="cubes">Κύβοι</button>
      <button class="shop-tab" data-tab="boards">Ταμπλό</button>
      <button class="shop-tab" data-tab="effects">Εφέ</button>
      <button class="shop-tab" data-tab="sounds">Ήχοι</button>
      <button class="shop-tab" data-tab="pets">Pet</button>
    </div>
    <div class="shop-items" id="shopContainer"></div>
    <button class="btn" id="btnCloseShop">Κλείσιμο</button>
  </div>
</div>

<div class="overlay hidden" id="winModal">
  <div class="card">
    <div style="font-size:40px; margin-bottom:10px;">🎉</div>
    <h2>Επίπεδο Ολοκληρώθηκε!</h2>
    <p id="winText"></p>
    <button class="btn" id="btnNext">Επόμενο επίπεδο ➜</button>
  </div>
</div>

<div class="overlay hidden" id="loseModal">
  <div class="card">
    <div style="font-size:40px; margin-bottom:10px;">😵</div>
    <h2>Γέμισε το ταμπλό!</h2>
    <p id="loseText"></p>
    <button class="btn" id="btnRetry">Ξαναπροσπάθησε</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* =====================================================
   Drop 2048 · Starfield Pure
===================================================== */

const COLS = 5, ROWS = 6, CELL = 1.0, GAP = 0.12; 
const BOARD_W = COLS * (CELL + GAP) - GAP;
const BOARD_H = ROWS * (CELL + GAP) - GAP;
const launchY = -BOARD_H/2 - 1.9;

const LEVELS = [
  { target: 64,   preset: 0, text: "Φτιάξε κύβο 64" },
  { target: 128,  preset: 4, text: "Φτιάξε κύβο 128" },
  { target: 256,  preset: 7, text: "Φτιάξε κύβο 256" },
  { target: 512,  preset: 9, text: "Φτιάξε κύβο 512" },
  { target: 1024, preset: 12, text: "Φτιάξε κύβο 1024" },
];

const SHOP = {
  cubes: [
    { id: 'wood', name: 'Ξύλο', price: 0, icon: '🪵' },
    { id: 'whitered', name: 'Άσπρο-Κόκκινο', price: 0, icon: '🍬' },
    { id: 'whitegreen', name: 'Άσπρο-Πράσινο', price: 0, icon: '🍵' },
    { id: 'zebra', name: 'Ζέβρα', price: 0, icon: '🦓' },
    { id: 'neon', name: 'Cyber Neon', price: 0, icon: '⚡' },
    { id: 'rainbow', name: 'Ουράνιο Τόξο', price: 0, icon: '🌈' },
    { id: 'gold', name: 'Καθαρός Χρυσός', price: 0, icon: '🏆' },
    { id: 'galaxy', name: 'Γαλαξίας', price: 0, icon: '🌌' },
    { id: 'ice', name: 'Παγωμένος', price: 0, icon: '🧊' },
    { id: 'lava', name: 'Λάβα', price: 0, icon: '🌋' }
  ],
  boards: [
    { id: 'board_wood', name: 'Ξύλινο', price: 0, icon: '🟫', back: '#4A3423', cell: '#2F1B0D' },
    { id: 'board_space', name: 'Βαθύ Διάστημα', price: 0, icon: '🟦', back: '#0B132B', cell: '#4A5A8A' },
    { id: 'board_crimson', name: 'Πορφυρό', price: 0, icon: '🟥', back: '#3A0CA3', cell: '#A47CFF' }
  ],
  effects: [
    { id: 'eff_none', name: 'Χωρίς Εφέ', price: 0, icon: '✖️' },
    { id: 'eff_flame', name: 'Φλόγα (Βολή)', price: 0, icon: '🔥' },
    { id: 'eff_explode', name: 'Έκρηξη (Συγχώνευση)', price: 0, icon: '💥' }
  ],
  sounds: [
    { id: 'snd_default', name: 'Default', price: 0, icon: '🔊' },
    { id: 'snd_bass', name: 'Bass Drop', price: 0, icon: '🔊' }
  ],
  pets: [
    { id: 'pet_none', name: 'Τίποτα', price: 0, icon: '🚫' },
    { id: 'pet_antenna', name: 'Κεραία Εξωγήινου', price: 0, icon: '📡' },
    { id: 'pet_halo', name: 'Νέον Φωτοστέφανο', price: 0, icon: '👼' },
    { id: 'pet_propeller', name: 'Καπέλο Έλικας', price: 0, icon: '🚁' },
    { id: 'pet_glasses_3d', name: 'Retro 3D Γυαλιά', price: 0, icon: '👓' },
    { id: 'pet_visor', name: 'Cyber Visor', price: 0, icon: '🕶️' },
    { id: 'pet_headphones', name: 'Space Ακουστικά', price: 0, icon: '🎧' },
    { id: 'pet_tophat', name: 'Κλασικό Ημίψηλο', price: 0, icon: '🎩' },
    { id: 'pet_wizard', name: 'Καπέλο Μάγου', price: 0, icon: '🧙' },
    { id: 'pet_monocle', name: 'Χρυσό Μονόκλ', price: 0, icon: '🧐' },
    { id: 'pet_crown', name: 'Αυτοκρατορικό Στέμμα', price: 0, icon: '👑' },
    { id: 'pet_bubble', name: 'Γυάλινο Κράνος', price: 0, icon: '👩‍🚀' },
    { id: 'pet_ring', name: 'Δακτύλιος Κρόνου', price: 0, icon: '🪐' },
    { id: 'pet_crystals', name: 'Αιωρούμενοι Κρύσταλλοι', price: 0, icon: '💎' },
    { id: 'pet_shield', name: 'Ενεργειακή Ασπίδα', price: 0, icon: '🛡️' }
  ]
};

let currentShopTab = 'cubes';

const DEFAULT_SAVE = { 
  coins: 50, level: 0, best: 0, score: 0, 
  ownedCubes: ['wood'], equippedCube: 'wood',
  ownedBoards: ['board_wood'], equippedBoard: 'board_wood',
  ownedEffects: ['eff_none'], equippedEffect: 'eff_none',
  ownedSounds: ['snd_default'], equippedSound: 'snd_default',
  ownedPets: ['pet_none'], equippedPetItem: 'pet_none'
};

let save = { ...DEFAULT_SAVE };

async function loadSave(){
  try{
    const r = localStorage.getItem("drop2048-save-pure");
    if(r) { const parsed = JSON.parse(r); save = Object.assign({}, DEFAULT_SAVE, parsed); }
  }catch(e){ }
}
function persist(){ try{ localStorage.setItem("drop2048-save-pure", JSON.stringify(save)); }catch(e){ } }

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
  if(audioCtx.state === 'suspended') audioCtx.resume();
  if(type === 'win') { playWinSound(audioCtx); return; }
  const soundId = save.equippedSound || 'snd_default';
  if(type === 'drop') playDropDefault(audioCtx);
  else if(type === 'merge') playMergeDefault(audioCtx);
}

function playDropDefault(ctx) { const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.1); gain.gain.setValueAtTime(0.2, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1); osc.start(); osc.stop(ctx.currentTime + 0.1); }
function playMergeDefault(ctx) { const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.type = 'sine'; osc.frequency.setValueAtTime(300, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.1); gain.gain.setValueAtTime(0.3, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1); osc.start(); osc.stop(ctx.currentTime + 0.1); }
function playWinSound(ctx) {
  for(let i=0; i<4; i++) { setTimeout(() => { const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.type = 'sine'; osc.frequency.setValueAtTime(600 + (i*250), ctx.currentTime); gain.gain.setValueAtTime(0.15, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2); osc.start(); osc.stop(ctx.currentTime + 0.2); }, i * 100); }
}

/* ----- Particles ----- */
const particles = [];
const pGeo = new THREE.BoxGeometry(0.08, 0.08, 0.08);
const pMats = { 'flame': new THREE.MeshBasicMaterial({color: 0xff4500}), 'explode': new THREE.MeshBasicMaterial({color: 0xffa500}), 'confetti': [0xff0000, 0x00ff00, 0x0000ff, 0xffff00].map(c => new THREE.MeshBasicMaterial({color: c})) };
function spawnParticle(x, y, z, type) {
  let mat = pMats[type]; if(Array.isArray(mat)) mat = mat[Math.floor(Math.random()*mat.length)];
  const p = new THREE.Mesh(pGeo, mat); p.position.set(x, y, z);
  let vx = (Math.random()-0.5)*6, vy = (Math.random()-0.5)*6, vz = (Math.random()-0.5)*6;
  if(type === 'flame') { vx *= 0.2; vy = -Math.random()*2 - 0.5; vz = 0; } 
  if(type === 'confetti') { p.scale.set(0.15,0.15,0.15); }
  scene.add(p); particles.push({ mesh: p, life: 1.0, vx, vy, vz, type });
}
function spawnBurst(x, y, z, type, count) { for(let i=0; i<count; i++) spawnParticle(x, y, z, type); }
function updateParticles(dt) {
  for(let i=particles.length-1; i>=0; i--) {
    const p = particles[i]; p.life -= dt * 2.5; 
    if(p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
    else { p.mesh.position.x += p.vx * dt; p.mesh.position.y += p.vy * dt; p.mesh.position.z += p.vz * dt; p.mesh.scale.setScalar(p.life); if(p.type === 'flame' || p.type === 'explode') p.mesh.material.color.setHSL(0.1*p.life, 1, 0.5); }
  }
}

/* ----- STARFIELD ----- */
let starField;
function initStarfield() {
  const starCount = 8000;
  const starGeo = new THREE.BufferGeometry();
  const starPos = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount * 3; i += 3) { starPos[i] = (Math.random() - 0.5) * 500; starPos[i+1] = (Math.random() - 0.5) * 500; starPos[i+2] = (Math.random() - 0.5) * 300; }
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
  const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.25, blending: THREE.AdditiveBlending, depthWrite: false });
  starField = new THREE.Points(starGeo, starMat); starField.position.z = -50; scene.add(starField);
}
function updateStarfield(speed) {
  if (!starField) return; const positions = starField.geometry.attributes.position.array;
  for (let i = 2; i < positions.length; i += 3) { positions[i] += speed; if (positions[i] > 40) { positions[i] = -120; positions[i-2] = (Math.random() - 0.5) * 500; positions[i-1] = (Math.random() - 0.5) * 500; } }
  starField.geometry.attributes.position.needsUpdate = true;
}

/* ----- AZIRAM PET SYSTEM ----- */
let aziramPet, headSocket;
let activePetAnimations = [];
let aziramReactionTime = 0; // Χρόνος που απομένει για το reaction
// ΝΕΑ ΘΕΣΗ: Κάτω δεξιά από το ταμπλό, κοντά στα κουμπιά.
let aziramTargetPos = new THREE.Vector3(2.5, -4.2, 0.5); 
let aziramTargetRotY = -0.3;

function createAziram() {
    const petGroup = new THREE.Group();
    const jellyCore = new THREE.Group(); 

    const bodyGeo = new THREE.SphereGeometry(0.7, 32, 32);
    const bodyMat = new THREE.MeshPhongMaterial({ color: 0x33ffaa, shininess: 120, transparent: true, opacity: 0.85 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    jellyCore.add(body);

    const eyeGeo = new THREE.SphereGeometry(0.12, 16, 16);
    const eyeMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
    const eyeL = new THREE.Mesh(eyeGeo, eyeMat); eyeL.position.set(-0.25, 0.15, 0.6); jellyCore.add(eyeL);
    const eyeR = new THREE.Mesh(eyeGeo, eyeMat); eyeR.position.set(0.25, 0.15, 0.6); jellyCore.add(eyeR);

    headSocket = new THREE.Group();
    headSocket.position.set(0, 0.65, 0); 
    jellyCore.add(headSocket);

    petGroup.add(jellyCore);
    petGroup.position.copy(aziramTargetPos);
    petGroup.rotation.y = aziramTargetRotY; 
    petGroup.rotation.x = 0.2;

    return petGroup;
}

function equipPetItem(itemId) {
    if (!headSocket) return;
    while(headSocket.children.length > 0){ headSocket.remove(headSocket.children[0]); }
    activePetAnimations = [];
    const itemGroup = new THREE.Group();

    switch(itemId) {
        case 'pet_antenna':
            const stick = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.4), new THREE.MeshBasicMaterial({color: 0x555555})); stick.position.y = 0.2;
            const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.1), new THREE.MeshBasicMaterial({color: 0x00ff00})); bulb.position.y = 0.4;
            itemGroup.add(stick, bulb); break;
        case 'pet_halo':
            const halo = new THREE.Mesh(new THREE.TorusGeometry(0.4, 0.05, 16, 32), new THREE.MeshBasicMaterial({color: 0xffff00}));
            halo.rotation.x = Math.PI / 2; halo.position.y = 0.3; itemGroup.add(halo);
            activePetAnimations.push((t) => { halo.position.y = 0.3 + Math.sin(t*0.005)*0.05; }); break;
        case 'pet_propeller':
            const base = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.2), new THREE.MeshPhongMaterial({color: 0xff0000}));
            const pin = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.2), new THREE.MeshBasicMaterial({color: 0xffffff})); pin.position.y = 0.15;
            const prop = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.02, 0.1), new THREE.MeshBasicMaterial({color: 0x0000ff})); prop.position.y = 0.25;
            itemGroup.add(base, pin, prop); activePetAnimations.push((t) => { prop.rotation.y += 0.2; }); break;
        case 'pet_glasses_3d':
            const gBase = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.2, 0.1), new THREE.MeshBasicMaterial({color: 0xffffff}));
            const lLens = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.15, 0.12), new THREE.MeshBasicMaterial({color: 0xff0000})); lLens.position.set(-0.2, 0, 0.01);
            const rLens = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.15, 0.12), new THREE.MeshBasicMaterial({color: 0x00ffff})); rLens.position.set(0.2, 0, 0.01);
            itemGroup.add(gBase, lLens, rLens); itemGroup.position.set(0, -0.4, 0.65); break;
        case 'pet_visor':
            const visor = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.25, 0.3), new THREE.MeshBasicMaterial({color: 0xff00ff}));
            itemGroup.position.set(0, -0.4, 0.6); itemGroup.add(visor); break;
        case 'pet_headphones':
            const band = new THREE.Mesh(new THREE.TorusGeometry(0.75, 0.05, 16, 32, Math.PI), new THREE.MeshPhongMaterial({color: 0x222222}));
            const cupL = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 0.2), new THREE.MeshPhongMaterial({color: 0x00aaff})); cupL.rotation.z = Math.PI / 2; cupL.position.set(-0.75, 0, 0);
            const cupR = cupL.clone(); cupR.position.set(0.75, 0, 0); itemGroup.add(band, cupL, cupR); itemGroup.position.y = -0.3; break;
        case 'pet_tophat':
            const brim = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 0.05), new THREE.MeshPhongMaterial({color: 0x111111}));
            const hatTop = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.8), new THREE.MeshPhongMaterial({color: 0x111111})); hatTop.position.y = 0.4;
            itemGroup.add(brim, hatTop); itemGroup.position.y = 0.05; break;
        case 'pet_wizard':
            const cone = new THREE.Mesh(new THREE.ConeGeometry(0.5, 1.2, 16), new THREE.MeshPhongMaterial({color: 0x4a148c})); cone.position.y = 0.6; itemGroup.add(cone); break;
        case 'pet_monocle':
            const monocle = new THREE.Mesh(new THREE.TorusGeometry(0.15, 0.03, 16, 32), new THREE.MeshBasicMaterial({color: 0xffd700}));
            itemGroup.position.set(0.25, -0.4, 0.75); itemGroup.add(monocle); break;
        case 'pet_crown':
            const crown = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.3, 0.5, 8, 1, true), new THREE.MeshPhongMaterial({color: 0xffd700, side: THREE.DoubleSide}));
            crown.position.y = 0.3; itemGroup.add(crown); break;
        case 'pet_bubble':
            const bubble = new THREE.Mesh(new THREE.SphereGeometry(1.2, 32, 32), new THREE.MeshPhysicalMaterial({color: 0xffffff, transparent: true, opacity: 0.3, transmission: 0.9}));
            itemGroup.position.y = -0.65; itemGroup.add(bubble); break;
        case 'pet_ring':
            const ring = new THREE.Mesh(new THREE.RingGeometry(1.2, 1.5, 32), new THREE.MeshBasicMaterial({color: 0xffaa00, side: THREE.DoubleSide, transparent:true, opacity:0.7}));
            ring.rotation.x = Math.PI / 2; itemGroup.position.y = -0.65; itemGroup.add(ring);
            activePetAnimations.push((t) => { ring.rotation.z += 0.01; ring.rotation.x = (Math.PI/2) + Math.sin(t*0.002)*0.2; }); break;
        case 'pet_crystals':
            const mat = new THREE.MeshPhongMaterial({color: 0x00ffff, shininess: 150});
            for(let i=0; i<3; i++) { let c = new THREE.Mesh(new THREE.OctahedronGeometry(0.15), mat); itemGroup.add(c); }
            itemGroup.position.y = -0.65; activePetAnimations.push((t) => { itemGroup.children.forEach((c, i) => { let angle = (t * 0.002) + (i * Math.PI * 2 / 3); c.position.set(Math.cos(angle)*1.2, Math.sin(t*0.003 + i)*0.3, Math.sin(angle)*1.2); c.rotation.y += 0.02; c.rotation.x += 0.01; }); }); break;
        case 'pet_shield':
            const shield = new THREE.Mesh(new THREE.SphereGeometry(1.3, 16, 16), new THREE.MeshBasicMaterial({color: 0x00ffff, wireframe: true, transparent:true, opacity:0.3}));
            itemGroup.position.y = -0.65; itemGroup.add(shield);
            activePetAnimations.push((t) => { shield.rotation.y -= 0.005; shield.rotation.x += 0.002; }); break;
    }
    headSocket.add(itemGroup);
}

/* ----- three.js setup ----- */
let scene, camera, renderer, boardGroup, raycaster, pointer;
let backMesh, cellMat; 
let grid = [];
let currentCube = null;
let aimCol = 2, busy = false, hammerMode = false, isLaunching = false;
let score = 0, coins = 50, level = 0, best = 0;
let anims = [];
let matCache = {};

function initThree(){
  const canvas = document.getElementById("game"); if(!canvas) return;
  try { renderer = new THREE.WebGLRenderer({canvas, antialias:true}); } catch(e) { return; }
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2)); scene = new THREE.Scene(); scene.background = new THREE.Color(0x0B0C10); 

  camera = new THREE.PerspectiveCamera(42, innerWidth/innerHeight, 0.1, 60);
  scene.add(new THREE.AmbientLight(0xffffff, 0.7)); const sun = new THREE.DirectionalLight(0xffffff, 0.8); sun.position.set(4, 8, 7); scene.add(sun);

  boardGroup = new THREE.Group(); boardGroup.rotation.x = -0.10; scene.add(boardGroup);
  backMesh = new THREE.Mesh(new THREE.BoxGeometry(BOARD_W + 0.7, BOARD_H + 0.7, 0.3), new THREE.MeshLambertMaterial()); backMesh.position.z = -0.65; boardGroup.add(backMesh);
  cellMat = new THREE.MeshLambertMaterial(); const cellGeo = new THREE.BoxGeometry(CELL*0.96, CELL*0.96, 0.12);
  for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++){ const m = new THREE.Mesh(cellGeo, cellMat); const p = cellPos(c,r); m.position.set(p.x, p.y, -0.42); boardGroup.add(m); }

  updateBoardColorsLive(); 
  initStarfield(); 
  
  aziramPet = createAziram(); 
  scene.add(aziramPet);
  
  raycaster = new THREE.Raycaster(); pointer = new THREE.Vector2(); onResize(); addEventListener("resize", onResize); requestAnimationFrame(loop);
}

function updateBoardColorsLive() { const bData = SHOP.boards.find(b => b.id === save.equippedBoard) || SHOP.boards[0]; backMesh.material.color.set(bData.back); cellMat.color.set(bData.cell); }
function onResize(){ renderer.setSize(innerWidth, innerHeight); camera.aspect = innerWidth/innerHeight; const dist = (BOARD_H/2 + 2.5) / Math.tan(THREE.MathUtils.degToRad(camera.fov/2)); camera.position.set(0, -1.8, dist + 1.5); camera.lookAt(0, -1.2, 0); camera.updateProjectionMatrix(); }
function cellPos(c, r){ return { x: -BOARD_W/2 + CELL/2 + c*(CELL+GAP), y: BOARD_H/2 - CELL/2 - r*(CELL+GAP) }; }

function numberTexture(value){ const cv = document.createElement("canvas"); cv.width = cv.height = 128; const g = cv.getContext("2d"); const skin = save.equippedCube;
  if(skin === 'wood') { g.fillStyle = value >= 128 ? "#8B5A2B" : "#DEB887"; roundRect(g,4,4,120,120,22); g.fill(); } 
  else { g.fillStyle = "#111"; roundRect(g,4,4,120,120,22); g.fill(); }
  g.font = `800 ${value>=1024?42:value>=128?50:60}px 'Baloo 2', sans-serif`; g.textAlign="center"; g.textBaseline="middle"; g.fillStyle = skin==='wood'?(value>=128?"#FFF":"#000"):"#FFF"; g.fillText(value, 64, 68);
  const t = new THREE.CanvasTexture(cv); t.anisotropy = 4; return t;
}
function roundRect(g,x,y,w,h,r){ g.beginPath(); g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r); g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); }
function makeCube(value){ const tex = numberTexture(value); const m = new THREE.Mesh(new THREE.BoxGeometry(CELL*0.92, CELL*0.92, CELL*0.92), new THREE.MeshLambertMaterial({map: tex, color:0xdddddd})); m.userData.value = value; return m; }

function tween(obj, to, dur, ease, done){ const from = {}; for(const k in to) from[k] = obj[k]; anims.push({obj, from, to, dur, t:0, ease: ease||(t=>1-Math.pow(1-t,3)), done}); }
function stepAnims(dt){ for(let i=anims.length-1;i>=0;i--){ const a = anims[i]; a.t += dt/a.dur; const k = a.t>=1 ? 1 : a.ease(a.t); for(const p in a.to) a.obj[p] = a.from[p] + (a.to[p]-a.from[p])*k; if(a.t>=1){ anims.splice(i,1); a.done && a.done(); } } }

function newBoard(){ for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++){ if(grid[c] && grid[c][r]) boardGroup.remove(grid[c][r].mesh); } grid = Array.from({length:COLS},()=>Array(ROWS).fill(null)); score = save.score || 0; updateHUD(); matCache = {}; for(let i=0;i<LEVELS[Math.min(level, LEVELS.length-1)].preset;i++){ const c = Math.floor(Math.random()*COLS); const r = colHeight(c); if(r < 3) placeCube(c, r, [2,4,8,16][Math.floor(Math.random()*4)], true); } spawnCurrent(); }
function colHeight(c){ let h=0; while(h<ROWS && grid[c][h]) h++; return h; }
function placeCube(c, r, value, instant){ const cube = makeCube(value); const p = cellPos(c,r); cube.position.set(p.x, p.y, 0.1); boardGroup.add(cube); grid[c][r] = {value, mesh:cube}; if(!instant){ cube.scale.set(.4,.4,.4); tween(cube.scale, {x:1,y:1,z:1}, 0.22); } return grid[c][r]; }
function spawnCurrent(){ let maxOnBoard = 4; for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++) if(grid[c][r]) maxOnBoard = Math.max(maxOnBoard, grid[c][r].value); const pool = []; for(let v=2; v<=Math.min(32, Math.max(4, maxOnBoard/2)); v*=2) pool.push(v, v, v===2?v:0); const vals = pool.filter(Boolean); currentCube = makeCube(vals[Math.floor(Math.random()*vals.length)]); currentCube.position.set(cellPos(aimCol, 0).x, launchY, 0.1); currentCube.scale.set(.3,.3); boardGroup.add(currentCube); tween(currentCube.scale, {x:1,y:1,z:1}, 0.2); }
function setAim(c, instant = false){ aimCol = Math.max(0, Math.min(COLS-1, c)); if(currentCube && !busy){ const tx = cellPos(aimCol,0).x; if (instant) currentCube.position.x = tx; else tween(currentCube.position, {x: tx}, 0.09); } }
function launch(){ if(busy || !currentCube) return; const c = aimCol; const h = colHeight(c); if(h >= ROWS){ gameOver(); return; } busy = true; isLaunching = true; playSound('drop'); const eff = save.equippedEffect; if(eff === 'eff_flame') { const wp = new THREE.Vector3(); currentCube.getWorldPosition(wp); spawnBurst(wp.x, wp.y - 0.3, wp.z, 'flame', 8); }
  const targetR = h; const p = cellPos(c, targetR); const cube = currentCube; currentCube = null; tween(cube.position, {y:p.y}, Math.max(0.13, Math.abs(cube.position.y - p.y)*0.045), null, ()=>{ isLaunching = false; boardGroup.remove(cube); const cell = placeCube(c, targetR, cube.userData.value, true); cell.mesh.scale.set(1.15,0.85,1.15); tween(cell.mesh.scale, {x:1,y:1,z:1}, 0.18); resolveMerges([{c, r:targetR}]).then(()=>{ if(checkWin()) return; if(isBoardFull()){ gameOver(); return; } busy = false; spawnCurrent(); setAim(aimCol); }); }); }
function isBoardFull() { for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++) if(!grid[c][r]) return false; return true; }
async function resolveMerges(queue){ while(queue.length){ const {c,r} = queue.shift(); const cell = grid[c][r]; if(!cell) continue; const same = [{c:c-1,r},{c:c+1,r},{c,r:r-1},{c,r:r+1}].filter(n => n.c>=0&&n.c<COLS&&n.r>=0&&n.r<ROWS&&grid[n.c][n.r]&&grid[n.c][n.r].value===cell.value); if(!same.length) continue; const newVal = cell.value * Math.pow(2, same.length); score += newVal; save.score = score; coins += 1; save.coins = coins; updateHUD(); await new Promise(res=>{ let left = same.length; const tp = cellPos(c,r); same.forEach(n=>{ const m = grid[n.c][n.r].mesh; grid[n.c][n.r] = null; tween(m.position, {x:tp.x, y:tp.y}, 0.14, null, ()=>{ boardGroup.remove(m); if(--left===0) res(); }); tween(m.scale, {x:.5,y:.5,z:.5}, 0.14); }); }); playSound('merge'); const eff = save.equippedEffect; if(eff === 'eff_explode') { const wp = new THREE.Vector3(); cell.mesh.getWorldPosition(wp); spawnBurst(wp.x, wp.y, wp.z, 'explode', 15); } boardGroup.remove(cell.mesh); grid[c][r] = null; const up = placeCube(c, r, newVal); up.mesh.scale.set(1.35,1.35,1.35); tween(up.mesh.scale, {x:1,y:1,z:1}, 0.22); const moved = []; for(let xc=0;xc<COLS;xc++){ let write=0; for(let xr=0;xr<ROWS;xr++){ if(grid[xc][xr]){ if(xr!==write){ grid[xc][write]=grid[xc][xr]; grid[xc][xr]=null; tween(grid[xc][write].mesh.position, {y:cellPos(xc, write).y}, 0.15); moved.push({c:xc, r:write}); } write++; } } } queue.push({c,r}, ...moved); await new Promise(r=>setTimeout(r,120)); } persist(); }

let winTimer = null;
function checkWin(){ const t = LEVELS[Math.min(level, LEVELS.length-1)].target; let win = false; for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++) if(grid[c][r] && grid[c][r].value >= t){ win = true; break; } if(!win) return false; busy = true; coins += 25; save.coins = coins; best = Math.max(best, score); save.best = best; save.level = Math.min(level+1, LEVELS.length-1); persist(); updateHUD(); document.getElementById("winText").innerHTML = `Έφτιαξες ${t}!<br>+25 🪙`; for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++) { if(grid[c][r]) { const mesh = grid[c][r].mesh; const origY = mesh.position.y; let delay = (c + r) * 50; setTimeout(() => { tween(mesh.position, {y: origY + 0.3}, 0.15, null, () => { tween(mesh.position, {y: origY - 0.15}, 0.15, null, () => { tween(mesh.position, {y: origY}, 0.15); }); }); }, delay); } } if(winTimer) clearTimeout(winTimer); winTimer = setTimeout(() => { playSound('win'); document.getElementById("winModal").classList.remove("hidden"); for(let i=0; i<5; i++) { setTimeout(() => { spawnBurst((Math.random()-0.5)*10, Math.random()*5, (Math.random()-0.5)*5, 'confetti', 30); }, i * 300); } winTimer = null; }, 3000); return true; }
function gameOver(){ busy = true; best = Math.max(best, score); save.best = best; save.score = 0; persist(); document.getElementById("loseText").innerHTML = `Σκορ: <b>${score}</b>`; document.getElementById("loseModal").classList.remove("hidden"); }

function onTap(e){ 
  if(document.querySelector(".overlay:not(.hidden)")) return; 
  const x = (e.touches ? e.touches[0].clientX : e.clientX) / innerWidth * 2 - 1; 
  const y = -((e.touches ? e.touches[0].clientY : e.clientY) / innerHeight * 2 - 1); 
  pointer.set(x,y); 
  raycaster.setFromCamera(pointer, camera); 
  
  // Έλεγχος αν ο παίκτης ακούμπησε τον AZIRAM
  if (aziramPet) {
      const hits = raycaster.intersectObject(aziramPet, true);
      if (hits.length > 0) {
          aziramReactionTime = 1.2; // Διαρκεί 1.2 δευτερόλεπτα το animation
          if(audioCtx.state !== 'suspended') playDropDefault(audioCtx); // Κάνει και έναν ήχο!
          return; // Σταματάει εδώ για να μην πετάξει κύβο
      }
  }

  const hit = new THREE.Vector3(); raycaster.ray.intersectPlane(new THREE.Plane(new THREE.Vector3(0,0,1).applyQuaternion(boardGroup.quaternion), 0), hit); boardGroup.worldToLocal(hit); 
  const c = Math.max(0,Math.min(COLS-1, Math.round((hit.x + BOARD_W/2 - CELL/2) / (CELL+GAP)))); 
  const r = Math.round((BOARD_H/2 - CELL/2 - hit.y) / (CELL+GAP)); 
  if(hammerMode){ if(r>=0 && r<ROWS && grid[c][r]){ hammerMode=false; const m = grid[c][r].mesh; grid[c][r]=null; tween(m.scale, {x:.01,y:.01,z:.01}, 0.18, null, ()=> boardGroup.remove(m)); busy=true; setTimeout(()=>{ resolveMerges([]).then(()=>{ busy=false; updateHUD(); persist(); }); }, 180); } else { hammerMode=false; updateHUD(); } return; } setAim(c, true); launch(); 
}
document.getElementById("btnHammer").onclick = ()=>{ if(busy)return; hammerMode=true; updateHUD(); toast("🔨 Επίλεξε κύβο"); }
document.getElementById("btnShuffle").onclick = ()=>{ if(busy||!currentCube)return; boardGroup.remove(currentCube); currentCube=null; spawnCurrent(); setAim(aimCol); updateHUD(); }
document.getElementById("btnMagnet").onclick = ()=>{ if(busy)return; let tilesByVal = {}; for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++) if(grid[c][r]) { let v=grid[c][r].value; if(!tilesByVal[v])tilesByVal[v]=[]; tilesByVal[v].push({c,r,cell:grid[c][r]}); } let mg = Object.values(tilesByVal).filter(g=>g.length>1); if(!mg.length)return toast("Κανένα ζευγάρι!"); busy=true; let animsP=0; mg.forEach(group=>{ const trg = group[0]; trg.newVal = trg.cell.value * Math.pow(2, group.length-1); group.slice(1).forEach(t=>{ const m = t.cell.mesh; grid[t.c][t.r]=null; const tp=cellPos(trg.c,trg.r); animsP++; tween(m.position, {x:tp.x, y:tp.y, z:1.0}, 0.35, null, ()=>{ boardGroup.remove(m); if(--animsP===0) finMagnet(mg); }); tween(m.scale, {x:0.3,y:0.3,z:0.3}, 0.35); }); }); }
function finMagnet(mg){ playSound('merge'); mg.forEach(g=>{ const trg=g[0]; boardGroup.remove(trg.cell.mesh); grid[trg.c][trg.r]=null; score+=trg.newVal; save.score=score; const up=placeCube(trg.c,trg.r,trg.newVal); up.mesh.scale.set(1.5,1.5,1.5); tween(up.mesh.scale,{x:1,y:1,z:1},0.25); }); setTimeout(()=>{ resolveMerges([]).then(()=>{ busy=false; updateHUD(); persist(); }); }, 250); }

function renderShop() { 
  const container = document.getElementById('shopContainer'); container.innerHTML = ''; 
  const arr = SHOP[currentShopTab] || []; 
  
  let propOwned = currentShopTab === 'cubes' ? 'ownedCubes' : currentShopTab === 'boards' ? 'ownedBoards' : currentShopTab === 'effects' ? 'ownedEffects' : currentShopTab === 'sounds' ? 'ownedSounds' : 'ownedPets';
  let propEquip = currentShopTab === 'cubes' ? 'equippedCube' : currentShopTab === 'boards' ? 'equippedBoard' : currentShopTab === 'effects' ? 'equippedEffect' : currentShopTab === 'sounds' ? 'equippedSound' : 'equippedPetItem';
  
  arr.forEach(item => { 
    const isOwned = save[propOwned] && save[propOwned].includes(item.id); 
    const isEquipped = save[propEquip] === item.id; 
    const el = document.createElement('div'); el.className = `shop-item ${isOwned?'owned':''} ${isEquipped?'equipped':''}`; 
    el.innerHTML = `<div style="font-size:36px; margin-bottom:5px;">${item.icon}</div><h3>${item.name}</h3><div class="price">${isEquipped?'ΕΠΙΛΕΓΜΕΝΟ':isOwned?'ΕΠΙΛΟΓΗ':item.price === 0 ? 'Δωρεάν' : item.price + ' 🪙'}</div>`; 
    el.onclick = () => { 
      if (isOwned) { save[propEquip] = item.id; persist(); renderShop(); applyShopChanges(); } 
      else if (coins >= item.price) { 
        coins -= item.price; save.coins = coins; save[propOwned].push(item.id); save[propEquip] = item.id; persist(); updateHUD(); renderShop(); applyShopChanges(); toast("Αγόρασες το " + item.name + "!"); 
      } else { toast("Δεν έχεις αρκετά νομίσματα!"); }
    }; 
    container.appendChild(el); 
  }); 
}

function applyShopChanges() { 
  if(currentShopTab === 'boards') updateBoardColorsLive(); 
  if(currentShopTab === 'cubes') { matCache = {}; toast("Η εμφάνιση κύβου άλλαξε!"); } 
  if(currentShopTab === 'sounds') toast("Ο ήχος άλλαξε!"); 
  if(currentShopTab === 'pets') { equipPetItem(save.equippedPetItem); toast("Η εμφάνιση του Pet άλλαξε!"); }
}

document.querySelectorAll('.shop-tab').forEach(btn => { btn.onclick = (e) => { document.querySelectorAll('.shop-tab').forEach(b => b.classList.remove('active')); e.target.classList.add('active'); currentShopTab = e.target.dataset.tab; renderShop(); } });

function updateHUD(){ document.getElementById("hudLevel").textContent = level+1; document.getElementById("hudScore").textContent = score; document.getElementById("hudCoins").textContent = coins; document.getElementById("missionText").textContent = LEVELS[Math.min(level, LEVELS.length-1)].text; document.getElementById("btnHammer").classList.toggle("armed", hammerMode); }
let toastTimer; function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.style.opacity=1; clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.style.opacity=0, 1800); }

let lastT = 0;
function loop(t){ 
  const dt = Math.min(0.05, (t-lastT)/1000); lastT = t; stepAnims(dt); updateParticles(dt); updateStarfield(0.8); 
  
  if(aziramPet) {
      // Σταθερή θέση κάτω δεξιά από το ταμπλό
      aziramPet.position.lerp(aziramTargetPos, 0.04);
      
      const core = aziramPet.children[0];

      // Reaction / Αλληλεπίδραση
      if (aziramReactionTime > 0) {
          aziramReactionTime -= dt;
          
          // Τρέμουλο (μικρές τυχαίες κινήσεις x,y)
          core.position.x = (Math.random() - 0.5) * 0.15;
          core.position.y = (Math.random() - 0.5) * 0.15;
          
          // Τρελή Περιστροφή (Γυρίζει γρήγορα γύρω-γύρω)
          aziramPet.rotation.y += 0.4;
          
          // Παραμόρφωση (Extreme Jelly effect)
          core.scale.y = 1 + Math.sin(t * 0.05) * 0.3;
          core.scale.x = 1 + Math.cos(t * 0.05) * 0.3;
      } else {
          // Ηρεμία (Idle State)
          core.position.x = 0;
          aziramPet.rotation.y += (aziramTargetRotY - aziramPet.rotation.y) * 0.1;
          
          // Απαλή Αναπνοή
          core.scale.y = 1 + Math.sin(t * 0.004) * 0.04;
          core.scale.x = 1 + Math.cos(t * 0.004) * 0.04;
          core.position.y = Math.sin(t * 0.002) * 0.15;
      }

      activePetAnimations.forEach(anim => anim(t));
  }

  if(currentCube && !busy) currentCube.rotation.y = Math.sin(t*0.002)*0.12; if(renderer) renderer.render(scene, camera); requestAnimationFrame(loop); 
}

(async function(){
  document.getElementById('btnShop').onclick = () => { renderShop(); document.getElementById('shopModal').classList.remove('hidden'); };
  document.getElementById('btnCloseShop').onclick = () => { document.getElementById('shopModal').classList.add('hidden'); };
  document.addEventListener('pointerdown', ()=> { if(audioCtx.state === 'suspended') audioCtx.resume(); }, {once:true});
  await loadSave(); coins = save.coins; level = save.level; best = save.best;
  initThree(); if(!renderer) return; newBoard(); updateHUD();
  
  equipPetItem(save.equippedPetItem);
  
  const cvs = document.getElementById("game"); cvs.addEventListener("pointermove", (e)=>{if(!busy)setAim((e.touches?e.touches[0].clientX:e.clientX)/innerWidth*2-1)}); cvs.addEventListener("pointerdown", onTap);
  document.getElementById("btnNext").onclick = ()=>{ document.getElementById("winModal").classList.add("hidden"); level=Math.min(level+1,LEVELS.length-1); busy=false; newBoard(); };
  document.getElementById("btnRetry").onclick = ()=>{ document.getElementById("loseModal").classList.add("hidden"); busy=false; newBoard(); };
})();
</script>
