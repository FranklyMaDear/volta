            function cellPos(c, r) {
                return {
                    x: -BOARD_W / 2 + CELL / 2 + c * (CELL + GAP),
                    y: BOARD_H / 2 - CELL / 2 - r * (CELL + GAP)
                };
            }

            function numberTexture(value) {
                const cv = document.createElement("canvas");
                cv.width = cv.height = 128;
                const g = cv.getContext("2d");
                const skin = save.equippedCube;
                if (skin === 'wood') { g.fillStyle = value >= 128 ? "#8B5A2B" : "#DEB887"; roundRect(g, 4, 4, 120, 120, 22); g.fill(); }
                else if (skin === 'whitered' || skin === 'whitegreen') {
                    g.fillStyle = "white"; roundRect(g, 4, 4, 120, 120, 22); g.fill();
                    g.fillStyle = skin === 'whitered' ? "#D32F2F" : "#388E3C";
                    g.save(); g.clip();
                    for (let i = -128; i < 256; i += 32) { g.beginPath(); g.moveTo(i, 0); g.lineTo(i + 20, 0); g.lineTo(i - 108, 128); g.lineTo(i - 128, 128); g.fill(); }
                    g.restore();
                } else if (skin === 'zebra') {
                    g.fillStyle = "white"; roundRect(g, 4, 4, 120, 120, 22); g.fill();
                    g.fillStyle = "#111"; g.save(); g.clip();
                    for (let i = 0; i < 128; i += 24) { g.beginPath(); g.moveTo(0, i); g.bezierCurveTo(40, i + 15, 80, i - 15, 128, i); g.lineTo(128, i + 10); g.bezierCurveTo(80, i - 5, 40, i + 25, 0, i + 10); g.fill(); }
                    g.restore();
                } else if (skin === 'rainbow') {
                    let grad = g.createLinearGradient(0, 0, 128, 128);
                    ['red', 'orange', 'yellow', 'green', 'cyan', 'blue', 'purple'].forEach((c, i) => grad.addColorStop(i / 6, c));
                    g.fillStyle = grad; roundRect(g, 4, 4, 120, 120, 22); g.fill();
                } else if (skin === 'gold') {
                    let grad = g.createRadialGradient(64, 64, 0, 64, 64, 90);
                    grad.addColorStop(0, "#FFF59D"); grad.addColorStop(0.6, "#FBC02D"); grad.addColorStop(1, "#F57F17");
                    g.fillStyle = grad; roundRect(g, 4, 4, 120, 120, 22); g.fill();
                } else if (skin === 'neon') {
                    g.fillStyle = "#111"; roundRect(g, 4, 4, 120, 120, 22); g.fill();
                    g.strokeStyle = `hsl(${(Math.log2(value)*30)%360}, 100%, 50%)`; g.lineWidth = 6; g.stroke();
                } else if (skin === 'galaxy') {
                    g.fillStyle = "#1A0B2E"; roundRect(g, 4, 4, 120, 120, 22); g.fill();
                    g.fillStyle = "white";
                    for (let i = 0; i < 30; i++) { g.beginPath(); g.arc(Math.random() * 128, Math.random() * 128, Math.random() * 2, 0, 7); g.fill(); }
                } else if (skin === 'ice') {
                    let grad = g.createLinearGradient(0, 0, 128, 128);
                    grad.addColorStop(0, "#E0F7FA"); grad.addColorStop(1, "#00BCD4");
                    g.fillStyle = grad; roundRect(g, 4, 4, 120, 120, 22); g.fill();
                } else if (skin === 'lava') {
                    let grad = g.createLinearGradient(0, 0, 128, 128);
                    grad.addColorStop(0, "#FF5722"); grad.addColorStop(1, "#FFC107");
                    g.fillStyle = grad; roundRect(g, 4, 4, 120, 120, 22); g.fill();
                } else { g.fillStyle = "#111"; roundRect(g, 4, 4, 120, 120, 22); g.fill(); }

                const badgeSkins = ['whitered', 'whitegreen', 'zebra', 'rainbow', 'galaxy', 'neon', 'ice', 'lava', 'gold'];
                const hasBadge = badgeSkins.includes(skin);
                if (hasBadge) {
                    g.save();
                    g.shadowColor = "rgba(0,0,0,0.35)";
                    g.shadowBlur = 7;
                    g.shadowOffsetY = 2;
                    g.beginPath();
                    g.arc(64, 66, 37, 0, Math.PI * 2);
                    g.fillStyle = "rgba(255,255,255,0.96)";
                    g.fill();
                    g.restore();
                    g.lineWidth = 3;
                    g.strokeStyle = "rgba(0,0,0,0.12)";
                    g.beginPath();
                    g.arc(64, 66, 37, 0, Math.PI * 2);
                    g.stroke();
                }
                g.font = hasBadge ? `800 ${value>=1024?30:value>=128?36:44}px 'Baloo 2', sans-serif` :
                    `800 ${value>=1024?42:value>=128?50:60}px 'Baloo 2', sans-serif`;
                g.textAlign = "center";
                g.textBaseline = "middle";
                g.fillStyle = hasBadge ? "#2F1B0D" : (skin === 'wood' ? (value >= 128 ? "#FFF" : "#000") : "#FFF");
                g.fillText(value, 64, hasBadge ? 66 : 68);
                const t = new THREE.CanvasTexture(cv);
                t.anisotropy = 4;
                return t;
            }

            function roundRect(g, x, y, w, h, r) {
                g.beginPath();
                g.moveTo(x + r, y);
                g.arcTo(x + w, y, x + w, y + h, r);
                g.arcTo(x + w, y + h, x, y + h, r);
                g.arcTo(x, y + h, x, y, r);
                g.arcTo(x, y, x + w, y, r);
                g.closePath();
            }

            function makeCube(value) {
                const tex = numberTexture(value);
                const m = new THREE.Mesh(new THREE.BoxGeometry(CELL * 0.92, CELL * 0.92, CELL * 0.92), new THREE.MeshLambertMaterial({ map: tex, color: 0xdddddd }));
                m.userData.value = value;
                return m;
            }

            function tween(obj, to, dur, ease, done) {
                const from = {};
                for (const k in to) from[k] = obj[k];
                anims.push({ obj, from, to, dur, t: 0, ease: ease || (t => 1 - Math.pow(1 - t, 3)), done });
            }

            function stepAnims(dt) {
                for (let i = anims.length - 1; i >= 0; i--) {
                    const a = anims[i];
                    a.t += dt / a.dur;
                    const k = a.t >= 1 ? 1 : a.ease(a.t);
                    for (const p in a.to) a.obj[p] = a.from[p] + (a.to[p] - a.from[p]) * k;
                    if (a.t >= 1) { anims.splice(i, 1); a.done && a.done(); }
                }
            }

            function newBoard() {
                for (let c = 0; c < COLS; c++)
                    for (let r = 0; r < ROWS; r++) { if (grid[c] && grid[c][r]) boardGroup.remove(grid[c][r].mesh); }
                grid = Array.from({ length: COLS }, () => Array(ROWS).fill(null));
                score = save.score || 0;
                updateHUD();
                for (let i = 0; i < LEVELS[Math.min(level, LEVELS.length - 1)].preset; i++) {
                    const c = Math.floor(Math.random() * COLS);
                    const r = colHeight(c);
                    if (r < 3) placeCube(c, r, [2, 4, 8, 16][Math.floor(Math.random() * 4)], true);
                }
                spawnCurrent();
                lastActionTime = performance.now();
                // Η Λιλή ανακοινώνει τη νέα αποστολή
                setTimeout(announceMission, 900);
            }

            function colHeight(c) { let h = 0; while (h < ROWS && grid[c][h]) h++; return h; }

            function placeCube(c, r, value, instant) {
                const cube = makeCube(value);
                const p = cellPos(c, r);
                cube.position.set(p.x, p.y, 0.1);
                boardGroup.add(cube);
                grid[c][r] = { value, mesh: cube };
                if (!instant) { cube.scale.set(.4, .4, .4); tween(cube.scale, { x: 1, y: 1, z: 1 }, 0.22); }
                return grid[c][r];
            }

            function spawnCurrent() {
                let maxOnBoard = 4;
                for (let c = 0; c < COLS; c++)
                    for (let r = 0; r < ROWS; r++)
                        if (grid[c][r]) maxOnBoard = Math.max(maxOnBoard, grid[c][r].value);
                const pool = [];
                for (let v = 2; v <= Math.min(32, Math.max(4, maxOnBoard / 2)); v *= 2) pool.push(v, v, v === 2 ? v : 0);
                const vals = pool.filter(Boolean);
                currentCube = makeCube(vals[Math.floor(Math.random() * vals.length)]);
                currentCube.position.set(cellPos(aimCol, 0).x, launchY, 0.1);
                currentCube.scale.set(.3, .3, .3);
                boardGroup.add(currentCube);
                tween(currentCube.scale, { x: 1, y: 1, z: 1 }, 0.2);
            }

            function setAim(c, instant = false) {
                aimCol = Math.max(0, Math.min(COLS - 1, c));
                if (currentCube && !busy) {
                    const tx = cellPos(aimCol, 0).x;
                    if (instant) currentCube.position.x = tx;
                    else tween(currentCube.position, { x: tx }, 0.09);
                }
            }

            function launch() {
                if (busy || !currentCube) return;
                const c = aimCol;
                const h = colHeight(c);
                if (h >= ROWS) { gameOver(); return; }
                busy = true;
                lastActionTime = performance.now();
                playSound('drop');
                const eff = save.equippedEffect;
                if (eff !== 'eff_none') {
                    const wp = new THREE.Vector3();
                    currentCube.getWorldPosition(wp);
                    const etype = eff.replace('eff_', '');
                    if (etype === 'explode') spawnBurst(wp.x, wp.y - 0.3, wp.z, 'explode', 18);
                    else if (etype === 'confetti') spawnBurst(wp.x, wp.y - 0.3, wp.z, 'confetti', 20);
                    else spawnBurst(wp.x, wp.y - 0.3, wp.z, etype, 10);
                }
                const targetR = h;
                const p = cellPos(c, targetR);
                const cube = currentCube;
                currentCube = null;
                tween(cube.position, { y: p.y }, Math.max(0.13, Math.abs(cube.position.y - p.y) * 0.045), null, () => {
                    boardGroup.remove(cube);
                    const cell = placeCube(c, targetR, cube.userData.value, true);
                    cell.mesh.scale.set(1.15, 0.85, 1.15);
                    tween(cell.mesh.scale, { x: 1, y: 1, z: 1 }, 0.18);
                    resolveMerges([{ c, r: targetR }]).then(() => {
                        if (checkWin()) {
                            busy = false;
                            if (isBoardFull()) { gameOver(); return; }
                            spawnCurrent();
                            setAim(aimCol);
                            return;
                        }
                        // Όταν καλυφθούν όλοι οι κύβοι → τέλος παιχνιδιού
                        if (isBoardFull()) { gameOver(); return; }
                        busy = false;
                        spawnCurrent();
                        setAim(aimCol);
                    });
                });
            }

            function isBoardFull() {
                for (let c = 0; c < COLS; c++)
                    for (let r = 0; r < ROWS; r++)
                        if (!grid[c][r]) return false;
                return true;
            }

            function boardFillRatio() {
                let filled = 0;
                for (let c = 0; c < COLS; c++)
                    for (let r = 0; r < ROWS; r++)
                        if (grid[c] && grid[c][r]) filled++;
                return filled / (COLS * ROWS);
            }

            async function resolveMerges(queue) {
                while (queue.length) {
                    const { c, r } = queue.shift();
                    const cell = grid[c][r];
                    if (!cell) continue;
                    const same = [{ c: c - 1, r }, { c: c + 1, r }, { c, r: r - 1 }, { c, r: r + 1 }].filter(n => n.c >= 0 && n.c < COLS && n.r >= 0 && n.r < ROWS && grid[n.c][n.r] && grid[n.c][n.r].value === cell.value);
                    if (!same.length) continue;
                    const newVal = cell.value * Math.pow(2, same.length);
                    score += newVal;
                    save.score = score;
                    coins += 1;
                    save.coins = coins;
                    updateHUD();
                    await new Promise(res => {
                        let left = same.length;
                        const tp = cellPos(c, r);
                        same.forEach(n => {
                            const m = grid[n.c][n.r].mesh;
                            grid[n.c][n.r] = null;
                            tween(m.position, { x: tp.x, y: tp.y }, 0.14, null, () => {
                                boardGroup.remove(m);
                                if (--left === 0) res();
                            });
                            tween(m.scale, { x: .5, y: .5, z: .5 }, 0.14);
                        });
                    });
                    playSound('merge');
                    const eff = save.equippedEffect;
                    if (eff !== 'eff_none') {
                        const wp = new THREE.Vector3();
                        cell.mesh.getWorldPosition(wp);
                        const etype = eff.replace('eff_', '');
                        if (etype === 'explode') spawnBurst(wp.x, wp.y, wp.z, 'explode', 20);
                        else if (etype === 'confetti') spawnBurst(wp.x, wp.y, wp.z, 'confetti', 25);
                        else spawnBurst(wp.x, wp.y, wp.z, etype, 12);
                    }
                    if (newVal >= 64 && girlWinTime <= 0) {
                        girlReactionTime = 1.2;
                        showSpeech("WOW! " + newVal + "! 🤩", 1800);
                    }
                    boardGroup.remove(cell.mesh);
                    grid[c][r] = null;
                    const up = placeCube(c, r, newVal);
                    up.mesh.scale.set(1.35, 1.35, 1.35);
                    tween(up.mesh.scale, { x: 1, y: 1, z: 1 }, 0.22);
                    const moved = [];
                    for (let xc = 0; xc < COLS; xc++) {
                        let write = 0;
                        for (let xr = 0; xr < ROWS; xr++) {
                            if (grid[xc][xr]) {
                                if (xr !== write) {
                                    grid[xc][write] = grid[xc][xr];
                                    grid[xc][xr] = null;
                                    tween(grid[xc][write].mesh.position, { y: cellPos(xc, write).y }, 0.15);
                                    moved.push({ c: xc, r: write });
                                }
                                write++;
                            }
                        }
                    }
                    queue.push({ c, r }, ...moved);
                    await new Promise(r2 => setTimeout(r2, 120));
                }
                persist();
            }

            let winTimer = null;
            let winShown = false;

            function checkWin() {
                const t = LEVELS[Math.min(level, LEVELS.length - 1)].target;
                let win = false;
                for (let c = 0; c < COLS; c++)
                    for (let r = 0; r < ROWS; r++)
                        if (grid[c][r] && grid[c][r].value >= t) { win = true; break; }
                if (!win) return false;

                if (!winShown) {
                    winShown = true;
                    coins += 25;
                    save.coins = coins;
                    best = Math.max(best, score);
                    save.best = best;
                    save.level = Math.min(level + 1, LEVELS.length - 1);
                    persist();
                    updateHUD();
                    document.getElementById("winText").innerHTML = `Έφτιαξες ${t}!<br>+25 🪙<br>Το παιχνίδι συνεχίζεται!`;

                    // Πανηγυρισμός: η Λιλή χοροπηδάει (χωρίς κομφετί από το avatar)
                    playWinSound();
                    girlWinTime = 6.0;
                    showSpeech("Τα καταφέραμε! 🎉", 3800);
                    speak("Μπράβο! Τα καταφέραμε!");

                    if (winTimer) clearTimeout(winTimer);
                    winTimer = setTimeout(() => {
                        document.getElementById("winModal").classList.remove("hidden");
                        winTimer = null;
                    }, 3500);
                }
                return true;
            }

            function gameOver() {
                busy = true;
                best = Math.max(best, score);
                save.best = best;
                save.score = 0;
                persist();
                showSpeech("Ωχ όχι! Γέμισε! 😭", 2500);
                speak("Ωχ όχι! Γέμισε το ταμπλό! Τέλος παιχνιδιού!");
                document.getElementById("loseText").innerHTML = `Σκορ: <b>${score}</b>`;
                document.getElementById("loseModal").classList.remove("hidden");
            }

            function onTap(e) {
                if (document.querySelector(".overlay:not(.hidden)")) return;
                lastActionTime = performance.now();
                const cx = (e.touches && e.touches[0]) ? e.touches[0].clientX : e.clientX;
                const cy = (e.touches && e.touches[0]) ? e.touches[0].clientY : e.clientY;
                const x = cx / innerWidth * 2 - 1;
                const y = -(cy / innerHeight * 2 - 1);
                pointer.set(x, y);
                raycaster.setFromCamera(pointer, camera);

                if (girlPet) {
                    const hits = raycaster.intersectObject(girlPet, true);
                    if (hits.length > 0 && girlWinTime <= 0) {
                        if (petState === 'rest') {
                            petState = 'stand';
                            petStateTimer = 2.5;
                            showSpeech("Ε; Εδώ είμαι! 😳", 1800);
                            speak("Ε; Εδώ είμαι!");
                            return;
                        }
                        girlReactionTime = 1.0;
                        const greetings = ["Γεια σου! 😊", "Χι χι! 😄", "Παίζουμε; 🎮", "Είμαι η Λιλή! 💖"];
                        const pick = greetings[Math.floor(Math.random() * greetings.length)];
                        showSpeech(pick, 1800);
                        speak(pick.replace(/[^\u0370-\u03FF\u1F00-\u1FFFa-zA-Z; !?]/g, '').trim());
                        if (audioCtx.state !== 'suspended') playSound('drop');
                        return;
                    }
                }

                const hit = new THREE.Vector3();
                raycaster.ray.intersectPlane(new THREE.Plane(new THREE.Vector3(0, 0, 1).applyQuaternion(boardGroup.quaternion), 0), hit);
                boardGroup.worldToLocal(hit);
                const c = Math.max(0, Math.min(COLS - 1, Math.round((hit.x + BOARD_W / 2 - CELL / 2) / (CELL + GAP))));
                const r = Math.round((BOARD_H / 2 - CELL / 2 - hit.y) / (CELL + GAP));
                if (hammerMode) {
                    if (r >= 0 && r < ROWS && grid[c][r]) {
                        hammerMode = false;
                        const m = grid[c][r].mesh;
                        grid[c][r] = null;
                        tween(m.scale, { x: .01, y: .01, z: .01 }, 0.18, null, () => boardGroup.remove(m));
                        busy = true;
                        setTimeout(() => { resolveMerges([]).then(() => { busy = false; updateHUD(); persist(); }); }, 180);
                    } else { hammerMode = false; updateHUD(); }
                    return;
                }
                setAim(c, true);
                launch();
            }

            document.getElementById("btnHammer").onclick = () => { if (busy) return; hammerMode = true; updateHUD(); toast("🔨 Επίλεξε κύβο"); };
            document.getElementById("btnShuffle").onclick = () => {
                if (busy || !currentCube) return;
                boardGroup.remove(currentCube);
                currentCube = null;
                spawnCurrent();
                setAim(aimCol);
                updateHUD();
            };
            document.getElementById("btnMagnet").onclick = () => {
                if (busy) return;
                let tilesByVal = {};
                for (let c = 0; c < COLS; c++)
                    for (let r = 0; r < ROWS; r++)
                        if (grid[c][r]) { let v = grid[c][r].value; if (!tilesByVal[v]) tilesByVal[v] = []; tilesByVal[v].push({ c, r, cell: grid[c][r] }); }
                let mg = Object.values(tilesByVal).filter(g => g.length > 1);
                if (!mg.length) return toast("Κανένα ζευγάρι!");
                busy = true;
                let animsP = 0;
                mg.forEach(group => {
                    const trg = group[0];
                    trg.newVal = trg.cell.value * Math.pow(2, group.length - 1);
                    group.slice(1).forEach(tt => {
                        const m = tt.cell.mesh;
                        grid[tt.c][tt.r] = null;
                        const tp = cellPos(trg.c, trg.r);
                        animsP++;
                        tween(m.position, { x: tp.x, y: tp.y, z: 1.0 }, 0.35, null, () => { boardGroup.remove(m); if (--animsP === 0) finMagnet(mg); });
                        tween(m.scale, { x: 0.3, y: 0.3, z: 0.3 }, 0.35);
                    });
                });
            };

            function finMagnet(mg) {
                playSound('merge');
                mg.forEach(g => {
                    const trg = g[0];
                    boardGroup.remove(trg.cell.mesh);
                    grid[trg.c][trg.r] = null;
                    score += trg.newVal;
                    save.score = score;
                    const up = placeCube(trg.c, trg.r, trg.newVal);
                    up.mesh.scale.set(1.5, 1.5, 1.5);
                    tween(up.mesh.scale, { x: 1, y: 1, z: 1 }, 0.25);
                });
                setTimeout(() => { resolveMerges([]).then(() => { busy = false; updateHUD(); persist(); }); }, 250);
            }

            // ---- Shop System ----
            function getShopProperties(tab) {
                const map = {
                    cubes: { owned: 'ownedCubes', equip: 'equippedCube' },
                    boards: { owned: 'ownedBoards', equip: 'equippedBoard' },
                    effects: { owned: 'ownedEffects', equip: 'equippedEffect' },
                    sounds: { owned: 'ownedSounds', equip: 'equippedSound' },
                    pet_hair: { owned: 'ownedPetHair', equip: 'equippedPetHair' },
                    pet_color: { owned: 'ownedPetColor', equip: 'equippedPetColor' },
                    pet_head: { owned: 'ownedPetHead', equip: 'equippedPetHead' },
                    pet_face: { owned: 'ownedPetFace', equip: 'equippedPetFace' },
                    pet_body: { owned: 'ownedPetBody', equip: 'equippedPetBody' },
                    pet_props: { owned: 'ownedPetProps', equip: 'equippedPetProps' },
                    pet_feet: { owned: 'ownedPetFeet', equip: 'equippedPetFeet' }
                };
                return map[tab] || { owned: '', equip: '' };
            }

            function renderShop() {
                const petSubTabs = document.getElementById('petSubTabs');
                if (currentMainTab === 'pets') petSubTabs.classList.add('active');
                else petSubTabs.classList.remove('active');

                const activeTab = currentMainTab === 'pets' ? currentPetSubTab : currentMainTab;
                const container = document.getElementById('shopContainer');
                container.innerHTML = '';

                const arr = SHOP[activeTab] || [];
                const props = getShopProperties(activeTab);

                arr.forEach(item => {
                    const isOwned = save[props.owned] && save[props.owned].includes(item.id);
                    const isEquipped = save[props.equip] === item.id;
                    const el = document.createElement('div');
                    el.className = `shop-item ${isOwned?'owned':''} ${isEquipped?'equipped':''}`;
                    el.innerHTML =
                        `<div style="font-size:36px; margin-bottom:4px;">${item.icon}</div><h3>${item.name}</h3><div class="price">${isEquipped?'ΕΠΙΛΕΓΜΕΝΟ':isOwned?'ΕΠΙΛΟΓΗ':item.price===0?'Δωρεάν':item.price+' 🪙'}</div>`;
                    el.onclick = () => {
                        if (isOwned) {
                            save[props.equip] = item.id;
                            persist();
                            renderShop();
                            applyShopChanges(activeTab);
                            toast("Επιλέχθηκε: " + item.name);
                        } else if (coins >= item.price) {
                            coins -= item.price;
                            save.coins = coins;
                            save[props.owned].push(item.id);
                            save[props.equip] = item.id;
                            persist();
                            updateHUD();
                            renderShop();
                            applyShopChanges(activeTab);
                            toast("Αγόρασες: " + item.name + "!");
                        } else { toast("Δεν έχεις αρκετά νομίσματα!"); }
                    };
                    container.appendChild(el);
                });
            }

            function applyShopChanges(tabChanged) {
                if (tabChanged === 'boards') updateBoardColorsLive();
                if (tabChanged === 'cubes') {
                    for (let c = 0; c < COLS; c++)
                        for (let r = 0; r < ROWS; r++)
                            if (grid[c][r]) { const m = grid[c][r].mesh; m.material.map = numberTexture(grid[c][r].value); m.material.needsUpdate = true; }
                    if (currentCube) { currentCube.material.map = numberTexture(currentCube.userData.value); currentCube.material.needsUpdate = true; }
                    toast("Η εμφάνιση κύβου άλλαξε!");
                }
                if (tabChanged.indexOf('pet_') === 0) {
                    equipPetSlot(tabChanged, save[getShopProperties(tabChanged).equip]);
                }
                if (tabChanged === 'effects') toast("Το εφέ άλλαξε!");
                if (tabChanged === 'sounds') toast("Ο ήχος άλλαξε!");
            }

            document.querySelectorAll('.shop-tab').forEach(btn => {
                btn.onclick = (e) => {
                    document.querySelectorAll('.shop-tab').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentMainTab = e.target.dataset.maintab;
                    renderShop();
                };
            });
            document.querySelectorAll('.pet-subtab').forEach(btn => {
                btn.onclick = (e) => {
                    document.querySelectorAll('.pet-subtab').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentPetSubTab = e.target.dataset.subtab;
                    renderShop();
                };
            });

            function updateHUD() {
                document.getElementById("hudLevel").textContent = level + 1;
                document.getElementById("hudScore").textContent = score;
                document.getElementById("hudCoins").textContent = coins;
                document.getElementById("btnHammer").classList.toggle("armed", hammerMode);
            }

            let toastTimer;

            function toast(msg) {
                const t = document.getElementById("toast");
                t.textContent = msg;
                t.style.opacity = 1;
                clearTimeout(toastTimer);
                toastTimer = setTimeout(() => t.style.opacity = 0, 1800);
            }

            // Περιοδική ανακοίνωση αποστολής από τη Λιλή (κάθε 30")
            setInterval(announceMission, 30000);

            // ---- Mood System ----
            function computeMood(now) {
                const fill = boardFillRatio();
                if (fill >= 0.8) return 'anxious';
                if (fill >= 0.65) return 'angry';
                if (now - lastActionTime > 15000) return 'bored';
                return 'idle';
            }

            function onMoodChange(mood) {
                if (mood === 'angry') showSpeech("Γεμίζει το ταμπλό! 😠", 2200);
                if (mood === 'anxious') showSpeech("ΠΑΝΙΚΟΣ!! 😱", 2200);
                if (mood === 'bored') showSpeech("Βαριέμαι... 🥱", 2200);
            }

            let lastT = 0;

            function loop(t) {
                const dt = Math.min(0.05, (t - lastT) / 1000);
                lastT = t;
                if (!lastActionTime) lastActionTime = performance.now();
                stepAnims(dt);
                updateParticles(dt);
                updateBackground(t, dt);

                if (girlPet) {
                    const core = girlCore;

                    // rainbow φόρεμα / μαλλιά
                    if (dressIsRainbow && dressMesh) dressMesh.material.color.setHSL((t * 0.0004) % 1, 0.75, 0.6);
                    if (hairIsRainbow && hairMats.length) {
                        hairMats[0].color.setHSL((t * 0.0005) % 1, 0.85, 0.62);
                        hairMats[1].color.setHSL((t * 0.0005 + 0.08) % 1, 0.85, 0.45);
                    }

                    // κούνημα κοτσιδιών
                    if (hairGroup) {
                        hairGroup.children.forEach(ch => {
                            if (ch.userData.isTail) {
                                const s = ch.userData.side || 1;
                                ch.rotation.x = Math.sin(t * 0.004 + s) * 0.12;
                                ch.rotation.z = s * -0.35 + Math.sin(t * 0.005) * 0.08;
                            }
                        });
                    }

                    if (girlWinTime > 0) {
                        // ΠΑΝΗΓΥΡΙΣΜΟΣ: χοροπηδάει με χέρια ψηλά (χωρίς κομφετί)
                        girlWinTime -= dt;
                        girlPet.rotation.x = 0.08;
                        girlPet.rotation.y = -0.25 + Math.sin(t * 0.006) * 0.35;
                        const jump = Math.abs(Math.sin(t * 0.01));
                        core.position.y = jump * 1.1;
                        core.scale.y = 1 + Math.sin(t * 0.01) * 0.06;
                        core.scale.x = 1 - Math.sin(t * 0.01) * 0.04;
                        // χέρια ψηλά, κουνιούνται
                        sockets.handL.rotation.z = 2.6 + Math.sin(t * 0.015) * 0.35;
                        sockets.handR.rotation.z = -2.6 - Math.sin(t * 0.015) * 0.35;
                        // πόδια μαζεμένα στο άλμα
                        sockets.footL.position.y = -0.98 + jump * 0.22;
                        sockets.footR.position.y = -0.98 + jump * 0.22;
                        mouthMesh.scale.set(0.9, 0.8, 0.3);
                        if (girlEyes) girlEyes.scale.set(1, 1, 1);
                        browL.visible = false;
                        browR.visible = false;
                        if (girlWinTime <= 0) {
                            sockets.handL.rotation.z = 0;
                            sockets.handR.rotation.z = 0;
                        }
                    } else if (girlReactionTime > 0) {
                        girlReactionTime -= dt;
                        girlPet.rotation.x = 0.08;
                        core.position.y = 0.15 * Math.abs(Math.sin(t * 0.015));
                        girlPet.rotation.y = -0.25 + Math.sin(t * 0.012) * 0.12;
                        sockets.handL.rotation.z = Math.sin(t * 0.02) * 0.7;
                        sockets.handR.rotation.z = -Math.sin(t * 0.02) * 0.7;
                        mouthMesh.scale.set(0.8, 0.7, 0.3);
                        browL.visible = false;
                        browR.visible = false;
                        if (girlReactionTime <= 0) { sockets.handL.rotation.z = 0; sockets.handR.rotation.z = 0; }
                    } else {
                        const now = performance.now();
                        girlMood = computeMood(now);
                        if (girlMood !== prevMood) { onMoodChange(girlMood); prevMood = girlMood; }

                        if (girlMood === 'angry' || girlMood === 'anxious') {
                            if (petState === 'rest' || petState === 'walk') { petState = 'stand'; petStateTimer = 2; }
                        } else {
                            petStateTimer -= dt;
                            if (petStateTimer <= 0) pickNextState();
                        }

                        if (petState === 'walk') {
                            const dir = Math.sign(wanderTargetX - girlNdcX);
                            if (dir !== 0) faceDir = dir;
                            girlNdcX += dir * 0.11 * dt;
                            if (Math.abs(wanderTargetX - girlNdcX) < 0.02) {
                                petState = 'stand';
                                petStateTimer = 1.5 + Math.random() * 2.5;
                            }
                        }
                        updateGirlScreenPosition();

                        core.position.x = 0;
                        girlPet.rotation.x = 0.08;
                        girlPet.rotation.z += (0 - girlPet.rotation.z) * 0.1;

                        if (petState === 'rest') {
                            girlPet.rotation.y += (-0.15 - girlPet.rotation.y) * 0.06;
                            core.position.y = -0.08 + Math.sin(t * 0.0015) * 0.03;
                            core.scale.y = 1 + Math.sin(t * 0.0015) * 0.03;
                            sockets.handL.rotation.z = 0;
                            sockets.handR.rotation.z = 0;
                            if (girlEyes) girlEyes.scale.set(1, 0.12, 1);
                            if (!isTalking) mouthMesh.scale.set(0.45, 0.2, 0.3);
                            browL.visible = false;
                            browR.visible = false;
                        } else if (petState === 'hop') {
                            girlPet.rotation.y += (-0.25 - girlPet.rotation.y) * 0.1;
                            core.position.y = Math.abs(Math.sin(t * 0.012)) * 0.4;
                            sockets.handL.rotation.z = Math.abs(Math.sin(t * 0.012)) * 0.6;
                            sockets.handR.rotation.z = -Math.abs(Math.sin(t * 0.012)) * 0.6;
                            if (girlEyes) girlEyes.scale.set(1, 1, 1);
                            if (!isTalking) mouthMesh.scale.set(0.8, 0.5, 0.3);
                            browL.visible = false;
                            browR.visible = false;
                        } else if (petState === 'walk') {
                            girlPet.rotation.y += ((faceDir > 0 ? 0.55 : -1.0) - girlPet.rotation.y) * 0.08;
                            core.position.y = Math.abs(Math.sin(t * 0.012)) * 0.1;
                            sockets.footL.position.y = -0.98 + Math.max(0, Math.sin(t * 0.012)) * 0.15;
                            sockets.footR.position.y = -0.98 + Math.max(0, -Math.sin(t * 0.012)) * 0.15;
                            sockets.handL.rotation.z = Math.sin(t * 0.012) * 0.4;
                            sockets.handR.rotation.z = Math.sin(t * 0.012) * 0.4;
                            if (girlEyes) girlEyes.scale.set(1, 1, 1);
                            if (!isTalking) mouthMesh.scale.set(1, 0.35, 0.3);
                            browL.visible = false;
                            browR.visible = false;
                        } else {
                            girlPet.rotation.y += (-0.25 - girlPet.rotation.y) * 0.1;
                            core.scale.y = 1 + Math.sin(t * 0.003) * 0.02;
                            core.position.y = Math.sin(t * 0.002) * 0.06;
                            sockets.handL.rotation.z = Math.sin(t * 0.003) * 0.12;
                            sockets.handR.rotation.z = -Math.sin(t * 0.003) * 0.12;
                            sockets.footL.position.y = -0.98;
                            sockets.footR.position.y = -0.98;

                            const showBrows = girlMood === 'angry';
                            browL.visible = showBrows;
                            browR.visible = showBrows;
                            if (showBrows) { browL.rotation.z = -0.45; browR.rotation.z = 0.45; }

                            if (girlMood === 'angry') {
                                if (girlEyes) girlEyes.scale.set(1, 0.7, 1);
                                if (!isTalking) mouthMesh.scale.set(0.8, 0.12, 0.3);
                            } else if (girlMood === 'anxious') {
                                if (girlEyes) girlEyes.scale.set(1.25, 1.25, 1);
                                if (!isTalking) mouthMesh.scale.set(0.5, 0.55, 0.3);
                                girlPet.position.x += (Math.random() - 0.5) * 0.04;
                                girlPet.position.y += (Math.random() - 0.5) * 0.04;
                            } else if (girlMood === 'bored') {
                                if (girlEyes) girlEyes.scale.set(1, 0.35, 1);
                                girlPet.rotation.z = Math.sin(t * 0.0008) * 0.08;
                                const yawn = Math.max(0, Math.sin(t * 0.0012));
                                if (!isTalking) mouthMesh.scale.set(0.55 + yawn * 0.2, 0.2 + yawn * 0.55, 0.3);
                            } else {
                                if (girlEyes) girlEyes.scale.set(1, 1, 1);
                                if (!isTalking) mouthMesh.scale.set(1, 0.35, 0.3);
                                // ανοιγοκλείσιμο ματιών
                                if (girlEyes && Math.sin(t * 0.0021) > 0.997) girlEyes.scale.set(1, 0.1, 1);
                            }
                        }
                    }

                    if (isTalking && mouthMesh) {
                        mouthMesh.scale.y = 0.25 + Math.abs(Math.sin(t * 0.025)) * 0.5;
                        mouthMesh.scale.x = 0.7 + Math.abs(Math.cos(t * 0.02)) * 0.2;
                    }

                    core.traverse(child => { if (child.userData && child.userData.onUpdate) child.userData.onUpdate(t); });
                }

                if (currentCube && !busy) currentCube.rotation.y = Math.sin(t * 0.002) * 0.12;
                if (renderer) renderer.render(scene, camera);
                requestAnimationFrame(loop);
            }

            // ---- INIT ----
            (function() {
                const keys = ['drop2048-save-pure', 'drop2048-save-v2', 'drop2048-save-v3', 'drop2048-save-v4',
                    'drop2048-v5', 'drop2048-frankly-v1', 'drop2048-frankly-v2', 'drop2048-frankly-v3',
                    'drop2048-frankly-v4', 'drop2048-frankly-v5', 'drop2048-frankly-v6', 'drop2048-frankly-v7'
                ];
                keys.forEach(k => { try { localStorage.removeItem(k); } catch (e) {} });

                document.getElementById('btnShop').onclick = () => { renderShop(); document.getElementById('shopModal').classList.remove('hidden'); };
                document.getElementById('btnCloseShop').onclick = () => { document.getElementById('shopModal').classList.add('hidden'); };

                // Ήχος με την έναρξη: ξεκλείδωμα audio & μουσική στο πρώτο άγγιγμα
                // (τα Safari/Chrome απαιτούν αλληλεπίδραση χρήστη για ήχο)
                const unlockAudio = () => {
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    try { const u = new SpeechSynthesisUtterance(' '); u.volume = 0; speechSynthesis.speak(u); } catch (e) {}
                    startMusic();
                    playMissionSound();
                    announceMission();
                };
                document.addEventListener('pointerdown', unlockAudio, { once: true });
                document.addEventListener('touchstart', unlockAudio, { once: true });

                loadSave();
                coins = save.coins || 5000;
                level = save.level || 0;
                best = save.best || 0;
                score = save.score || 0;

                initThree();
                if (!renderer) return;
                newBoard();
                updateHUD();
                initMic();

                equipPetSlot('pet_hair', save.equippedPetHair);
                equipPetSlot('pet_color', save.equippedPetColor);
                equipPetSlot('pet_head', save.equippedPetHead);
                equipPetSlot('pet_face', save.equippedPetFace);
                equipPetSlot('pet_body', save.equippedPetBody);
                equipPetSlot('pet_props', save.equippedPetProps);
                equipPetSlot('pet_feet', save.equippedPetFeet);

                const cvs = document.getElementById("game");
                cvs.addEventListener("pointermove", (e) => {
                    if (busy || !raycaster) return;
                    pointer.set(e.clientX / innerWidth * 2 - 1, -(e.clientY / innerHeight * 2 - 1));
                    raycaster.setFromCamera(pointer, camera);
                    const hit = new THREE.Vector3();
                    raycaster.ray.intersectPlane(new THREE.Plane(new THREE.Vector3(0, 0, 1).applyQuaternion(boardGroup.quaternion), 0), hit);
                    boardGroup.worldToLocal(hit);
                    setAim(Math.max(0, Math.min(COLS - 1, Math.round((hit.x + BOARD_W / 2 - CELL / 2) / (CELL + GAP)))));
                });
                cvs.addEventListener("pointerdown", onTap);
                document.getElementById("btnNext").onclick = () => {
                    document.getElementById("winModal").classList.add("hidden");
                    level = Math.min(level + 1, LEVELS.length - 1);
                    winShown = false;
                    busy = false;
                    updateHUD();
                    setTimeout(announceMission, 600);
                };
                document.getElementById("btnRetry").onclick = () => {
                    document.getElementById("loseModal").classList.add("hidden");
                    busy = false;
                    winShown = false;
                    newBoard();
                };
            })();
        })();
    </script>
</body>
</html>
