            function computeMood(now) {
                const fill = boardFillRatio();
                if (fill >= 0.8) return 'anxious';
                if (fill >= 0.65) return 'angry';
                if (now - lastActionTime > 15000) return 'bored';
                return 'idle';
            }

            function onMoodChange(mood) {
                if (mood === 'angry') { showSpeech(TT().angry, 2200); angrySFX(); }
                if (mood === 'anxious') { showSpeech(TT().panic, 2200); panicSFX(); }
                if (mood === 'bored') showSpeech(TT().bored, 2200);
            }

            function updateGameState(now) {
                const fill = boardFillRatio();
                if (document.getElementById("loseModal") && !document.getElementById("loseModal").classList.contains("hidden")) {
                    currentGameState = 'gameover';
                } else if (winTime > 0) {
                    currentGameState = 'win';
                } else if (fill >= 0.8) {
                    currentGameState = 'warning';
                } else if (fill >= 0.65) {
                    currentGameState = 'warning';
                } else if (now - lastActionTime > 15000) {
                    currentGameState = 'idle';
                } else {
                    currentGameState = 'normal';
                }
                switch (currentGameState) {
                    case 'idle': sunExpression = 'bored'; break;
                    case 'normal': sunExpression = 'happy'; break;
                    case 'warning': sunExpression = 'panic'; break;
                    case 'gameover': sunExpression = 'sad'; break;
                    case 'win': sunExpression = 'ecstatic'; break;
                }
                if (currentGameState === 'warning' || currentGameState === 'gameover') {
                    setCloudsGreyMode(true);
                    if (!rainActive) spawnRain();
                } else {
                    setCloudsGreyMode(false);
                    if (rainActive) stopRain();
                }
                const ambLight = scene.children.find(function(c) { return c.isAmbientLight; });
                if (ambLight) {
                    if (currentGameState === 'win') ambLight.color.set(0xfff5e6);
                    else if (currentGameState === 'warning' || currentGameState === 'gameover') ambLight.color.set(0xddeeff);
                    else ambLight.color.set(0xfff4e0);
                }
                updateSunTexture(sunExpression);
            }

            let lastT = 0, stepAccum = 0;
            let currentGameState = 'idle';

            function loop(t) {
                const dt = Math.min(0.05, (t - lastT) / 1000);
                lastT = t;
                if (!lastActionTime) lastActionTime = performance.now();
                updateGameState(performance.now());
                stepAnims(dt);
                updateParticles(dt);
                updateClouds(dt);
                updateGrassSway(t);
                updateFlowersSway(t);
                updateRain(dt);
                updateHearts(dt);
                if (sunLaughTimer > 0) sunLaughTimer -= dt;
                if (sunFace) {
                    sunGroup.rotation.z = Math.sin(t * 0.0003) * 0.06;
                    const pulse = 1 + Math.sin(t * 0.0012) * 0.02;
                    sunGroup.scale.set(pulse, pulse, 1);
                }
                if (girl) {
                    const core = girlCore;
                    if (winTime > 0) {
                        winTime -= dt;
                        const hop = Math.abs(Math.sin(t * 0.01));
                        core.position.y = hop * 1.3;
                        core.scale.y = 1 + Math.sin(t * 0.01) * 0.08;
                        core.scale.x = 1 - Math.sin(t * 0.01) * 0.05;
                        girl.rotation.y = -0.2 + Math.sin(t * 0.004) * 0.5;
                        sockets.handL.rotation.z = 2.6 + Math.sin(t * 0.02) * 0.3;
                        sockets.handR.rotation.z = -2.6 - Math.sin(t * 0.02) * 0.3;
                        (hairGroup.userData.tails || []).forEach(function(tail, i) { tail.rotation.z = (i === 0 ? -0.3 : 0.3) + Math.sin(t * 0.012 + i) * 0.35; });
                        mouthMesh.scale.set(0.95, 0.8, 0.35);
                        eyeL.scale.set(1, 0.35, 1);
                        eyeR.scale.set(1, 0.35, 1);
                        if (winTime <= 0) { sockets.handL.rotation.z = 0.35; sockets.handR.rotation.z = -0.35; core.position.y = 0; }
                    } else if (reactionTime > 0) {
                        reactionTime -= dt;
                        core.position.y = 0.15 * Math.abs(Math.sin(t * 0.015));
                        girl.rotation.y = -0.2 + Math.sin(t * 0.01) * 0.12;
                        sockets.handL.rotation.z = 0.35 + Math.sin(t * 0.02) * 0.6;
                        sockets.handR.rotation.z = -0.35 - Math.sin(t * 0.02) * 0.6;
                        mouthMesh.scale.set(0.75, 0.65, 0.35);
                        eyeL.scale.set(1.1, 1.1, 1.1);
                        eyeR.scale.set(1.1, 1.1, 1.1);
                        browL.visible = false;
                        browR.visible = false;
                    } else {
                        const now = performance.now();
                        girlMood = computeMood(now);
                        if (girlMood !== prevMood) { onMoodChange(girlMood); prevMood = girlMood; }
                        if (petState === 'think') {
                            core.position.y = 0;
                            girl.rotation.y += (-0.2 - girl.rotation.y) * 0.05;
                            sockets.handR.rotation.z = -2.0;
                            sockets.handR.rotation.x = 1.2;
                            sockets.handL.rotation.z = 0.35;
                            girlNdcX += (-0.15 - girlNdcX) * 0.05;
                        } else {
                            if (girlMood === 'angry' || girlMood === 'anxious') { if (petState === 'walk') { petState = 'stand'; petStateTimer = 2; } }
                            else { petStateTimer -= dt; if (petStateTimer <= 0) pickNextState(); }
                            if (petState === 'walk') {
                                const dir = Math.sign(wanderTargetX - girlNdcX);
                                if (dir !== 0) faceDir = dir;
                                girlNdcX += dir * 0.11 * dt;
                                stepAccum += dt;
                                if (stepAccum > 0.36) { stepAccum = 0; stepSFX(); }
                                if (Math.abs(wanderTargetX - girlNdcX) < 0.02) { petState = 'stand'; petStateTimer = 1.5 + Math.random() * 2.5; }
                            }
                            updateGirlScreenPosition();
                            core.position.x = 0;
                            girl.rotation.x = 0.12;
                            if (petState === 'hop') {
                                girl.rotation.y += (-0.2 - girl.rotation.y) * 0.1;
                                core.position.y = Math.abs(Math.sin(t * 0.012)) * 0.5;
                                sockets.handL.rotation.z = 0.35 + Math.abs(Math.sin(t * 0.012)) * 0.9;
                                sockets.handR.rotation.z = -0.35 - Math.abs(Math.sin(t * 0.012)) * 0.9;
                                (hairGroup.userData.tails || []).forEach(function(tail, i) { tail.rotation.z = (i === 0 ? -0.3 : 0.3) + Math.sin(t * 0.012 + i) * 0.3; });
                                eyeL.scale.set(1, 1, 1); eyeR.scale.set(1, 1, 1);
                                if (!isTalking) mouthMesh.scale.set(0.8, 0.5, 0.35);
                                browL.visible = false; browR.visible = false;
                            } else if (petState === 'walk') {
                                girl.rotation.y += ((faceDir > 0 ? 0.65 : -0.9) - girl.rotation.y) * 0.08;
                                core.position.y = Math.abs(Math.sin(t * 0.012)) * 0.09;
                                sockets.footL.rotation.x = Math.sin(t * 0.012) * 0.6;
                                sockets.footR.rotation.x = -Math.sin(t * 0.012) * 0.6;
                                sockets.handL.rotation.x = -Math.sin(t * 0.012) * 0.5;
                                sockets.handR.rotation.x = Math.sin(t * 0.012) * 0.5;
                                (hairGroup.userData.tails || []).forEach(function(tail, i) { tail.rotation.x = Math.sin(t * 0.012 + i * 0.8) * 0.18; });
                                eyeL.scale.set(1, 1, 1); eyeR.scale.set(1, 1, 1);
                                if (!isTalking) mouthMesh.scale.set(1, 0.3, 0.3);
                                browL.visible = false; browR.visible = false;
                            } else {
                                girl.rotation.y += (-0.2 - girl.rotation.y) * 0.1;
                                core.scale.y = 1 + Math.sin(t * 0.004) * 0.02;
                                core.position.y = Math.sin(t * 0.002) * 0.06;
                                sockets.footL.rotation.x += (0 - sockets.footL.rotation.x) * 0.1;
                                sockets.footR.rotation.x += (0 - sockets.footR.rotation.x) * 0.1;
                                sockets.handL.rotation.x = 0;
                                sockets.handR.rotation.x = 0;
                                sockets.handL.rotation.z = 0.35 + Math.sin(t * 0.003) * 0.08;
                                sockets.handR.rotation.z = -0.35 - Math.cos(t * 0.003) * 0.08;
                                (hairGroup.userData.tails || []).forEach(function(tail, i) { tail.rotation.x = Math.sin(t * 0.0025 + i * 1.5) * 0.08; });
                                const showBrows = girlMood === 'angry';
                                browL.visible = showBrows; browR.visible = showBrows;
                                if (showBrows) { browL.rotation.z = -0.4; browR.rotation.z = 0.4; }
                                if (girlMood === 'angry') { eyeL.scale.set(1, 0.7, 1); eyeR.scale.set(1, 0.7, 1); if (!isTalking) mouthMesh.scale.set(0.8, 0.12, 0.3); }
                                else if (girlMood === 'anxious') { eyeL.scale.set(1.3, 1.3, 1.3); eyeR.scale.set(1.3, 1.3, 1.3); if (!isTalking) mouthMesh.scale.set(0.5, 0.55, 0.35); girl.position.x += (Math.random() - 0.5) * 0.05; girl.position.y += (Math.random() - 0.5) * 0.05; }
                                else if (girlMood === 'bored') { eyeL.scale.set(1, 0.35, 1); eyeR.scale.set(1, 0.35, 1); girl.rotation.z = Math.sin(t * 0.0008) * 0.1; const yawn = Math.max(0, Math.sin(t * 0.0012)); if (!isTalking) mouthMesh.scale.set(0.55 + yawn * 0.2, 0.2 + yawn * 0.55, 0.35); }
                                else { girl.rotation.z += (0 - girl.rotation.z) * 0.1; eyeL.scale.set(1, 1, 1); eyeR.scale.set(1, 1, 1); const blink = Math.sin(t * 0.0035); if (blink > 0.985) { eyeL.scale.y = 0.1; eyeR.scale.y = 0.1; } if (!isTalking) mouthMesh.scale.set(1, 0.3, 0.3); }
                            }
                        }
                    }
                    if (isTalking && mouthMesh) {
                        mouthMesh.scale.y = 0.25 + Math.abs(Math.sin(t * 0.025)) * 0.55;
                        mouthMesh.scale.x = 0.7 + Math.abs(Math.cos(t * 0.02)) * 0.2;
                    }
                    girlCore.traverse(function(child) { if (child.userData && child.userData.onUpdate) child.userData.onUpdate(t); });
                }
                if (currentCube && !busy) currentCube.rotation.y = Math.sin(t * 0.002) * 0.12;
                if (renderer) renderer.render(scene, camera);
                requestAnimationFrame(loop);
            }

            (function() {
                try {
                    const keys = ['drop2048-save-pure', 'drop2048-save-v2', 'drop2048-save-v3', 'drop2048-save-v4', 'drop2048-v5', 'drop2048-frankly-v1', 'drop2048-frankly-v2', 'drop2048-frankly-v3', 'drop2048-frankly-v4', 'drop2048-frankly-v5', 'drop2048-frankly-v6', 'drop2048-frankly-v7', 'drop2048-frankly-v8', 'drop2048-frankly-v9', 'drop2048-frankly-v10'];
                    keys.forEach(function(k) { localStorage.removeItem(k); });
                } catch (e) {}

                const shopRollup = document.getElementById('shopRollup');
                const shopPanel = document.getElementById('shopPanel');
                const helpRollup = document.getElementById('helpRollup');
                const helpPanel = document.getElementById('helpPanel');

                shopRollup.onclick = function(e) {

                };

                helpRollup.onclick = function(e) {
                    e.stopPropagation();
                    helpPanelOpen = !helpPanelOpen;
                    if (helpPanelOpen) { helpPanel.classList.add('open'); helpRollup.classList.add('open'); }
                    else { helpPanel.classList.remove('open'); helpRollup.classList.remove('open'); }
                    if (shopPanelOpen) { shopPanelOpen = false; shopPanel.classList.remove('open'); shopRollup.style.opacity = '1'; shopRollup.style.pointerEvents = 'auto'; }
                };

                document.getElementById('game').addEventListener('pointerdown', function(e) {
                    if (shopPanelOpen) { shopPanelOpen = false; shopPanel.classList.remove('open'); shopRollup.style.opacity = '1'; shopRollup.style.pointerEvents = 'auto'; }
                    if (helpPanelOpen) { helpPanelOpen = false; helpPanel.classList.remove('open'); helpRollup.classList.remove('open'); }
                });

                document.getElementById('btnShop').onclick = function() {
                    renderShop();
                    document.getElementById('shopModal').classList.remove('hidden');
                    if (shopPanelOpen) { shopPanelOpen = false; shopPanel.classList.remove('open'); shopRollup.style.opacity = '1'; shopRollup.style.pointerEvents = 'auto'; }
                };
                document.getElementById('btnCloseShop').onclick = function() { document.getElementById('shopModal').classList.add('hidden'); };
                document.getElementById('btnSound').onclick = function() {
                    muted = !muted; save.muted = muted; persist(); updateSoundBtn();
                    if (muted) { try { speechSynthesis.cancel(); } catch (e) {} isTalking = false; }
                    toast(muted ? TT().muted : TT().unmuted);
                };
                document.getElementById('btnLang').onclick = function() { lang = lang === 'en' ? 'el' : 'en'; save.lang = lang; persist(); applyLang(); };

                let firstInteraction = false;
                document.addEventListener('pointerdown', function() {
                    if (firstInteraction) return;
                    firstInteraction = true;
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    try { const u = new SpeechSynthesisUtterance(' '); u.volume = 0; speechSynthesis.speak(u); } catch (e) {}
                    startMusic();
                    announceMission(400);
                });
                if (!window.PointerEvent) {
                    document.addEventListener('touchstart', function() {
                        if (firstInteraction) return;
                        firstInteraction = true;
                        if (audioCtx.state === 'suspended') audioCtx.resume();
                        startMusic();
                        announceMission(400);
                    }, { passive: true });
                }

                loadSave();
                coins = save.coins || 1000;
                level = save.level || 0;
                best = save.best || 0;
                score = save.score || 0;
                lang = save.lang || 'en';
                muted = !!save.muted;

                initThree();
                if (!renderer) return;
                newBoard();
                updateHUD();
                applyLang();
                updateSoundBtn();
                initMic();
                buildHair(save.equippedHair || 'hair_pigtails');
                equipClothes(save.equippedClothes || 'cl_none');
                equipShoes(save.equippedShoes || 'shoe_wood');
                equipProp(save.equippedProps || 'prop_none');

                const cvs = document.getElementById("game");
                cvs.addEventListener("pointermove", function(e) {
                    if (busy || !currentCube) return;
                    const cx = (e.touches && e.touches[0]) ? e.touches[0].clientX : e.clientX;
                    const col = Math.floor(cx / innerWidth * COLS);
                    setAim(col);
                });
                cvs.addEventListener("pointerdown", onTap);
                if (!window.PointerEvent) { cvs.addEventListener("touchstart", onTap, { passive: true }); }

                document.getElementById("btnNext").onclick = function() {
                    document.getElementById("winModal").classList.add("hidden");
                    level = level + 1;
                    winShown = false;
                    busy = false;
                    updateHUD();
                    announceMission(300);
                };
                document.getElementById("btnRetry").onclick = function() {
                    document.getElementById("loseModal").classList.add("hidden");
                    busy = false;
                    newBoard();
                    winShown = false;
                    announceMission(300);
                };
            })();
        })();
    </script>
</body>
</html>
