<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Drop 2048 · FranklyGames Edition</title>
    <style>
        :root {
            --bg: #87CEEB;
            --panel: #8C6A4F;
            --panel-deep: #4A3423;
            --cream: #F7EFDC;
            --ink: #2F1B0D;
            --accent: #F2A03D;
            --good: #7FA653;
            --coin: #F5C542;
            --red: #C2542F;
            --blue: #4A7DBF;
            --hud-height: 85px; 
            --helper-size: 80px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: "Baloo 2", system-ui, sans-serif;
            color: var(--ink);
            user-select: none;
            touch-action: none;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        #game {
            position: fixed;
            inset: 0;
            display: block;
            z-index: 0;
        }

        /* ===== HUD (TOP) ===== */
        .hud {
            position: fixed;
            left: 0; right: 0; top: 0;
            padding: 12px 18px 12px;
            display: flex; gap: 12px; align-items: center;
            pointer-events: none; z-index: 5;
            background: rgba(11, 12, 16, 0.92);
            backdrop-filter: blur(8px);
            border-bottom: 3px solid rgba(255, 255, 255, 0.10);
            height: var(--hud-height);
        }
        .chip {
            background: var(--panel-deep);
            color: var(--cream); border-radius: 24px;
            padding: 8px 16px; font-weight: 800; font-size: 20px;
            box-shadow: 0 4px 0 rgba(0, 0, 0, .4);
            display: flex; align-items: center; gap: 6px;
            pointer-events: auto; line-height: 1.2; white-space: nowrap;
        }
        .chip small { font-size: 12px; display: block; opacity: .8; }
        .chip .big { font-size: 24px; line-height: 1.1; }
        .spacer { flex: 1; }
        
        .hud-btn {
            border: none; cursor: pointer; color: #fff;
            border-radius: 20px; padding: 12px 24px; font-weight: 800;
            font-size: 20px; box-shadow: 0 6px 0 #b8742a;
            pointer-events: auto; transition: transform 0.08s, box-shadow 0.08s;
            font-family: inherit; display: flex; align-items: center; gap: 6px;
            line-height: 1.3; transform: perspective(400px) rotateX(8deg);
        }
        .hud-btn:active {
            transform: perspective(400px) rotateX(8deg) translateY(5px); box-shadow: 0 1px 0 #b8742a;
        }
        .hud-btn.mute-btn {
            background: linear-gradient(145deg, #5d5d5d, #2a2a2a); box-shadow: 0 6px 0 #111; font-size: 24px; padding: 8px 16px;
        }
        .hud-btn.shop-btn {
            background: linear-gradient(145deg, #5a92d9, #2d5a7a); box-shadow: 0 6px 0 #1a3a50;
            border: 1px solid rgba(255,255,255,0.15); font-size: 22px; padding: 10px 28px; border-radius: 24px; letter-spacing: 0.5px;
        }

        /* ===== HELPERS RIGHT (ROLL UP VERTICAL) ===== */
        #rightBar {
            position: fixed;
            right: 15px; top: calc(var(--hud-height) + 15px);
            display: flex; flex-direction: column; gap: 14px;
            z-index: 6; pointer-events: none;
            animation: slideIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transform: translateX(120px);
        }
        @keyframes slideIn {
            to { transform: translateX(0); }
        }
        .helper-btn {
            pointer-events: auto; border: none; cursor: pointer;
            width: var(--helper-size); height: var(--helper-size);
            border-radius: 20px;
            background: linear-gradient(145deg, #fcb045, #d1771a);
            box-shadow: 0 10px 0 #b46a22, 0 6px 16px rgba(0,0,0,0.4);
            color: #fff; font-size: 36px;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.08s, box-shadow 0.08s;
            transform: perspective(300px) rotateY(-12deg) rotateX(8deg);
        }
        .helper-btn:active {
            transform: perspective(300px) rotateY(-12deg) rotateX(8deg) translateY(8px);
            box-shadow: 0 2px 0 #b46a22, 0 6px 16px rgba(0,0,0,0.4);
        }
        .helper-btn .label {
            font-size: 11px; font-weight: 800; position: absolute;
            bottom: -28px; color: #fff; text-shadow: 0 3px 6px rgba(0, 0, 0, 0.8);
            white-space: nowrap; background: rgba(0, 0, 0, 0.5); padding: 2px 8px; border-radius: 10px;
        }
        .helper-btn-wrap { position: relative; display: flex; justify-content: center; align-items: center; }

        /* ===== TOAST ===== */
        #toast {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            z-index: 15; pointer-events: none; background: var(--panel-deep);
            color: var(--cream); font-weight: 700; font-size: 20px; border-radius: 20px;
            padding: 16px 32px; opacity: 0; transition: opacity .25s;
            max-width: 90vw; text-align: center; box-shadow: 0 8px 24px rgba(0, 0, 0, .6);
        }

        /* ===== SPEECH BUBBLE ===== */
        #speech {
            position: fixed; z-index: 10; pointer-events: none; font-weight: 800;
            font-size: 26px; background: #ffffff; color: #333; padding: 14px 28px;
            border-radius: 30px; border: 5px solid var(--panel-deep);
            box-shadow: 0 6px 0 var(--panel-deep); transform: translate(-50%, -120%);
            opacity: 0; transition: opacity 0.2s ease-in-out, transform 0.2s ease-in-out;
            max-width: 80vw; white-space: normal; text-align: center;
        }
        #speech.visible { opacity: 1; transform: translate(-50%, -150%); }
        #speech::after {
            content: ""; position: absolute; top: 100%; left: 50%; margin-left: -16px;
            border-width: 18px; border-style: solid;
            border-color: #ffffff transparent transparent transparent;
            filter: drop-shadow(0 6px 0 var(--panel-deep));
        }

        /* ===== SHOP (IMPROVED DESIGN) ===== */
        .overlay {
            position: fixed; inset: 0; background: rgba(11, 12, 16, .94);
            display: flex; align-items: center; justify-content: center;
            z-index: 20; backdrop-filter: blur(8px); padding: 0;
        }
        .card {
            background: var(--cream); width: 100%; height: 100%; max-width: 100%;
            max-height: 100%; padding: 20px 16px; text-align: center;
            box-shadow: none; animation: pop .25s cubic-bezier(.34, 1.56, .64, 1);
            display: flex; flex-direction: column; overflow: hidden;
        }
        @keyframes pop { from { transform: scale(.7); opacity: 0; } }
        .card h2 { font-size: 28px; margin-bottom: 10px; font-weight: 800; flex-shrink: 0; }
        
        .shop-tabs {
            display: flex; gap: 10px; margin-bottom: 12px;
            border-bottom: 2px solid rgba(0, 0, 0, 0.10); padding-bottom: 10px;
            overflow-x: auto; flex-shrink: 0; flex-wrap: nowrap;
        }
        .shop-tab {
            flex: 0 0 auto; padding: 10px 16px; font-weight: 800; font-size: 15px;
            border-radius: 14px; background: #E4D7BC; color: #8C6A4F;
            border: none; cursor: pointer; white-space: nowrap; transition: .1s;
        }
        .shop-tab.active { background: var(--accent); color: #fff; box-shadow: 0 4px 0 #b8742a; transform: translateY(-2px); }
        
        .shop-sub-tabs {
            display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; justify-content: center;
        }
        .shop-sub-tab {
            padding: 4px 10px; border-radius: 12px; background: #E4D7BC;
            font-size: 13px; font-weight: 700; border: none; cursor: pointer; color: #8C6A4F;
        }
        .shop-sub-tab.active { background: var(--blue); color: white; box-shadow: 0 2px 0 #2d5a7a; }

        .shop-items {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 ΣΤΗ ΣΕΙΡΑ */
            gap: 10px; overflow-y: auto; padding-right: 4px; flex: 1; min-height: 0;
            padding-bottom: 8px;
        }
        .shop-items::-webkit-scrollbar { width: 4px; }
        .shop-items::-webkit-scrollbar-thumb { background: var(--panel-deep); border-radius: 6px; }
        
        .shop-item {
            background: #fff; border: 3px solid #E4D7BC; border-radius: 16px;
            padding: 8px 4px; cursor: pointer; transition: transform 0.1s, border 0.1s, box-shadow 0.1s;
            text-align: center; box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
        }
        .shop-item:active { transform: scale(0.95); }
        .shop-item h3 { font-size: 13px; margin-bottom: 2px; color: var(--ink); line-height: 1.1; }
        .shop-item .price { font-weight: 800; color: #b8742a; font-size: 12px; }
        .shop-item.owned .price { color: var(--good); }
        .shop-item.equipped {
            border-color: var(--accent); background: #FFF5E1;
            box-shadow: 0 0 15px rgba(242, 160, 61, 0.5); transform: scale(1.02);
        }
        .shop-item .icon { font-size: 28px; line-height: 1; margin-bottom: 2px; }
        
        .btn {
            border: none; cursor: pointer; font-family: inherit; font-weight: 800;
            font-size: 22px; color: #fff; background: var(--accent); border-radius: 20px;
            padding: 14px 24px; box-shadow: 0 5px 0 #b8742a; transition: transform .08s;
            margin-top: 12px; width: 100%; flex-shrink: 0;
            transform: perspective(400px) rotateX(6deg);
        }
        .btn:active { transform: perspective(400px) rotateX(6deg) translateY(4px); box-shadow: 0 2px 0 #b8742a; }

        .hidden { display: none !important; }

        /* ===== WIN / LOSE MODALS ===== */
        .win-lose-overlay { z-index: 25; }
        .win-lose-overlay .card {
            border-radius: 36px; width: min(480px, 92vw); height: auto;
            max-height: 90vh; padding: 30px 24px; box-shadow: 0 16px 0 rgba(0, 0, 0, .5);
            border: 6px solid var(--panel-deep);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 550px) {
            :root { --hud-height: 75px; --helper-size: 66px; }
            .hud { padding: 6px 8px; gap: 6px; }
            .chip { font-size: 14px; padding: 4px 10px; border-radius: 14px; }
            .chip .big { font-size: 18px; }
            .hud-btn { font-size: 14px; padding: 6px 12px; }
            .hud-btn.shop-btn { font-size: 16px; padding: 6px 12px; }
            #rightBar { right: 8px; top: calc(var(--hud-height) + 10px); gap: 10px; }
            .helper-btn { width: var(--helper-size); height: var(--helper-size); font-size: 30px; border-radius: 16px; }
            .helper-btn .label { font-size: 9px; bottom: -22px; }
            #toast { font-size: 16px; padding: 12px 20px; bottom: 80px; }
            .shop-items { gap: 6px; }
            .shop-item { padding: 6px 2px; }
            .shop-item .icon { font-size: 22px; }
            .shop-item h3 { font-size: 11px; }
        }
        @media (max-width: 380px) {
            :root { --hud-height: 65px; --helper-size: 56px; }
            .chip { font-size: 12px; padding: 4px 8px; }
            .chip .big { font-size: 15px; }
            .hud-btn { font-size: 12px; padding: 4px 8px; }
            .helper-btn { font-size: 24px; border-radius: 12px; }
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>

    <!-- ===== HUD (TOP) ===== -->
    <div class="hud">
        <div class="chip"><div><small>ΕΠΙΠΕΔΟ</small><span class="big" id="hudLevel">1</span></div></div>
        <div class="chip"><div><small>ΣΚΟΡ</small><span class="big" id="hudScore">0</span></div></div>
        <div class="chip">🪙 <span class="big" id="hudCoins">0</span></div>
        <div class="spacer"></div>
        <button class="hud-btn mute-btn" id="btnToggleAudio">🔊</button>
        <button class="hud-btn shop-btn" id="btnShop">🛒 Κατάστημα</button>
    </div>

    <!-- ===== HELPERS (RIGHT SIDE VERTICAL) ===== -->
    <div id="rightBar">
        <div class="helper-btn-wrap">
            <button class="helper-btn" id="btnMagnet">🧲<span class="label">Μαγνήτης</span></button>
        </div>
        <div class="helper-btn-wrap">
            <button class="helper-btn" id="btnHammer">🔨<span class="label">Σφυρί</span></button>
        </div>
        <div class="helper-btn-wrap">
            <button class="helper-btn" id="btnChange">🎲<span class="label">Αλλαγή</span></button>
        </div>
    </div>

    <!-- ===== SPEECH BUBBLE ===== -->
    <div id="speech"><span id="speechText">Γεια σας!</span></div>
    <div id="toast"></div>

    <!-- ===== SHOP MODAL ===== -->
    <div class="overlay hidden" id="shopModal">
        <div class="card">
            <h2 style="margin-bottom:6px;">🛍️ Εξατομίκευση</h2>
            <div class="shop-tabs" id="mainTabs">
                <button class="shop-tab active" data-maintab="cubes">Κύβοι</button>
                <button class="shop-tab" data-maintab="boards">Ταμπλό</button>
                <button class="shop-tab" data-maintab="effects">Εφέ</button>
                <button class="shop-tab" data-maintab="sounds">Ήχοι</button>
                <button class="shop-tab" data-maintab="pets">Pet</button>
            </div>
            <div id="shopSubTabsContainer" class="hidden"></div>
            <div class="shop-items" id="shopContainer"></div>
            <button class="btn" id="btnCloseShop">Κλείσιμο</button>
        </div>
    </div>

    <!-- ===== WIN / LOSE MODALS ===== -->
    <div class="overlay hidden win-lose-overlay" id="winModal">
        <div class="card"><div style="font-size:56px; margin-bottom:6px;">🎉</div><h2>Επίπεδο Ολοκληρώθηκε!</h2><p id="winText"></p><button class="btn" id="btnNext">Συνέχεια ➜</button></div>
    </div>
    <div class="overlay hidden win-lose-overlay" id="loseModal">
        <div class="card"><div style="font-size:56px; margin-bottom:6px;">😵</div><h2>Γέμισε το ταμπλό!</h2><p id="loseText"></p><button class="btn" id="btnRetry">Ξαναπροσπάθησε</button></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ============================================================
        //  DROP 2048 – FranklyGames Edition (FULL REVAMP)
        // ============================================================
        (function() {
            'use strict';

            // ---------- CONSTANTS ----------
            const COLS = 5, ROWS = 6, CELL = 1.0, GAP = 0.12;
            const BOARD_W = COLS * (CELL + GAP) - GAP;
            const BOARD_H = ROWS * (CELL + GAP) - GAP;
            const launchY = -BOARD_H / 2 - 0.6;

            function getLevelTarget(level) { return 64 * Math.pow(2, level); }
            function getLevelPreset(level) { return Math.min(level * 2 + 2, 18); }
            function getLevelText(level) { return "Φτιάξε κύβο " + getLevelTarget(level); }

            // ---------- SHOP DATA ----------
            const SHOP = {
                cubes: [
                    { id: 'wood', name: 'Ξύλο', price: 0, icon: '🪵' },
                    { id: 'whitered', name: 'Άσπρο-Κόκκινο', price: 0, icon: '🍬' },
                    { id: 'whitegreen', name: 'Άσπρο-Πράσινο', price: 0, icon: '🍵' },
                    { id: 'zebra', name: 'Ζέβρα', price: 0, icon: '🦓' },
                    { id: 'neon', name: 'Cyber Neon', price: 0, icon: '⚡' },
                    { id: 'rainbow', name: 'Ουράνιο Τόξο', price: 0, icon: '🌈' },
                    { id: 'gold', name: 'Καθαρός Χρυσός', price: 0, icon: '🏆' },
                    { id: 'galaxy', name: 'Γαλαξίας', price: 0, icon: '🌌' },
                    { id: 'ice', name: 'Παγωμένος', price: 0, icon: '🧊' },
                    { id: 'lava', name: 'Λάβα', price: 0, icon: '🌋' }
                ],
                boards: [
                    { id: 'board_wood', name: 'Ξύλινο', price: 0, icon: '🟫', back: '#4A3423', cell: '#2F1B0D' },
                    { id: 'board_space', name: 'Βαθύ Διάστημα', price: 0, icon: '🟦', back: '#0B132B', cell: '#4A5A8A' },
                    { id: 'board_crimson', name: 'Πορφυρό', price: 0, icon: '🟥', back: '#3A0CA3', cell: '#A47CFF' },
                    { id: 'board_emerald', name: 'Σμαράγδι', price: 0, icon: '🟩', back: '#004B23', cell: '#7BDF4B' },
                    { id: 'board_neon', name: 'Νέον Σκοτάδι', price: 0, icon: '🟪', back: '#0A0A0A', cell: '#FF00FF' }
                ],
                effects: [
                    { id: 'eff_none', name: 'Χωρίς Εφέ', price: 0, icon: '✖️' },
                    { id: 'eff_flame', name: 'Φλόγα', price: 0, icon: '🔥' },
                    { id: 'eff_sparkle', name: 'Αστερόσκονη', price: 0, icon: '✨' },
                    { id: 'eff_smoke', name: 'Καπνός', price: 0, icon: '💨' },
                    { id: 'eff_explode', name: 'Έκρηξη', price: 0, icon: '💥' }
                ],
                sounds: [
                    { id: 'snd_default', name: 'Default', price: 0, icon: '🔊' },
                    { id: 'snd_bass', name: 'Bass Drop', price: 0, icon: '🎛️' },
                    { id: 'snd_bell', name: 'Καμπάνα', price: 0, icon: '🔔' },
                    { id: 'snd_echo', name: 'Echo', price: 0, icon: '🌌' }
                ],
                // PET SHOP: 5 CATEGORIES x 10 ITEMS
                petItems: {
                    hats: {
                        label: 'Καπέλα',
                        items: Array.from({ length: 10 }, (_, i) => ({ 
                            id: `hat_${i}`, name: `Καπέλο #${i+1}`, price: i*20, color: i*0.1 
                        }))
                    },
                    hair: {
                        label: 'Μαλλιά', // Overrides base hair
                        items: Array.from({ length: 10 }, (_, i) => ({ 
                            id: `hair_${i}`, name: `Μαλλιά #${i+1}`, price: i*30, color: i*0.1 
                        }))
                    },
                    tops: {
                        label: 'Μπλούζες',
                        items: Array.from({ length: 10 }, (_, i) => ({ 
                            id: `top_${i}`, name: `Μπλούζα #${i+1}`, price: i*30, color: i*0.1 
                        }))
                    },
                    bottoms: {
                        label: 'Παντελόνια',
                        items: Array.from({ length: 10 }, (_, i) => ({ 
                            id: `bot_${i}`, name: `Παντελόνι #${i+1}`, price: i*30, color: i*0.1 
                        }))
                    },
                    accessories: {
                        label: 'Αξεσουάρ',
                        items: Array.from({ length: 10 }, (_, i) => ({ 
                            id: `acc_${i}`, name: `Αξεσουάρ #${i+1}`, price: i*20, color: i*0.1 
                        }))
                    }
                }
            };

            // ---------- SAVE ----------
            const DEFAULT_SAVE = {
                coins: 5000, level: 0, best: 0, score: 0,
                ownedCubes: ['wood'], equippedCube: 'wood',
                ownedBoards: ['board_wood'], equippedBoard: 'board_wood',
                ownedEffects: ['eff_none'], equippedEffect: 'eff_none',
                ownedSounds: ['snd_default'], equippedSound: 'snd_default',
                ownedPets: [], equippedPet: { hats: 'hat_0', hair: 'hair_0', tops: 'top_0', bottoms: 'bot_0', accessories: 'acc_0' }
            };
            // Create defaults for pet items
            Object.keys(SHOP.petItems).forEach(cat => {
                DEFAULT_SAVE.ownedPets.push(SHOP.petItems[cat].items[0].id);
                DEFAULT_SAVE.equippedPet[cat] = SHOP.petItems[cat].items[0].id;
            });

            let save = { ...DEFAULT_SAVE };
            function loadSave() { try { const r = localStorage.getItem("drop2048-v12"); if (r) { const parsed = JSON.parse(r); save = Object.assign({}, DEFAULT_SAVE, parsed); } } catch (e) {} }
            function persist() { try { localStorage.setItem("drop2048-v12", JSON.stringify(save)); } catch (e) {} }

            let coins = 0, level = 0, score = 0, best = 0, soundEnabled = true;

            // ---------- AUDIO ----------
            const audioCtx = new(window.AudioContext || window.webkitAudioContext)();
            function playSound(type) {
                if (!soundEnabled) return;
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const s = save.equippedSound || 'snd_default';
                const now = audioCtx.currentTime;
                function tone(freq, dur, wave, vol, delay, glideTo) {
                    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination);
                    o.type = wave; const t0 = now + (delay || 0);
                    o.frequency.setValueAtTime(freq, t0); if (glideTo) o.frequency.exponentialRampToValueAtTime(glideTo, t0 + dur);
                    g.gain.setValueAtTime(vol || 0.15, t0); g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
                    o.start(t0); o.stop(t0 + dur + 0.05);
                }
                if (s === 'snd_default') {
                    if (type === 'drop') tone(800, 0.12, 'sine', 0.20);
                    else if (type === 'merge') { tone(400, 0.08, 'sine', 0.25); setTimeout(() => tone(800, 0.08, 'sine', 0.25), 60); } else tone(300, 0.25, 'sine', 0.3);
                } else if (s === 'snd_bass') {
                    if (type === 'drop') tone(120, 0.2, 'sawtooth', 0.35);
                    else if (type === 'merge') { tone(80, 0.15, 'sawtooth', 0.4); setTimeout(() => tone(160, 0.15, 'sawtooth', 0.3), 70); } else { tone(90, 0.3, 'sawtooth', 0.3); tone(180, 0.25, 'sine', 0.15, 0.05); }
                } else if (s === 'snd_bell') {
                    if (type === 'drop') { tone(880, 0.3, 'sine', 0.15); tone(1760, 0.25, 'sine', 0.08, 0.05); } else if (type === 'merge') { tone(1047, 0.4, 'sine', 0.2); tone(2093, 0.3, 'sine', 0.12, 0.08); tone(1568, 0.35, 'sine', 0.1, 0.1); } else { tone(784, 0.5, 'sine', 0.15); tone(1568, 0.4, 'sine', 0.08, 0.1); }
                } else if (s === 'snd_echo') {
                    const f = type === 'drop' ? 600 : 900; for (let i = 0; i < 3; i++) tone(f, 0.12, 'sine', 0.22 / (i + 1), i * 0.12, f * 0.8);
                }
            }
            // Custom Hammer sound
            function playHammerSound() {
                if (!soundEnabled) return;
                if (audioCtx.state === 'suspended') audioCtx.resume();

                backMesh = new THREE.Mesh(new THREE.BoxGeometry(BOARD_W + 0.7, BOARD_H + 0.7, 0.3), new THREE.MeshLambertMaterial());
                backMesh.position.z = -0.65; boardGroup.add(backMesh);
                cellMat = new THREE.MeshLambertMaterial();
                const cellGeo = new THREE.BoxGeometry(CELL * 0.96, CELL * 0.96, 0.12);
                for (let c = 0; c < COLS; c++) for (let r = 0; r < ROWS; r++) {
                    const m = new THREE.Mesh(cellGeo, cellMat); const p = cellPos(c, r);
                    m.position.set(p.x, p.y, -0.42); boardGroup.add(m);
                }
                updateBoardColorsLive();

                aziramPet = createAziram(); scene.add(aziramPet); updateAziramScreenPosition();

            }

            function updateBoardColorsLive() {
                const bData = SHOP.boards.find(b => b.id === save.equippedBoard) || SHOP.boards[0];
                backMesh.material.color.set(bData.back); cellMat.color.set(bData.cell);

            function onResize() {
                renderer.setSize(innerWidth, innerHeight); camera.aspect = innerWidth / innerHeight;
                const dist = (BOARD_H / 2 + 2.5) / Math.tan(THREE.MathUtils.degToRad(camera.fov / 2));

                camera.lookAt(0, -2.5, 0);

            }

            function cellPos(c, r) {
                return { x: -BOARD_W / 2 + CELL / 2 + c * (CELL + GAP), y: BOARD_H / 2 - CELL / 2 - r * (CELL + GAP) };
            }

            function newBoard() {
                if (currentCube) { boardGroup.remove(currentCube); currentCube = null; }
                for (let c = 0; c < COLS; c++) for (let r = 0; r < ROWS; r++) { if (grid[c] && grid[c][r]) { boardGroup.remove(grid[c][r].mesh); disposeMaterial(grid[c][r].mesh); } }
                grid = Array.from({ length: COLS }, () => Array(ROWS).fill(null));
                score = save.score || 0; updateHUD();
                const preset = getLevelPreset(level);
                for (let i = 0; i < preset; i++) {
                    const c = Math.floor(Math.random() * COLS);

                setTimeout(() => showSpeech("🎯 Αποστολή: " + mission + "!", 3500), 500);

            function disposeMaterial(mesh) { if (mesh.material) { if (mesh.material.map) mesh.material.map = null; mesh.material.dispose(); } }
            function colHeight(c) { let h = 0; while (h < ROWS && grid[c][h]) h++; return h; }
            function placeCube(c, r, value, instant) {
                const cube = makeCube(value); const p = cellPos(c, r);
                cube.position.set(p.x, p.y, 0.1); boardGroup.add(cube);
                grid[c][r] = { value, mesh: cube };
                if (!instant) { cube.scale.set(.4, .4, .4); tween(cube.scale, { x: 1, y: 1, z: 1 }, 0.22); }
                return grid[c][r];
            }

            function spawnCurrent() {
                let maxOnBoard = 4;
                for (let c = 0; c < COLS; c++) for (let r = 0; r < ROWS; r++) if (grid[c][r]) maxOnBoard = Math.max(maxOnBoard, grid[c][r].value);
                const pool = []; for (let v = 2; v <= Math.min(32, Math.max(4, maxOnBoard / 2)); v *= 2) pool.push(v, v, v === 2 ? v : 0);
                const vals = pool.filter(Boolean);
                currentCube = makeCube(vals[Math.floor(Math.random() * vals.length)]);
                currentCube.position.set(cellPos(aimCol, 0).x, launchY, 0.1);
                currentCube.scale.set(.3, .3); boardGroup.add(currentCube);
                tween(currentCube.scale, { x: 1, y: 1, z: 1 }, 0.2);
            }

            function setAim(c, instant = false) {
                aimCol = Math.max(0, Math.min(COLS - 1, Math.round(c)));
                if (currentCube && !busy) {
                    const tx = cellPos(aimCol, 0).x;
                    if (instant) currentCube.position.x = tx; else tween(currentCube.position, { x: tx }, 0.09);
                }
            }

            function colFromPointer(clientX, clientY) {
                const x = clientX / innerWidth * 2 - 1; const y = -(clientY / innerHeight * 2 - 1);
                pointer.set(x, y); raycaster.setFromCamera(pointer, camera);
                const hit = new THREE.Vector3();
                raycaster.ray.intersectPlane(new THREE.Plane(new THREE.Vector3(0, 0, 1).applyQuaternion(boardGroup.quaternion), 0), hit);
                boardGroup.worldToLocal(hit);
                const c = Math.max(0, Math.min(COLS - 1, Math.round((hit.x + BOARD_W / 2 - CELL / 2) / (CELL + GAP))));
                return c;
            }

            function launch() {
                if (busy || !currentCube) return;
                const c = aimCol; const h = colHeight(c);
                if (h >= ROWS) { if (isBoardFull()) { gameOver(); return; } toast("Γεμάτη στήλη!"); return; }
                busy = true; lastActionTime = performance.now(); playSound('drop');
                const eff = save.equippedEffect;
                if (eff !== 'eff_none') {
                    const wp = new THREE.Vector3(); currentCube.getWorldPosition(wp);
                    const etype = eff.replace('eff_', '');
                    if (etype === 'explode') spawnBurst(wp.x, wp.y - 0.3, wp.z, 'explode', 18);
                    else spawnBurst(wp.x, wp.y - 0.3, wp.z, etype, 10);
                }
                const targetR = h; const p = cellPos(c, targetR);
                const cube = currentCube; currentCube = null;
                tween(cube.position, { y: p.y }, Math.max(0.13, Math.abs(cube.position.y - p.y) * 0.045), null, () => {
                    boardGroup.remove(cube);
                    const cell = placeCube(c, targetR, cube.userData.value, true);
                    cell.mesh.scale.set(1.15, 0.85, 1.15); tween(cell.mesh.scale, { x: 1, y: 1, z: 1 }, 0.18);
                    resolveMerges([{ c, r: targetR }]).then(() => {
                        if (checkWin()) { busy = false; spawnCurrent(); setAim(aimCol); return; }
                        if (isBoardFull()) { gameOver(); return; }
                        busy = false; spawnCurrent(); setAim(aimCol);
                    });
                });
            }

            function isBoardFull() { for (let c = 0; c < COLS; c++) for (let r = 0; r < ROWS; r++) if (!grid[c][r]) return false; return true; }
            function boardFillRatio() { let filled = 0; for (let c = 0; c < COLS; c++) for (let r = 0; r < ROWS; r++) if (grid[c] && grid[c][r]) filled++; return filled / (COLS * ROWS); }

            function applyGravity() {
                const moved = [];
                for (let c = 0; c < COLS; c++) {
                    let w = 0;
                    for (let r = 0; r < ROWS; r++) {
                        if (grid[c][r]) {
                            if (r !== w) { grid[c][w] = grid[c][r]; grid[c][r] = null; tween(grid[c][w].mesh.position, { y: cellPos(c, w).y }, 0.15); moved.push({ c, r: w }); }
                            w++;
                        }
                    }
                }
                return moved;
            }

            async function resolveMerges(queue) {
                while (queue.length) {
                    const { c, r } = queue.shift(); const cell = grid[c][r];
                    if (!cell) continue;
                    const same = [{ c: c - 1, r }, { c: c + 1, r }, { c, r: r - 1 }, { c, r: r + 1 }].filter(n => n.c >= 0 && n.c < COLS && n.r >= 0 && n.r < ROWS && grid[n.c][n.r] && grid[n.c][n.r].value === cell.value);
                    if (!same.length) continue;
                    const newVal = cell.value * Math.pow(2, same.length);
                    score += newVal; save.score = score; coins += 1; save.coins = coins; updateHUD();
                    await new Promise(res => {
                        let left = same.length; const tp = cellPos(c, r);
                        same.forEach(n => {
                            const m = grid[n.c][n.r].mesh; grid[n.c][n.r] = null;
                            tween(m.position, { x: tp.x, y: tp.y }, 0.14, null, () => { boardGroup.remove(m); if (--left === 0) res(); });
                            tween(m.scale, { x: .5, y: .5, z: .5 }, 0.14);
                        });
                    });
                    playSound('merge');
                    const eff = save.equippedEffect;
                    if (eff !== 'eff_none') {
                        const wp = new THREE.Vector3(); cell.mesh.getWorldPosition(wp);
                        const etype = eff.replace('eff_', '');
                        if (etype === 'explode') spawnBurst(wp.x, wp.y, wp.z, 'explode', 20);
                        else spawnBurst(wp.x, wp.y, wp.z, etype, 12);
                    }
                    if (newVal >= 64 && aziramWinTime <= 0) { aziramReactionTime = 1.2; showSpeech("WOW! " + newVal + "! 🤩", 1800); }
                    boardGroup.remove(cell.mesh); grid[c][r] = null;
                    const up = placeCube(c, r, newVal); up.mesh.scale.set(1.35, 1.35, 1.35); tween(up.mesh.scale, { x: 1, y: 1, z: 1 }, 0.22);
                    const moved = applyGravity(); queue.push({ c, r }, ...moved);
                    await new Promise(r => setTimeout(r, 120));
                }
                persist();
            }

            let winTimer = null, winShown = false;
            function checkWin() {
                const t = getLevelTarget(level); let win = false;
                for (let c = 0; c < COLS; c++) for (let r = 0; r < ROWS; r++) if (grid[c][r] && grid[c][r].value >= t) { win = true; break; }

                    winTimer = setTimeout(() => { document.getElementById("winModal").classList.remove("hidden"); winTimer = null; }, 3500);

            }

            function gameOver() { busy = true; best = Math.max(best, score); save.best = best; save.score = 0; persist(); showSpeech("Ωχ όχι! 😭", 2500); speak("Ωχ όχι! Γέμισε το ταμπλό!"); document.getElementById("loseText").innerHTML = `Σκορ: <b>${score}</b>`; document.getElementById("loseModal").classList.remove("hidden"); }

            // ===== NEW HELPER BUTTONS =====
            // 1. MAGNET: Find matching numbers and merge them wherever they are
            function handleMagnet() {
                if (busy) return;
                let mergedAny = false;
                // Find matches and mark them
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (!grid[c][r]) continue;
                        const val = grid[c][r].value;
                        let foundMatch = false;
                        // Check right and down
                        if (c + 1 < COLS && grid[c+1][r] && grid[c+1][r].value === val) foundMatch = true;
                        if (r + 1 < ROWS && grid[c][r+1] && grid[c][r+1].value === val) foundMatch = true;
                        if (foundMatch) {
                            // Force a merge by manually finding all same values on the board and pulling them
                            let cells = [];
                            for (let cc = 0; cc < COLS; cc++) for (let rr = 0; rr < ROWS; rr++) if (grid[cc][rr] && grid[cc][rr].value === val) cells.push({c: cc, r: rr});
                            if (cells.length >= 2) {
                                // Pull them to the lowest/leftest positions and merge
                                // For simplicity, we will simulate a merge queue
                                for (let i = 1; i < cells.length; i++) {
                                    const target = cells[0];
                                    const source = cells[i];
                                    const tMesh = grid[target.c][target.r].mesh;
                                    const sMesh = grid[source.c][source.r].mesh;
                                    grid[source.c][source.r] = null;
                                    boardGroup.remove(sMesh);
                                    // Teleport and merge in system
                                    score += val * 2; save.score = score; coins += 1; save.coins = coins; updateHUD();
                                    // Replace target with merged
                                    boardGroup.remove(tMesh); grid[target.c][target.r] = null;
                                    const newVal = val * 2;
                                    placeCube(target.c, target.r, newVal, true);
                                    mergedAny = true;
                                }
                            }
                        }
                    }
                }
                if (!mergedAny) { toast("Δεν βρέθηκαν όμοιοι αριθμοί!"); return; }
                // Apply gravity to clean up
                const moved = applyGravity();
                resolveMerges(moved).then(() => {
                    updateHUD(); persist(); toast("🧲 Ο μαγνήτης ενεργοποιήθηκε!");
                });
            }

            // 2. HAMMER: Destroy current cube with custom sound

            // ---------- TAP ----------

                        aziramReactionTime = 1.0; const greetings = ["Γεια σου! 😊", "Χι χι! 😄", "Παίζουμε; 🎮", "Είμαι η Αζίραμ! 💛"]; const pick = greetings[Math.floor(Math.random() * greetings.length)]; showSpeech(pick, 1800); speak(pick.replace(/[^\u0370-\u03FF\u1F00-\u1FFFa-zA-Z; !?]/g, '').trim()); if (audioCtx.state !== 'suspended') playSound('drop'); return;
                    }

            // ---------- SHOP ----------
            let activePetSubTab = 'hats';
            function getShopProperties(tab) {

            function renderShop() {

            document.querySelectorAll('.shop-tab').forEach(btn => {

            // ---------- MUTE ----------
            function toggleAudio() {

                const btn = document.getElementById("btnToggleAudio");
                btn.innerText = soundEnabled ? "🔊" : "🔇";

            // ---------- HUD ----------
            function updateHUD() {

            let toastTimer;
            function toast(msg) { const t = document.getElementById("toast"); t.textContent = msg; t.style.opacity = 1; clearTimeout(toastTimer); toastTimer = setTimeout(() => t.style.opacity = 0, 2000); }

            // ---------- MOOD ----------
            let lastSmokeTime = 0;
            function computeMood(now) {
                const fill = boardFillRatio();
                if (fill >= 0.8) return 'anxious';
                if (fill >= 0.65) return 'angry';
                if (now - lastActionTime > 15000) return 'bored';
                return 'idle';
            }
            function onMoodChange(mood) {
                if (mood === 'angry') showSpeech("Γεμίζει το ταμπλό! 😠", 2200);
                if (mood === 'anxious') showSpeech("ΠΑΝΙΚΟΣ!! 😱", 2200);
                if (mood === 'bored') showSpeech("Βαριέμαι... 🥱", 2200);
            }

            let lastT = 0;
            function loop(t) {
                const dt = Math.min(0.05, (t - lastT) / 1000);
                lastT = t;
                if (!lastActionTime) lastActionTime = performance.now();
                stepAnims(dt); updateParticles(dt); updateBackground(dt);

                if (aziramPet) {
                    const core = aziramPet.children[0];
                    if (aziramWinTime > 0) {
                        aziramWinTime -= dt; core.position.y = Math.abs(Math.sin(t * 0.008)) * 1.2;
                        aziramPet.rotation.x -= 0.15; aziramPet.rotation.y += 0.1;
                        if (Math.random() < 0.25) { let wp = new THREE.Vector3(); core.getWorldPosition(wp); spawnBurst(wp.x + (Math.random() - 0.5) * 2, wp.y + 1, wp.z, 'explode', 4); }
                    } else if (aziramReactionTime > 0) {
                        aziramReactionTime -= dt; aziramPet.rotation.x = 0.2;
                        core.position.y = 0.2 * Math.sin(t * 0.2); core.position.x = 0.1 * Math.cos(t * 0.2);
                        aziramPet.rotation.y = -0.3 + Math.sin(t * 0.15) * 0.1;
                        core.scale.x = 1 + Math.sin(t * 0.2) * 0.1; core.scale.y = 1 + Math.cos(t * 0.2) * 0.1;
                        if (mouthMesh) mouthMesh.scale.set(0.7, 0.7, 0.35);
                    } else {
                        const now = performance.now(); aziramMood = computeMood(now);
                        if (aziramMood !== prevMood) { onMoodChange(aziramMood); prevMood = aziramMood; }
                        if (aziramMood === 'angry' || aziramMood === 'anxious') { if (petState === 'sleep' || petState === 'walk') { petState = 'stand'; petStateTimer = 2; } }
                        else { petStateTimer -= dt; if (petStateTimer <= 0) pickNextState(); }
                        if (petState === 'walk') { const dir = Math.sign(wanderTargetX - aziramNdcX); if (dir !== 0) faceDir = dir; aziramNdcX += dir * 0.11 * dt; if (Math.abs(wanderTargetX - aziramNdcX) < 0.02) { petState = 'stand'; petStateTimer = 1.5 + Math.random() * 2.5; } }
                        updateAziramScreenPosition(); aziramPet.rotation.x = 0.2;
                        if (petState === 'sleep') {
                            aziramPet.rotation.z += (1.15 - aziramPet.rotation.z) * 0.06; aziramPet.rotation.y += (-0.1 - aziramPet.rotation.y) * 0.06;
                            core.scale.y = 1 + Math.sin(t * 0.0015) * 0.05; core.scale.x = 1 + Math.cos(t * 0.0015) * 0.05;
                            core.position.y = -0.15; if (aziramEyes) aziramEyes.scale.set(1, 0.1, 1);
                            if (!isTalking && mouthMesh) mouthMesh.scale.set(0.4, 0.18, 0.35);
                            if (Math.random() < 0.004) showSpeech("Zzz 💤", 1600);
                        } else if (petState === 'hop') {
                            aziramPet.rotation.z += (0 - aziramPet.rotation.z) * 0.15; aziramPet.rotation.y += (-0.3 - aziramPet.rotation.y) * 0.1;
                            core.position.y = Math.abs(Math.sin(t * 0.012)) * 0.5; core.scale.y = 1 + Math.sin(t * 0.012) * 0.08; core.scale.x = 1;
                            if (aziramEyes) aziramEyes.scale.set(1, 1, 1); if (!isTalking && mouthMesh) mouthMesh.scale.set(0.8, 0.5, 0.35);
                        } else if (petState === 'walk') {
                            aziramPet.rotation.z += (0 - aziramPet.rotation.z) * 0.15; aziramPet.rotation.y += ((faceDir > 0 ? 0.55 : -1.1) - aziramPet.rotation.y) * 0.08;
                            core.position.y = Math.abs(Math.sin(t * 0.012)) * 0.12; core.scale.set(1, 1, 1);
                            if (aziramEyes) aziramEyes.scale.set(1, 1, 1); if (!isTalking && mouthMesh) mouthMesh.scale.set(1, 0.35, 0.35);
                        } else {
                            aziramPet.rotation.z += (0 - aziramPet.rotation.z) * 0.1; aziramPet.rotation.y += (-0.3 - aziramPet.rotation.y) * 0.1;
                            core.scale.y = 1 + Math.sin(t * 0.004) * 0.04; core.scale.x = 1 + Math.cos(t * 0.004) * 0.04;
                            core.position.y = Math.sin(t * 0.002) * 0.15;
                            if (aziramMood === 'angry') {
                                if (aziramEyes) aziramEyes.scale.set(1, 0.7, 1); if (!isTalking && mouthMesh) mouthMesh.scale.set(0.8, 0.12, 0.35);
                                if (now - lastSmokeTime > 1200) { lastSmokeTime = now; const wp = new THREE.Vector3(); core.getWorldPosition(wp); spawnBurst(wp.x, wp.y + 0.2, wp.z, 'smoke', 2); }
                            } else if (aziramMood === 'anxious') {
                                if (aziramEyes) aziramEyes.scale.set(1.3, 1.3, 1.3); if (!isTalking && mouthMesh) mouthMesh.scale.set(0.5, 0.55, 0.35);
                                aziramPet.position.x += (Math.random() - 0.5) * 0.05; aziramPet.position.y += (Math.random() - 0.5) * 0.05;
                            } else if (aziramMood === 'bored') {
                                if (aziramEyes) aziramEyes.scale.set(1, 0.35, 1); aziramPet.rotation.z = Math.sin(t * 0.0008) * 0.12;
                                const yawn = Math.max(0, Math.sin(t * 0.0012)); if (!isTalking && mouthMesh) mouthMesh.scale.set(0.55 + yawn * 0.2, 0.2 + yawn * 0.55, 0.35);
                            } else {
                                if (aziramEyes) aziramEyes.scale.set(1, 1, 1); if (!isTalking && mouthMesh) mouthMesh.scale.set(1, 0.35, 0.35);
                            }
                        }
                    }
                    if (isTalking && mouthMesh) { mouthMesh.scale.y = 0.25 + Math.abs(Math.sin(t * 0.025)) * 0.55; mouthMesh.scale.x = 0.7 + Math.abs(Math.cos(t * 0.02)) * 0.2; }
                }
                if (currentCube && !busy) currentCube.rotation.y = Math.sin(t * 0.002) * 0.12;
                if (renderer) renderer.render(scene, camera);
                requestAnimationFrame(loop);
            }

            // ---------- INIT ----------
            (async function() {
                loadSave();
                coins = save.coins || 5000; level = save.level || 0; best = save.best || 0; score = save.score || 0;
                soundEnabled = !save.soundMuted;
                document.getElementById("btnToggleAudio").innerText = soundEnabled ? "🔊" : "🔇";
                if(!soundEnabled && audioCtx.state === 'suspended') audioCtx.suspend();

                document.getElementById('btnShop').onclick = () => { renderShop(); document.getElementById('shopModal').classList.remove('hidden'); };
                document.getElementById('btnCloseShop').onclick = () => { document.getElementById('shopModal').classList.add('hidden'); };
                document.getElementById('btnToggleAudio').onclick = toggleAudio;
                document.getElementById('btnMagnet').onclick = handleMagnet;
                document.getElementById('btnHammer').onclick = handleHammer;
                document.getElementById('btnChange').onclick = handleChange;

                document.addEventListener('pointerdown', () => { if (audioCtx.state === 'suspended' && soundEnabled) audioCtx.resume(); }, { once: true });
                document.addEventListener('pointerdown', () => { try { const u = new SpeechSynthesisUtterance(' '); u.volume = 0; speechSynthesis.speak(u); } catch (e) {} }, { once: true });

                initThree();
                if (!renderer) return;
                newBoard(); updateHUD();

                const cvs = document.getElementById("game");
                cvs.addEventListener("pointermove", (e) => { if (!busy) { const x = (e.touches ? e.touches[0].clientX : e.clientX); const c = colFromPointer(x, 0); setAim(c, false); } });
                cvs.addEventListener("pointerdown", onTap);
                document.getElementById("btnNext").onclick = () => { document.getElementById("winModal").classList.add("hidden"); level = save.level; winShown = false; busy = false; updateHUD(); newBoard(); };
                document.getElementById("btnRetry").onclick = () => { document.getElementById("loseModal").classList.add("hidden"); busy = false; newBoard(); winShown = false; };
            })();
        })();
    </script>
</body>
</html>
