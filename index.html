<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Drop 5096 · Aziram</title>
    <style>
        :root {
            --bg: #87CEEB;
            --panel: #8C6A4F;
            --panel-deep: #4A3423;
            --cream: #F7EFDC;
            --ink: #2F1B0D;
            --accent: #F2A03D;
            --good: #7FA653;
            --coin: #F5C542;
            --red: #C2542F;
            --blue: #4A7DBF;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html,
        body {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: "Baloo 2", system-ui, sans-serif;
            color: var(--ink);
            -webkit-user-select: none;
            user-select: none;
            touch-action: none;
        }
        #game {
            position: fixed;
            inset: 0;
            display: block;
            z-index: 0;
        }

        @keyframes rainbowGlow {
            0% { box-shadow: 0 6px 0 rgba(0, 0, 0, 0.35), 0 0 18px rgba(255, 80, 80, 0.7), 0 0 35px rgba(255, 80, 80, 0.35); border-color: rgba(255, 120, 100, 0.8); }
            16% { box-shadow: 0 6px 0 rgba(0, 0, 0, 0.35), 0 0 18px rgba(255, 180, 60, 0.7), 0 0 35px rgba(255, 180, 60, 0.35); border-color: rgba(255, 180, 80, 0.8); }
            33% { box-shadow: 0 6px 0 rgba(0, 0, 0, 0.35), 0 0 18px rgba(255, 220, 50, 0.7), 0 0 35px rgba(255, 220, 50, 0.35); border-color: rgba(255, 220, 80, 0.8); }
            50% { box-shadow: 0 6px 0 rgba(0, 0, 0, 0.35), 0 0 18px rgba(80, 255, 120, 0.7), 0 0 35px rgba(80, 255, 120, 0.35); border-color: rgba(100, 255, 150, 0.8); }
            66% { box-shadow: 0 6px 0 rgba(0, 0, 0, 0.35), 0 0 18px rgba(80, 150, 255, 0.7), 0 0 35px rgba(80, 150, 255, 0.35); border-color: rgba(100, 160, 255, 0.8); }
            83% { box-shadow: 0 6px 0 rgba(0, 0, 0, 0.35), 0 0 18px rgba(200, 80, 255, 0.7), 0 0 35px rgba(200, 80, 255, 0.35); border-color: rgba(200, 100, 255, 0.8); }
            100% { box-shadow: 0 6px 0 rgba(0, 0, 0, 0.35), 0 0 18px rgba(255, 80, 80, 0.7), 0 0 35px rgba(255, 80, 80, 0.35); border-color: rgba(255, 120, 100, 0.8); }
        }

        @keyframes shopPulse {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.04); }
        }

        .rollup-tab {
            position: fixed;
            z-index: 20;
            background: var(--panel-deep);
            color: var(--cream);
            font-weight: 800;
            font-size: 16px;
            padding: 10px 18px;
            border-radius: 0 0 18px 18px;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 0.5px;
            -webkit-backdrop-filter: blur(6px);
            backdrop-filter: blur(6px);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        .rollup-tab:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.35);
        }

        #shopRollup {
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 0 0 28px 28px;
            padding: 14px 32px;
            font-size: 20px;
            min-width: 150px;
            justify-content: center;
            background: rgba(60, 30, 15, 0.92);
            border: 3px solid rgba(255, 180, 60, 0.7);
            animation: rainbowGlow 4s infinite ease-in-out, shopPulse 2.5s infinite ease-in-out;
            text-shadow: 0 0 12px rgba(255, 200, 100, 0.7);
            perspective: 200px;
            transform-style: preserve-3d;
            letter-spacing: 1.5px;
        }
        #shopRollup .mini-score {
            font-size: 13px;
            opacity: 0.9;
            background: rgba(255, 255, 255, 0.2);
            padding: 3px 12px;
            border-radius: 12px;
            margin-left: 8px;
            font-weight: 700;
        }

        .shop-panel {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 18;
            background: rgba(255, 255, 255, 0.45);
            -webkit-backdrop-filter: blur(14px);
            backdrop-filter: blur(14px);
            border-bottom: 3px solid rgba(255, 255, 255, 0.6);
            padding: 12px 10px 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            justify-content: center;
            transform: translateY(-110%);
            transition: transform 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
            pointer-events: auto;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
        }
        .shop-panel.open {
            transform: translateY(0);
        }
        .shop-panel .chip {
            background: var(--panel-deep);
            color: var(--cream);
            border-radius: 14px;
            padding: 8px 16px;
            font-weight: 800;
            font-size: 18px;
            box-shadow: 0 4px 0 rgba(0, 0, 0, .3);
            display: flex;
            align-items: center;
            gap: 6px;
            line-height: 1.2;
        }
        .shop-panel .chip small {
            font-weight: 600;
            opacity: .8;
            font-size: 12px;
            display: block;
            line-height: 1;
        }
        .shop-panel .chip .big {
            font-size: 22px;
            line-height: 1.1;
        }
        .shop-panel .chip.score-chip {
            padding: 10px 22px;
            border-radius: 20px;
            font-size: 28px;
        }
        .shop-panel .chip.score-chip small {
            font-size: 14px;
        }
        .shop-panel .chip.score-chip .big {
            font-size: 30px;
        }
        .shop-panel .hud-btn {
            background: var(--accent);
            border: none;
            cursor: pointer;
            color: #fff;
            border-radius: 14px;
            padding: 10px 18px;
            font-weight: 800;
            font-size: 18px;
            box-shadow: 0 4px 0 #b8742a;
            pointer-events: auto;
            transition: transform .08s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 5px;
            line-height: 1.3;
            perspective: 150px;
            transform-style: preserve-3d;
            background: linear-gradient(135deg, #F2A03D 0%, #f7c06d 50%, #F2A03D 100%);
            background-size: 200% 200%;
            animation: btnShimmer 2s infinite ease-in-out;
        }
        @keyframes btnShimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .shop-panel .hud-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #b8742a;
        }
        .shop-panel .hud-btn.icon-btn {
            background: var(--blue);
            box-shadow: 0 4px 0 #2d5a7a;
            padding: 10px 16px;
            animation: none;
        }

        #helpRollup {
            top: 50%;
            right: 0;
            transform: translateY(-50%) translateX(8px);
            border-radius: 20px 0 0 20px;
            padding: 16px 10px;
            font-size: 17px;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            flex-direction: column;
            gap: 4px;
            box-shadow: -4px 4px 12px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s, right 0.3s;
            letter-spacing: 3px;
            line-height: 1.4;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 120px;
        }
        #helpRollup.open {
            right: 170px;
        }

        .help-panel {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%) translateX(110%);
            z-index: 17;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.4);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            border-radius: 20px 0 0 20px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            transition: transform 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
            pointer-events: auto;
            box-shadow: -6px 4px 20px rgba(0, 0, 0, 0.25);
        }
        .help-panel.open {
            transform: translateY(-50%) translateX(0);
        }
        .help-panel .pbtn {
            pointer-events: auto;
            border: none;
            cursor: pointer;
            width: 120px;
            height: 120px;
            border-radius: 28px;
            background: var(--good);
            box-shadow: 0 6px 0 #5c7a3a;
            color: #fff;
            font-size: 48px;
            line-height: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            font-family: inherit;
            transition: transform .08s;
        }
        .help-panel .pbtn:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #5c7a3a;
        }
        .help-panel .pbtn .cost {
            font-size: 13px;
            font-weight: 800;
            background: rgba(0, 0, 0, .25);
            border-radius: 8px;
            padding: 2px 10px;
            margin-top: 0px;
        }
        .help-panel .pbtn.armed {
            outline: 4px solid var(--accent);
            background: var(--red);
            box-shadow: 0 6px 0 #8f3c20;
        }
        .help-panel .pbtn.listening {
            outline: 4px solid #ff5555;
            background: var(--red);
            box-shadow: 0 6px 0 #8f3c20;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        .spacer {
            flex: 1;
        }

        #toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 25;
            pointer-events: none;
            background: var(--panel-deep);
            color: var(--cream);
            font-weight: 700;
            font-size: 15px;
            border-radius: 16px;
            padding: 10px 22px;
            opacity: 0;
            transition: opacity .25s;
            white-space: nowrap;
            box-shadow: 0 4px 16px rgba(0, 0, 0, .5);
        }

        #speech {
            position: fixed;
            z-index: 22;
            pointer-events: none;
            font-weight: 800;
            font-size: 18px;
            background: #ffffff;
            color: #333;
            padding: 8px 18px;
            border-radius: 20px;
            border: 3px solid var(--panel-deep);
            box-shadow: 0 4px 0 var(--panel-deep);
            transform: translate(-50%, -120%);
            opacity: 0;
            transition: opacity 0.2s ease-in-out, transform 0.2s ease-in-out, border-color 0.2s;
            max-width: 65vw;
            white-space: normal;
            text-align: center;
            word-wrap: break-word;
        }
        #speech.chat-active {
            border-color: #F2A03D;
            box-shadow: 0 4px 0 #F2A03D, 0 0 12px rgba(242, 160, 61, 0.3);
        }
        #speech.visible {
            opacity: 1;
            transform: translate(-50%, -140%);
        }
        #speech::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -10px;
            border-width: 12px;
            border-style: solid;
            border-color: #ffffff transparent transparent transparent;
            filter: drop-shadow(0 4px 0 var(--panel-deep));
        }
        #speech.chat-active::after {
            border-color: #ffffff transparent transparent transparent;
            filter: drop-shadow(0 4px 0 #F2A03D);
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(11, 12, 16, .85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 30;
            -webkit-backdrop-filter: blur(4px);
            backdrop-filter: blur(4px);
        }
        .card {
            background: var(--cream);
            border: 4px solid var(--panel-deep);
            border-radius: 26px;
            padding: 20px 18px;
            width: min(400px, 92vw);
            max-height: 92vh;
            text-align: center;
            box-shadow: 0 10px 0 rgba(0, 0, 0, .4);
            animation: pop .25s cubic-bezier(.34, 1.56, .64, 1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #shopModal .card {
            width: 100vw;
            height: 100vh;
            max-height: 100vh;
            max-width: 100vw;
            border: none;
            border-radius: 0;
            padding-top: calc(14px + env(safe-area-inset-top));
            padding-bottom: calc(14px + env(safe-area-inset-bottom));
        }
        @keyframes pop {
            from { transform: scale(.7); opacity: 0; }
        }
        .card h2 {
            font-size: 22px;
            margin-bottom: 6px;
            font-weight: 800;
            flex-shrink: 0;
        }
        .shop-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 8px;
            border-bottom: 2px solid rgba(0, 0, 0, 0.08);
            padding-bottom: 8px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            flex-shrink: 0;
            flex-wrap: nowrap;
        }
        .shop-tab {
            flex: 0 0 auto;
            padding: 6px 10px;
            font-weight: 800;
            font-size: 12px;
            border-radius: 10px;
            background: #E4D7BC;
            color: #8C6A4F;
            border: none;
            cursor: pointer;
            white-space: nowrap;
            transition: .1s;
        }
        .shop-tab.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 3px 0 #b8742a;
            transform: translateY(-2px);
        }
        .pet-subtabs {
            display: none;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 8px;
            background: #f0e5d1;
            padding: 6px 8px;
            border-radius: 10px;
            justify-content: center;
            flex-shrink: 0;
        }
        .pet-subtabs.active {
            display: flex;
        }
        .pet-subtab {
            padding: 4px 10px;
            font-weight: 800;
            font-size: 11px;
            border-radius: 8px;
            background: var(--red);
            color: #fff;
            border: none;
            cursor: pointer;
            transition: .1s;
        }
        .pet-subtab.active {
            background: #5c7a3a;
            box-shadow: 0 2px 0 #3a4d25;
            transform: translateY(-1px);
        }
        .shop-items {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            grid-auto-rows: max-content;
            align-content: start;
            gap: 8px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-right: 4px;
            flex: 1;
            min-height: 0;
        }
        .shop-items::-webkit-scrollbar {
            width: 4px;
        }
        .shop-items::-webkit-scrollbar-thumb {
            background: var(--panel-deep);
            border-radius: 4px;
        }
        .shop-item {
            background: #E4D7BC;
            border: 3px solid #8C6A4F;
            border-radius: 14px;
            padding: 8px 6px;
            cursor: pointer;
            transition: transform 0.1s;
            text-align: center;
            height: fit-content;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .shop-item:active {
            transform: scale(0.95);
        }
        .shop-item h3 {
            font-size: 13px;
            margin-bottom: 3px;
            color: var(--ink);
            line-height: 1.2;
        }
        .shop-item .price {
            font-weight: 800;
            color: #b8742a;
            font-size: 12px;
        }
        .shop-item.owned .price {
            color: var(--good);
        }
        .shop-item.equipped {
            border-color: var(--accent);
            background: #FFF5E1;
            box-shadow: 0 0 10px rgba(242, 160, 61, 0.4);
        }
        .shop-item .ad-btn {
            display: inline-block;
            background: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
            font-family: inherit;
            margin-top: 2px;
            transition: .1s;
            box-shadow: 0 3px 0 #a93226;
            width: 100%;
        }
        .shop-item .ad-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #a93226;
        }
        .btn {
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-weight: 800;
            font-size: 16px;
            color: #fff;
            background: var(--accent);
            border-radius: 16px;
            padding: 10px 24px;
            box-shadow: 0 4px 0 #b8742a;
            transition: transform .08s;
            margin-top: 10px;
            width: 100%;
            flex-shrink: 0;
        }
        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #b8742a;
        }
        .btn.cancel-btn {
            background: #888;
            box-shadow: 0 4px 0 #555;
            margin-top: 6px;
        }
        .ad-progress {
            height: 8px;
            background: #ddd;
            border-radius: 4px;
            margin: 12px 0;
            overflow: hidden;
        }
        .ad-progress .ad-bar {
            height: 100%;
            background: var(--accent);
            border-radius: 4px;
            width: 0%;
            transition: width 0.1s linear;
        }
        .hidden {
            display: none !important;
        }
        .win-lose-overlay {
            z-index: 35;
        }

        @media (max-width: 480px) {
            .rollup-tab { font-size: 14px; padding: 8px 14px; }
            #shopRollup { font-size: 16px; padding: 12px 22px; border-radius: 0 0 24px 24px; }
            #shopRollup .mini-score { font-size: 11px; }
            .shop-panel { padding: 8px 6px 6px; gap: 5px; }
            .shop-panel .chip { font-size: 14px; padding: 6px 10px; border-radius: 10px; }
            .shop-panel .chip .big { font-size: 18px; }
            .shop-panel .chip.score-chip { font-size: 22px; padding: 6px 14px; }
            .shop-panel .chip.score-chip .big { font-size: 24px; }
            .shop-panel .hud-btn { font-size: 14px; padding: 8px 12px; border-radius: 10px; }
            .help-panel .pbtn { width: 90px; height: 90px; font-size: 36px; border-radius: 22px; }
            .help-panel .pbtn .cost { font-size: 11px; }
            #helpRollup { font-size: 14px; padding: 14px 7px; letter-spacing: 2px; min-height: 100px; }
            #helpRollup.open { right: 120px; }
            .help-panel { padding: 8px; gap: 6px; }
            #speech { font-size: 15px; padding: 6px 14px; border-radius: 16px; }
            #toast { font-size: 12px; padding: 6px 14px; bottom: 80px; }
            .shop-items { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 5px; }
            .shop-item h3 { font-size: 11px; }
        }
        @media (max-width: 380px) {
            .shop-panel .chip { font-size: 11px; padding: 4px 8px; }
            .shop-panel .chip .big { font-size: 15px; }
            .shop-panel .chip.score-chip { font-size: 18px; padding: 5px 10px; }
            .shop-panel .chip.score-chip .big { font-size: 20px; }
            .shop-panel .hud-btn { font-size: 12px; padding: 6px 10px; }
            .help-panel .pbtn { width: 72px; height: 72px; font-size: 30px; }
            #helpRollup.open { right: 100px; }
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>

    <div class="rollup-tab" id="shopRollup">
        🛒 SHOP <span class="mini-score" id="miniScore">0</span>
    </div>

    <div class="shop-panel" id="shopPanel">
        <div class="chip"><div><small id="lblLevel">LEVEL</small><span class="big" id="hudLevel">1</span></div></div>
        <div class="chip score-chip"><div><small id="lblScore">SCORE</small><span class="big" id="hudScore">0</span></div></div>
        <div class="chip">🪙 <span class="big" id="hudCoins">0</span></div>
        <button class="hud-btn icon-btn" id="btnSound">🔊</button>
        <button class="hud-btn icon-btn" id="btnLang">EN</button>
        <button class="hud-btn" id="btnShop">🛒</button>
    </div>

    <div class="rollup-tab" id="helpRollup">
        ❓ HELP
    </div>

    <div class="help-panel" id="helpPanel">
        <button class="pbtn" id="btnMagnet">🧲<span class="cost">📺 Ad</span></button>
        <button class="pbtn" id="btnHammer">🔨<span class="cost">📺 Ad</span></button>
        <button class="pbtn" id="btnShuffle">🔄<span class="cost">📺 Ad</span></button>
        <button class="pbtn" id="btnMic">🎤<span class="cost" id="micCost">Talk</span></button>
    </div>

    <div id="speech"><span id="speechText">WOW!</span></div>
    <div id="toast"></div>

    <div class="overlay hidden" id="shopModal">
        <div class="card">
            <h2 style="margin-bottom:10px;" id="shopTitle">🛍️ Customize</h2>
            <div class="shop-tabs" id="mainTabs">
                <button class="shop-tab active" data-maintab="cubes">Cubes</button>
                <button class="shop-tab" data-maintab="boards">Boards</button>
                <button class="shop-tab" data-maintab="effects">Effects</button>
                <button class="shop-tab" data-maintab="sounds">Sounds</button>
                <button class="shop-tab" data-maintab="music">Music</button>
                <button class="shop-tab" data-maintab="pets">Aziram</button>
            </div>
            <div class="pet-subtabs" id="petSubTabs">
                <button class="pet-subtab active" data-subtab="pet_hair">💇 Hair</button>
                <button class="pet-subtab" data-subtab="pet_clothes">👗 Clothes</button>
                <button class="pet-subtab" data-subtab="pet_shoes">👟 Shoes</button>
                <button class="pet-subtab" data-subtab="pet_props">🎈 Item</button>
            </div>
            <div class="shop-items" id="shopContainer"></div>
            <button class="btn" id="btnCloseShop">Close</button>
        </div>
    </div>

    <div class="overlay hidden win-lose-overlay" id="winModal">
        <div class="card">
            <div style="font-size:40px; margin-bottom:6px;">🎉</div>
            <h2 id="winTitle">Level Complete!</h2>
            <p id="winText"></p>
            <button class="btn" id="btnNext">Continue ➜</button>
        </div>
    </div>
    <div class="overlay hidden win-lose-overlay" id="loseModal">
        <div class="card">
            <div style="font-size:40px; margin-bottom:6px;">😵</div>
            <h2 id="loseTitle">The board is full!</h2>
            <p id="loseText"></p>

                if (musicTimer) clearInterval(musicTimer);
                const song = SONGS[save.equippedMusic] || SONGS.music_1;
                musicStep = 0;
                musicTimer = setInterval(function() {
                    if (muted) return;
                    try {
                        const m = song.mel[musicStep % song.mel.length];
                        tone(m, null, song.tempo / 1000 * 0.9, song.wave, song.vol);
                        if (musicStep % 2 === 0) {
                            const b = song.bass[(musicStep / 2) % song.bass.length];
                            tone(b, null, song.tempo / 1000 * 1.6, 'sine', 0.05);
                        }
                        musicStep++;
                    } catch (e) {}
                }, song.tempo);
            }

            function startMusic() {
                if (musicStarted) return;
                musicStarted = true;
                if (audioCtx.state === 'suspended') audioCtx.resume();
                scheduleMusicLoop();
            }

            let isTalking = false;

            function speak(text, isChat) {
                if (muted) return;
                try {
                    if (!('speechSynthesis' in window)) return;
                    speechSynthesis.cancel();
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = lang === 'en' ? 'en-US' : 'el-GR';
                    const voices = speechSynthesis.getVoices();
                    const pref = lang === 'en' ? 'en' : 'el';
                    const v = voices.find(function(vv) { return vv.lang && vv.lang.toLowerCase().indexOf(pref) === 0; });
                    if (v) u.voice = v;
                    u.rate = 1.05;
                    u.pitch = 1.6;
                    u.onstart = function() { isTalking = true; };
                    u.onend = function() { isTalking = false; };
                    u.onerror = function() { isTalking = false; };
                    speechSynthesis.speak(u);
                } catch (e) { isTalking = false; }
            }
            if ('speechSynthesis' in window) {
                speechSynthesis.getVoices();
                speechSynthesis.onvoiceschanged = function() { speechSynthesis.getVoices(); };
            }

            function answerQuestionWithSentiment(raw) {
                const reply = answerQuestion(raw);
                const happyEmojis = ['😊','😄','😉','🤩','❤️','💖','🎉','😃','😁','😆','😋','😎','🥳'];
                const isHappy = happyEmojis.some(function(emoji) { return reply.includes(emoji); }) || reply.includes('!') || reply.includes('😂');

            let recognition = null, isListening = false;

            function initMic() {
                const btn = document.getElementById('btnMic');
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SR) { btn.onclick = function() { toast(TT().mic_unsupported); }; return; }
                btn.onclick = function() {
                    if (isListening) { try { recognition.stop(); } catch (e) {} return; }
                    recognition = new SR();
                    recognition.lang = lang === 'en' ? 'en-US' : 'el-GR';
                    recognition.interimResults = false;
                    recognition.maxAlternatives = 1;
                    recognition.onstart = function() {
                        isListening = true;
                        btn.classList.add('listening');
                        toast(TT().mic_ask);
                        petState = 'think';
                        petStateTimer = 999;
                    };
                    recognition.onresult = function(e) {
                        const txt = e.results[0][0].transcript;
                        if (txt) {
                            const res = answerQuestionWithSentiment(txt);
                            reactionTime = 1.2;
                            showSpeech(res.text, Math.max(2800, res.text.length * 80), true);
                            speak(res.text, true);
                            if (res.happy) {
                                sunLaughTimer = 2.0;
                                spawnSunHearts();
                            }
                        }
                    };
                    recognition.onerror = function() { toast(TT().mic_fail); };
                    recognition.onend = function() {
                        isListening = false;
                        btn.classList.remove('listening');
                        petState = 'stand';
                        petStateTimer = 2;
                    };
                    try { recognition.start(); } catch (e) { toast(TT().mic_noopen); }
                };
            }

            };

            function spawnParticle(x, y, z, type) {
                let mat = pMats[type];
                if (Array.isArray(mat)) mat = mat[Math.floor(Math.random() * mat.length)];
                const p = new THREE.Mesh(pGeo, mat);
                p.position.set(x, y, z);
                let vx = (Math.random() - 0.5) * 6, vy = (Math.random() - 0.5) * 6, vz = (Math.random() - 0.5) * 6;
                if (type === 'flame' || type === 'smoke') { vx *= 0.2; vy = -Math.random() * 2 - 0.5; vz = 0; }
                if (type === 'confetti') { p.scale.set(0.15, 0.15, 0.15); vy = Math.random() * 5; }
                scene.add(p);
                particles.push({ mesh: p, life: 1.0, vx: vx, vy: vy, vz: vz, type: type });
            }

            function spawnBurst(x, y, z, type, count) { for (let i = 0; i < count; i++) spawnParticle(x, y, z, type); }

            function updateParticles(dt) {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.life -= dt * (p.type === 'smoke' ? 1.5 : 2.5);
                    if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
                    else {
                        p.mesh.position.x += p.vx * dt;
                        p.mesh.position.y += p.vy * dt;
                        p.mesh.position.z += p.vz * dt;
                        if (p.type === 'confetti') p.vy -= dt * 10;
                        p.mesh.scale.setScalar(p.life);
                        if (p.type === 'flame' || p.type === 'explode') p.mesh.material.color.setHSL(0.1 * p.life, 1, 0.5);
                    }
                }
            }

            function canvasTex(w, h, draw) {
                const cv = document.createElement('canvas');
                cv.width = w;
                cv.height = h;
                draw(cv.getContext('2d'), w, h);
                const t = new THREE.CanvasTexture(cv);
                t.anisotropy = 4;
                return t;
            }

            function makeSkyTexture() {
                return canvasTex(64, 512, function(g, w, h) {
                    const grad = g.createLinearGradient(0, 0, 0, h);
                    grad.addColorStop(0, '#4DA6E8');
                    grad.addColorStop(0.45, '#8FD0F5');
                    grad.addColorStop(0.8, '#CFEFFB');
                    grad.addColorStop(1, '#E9FBEF');
                    g.fillStyle = grad;
                    g.fillRect(0, 0, w, h);
                });
            }

            function makeSunTexture(expression) {
                return canvasTex(512, 512, function(g, w, h) {
                    const cx = 256, cy = 256;
                    g.save();
                    g.translate(cx, cy);
                    for (let i = 0; i < 12; i++) {
                        g.rotate(Math.PI / 6);
                        const grad = g.createLinearGradient(0, -150, 0, -250);
                        grad.addColorStop(0, 'rgba(255,215,80,0.9)');
                        grad.addColorStop(1, 'rgba(255,215,80,0)');
                        g.fillStyle = grad;
                        g.beginPath();
                        g.moveTo(-22, -145);
                        g.lineTo(22, -145);
                        g.lineTo(0, -248);
                        g.closePath();
                        g.fill();
                    }
                    g.restore();
                    let glow = g.createRadialGradient(cx, cy, 60, cx, cy, 220);
                    glow.addColorStop(0, 'rgba(255,240,150,0.55)');
                    glow.addColorStop(1, 'rgba(255,240,150,0)');
                    g.fillStyle = glow;
                    g.beginPath();
                    g.arc(cx, cy, 220, 0, Math.PI * 2);
                    g.fill();
                    let body = g.createRadialGradient(cx - 45, cy - 55, 20, cx, cy, 150);
                    body.addColorStop(0, '#FFF6C4');
                    body.addColorStop(0.55, '#FFD84D');
                    body.addColorStop(1, '#F5A821');
                    g.fillStyle = body;
                    g.beginPath();
                    g.arc(cx, cy, 145, 0, Math.PI * 2);
                    g.fill();
                    g.lineWidth = 12;
                    g.strokeStyle = '#7A4A12';
                    g.lineCap = 'round';
                    if (expression === 'bored') {
                        g.beginPath(); g.arc(cx - 52, cy - 25, 24, Math.PI * 1.05, Math.PI * 1.95); g.stroke();
                        g.beginPath(); g.arc(cx + 52, cy - 25, 24, Math.PI * 1.05, Math.PI * 1.95); g.stroke();
                        g.font = 'bold 36px sans-serif'; g.fillStyle = '#7A4A12';
                        g.fillText('Z', cx - 110, cy - 80); g.fillText('z', cx - 130, cy - 110);
                    } else if (expression === 'panic') {
                        g.beginPath(); g.arc(cx - 52, cy - 25, 28, 0, Math.PI * 2); g.stroke();
                        g.fillStyle = '#FFFFFF'; g.fill();
                        g.fillStyle = '#111'; g.beginPath(); g.arc(cx - 48, cy - 20, 6, 0, Math.PI * 2); g.fill();
                        g.beginPath(); g.arc(cx + 52, cy - 25, 28, 0, Math.PI * 2); g.stroke();
                        g.fillStyle = '#FFFFFF'; g.fill();
                        g.fillStyle = '#111'; g.beginPath(); g.arc(cx + 56, cy - 20, 6, 0, Math.PI * 2); g.fill();
                        g.fillStyle = '#7DA9E0'; g.beginPath(); g.ellipse(cx - 90, cy - 60, 10, 16, 0, 0, Math.PI * 2); g.fill();
                        g.beginPath(); g.moveTo(cx - 30, cy + 30); g.quadraticCurveTo(cx, cy + 15, cx + 30, cy + 30);
                        g.strokeStyle = '#7A4A12'; g.stroke();
                    } else if (expression === 'sad') {
                        g.beginPath(); g.arc(cx - 52, cy - 25, 24, Math.PI * 1.1, Math.PI * 1.9); g.stroke();
                        g.beginPath(); g.arc(cx + 52, cy - 25, 24, Math.PI * 1.1, Math.PI * 1.9); g.stroke();
                        g.fillStyle = '#7DA9E0'; g.beginPath(); g.ellipse(cx - 80, cy - 10, 6, 12, 0, 0, Math.PI * 2); g.fill();
                        g.beginPath(); g.arc(cx, cy + 50, 40, Math.PI * 0.15, Math.PI * 0.85, true); g.stroke();
                    } else if (expression === 'ecstatic') {
                        g.beginPath(); g.arc(cx - 52, cy - 25, 28, 0, Math.PI * 2); g.stroke();
                        g.fillStyle = '#FFFFFF'; g.fill();
                        g.fillStyle = '#111'; g.beginPath(); g.arc(cx - 48, cy - 20, 7, 0, Math.PI * 2); g.fill();
                        g.fillStyle = '#FFF'; g.beginPath(); g.arc(cx - 52, cy - 30, 4, 0, Math.PI * 2); g.fill();
                        g.beginPath(); g.arc(cx + 52, cy - 25, 28, 0, Math.PI * 2); g.stroke();
                        g.fillStyle = '#FFFFFF'; g.fill();
                        g.fillStyle = '#111'; g.beginPath(); g.arc(cx + 56, cy - 20, 7, 0, Math.PI * 2); g.fill();
                        g.fillStyle = '#FFF'; g.beginPath(); g.arc(cx + 48, cy - 30, 4, 0, Math.PI * 2); g.fill();
                        g.beginPath(); g.arc(cx, cy + 15, 50, Math.PI * 0.15, Math.PI * 0.85); g.stroke();
                        g.fillStyle = '#FFE066'; const sp = [[cx-120, cy-90], [cx+130, cy-70], [cx, cy-160]];
                        sp.forEach(function(p) { g.beginPath(); g.arc(p[0], p[1], 8, 0, Math.PI*2); g.fill(); });
                    } else {

                        g.beginPath(); g.arc(cx, cy + 15, 62, Math.PI * 0.15, Math.PI * 0.85); g.stroke();
                    }
                    g.fillStyle = 'rgba(245,130,90,0.5)';
                    g.beginPath(); g.arc(cx - 90, cy + 30, 22, 0, Math.PI * 2); g.fill();

                });

            function makeCloudTexture(seed, grey) {
                return canvasTex(512, 256, function(g, w, h) {
                    function puff(x, y, r) {
                        const color = grey ? 'rgba(180,180,180,' : 'rgba(255,255,255,';
                        const grad = g.createRadialGradient(x - r * 0.3, y - r * 0.35, r * 0.15, x, y, r);
                        grad.addColorStop(0, color + '0.98)');
                        grad.addColorStop(0.75, color + '0.92)');
                        grad.addColorStop(1, 'rgba(225,235,248,0)');
                        g.fillStyle = grad;
                        g.beginPath();
                        g.arc(x, y, r, 0, Math.PI * 2);
                        g.fill();
                    }
                    const rnd = function(a, b) { seed = (seed * 9301 + 49297) % 233280; return a + (seed / 233280) * (b - a); };
                    for (let i = 0; i < 9; i++) puff(rnd(90, 420), rnd(105, 165), rnd(45, 85));
                    puff(256, 120, 95);
                });
            }

            function makeGrassTexture() {
                return canvasTex(1024, 300, function(g, w, h) {
                    const grad = g.createLinearGradient(0, 40, 0, h);
                    grad.addColorStop(0, '#7FC94A');
                    grad.addColorStop(0.4, '#5FAE33');
                    grad.addColorStop(1, '#3E7F1F');
                    g.fillStyle = grad;
                    g.beginPath();
                    g.moveTo(0, h);
                    g.lineTo(0, 90);
                    for (let x = 0; x <= w; x += 64) g.quadraticCurveTo(x + 32, 90 - Math.sin(x * 0.011) * 26 - 18, x + 64, 90 - Math.sin((x + 64) * 0.009) * 20);
                    g.lineTo(w, h);
                    g.closePath();
                    g.fill();
                    for (let i = 0; i < 260; i++) {
                        const x = Math.random() * w;
                        const y = 92 + Math.random() * (h - 100);
                        const len = 12 + Math.random() * 22;
                        const lean = (Math.random() - 0.5) * 10;
                        g.strokeStyle = 'rgba(' + (40 + Math.random() * 60 | 0) + ',' + (130 + Math.random() * 70 | 0) + ',40,0.75)';
                        g.lineWidth = 2 + Math.random() * 2;
                        g.lineCap = 'round';
                        g.beginPath();
                        g.moveTo(x, y);
                        g.quadraticCurveTo(x + lean * 0.5, y - len * 0.6, x + lean, y - len);
                        g.stroke();
                    }
                });
            }

            function createGrassLayers() {
                const tex = makeGrassTexture();
                const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, depthWrite: false });
                const depths = [0.05, 0.15, 0.25];
                depths.forEach(function(dz) {
                    const geom = new THREE.PlaneGeometry(1, 1, 32, 4);
                    const mesh = new THREE.Mesh(geom, mat);
                    mesh.renderOrder = -5;
                    mesh.position.z = dz;
                    const basePos = [];
                    const posAttr = geom.attributes.position;
                    for (let i = 0; i < posAttr.count; i++) {
                        basePos.push(new THREE.Vector3(posAttr.getX(i), posAttr.getY(i), posAttr.getZ(i)));
                    }
                    grassLayers.push({ mesh: mesh, baseVertices: basePos, geometry: geom });
                    scene.add(mesh);
                });
            }

            function createFlowerCluster(x, y, color) {
                const group = new THREE.Group();
                const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.4), new THREE.MeshPhongMaterial({ color: 0x2e6b14 }));
                stem.position.y = 0.2;
                group.add(stem);
                for (let p = 0; p < 5; p++) {
                    const petal = new THREE.Mesh(new THREE.SphereGeometry(0.06, 6, 6), new THREE.MeshPhongMaterial({ color: color }));
                    const angle = p / 5 * Math.PI * 2;
                    petal.position.set(Math.cos(angle) * 0.07, 0.42 + Math.sin(angle) * 0.07, 0);
                    group.add(petal);
                }
                const center = new THREE.Mesh(new THREE.SphereGeometry(0.05, 6, 6), new THREE.MeshPhongMaterial({ color: 0xf2c53d }));
                center.position.y = 0.42;
                group.add(center);
                group.position.set(x, y, 0.22);
                group.userData.baseY = y;
                scene.add(group);
                flowerObjects.push(group);

                shape.bezierCurveTo(-0.3, 0.15, 0, 0.3, 0, 0.45);
                shape.bezierCurveTo(0, 0.3, 0.3, 0.15, 0.3, 0);

                const geo = new THREE.ShapeGeometry(shape);
                const mat = new THREE.MeshBasicMaterial({ color: 0xff4466, side: THREE.DoubleSide, transparent: true });
                const heart = new THREE.Mesh(geo, mat);
                heart.scale.set(0.15, 0.15, 0.15);

            function unprojectToDist(nx, ny, dist) {
                const v = new THREE.Vector3(nx, ny, 0.5).unproject(camera);
                const dir = v.sub(camera.position).normalize();
                return camera.position.clone().add(dir.multiplyScalar(dist));
            }

            function viewSizeAt(dist) {
                const h = 2 * dist * Math.tan(THREE.MathUtils.degToRad(camera.fov / 2));
                return { h: h, w: h * camera.aspect };
            }

            let cloudHalfW = 50;

            function initScenery() {
                skyPlane = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), new THREE.MeshBasicMaterial({ map: makeSkyTexture(), depthWrite: false }));
                skyPlane.renderOrder = -10;
                scene.add(skyPlane);
                sunFace = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), new THREE.MeshBasicMaterial({ map: makeSunTexture('happy'), transparent: true, depthWrite: false }));
                sunGroup = new THREE.Group();
                sunGroup.add(sunFace);
                sunGroup.renderOrder = -8;
                scene.add(sunGroup);
                for (let i = 0; i < 5; i++) {
                    const c = new THREE.Mesh(new THREE.PlaneGeometry(1, 0.5), new THREE.MeshBasicMaterial({ map: makeCloudTexture(1000 + i * 777, false), transparent: true, opacity: 0.95, depthWrite: false }));
                    c.renderOrder = -7;
                    c.userData.speed = 0.25 + Math.random() * 0.45;
                    c.userData.ny = 0.65 + Math.random() * 0.30;
                    scene.add(c);
                    clouds.push(c);
                }
                createGrassLayers();
                spawnFlowers();
                layoutScenery();
            }

            function layoutScenery() {
                if (!skyPlane) return;
                const dSky = 45;
                const sSky = viewSizeAt(dSky);
                skyPlane.position.copy(unprojectToDist(0, 0, dSky));
                skyPlane.scale.set(sSky.w * 1.4, sSky.h * 1.4, 1);
                const dSun = 40;
                const sSun = viewSizeAt(dSun);
                sunGroup.position.copy(unprojectToDist(-0.62, 0.94, dSun));
                const sunSize = Math.min(sSun.w, sSun.h) * 0.26;
                sunFace.scale.set(sunSize, sunSize, 1);
                const dCloud = 36;
                const sCloud = viewSizeAt(dCloud);
                cloudHalfW = sCloud.w * 0.75;
                clouds.forEach(function(c, i) {
                    const p = unprojectToDist(0, c.userData.ny, dCloud);
                    c.position.set(p.x - sCloud.w * 0.6 + i * sCloud.w * 0.35, p.y, p.z);
                    const cw = sCloud.w * (0.18 + (i % 3) * 0.05);
                    c.scale.set(cw, cw * 0.5, 1);
                });
                const dGrass = 20;
                const sGrass = viewSizeAt(dGrass);
                const gp = unprojectToDist(0, -0.55, dGrass);
                grassLayers.forEach(function(l) {
                    l.mesh.position.copy(gp);
                    l.mesh.scale.set(sGrass.w * 1.15, sGrass.h * 0.48, 1);
                });
                flowerObjects.forEach(function(f) {
                    f.position.x = f.userData.baseX || f.position.x;
                    f.userData.baseX = f.position.x;
                });
            }

            function updateClouds(dt) {
                clouds.forEach(function(c) {
                    c.position.x += c.userData.speed * dt;
                    if (c.position.x > cloudHalfW) c.position.x = -cloudHalfW;
                });
            }

            function updateGrassSway(time) {
                grassLayers.forEach(function(layer) {
                    const geom = layer.geometry;
                    const posAttr = geom.attributes.position;
                    const base = layer.baseVertices;
                    for (let i = 0; i < posAttr.count; i++) {
                        const b = base[i];
                        const sway = Math.sin(b.x * 5.5 + time * 0.8) * 0.06 + Math.cos(b.x * 2.3 + time * 1.2) * 0.04;
                        posAttr.setY(i, b.y + sway);
                        posAttr.setX(i, b.x + Math.cos(b.x * 4.7 + time * 0.9) * 0.02);
                    }
                    posAttr.needsUpdate = true;
                });
            }

            function updateFlowersSway(time) {
                flowerObjects.forEach(function(f) {
                    const sway = Math.sin(f.userData.baseX * 2.5 + time * 1.2) * 0.04 + Math.cos(f.userData.baseX * 3.8 + time * 1.5) * 0.03;
                    f.position.y = f.userData.baseY + sway;
                    f.rotation.z = Math.sin(time * 1.1 + f.userData.baseX) * 0.1;
                });
            }

            function updateRain(dt) {
                if (!rainActive) return;
                rainParticles.forEach(function(p) {
                    p.mesh.position.y -= p.speed * dt;
                    if (p.mesh.position.y < -4) {
                        p.mesh.position.y = 5 + Math.random() * 3;
                        p.mesh.position.x = (Math.random() - 0.5) * 18;
                    }
                });
            }

            function updateHearts(dt) {
                for (let i = heartsParticles.length - 1; i >= 0; i--) {
                    const h = heartsParticles[i];
                    h.life -= dt;
                    h.mesh.position.y += h.velY * dt;
                    h.mesh.material.opacity = h.life / 1.5;
                    if (h.life <= 0) {
                        scene.remove(h.mesh);
                        heartsParticles.splice(i, 1);
                    }
                }
            }

            function setCloudsGreyMode(grey) {
                if (cloudGreyMode === grey) return;
                cloudGreyMode = grey;
                clouds.forEach(function(c, i) {
                    c.material.map = makeCloudTexture(1000 + i * 777, grey);
                    c.material.needsUpdate = true;
                });
            }

            function updateSunTexture(expr) {
                if (sunFace && sunFace.material.map) {
                    sunFace.material.map = makeSunTexture(expr);
                    sunFace.material.needsUpdate = true;
                }
            }

            function showSpeech(text, duration, isChat) {
                const el = document.getElementById("speechText");
                const bbl = document.getElementById("speech");
                if (speechTimer) clearTimeout(speechTimer);
                el.innerText = text;
                if (isChat) bbl.classList.add("chat-active");
                else bbl.classList.remove("chat-active");
                bbl.classList.add("visible");
                bbl.style.opacity = "1";
                updateSpeechPosition();
                speechTimer = setTimeout(function() {
                    bbl.classList.remove("visible");
                    bbl.style.opacity = "0";
                    bbl.classList.remove("chat-active");
                }, duration);
            }

            function updateSpeechPosition() {
                if (!girl) return;
                const vec = girl.position.clone();
                vec.y += 0.40;
                vec.project(camera);
                const x = (vec.x * .5 + .5) * window.innerWidth;
                const y = (-vec.y * .5 + .5) * window.innerHeight;
                const bbl = document.getElementById("speech");
                bbl.style.left = x + "px";
                bbl.style.top = y + "px";
            }

            function hairMat(color) { return new THREE.MeshPhongMaterial({ color: color, shininess: 55 }); }

            function buildHair(styleId) {
                while (hairGroup.children.length > 0) hairGroup.remove(hairGroup.children[0]);
                hairGroup.userData.tails = [];
                const blonde = hairMat(BLONDE);
                const blondeDark = hairMat(0xe0b53f);
                const tieMat = new THREE.MeshPhongMaterial({ color: 0xff4f8b, shininess: 70 });

                function addCap(mat) {
                    const m = mat || blonde;
                    const cap = new THREE.Mesh(new THREE.SphereGeometry(0.49, 28, 18, 0, Math.PI * 2, 0, Math.PI / 2.2), m);
                    cap.position.set(0, 0.1, -0.06);
                    hairGroup.add(cap);
                    const back = new THREE.Mesh(new THREE.SphereGeometry(0.47, 24, 16, 0, Math.PI * 2, 0, Math.PI / 1.6), m);
                    back.position.set(0, 0.04, -0.16);
                    hairGroup.add(back);
                    const bangs = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 12), m);
                    bangs.scale.set(1.4, 0.42, 0.55);
                    bangs.position.set(0, 0.4, 0.26);
                    hairGroup.add(bangs);
                }

                function makeTail(x, mats) {
                    const tail = new THREE.Group();
                    tail.position.set(x, 0.0, -0.14);
                    const tie = new THREE.Mesh(new THREE.TorusGeometry(0.07, 0.028, 10, 16), tieMat);
                    tie.rotation.y = Math.PI / 2;
                    tail.add(tie);
                    const sizes = [0.15, 0.13, 0.1];
                    for (let i = 0; i < 3; i++) {
                        const s = new THREE.Mesh(new THREE.SphereGeometry(sizes[i], 14, 14), (mats && mats[i]) ? mats[i] : (i === 1 ? blondeDark : blonde));
                        s.position.y = -0.12 - i * 0.19;
                        s.position.x = Math.sign(x) * 0.04 * i;
                        tail.add(s);
                    }
                    tail.rotation.z = Math.sign(x) * -0.3;
                    hairGroup.add(tail);
                    hairGroup.userData.tails.push(tail);
                    return tail;
                }
                if (styleId === 'hair_ponytail') {
                    addCap();
                    const tail = new THREE.Group();
                    tail.position.set(0, 0.32, -0.44);
                    const tie = new THREE.Mesh(new THREE.TorusGeometry(0.09, 0.035, 10, 16), tieMat);
                    tie.rotation.x = Math.PI / 2;
                    tail.add(tie);
                    for (let i = 0; i < 4; i++) {
                        const s = new THREE.Mesh(new THREE.SphereGeometry(0.17 - i * 0.03, 14, 14), i % 2 ? blondeDark : blonde);
                        s.position.set(0, -0.16 - i * 0.18, -0.05 - i * 0.05);
                        tail.add(s);

                    hairGroup.add(tail);
                    hairGroup.userData.tails.push(tail);

                    [-0.32, 0.32].forEach(function(x) {

                        bun.position.set(x, 0.44, -0.08);
                        const tie = new THREE.Mesh(new THREE.TorusGeometry(0.11, 0.026, 8, 16), tieMat);
                        tie.position.copy(bun.position);
                        tie.position.y -= 0.1;
                        tie.rotation.x = Math.PI / 2;
                        hairGroup.add(bun, tie);
                    });
                } else if (styleId === 'hair_long') {
                    addCap();
                    const back = new THREE.Mesh(new THREE.SphereGeometry(0.4, 20, 16), blonde);
                    back.scale.set(1.05, 2.0, 0.5);
                    back.position.set(0, -0.5, -0.3);
                    hairGroup.add(back);

                    addCap();
                    [-0.42, 0.42].forEach(function(x) {
                        const side = new THREE.Mesh(new THREE.SphereGeometry(0.16, 14, 14), blonde);
                        side.scale.set(0.7, 1.6, 0.8);
                        side.position.set(x, -0.06, -0.06);
                        hairGroup.add(side);
                    });
                    const backLow = new THREE.Mesh(new THREE.SphereGeometry(0.32, 18, 14), blondeDark);
                    backLow.scale.set(1.2, 0.9, 0.6);
                    backLow.position.set(0, -0.14, -0.26);
                    hairGroup.add(backLow);
                } else if (styleId === 'hair_braids') {
                    addCap();
                    [-0.48, 0.48].forEach(function(x) {
                        const braid = new THREE.Group();
                        braid.position.set(x, 0.0, -0.12);
                        for (let i = 0; i < 5; i++) {
                            const s = new THREE.Mesh(new THREE.SphereGeometry(0.09 - i * 0.007, 12, 12), i % 2 ? blondeDark : blonde);
                            s.position.set(Math.sin(i * 1.6) * 0.045, -0.1 - i * 0.14, 0);

                        const tie = new THREE.Mesh(new THREE.TorusGeometry(0.05, 0.022, 8, 14), tieMat);

            function updateGirlScreenPosition() {
                if (!girl || !camera) return;
                const ndc = new THREE.Vector3(girlNdcX, -0.85, 0.1);
                ndc.unproject(camera);

            function announceMission(delay) {
                setTimeout(function() {
                    reactionTime = 1.4;
                    showSpeech(TT().mission(levelTarget(level)), 4000);
                }, delay || 0);
            }

            let scene, camera, renderer, boardGroup, raycaster, pointer;
            let backMesh, cellMat, grid = [], currentCube = null, aimCol = 2, busy = false, hammerMode = false;
            let anims = [];

            function initThree() {
                const canvas = document.getElementById("game");
                if (!canvas) return;
                renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
                renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

                camera = new THREE.PerspectiveCamera(42, innerWidth / innerHeight, 0.1, 120);
                scene.add(new THREE.AmbientLight(0xfff4e0, 0.85));
                const sun = new THREE.DirectionalLight(0xfff2cc, 0.95);

                scene.add(sun);

                backMesh.position.z = -0.65;

                cellMat = new THREE.MeshLambertMaterial();

                for (let c = 0; c < COLS; c++)
                    for (let r = 0; r < ROWS; r++) {
                        const m = new THREE.Mesh(cellGeo, cellMat);

                        m.position.set(p.x, p.y, -0.42);

                    }
                updateBoardColorsLive();
                girl = createGirl();
                scene.add(girl);
                raycaster = new THREE.Raycaster();
                pointer = new THREE.Vector2();
                onResize();
                initScenery();
                updateGirlScreenPosition();
                addEventListener("resize", onResize);
                addEventListener("orientationchange", function() { setTimeout(onResize, 250); });

            }

            function updateBoardColorsLive() {
                const bData = SHOP.boards.find(function(b) { return b.id === save.equippedBoard; }) || SHOP.boards[0];
                backMesh.material.color.set(bData.back);
                cellMat.color.set(bData.cell);
            }

            function onResize() {
                renderer.setSize(innerWidth, innerHeight);
                camera.aspect = innerWidth / innerHeight;
                const dist = (BOARD_H / 2 + 3.5) / Math.tan(THREE.MathUtils.degToRad(camera.fov / 2));
                camera.position.set(0, -1.8, dist - 1.5);
                camera.lookAt(0, -1.2, 0);
                camera.updateProjectionMatrix();
                layoutScenery();
                updateGirlScreenPosition();
            }

            function cellPos(c, r) {
                return { x: -BOARD_W / 2 + CELL / 2 + c * (CELL + GAP), y: BOARD_H / 2 - CELL / 2 - r * (CELL + GAP) };
            }

            function numberTexture(value) {
                const cv = document.createElement("canvas");
                cv.width = cv.height = 128;
                const g = cv.getContext("2d");
                const skin = save.equippedCube;
                if (skin === 'wood') {
                    g.fillStyle = value >= 128 ? "#8B5A2B" : "#DEB887";
                    roundRect(g, 4, 4, 120, 120, 22);
                    g.fill();
                } else if (skin === 'whitered' || skin === 'whitegreen') {
                    g.fillStyle = "white";
                    roundRect(g, 4, 4, 120, 120, 22);
                    g.fill();
                    g.fillStyle = skin === 'whitered' ? "#D32F2F" : "#388E3C";
                    g.save();
                    g.clip();
                    for (let i = -128; i < 256; i += 32) { g.beginPath(); g.moveTo(i, 0); g.lineTo(i + 20, 0); g.lineTo(i - 108, 128); g.lineTo(i - 128, 128); g.fill(); }
                    g.restore();
                } else if (skin === 'zebra') {
                    g.fillStyle = "white";
                    roundRect(g, 4, 4, 120, 120, 22);
                    g.fill();
                    g.fillStyle = "#111";
                    g.save();
                    g.clip();
                    for (let i = 0; i < 128; i += 24) { g.beginPath(); g.moveTo(0, i); g.bezierCurveTo(40, i + 15, 80, i - 15, 128, i); g.lineTo(128, i + 10); g.bezierCurveTo(80, i - 5, 40, i + 25, 0, i + 10); g.fill(); }
                    g.restore();
                } else if (skin === 'rainbow') {
                    let grad = g.createLinearGradient(0, 0, 128, 128);
                    ['red', 'orange', 'yellow', 'green', 'cyan', 'blue', 'purple'].forEach(function(c, i) { grad.addColorStop(i / 6, c); });
                    g.fillStyle = grad;
                    roundRect(g, 4, 4, 120, 120, 22);
                    g.fill();
                } else if (skin === 'gold') {
                    let grad = g.createRadialGradient(64, 64, 0, 64, 64, 90);
                    grad.addColorStop(0, "#FFF59D"); grad.addColorStop(0.6, "#FBC02D"); grad.addColorStop(1, "#F57F17");
                    g.fillStyle = grad;
                    roundRect(g, 4, 4, 120, 120, 22);
                    g.fill();
                } else if (skin === 'neon') {
                    g.fillStyle = "#111";
                    roundRect(g, 4, 4, 120, 120, 22);
                    g.fill();
                    g.strokeStyle = "hsl(" + ((Math.log2(value) * 30) % 360) + ", 100%, 50%)";
                    g.lineWidth = 6;
                    g.stroke();
                } else if (skin === 'galaxy') {
                    g.fillStyle = "#1A0B2E";
                    roundRect(g, 4, 4, 120, 120, 22);
                    g.fill();
                    g.fillStyle = "white";
                    for (let i = 0; i < 30; i++) { g.beginPath(); g.arc(Math.random() * 128, Math.random() * 128, Math.random() * 2, 0, 7); g.fill(); }
                } else if (skin === 'ice') {
                    let grad = g.createLinearGradient(0, 0, 128, 128);
                    grad.addColorStop(0, "#E0F7FA"); grad.addColorStop(1, "#00BCD4");
                    g.fillStyle = grad;
                    roundRect(g, 4, 4, 120, 120, 22);
                    g.fill();
                } else if (skin === 'lava') {
                    let grad = g.createLinearGradient(0, 0, 128, 128);
                    grad.addColorStop(0, "#FF5722"); grad.addColorStop(1, "#FFC107");
                    g.fillStyle = grad;
                    roundRect(g, 4, 4, 120, 120, 22);
                    g.fill();
                } else {
                    g.fillStyle = "#111";
                    roundRect(g, 4, 4, 120, 120, 22);
                    g.fill();
                }
                const badgeSkins = ['whitered', 'whitegreen', 'zebra', 'rainbow', 'galaxy', 'neon', 'ice', 'lava', 'gold'];
                const hasBadge = badgeSkins.indexOf(skin) !== -1;
                if (hasBadge) {
                    g.save();
                    g.shadowColor = "rgba(0,0,0,0.35)"; g.shadowBlur = 7; g.shadowOffsetY = 2;
                    g.beginPath(); g.arc(64, 66, 37, 0, Math.PI * 2);
                    g.fillStyle = "rgba(255,255,255,0.96)"; g.fill();
                    g.restore();
                    g.lineWidth = 3; g.strokeStyle = "rgba(0,0,0,0.12)";
                    g.beginPath(); g.arc(64, 66, 37, 0, Math.PI * 2); g.stroke();
                }
                g.font = hasBadge ? ("800 " + (value >= 1024 ? 30 : value >= 128 ? 36 : 44) + "px 'Baloo 2', sans-serif") : ("800 " + (value >= 1024 ? 42 : value >= 128 ? 50 : 60) + "px 'Baloo 2', sans-serif");
                g.textAlign = "center"; g.textBaseline = "middle";
                g.fillStyle = hasBadge ? "#2F1B0D" : (skin === 'wood' ? (value >= 128 ? "#FFF" : "#000") : "#FFF");
                g.fillText(value, 64, hasBadge ? 66 : 68);
                const t = new THREE.CanvasTexture(cv);
                t.anisotropy = 4;
                return t;
            }

            function roundRect(g, x, y, w, h, r) {
                g.beginPath();
                g.moveTo(x + r, y);
                g.arcTo(x + w, y, x + w, y + h, r);
                g.arcTo(x + w, y + h, x, y + h, r);
                g.arcTo(x, y + h, x, y, r);
                g.arcTo(x, y, x + w, y, r);
                g.closePath();
            }

            function makeCube(value) {
                const tex = numberTexture(value);
                const m = new THREE.Mesh(new THREE.BoxGeometry(CELL * 0.92, CELL * 0.92, CELL * 0.92), new THREE.MeshLambertMaterial({ map: tex, color: 0xdddddd }));
                m.userData.value = value;
                return m;
            }

            function tween(obj, to, dur, ease, done) {
                const from = {};
                for (const k in to) from[k] = obj[k];
                anims.push({ obj: obj, from: from, to: to, dur: dur, t: 0, ease: ease || function(t) { return 1 - Math.pow(1 - t, 3); }, done: done });
            }

            function stepAnims(dt) {
                for (let i = anims.length - 1; i >= 0; i--) {
                    const a = anims[i];
                    a.t += dt / a.dur;
                    const k = a.t >= 1 ? 1 : a.ease(a.t);
                    for (const p in a.to) a.obj[p] = a.from[p] + (a.to[p] - a.from[p]) * k;
                    if (a.t >= 1) { anims.splice(i, 1); if (a.done) a.done(); }
                }
            }

            function newBoard() {
                for (let c = 0; c < COLS; c++)
                    for (let r = 0; r < ROWS; r++) { if (grid[c] && grid[c][r]) boardGroup.remove(grid[c][r].mesh); }
                grid = [];
                for (let c = 0; c < COLS; c++) { grid.push(new Array(ROWS).fill(null)); }
                score = save.score || 0;
                updateHUD();
                for (let i = 0; i < levelPreset(level); i++) {
                    const c = Math.floor(Math.random() * COLS);
                    const r = colHeight(c);
                    if (r < 3) placeCube(c, r, [2, 4, 8, 16][Math.floor(Math.random() * 4)], true);
                }
                spawnCurrent();
                lastActionTime = performance.now();
            }

            function colHeight(c) { let h = 0; while (h < ROWS && grid[c][h]) h++; return h; }

            function placeCube(c, r, value, instant) {
                const cube = makeCube(value);
                const p = cellPos(c, r);
                cube.position.set(p.x, p.y, 0.1);
                boardGroup.add(cube);
                grid[c][r] = { value: value, mesh: cube };
                if (!instant) { cube.scale.set(.4, .4, .4); tween(cube.scale, { x: 1, y: 1, z: 1 }, 0.22); }
                return grid[c][r];
            }

            function spawnCurrent() {
                let maxOnBoard = 4;
                for (let c = 0; c < COLS; c++)
                    for (let r = 0; r < ROWS; r++) if (grid[c][r]) maxOnBoard = Math.max(maxOnBoard, grid[c][r].value);
                const pool = [];
                for (let v = 2; v <= Math.min(32, Math.max(4, maxOnBoard / 2)); v *= 2) pool.push(v, v, v === 2 ? v : 0);
                const vals = pool.filter(Boolean);
                currentCube = makeCube(vals[Math.floor(Math.random() * vals.length)]);
                currentCube.position.set(cellPos(aimCol, 0).x, launchY, 0.1);
                currentCube.scale.set(.3, .3, .3);
                boardGroup.add(currentCube);
                tween(currentCube.scale, { x: 1, y: 1, z: 1 }, 0.2);
            }

            function setAim(c, instant) {
                aimCol = Math.max(0, Math.min(COLS - 1, c));
                if (currentCube && !busy) {
                    const tx = cellPos(aimCol, 0).x;
                    if (instant) currentCube.position.x = tx;
                    else tween(currentCube.position, { x: tx }, 0.09);
                }
            }

            function launch() {
                if (busy || !currentCube) return;
                const c = aimCol;
                const h = colHeight(c);
                if (h >= ROWS) { gameOver(); return; }
                busy = true;
                lastActionTime = performance.now();
                playSound('drop');
                const eff = save.equippedEffect;
                if (eff !== 'eff_none') {
                    const wp = new THREE.Vector3();
                    currentCube.getWorldPosition(wp);
                    const etype = eff.replace('eff_', '');
                    if (etype === 'explode') spawnBurst(wp.x, wp.y - 0.3, wp.z, 'explode', 18);
                    else if (etype === 'confetti') spawnBurst(wp.x, wp.y - 0.3, wp.z, 'confetti', 20);
                    else spawnBurst(wp.x, wp.y - 0.3, wp.z, etype, 10);
                }
                const targetR = h;
                const p = cellPos(c, targetR);
                const cube = currentCube;
                currentCube = null;
                tween(cube.position, { y: p.y }, Math.max(0.13, Math.abs(cube.position.y - p.y) * 0.045), null, function() {
                    boardGroup.remove(cube);
                    const cell = placeCube(c, targetR, cube.userData.value, true);
                    cell.mesh.scale.set(1.15, 0.85, 1.15);
                    tween(cell.mesh.scale, { x: 1, y: 1, z: 1 }, 0.18);
                    resolveMerges([{ c: c, r: targetR }]).then(function() {
                        if (checkWin()) { busy = false; spawnCurrent(); setAim(aimCol); return; }
                        if (isBoardFull()) { gameOver(); return; }
                        busy = false;
                        spawnCurrent();
                        setAim(aimCol);
                    });
                });
            }

            function isBoardFull() { for (let c = 0; c < COLS; c++) for (let r = 0; r < ROWS; r++) if (!grid[c][r]) return false; return true; }

            function boardFillRatio() {
                let filled = 0;
                for (let c = 0; c < COLS; c++) for (let r = 0; r < ROWS; r++) if (grid[c] && grid[c][r]) filled++;
                return filled / (COLS * ROWS);
            }

            function resolveMerges(queue) {
                return new Promise(function(resolveAll) {
                    (function next() {
                        if (!queue.length) { persist(); resolveAll(); return; }
                        const item = queue.shift();
                        const c = item.c, r = item.r;
                        const cell = grid[c][r];
                        if (!cell) { next(); return; }
                        const same = [{ c: c - 1, r: r }, { c: c + 1, r: r }, { c: c, r: r - 1 }, { c: c, r: r + 1 }]
                            .filter(function(n) { return n.c >= 0 && n.c < COLS && n.r >= 0 && n.r < ROWS && grid[n.c][n.r] && grid[n.c][n.r].value === cell.value; });
                        if (!same.length) { next(); return; }
                        const newVal = cell.value * Math.pow(2, same.length);
                        score += newVal;
                        save.score = score;
                        coins += 1;
                        save.coins = coins;
                        updateHUD();
                        let left = same.length;
                        const tp = cellPos(c, r);
                        same.forEach(function(n) {
                            const m = grid[n.c][n.r].mesh;
                            grid[n.c][n.r] = null;
                            tween(m.position, { x: tp.x, y: tp.y }, 0.14, null, function() { boardGroup.remove(m); if (--left === 0) afterCollapse(); });
                            tween(m.scale, { x: .5, y: .5, z: .5 }, 0.14);
                        });

                        function afterCollapse() {
                            playSound('merge');
                            const eff = save.equippedEffect;
                            if (eff !== 'eff_none') {
                                const wp = new THREE.Vector3();
                                cell.mesh.getWorldPosition(wp);
                                const etype = eff.replace('eff_', '');
                                if (etype === 'explode') spawnBurst(wp.x, wp.y, wp.z, 'explode', 20);
                                else if (etype === 'confetti') spawnBurst(wp.x, wp.y, wp.z, 'confetti', 25);
                                else spawnBurst(wp.x, wp.y, wp.z, etype, 12);
                            }
                            if (newVal >= 64 && winTime <= 0) { reactionTime = 1.2; showSpeech(TT().wow(newVal), 1800); }
                            boardGroup.remove(cell.mesh);
                            grid[c][r] = null;
                            const up = placeCube(c, r, newVal);
                            up.mesh.scale.set(1.35, 1.35, 1.35);
                            tween(up.mesh.scale, { x: 1, y: 1, z: 1 }, 0.22);
                            const moved = [];
                            for (let xc = 0; xc < COLS; xc++) {
                                let write = 0;
                                for (let xr = 0; xr < ROWS; xr++) {
                                    if (grid[xc][xr]) {
                                        if (xr !== write) {
                                            grid[xc][write] = grid[xc][xr];
                                            grid[xc][xr] = null;
                                            tween(grid[xc][write].mesh.position, { y: cellPos(xc, write).y }, 0.15);
                                            moved.push({ c: xc, r: write });
                                        }
                                        write++;
                                    }
                                }
                            }
                            queue.push({ c: c, r: r });
                            moved.forEach(function(mv) { queue.push(mv); });
                            setTimeout(next, 120);
                        }
                    })();
                });
            }

            let winTimer = null;
            let winShown = false;

            function checkWin() {
                const t = levelTarget(level);
                let win = false;
                for (let c = 0; c < COLS; c++) for (let r = 0; r < ROWS; r++) if (grid[c][r] && grid[c][r].value >= t) { win = true; break; }
                if (!win) return false;
                if (!winShown) {
                    winShown = true;
                    coins += 25; save.coins = coins;
                    best = Math.max(best, score); save.best = best;
                    save.level = level + 1;
                    persist(); updateHUD();
                    document.getElementById("winText").innerHTML = TT().win_text(t);
                    playWinSound();
                    winTime = 6.0;
                    showSpeech(TT().win_speech, 3800);
                    speak(TT().win_say);
                    if (winTimer) clearTimeout(winTimer);
                    winTimer = setTimeout(function() { document.getElementById("winModal").classList.remove("hidden"); winTimer = null; }, 3500);
                }
                return true;
            }

            function gameOver() {
                busy = true;
                best = Math.max(best, score); save.best = best; save.score = 0; persist();
                showSpeech(TT().lose_speech, 2500);
                speak(TT().lose_say);
                document.getElementById("loseText").innerHTML = TT().lose_text(score);
                document.getElementById("loseModal").classList.remove("hidden");
            }

            function onTap(e) {
                if (document.querySelector(".overlay:not(.hidden)")) return;
                lastActionTime = performance.now();
                const cx = (e.touches && e.touches[0]) ? e.touches[0].clientX : e.clientX;
                const cy = (e.touches && e.touches[0]) ? e.touches[0].clientY : e.clientY;
                const x = cx / innerWidth * 2 - 1;
                const y = -(cy / innerHeight * 2 - 1);
                pointer.set(x, y);
                raycaster.setFromCamera(pointer, camera);
                if (girl) {
                    const hits = raycaster.intersectObject(girl, true);
                    if (hits.length > 0 && winTime <= 0) {
                        giggleSFX();
                        reactionTime = 1.0;
                        const pick = TT().greetings[Math.floor(Math.random() * TT().greetings.length)];
                        showSpeech(pick, 1800);
                        speak(pick.replace(/[^\u0370-\u03FF\u1F00-\u1FFFa-zA-Z' ;!?]/g, '').trim());
                        return;
                    }
                }
                const hit = new THREE.Vector3();
                const boardNormal = new THREE.Vector3(0, 0, 1).applyQuaternion(boardGroup.quaternion);
                const plane = new THREE.Plane();
                plane.setFromNormalAndCoplanarPoint(boardNormal, boardGroup.position);
                raycaster.ray.intersectPlane(plane, hit);
                boardGroup.worldToLocal(hit);
                const c = Math.max(0, Math.min(COLS - 1, Math.round((hit.x + BOARD_W / 2 - CELL / 2) / (CELL + GAP))));
                const r = Math.round((BOARD_H / 2 - CELL / 2 - hit.y) / (CELL + GAP));
                if (hammerMode) {
                    if (r >= 0 && r < ROWS && grid[c][r]) {
                        hammerMode = false;
                        const m = grid[c][r].mesh;
                        grid[c][r] = null;
                        tween(m.scale, { x: .01, y: .01, z: .01 }, 0.18, null, function() { boardGroup.remove(m); });
                        busy = true;
                        setTimeout(function() { resolveMerges([]).then(function() { busy = false; updateHUD(); persist(); }); }, 180);
                        playSound('hammer');
                    } else { hammerMode = false; updateHUD(); }
                    return;
                }
                setAim(c, true);
                launch();
            }

            document.getElementById("btnShuffle").onclick = function() {

            document.getElementById("btnMagnet").onclick = function() {
                if (busy) return;
                showAd(function() {
                    let tilesByVal = {};
                    for (let c = 0; c < COLS; c++) for (let r = 0; r < ROWS; r++) if (grid[c][r]) { let v = grid[c][r].value; if (!tilesByVal[v]) tilesByVal[v] = []; tilesByVal[v].push({ c: c, r: r, cell: grid[c][r] }); }
                    let mg = Object.keys(tilesByVal).map(function(k) { return tilesByVal[k]; }).filter(function(g) { return g.length > 1; });
                    if (!mg.length) { toast(TT().no_pairs); return; }
                    busy = true;
                    playSound('magnet');
                    let animsP = 0;
                    mg.forEach(function(group) {
                        const trg = group[0];
                        trg.newVal = trg.cell.value * Math.pow(2, group.length - 1);
                        group.slice(1).forEach(function(t) {
                            const m = t.cell.mesh;
                            grid[t.c][t.r] = null;
                            const tp = cellPos(trg.c, trg.r);
                            animsP++;
                            tween(m.position, { x: tp.x, y: tp.y, z: 1.0 }, 0.35, null, function() { boardGroup.remove(m); if (--animsP === 0) finMagnet(mg); });
                            tween(m.scale, { x: 0.3, y: 0.3, z: 0.3 }, 0.35);
                        });
                    });
                });
            };

            function finMagnet(mg) {
                playSound('merge');
                mg.forEach(function(g) {
                    const trg = g[0];
                    boardGroup.remove(trg.cell.mesh);
                    grid[trg.c][trg.r] = null;
                    score += trg.newVal; save.score = score;
                    const up = placeCube(trg.c, trg.r, trg.newVal);
                    up.mesh.scale.set(1.5, 1.5, 1.5);
                    tween(up.mesh.scale, { x: 1, y: 1, z: 1 }, 0.25);
                });
                setTimeout(function() { resolveMerges([]).then(function() { busy = false; updateHUD(); persist(); }); }, 250);
            }

                arr.forEach(function(item) {
                    const isOwned = save[props.owned] && save[props.owned].indexOf(item.id) !== -1;

                    const el = document.createElement('div');

                    if (!isOwned && item.price > 0) {

            let toastTimer;
