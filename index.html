<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Μπισκότο · Δες και κέρδισε</title>
    <link rel="icon" type="image/png" href="index.png">
    
    <!-- Google AdSense (δικό σου) · fluid & in-feed για βίντεο -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3186700611266549" crossorigin="anonymous"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(145deg, #0f0c1f, #1e1a35);
            color: #f9f2e7;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 10px 30px;
            min-height: 100vh;
        }
        .container {
            max-width: 700px;
            width: 100%;
        }

        /* header - μικρότερος τίτλος */
        .header {
            text-align: center;
            margin: 5px 0 15px;
        }
        .header h1 {
            font-size: clamp(2rem, 8vw, 3rem);
            font-weight: 800;
            background: linear-gradient(145deg, #ffd966, #ff9366);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.3px;
        }
        .header p {
            background: #292f4a;
            padding: 8px 20px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 600;
            border: 2px solid #febf5e;
            display: inline-block;
            margin-top: 5px;
        }

        /* διαφημίσεις fluid */
        .ad-box {
            margin: 20px auto;
            width: 100%;
            border-radius: 36px;
            overflow: hidden;
            box-shadow: 0 20px 35px #000000aa;
            border: 4px solid #fcba5c;
            background: #181e34;
        }
        .ad-box ins {
            display: block;
            width: 100%;
        }

        /* ΜΠΙΣΚΟΤΟ - μικρότερος τίτλος */
        .cookie-section {
            background: #1f253f;
            border-radius: 70px 70px 40px 40px;
            padding: 30px 15px;
            margin: 25px 0;
            border: 4px solid #fdbf68;
            text-align: center;
        }
        .cookie-title {
            font-size: 1.8rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .cookie-title span {
            background: #f1b354;
            color: #171f38;
            padding: 5px 20px;
            border-radius: 50px;
            font-size: 1.4rem;
        }

        /* μπισκότο */
        .fortune-cookie {
            background: #e5c28e;
            background-image: radial-gradient(circle at 30% 30%, #f5e1b5, #c9a15b);
            width: 200px;
            height: 150px;
            border-radius: 50% 50% 40% 40% / 60% 60% 30% 30%;
            margin: 15px auto;
            box-shadow: 0 20px 0 #a57c47, 0 30px 30px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .fortune-cookie:active {
            transform: scale(0.96);
            box-shadow: 0 8px 0 #a57c47, 0 20px 25px black;
        }
        .cookie-emoji {
            font-size: 5.5rem;
            filter: drop-shadow(0 10px 8px #4f3e26);
        }
        .cookie-message {
            background: #fef7e0;
            color: #2e1f0b;
            padding: 15px 20px;
            border-radius: 50px;
            font-size: 1.4rem;
            font-weight: 700;
            border: 4px solid #b8560e;
            max-width: 320px;
            margin: 20px auto 10px;
            box-shadow: 0 6px 0 #7b4314;
        }

        /* GOOGLE VIDEO AD (δικό σου) */
        .video-ad-container {
            margin: 20px auto;
            max-width: 500px;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 15px 30px black;
            border: 4px solid #fdc859;
            display: none; /* αρχικά κρυφό */
            background: #0a0c1a;
        }
        /* in-feed διαφήμιση (κατάλληλη για βίντεο) */
        .video-ad-container ins {
            display: block;
            width: 100%;
        }

        /* ΦΟΡΜΑ - κλειδωμένη */
        .entry-block {
            background: #1b2140;
            border-radius: 60px;
            padding: 25px 20px;
            border: 4px solid #fdcc6b;
            margin: 25px 0 20px;
            opacity: 0.6;
            pointer-events: none;
            transition: 0.3s;
        }
        .entry-block.unlocked {
            opacity: 1;
            pointer-events: all;
            box-shadow: 0 0 20px #ffd966;
        }
        .entry-block h3 {
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
        }
        .entry-flex {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 20px 0 10px;
        }
        .entry-flex input {
            padding: 16px 22px;
            border-radius: 60px;
            border: 4px solid #fbbf4d;
            background: #f0f3ff;
            font-size: 1.1rem;
            font-weight: 600;
            outline: none;
            width: 100%;
        }
        .entry-flex button {
            background: #10b981;
            border: none;
            padding: 18px 15px;
            border-radius: 60px;
            font-size: 1.8rem;
            font-weight: 800;
            color: #022c22;
            border: 5px solid #bef264;
            box-shadow: 0 8px 0 #047857;
            cursor: pointer;
            transition: 0.07s;
            width: 100%;
        }
        .entry-flex button:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #047857;
        }
        .feedback-message {
            font-size: 1.3rem;
            padding: 15px;
            border-radius: 50px;
            text-align: center;
            font-weight: 700;
            margin: 10px 0 5px;
            background: #d0f0c0;
            color: #1b4a1b;
            border: 4px solid #ffd966;
        }
        .hidden-feedback {
            display: none;
        }

        .gift-note {
            background: #2a3153;
            border-radius: 50px;
            padding: 15px;
            text-align: center;
            border: 3px solid #fbbf24;
            font-size: 1.1rem;
        }
        .footer-note {
            text-align: center;
            padding: 20px 10px 5px;
            border-top: 4px solid #f9c45a;
            margin-top: 15px;
            color: #cbc2ff;
            font-size: 0.9rem;
        }
        @media (max-width: 450px) {
            .cookie-title { font-size: 1.5rem; }
            .fortune-cookie { width: 170px; height: 130px; }
            .cookie-emoji { font-size: 4.5rem; }
            .cookie-message { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <header class="header">
        <h1>🍪 μπισκότο</h1>
        <p>σπάσε, δες βίντεο, συμμετέχεις</p>
    </header>

    <!-- 1η fluid διαφήμιση -->
    <div class="ad-box">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-format="fluid"
             data-ad-layout-key="-fb+5w+4e-db+86"
             data-ad-client="ca-pub-3186700611266549"
             data-ad-slot="3969235710"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <!-- ΤΜΗΜΑ ΜΠΙΣΚΟΤΟΥ (με λογοπαίγνια) -->
    <div class="cookie-section">
        <div class="cookie-title">
            <span>κινέζικο</span>
            🥠 μπισκότο 🥠
        </div>

        <div class="fortune-cookie" id="fortuneCookie">
            <span class="cookie-emoji" id="cookieEmoji">🥠</span>
        </div>
        <div class="cookie-message" id="cookieMessage">πάτα να σπάσει!</div>
    </div>

    <!-- GOOGLE VIDEO AD (δικό σου, in-feed) -->
    <div class="video-ad-container" id="videoAdContainer">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-format="fluid"
             data-ad-layout-key="-hz-7+1t-5x+15"
             data-ad-client="ca-pub-3186700611266549"
             data-ad-slot="3969235710"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <!-- 2η fluid διαφήμιση -->
    <div class="ad-box">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-format="fluid"
             data-ad-layout-key="-fb+5w+4e-db+86"
             data-ad-client="ca-pub-3186700611266549"
             data-ad-slot="3969235710"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <!-- ΦΟΡΜΑ ΣΥΜΜΕΤΟΧΗΣ (κλειδωμένη) -->
    <div class="entry-block" id="entryBlock">
        <h3>✍️ συμμετοχή</h3>
        
        <!-- Φόρμα που στέλνει στο Google Sheets μέσω FormSubmit -->
        <form action="https://formsubmit.co/6ae291f8020d6a4e62242119b18a2f4f" method="POST" id="entryForm">
            <input type="hidden" name="_subject" value="Νέα συμμετοχή από μπισκότο">
            <input type="hidden" name="_next" value="https://games-support.franklymadear.com/">
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_template" value="box">
            
            <!-- Αυτά τα πεδία θα πάνε αυτόματα στο Google Sheets -->
            <div class="entry-flex">
                <input type="text" name="Όνομα" id="nameField" placeholder="το όνομά σου *" required>
                <input type="email" name="Email" id="emailField" placeholder="το email σου *" required>
                <!-- κρυφό πεδίο με timestamp -->
                <input type="hidden" name="Ημερομηνία" id="dateField">
                <input type="hidden" name="Μήνυμα_μπισκότου" id="fortuneField">
                <button type="submit">ΣΥΜΜΕΤΟΧΗ</button>
            </div>
        </form>

        <div id="feedbackMessage" class="feedback-message hidden-feedback"></div>
        <p style="color:#b6a9ff; font-size:0.9rem; margin-top:10px;">✔ πρώτα σπάσε το μπισκότο και δες το βίντεο</p>
    </div>

    <!-- 3η fluid διαφήμιση -->
    <div class="ad-box">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-format="fluid"
             data-ad-layout-key="-fb+5w+4e-db+86"
             data-ad-client="ca-pub-3186700611266549"
             data-ad-slot="3969235710"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div class="gift-note">
        🎁 δωροεπιταγές Iris / PayPal – 50% των εσόδων από διαφημίσεις
    </div>

    <footer class="footer-note">
        <p>✅ Οι συμμετοχές αποθηκεύονται αυτόματα στο Google Sheets</p>
    </footer>
</div>

<script>
    (function() {
        // ---------- ΜΠΙΣΚΟΤΟ ΜΕ ΛΟΓΟΠΑΙΓΝΙΑ ----------
        const cookieEl = document.getElementById('fortuneCookie');
        const cookieEmoji = document.getElementById('cookieEmoji');
        const cookieMessage = document.getElementById('cookieMessage');
        const videoContainer = document.getElementById('videoAdContainer');
        const entryBlock = document.getElementById('entryBlock');
        const fortuneField = document.getElementById('fortuneField');
        
        // ΛΟΓΟΠΑΙΓΝΙΑ / ΑΣΤΕΙΑ ΜΗΝΥΜΑΤΑ (δικά σου)
        const fortunes = [
            '🥠 "Μπισκότο λέει: δήλωσε συμμετοχή, μην είσαι μπισκότο!"',
            '🍪 "Σπάσε με, αλλά μετά τρέχα στο βίντεο!"',
            '🎰 "Το μπισκότο προβλέπει: ένα δώρο σε περιμένει..."',
            '⭐ "Κινέζικη σοφία: όποιος πατάει μπισκότο, κερδίζει!"',
            '💰 "Το ταμείο λέει: 50% των εσόδων σε εσένα!"',
            '📺 "Μετά από αυτό, δες το βίντεο! (το θέλει η τύχη)"',
            '🎉 "Μπισκότο-χρησμός: θα λάβεις email νίκης στο μέλλον."',
            '✨ "Το μπισκότο αστράφτει... μήπως είσαι ο τυχερός;"',
            '🍀 "Σπάσε με και η τύχη θα σου γνέψει."',
            '🎁 "Από μπισκότο σε δώρο: μια μικρή διαδρομή!"'
        ];

        let cookieOpened = false;

        cookieEl.addEventListener('click', function() {
            if (cookieOpened) return;

            // Αλλάζει emoji σε σπασμένο μπισκότο
            cookieEmoji.textContent = '🍪'; 
            const randomMsg = fortunes[Math.floor(Math.random() * fortunes.length)];
            cookieMessage.textContent = randomMsg;
            
            // Αποθήκευση του μηνύματος για να σταλεί με τη φόρμα
            if (fortuneField) fortuneField.value = randomMsg;

            // Εμφάνιση video ad container (Google AdSense in-feed)
            videoContainer.style.display = 'block';

            // Μετά από 6 δευτερόλεπτα ξεκλειδώνει η φόρμα
            setTimeout(() => {
                entryBlock.classList.add('unlocked');
            }, 6000);

            cookieOpened = true;
        });

        // ---------- ΣΥΝΔΕΣΗ ΜΕ GOOGLE SHEETS (μέσω FormSubmit + hidden fields) ----------
        const form = document.getElementById('entryForm');
        const feedbackDiv = document.getElementById('feedbackMessage');
        const nameInput = document.getElementById('nameField');
        const emailInput = document.getElementById('emailField');
        const dateField = document.getElementById('dateField');

        // Γέμισμα ημερομηνίας
        const now = new Date();
        dateField.value = now.toLocaleString('el-GR');

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const nameVal = nameInput.value.trim();
            const emailVal = emailInput.value.trim();

            if (!nameVal || !emailVal) {
                feedbackDiv.innerText = '⚠️ Συμπλήρωσε όνομα και email.';
                feedbackDiv.classList.remove('hidden-feedback');
                return;
            }
            if (!emailVal.includes('@') || emailVal.indexOf('.') === -1) {
                feedbackDiv.innerText = '📧 Βάλε σωστό email.';
                feedbackDiv.classList.remove('hidden-feedback');
                return;
            }

            // Αποστολή με fetch (παραμένουμε στη σελίδα)
            const formData = new FormData(form);

            fetch('https://formsubmit.co/6ae291f8020d6a4e62242119b18a2f4f', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (response.ok) {
                    feedbackDiv.innerText = '🎉 Ευχαριστούμε! Η συμμετοχή σου αποθηκεύτηκε στο Google Sheets. Καλή τύχη! 🎉';
                    feedbackDiv.classList.remove('hidden-feedback');
                    
                    nameInput.value = '';
                    emailInput.value = '';

                    setTimeout(() => {
                        feedbackDiv.classList.add('hidden-feedback');
                    }, 8000);
                } else {
                    feedbackDiv.innerText = '❌ Σφάλμα. Δοκίμασε ξανά.';
                    feedbackDiv.classList.remove('hidden-feedback');
                }
            })
            .catch(() => {
                feedbackDiv.innerText = '❌ Προβλημα σύνδεσης.';
                feedbackDiv.classList.remove('hidden-feedback');
            });
        });
    })();
</script>

<!-- AdSense push -->
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</body>
</html>
