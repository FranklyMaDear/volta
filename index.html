<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🪐 Connect Four — Galactic Edition</title>
    <meta name="theme-color" content="#0a0e27">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { overflow: hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: #000010;
            position: relative;
            touch-action: manipulation;
        }
        #starCanvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }
        .shooting-star {
            position: fixed; width: 3px; height: 80px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.9), rgba(255,255,255,0));
            border-radius: 50%; z-index: 1; pointer-events: none;
            animation: shoot linear forwards; transform-origin: top center;
        }
        @keyframes shoot {
            0%   { opacity: 1; transform: translate(0,0) rotate(-35deg); }
            70%  { opacity: 1; }
            100% { opacity: 0; transform: translate(-400px,600px) rotate(-35deg); }
        }
        .nebula-particle {
            position: fixed; border-radius: 50%; z-index: 0; pointer-events: none;
            animation: nebulaFloat linear infinite; filter: blur(2px);
        }
        @keyframes nebulaFloat {
            0%   { transform: translate(0,0) scale(1); opacity: 0.6; }
            50%  { transform: translate(30px,-40px) scale(1.5); opacity: 0.2; }
            100% { transform: translate(-20px,20px) scale(1); opacity: 0.6; }
        }

        /* ===== GAME LAYOUT ===== */
        .game-wrapper {
            display: flex; width: 100%; min-height: 100vh;
            justify-content: center; align-items: center;
            padding: 10px; position: relative; z-index: 50;
        }
        .game-container {
            text-align: center;
            background: rgba(14,16,39,0.92);
            border-radius: 22px; padding: 16px 14px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            width: 100%; max-width: 500px; margin: 6px;
            border: 2px solid rgba(132,204,22,0.3);
            backdrop-filter: blur(10px);
        }

        /* ===== HUD TOP ===== */
        .hud-top {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; gap: 6px;
        }
        .hud-level {
            font-size: 0.75rem; font-weight: 800; letter-spacing: 2px;
            color: #84cc16; text-shadow: 0 0 10px rgba(132,204,22,0.6);
            background: rgba(132,204,22,0.1); border: 1px solid rgba(132,204,22,0.3);
            padding: 5px 10px; border-radius: 20px; white-space: nowrap;
        }
        .hud-zone {
            font-size: 0.65rem; font-weight: 700; letter-spacing: 1px;
            color: rgba(255,255,255,0.45); text-transform: uppercase;
            flex: 1; text-align: center;
        }
        .hud-match-score {
            font-size: 0.8rem; font-weight: 800; color: #e8e8ed;
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
            padding: 5px 12px; border-radius: 20px; white-space: nowrap;
        }
        h1 {
            color: #84cc16; margin-bottom: 12px; font-size: 1.7rem; font-weight: 800;
            letter-spacing: 2px; text-shadow: 0 0 20px rgba(132,204,22,0.5);
        }

        /* ===== PLAYERS INFO ===== */
        .players-info {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px; padding: 0 4px; gap: 5px;
        }
        .player {
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            flex: 1; min-width: 70px;
        }
        .player-disc {
            width: 33px; height: 33px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.5);
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            position: relative; overflow: visible;
            transition: transform 0.2s ease;
        }
        /* Tier 1 - plain sphere */
        .player-disc.red   { background: radial-gradient(circle at 30% 30%, #ff6b6b, #c0392b); }
        .player-disc.yellow { background: radial-gradient(circle at 30% 30%, #ffd93d, #f39c12); }
        /* Tier 2 ring */
        .player-disc.tier2::after {
            content: ''; position: absolute;
            top: 50%; left: 50%; width: 130%; height: 40%;
            border: 2.5px solid rgba(255,255,255,0.55);
            border-radius: 50%; transform: translate(-50%,-50%) rotateX(70deg);
            box-shadow: 0 0 6px rgba(200,220,255,0.5);
        }
        /* Tier 3 glow */
        .player-disc.tier3 { animation: discAura 2s ease-in-out infinite; }
        @keyframes discAura {
            0%,100% { box-shadow: 0 0 10px 3px var(--aura,rgba(255,200,50,0.6)); }
            50%      { box-shadow: 0 0 22px 8px var(--aura,rgba(255,200,50,0.9)); }
        }
        .player-disc.red.tier3   { --aura: rgba(255,80,80,0.7); }
        .player-disc.yellow.tier3 { --aura: rgba(255,220,0,0.7); }

        .player span { font-size: 0.8rem; font-weight: 700; color: #e8e8ed; }
        .player.active span { color: #84cc16; font-weight: 800; }
        .player.active .player-disc { transform: scale(1.15); }
        .scores { flex: 1; display: flex; justify-content: center; align-items: center; }
        .scores .score {
            font-size: 1.5rem; font-weight: bold; color: #e8e8ed;
            background: rgba(255,255,255,0.05); padding: 6px 14px;
            border-radius: 20px; min-width: 76px;
            border: 1px solid rgba(132,204,22,0.2);
        }

        /* ===== BOARD ===== */
        .board-container {
            background: linear-gradient(145deg, #1565c0, #0d47a1);
            padding: 12px; border-radius: 15px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.4), 0 6px 20px rgba(0,0,0,0.5);
            margin: 10px 0;
            position: relative; width: 100%; aspect-ratio: 7/6;
            border: 3px solid #0a3d91; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        /* The starCanvas shines through the board-container via its fixed position */
        .board {
            display: grid; grid-template-columns: repeat(7, 1fr);
            grid-template-rows: repeat(6, 1fr); gap: 6px;
            position: relative; z-index: 1;
            height: 95%; width: 95%; padding: 3px;
        }
        .slot {
            /* Transparent hole — starCanvas shows through */
            background: transparent;
            border-radius: 50%; cursor: pointer;
            position: relative;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.9), inset 0 -2px 4px rgba(255,255,255,0.04);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            transition: box-shadow 0.15s ease;
        }
        /* Dark overlay so empty slots look like space cutouts, not transparent */
        .slot::before {
            content: ''; position: absolute; inset: 0;
            background: rgba(0,0,12,0.88); border-radius: 50%;
            z-index: 0; pointer-events: none;
            transition: background 0.15s;
        }
        .slot:hover::before, .slot:active::before {
            background: rgba(0,0,40,0.7);
        }
        .disc {
            width: 85%; height: 85%; border-radius: 50%;
            box-shadow: inset 0 -4px 8px rgba(0,0,0,0.5), inset 0 2px 4px rgba(255,255,255,0.3), 0 3px 6px rgba(0,0,0,0.4);
            border: 2px solid rgba(255,255,255,0.4);
            position: relative; z-index: 2; opacity: 0;
        }
        .disc::before {
            content: ''; position: absolute; top: 12%; left: 12%; right: 12%; bottom: 12%;
            background: rgba(255,255,255,0.22); border-radius: 50%;
            filter: blur(1px); z-index: 3;
        }
        .disc.red    { background: radial-gradient(circle at 35% 35%, #ff5252, #c62828); opacity: 1; }
        .disc.yellow { background: radial-gradient(circle at 35% 35%, #ffeb3b, #f9a825); opacity: 1; }

        /* Tier 2 ring on board disc */
        .disc.ring::after {
            content: ''; position: absolute; inset: -4px;
            border: 2.5px solid rgba(200,230,255,0.55);
            border-radius: 50%; transform: rotateX(65deg) scaleY(0.4);
            box-shadow: 0 0 5px rgba(150,200,255,0.4);
        }
        /* Tier 3 glow on board disc */
        .disc.glow { animation: glowPulse 1.8s ease-in-out infinite; }
        .disc.red.glow    { --g: rgba(255,80,80,0.8); }
        .disc.yellow.glow { --g: rgba(255,220,0,0.8); }
        @keyframes glowPulse {
            0%,100% { box-shadow: 0 0 8px 2px var(--g,rgba(255,200,0,0.6)), inset 0 -4px 8px rgba(0,0,0,0.5); }
            50%      { box-shadow: 0 0 20px 6px var(--g,rgba(255,200,0,0.9)), inset 0 -4px 8px rgba(0,0,0,0.5); }
        }

        @keyframes discDrop {
            0%   { transform: translateY(-520px); opacity: 0; }
            60%  { transform: translateY(18px);   opacity: 1; }
            80%  { transform: translateY(-7px);   opacity: 1; }
            100% { transform: translateY(0);      opacity: 1; }
        }
        .disc.winner { animation: discPulse 0.9s infinite; }
        @keyframes discPulse {
            0%,100% { transform: scale(1); }
            50%     { transform: scale(1.1); }
        }

        /* ===== STATUS ===== */
        .status {
            margin: 10px 0; font-size: 1rem; font-weight: 700;
            color: #e8e8ed; min-height: 22px; padding: 10px;
            background: rgba(255,255,255,0.05); border-radius: 10px;
            border: 1px solid rgba(132,204,22,0.2); text-align: center;
        }
        .ai-thinking { color: #fbbf24; font-weight: bold; }

        /* ===== BUTTONS ===== */
        .game-buttons {
            display: flex; justify-content: center; align-items: center;
            gap: 8px; margin-top: 12px; padding: 0 4px; flex-wrap: wrap;
        }
        .game-btn {
            background: linear-gradient(135deg, #ff4081, #c51162);
            border: 2px solid #ff69b4; color: white;
            padding: 10px 18px; font-size: 0.82rem; border-radius: 40px;
            cursor: pointer; transition: all 0.2s ease;
            box-shadow: 0 4px 0 #880e4f, 0 6px 12px rgba(0,0,0,0.4);
            font-family: inherit; font-weight: 700;
            flex: 1; min-width: 110px; max-width: 150px;
        }
        .game-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #880e4f; }
        .game-btn:disabled { opacity: 0.45; pointer-events: none; }
        .game-btn.new-game {
            background: linear-gradient(135deg, #84cc16, #65a30d);
            border-color: #a3e635; box-shadow: 0 4px 0 #4d7c0f, 0 6px 12px rgba(0,0,0,0.4);
        }
        .game-btn.small-btn {
            background: linear-gradient(135deg, #f39c12, #d35400);
            border-color: #f1c40f; box-shadow: 0 4px 0 #b9770e, 0 6px 12px rgba(0,0,0,0.4);
            font-size: 0.72rem; padding: 8px 10px; min-width: 80px; max-width: 110px;
        }

        /* ===== CONFETTI ===== */
        @keyframes confettiFall {
            0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        .confetti {
            position: fixed; width: 6px; height: 6px; top: -10px;
            animation: confettiFall 3s linear forwards; z-index: 200; border-radius: 50%;
        }
        .confetti:nth-child(2n) { background: #f1c40f; }
        .confetti:nth-child(3n) { background: #2ecc71; }
        .confetti:nth-child(4n) { background: #3498db; }
        .confetti:nth-child(5n) { background: #9b59b6; }
        .confetti { background: #e74c3c; }

        /* ===== END-GAME MODAL ===== */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.82); z-index: 600;
            justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: #0b0e26; border: 2px solid rgba(132,204,22,0.4);
            border-radius: 22px; padding: 26px 20px 22px;
            width: 92%; max-width: 400px; max-height: 88vh; overflow-y: auto;
            position: relative; box-shadow: 0 0 50px rgba(132,204,22,0.15);
            animation: modalIn 0.3s ease;
        }
        @keyframes modalIn {
            from { transform: scale(0.85) translateY(20px); opacity: 0; }
            to   { transform: scale(1) translateY(0);      opacity: 1; }
        }
        .modal-galaxy-title {
            font-size: 1.3rem; font-weight: 800; letter-spacing: 1px;
            text-align: center; margin-bottom: 6px;
            text-shadow: 0 0 14px currentColor;
        }
        .modal-galaxy-title.win  { color: #84cc16; }
        .modal-galaxy-title.lose { color: #f87171; }
        .modal-galaxy-title.draw { color: #fbbf24; }

        /* Level Progress Bar */
        .progress-wrap { margin: 14px 0 10px; }
        .progress-label {
            display: flex; justify-content: space-between;
            font-size: 0.7rem; color: rgba(255,255,255,0.5);
            margin-bottom: 5px; font-weight: 700;
        }
        .progress-track {
            background: rgba(255,255,255,0.08); border-radius: 20px;
            height: 12px; overflow: hidden; border: 1px solid rgba(132,204,22,0.2);
        }
        .progress-bar {
            height: 100%; border-radius: 20px;
            background: linear-gradient(90deg, #65a30d, #a3e635);
            width: 0%; transition: width 0.9s cubic-bezier(0.22,1,0.36,1);
            position: relative;
        }
        .progress-bar.full::after {
            content: '💥'; position: absolute; right: -10px; top: -6px;
            font-size: 1.1rem; animation: boom 0.4s ease 0.9s both;
        }
        @keyframes boom { 0% { transform: scale(0); } 60% { transform: scale(1.4); } 100% { transform: scale(1); } }
        .progress-next {
            text-align: center; margin-top: 6px; font-size: 0.72rem;
            color: #84cc16; font-weight: 700; letter-spacing: 1px;
        }

        /* Battle Stats */
        .battle-stats {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 12px 14px; margin: 12px 0; text-align: left;
        }
        .battle-stats-title {
            font-size: 0.65rem; letter-spacing: 2px; color: rgba(255,255,255,0.4);
            font-weight: 700; text-transform: uppercase; margin-bottom: 8px;
        }
        .stat-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.78rem;
        }
        .stat-row:last-child { border-bottom: none; }
        .stat-label { color: rgba(255,255,255,0.45); font-weight: 600; }
        .stat-value { color: #e8e8ed; font-weight: 700; }

        /* Modal action button */
        .modal-action-btn {
            display: block; width: 100%; margin-top: 14px; padding: 13px;
            border-radius: 30px; border: none; cursor: pointer;
            font-family: inherit; font-size: 0.95rem; font-weight: 800;
            letter-spacing: 1px; transition: all 0.2s;
            box-shadow: 0 4px 0 #4d7c0f;
        }
        .modal-action-btn.win-btn {
            background: linear-gradient(135deg, #84cc16, #65a30d);
            color: #fff; box-shadow: 0 4px 0 #4d7c0f;
        }
        .modal-action-btn.lose-btn {
            background: linear-gradient(135deg, #f87171, #b91c1c);
            color: #fff; box-shadow: 0 4px 0 #7f1d1d;
        }
        .modal-action-btn.draw-btn {
            background: linear-gradient(135deg, #fbbf24, #d97706);
            color: #fff; box-shadow: 0 4px 0 #92400e;
        }
        .modal-action-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #4d7c0f; }

        /* ===== SCOREBOARD MODAL ===== */
        .score-modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.8); z-index: 550;
            justify-content: center; align-items: center;
            backdrop-filter: blur(4px);
        }
        .score-modal-overlay.open { display: flex; }
        .score-modal-box {
            background: #0e1027; border: 2px solid rgba(132,204,22,0.4);
            border-radius: 20px; padding: 22px 18px 18px;
            width: 92%; max-width: 420px; max-height: 80vh; overflow-y: auto;
            box-shadow: 0 0 40px rgba(132,204,22,0.15);
        }
        .modal-title {
            color: #84cc16; font-size: 1.15rem; font-weight: 800;
            letter-spacing: 2px; text-align: center; margin-bottom: 14px;
            text-shadow: 0 0 12px rgba(132,204,22,0.5);
        }
        .score-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
        .score-table th {
            color: #84cc16; font-weight: 700; padding: 6px 8px;
            border-bottom: 1px solid rgba(132,204,22,0.25);
            text-align: center; font-size: 0.7rem; letter-spacing: 1px;
        }
        .score-table td {
            color: #e8e8ed; padding: 7px 8px; text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .score-table tr:last-child td { border-bottom: none; }
        .score-table .today-row td { color: #84cc16; font-weight: 700; }
        .score-table .win  { color: #4ade80; font-weight: 700; }
        .score-table .loss { color: #f87171; font-weight: 700; }
        .no-history {
            color: rgba(255,255,255,0.35); font-size: 0.75rem;
            padding: 18px; text-align: center;
        }
        .modal-back-btn {
            display: block; width: 100%; margin-top: 16px; padding: 12px;
            background: linear-gradient(135deg, #84cc16, #65a30d);
            border: none; border-radius: 30px; color: #fff;
            font-size: 0.9rem; font-weight: 800; font-family: inherit;
            cursor: pointer; box-shadow: 0 4px 0 #4d7c0f; transition: all 0.2s;
            letter-spacing: 1px;
        }
        .modal-back-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #4d7c0f; }

        /* Endless win-streak badge */
        .endless-badge {
            display: inline-block; background: linear-gradient(135deg,#7b1fa2,#4a148c);
            border: 1px solid #ce93d8; border-radius: 20px; padding: 4px 12px;
            font-size: 0.72rem; font-weight: 800; color: #e1bee7;
            margin-bottom: 10px; letter-spacing: 1px;
        }

        /* ===== ENDLESS SECTION IN SCOREBOARD ===== */
        .endless-record {
            margin-top: 14px; background: rgba(123,31,162,0.12);
            border: 1px solid rgba(206,147,216,0.25); border-radius: 10px;
            padding: 10px 14px; text-align: center;
        }
        .endless-record-label { font-size: 0.65rem; letter-spacing: 2px; color: #ce93d8; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
        .endless-record-val { font-size: 1.6rem; font-weight: 800; color: #e1bee7; text-shadow: 0 0 10px rgba(206,147,216,0.6); }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .game-container { padding: 12px 8px; margin: 4px; max-width: 98vw; }
            h1 { font-size: 1.4rem; }
            .board { gap: 5px; height: 92%; width: 92%; }
            .player-disc { width: 28px; height: 28px; }
            .scores .score { font-size: 1.2rem; padding: 5px 10px; }
        }
        @media (max-width: 480px) {
            .game-btn { min-width: 90px; max-width: 120px; padding: 9px 10px; font-size: 0.76rem; }
        }
    </style>
</head>
<body>
<canvas id="starCanvas"></canvas>
<div class="game-wrapper">
    <div class="game-container">
        <!-- HUD Top -->
        <div class="hud-top">
            <div class="hud-level" id="hudLevel">LEVEL 1</div>
            <div class="hud-zone" id="hudZone">🚀 Νεοσύλλεκτος Αστροναύτης</div>
            <div class="hud-match-score" id="hudMatchScore">You 0 – 0 AI</div>
        </div>

        <h1>🪐 CONNECT FOUR</h1>

        <div class="players-info">
            <div class="player" id="player1">
                <div class="player-disc red" id="p1Disc"></div>
                <span>You</span>
            </div>
            <div class="scores"><div class="score" id="scoreDisplay">0 - 0</div></div>
            <div class="player" id="player2">
                <div class="player-disc yellow" id="p2Disc"></div>
                <span id="aiLabel">AI (Easy)</span>
            </div>
        </div>

        <div class="board-container"><div class="board" id="board"></div></div>
        <div class="status" id="status">Η σειρά σου</div>

        <div class="game-buttons">
            <button class="game-btn" id="restartBtn">↺ Επανεκκίνηση</button>
            <button class="game-btn new-game" id="newGameBtn">⊕ Νέο Παιχνίδι</button>
            <button class="game-btn small-btn" id="toggleFirstBtn">🤖 AI Πρώτο</button>
            <button class="game-btn small-btn" id="openScoreboardBtn"
                style="background:linear-gradient(135deg,#7b1fa2,#4a148c);border-color:#ce93d8;box-shadow:0 4px 0 #38006b;">🏆 Scores</button>
        </div>
    </div>
</div>

<!-- END-GAME MODAL -->
<div class="modal-overlay" id="endModal">
    <div class="modal-box">
        <div class="modal-galaxy-title" id="endTitle">🎉 Ο Γαλαξίας Κατακτήθηκε!</div>

        <div class="progress-wrap">
            <div class="progress-label">
                <span id="progressLabelLeft">Level Progress</span>
                <span id="progressLabelRight"></span>
            </div>
            <div class="progress-track">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="progress-next" id="progressNext"></div>
        </div>

        <div class="battle-stats">
            <div class="battle-stats-title">⚔️ Battle Stats</div>
            <div class="stat-row"><span class="stat-label">Κινήσεις Παίκτη</span><span class="stat-value" id="statMoves">0</span></div>
            <div class="stat-row"><span class="stat-label">Διάρκεια</span><span class="stat-value" id="statTime">0s</span></div>
            <div class="stat-row"><span class="stat-label">Πρώτος Κίνησε</span><span class="stat-value" id="statFirst">Εσύ</span></div>
        </div>

        <button class="modal-action-btn win-btn" id="endActionBtn">Επόμενη Αποστολή →</button>
    </div>
</div>

<!-- SCOREBOARD MODAL -->
<div class="score-modal-overlay" id="scoreModal">
    <div class="score-modal-box">
        <div class="modal-title">🏆 Score History</div>
        <div id="scoreboardContent"></div>
        <div class="endless-record">
            <div class="endless-record-label">🌌 Endless Win Streak Record</div>
            <div class="endless-record-val" id="endlessRecordDisplay">0</div>
        </div>
        <button class="modal-back-btn" id="closeScoreboardBtn">← Πίσω στο Παιχνίδι</button>
    </div>
</div>

<script>
(function () {
    /* ========== BACKGROUND ========== */
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    let stars = [], bgPaused = false, rafId = null, shootTimer = null;

    function resizeCanvas() { canvas.width = innerWidth; canvas.height = innerHeight; }
    function createStars(n) {
        stars = [];
        for (let i = 0; i < n; i++) stars.push({
            x: Math.random()*canvas.width, y: Math.random()*canvas.height,
            radius: Math.random()*2.5+0.5,
            baseBrightness: Math.random()*0.7+0.3,
            twinkleSpeed: Math.random()*0.02+0.005,
            twinkleOffset: Math.random()*Math.PI*2,
            driftX: (Math.random()-0.5)*0.3, driftY: (Math.random()-0.5)*0.3
        });
    }
    function drawStars(ts) {
        if (bgPaused) { rafId=null; return; }
        ctx.clearRect(0,0,canvas.width,canvas.height);
        stars.forEach(s => {
            const t = Math.sin(ts*s.twinkleSpeed+s.twinkleOffset)*0.3+0.7;
            const a = s.baseBrightness*t;
            ctx.beginPath(); ctx.arc(s.x,s.y,s.radius,0,Math.PI*2);
            ctx.fillStyle = `rgba(255,255,255,${a})`; ctx.fill();
            if (s.radius>1.5) {
                ctx.beginPath(); ctx.arc(s.x,s.y,s.radius*2.5,0,Math.PI*2);
                ctx.fillStyle = `rgba(180,200,255,${a*0.3})`; ctx.fill();
            }
            s.x+=s.driftX; s.y+=s.driftY;
            if (s.x<0) s.x=canvas.width; if (s.x>canvas.width) s.x=0;
            if (s.y<0) s.y=canvas.height; if (s.y>canvas.height) s.y=0;
        });
        rafId = requestAnimationFrame(drawStars);
    }
    function createShootingStar() {
        const el = document.createElement('div');
        el.className = 'shooting-star';
        el.style.left = Math.random()*80+'%';
        el.style.top  = Math.random()*40+'%';
        el.style.animationDuration = (Math.random()*1.5+1.5)+'s';
        document.body.appendChild(el);
        el.addEventListener('animationend', ()=>el.remove());
    }
    function scheduleShoot() {
        shootTimer = setTimeout(()=>{
            if (bgPaused){shootTimer=null;return;}
            createShootingStar(); scheduleShoot();
        }, Math.random()*5000+3000);
    }
    function createNebula(n) {
        const cols = ['rgba(132,204,22,0.12)','rgba(25,118,210,0.12)','rgba(255,64,129,0.08)',
                      'rgba(156,39,176,0.10)','rgba(255,235,59,0.08)'];
        for (let i=0;i<n;i++) {
            const p = document.createElement('div'); p.className='nebula-particle';
            const sz = Math.random()*120+60;
            p.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;
                background:${cols[Math.floor(Math.random()*cols.length)]};
                animation-duration:${Math.random()*12+8}s;animation-delay:${Math.random()*5}s;`;
            document.body.appendChild(p);
        }
    }
    function initBg() {
        resizeCanvas(); createStars(200);
        rafId = requestAnimationFrame(drawStars);
        createNebula(15); scheduleShoot();
        setTimeout(createShootingStar, 600);
    }
    addEventListener('resize', ()=>{ resizeCanvas(); createStars(200); });

    /* ========== AUDIO ========== */
    class GameAudio {
        constructor() { this.ctx=null; this.ok=false; }
        init() {
            if (this.ok) return;
            try { this.ctx=new(AudioContext||webkitAudioContext)(); this.ok=true; } catch(e){}
        }
        _run() { this.init(); if(this.ctx&&this.ctx.state==='suspended') try{this.ctx.resume();}catch(e){} }
        drop() {
            this._run(); if(!this.ctx) return;
            try {
                const now=this.ctx.currentTime, o=this.ctx.createOscillator(), g=this.ctx.createGain();
                o.connect(g); g.connect(this.ctx.destination); o.type='sine';
                o.frequency.setValueAtTime(180,now); o.frequency.exponentialRampToValueAtTime(60,now+0.12);
                g.gain.setValueAtTime(0.35,now); g.gain.exponentialRampToValueAtTime(0.01,now+0.18);
                o.start(now); o.stop(now+0.18);
            }catch(e){}
        }
        victory() {
            this._run(); if(!this.ctx) return;
            try {
                const now=this.ctx.currentTime;
                [{f:523.25,t:0,d:0.2},{f:659.25,t:0.15,d:0.2},{f:783.99,t:0.3,d:0.2},{f:1046.5,t:0.45,d:0.4}].forEach(n=>{
                    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
                    o.connect(g); g.connect(this.ctx.destination); o.type='sine';
                    o.frequency.setValueAtTime(n.f,now+n.t);
                    g.gain.setValueAtTime(0.2,now+n.t); g.gain.exponentialRampToValueAtTime(0.01,now+n.t+n.d);
                    o.start(now+n.t); o.stop(now+n.t+n.d);
                });
            }catch(e){}
        }
    }

    /* ========== LEVEL SYSTEM ========== */
    // Zones and their metadata
    const ZONE_DEFS = [
        { levels:[1,2,3,4],   name:'🚀 Νεοσύλλεκτος Αστροναύτης', diff:'easy',      tier:1 },
        { levels:[5,6,7,8],   name:'🛸 Κυβερνήτης Αστρόπλοιου',    diff:'medium',    tier:2 },
        { levels:[9,10,11,12],name:'👑 Κυρίαρχος του Γαλαξία',     diff:'veryhard',  tier:3 },
    ];
    const ENDLESS_LEVEL = 13;

    function getZoneForLevel(lvl) {
        if (lvl >= ENDLESS_LEVEL) return { name:'🌌 Endless Deep Space', diff:'veryhard', tier:3 };
        for (const z of ZONE_DEFS) if (z.levels.includes(lvl)) return z;
        return ZONE_DEFS[0];
    }

    /* ========== STORAGE ========== */
    function getTodayKey() { const d=new Date(); return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; }
    function loadAll()  { try{return JSON.parse(localStorage.getItem('gal_all')||'{}')}catch(e){return {};} }
    function saveAll(a) { try{localStorage.setItem('gal_all',JSON.stringify(a));}catch(e){} }
    function loadToday(){ try{return JSON.parse(localStorage.getItem('gal_today')||'{}')}catch(e){return {};} }
    function saveToday(t){ try{localStorage.setItem('gal_today',JSON.stringify(t));}catch(e){} }

    function checkDayReset() {
        const last = localStorage.getItem('gal_lastday')||'';
        const today = getTodayKey();
        if (last && last!==today) {
            const all = loadAll(), saved = loadToday();
            if (Object.keys(saved).length>0) {
                all[last] = saved;
                const keys = Object.keys(all).sort().slice(-14);
                const tr={}; keys.forEach(k=>tr[k]=all[k]); saveAll(tr);
            }
            try{localStorage.removeItem('gal_today');}catch(e){}
        }
        try{localStorage.setItem('gal_lastday',today);}catch(e){}
    }

    function loadLevel() { try{return parseInt(localStorage.getItem('gal_level')||'1',10)||1;}catch(e){return 1;} }
    function saveLevel(l){ try{localStorage.setItem('gal_level',String(l));}catch(e){} }
    function loadEndlessRecord() { try{return parseInt(localStorage.getItem('gal_endless')||'0',10)||0;}catch(e){return 0;} }
    function saveEndlessRecord(n){ try{localStorage.setItem('gal_endless',String(n));}catch(e){} }

    /* ========== GAME CLASS ========== */
    class ConnectFour {
        constructor() {
            this.ROWS=6; this.COLS=7;
            this.board=[]; this.currentPlayer=1;
            this.gameInProgress=false; this.isAiTurn=false;
            this.totalScores={1:0,2:0};   // all-time for today
            this.matchScores={1:0,2:0};   // per-level match
            this.audio = new GameAudio();
            this.aiFirst = false;
            this.level = loadLevel();
            this.endlessStreak = 0;
            this.playerMoves = 0;
            this.gameStartTime = null;
            this.$board  = document.getElementById('board');
            this.$status = document.getElementById('status');
            this.$score  = document.getElementById('scoreDisplay');
            this.$restartBtn = document.getElementById('restartBtn');
            this.$newGameBtn = document.getElementById('newGameBtn');
            this.$toggleFirstBtn = document.getElementById('toggleFirstBtn');
            this.initEvents();
            this.audio.init();
            checkDayReset();
            const t = loadToday();
            this.totalScores={1:t.wins||0, 2:t.losses||0};
            this.updateScoreDisplay();
            this.applyTierToPlayerDiscs();
            this.newGame();
            this.renderScoreboard();
        }

        /* ---- helpers ---- */
        get zone() { return getZoneForLevel(this.level); }
        get isEndless() { return this.level>=ENDLESS_LEVEL; }
        get tier() { return this.zone.tier||3; }
        get aiDiff() { return this.zone.diff; }

        levelDepth() {
            if (this.aiDiff==='easy') {
                // within zone 1, slightly decrease random chance per level
                const sub = this.level-1; // 0-3
                return sub; // used to tune random threshold
            }
            if (this.aiDiff==='medium') return 3;
            return 5;
        }

        applyTierToPlayerDiscs() {
            const t = this.tier;
            const p1 = document.getElementById('p1Disc');
            const p2 = document.getElementById('p2Disc');
            p1.className = `player-disc red ${t===2?'tier2':t===3?'tier3':''}`;
            p2.className = `player-disc yellow ${t===2?'tier2':t===3?'tier3':''}`;
        }

        updateHUD() {
            document.getElementById('hudLevel').textContent =
                this.isEndless ? `🌌 ENDLESS` : `LEVEL ${this.level}`;
            document.getElementById('hudZone').textContent = this.zone.name;
            document.getElementById('hudMatchScore').textContent =
                `You ${this.matchScores[1]} – ${this.matchScores[2]} AI`;
            document.getElementById('aiLabel').textContent =
                ({easy:'AI (Easy)',medium:'AI (Medium)',veryhard:'AI (Very Hard)'})[this.aiDiff];
        }

        updateScoreDisplay() {
            this.$score.textContent = `${this.totalScores[1]} - ${this.totalScores[2]}`;
        }

        /* ---- events ---- */
        initEvents() {
            this.$restartBtn.addEventListener('click', ()=>this.restartGame());
            this.$newGameBtn.addEventListener('click', ()=>this.newGame());
            this.$toggleFirstBtn.addEventListener('click', ()=>this.toggleFirst());
            document.getElementById('openScoreboardBtn').addEventListener('click',()=>{
                this.renderScoreboard();
                document.getElementById('scoreModal').classList.add('open');
            });
            document.getElementById('closeScoreboardBtn').addEventListener('click',()=>{
                document.getElementById('scoreModal').classList.remove('open');
            });
            document.getElementById('scoreModal').addEventListener('click',e=>{
                if(e.target===document.getElementById('scoreModal'))
                    document.getElementById('scoreModal').classList.remove('open');
            });
            document.getElementById('endActionBtn').addEventListener('click',()=>{
                document.getElementById('endModal').classList.remove('open');
                this.newGame();
            });
        }

        toggleFirst() {
            this.aiFirst=!this.aiFirst;
            this.$toggleFirstBtn.textContent = this.aiFirst?'👤 Εσύ Πρώτος':'🤖 AI Πρώτο';
            this.newGame();
        }

        /* ---- board init ---- */
        initializeBoard() {
            this.board = Array(this.ROWS).fill(null).map(()=>Array(this.COLS).fill(0));
            this.$board.innerHTML='';
            for (let r=0;r<this.ROWS;r++) for (let c=0;c<this.COLS;c++) {
                const slot=document.createElement('div'); slot.className='slot'; slot.dataset.col=c;
                const disc=document.createElement('div'); disc.className='disc';
                slot.appendChild(disc);
                slot.addEventListener('click',()=>this.handleClick(c));
                this.$board.appendChild(slot);
            }
            this.gameInProgress=true; this.currentPlayer=1;
            this.playerMoves=0; this.gameStartTime=Date.now();
            if (this.aiFirst) {
                this.currentPlayer=2; this.updateStatus(); this.updatePlayerIndi();
                this.triggerAi();
            } else { this.updateStatus(); this.updatePlayerIndi(); }
        }

        handleClick(col) { if(!this.gameInProgress||this.isAiTurn) return; this.makeMove(col); }

        makeMove(col) {
            const row=this.getRow(col); if(row===-1) return;
            this.board[row][col]=this.currentPlayer;
            this.animateDrop(row,col,this.currentPlayer);
            this.audio.drop();
            if(this.currentPlayer===1) this.playerMoves++;
            if(this.checkWin(row,col)){this.handleWin();return;}
            if(this.checkDraw()){this.handleDraw();return;}
            this.currentPlayer=this.currentPlayer===1?2:1;
            this.updateStatus(); this.updatePlayerIndi();
            if(this.currentPlayer===2&&this.gameInProgress) this.triggerAi();
        }

        getRow(col) {
            for(let r=this.ROWS-1;r>=0;r--) if(this.board[r][col]===0) return r; return -1;
        }

        animateDrop(row,col,player) {
            const slot=this.$board.children[row*this.COLS+col];
            const disc=slot.querySelector('.disc');
            const tierClass = this.tier===2?'ring':this.tier===3?'glow':'';
            disc.className=`disc ${player===1?'red':'yellow'} ${tierClass}`;
            disc.style.animation='discDrop 0.4s cubic-bezier(0.25,0.46,0.45,0.94) forwards';
        }

        updatePlayerIndi() {
            document.getElementById('player1').classList.toggle('active',this.currentPlayer===1);
            document.getElementById('player2').classList.toggle('active',this.currentPlayer===2);
        }

        updateStatus() {
            if(!this.gameInProgress) return;
            this.$status.innerHTML = this.currentPlayer===2
                ? '<span class="ai-thinking">🤔 Το AI σκέφτεται…</span>'
                : 'Η σειρά σου 👇';
        }

        checkWin(row,col) {
            const p=this.board[row][col];
            for(let[dr,dc] of [[0,1],[1,0],[1,1],[1,-1]]) {
                let count=1,cells=[[row,col]];
                for(let step of [1,-1]) {
                    let r=row+dr*step,c=col+dc*step;
                    while(r>=0&&r<this.ROWS&&c>=0&&c<this.COLS&&this.board[r][c]===p){
                        count++; cells.push([r,c]);
                        if(count>=4){this.highlightWin(cells);return true;}
                        r+=dr*step; c+=dc*step;
                    }
                }
            }
            return false;
        }

        highlightWin(cells) {
            cells.forEach(([r,c])=>{
                const d=this.$board.children[r*this.COLS+c].querySelector('.disc');
                if(d) d.classList.add('winner');
            });
        }

        checkDraw() { return this.board[0].every(c=>c!==0); }

        handleWin() {
            this.gameInProgress=false;
            const won = this.currentPlayer===1;
            this.matchScores[this.currentPlayer]++;
            this.updateHUD();
            if(won) { this.totalScores[1]++; } else { this.totalScores[2]++; }
            this.updateScoreDisplay();
            this.audio.victory();
            if(won) this.triggerConfetti();
            this.saveDayScore();
            if(won) {
                if(this.isEndless) {
                    this.endlessStreak++;
                    const rec=loadEndlessRecord();
                    if(this.endlessStreak>rec) saveEndlessRecord(this.endlessStreak);
                } else {
                    this.level++; saveLevel(this.level);
                }
            } else {
                if(this.isEndless) this.endlessStreak=0;
            }
            this.applyTierToPlayerDiscs();
            setTimeout(()=>this.showEndModal(won?'win':'lose'), 600);
        }

        handleDraw() {
            this.gameInProgress=false;
            this.$status.textContent = 'Ισοπαλία! 🤝';
            this.saveDayScore();
            setTimeout(()=>this.showEndModal('draw'), 600);
        }

        /* ---- end modal ---- */
        showEndModal(result) {
            const titleEl  = document.getElementById('endTitle');
            const barEl    = document.getElementById('progressBar');
            const labelL   = document.getElementById('progressLabelLeft');
            const labelR   = document.getElementById('progressLabelRight');
            const nextEl   = document.getElementById('progressNext');
            const btnEl    = document.getElementById('endActionBtn');
            const movesEl  = document.getElementById('statMoves');
            const timeEl   = document.getElementById('statTime');
            const firstEl  = document.getElementById('statFirst');

            // Outcome
            if(result==='win') {
                titleEl.textContent='🎉 Ο Γαλαξίας Κατακτήθηκε!';
                titleEl.className='modal-galaxy-title win';
            } else if(result==='lose') {
                titleEl.textContent='💀 Χάθηκες στο Διάστημα…';
                titleEl.className='modal-galaxy-title lose';
            } else {
                titleEl.textContent='🤝 Αδέσποτος Αστεροειδής!';
                titleEl.className='modal-galaxy-title draw';
            }

            // Progress bar
            if(result==='win') {
                if(this.isEndless) {
                    labelL.textContent='🌌 Endless Streak';
                    labelR.textContent=`${this.endlessStreak} νίκες`;
                    barEl.style.width='100%';
                    barEl.classList.add('full');
                    nextEl.textContent='Συνέχεια στο Endless Deep Space!';
                } else {
                    labelL.textContent=`Level ${this.level-1} → ${this.level}`;
                    labelR.textContent='100%';
                    barEl.style.width='0%';
                    barEl.classList.remove('full');
                    setTimeout(()=>{ barEl.style.width='100%'; barEl.classList.add('full'); },100);
                    const nz=getZoneForLevel(this.level);
                    if(this.level===ENDLESS_LEVEL)
                        nextEl.textContent='🌌 Επόμενο: Endless Deep Space!';
                    else if(this.level>ENDLESS_LEVEL)
                        nextEl.textContent='🌌 Endless Deep Space';
                    else if(nz.tier>(getZoneForLevel(this.level-1).tier||0))
                        nextEl.textContent=`🔥 Αναβάθμιση Πιονιού: Tier ${nz.tier}!`;
                    else
                        nextEl.textContent=`Επόμενη Αποστολή: Level ${this.level}`;
                }
            } else {
                const lvl = Math.min(this.level, ENDLESS_LEVEL-1);
                const pct = ((lvl-1)%4)/4*100;
                labelL.textContent='Level Progress';
                labelR.textContent='';
                barEl.classList.remove('full');
                barEl.style.width='0%';
                setTimeout(()=>barEl.style.width=pct+'%',100);
                nextEl.textContent='';
            }

            // Stats
            movesEl.textContent = this.playerMoves;
            const sec = Math.round((Date.now()-this.gameStartTime)/1000);
            timeEl.textContent = sec<60 ? `${sec}s` : `${Math.floor(sec/60)}m ${sec%60}s`;
            firstEl.textContent = this.aiFirst?'AI':'Εσύ';

            // Action button
            if(result==='win') {
                btnEl.textContent = this.isEndless
                    ? `🌌 Επόμενη Μάχη (Streak: ${this.endlessStreak})`
                    : `🚀 Επόμενη Αποστολή: Level ${this.level}`;
                btnEl.className='modal-action-btn win-btn';
            } else if(result==='lose') {
                btnEl.textContent='🔄 Δοκίμασε Ξανά';
                btnEl.className='modal-action-btn lose-btn';
            } else {
                btnEl.textContent='⚡ Παίξε Ξανά';
                btnEl.className='modal-action-btn draw-btn';
            }

            document.getElementById('endModal').classList.add('open');
        }

        /* ---- day scores ---- */
        saveDayScore() {
            const t=loadToday();
            t.wins=this.totalScores[1];
            t.losses=this.totalScores[2];
            t.maxLevel=Math.max(t.maxLevel||1, this.level);
            saveToday(t);
            this.renderScoreboard();
        }

        renderScoreboard() {
            const content=document.getElementById('scoreboardContent');
            if(!content) return;
            const todayKey=getTodayKey();
            const today=loadToday();
            const all=loadAll();
            const combined=Object.assign({},all);
            if(Object.keys(today).length>0) combined[todayKey]=today;
            const rows=Object.keys(combined).sort().reverse();
            if(!rows.length) {
                content.innerHTML='<div class="no-history">Δεν υπάρχει ιστορικό ακόμα.</div>';
            } else {
                let html='<table class="score-table"><thead><tr><th>📅 Ημερομηνία</th><th>Max Level</th><th class="win">✅ Νίκες</th><th class="loss">❌ Ήττες</th></tr></thead><tbody>';
                rows.forEach(date=>{
                    const d=combined[date]||{};
                    const cls=date===todayKey?'today-row':'';
                    const lbl=date===todayKey?'🟢 Σήμερα':date;
                    html+=`<tr class="${cls}"><td>${lbl}</td><td>${d.maxLevel||1}</td><td class="win">${d.wins||0}</td><td class="loss">${d.losses||0}</td></tr>`;
                });
                html+='</tbody></table>';
                content.innerHTML=html;
            }
            document.getElementById('endlessRecordDisplay').textContent=loadEndlessRecord();
        }

        /* ---- AI ---- */
        triggerAi() {
            this.isAiTurn=true; this.updateStatus();
            const delay = this.aiDiff==='easy'?Math.random()*800+600:Math.random()*400+300;
            setTimeout(()=>{
                if(!this.gameInProgress){this.isAiTurn=false;return;}
                const col=this.computeAiMove();
                this.isAiTurn=false; this.makeMove(col);
            }, delay);
        }

        computeAiMove() {
            const valid=[];
            for(let c=0;c<this.COLS;c++) if(this.getRow(c)!==-1) valid.push(c);

            if(this.aiDiff==='easy') {
                // Within zone 1 levels 1-4, random threshold decreases slightly
                const sub = this.level-1; // 0-3
                const rndThreshold = 0.72 - sub*0.06; // 0.72, 0.66, 0.60, 0.54
                if(Math.random()<rndThreshold) return valid[Math.floor(Math.random()*valid.length)];
                for(let c of valid){let r=this.getRow(c);this.board[r][c]=2;if(this.simWin(r,c,2)){this.board[r][c]=0;return c;}this.board[r][c]=0;}
                for(let c of valid){let r=this.getRow(c);this.board[r][c]=1;if(this.simWin(r,c,1)){this.board[r][c]=0;return c;}this.board[r][c]=0;}
                return valid[Math.floor(Math.random()*valid.length)];
            }

            for(let c of valid){let r=this.getRow(c);this.board[r][c]=2;if(this.simWin(r,c,2)){this.board[r][c]=0;return c;}this.board[r][c]=0;}
            for(let c of valid){let r=this.getRow(c);this.board[r][c]=1;if(this.simWin(r,c,1)){this.board[r][c]=0;return c;}this.board[r][c]=0;}

            if(this.aiDiff==='medium'&&Math.random()<0.28)
                return valid[Math.floor(Math.random()*valid.length)];

            const depth=this.aiDiff==='medium'?3:5;
            let best=-Infinity, cols=[valid[0]];
            for(let c of valid){
                let r=this.getRow(c); this.board[r][c]=2;
                let s=this.minimax(depth,false,-Infinity,Infinity);
                this.board[r][c]=0;
                if(s>best){best=s;cols=[c];}else if(s===best)cols.push(c);
            }
            return cols[Math.floor(Math.random()*cols.length)];
        }

        simWin(row,col,p) {
            for(let[dr,dc] of [[0,1],[1,0],[1,1],[1,-1]]){
                let n=1;
                for(let s of [1,-1]){let r=row+dr*s,c=col+dc*s;
                    while(r>=0&&r<this.ROWS&&c>=0&&c<this.COLS&&this.board[r][c]===p){n++;if(n>=4)return true;r+=dr*s;c+=dc*s;}}
            }
            return false;
        }

        minimax(depth,isMax,alpha,beta) {
            const s=this.evalBoard();
            if(depth===0||this.checkDraw()||Math.abs(s)>5000) return s;
            const valid=[];
            for(let c=0;c<this.COLS;c++) if(this.getRow(c)!==-1) valid.push(c);
            if(isMax){
                let m=-Infinity;
                for(let c of valid){let r=this.getRow(c);this.board[r][c]=2;let e=this.minimax(depth-1,false,alpha,beta);this.board[r][c]=0;m=Math.max(m,e);alpha=Math.max(alpha,e);if(beta<=alpha)break;}
                return m;
            } else {
                let m=Infinity;
                for(let c of valid){let r=this.getRow(c);this.board[r][c]=1;let e=this.minimax(depth-1,true,alpha,beta);this.board[r][c]=0;m=Math.min(m,e);beta=Math.min(beta,e);if(beta<=alpha)break;}
                return m;
            }
        }

        evalBoard() {
            let score=0, mid=Math.floor(this.COLS/2), mc=0;
            for(let r=0;r<this.ROWS;r++){if(this.board[r][mid]===2)mc++;else if(this.board[r][mid]===1)mc--;}
            score+=mc*4;
            for(let r=0;r<this.ROWS;r++) for(let c=0;c<this.COLS-3;c++)
                score+=this.evalW([this.board[r][c],this.board[r][c+1],this.board[r][c+2],this.board[r][c+3]]);
            for(let c=0;c<this.COLS;c++) for(let r=0;r<this.ROWS-3;r++)
                score+=this.evalW([this.board[r][c],this.board[r+1][c],this.board[r+2][c],this.board[r+3][c]]);
            for(let r=0;r<this.ROWS-3;r++) for(let c=0;c<this.COLS-3;c++){
                score+=this.evalW([this.board[r][c],this.board[r+1][c+1],this.board[r+2][c+2],this.board[r+3][c+3]]);
                score+=this.evalW([this.board[r+3][c],this.board[r+2][c+1],this.board[r+1][c+2],this.board[r][c+3]]);
            }
            return score;
        }

        evalW(w) {
            const ai=w.filter(c=>c===2).length, pl=w.filter(c=>c===1).length, em=w.filter(c=>c===0).length;
            if(ai===4) return 10000; if(pl===4) return -10000;
            let s=0;
            if(ai===3&&em===1)s+=50;else if(ai===2&&em===2)s+=10;
            if(pl===3&&em===1)s-=80;else if(pl===2&&em===2)s-=15;
            return s;
        }

        /* ---- misc ---- */
        triggerConfetti() {
            for(let i=0;i<60;i++){
                const c=document.createElement('div'); c.className='confetti';
                c.style.left=Math.random()*100+'vw';
                c.style.animationDelay=Math.random()*0.5+'s';
                c.style.animationDuration=(Math.random()*2+2)+'s';
                document.body.appendChild(c);
                setTimeout(()=>c.remove(),3500);
            }
        }

        restartGame() {
            this.currentPlayer=1; this.isAiTurn=false;
            this.initializeBoard(); this.updateStatus(); this.updatePlayerIndi();
            this.updateHUD(); this.applyTierToPlayerDiscs();
            document.querySelectorAll('.confetti').forEach(c=>c.remove());
        }

        newGame() {
            // Reset match scores when starting fresh
            this.matchScores={1:0,2:0};
            this.endlessStreak=0;
            this.restartGame();
        }
    }

    initBg();
    window._game = new ConnectFour();
})();
</script>
