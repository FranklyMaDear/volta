<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chess Four Galactic</title>
    <link rel="icon" type="image/png" sizes="32x32" href="index.png">
    <meta name="theme-color" content="#1e3c72">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- GameMonetize SDK -->
    <script type="text/javascript">
       window.SDK_OPTIONS = {
          gameId: "YOUR_GAME_ID_FROM_DASHBOARD",   // <-- Αντικατέστησε με το δικό σου game hash
          onEvent: function(a) {
             switch(a.name) {
                case "SDK_GAME_PAUSE":
                   if (window._chessAudioCtx) {
                      try { window._chessAudioCtx.suspend(); } catch(e) {}
                   }
                   window._sdkAdPlaying = true;
                   if (typeof timerInterval !== 'undefined' && timerInterval) {
                      clearInterval(timerInterval);
                      timerInterval = null;
                      window._sdkTimerWasRunning = true;
                   } else {
                      window._sdkTimerWasRunning = false;
                   }
                   break;
                case "SDK_GAME_START":
                   if (window._chessAudioCtx) {
                      try { window._chessAudioCtx.resume(); } catch(e) {}
                   }
                   window._sdkAdPlaying = false;
                   if (window._sdkTimerWasRunning && typeof gameActive !== 'undefined' && gameActive) {
                      if (typeof startTimer === 'function') startTimer();
                   }
                   break;
                case "SDK_READY":
                   break;
             }
          }
       };
    (function(a, b, c) {
       var d = a.getElementsByTagName(b)[0];
       a.getElementById(c) || (a = a.createElement(b), a.id = c,
       a.src = "https://api.gamemonetize.com/sdk.js",
       d.parentNode.insertBefore(a, d))
    })(document, "script", "gamemonetize-sdk");
    </script>

    <style>
        :root {
            --board-size: min(88vw, 88vh, 700px);
            --square-size: calc(var(--board-size) / 8);
            --piece-size: calc(var(--square-size) * 0.88);
            --dot-size: calc(var(--square-size) * 0.2);
            --eval-width: 14px;
            --sidebar-width: 130px;
        }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body {
            background: linear-gradient(160deg, #0d1b2a 0%, #1b2838 30%, #1e3c72 60%, #2a5298 100%);
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; margin: 0; padding: 6px; padding-bottom: 60px;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow-x: hidden; perspective: 1200px;
        }
        .main-layout { display: flex; gap: 8px; align-items: flex-start; width: 100%; max-width: calc(var(--board-size) + var(--sidebar-width) + 20px); justify-content: center; flex-wrap: wrap; }
        .board-area { display: flex; flex-direction: column; align-items: center; gap: 6px; }

        .hud-top {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; max-width: var(--board-size); gap: 6px;
            padding: 6px 10px; background: rgba(0,0,0,0.4); border-radius: 12px;
            backdrop-filter: blur(8px); border: 1px solid rgba(132,204,22,0.2);
        }
        .hud-level {
            font-size: 0.72rem; font-weight: 800; letter-spacing: 1px; color: #84cc16;
            text-shadow: 0 0 8px rgba(132,204,22,0.6);
            background: rgba(132,204,22,0.12); border: 1px solid rgba(132,204,22,0.3);
            padding: 5px 10px; border-radius: 20px; white-space: nowrap;
        }
        .hud-zone { font-size: 0.62rem; font-weight: 700; color: rgba(255,255,255,0.5); flex: 1; text-align: center; letter-spacing: 0.5px; }
        .hud-match { font-size: 0.72rem; font-weight: 800; color: #e8e8ed; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 20px; white-space: nowrap; }
        .hud-progress {
            width: 100%; max-width: var(--board-size);
            height: 4px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden;
        }
        .hud-progress-fill {
            height: 100%; border-radius: 4px;
            background: linear-gradient(90deg, #65a30d, #a3e635);
            transition: width 0.6s ease;
        }
        .stats-bar {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; max-width: var(--board-size); gap: 6px;
            padding: 5px 10px; background: rgba(0,0,0,0.3); border-radius: 10px;
            backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.07);
        }
        .level-badge { display: flex; align-items: center; gap: 6px; color: #ffcb2e; font-weight: 700; font-size: 11px; background: rgba(0,0,0,0.4); padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(255,203,46,0.3); }
        .streak-badge { display: flex; align-items: center; gap: 4px; color: #ff6b6b; font-weight: 700; font-size: 11px; background: rgba(255,107,107,0.15); padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(255,107,107,0.3); }
        .daily-mission-bar { width: 100%; max-width: var(--board-size); background: rgba(0,0,0,0.35); border-radius: 10px; padding: 6px 12px; backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; gap: 8px; }
        .daily-mission-label { color: #e0e0e0; font-size: 11px; font-weight: 600; white-space: nowrap; }
        .daily-mission-track { flex: 1; height: 7px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .daily-mission-fill { height: 100%; border-radius: 10px; background: linear-gradient(90deg, #4CAF50, #8BC34A); transition: width 0.5s; box-shadow: 0 0 10px rgba(76,175,80,0.5); }
        .daily-mission-count { color: #ffcb2e; font-weight: 700; font-size: 12px; min-width: 30px; text-align: center; }
        .daily-mission-reward { background: linear-gradient(135deg, #ffcb2e, #ff9f00); color: #000; padding: 5px 10px; border-radius: 20px; font-weight: 700; font-size: 10px; cursor: pointer; border: none; box-shadow: 0 4px 0 #b37400, 0 6px 15px rgba(0,0,0,0.4); transition: all 0.2s; white-space: nowrap; transform: translateZ(4px); }
        .daily-mission-reward:active { transform: translateY(3px) translateZ(2px); box-shadow: 0 1px 0 #b37400; }
        .daily-mission-reward:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .board-row { display: flex; gap: 6px; align-items: stretch; }
        .eval-bar-container { width: var(--eval-width); min-height: var(--board-size); background: rgba(0,0,0,0.3); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.1); }
        .eval-bar-black { flex: 1; background: #1a1a1a; transition: flex 0.6s; display: flex; align-items: flex-end; justify-content: center; color: #888; font-size: 9px; padding-bottom: 2px; }
        .eval-bar-white { flex: 1; background: #e8e8e8; transition: flex 0.6s; display: flex; align-items: flex-start; justify-content: center; color: #555; font-size: 9px; padding-top: 2px; }
        .board-container { display: flex; flex-direction: column; align-items: center; background: linear-gradient(145deg, #4a3820, #3a2e16); padding: 8px; border-radius: 14px; box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 4px 0 #2a1f0e, inset 0 1px 0 rgba(255,255,255,0.08); width: var(--board-size); transform: rotateX(1.5deg); }
        .board { width: var(--board-size); height: var(--board-size); display: grid; grid-template-columns: repeat(8, 1fr); border: 4px solid #2a1f0e; box-shadow: inset 0 0 25px rgba(0,0,0,0.5), 0 6px 0 #1a1008, 0 10px 20px rgba(0,0,0,0.5); border-radius: 2px; transition: transform 0.5s ease; }
        .board.flipped { transform: rotate(180deg); }
        .board.flipped .piece { transform: rotate(180deg); }
        .square { position: relative; width: var(--square-size); height: var(--square-size); display: flex; align-items: center; justify-content: center; }
        .sq-light { background: #e8d5b7; } .sq-dark { background: #b58863; }
        .piece { width: var(--piece-size); height: var(--piece-size); cursor: grab; transition: transform 0.12s; user-select: none; filter: drop-shadow(2px 3px 3px rgba(0,0,0,0.45)); z-index: 2; }
        .piece:active { cursor: grabbing; transform: scale(1.1); }
        .highlight { box-shadow: inset 0 0 0 3px #ffcb2e, inset 0 0 10px rgba(255,203,46,0.35); animation: glowPulse 0.8s infinite; }
        @keyframes glowPulse { 0%,100% { box-shadow: inset 0 0 0 3px #ffcb2e, inset 0 0 10px rgba(255,203,46,0.35); } 50% { box-shadow: inset 0 0 0 4px #ffe066, inset 0 0 15px rgba(255,203,46,0.5); } }
        .move-dot::after { content: ''; position: absolute; width: var(--dot-size); height: var(--dot-size); border-radius: 50%; background: rgba(0,0,0,0.22); z-index: 1; }
        .check { box-shadow: inset 0 0 0 3px #ff3333, inset 0 0 14px rgba(255,51,51,0.5) !important; animation: checkPulse 0.6s infinite !important; }
        @keyframes checkPulse { 0%,100% { box-shadow: inset 0 0 0 3px #ff3333, inset 0 0 14px rgba(255,51,51,0.5); } 50% { box-shadow: inset 0 0 0 6px #ff5555, inset 0 0 20px rgba(255,51,51,0.7); } }
        .game-info { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 4px 6px; gap: 6px; color: #fff; font-size: 11px; font-weight: 600; }
        .timer { color: #ffcb2e; font-weight: 700; font-size: 14px; background: rgba(0,0,0,0.4); padding: 4px 12px; border-radius: 20px; border: 1px solid rgba(255,203,46,0.25); box-shadow: 0 3px 0 rgba(0,0,0,0.3); transform: translateZ(3px); }
        .timer.low { color: #ff4444; border-color: rgba(255,68,68,0.4); animation: timerBlink 0.5s infinite; }
        @keyframes timerBlink { 50% { opacity: 0.4; } }
        .side-panel { width: var(--sidebar-width); display: flex; flex-direction: column; gap: 6px; min-width: 110px; }
        .panel-box { background: rgba(0,0,0,0.35); border-radius: 10px; padding: 8px; border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(8px); box-shadow: 0 4px 0 rgba(0,0,0,0.2), 0 8px 20px rgba(0,0,0,0.3); }
        .panel-title { color: #ffcb2e; font-size: 11px; font-weight: 700; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .notation-list { max-height: 180px; overflow-y: auto; color: #ccc; font-size: 11px; font-family: 'Courier New', monospace; line-height: 1.5; }
        .undo-btn { width: 100%; padding: 8px; background: #5d4037; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 11px; box-shadow: 0 3px 0 #3e2723, 0 5px 10px rgba(0,0,0,0.3); transition: all 0.2s; transform: translateZ(2px); }
        .undo-btn:active { transform: translateY(2px) translateZ(1px); box-shadow: 0 1px 0 #3e2723; }
        .undo-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); backdrop-filter: blur(6px); display: none; justify-content: center; align-items: center; z-index: 100; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn { 0% { transform: translateZ(-100px) scale(0.8); opacity: 0; } 70% { transform: translateZ(20px) scale(1.03); opacity: 1; } 100% { transform: translateZ(0) scale(1); opacity: 1; } }
        .modal-content { background: linear-gradient(160deg, #3a2e16, #2a1f0e); padding: 22px 18px; border-radius: 16px; max-width: 92%; width: 400px; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.6), 0 0 0 3px #d19a4c, 0 0 40px rgba(209,154,76,0.3); animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275); transform-style: preserve-3d; border: 1px solid rgba(255,255,255,0.1); }
        .modal-content h2 { color: #ffcb2e; margin: 0 0 8px; }
        .modal-content h3 { color: #e0c080; margin: 6px 0; font-size: 14px; }
        .modal-options { display: flex; flex-direction: column; gap: 6px; margin: 10px 0; }
        .modal-btn { width: 100%; padding: 12px; border: none; border-radius: 10px; background: #5d4037; color: white; font-weight: 700; cursor: pointer; font-size: 14px; transition: all 0.2s; box-shadow: 0 4px 0 #3e2723, 0 6px 12px rgba(0,0,0,0.3); transform: translateZ(3px); }
        .modal-btn:active { transform: translateY(3px) translateZ(1px); box-shadow: 0 1px 0 #3e2723; }
        .modal-btn.active { background: #d19a4c; box-shadow: 0 4px 0 #8b6914, 0 6px 15px rgba(209,154,76,0.4); }
        .start-btn { background: #4CAF50; box-shadow: 0 4px 0 #2e7d32, 0 6px 15px rgba(76,175,80,0.4); font-size: 17px; margin-top: 6px; }
        .end-modal-title { font-size: 1.2rem; font-weight: 800; letter-spacing: 1px; text-align: center; margin-bottom: 6px; text-shadow: 0 0 14px currentColor; }
        .end-modal-title.win  { color: #84cc16; }
        .end-modal-title.lose { color: #f87171; }
        .end-modal-title.draw { color: #fbbf24; }
        .prog-wrap { margin: 12px 0 8px; }
        .prog-label { display: flex; justify-content: space-between; font-size: 0.68rem; color: rgba(255,255,255,0.5); margin-bottom: 4px; font-weight: 700; }
        .prog-track { background: rgba(255,255,255,0.08); border-radius: 20px; height: 11px; overflow: hidden; border: 1px solid rgba(132,204,22,0.2); }
        .prog-bar { height: 100%; border-radius: 20px; background: linear-gradient(90deg, #65a30d, #a3e635); width: 0%; transition: width 0.9s cubic-bezier(0.22,1,0.36,1); position: relative; }
        .prog-bar.full::after { content: '💥'; position: absolute; right: -10px; top: -5px; font-size: 1rem; animation: boom 0.4s ease 0.9s both; }
        @keyframes boom { 0% { transform: scale(0); } 60% { transform: scale(1.4); } 100% { transform: scale(1); } }
        .prog-next { text-align: center; margin-top: 5px; font-size: 0.68rem; color: #84cc16; font-weight: 700; letter-spacing: 1px; }
        .battle-stats { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 10px 12px; margin: 10px 0; text-align: left; }
        .battle-stats-title { font-size: 0.6rem; letter-spacing: 2px; color: rgba(255,255,255,0.4); font-weight: 700; text-transform: uppercase; margin-bottom: 6px; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.74rem; }
        .stat-row:last-child { border-bottom: none; }
        .stat-label { color: rgba(255,255,255,0.45); font-weight: 600; }
        .stat-value { color: #e8e8ed; font-weight: 700; }
        .end-action-btn { display: block; width: 100%; margin-top: 12px; padding: 12px; border-radius: 30px; border: none; cursor: pointer; font-family: inherit; font-size: 0.9rem; font-weight: 800; letter-spacing: 1px; transition: all 0.2s; }
        .end-action-btn.win-btn  { background: linear-gradient(135deg, #84cc16, #65a30d); color: #fff; box-shadow: 0 4px 0 #4d7c0f; }
        .end-action-btn.lose-btn { background: linear-gradient(135deg, #f87171, #b91c1c); color: #fff; box-shadow: 0 4px 0 #7f1d1d; }
        .end-action-btn.draw-btn { background: linear-gradient(135deg, #fbbf24, #d97706); color: #fff; box-shadow: 0 4px 0 #92400e; }
        .end-action-btn:active { transform: translateY(3px); }
        .status-mate { color: #ff4444; font-weight: 800; }
        .status-check { color: #ff8c00; font-weight: 700; }
        .cpu-thinking-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9); color: #ffcb2e; text-align: center; padding: 12px; font-weight: 700; font-size: 15px; z-index: 150; display: none; border-top: 2px solid rgba(255,203,46,0.3); box-shadow: 0 -4px 20px rgba(0,0,0,0.5); }
        .promotion-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 200; }
        .promotion-dialog { background: #3a2e16; padding: 16px; border-radius: 16px; display: flex; gap: 12px; box-shadow: 0 0 30px rgba(0,0,0,0.6); border: 2px solid #d19a4c; }
        .promotion-option { width: 60px; height: 60px; background: #5d4037; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 0 #3e2723; }
        .promotion-option:hover { background: #d19a4c; transform: scale(1.08); }
        .promotion-option img { width: 80%; height: 80%; }
        @media (max-width: 700px) {
            .side-panel { width: 100%; flex-direction: row; flex-wrap: wrap; gap: 4px; }
            .side-panel .panel-box { flex: 1; min-width: 100px; }
            .notation-list { max-height: 100px; }
            .eval-bar-container { display: none; }
            .main-layout { flex-direction: column; align-items: center; }
            .board-area { width: 100%; }
            .hud-zone { display: none; }
        }
    </style>
</head>
<body>
<div class="main-layout">
    <div class="board-area">
        <div class="hud-top">
            <div class="hud-level" id="hudLevel">LEVEL 1</div>
            <div class="hud-zone" id="hudZone">🚀 Rookie Astronaut</div>
            <div class="hud-match" id="hudMatch">You 0 – 0 CPU</div>
        </div>
        <div class="hud-progress"><div class="hud-progress-fill" id="hudProgressFill" style="width:0%;"></div></div>
        <div class="stats-bar">
            <div class="level-badge" id="levelBadge">🏅 Rookie</div>
            <div class="streak-badge" id="streakBadge" style="display:none;">🔥 0</div>
        </div>
        <div class="board-row">
            <div class="eval-bar-container" id="evalBarContainer">
                <div class="eval-bar-black" id="evalBarBlack">B</div>
                <div class="eval-bar-white" id="evalBarWhite">W</div>
            </div>
            <div class="board-container">
                <div class="game-info">
                    <span id="gameStatus">White's turn</span>
                    <span class="timer" id="whiteTime">5:00</span>
                    <span style="color:#aaa;">vs</span>
                    <span class="timer" id="blackTime">5:00</span>
                </div>
                <div id="board" class="board"></div>
            </div>
        </div>
    </div>
    <div class="side-panel">
        <div class="panel-box">
            <div class="panel-title">📝 Notation</div>
            <div class="notation-list" id="notationList"></div>
        </div>
        <button class="undo-btn" id="undoBtn" disabled>↩️ Undo (1 left)</button>
    </div>
</div>
<div class="cpu-thinking-footer" id="cpuThinkingFooter">🤔 CPU is thinking...</div>
<div class="promotion-overlay" id="promotionOverlay">
    <div class="promotion-dialog" id="promotionDialog"></div>
</div>
<div class="modal-overlay" id="setupModal">
    <div class="modal-content">
        <h2>♕ Chess Four Galactic ♛</h2>
        <p style="color:#84cc16;font-size:0.78rem;margin:4px 0 10px;" id="setupLevelInfo">LEVEL 1 — 🚀 Rookie Astronaut</p>
        <p style="color:#e0e0e0;font-size:0.9rem;">Play against the Computer</p>
        <div class="modal-options">
            <h3>Choose Your Color</h3>
            <button class="modal-btn color-btn active" data-color="white">⚪ White</button>
            <button class="modal-btn color-btn" data-color="black">⚫ Black</button>
            <button class="modal-btn color-btn" data-color="random">🎲 Random</button>
        </div>
        <button class="modal-btn start-btn" id="startGameBtn">🚀 Start Mission</button>
    </div>
</div>
<div class="modal-overlay" id="postGameModal">
    <div class="modal-content">
        <div class="end-modal-title win" id="endTitle">🎉 Mission Complete!</div>
        <div class="prog-wrap">
            <div class="prog-label"><span id="progLabelL">Level Progress</span><span id="progLabelR"></span></div>
            <div class="prog-track"><div class="prog-bar" id="progBar"></div></div>
            <div class="prog-next" id="progNext"></div>
        </div>
        <div class="battle-stats">
            <div class="battle-stats-title">⚔️ Battle Stats</div>
            <div class="stat-row"><span class="stat-label">Result</span><span class="stat-value" id="statResult">—</span></div>
            <div class="stat-row"><span class="stat-label">Win Streak</span><span class="stat-value" id="statStreak">0</span></div>
            <div class="stat-row"><span class="stat-label">Level</span><span class="stat-value" id="statLevel">—</span></div>
        </div>
        <p id="levelUpInfo" style="color:#84cc16;font-weight:800;display:none;margin:6px 0;"></p>
        <button class="end-action-btn win-btn" id="endActionBtn">🚀 Next Mission</button>
        <button class="modal-btn" id="menuBtn" style="margin-top:8px;font-size:13px;padding:10px;">☰ Menu</button>
    </div>
</div>
<script>
// ===================== CONFIGURATION =====================
const TIME_CONTROL = 300;             // 5 minutes per player
let gameActive = false;
let board = [];
let whiteToMove = true;
let selected = null;
let legalMoves = [];
let kingInCheck = false;
let enPassantTarget = null;
let castlingRights = { wK: true, wQ: true, bK: true, bQ: true };

let playerColor = 'w';
let cpuColor = 'b';
let whiteTimeLeft = TIME_CONTROL;
let blackTimeLeft = TIME_CONTROL;
let timerInterval = null;
let lastTimerTick = 0;
let isFlipped = false;
let moveHistory = [];
let undoUsed = false;
let promotionPending = null;
let cpuThinking = false;
let cpuTimeoutId = null;
let postGamePending = false;

// Galaxy level system
let currentLevel = 1;
let matchWins = 0;
let matchLosses = 0;
let endlessStreak = 0;
const CHESS_ZONE_DEFS = [
    { min:1, max:10, name:'🚀 Rookie Astronaut', depth:1, randomChance:0.80 },
    { min:11, max:20, name:'🛸 Starship Commander', depth:2, randomChance:0.25 },
    { min:21, max:30, name:'⚔️ Space Warrior', depth:3, randomChance:0 },
    { min:31, max:40, name:'👑 Galaxy Overlord', depth:5, randomChance:0 },
    { min:41, max:50, name:'💀 Cosmic Destroyer', depth:7, randomChance:0 },
];

// DOM elements

const gameStatusEl = document.getElementById('gameStatus');

// Audio
let audioCtx = null;
function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        window._chessAudioCtx = audioCtx;
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playTone(f, d, t = 'sine', v = 0.08) {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
    g.gain.setValueAtTime(v, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
    o.start(); o.stop(audioCtx.currentTime + d);
}
function sfxMove() { playTone(600, 0.07); }
function sfxCapture() { playTone(800, 0.1, 'triangle'); }
function sfxCheck() { playTone(1200, 0.1); setTimeout(() => playTone(900, 0.1), 70); }
function sfxMate() { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone(f, 0.22, 'sine', 0.13), i * 90)); }

// ===================== CHESS LOGIC =====================
const PIECE_VALUES = { p: 100, n: 320, b: 330, r: 500, q: 900, k: 20000 };

function getPieceImg(type, color) {
    const map = {
        pw:'4/45/Chess_plt45.svg', pb:'c/c7/Chess_pdt45.svg',
        rw:'7/72/Chess_rlt45.svg', rb:'f/ff/Chess_rdt45.svg',
        nw:'7/70/Chess_nlt45.svg', nb:'e/ef/Chess_ndt45.svg',
        bw:'b/b1/Chess_blt45.svg', bb:'9/98/Chess_bdt45.svg',
        qw:'1/15/Chess_qlt45.svg', qb:'4/47/Chess_qdt45.svg',
        kw:'4/42/Chess_klt45.svg', kb:'f/f0/Chess_kdt45.svg'
    };
    return `https://upload.wikimedia.org/wikipedia/commons/${map[type+color]}`;
}

function initialBoard() {
    return [
        ['r','n','b','q','k','b','n','r'],
        ['p','p','p','p','p','p','p','p'],
        [null,null,null,null,null,null,null,null],
        [null,null,null,null,null,null,null,null],
        [null,null,null,null,null,null,null,null],
        [null,null,null,null,null,null,null,null],
        ['P','P','P','P','P','P','P','P'],
        ['R','N','B','Q','K','B','N','R']
    ].map(row => row.map(ch => ch ? { type: ch.toLowerCase(), color: ch === ch.toUpperCase() ? 'w' : 'b' } : null));
}

function isInside(r, c) { return r >= 0 && r < 8 && c >= 0 && c < 8; }

function getMoves(b, r, c, enPassant, castling) {
    const piece = b[r][c];
    if (!piece) return [];
    const moves = [];
    const col = piece.color;
    const dir = col === 'w' ? -1 : 1;
    const opponent = col === 'w' ? 'b' : 'w';

    if (piece.type === 'p') {
        if (isInside(r+dir, c) && !b[r+dir][c]) moves.push({ r: r+dir, c });
        if ((col === 'w' && r === 6 || col === 'b' && r === 1) && isInside(r+dir, c) && !b[r+dir][c] && !b[r+2*dir][c]) moves.push({ r: r+2*dir, c });
        for (const dc of [-1, 1]) {
            if (isInside(r+dir, c+dc) && b[r+dir][c+dc] && b[r+dir][c+dc].color === opponent) moves.push({ r: r+dir, c: c+dc });
            if (enPassant && enPassant.r === r+dir && enPassant.c === c+dc) moves.push({ r: r+dir, c: c+dc });
        }
    }
    if (piece.type === 'n') {
        const knightMoves = [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]];
        for (const [dr, dc] of knightMoves) {
            if (isInside(r+dr, c+dc) && (!b[r+dr][c+dc] || b[r+dr][c+dc].color === opponent)) moves.push({ r: r+dr, c: c+dc });
        }
    }
    if (['b','r','q'].includes(piece.type)) {
        const directions = [];
        if (['b','q'].includes(piece.type)) directions.push([-1,-1],[-1,1],[1,-1],[1,1]);
        if (['r','q'].includes(piece.type)) directions.push([-1,0],[1,0],[0,-1],[0,1]);
        for (const [dr, dc] of directions) {
            let rr = r+dr, cc = c+dc;
            while (isInside(rr, cc)) {
                if (!b[rr][cc]) {
                    moves.push({ r: rr, c: cc });
                } else {
                    if (b[rr][cc].color === opponent) moves.push({ r: rr, c: cc });
                    break;
                }
                rr += dr; cc += dc;
            }
        }
    }
    if (piece.type === 'k') {
        for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
                if ((dr || dc) && isInside(r+dr, c+dc) && (!b[r+dr][c+dc] || b[r+dr][c+dc].color === opponent)) moves.push({ r: r+dr, c: c+dc });
            }
        }
        const row = col === 'w' ? 7 : 0;
        if (r === row && c === 4 && castling[col+'K'] && !b[row][5] && !b[row][6] && b[row][7]?.type === 'r' && b[row][7].color === col) moves.push({ r: row, c: 6 });
        if (r === row && c === 4 && castling[col+'Q'] && !b[row][3] && !b[row][2] && !b[row][1] && b[row][0]?.type === 'r' && b[row][0].color === col) moves.push({ r: row, c: 2 });
    }
    return moves;
}

function isKingInCheck(b, col) {
    let kingPos = null;
    for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
        if (b[r][c]?.type === 'k' && b[r][c].color === col) { kingPos = { r, c }; break; }
    }
    if (!kingPos) return false;
    const opponent = col === 'w' ? 'b' : 'w';
    for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
        if (b[r][c]?.color === opponent) {
            if (getMoves(b, r, c, null, {}).some(m => m.r === kingPos.r && m.c === kingPos.c)) return true;
        }
    }
    return false;
}

function getLegalMovesFrom(b, r, c, enPassant, castling) {
    return getMoves(b, r, c, enPassant, castling).filter(m => {
        const targetPiece = b[m.r][m.c];
        const movingPiece = b[r][c];
        b[m.r][m.c] = movingPiece;
        b[r][c] = null;
        const inCheck = isKingInCheck(b, movingPiece.color);
        b[r][c] = movingPiece;
        b[m.r][m.c] = targetPiece;
        return !inCheck;
    });
}

function getAllLegalMoves(b, col, enPassant, castling) {
    const moves = [];
    for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
        if (b[r][c]?.color === col) {
            const legal = getLegalMovesFrom(b, r, c, enPassant, castling);
            for (const m of legal) moves.push({ from: { r, c }, to: m });
        }
    }
    return moves;
}

// ===================== CPU WORKER =====================
let cpuWorker = null;
function initWorker() {
    if (cpuWorker) { try { cpuWorker.terminate(); } catch(e) {} cpuWorker = null; }
    const workerCode = `
        const V = { p:100, n:320, b:330, r:500, q:900, k:20000 };
        function getMoves(b,r,c,ep,cs){ 
            const p=b[r][c];if(!p)return[];const m=[],col=p.color,d=col=='w'?-1:1;
            const ib=(rr,cc)=>rr>=0&&rr<8&&cc>=0&&cc<8;
            const em=(rr,cc)=>ib(rr,cc)&&!b[rr][cc];
            const en=(rr,cc)=>ib(rr,cc)&&b[rr][cc]&&b[rr][cc].color!=col;
            if(p.type=='p'){
                if(em(r+d,c))m.push({r:r+d,c});
                if((col=='w'&&r==6||col=='b'&&r==1)&&em(r+d,c)&&em(r+2*d,c))m.push({r:r+2*d,c});
                [-1,1].forEach(dc=>{if(en(r+d,c+dc))m.push({r:r+d,c:c+dc})});
                if(ep&&ep.r==r+d&&ep.c==c+1)m.push({r:r+d,c:c+1});
                if(ep&&ep.r==r+d&&ep.c==c-1)m.push({r:r+d,c:c-1});
            }
            if(p.type=='n'){[[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]].forEach(([dr,dc])=>{if(ib(r+dr,c+dc)&&(!b[r+dr][c+dc]||en(r+dr,c+dc)))m.push({r:r+dr,c:c+dc})})}
            if(['b','r','q'].includes(p.type)){
                const dirs=[];
                if(['b','q'].includes(p.type))dirs.push([-1,-1],[-1,1],[1,-1],[1,1]);
                if(['r','q'].includes(p.type))dirs.push([-1,0],[1,0],[0,-1],[0,1]);
                dirs.forEach(([dr,dc])=>{let rr=r+dr,cc=c+dc;while(ib(rr,cc)){if(!b[rr][cc])m.push({r:rr,c:cc});else{if(en(rr,cc))m.push({r:rr,c:cc});break;}rr+=dr;cc+=dc}})
            }
            if(p.type=='k'){
                for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){if((dr||dc)&&ib(r+dr,c+dc)&&(!b[r+dr][c+dc]||en(r+dr,c+dc)))m.push({r:r+dr,c:c+dc})}
                const row=col=='w'?7:0;
                if(r==row&&c==4&&cs[col+'K']&&!b[row][5]&&!b[row][6]&&b[row][7]&&b[row][7].type=='r'&&b[row][7].color==col)m.push({r:row,c:6});
                if(r==row&&c==4&&cs[col+'Q']&&!b[row][3]&&!b[row][2]&&!b[row][1]&&b[row][0]&&b[row][0].type=='r'&&b[row][0].color==col)m.push({r:row,c:2});
            }
            return m;
        }
        function isCheck(b,col){let kp=null;for(let r=0;r<8;r++)for(let c=0;c<8;c++){if(b[r][c]&&b[r][c].type=='k'&&b[r][c].color==col){kp={r,c};break}}if(!kp)return false;for(let r=0;r<8;r++)for(let c=0;c<8;c++){if(b[r][c]&&b[r][c].color!=col&&getMoves(b,r,c,null,{}).some(m=>m.r==kp.r&&m.c==kp.c))return true}return false}
        function legalMovesW(b,r,c,ep,cs){return getMoves(b,r,c,ep,cs).filter(m=>{const o=b[m.r][m.c],p=b[r][c];b[m.r][m.c]=p;b[r][c]=null;const ck=isCheck(b,p.color);b[r][c]=p;b[m.r][m.c]=o;return !ck})}
        function allMoves(b,col,ep,cs){const m=[];for(let r=0;r<8;r++)for(let c=0;c<8;c++){if(b[r][c]&&b[r][c].color==col){legalMovesW(b,r,c,ep,cs).forEach(t=>{if(b[r][c].type=='p'&&(t.r==0||t.r==7))m.push({from:{r,c},to:t,promotion:'q'});else m.push({from:{r,c},to:t})})}}return m}
        function evalBoard(b,ai){let s=0;for(let r=0;r<8;r++)for(let c=0;c<8;c++){const p=b[r][c];if(!p)continue;s+=p.color==ai?V[p.type]:-V[p.type]}return s+Math.random()*8-4}
        function minimax(b,depth,a,beta,isMax,ai,ep,cs){const col=isMax?ai:(ai=='w'?'b':'w');if(depth==0)return evalBoard(b,ai);const moves=allMoves(b,col,ep,cs);if(!moves.length)return isCheck(b,col)?(isMax?-99999:99999):0;moves.sort((x,y)=>{const ca=b[x.to.r][x.to.c]?V[b[x.to.r][x.to.c].type]:0,cb=b[y.to.r][y.to.c]?V[b[y.to.r][y.to.c].type]:0;return cb-ca});if(isMax){let best=-Infinity;for(const m of moves){const o=b[m.to.r][m.to.c],p=b[m.from.r][m.from.c];b[m.to.r][m.to.c]=p;b[m.from.r][m.from.c]=null;if(m.promotion)b[m.to.r][m.to.c].type=m.promotion;const v=minimax(b,depth-1,a,beta,false,ai,ep,cs);b[m.from.r][m.from.c]=p;b[m.to.r][m.to.c]=o;best=Math.max(best,v);a=Math.max(a,v);if(beta<=a)break}return best}else{let best=Infinity;for(const m of moves){const o=b[m.to.r][m.to.c],p=b[m.from.r][m.from.c];b[m.to.r][m.to.c]=p;b[m.from.r][m.from.c]=null;if(m.promotion)b[m.to.r][m.to.c].type=m.promotion;const v=minimax(b,depth-1,a,beta,true,ai,ep,cs);b[m.from.r][m.from.c]=p;b[m.to.r][m.to.c]=o;best=Math.min(best,v);beta=Math.min(beta,v);if(beta<=a)break}return best}}
        self.onmessage = function(e) {

            const moves = allMoves(board, cpuColor, enPassant, castling);
            if (!moves.length) { self.postMessage(null); return; }
            if (randomChance > 0 && Math.random() < randomChance) { self.postMessage(moves[Math.floor(Math.random()*moves.length)]); return; }
            moves.sort((x,y)=>{const ca=board[x.to.r][x.to.c]?V[board[x.to.r][x.to.c].type]:0,cb=board[y.to.r][y.to.c]?V[board[y.to.r][y.to.c].type]:0;return cb-ca});
            let best=-Infinity,bestMoves=[];
            for(const m of moves){const o=board[m.to.r][m.to.c],p=board[m.from.r][m.from.c];board[m.to.r][m.to.c]=p;board[m.from.r][m.from.c]=null;if(m.promotion)board[m.to.r][m.to.c].type=m.promotion;const s=minimax(board,depth-1,-Infinity,Infinity,false,cpuColor,enPassant,castling);board[m.from.r][m.from.c]=p;board[m.to.r][m.to.c]=o;if(s>best){best=s;bestMoves=[m]}else if(s==best)bestMoves.push(m)}
            self.postMessage(bestMoves[Math.floor(Math.random()*bestMoves.length)]);
        };
    `;
    const blob = new Blob([workerCode], { type: 'application/javascript' });
    cpuWorker = new Worker(URL.createObjectURL(blob));
    cpuWorker.onmessage = function(e) {
        if (cpuTimeoutId) { clearTimeout(cpuTimeoutId); cpuTimeoutId = null; }
        cpuFooter.style.display = 'none'; cpuThinking = false;
        if (!gameActive) return;
        if (e.data && whiteToMove === (cpuColor === 'w')) {
            executeMove(e.data.from.r, e.data.from.c, e.data.to.r, e.data.to.c, e.data.promotion || 'q');
        }
    };
    cpuWorker.onerror = function() {
        cpuFooter.style.display = 'none'; cpuThinking = false;
        if (cpuTimeoutId) { clearTimeout(cpuTimeoutId); cpuTimeoutId = null; }
        if (gameActive && whiteToMove === (cpuColor === 'w')) {
            const moves = getAllLegalMoves(board, cpuColor, enPassantTarget, castlingRights);
            if (moves.length > 0) {
                const m = moves[Math.floor(Math.random() * moves.length)];
                executeMove(m.from.r, m.from.c, m.to.r, m.to.c, 'q');
            }
        }
    };
}

function getCpuParams(level) {
    const zone = CHESS_ZONE_DEFS.find(z => level >= z.min && level <= z.max) || { depth: 1, randomChance: 0.8 };
    return { depth: zone.depth, randomChance: zone.randomChance };
}

// ===================== GAME FLOW =====================
function startNewGame(colorChoice) {
    initAudio(); initWorker();
    if (colorChoice === 'random') colorChoice = Math.random() < 0.5 ? 'white' : 'black';
    playerColor = colorChoice === 'white' ? 'w' : 'b';
    cpuColor = playerColor === 'w' ? 'b' : 'w';
    isFlipped = playerColor === 'b';
    board = initialBoard();
    whiteToMove = true;
    selected = null; legalMoves = [];
    gameActive = true;
    kingInCheck = false;
    cpuThinking = false;
    promotionPending = null;
    undoUsed = false;
    moveHistory = [];
    notationList.innerHTML = '';
    resetFlags();
    whiteTimeLeft = TIME_CONTROL;
    blackTimeLeft = TIME_CONTROL;
    lastTimerTick = Date.now();
    clearInterval(timerInterval);
    timerInterval = null;
    startTimer();
    updateTimerDisplay();
    updateEvalBar();
    updateHUD();
    document.querySelector('.board').classList.toggle('flipped', isFlipped);
    render();
    updateUndoButton();
    if (cpuColor === 'w') setTimeout(requestCpuMove, 500);
}

function resetFlags() {
    enPassantTarget = null;
    castlingRights = { wK: true, wQ: true, bK: true, bQ: true };
}

function executeMove(sr, sc, tr, tc, promotionType) {
    selected = null; legalMoves = [];
    const piece = board[sr][sc];
    let captured = board[tr][tc];
    // en passant capture
    if (piece.type === 'p' && enPassantTarget && tr === enPassantTarget.r && tc === enPassantTarget.c) {
        captured = board[sr][tc];
        board[sr][tc] = null;
    }
    // castling
    if (piece.type === 'k' && Math.abs(tc - sc) === 2) {
        const row = sr;
        if (tc === 6) { board[row][5] = board[row][7]; board[row][7] = null; }
        else if (tc === 2) { board[row][3] = board[row][0]; board[row][0] = null; }
    }
    // en passant target update
    enPassantTarget = null;
    if (piece.type === 'p' && Math.abs(tr - sr) === 2) {
        enPassantTarget = { r: (sr + tr) / 2, c: sc };
    }
    // promotion
    if (piece.type === 'p' && (tr === 0 || tr === 7)) {
        if (promotionType) {
            piece.type = promotionType;
            finalizeMove(sr, sc, tr, tc, captured);
        } else {
            promotionPending = { r: tr, c: tc, color: piece.color };
            render();
            showPromotionUI(piece.color);
            return;
        }
    } else {
        // regular move
        board[tr][tc] = piece;
        board[sr][sc] = null;
        updateCastlingRights(sr, sc, piece, tr, tc, captured);
        finalizeMove(sr, sc, tr, tc, captured);
    }
}

function finalizeMove(sr, sc, tr, tc, captured) {
    whiteToMove = !whiteToMove;
    render();
    if (captured) { sfxCapture(); } else { sfxMove(); }
    addNotation({ from: { r: sr, c: sc }, to: { r: tr, c: tc } }, captured);
    checkGameState();
    if (kingInCheck) sfxCheck();
}

function updateCastlingRights(sr, sc, piece, tr, tc, captured) {
    if (piece.type === 'k') {
        if (piece.color === 'w') { castlingRights.wK = false; castlingRights.wQ = false; }
        else { castlingRights.bK = false; castlingRights.bQ = false; }
    }
    if (piece.type === 'r') {
        if (sr === 7 && sc === 0) castlingRights.wQ = false;
        if (sr === 7 && sc === 7) castlingRights.wK = false;
        if (sr === 0 && sc === 0) castlingRights.bQ = false;
        if (sr === 0 && sc === 7) castlingRights.bK = false;
    }
    if (captured && captured.type === 'r') {
        if (tr === 7 && tc === 0) castlingRights.wQ = false;
        if (tr === 7 && tc === 7) castlingRights.wK = false;
        if (tr === 0 && tc === 0) castlingRights.bQ = false;
        if (tr === 0 && tc === 7) castlingRights.bK = false;
    }
}

function showPromotionUI(color) {
    promotionDialog.innerHTML = '';
    const promoR = promotionPending.r, promoC = promotionPending.c;
    ['q','r','b','n'].forEach(type => {
        const opt = document.createElement('div');
        opt.className = 'promotion-option';
        opt.innerHTML = `<img src="${getPieceImg(type, color)}">`;
        opt.addEventListener('click', () => {
            promotionOverlay.style.display = 'none';
            board[promoR][promoC].type = type;
            promotionPending = null;
            whiteToMove = !whiteToMove;
            render(); sfxMove();
            const last = moveHistory[moveHistory.length - 1];
            const dir = color === 'w' ? 1 : -1;
            const from = last ? last.move.to : { r: promoR + dir, c: promoC };
            addNotation({ from, to: { r: promoR, c: promoC } }, false);
            checkGameState();
            if (gameActive && whiteToMove === cpuColor) setTimeout(requestCpuMove, 300);
        });
        promotionDialog.appendChild(opt);
    });
    promotionOverlay.style.display = 'flex';
}

// ===================== NOTATION & UNDO =====================
function addNotation(move, captured) {
    const piece = board[move.to.r][move.to.c];
    const sym = { p:'', n:'N', b:'B', r:'R', q:'Q', k:'K' }[piece.type];
    const f = 'abcdefgh'[move.from.c] + (8 - move.from.r);
    const t = 'abcdefgh'[move.to.c] + (8 - move.to.r);
    const text = `${sym}${f}${captured ? 'x' : '-'}${t}`;
    moveHistory.push({ move, captured, text });
    notationList.appendChild(Object.assign(document.createElement('div'), { textContent: text }));
    notationList.scrollTop = notationList.scrollHeight;
    updateUndoButton();
}

function undoLastMove() {
    if (undoUsed || moveHistory.length < 2) return;
    undoUsed = true;
    for (let i = 0; i < 2 && moveHistory.length > 0; i++) {
        const last = moveHistory.pop();
        board[last.move.from.r][last.move.from.c] = board[last.move.to.r][last.move.to.c];
        board[last.move.to.r][last.move.to.c] = last.captured;
        whiteToMove = !whiteToMove;
        notationList.removeChild(notationList.lastChild);
    }
    selected = null; legalMoves = []; gameActive = true; kingInCheck = false;
    checkGameState(); render(); updateUndoButton();
    if (gameActive && whiteToMove === cpuColor) setTimeout(requestCpuMove, 300);
}

function updateUndoButton() {
    undoBtn.disabled = undoUsed || moveHistory.length < 2 || !gameActive;
    undoBtn.textContent = undoUsed ? '↩️ Undo (used)' : '↩️ Undo (1 left)';
}

// ===================== GAME STATE =====================
function checkGameState() {
    const currentColor = whiteToMove ? 'w' : 'b';
    kingInCheck = isKingInCheck(board, currentColor);
    const moves = getAllLegalMoves(board, currentColor, enPassantTarget, castlingRights);
    if (moves.length === 0) {
        postGamePending = true;
        const winner = kingInCheck ? (currentColor === 'w' ? 'Black' : 'White') : null;
        gameActive = false; clearInterval(timerInterval); timerInterval = null;
        setTimeout(() => {
            if (kingInCheck) { gameStatusEl.innerHTML = `<span class="status-mate">Checkmate! ${winner} wins!</span>`; sfxMate(); }
            else { gameStatusEl.textContent = "Stalemate! Draw"; }
            showPostGame(winner, kingInCheck ? 'checkmate' : 'stalemate');
            postGamePending = false;
        }, 500);
    } else if (kingInCheck) {
        gameStatusEl.innerHTML = `<span class="status-check">${currentColor === 'w' ? 'White' : 'Black'} is in check!</span>`;
    } else {
        gameStatusEl.textContent = `${whiteToMove ? 'White' : 'Black'}'s turn`;
    }
}

// ===================== TIMER =====================
function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    lastTimerTick = Date.now();
    timerInterval = setInterval(() => {
        if (!gameActive || postGamePending || promotionPending || window._sdkAdPlaying) { lastTimerTick = Date.now(); return; }
        const now = Date.now(), elapsed = Math.floor((now - lastTimerTick) / 1000);
        if (elapsed >= 1) {
            if (whiteToMove) { whiteTimeLeft = Math.max(0, whiteTimeLeft - elapsed); if (whiteTimeLeft <= 0) { gameActive = false; clearInterval(timerInterval); timerInterval = null; showPostGame('Black', 'timeout'); return; } }
            else { blackTimeLeft = Math.max(0, blackTimeLeft - elapsed); if (blackTimeLeft <= 0) { gameActive = false; clearInterval(timerInterval); timerInterval = null; showPostGame('White', 'timeout'); return; } }
            lastTimerTick = now;
        }
        updateTimerDisplay();
    }, 250);
}

function updateTimerDisplay() {
    const fmt = s => { const m = Math.floor(s / 60), sec = s % 60; return `${m}:${sec.toString().padStart(2, '0')}`; };
    whiteTimeEl.textContent = fmt(Math.max(0, whiteTimeLeft));
    blackTimeEl.textContent = fmt(Math.max(0, blackTimeLeft));
    whiteTimeEl.classList.toggle('low', whiteTimeLeft < 30);
    blackTimeEl.classList.toggle('low', blackTimeLeft < 30);
}

// ===================== RENDER =====================
function render() {
    boardEl.innerHTML = '';
    let checkKingPos = null;
    if (kingInCheck) {
        const col = whiteToMove ? 'w' : 'b';
        for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
            if (board[r][c]?.type === 'k' && board[r][c].color === col) { checkKingPos = { r, c }; break; }
        }
    }
    for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
        const sq = document.createElement('div');
        sq.className = 'square ' + ((r + c) % 2 ? 'sq-dark' : 'sq-light');
        sq.dataset.r = r; sq.dataset.c = c;
        if (checkKingPos && checkKingPos.r === r && checkKingPos.c === c) sq.classList.add('check');
        if (legalMoves.some(m => m.r === r && m.c === c)) sq.classList.add('move-dot');
        if (selected?.r === r && selected?.c === c) sq.classList.add('highlight');
        const p = board[r][c];
        if (p) {
            const img = document.createElement('img');
            img.src = getPieceImg(p.type, p.color); img.className = 'piece'; img.draggable = true;
            if (gameActive && !cpuThinking && !promotionPending && whiteToMove !== cpuColor) img.addEventListener('click', e => { e.stopPropagation(); handleClick(r, c); });
            sq.appendChild(img);
        }
        if (gameActive && !cpuThinking && !promotionPending && whiteToMove !== cpuColor) sq.addEventListener('click', () => handleClick(r, c));
        boardEl.appendChild(sq);
    }
    updateEvalBar();
    updateTimerDisplay();
}

function handleClick(r, c) {
    if (!gameActive || postGamePending || cpuThinking || promotionPending) return;
    if (whiteToMove === cpuColor) return;
    if (selected && legalMoves.some(m => m.r === r && m.c === c)) {
        executeMove(selected.r, selected.c, r, c);
        if (gameActive && !postGamePending && !promotionPending && whiteToMove === cpuColor) setTimeout(requestCpuMove, 300);
        return;
    }
    const p = board[r][c];
    if (p && p.color === (whiteToMove ? 'w' : 'b')) {
        selected = { r, c };
        legalMoves = getLegalMovesFrom(board, r, c, enPassantTarget, castlingRights);
    } else {
        selected = null; legalMoves = [];
    }
    render();
}

function updateEvalBar() {
    let ws = 0, bs = 0;
    for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
        const p = board[r][c]; if (!p) continue;
        const val = PIECE_VALUES[p.type];
        p.color === 'w' ? ws += val : bs += val;
    }
    const total = ws + bs || 1;
    const wp = Math.max(5, Math.min(95, (ws / total) * 100));
    document.getElementById('evalBarWhite').style.flex = wp;
    document.getElementById('evalBarBlack').style.flex = (100 - wp);
}

// ===================== CPU MOVE =====================
function requestCpuMove() {
    if (!gameActive || postGamePending || cpuThinking || promotionPending) return;
    if (whiteToMove !== cpuColor) return;
    cpuThinking = true; cpuFooter.style.display = 'block';
    if (cpuTimeoutId) clearTimeout(cpuTimeoutId);
    cpuTimeoutId = setTimeout(() => {
        cpuFooter.style.display = 'none'; cpuThinking = false;
        if (!gameActive) return;
        try { cpuWorker.terminate(); } catch(e) {} cpuWorker = null; initWorker();
        const moves = getAllLegalMoves(board, cpuColor, enPassantTarget, castlingRights);
        if (moves.length > 0) { const m = moves[Math.floor(Math.random() * moves.length)]; executeMove(m.from.r, m.from.c, m.to.r, m.to.c, 'q'); }
    }, 10000);
    const params = getCpuParams(currentLevel);
    cpuWorker.postMessage({
        board: board.map(r => r.map(c => c ? { ...c } : null)),
        cpuColor, depth: params.depth, randomChance: params.randomChance,
        enPassant: enPassantTarget, castling: castlingRights
    });
}

// ===================== POST GAME =====================
function showPostGame(winner, resultType) {
    gameActive = false; cpuThinking = false; promotionPending = null;
    clearInterval(timerInterval); timerInterval = null;
    cpuFooter.style.display = 'none'; promotionOverlay.style.display = 'none';
    if (cpuTimeoutId) { clearTimeout(cpuTimeoutId); cpuTimeoutId = null; }

    const isPlayerWin = winner && ((playerColor === 'w' && winner === 'White') || (playerColor === 'b' && winner === 'Black'));
    const titleEl = document.getElementById('endTitle');
    const btnEl = document.getElementById('endActionBtn');
    const barEl = document.getElementById('progBar');
    const lblL = document.getElementById('progLabelL');
    const lblR = document.getElementById('progLabelR');
    const nextEl = document.getElementById('progNext');
    const luEl = document.getElementById('levelUpInfo');

    // Update streaks and levels
    if (isPlayerWin) {
        matchWins++; currentLevel++; saveLevel(currentLevel);
    } else if (resultType !== 'stalemate') {
        matchLosses++;
    }
    updateHUD();

    if (isPlayerWin) {
        titleEl.textContent = '🎉 Checkmate! You Win!'; titleEl.className = 'end-modal-title win';
    } else if (resultType === 'stalemate') {
        titleEl.textContent = '🤝 Stalemate — Draw!'; titleEl.className = 'end-modal-title draw';
    } else {
        titleEl.textContent = resultType === 'timeout' ? '⏰ Time\'s Up!' : '😞 You Lose'; titleEl.className = 'end-modal-title lose';
    }

    if (isPlayerWin) {
        lblL.textContent = `Level ${currentLevel-1} → ${currentLevel}`;
        lblR.textContent = '100%'; barEl.style.width = '0%';
        setTimeout(() => barEl.style.width = '100%', 100);
        nextEl.textContent = `Next Mission: Level ${currentLevel}`;
        luEl.style.display = 'block'; luEl.textContent = `⬆️ Level ${currentLevel} Unlocked!`;
    } else {
        lblL.textContent = 'Progress';
        lblR.textContent = '';
        barEl.style.width = '0%';
        nextEl.textContent = '';
        luEl.style.display = 'none';
    }

    document.getElementById('statResult').textContent = isPlayerWin ? '✅ Victory' : (resultType === 'stalemate' ? '🤝 Draw' : '❌ Defeat');
    document.getElementById('statStreak').textContent = '—';
    document.getElementById('statLevel').textContent = `Level ${currentLevel}`;

    btnEl.textContent = isPlayerWin ? `🚀 Level ${currentLevel}` : '🔄 Try Again';
    btnEl.className = isPlayerWin ? 'end-action-btn win-btn' : (resultType === 'stalemate' ? 'end-action-btn draw-btn' : 'end-action-btn lose-btn');

    postGameModal.style.display = 'flex';

    if (typeof sdk !== 'undefined' && sdk.showBanner) {
        _gamesPlayed = (_gamesPlayed || 0) + 1;
        if (_gamesPlayed % 2 === 0) sdk.showBanner();
    }
}

// ===================== HUD =====================
function updateHUD() {
    document.getElementById('hudLevel').textContent = `LEVEL ${currentLevel}`;
    document.getElementById('hudMatch').textContent = `You ${matchWins} – ${matchLosses} CPU`;
}

// ===================== LOCAL STORAGE =====================
function saveLevel(l) { try { localStorage.setItem('chess4gal_level', l); } catch(e) {} }
function loadLevel() { return parseInt(localStorage.getItem('chess4gal_level') || '1', 10); }

// ===================== EVENT LISTENERS =====================
document.querySelectorAll('.color-btn').forEach(btn => btn.addEventListener('click', () => {
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}));
document.getElementById('startGameBtn').addEventListener('click', () => {
    setupModal.style.display = 'none';
    startNewGame(document.querySelector('.color-btn.active').dataset.color);
});
document.getElementById('endActionBtn').addEventListener('click', () => {
    postGameModal.style.display = 'none';
    startNewGame(document.querySelector('.color-btn.active').dataset.color);
});
document.getElementById('menuBtn').addEventListener('click', () => {
    postGameModal.style.display = 'none';
    setupModal.style.display = 'flex';
});
undoBtn.addEventListener('click', undoLastMove);
promotionOverlay.addEventListener('click', (e) => {
    if (e.target === promotionOverlay && promotionPending) {
        const promoR = promotionPending.r, promoC = promotionPending.c, color = board[promoR][promoC].color;
        board[promoR][promoC].type = 'q'; promotionPending = null; promotionOverlay.style.display = 'none';
        whiteToMove = !whiteToMove;
        render(); sfxMove();
        const last = moveHistory.length ? moveHistory[moveHistory.length-1] : null;
        const dir = color === 'w' ? 1 : -1;
        const from = last ? last.move.to : { r: promoR + dir, c: promoC };
        addNotation({ from, to: { r: promoR, c: promoC } }, false);
        checkGameState();
        if (gameActive && whiteToMove === cpuColor) setTimeout(requestCpuMove, 300);
    }
});
window.addEventListener('DOMContentLoaded', () => {
    currentLevel = loadLevel();
    updateHUD();
    setupModal.style.display = 'flex';
});
</script>
