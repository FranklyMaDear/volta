<!DOCTYPE html> 
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Drop 2048 · FranklyGames Edition</title>
    <style>
        :root {
            --bg: #0B0C10;
            --panel: #8C6A4F;
            --panel-deep: #4A3423;
            --cream: #F7EFDC;
            --ink: #2F1B0D;
            --accent: #F2A03D;
            --good: #7FA653;
            --coin: #F5C542;
            --red: #C2542F;
            --blue: #4A7DBF;
            --hud-height: 54px;
            --powerbar-height: 74px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html,
        body {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: "Baloo 2", system-ui, sans-serif;
            color: var(--ink);
            user-select: none;
            touch-action: none;
        }
        #game {
            position: fixed;
            inset: 0;
            display: block;
            z-index: 0;
        }

        /* ===== HUD (TOP) ===== */
        .hud {
            position: fixed;
            left: 0;
            right: 0;
            top: 0;
            padding: 6px 12px 4px;
            display: flex;
            gap: 8px;
            align-items: center;
            pointer-events: none;
            z-index: 5;
            background: rgba(11, 12, 16, 0.75);
            backdrop-filter: blur(4px);
            border-bottom: 2px solid rgba(255, 255, 255, 0.08);
            height: var(--hud-height);
        }
        .chip {
            background: var(--panel-deep);
            color: var(--cream);
            border-radius: 14px;
            padding: 6px 14px;
            font-weight: 800;
            font-size: 16px;
            box-shadow: 0 3px 0 rgba(0, 0, 0, .4);
            display: flex;
            align-items: center;
            gap: 6px;
            pointer-events: auto;
            line-height: 1.2;
        }
        .chip small {
            font-weight: 600;
            opacity: .8;
            font-size: 10px;
            display: block;
            line-height: 1;
        }
        .chip .big {
            font-size: 18px;
            line-height: 1.1;
        }
        .spacer {
            flex: 1;
        }
        .hud-btn {
            background: var(--accent);
            border: none;
            cursor: pointer;
            color: #fff;
            border-radius: 14px;
            padding: 6px 16px;
            font-weight: 800;
            font-size: 16px;
            box-shadow: 0 3px 0 #b8742a;
            pointer-events: auto;
            transition: transform .08s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 4px;
            line-height: 1.3;
        }
        .hud-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #b8742a;
        }
        .hud-btn.shop-btn {
            background: var(--blue);
            box-shadow: 0 3px 0 #2d5a7a;
        }
        .hud-btn.shop-btn:active {
            box-shadow: 0 1px 0 #2d5a7a;
        }

        /* ===== POWERUPS (attached to top of board, below HUD) ===== */
        .powerbar {
            position: fixed;
            top: var(--hud-height);
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            gap: 14px;
            z-index: 4;
            padding: 8px 16px;
            background: rgba(11, 12, 16, 0.6);
            backdrop-filter: blur(4px);
            border-radius: 0 0 20px 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-top: none;
            pointer-events: none;
            height: var(--powerbar-height);
            align-items: center;
        }
        .pbtn {
            pointer-events: auto;
            border: none;
            cursor: pointer;
            width: 70px;
            height: 70px;
            border-radius: 20px;
            background: var(--good);
            box-shadow: 0 4px 0 #5c7a3a;
            color: #fff;
            font-size: 32px;
            line-height: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            font-family: inherit;
            transition: transform .08s;
        }
        .pbtn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #5c7a3a;
        }
        .pbtn .cost {
            font-size: 10px;
            font-weight: 800;
            background: rgba(0, 0, 0, .3);
            border-radius: 8px;
            padding: 1px 8px;
            margin-top: -2px;
        }
        .pbtn.armed {
            outline: 4px solid var(--accent);
            background: var(--red);
            box-shadow: 0 4px 0 #8f3c20;
        }
        .pbtn.listening {
            outline: 4px solid #ff5555;
            background: var(--red);
            box-shadow: 0 4px 0 #8f3c20;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.08);
            }
        }

        /* ===== TOAST ===== */
        #toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            pointer-events: none;
            background: var(--panel-deep);
            color: var(--cream);
            font-weight: 700;
            font-size: 15px;
            border-radius: 16px;
            padding: 10px 22px;
            opacity: 0;
            transition: opacity .25s;
            white-space: nowrap;
            box-shadow: 0 4px 12px rgba(0, 0, 0, .5);
            max-width: 90vw;
            text-align: center;
            white-space: normal;
        }

        /* ===== SPEECH BUBBLE ===== */
        #speech {
            position: fixed;
            z-index: 10;
            pointer-events: none;
            font-weight: 800;
            font-size: 22px;
            background: #ffffff;
            color: #333;
            padding: 10px 22px;
            border-radius: 24px;
            border: 4px solid var(--panel-deep);
            box-shadow: 0 4px 0 var(--panel-deep);
            transform: translate(-50%, -120%);
            opacity: 0;
            transition: opacity 0.2s ease-in-out, transform 0.2s ease-in-out;
            max-width: 75vw;
            white-space: normal;
            text-align: center;
        }
        #speech.visible {
            opacity: 1;
            transform: translate(-50%, -140%);
        }
        #speech::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -12px;
            border-width: 14px;
            border-style: solid;
            border-color: #ffffff transparent transparent transparent;
            filter: drop-shadow(0 4px 0 var(--panel-deep));
        }

        /* ===== SHOP ===== */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(11, 12, 16, .85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            backdrop-filter: blur(4px);
        }
        .card {
            background: var(--cream);
            border: 4px solid var(--panel-deep);
            border-radius: 26px;
            padding: 20px 18px;
            width: min(400px, 92vw);
            max-height: 92vh;
            text-align: center;
            box-shadow: 0 10px 0 rgba(0, 0, 0, .4);
            animation: pop .25s cubic-bezier(.34, 1.56, .64, 1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        @keyframes pop {
            from {
                transform: scale(.7);
                opacity: 0;
            }
        }
        .card h2 {
            font-size: 22px;
            margin-bottom: 8px;
            font-weight: 800;
            flex-shrink: 0;
        }
        .shop-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
            border-bottom: 2px solid rgba(0, 0, 0, 0.08);
            padding-bottom: 8px;
            overflow-x: auto;
            flex-shrink: 0;
            flex-wrap: nowrap;
        }
        .shop-tab {
            flex: 0 0 auto;
            padding: 8px 12px;
            font-weight: 800;
            font-size: 13px;
            border-radius: 12px;
            background: #E4D7BC;
            color: #8C6A4F;
            border: none;
            cursor: pointer;
            white-space: nowrap;
            transition: .1s;
        }
        .shop-tab.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 3px 0 #b8742a;
            transform: translateY(-2px);
        }
        .shop-items {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            overflow-y: auto;
            padding-right: 4px;
            flex: 1;
            min-height: 0;
        }
        .shop-items::-webkit-scrollbar {
            width: 4px;
        }
        .shop-items::-webkit-scrollbar-thumb {
            background: var(--panel-deep);
            border-radius: 4px;
        }
        .shop-item {
            background: #E4D7BC;
            border: 3px solid #8C6A4F;
            border-radius: 14px;
            padding: 8px 6px;
            cursor: pointer;
            transition: transform 0.1s;
            text-align: center;
        }
        .shop-item:active {
            transform: scale(0.95);
        }
        .shop-item h3 {
            font-size: 14px;
            margin-bottom: 3px;
            color: var(--ink);
            line-height: 1.2;
        }
        .shop-item .price {
            font-weight: 800;
            color: #b8742a;
            font-size: 13px;
        }
        .shop-item.owned .price {
            color: var(--good);
        }
        .shop-item.equipped {
            border-color: var(--accent);
            background: #FFF5E1;
            box-shadow: 0 0 10px rgba(242, 160, 61, 0.4);
        }
        .btn {
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-weight: 800;
            font-size: 16px;
            color: #fff;
            background: var(--accent);
            border-radius: 16px;
            padding: 10px 24px;
            box-shadow: 0 4px 0 #b8742a;
            transition: transform .08s;
            margin-top: 10px;
            width: 100%;
            flex-shrink: 0;
        }
        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #b8742a;
        }
        .btn.secondary {
            background: var(--blue);
            box-shadow: 0 4px 0 #2d5a7a;
        }
        .btn.secondary:active {
            box-shadow: 0 1px 0 #2d5a7a;
        }
        .hidden {
            display: none !important;
        }

        /* ===== WIN / LOSE MODALS ===== */
        .win-lose-overlay {
            z-index: 25;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            :root {
                --hud-height: 48px;
                --powerbar-height: 64px;
            }
            .hud {
                padding: 4px 8px;
                gap: 5px;
                height: var(--hud-height);
            }
            .chip {
                font-size: 13px;
                padding: 4px 10px;
                border-radius: 10px;
            }
            .chip .big {
                font-size: 15px;
            }
            .hud-btn {
                font-size: 14px;
                padding: 4px 10px;
                border-radius: 10px;
            }
            .powerbar {
                top: var(--hud-height);
                padding: 6px 12px;
                gap: 10px;
                border-radius: 0 0 16px 16px;
                height: var(--powerbar-height);
            }
            .pbtn {
                width: 58px;
                height: 58px;
                font-size: 26px;
                border-radius: 16px;
            }
            .pbtn .cost {
                font-size: 8px;
                padding: 1px 5px;
            }
            #toast {
                font-size: 13px;
                padding: 8px 16px;
                bottom: 60px;
            }
            #speech {
                font-size: 18px;
                padding: 8px 16px;
                border-radius: 20px;
            }
            .card {
                padding: 14px 12px;
                width: 96vw;
                border-radius: 18px;
            }
            .shop-items {
                gap: 5px;
            }
            .shop-item h3 {
                font-size: 12px;
            }
        }
        @media (max-width: 380px) {
            :root {
                --hud-height: 44px;
                --powerbar-height: 56px;
            }
            .chip {
                font-size: 11px;
                padding: 3px 6px;
            }
            .chip .big {
                font-size: 13px;
            }
            .hud-btn {
                font-size: 12px;
                padding: 3px 6px;
            }
            .pbtn {
                width: 50px;
                height: 50px;
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>

    <!-- ===== HUD (TOP) ===== -->
    <div class="hud">
        <div class="chip"><div><small>ΕΠΙΠΕΔΟ</small><span class="big" id="hudLevel">1</span></div></div>
        <div class="chip"><div><small>ΣΚΟΡ</small><span class="big" id="hudScore">0</span></div></div>
        <div class="chip">🪙 <span class="big" id="hudCoins">0</span></div>
        <div class="spacer"></div>
        <button class="hud-btn shop-btn" id="btnShop">🛒 Κατάστημα</button>
    </div>

    <!-- ===== POWERUPS (attached to top of board) ===== -->
    <div class="powerbar" id="powerbar">
        <button class="pbtn" id="btnMagnet">🧲<span class="cost">Δωρεάν</span></button>
        <button class="pbtn" id="btnHammer">🔨<span class="cost">Δωρεάν</span></button>
        <button class="pbtn" id="btnShuffle">🔄<span class="cost">Δωρεάν</span></button>
        <button class="pbtn" id="btnMic">🎤<span class="cost">Μίλα</span></button>
    </div>

    <!-- ===== SPEECH BUBBLE ===== -->
    <div id="speech"><span id="speechText">WOW!</span></div>

    <!-- ===== TOAST ===== -->
    <div id="toast"></div>

    <!-- ===== SHOP MODAL ===== -->
    <div class="overlay hidden" id="shopModal">
        <div class="card">
            <h2 style="margin-bottom:10px;">🛍️ Εξατομίκευση</h2>
            <div class="shop-tabs" id="mainTabs">
                <button class="shop-tab active" data-maintab="cubes">Κύβοι</button>
                <button class="shop-tab" data-maintab="boards">Ταμπλό</button>
                <button class="shop-tab" data-maintab="effects">Εφέ</button>
                <button class="shop-tab" data-maintab="sounds">Ήχοι</button>
            </div>
            <div class="shop-items" id="shopContainer"></div>
            <button class="btn" id="btnCloseShop">Κλείσιμο</button>
        </div>
    </div>

    <!-- ===== WIN / LOSE MODALS ===== -->
    <div class="overlay hidden win-lose-overlay" id="winModal">
        <div class="card">
            <div style="font-size:44px; margin-bottom:6px;">🎉</div>
            <h2>Επίπεδο Ολοκληρώθηκε!</h2>
            <p id="winText"></p>
            <button class="btn" id="btnNext">Συνέχεια ➜</button>
        </div>
    </div>
    <div class="overlay hidden win-lose-overlay" id="loseModal">
        <div class="card">
            <div style="font-size:44px; margin-bottom:6px;">😵</div>
            <h2>Γέμισε το ταμπλό!</h2>
            <p id="loseText"></p>
            <button class="btn" id="btnRetry">Ξαναπροσπάθησε</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>
    <script>
        // ============================================================
        //  DROP 2048 – FranklyGames Edition
        //  Full game with background (grass, flowers, sun, clouds)
        //  No home/tamagotchi, no mission bar, enlarged HUD,
        //  powerups attached to board top, all bugs fixed.
        // ============================================================
        (function() {
            'use strict';

            // ---------- CONSTANTS ----------
            const COLS = 5,
                ROWS = 6,
                CELL = 1.0,
                GAP = 0.12;
            const BOARD_W = COLS * (CELL + GAP) - GAP;
            const BOARD_H = ROWS * (CELL + GAP) - GAP;
            const launchY = -BOARD_H / 2 - 0.4;

            const LEVELS = [
                { target: 64, preset: 0, text: "Φτιάξε κύβο 64" },
                { target: 128, preset: 4, text: "Φτιάξε κύβο 128" },
                { target: 256, preset: 7, text: "Φτιάξε κύβο 256" },
                { target: 512, preset: 9, text: "Φτιάξε κύβο 512" },
                { target: 1024, preset: 12, text: "Φτιάξε κύβο 1024" }
            ];

            // ---------- SHOP DATA (simplified) ----------
            const SHOP = {
                cubes: [
                    { id: 'wood', name: 'Ξύλο', price: 0, icon: '🪵' },
                    { id: 'whitered', name: 'Άσπρο-Κόκκινο', price: 0, icon: '🍬' },
                    { id: 'whitegreen', name: 'Άσπρο-Πράσινο', price: 0, icon: '🍵' },
                    { id: 'zebra', name: 'Ζέβρα', price: 0, icon: '🦓' },
                    { id: 'neon', name: 'Cyber Neon', price: 0, icon: '⚡' },
                    { id: 'rainbow', name: 'Ουράνιο Τόξο', price: 0, icon: '🌈' },
                    { id: 'gold', name: 'Καθαρός Χρυσός', price: 0, icon: '🏆' },
                    { id: 'galaxy', name: 'Γαλαξίας', price: 0, icon: '🌌' },
                    { id: 'ice', name: 'Παγωμένος', price: 0, icon: '🧊' },
                    { id: 'lava', name: 'Λάβα', price: 0, icon: '🌋' }
                ],
                boards: [
                    { id: 'board_wood', name: 'Ξύλινο', price: 0, icon: '🟫', back: '#4A3423', cell: '#2F1B0D' },
                    { id: 'board_space', name: 'Βαθύ Διάστημα', price: 0, icon: '🟦', back: '#0B132B', cell: '#4A5A8A' },
                    { id: 'board_crimson', name: 'Πορφυρό', price: 0, icon: '🟥', back: '#3A0CA3', cell: '#A47CFF' },
                    { id: 'board_emerald', name: 'Σμαράγδι', price: 0, icon: '🟩', back: '#004B23', cell: '#7BDF4B' },
                    { id: 'board_neon', name: 'Νέον Σκοτάδι', price: 0, icon: '🟪', back: '#0A0A0A', cell: '#FF00FF' },
                    { id: 'board_candy', name: 'Ζαχαρωτό', price: 100, icon: '🍭', back: '#D95F8A', cell: '#8E2F55' },
                    { id: 'board_ocean', name: 'Ωκεανός', price: 120, icon: '🌊', back: '#0E5E6F', cell: '#063846' },
                    { id: 'board_forest', name: 'Δάσος', price: 120, icon: '🌲', back: '#2E5A1C', cell: '#16300A' },
                    { id: 'board_sunset', name: 'Ηλιοβασίλεμα', price: 150, icon: '🌅', back: '#C2542F', cell: '#6E2410' },
                    { id: 'board_royal', name: 'Βασιλικό', price: 200, icon: '👑', back: '#3B2A6E', cell: '#221545' }
                ],
                effects: [
                    { id: 'eff_none', name: 'Χωρίς Εφέ', price: 0, icon: '✖️' },
                    { id: 'eff_flame', name: 'Φλόγα', price: 0, icon: '🔥' },
                    { id: 'eff_sparkle', name: 'Αστερόσκονη', price: 0, icon: '✨' },
                    { id: 'eff_smoke', name: 'Καπνός', price: 0, icon: '💨' },
                    { id: 'eff_explode', name: 'Έκρηξη', price: 0, icon: '💥' },
                    { id: 'eff_confetti', name: 'Κομφετί', price: 0, icon: '🎊' }
                ],
                sounds: [
                    { id: 'snd_default', name: 'Default', price: 0, icon: '🔊' },
                    { id: 'snd_bass', name: 'Bass Drop', price: 0, icon: '🎛️' },
                    { id: 'snd_bell', name: 'Καμπάνα', price: 0, icon: '🔔' },
                    { id: 'snd_echo', name: 'Echo', price: 0, icon: '🌌' },
                    { id: 'snd_retro', name: 'Retro 8-bit', price: 100, icon: '👾' },
                    { id: 'snd_pop', name: 'Bubble Pop', price: 100, icon: '🫧' },
                    { id: 'snd_laser', name: 'Laser', price: 150, icon: '🔫' },
                    { id: 'snd_magic', name: 'Μαγικό', price: 200, icon: '✨' }
                ]
            };

            // ---------- SAVE ----------
            const DEFAULT_SAVE = {
                coins: 5000,
                level: 0,
                best: 0,
                score: 0,
                ownedCubes: ['wood'],
                equippedCube: 'wood',
                ownedBoards: ['board_wood'],
                equippedBoard: 'board_wood',
                ownedEffects: ['eff_none'],
                equippedEffect: 'eff_none',
                ownedSounds: ['snd_default'],
                equippedSound: 'snd_default'
            };

            let save = { ...DEFAULT_SAVE };

            function loadSave() {
                try {
                    const r = localStorage.getItem("drop2048-frankly-v8");
                    if (r) {
                        const parsed = JSON.parse(r);
                        save = Object.assign({}, DEFAULT_SAVE, parsed);
                    }
                } catch (e) { console.warn('Load save error', e); }
            }

            function persist() {
                try { localStorage.setItem("drop2048-frankly-v8", JSON.stringify(save)); } catch (e) {}
            }

            let coins = 0,
                level = 0,
                score = 0,
                best = 0;

            // ---------- AUDIO ----------
            const audioCtx = new(window.AudioContext || window.webkitAudioContext)();

            function playSound(type) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                if (type === 'win') { playWinSound(audioCtx); return; }
                const s = save.equippedSound || 'snd_default';
                const now = audioCtx.currentTime;

                function tone(freq0, freq1, dur, wave, vol, delay) {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.connect(g);
                    g.connect(audioCtx.destination);
                    o.type = wave;
                    const t0 = now + (delay || 0);
                    o.frequency.setValueAtTime(freq0, t0);
                    if (freq1) o.frequency.exponentialRampToValueAtTime(freq1, t0 + dur);
                    g.gain.setValueAtTime(vol, t0);
                    g.gain.exponentialRampToValueAtTime(0.01, t0 + dur);
                    o.start(t0);
                    o.stop(t0 + dur + 0.05);
                }
                // (simplified audio – same as before)
                if (s === 'snd_default') {
                    if (type === 'drop') tone(800, 400, 0.1, 'sine', 0.2);
                    else tone(300, 800, 0.2, 'sine', 0.3);
                } else if (s === 'snd_bass') {
                    if (type === 'drop') tone(150, 60, 0.18, 'sawtooth', 0.3);
                    else { tone(70, 200, 0.3, 'sawtooth', 0.35);
                        tone(140, 400, 0.3, 'sine', 0.2); }
                } else if (s === 'snd_bell') {
                    if (type === 'drop') { tone(880, null, 0.35, 'sine', 0.15);

            function playWinSound(ctx) {
                for (let i = 0; i < 4; i++) {
                    setTimeout(() => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(600 + (i * 250), ctx.currentTime);
                        gain.gain.setValueAtTime(0.15, ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
                        osc.start();
                        osc.stop(ctx.currentTime + 0.2);
                    }, i * 100);
                }
            }

            // ---------- SPEECH ----------
            let isTalking = false;

            function speak(text) {
                try {
                    if (!('speechSynthesis' in window)) return;
                    speechSynthesis.cancel();
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = 'el-GR';
                    const voices = speechSynthesis.getVoices();
                    const gr = voices.find(v => v.lang && v.lang.toLowerCase().startsWith('el'));
                    if (gr) u.voice = gr;
                    u.rate = 1.05;
                    u.pitch = 1.5;
                    u.onstart = () => { isTalking = true; };
                    u.onend = () => { isTalking = false; };
                    u.onerror = () => { isTalking = false; };
                    speechSynthesis.speak(u);
                } catch (e) { isTalking = false; }
            }
            if ('speechSynthesis' in window) {
                speechSynthesis.getVoices();
                speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
            }

                if (has('βοηθεια', 'συμβουλη', 'πως παιζ', 'τι να κανω')) return "Ένωσε ίδιους αριθμούς! Και κράτα τους μεγάλους κύβους στις άκρες!";

            function initMic() {
                const btn = document.getElementById('btnMic');
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SR) { btn.onclick = () => toast("Το 🎤 δεν υποστηρίζεται εδώ"); return; }
                btn.onclick = () => {
                    if (isListening) { try { recognition.stop(); } catch (e) {} return; }
                    recognition = new SR();
                    recognition.lang = 'el-GR';
                    recognition.interimResults = false;
                    recognition.maxAlternatives = 1;
                    recognition.onstart = () => { isListening = true;
                        btn.classList.add('listening');
                        toast("🎤 Ρώτα με κάτι..."); };
                    recognition.onresult = (e) => {
                        const txt = e.results[0][0].transcript;
                        if (txt) {
                            const reply = answerQuestion(txt);
                            aziramReactionTime = 1.2;
                            showSpeech(reply, Math.max(2800, reply.length * 80));
                            speak(reply);
                        }
                    };
                    recognition.onerror = () => toast("Δεν σε άκουσα 😅 Ξαναδοκίμασε");
                    recognition.onend = () => { isListening = false;
                        btn.classList.remove('listening'); };

                'explode': new THREE.MeshBasicMaterial({ color: 0xffa500 }),

            function spawnParticle(x, y, z, type) {
                let mat = pMats[type];
                if (Array.isArray(mat)) mat = mat[Math.floor(Math.random() * mat.length)];
                const p = new THREE.Mesh(pGeo, mat);
                p.position.set(x, y, z);
                let vx = (Math.random() - 0.5) * 6,
                    vy = (Math.random() - 0.5) * 6,
                    vz = (Math.random() - 0.5) * 6;
                if (type === 'flame' || type === 'smoke') { vx *= 0.2;
                    vy = -Math.random() * 2 - 0.5;
                    vz = 0; }
                if (type === 'confetti') { p.scale.set(0.15, 0.15, 0.15);
                    vy = Math.random() * 5; }
                scene.add(p);
                particles.push({ mesh: p, life: 1.0, vx, vy, vz, type });
            }

            function spawnBurst(x, y, z, type, count) {
                for (let i = 0; i < count; i++) spawnParticle(x, y, z, type);
            }

            function updateParticles(dt) {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.life -= dt * (p.type === 'smoke' ? 1.5 : 2.5);
                    if (p.life <= 0) { scene.remove(p.mesh);
                        particles.splice(i, 1); } else {
                        p.mesh.position.x += p.vx * dt;
                        p.mesh.position.y += p.vy * dt;
                        p.mesh.position.z += p.vz * dt;
                        if (p.type === 'confetti') p.vy -= dt * 10;
                        p.mesh.scale.setScalar(p.life);
                        if (p.type === 'flame' || p.type === 'explode') p.mesh.material.color.setHSL(0.1 * p.life, 1, 0.5);
                    }
                }
            }

            const textureCache = new Map();

            function getTexture(value) {
                const key = save.equippedCube + '|' + value;
                if (textureCache.has(key)) return textureCache.get(key);
                const cv = document.createElement("canvas");
                cv.width = cv.height = 128;
                const g = cv.getContext("2d");
                const skin = save.equippedCube;
                if (skin === 'wood') { g.fillStyle = value >= 128 ? "#8B5A2B" : "#DEB887";
                    roundRect(g, 4, 4, 120, 120, 22);
                    g.fill(); } else if (skin === 'whitered' || skin === 'whitegreen') { g.fillStyle = "white";
                    roundRect(g, 4, 4, 120, 120, 22);
                    g.fill();
                    g.fillStyle = skin === 'whitered' ? "#D32F2F" : "#388E3C";
                    g.save();
                    g.clip();
                    for (let i = -128; i < 256; i += 32) { g.beginPath();
                        g.moveTo(i, 0);
                        g.lineTo(i + 20, 0);
                        g.lineTo(i - 108, 128);
                        g.lineTo(i - 128, 128);
                        g.fill(); }
                    g.restore(); } else if (skin === 'zebra') { g.fillStyle = "white";
                    roundRect(g, 4, 4, 120, 120, 22);
                    g.fill();
                    g.fillStyle = "#111";
                    g.save();
                    g.clip();
                    for (let i = 0; i < 128; i += 24) { g.beginPath();
                        g.moveTo(0, i);
                        g.bezierCurveTo(40, i + 15, 80, i - 15, 128, i);
                        g.lineTo(128, i + 10);
                        g.bezierCurveTo(80, i - 5, 40, i + 25, 0, i + 10);
                        g.fill(); }
                    g.restore(); } else if (skin === 'rainbow') { let grad = g.createLinearGradient(0, 0, 128, 128);
                    ['red', 'orange', 'yellow', 'green', 'cyan', 'blue', 'purple'].forEach((c, i) => grad
                        .addColorStop(i / 6, c));
                    g.fillStyle = grad;
                    roundRect(g, 4, 4, 120, 120, 22);
                    g.fill(); } else if (skin === 'gold') { let grad = g.createRadialGradient(64, 64, 0, 64, 64, 90);
                    grad.addColorStop(0, "#FFF59D");
                    grad.addColorStop(0.6, "#FBC02D");
                    grad.addColorStop(1, "#F57F17");
                    g.fillStyle = grad;
                    roundRect(g, 4, 4, 120, 120, 22);
                    g.fill(); } else if (skin === 'neon') { g.fillStyle = "#111";
                    roundRect(g, 4, 4, 120, 120, 22);
                    g.fill();
                    g.strokeStyle = `hsl(${(Math.log2(value)*30)%360}, 100%, 50%)`;
                    g.lineWidth = 6;
                    g.stroke(); } else if (skin === 'galaxy') { g.fillStyle = "#1A0B2E";
                    roundRect(g, 4, 4, 120, 120, 22);
                    g.fill();
                    g.fillStyle = "white";
                    for (let i = 0; i < 30; i++) { g.beginPath();
                        g.arc(Math.random() * 128, Math.random() * 128, Math.random() * 2, 0, 7);
                        g.fill(); } } else if (skin === 'ice') { let grad = g.createLinearGradient(0, 0, 128, 128);
                    grad.addColorStop(0, "#E0F7FA");
                    grad.addColorStop(1, "#00BCD4");
                    g.fillStyle = grad;
                    roundRect(g, 4, 4, 120, 120, 22);
                    g.fill(); } else if (skin === 'lava') { let grad = g.createLinearGradient(0, 0, 128, 128);
                    grad.addColorStop(0, "#FF5722");
                    grad.addColorStop(1, "#FFC107");
                    g.fillStyle = grad;
                    roundRect(g, 4, 4, 120, 120, 22);
                    g.fill(); } else { g.fillStyle = "#111";
                    roundRect(g, 4, 4, 120, 120, 22);
                    g.fill(); }

                const badgeSkins = ['whitered', 'whitegreen', 'zebra', 'rainbow', 'galaxy', 'neon', 'ice', 'lava', 'gold'];
                const hasBadge = badgeSkins.includes(skin);
                if (hasBadge) {
                    g.save();
                    g.shadowColor = "rgba(0,0,0,0.35)";
                    g.shadowBlur = 7;
                    g.shadowOffsetY = 2;
                    g.beginPath();
                    g.arc(64, 66, 37, 0, Math.PI * 2);
                    g.fillStyle = "rgba(255,255,255,0.96)";
                    g.fill();
                    g.restore();
                    g.lineWidth = 3;
                    g.strokeStyle = "rgba(0,0,0,0.12)";
                    g.beginPath();
                    g.arc(64, 66, 37, 0, Math.PI * 2);
                    g.stroke();
                }
                g.font = hasBadge ? `800 ${value>=1024?30:value>=128?36:44}px 'Baloo 2', sans-serif` :
                    `800 ${value>=1024?42:value>=128?50:60}px 'Baloo 2', sans-serif`;
                g.textAlign = "center";
                g.textBaseline = "middle";
                g.fillStyle = hasBadge ? "#2F1B0D" : (skin === 'wood' ? (value >= 128 ? "#FFF" : "#000") : "#FFF");
                g.fillText(value, 64, hasBadge ? 66 : 68);
                const t = new THREE.CanvasTexture(cv);
                t.anisotropy = 4;
                textureCache.set(key, t);
                return t;
            }

            function roundRect(g, x, y, w, h, r) {
                g.beginPath();
                g.moveTo(x + r, y);
                g.arcTo(x + w, y, x + w, y + h, r);
                g.arcTo(x + w, y + h, x, y + h, r);
                g.arcTo(x, y + h, x, y, r);
                g.arcTo(x, y, x + w, y, r);
                g.closePath();
            }

            function makeCube(value) {
                const tex = getTexture(value);
                const m = new THREE.Mesh(sharedBoxGeo, new THREE.MeshLambertMaterial({ map: tex, color: 0xdddddd }));
                m.userData.value = value;
                return m;
            }

            function tween(obj, to, dur, ease, done) {
                const from = {};
                for (const k in to) from[k] = obj[k];
                anims.push({ obj, from, to, dur, t: 0, ease: ease || (t => 1 - Math.pow(1 - t, 3)), done });
            }

            function stepAnims(dt) {
                for (let i = anims.length - 1; i >= 0; i--) {
                    const a = anims[i];
                    a.t += dt / a.dur;
                    const k = a.t >= 1 ? 1 : a.ease(a.t);
                    for (const p in a.to) a.obj[p] = a.from[p] + (a.to[p] - a.from[p]) * k;
                    if (a.t >= 1) { anims.splice(i, 1);
                        a.done && a.done(); }
                }
            }

            function initThree() {
                const canvas = document.getElementById("game");
                if (!canvas) return;
                renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
                renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x87CEEB); // sky blue
                camera = new THREE.PerspectiveCamera(42, innerWidth / innerHeight, 0.1, 60);
                scene.add(new THREE.AmbientLight(0xffffff, 0.7));
                const sun = new THREE.DirectionalLight(0xffffff, 0.8);
                sun.position.set(4, 8, 7);
                scene.add(sun);

                boardGroup = new THREE.Group();
                boardGroup.rotation.x = -0.10;
                scene.add(boardGroup);
                backMesh = new THREE.Mesh(new THREE.BoxGeometry(BOARD_W + 0.7, BOARD_H + 0.7, 0.3), new THREE
                    .MeshLambertMaterial());
                backMesh.position.z = -0.65;
                boardGroup.add(backMesh);
                cellMat = new THREE.MeshLambertMaterial();
                const cellGeo = new THREE.BoxGeometry(CELL * 0.96, CELL * 0.96, 0.12);
                for (let c = 0; c < COLS; c++)
                    for (let r = 0; r < ROWS; r++) {
                        const m = new THREE.Mesh(cellGeo, cellMat);
                        const p = cellPos(c, r);
                        m.position.set(p.x, p.y, -0.42);
                        boardGroup.add(m);
                    }
                updateBoardColorsLive();

                // Background elements (grass, flowers, sun, clouds)
                createBackground();

                aziramPet = createAziram();
                scene.add(aziramPet);
                updateAziramScreenPosition();

                raycaster = new THREE.Raycaster();
                pointer = new THREE.Vector2();
                onResize();
                addEventListener("resize", onResize);
                requestAnimationFrame(loop);
            }

            function updateBoardColorsLive() {
                const bData = SHOP.boards.find(b => b.id === save.equippedBoard) || SHOP.boards[0];
                backMesh.material.color.set(bData.back);
                cellMat.color.set(bData.cell);
            }

            function onResize() {
                renderer.setSize(innerWidth, innerHeight);
                camera.aspect = innerWidth / innerHeight;
                const dist = (BOARD_H / 2 + 2.5) / Math.tan(THREE.MathUtils.degToRad(camera.fov / 2));
                camera.position.set(0, -1.8, dist + 1.5);
                camera.lookAt(0, -1.2, 0);
                camera.updateProjectionMatrix();
                updateAziramScreenPosition();
            }

            function cellPos(c, r) {
                return {
                    x: -BOARD_W / 2 + CELL / 2 + c * (CELL + GAP),
                    y: BOARD_H / 2 - CELL / 2 - r * (CELL + GAP)
                };
            }

            function newBoard() {
                // Clear any leftover current cube
                if (currentCube) { boardGroup.remove(currentCube);
                    currentCube = null; }
                for (let c = 0; c < COLS; c++)
                    for (let r = 0; r < ROWS; r++) { if (grid[c] && grid[c][r]) { boardGroup.remove(grid[c][r].mesh);
                            disposeMaterial(grid[c][r].mesh); } }
                grid = Array.from({ length: COLS }, () => Array(ROWS).fill(null));
                score = save.score || 0;
                updateHUD();
                for (let i = 0; i < LEVELS[Math.min(level, LEVELS.length - 1)].preset; i++) {
                    const c = Math.floor(Math.random() * COLS);
                    const r = colHeight(c);
                    if (r < 3) placeCube(c, r, [2, 4, 8, 16][Math.floor(Math.random() * 4)], true);
                }
                spawnCurrent();
                lastActionTime = performance.now();
                // Announce mission via speech
                const mission = LEVELS[Math.min(level, LEVELS.length - 1)].text;
                setTimeout(() => showSpeech("🎯 Αποστολή: " + mission + "!", 3500), 500);
                speak("Αποστολή: " + mission);
            }

            function disposeMaterial(mesh) {
                if (mesh.material) {
                    if (mesh.material.map) {
                        const key = save.equippedCube + '|' + mesh.userData.value;
                        // don't delete from cache, just dispose if needed
                        mesh.material.map = null;
                    }
                    mesh.material.dispose();
                }
            }

            function colHeight(c) { let h = 0; while (h < ROWS && grid[c][h]) h++; return h; }

            function placeCube(c, r, value, instant) {
                const cube = makeCube(value);
                const p = cellPos(c, r);
                cube.position.set(p.x, p.y, 0.1);
                boardGroup.add(cube);
                grid[c][r] = { value, mesh: cube };
                if (!instant) { cube.scale.set(.4, .4, .4);
                    tween(cube.scale, { x: 1, y: 1, z: 1 }, 0.22); }
                return grid[c][r];
            }

            function spawnCurrent() {
                let maxOnBoard = 4;
                for (let c = 0; c < COLS; c++)
                    for (let r = 0; r < ROWS; r++)
                        if (grid[c][r]) maxOnBoard = Math.max(maxOnBoard, grid[c][r].value);
                const pool = [];
                for (let v = 2; v <= Math.min(32, Math.max(4, maxOnBoard / 2)); v *= 2) pool.push(v, v, v === 2 ? v : 0);
                const vals = pool.filter(Boolean);
                currentCube = makeCube(vals[Math.floor(Math.random() * vals.length)]);
                currentCube.position.set(cellPos(aimCol, 0).x, launchY, 0.1);
                currentCube.scale.set(.3, .3);
                boardGroup.add(currentCube);
                tween(currentCube.scale, { x: 1, y: 1, z: 1 }, 0.2);
            }

            function setAim(c, instant = false) {
                aimCol = Math.max(0, Math.min(COLS - 1, Math.round(c)));
                if (currentCube && !busy) {
                    const tx = cellPos(aimCol, 0).x;
                    if (instant) currentCube.position.x = tx;
                    else tween(currentCube.position, { x: tx }, 0.09);
                }
            }

            function colFromPointer(clientX, clientY) {
                const x = clientX / innerWidth * 2 - 1;
                const y = -((clientY) / innerHeight * 2 - 1);
                pointer.set(x, y);
                raycaster.setFromCamera(pointer, camera);
                const hit = new THREE.Vector3();
                raycaster.ray.intersectPlane(new THREE.Plane(new THREE.Vector3(0, 0, 1).applyQuaternion(boardGroup
                    .quaternion), 0), hit);
                boardGroup.worldToLocal(hit);
                const c = Math.max(0, Math.min(COLS - 1, Math.round((hit.x + BOARD_W / 2 - CELL / 2) / (CELL + GAP))));
                return c;
            }

            function launch() {
                if (busy || !currentCube) return;
                const c = aimCol;
                const h = colHeight(c);
                if (h >= ROWS) {
                    if (isBoardFull()) { gameOver(); return; }
                    toast("Γεμάτη στήλη!");
                    return;
                }
                busy = true;
                lastActionTime = performance.now();
                playSound('drop');
                const eff = save.equippedEffect;
                if (eff !== 'eff_none') {
                    const wp = new THREE.Vector3();
                    currentCube.getWorldPosition(wp);
                    const etype = eff.replace('eff_', '');
                    if (etype === 'explode') spawnBurst(wp.x, wp.y - 0.3, wp.z, 'explode', 18);
                    else if (etype === 'confetti') spawnBurst(wp.x, wp.y - 0.3, wp.z, 'confetti', 20);
                    else spawnBurst(wp.x, wp.y - 0.3, wp.z, etype, 10);
                }
                const targetR = h;
                const p = cellPos(c, targetR);
                const cube = currentCube;
                currentCube = null;
                tween(cube.position, { y: p.y }, Math.max(0.13, Math.abs(cube.position.y - p.y) * 0.045), null, () => {
                    boardGroup.remove(cube);
                    const cell = placeCube(c, targetR, cube.userData.value, true);
                    cell.mesh.scale.set(1.15, 0.85, 1.15);
                    tween(cell.mesh.scale, { x: 1, y: 1, z: 1 }, 0.18);
                    resolveMerges([{ c, r: targetR }]).then(() => {
                        if (checkWin()) {
                            busy = false;
                            spawnCurrent();
                            setAim(aimCol);
                            return;
                        }
                        if (isBoardFull()) { gameOver(); return; }
                        busy = false;
                        spawnCurrent();
                        setAim(aimCol);
                    });
                });
            }

            function isBoardFull() { for (let c = 0; c < COLS; c++)
                    for (let r = 0; r < ROWS; r++) if (!grid[c][r]) return false; return true; }

            function boardFillRatio() {
                let filled = 0;
                for (let c = 0; c < COLS; c++)
                    for (let r = 0; r < ROWS; r++)
                        if (grid[c] && grid[c][r]) filled++;
                return filled / (COLS * ROWS);
            }

            // ---- GRAVITY (fixed) ----
            function applyGravity() {
                const moved = [];
                for (let c = 0; c < COLS; c++) {
                    let w = 0;
                    for (let r = 0; r < ROWS; r++) {
                        if (grid[c][r]) {
                            if (r !== w) {
                                grid[c][w] = grid[c][r];
                                grid[c][r] = null;
                                tween(grid[c][w].mesh.position, { y: cellPos(c, w).y }, 0.15);
                                moved.push({ c, r: w });
                            }
                            w++;
                        }
                    }
                }
                return moved;
            }

            async function resolveMerges(queue) {
                while (queue.length) {
                    const { c, r } = queue.shift();
                    const cell = grid[c][r];
                    if (!cell) continue;
                    const same = [{ c: c - 1, r }, { c: c + 1, r }, { c, r: r - 1 }, { c, r: r + 1 }].filter(n => n.c >=
                        0 && n.c < COLS && n.r >= 0 && n.r < ROWS && grid[n.c][n.r] && grid[n.c][n.r].value ===
                        cell.value);
                    if (!same.length) continue;
                    const newVal = cell.value * Math.pow(2, same.length);
                    score += newVal;
                    save.score = score;
                    coins += 1;
                    save.coins = coins;
                    updateHUD();
                    await new Promise(res => {
                        let left = same.length;
                        const tp = cellPos(c, r);
                        same.forEach(n => {
                            const m = grid[n.c][n.r].mesh;
                            grid[n.c][n.r] = null;
                            tween(m.position, { x: tp.x, y: tp.y }, 0.14, null, () => {
                                boardGroup.remove(m);
                                if (--left === 0) res();
                            });
                            tween(m.scale, { x: .5, y: .5, z: .5 }, 0.14);
                        });
                    });
                    playSound('merge');
                    const eff = save.equippedEffect;
                    if (eff !== 'eff_none') {
                        const wp = new THREE.Vector3();
                        cell.mesh.getWorldPosition(wp);
                        const etype = eff.replace('eff_', '');
                        if (etype === 'explode') spawnBurst(wp.x, wp.y, wp.z, 'explode', 20);
                        else if (etype === 'confetti') spawnBurst(wp.x, wp.y, wp.z, 'confetti', 25);
                        else spawnBurst(wp.x, wp.y, wp.z, etype, 12);
                    }
                    if (newVal >= 64 && aziramWinTime <= 0) {
                        aziramReactionTime = 1.2;
                        showSpeech("WOW! " + newVal + "! 🤩", 1800);
                    }
                    boardGroup.remove(cell.mesh);
                    grid[c][r] = null;
                    const up = placeCube(c, r, newVal);
                    up.mesh.scale.set(1.35, 1.35, 1.35);
                    tween(up.mesh.scale, { x: 1, y: 1, z: 1 }, 0.22);
                    const moved = applyGravity();
                    queue.push({ c, r }, ...moved);
                    await new Promise(r => setTimeout(r, 120));
                }
                persist();
            }

            let winTimer = null;
            let winShown = false;

            function checkWin() {
                const t = LEVELS[Math.min(level, LEVELS.length - 1)].target;
                let win = false;
                for (let c = 0; c < COLS; c++)
                    for (let r = 0; r < ROWS; r++)
                        if (grid[c][r] && grid[c][r].value >= t) { win = true; break; }
                if (!win) return false;

                if (!winShown) {
                    winShown = true;
                    coins += 25;
                    save.coins = coins;
                    best = Math.max(best, score);
                    save.best = best;
                    save.level = Math.min(level + 1, LEVELS.length - 1);
                    persist();
                    updateHUD();
                    document.getElementById("winText").innerHTML = `Έφτιαξες ${t}!<br>+25 🪙<br>Το παιχνίδι συνεχίζεται!`;

                    playWinSound(audioCtx);
                    for (let i = 0; i < 30; i++) {
                        setTimeout(() => {
                            const x = (Math.random() - 0.5) * 14;
                            const y = (Math.random() - 0.5) * 10 + 2;
                            spawnBurst(x, y, 0, 'confetti', 15);
                            spawnBurst(x, y, 0, 'explode', 10);
                        }, i * 120);
                    }
                    aziramWinTime = 6.0;
                    showSpeech("Τα καταφέραμε! 🎉", 3800);
                    speak("Μπράβο! Τα καταφέραμε!");

                    if (winTimer) clearTimeout(winTimer);
                    winTimer = setTimeout(() => {
                        document.getElementById("winModal").classList.remove("hidden");
                        winTimer = null;
                    }, 3500);
                }
                return true;
            }

            function gameOver() {
                busy = true;
                best = Math.max(best, score);
                save.best = best;
                save.score = 0;
                persist();
                showSpeech("Ωχ όχι! 😭", 2500);
                speak("Ωχ όχι! Γέμισε το ταμπλό!");
                document.getElementById("loseText").innerHTML = `Σκορ: <b>${score}</b>`;
                document.getElementById("loseModal").classList.remove("hidden");
            }

            function onTap(e) {
                if (document.querySelector(".overlay:not(.hidden)")) return;
                lastActionTime = performance.now();
                const x = (e.touches ? e.touches[0].clientX : e.clientX);
                const y = (e.touches ? e.touches[0].clientY : e.clientY);
                const px = x / innerWidth * 2 - 1;
                const py = -(y / innerHeight * 2 - 1);
                pointer.set(px, py);
                raycaster.setFromCamera(pointer, camera);

                if (aziramPet) {
                    const hits = raycaster.intersectObject(aziramPet, true);
                    if (hits.length > 0 && aziramWinTime <= 0) {
                        if (petState === 'sleep') {
                            petState = 'stand';
                            petStateTimer = 2.5;
                            showSpeech("Ε; Ξύπνησα! 😳", 1800);
                            speak("Ε; Ξύπνησα!");
                            return;
                        }
                        aziramReactionTime = 1.0;
                        const greetings = ["Γεια σου! 😊", "Χι χι! 😄", "Παίζουμε; 🎮", "Είμαι ο Aziram! 💚"];
                        const pick = greetings[Math.floor(Math.random() * greetings.length)];
                        showSpeech(pick, 1800);
                        speak(pick.replace(/[^\u0370-\u03FF\u1F00-\u1FFFa-zA-Z; !?]/g, '').trim());
                        if (audioCtx.state !== 'suspended') playSound('drop');
                        return;
                    }
                }

                if (hammerMode) {
                    const c = colFromPointer(x, y);
                    if (c >= 0 && c < COLS && grid[c] && grid[c][0]) {
                        // remove topmost cube in that column
                        let r = 0;
                        while (r < ROWS && grid[c][r]) r++;
                        r--;
                        if (r >= 0) {
                            hammerMode = false;
                            const m = grid[c][r].mesh;
                            grid[c][r] = null;
                            tween(m.scale, { x: .01, y: .01, z: .01 }, 0.18, null, () => boardGroup.remove(m));
                            busy = true;
                            setTimeout(() => {
                                const moved = applyGravity();
                                resolveMerges(moved).then(() => { busy = false;
                                    updateHUD();
                                    persist(); });
                            }, 180);
                            return;
                        }
                    }
                    hammerMode = false;
                    updateHUD();
                    return;
                }

                const c = colFromPointer(x, y);
                setAim(c, true);
                launch();
            }

            document.getElementById("btnHammer").onclick = () => { if (busy) return;
                hammerMode = true;
                updateHUD();
                toast("🔨 Επίλεξε στήλη για να αφαιρέσεις τον πάνω κύβο"); };
            document.getElementById("btnShuffle").onclick = () => { if (busy || !currentCube) return;
                boardGroup.remove(currentCube);
                currentCube = null;
                spawnCurrent();
                setAim(aimCol);
                updateHUD(); };
            document.getElementById("btnMagnet").onclick = () => {
                if (busy) return;
                let tilesByVal = {};
                for (let c = 0; c < COLS; c++)
                    for (let r = 0; r < ROWS; r++)
                        if (grid[c][r]) { let v = grid[c][r].value;
                            if (!tilesByVal[v]) tilesByVal[v] = [];
                            tilesByVal[v].push({ c, r, cell: grid[c][r] }); }
                let mg = Object.values(tilesByVal).filter(g => g.length > 1);
                if (!mg.length) return toast("Κανένα ζευγάρι!");
                busy = true;
                let animsP = 0;
                mg.forEach(group => {
                    const trg = group[0];
                    trg.newVal = trg.cell.value * Math.pow(2, group.length - 1);
                    group.slice(1).forEach(t => {
                        const m = t.cell.mesh;
                        grid[t.c][t.r] = null;
                        const tp = cellPos(trg.c, trg.r);
                        animsP++;
                        tween(m.position, { x: tp.x, y: tp.y, z: 1.0 }, 0.35, null, () => { boardGroup
                                .remove(m); if (--animsP === 0) finMagnet(mg); });
                        tween(m.scale, { x: 0.3, y: 0.3, z: 0.3 }, 0.35);
                    });
                });
            };

            function finMagnet(mg) {
                playSound('merge');
                mg.forEach(g => {
                    const trg = g[0];
                    boardGroup.remove(trg.cell.mesh);
                    grid[trg.c][trg.r] = null;
                    score += trg.newVal;
                    save.score = score;
                    const up = placeCube(trg.c, trg.r, trg.newVal);
                    up.mesh.scale.set(1.5, 1.5, 1.5);
                    tween(up.mesh.scale, { x: 1, y: 1, z: 1 }, 0.25);
                });
                setTimeout(() => {
                    const moved = applyGravity();
                    resolveMerges(moved).then(() => { busy = false;
                        updateHUD();
                        persist(); });
                }, 250);
            }

            // ---------- SHOP ----------
            function getShopProperties(tab) {
                const map = {
                    cubes: { owned: 'ownedCubes', equip: 'equippedCube' },
                    boards: { owned: 'ownedBoards', equip: 'equippedBoard' },
                    effects: { owned: 'ownedEffects', equip: 'equippedEffect' },
                    sounds: { owned: 'ownedSounds', equip: 'equippedSound' }
                };
                return map[tab] || { owned: '', equip: '' };
            }

            function renderShop() {
                const container = document.getElementById('shopContainer');
                container.innerHTML = '';
                const activeTab = document.querySelector('.shop-tab.active').dataset.maintab;
                const arr = SHOP[activeTab] || [];
                const props = getShopProperties(activeTab);

                arr.forEach(item => {
                    const isOwned = save[props.owned] && save[props.owned].includes(item.id);
                    const isEquipped = save[props.equip] === item.id;
                    const el = document.createElement('div');
                    el.className = `shop-item ${isOwned?'owned':''} ${isEquipped?'equipped':''}`;
                    el.innerHTML =
                        `<div style="font-size:34px; margin-bottom:3px;">${item.icon}</div><h3>${item.name}</h3><div class="price">${isEquipped?'ΕΠΙΛΕΓΜΕΝΟ':isOwned?'ΕΠΙΛΟΓΗ':item.price===0?'Δωρεάν':item.price+' 🪙'}</div>`;
                    el.onclick = () => {
                        if (isOwned) {
                            save[props.equip] = item.id;
                            persist();
                            renderShop();
                            applyShopChanges(activeTab);
                            toast("Επιλέχθηκε: " + item.name);
                        } else if (coins >= item.price) {
                            coins -= item.price;
                            save.coins = coins;
                            save[props.owned].push(item.id);
                            save[props.equip] = item.id;
                            persist();
                            updateHUD();
                            renderShop();
                            applyShopChanges(activeTab);
                            toast("Αγόρασες το " + item.name + "!");
                        } else { toast("Δεν έχεις αρκετά νομίσματα!"); }
                    };
                    container.appendChild(el);
                });
            }

            function applyShopChanges(tabChanged) {
                if (tabChanged === 'boards') updateBoardColorsLive();
                if (tabChanged === 'cubes') {
                    // update all cubes on board
                    for (let c = 0; c < COLS; c++)
                        for (let r = 0; r < ROWS; r++)
                            if (grid[c][r]) { const m = grid[c][r].mesh;
                                m.material.map = getTexture(grid[c][r].value);
                                m.material.needsUpdate = true; }
                    if (currentCube) { currentCube.material.map = getTexture(currentCube.userData.value);
                        currentCube.material.needsUpdate = true; }
                    toast("Η εμφάνιση κύβου άλλαξε!");
                }
                if (tabChanged === 'effects') toast("Το εφέ άλλαξε!");
                if (tabChanged === 'sounds') toast("Ο ήχος άλλαξε!");
            }

            document.querySelectorAll('.shop-tab').forEach(btn => {
                btn.onclick = (e) => {
                    document.querySelectorAll('.shop-tab').forEach(b => b.classList.remove('active'));
                    e.currentTarget.classList.add('active');
                    renderShop();
                };
            });

            // ---------- HUD ----------
            function updateHUD() {
                document.getElementById("hudLevel").textContent = level + 1;
                document.getElementById("hudScore").textContent = score;
                document.getElementById("hudCoins").textContent = coins;
                document.getElementById("btnHammer").classList.toggle("armed", hammerMode);
            }

            let toastTimer;

            function toast(msg) {
                const t = document.getElementById("toast");
                t.textContent = msg;
                t.style.opacity = 1;
                clearTimeout(toastTimer);
                toastTimer = setTimeout(() => t.style.opacity = 0, 2000);
            }

            // ---------- MOOD SYSTEM ----------
            let lastSmokeTime = 0;

            function computeMood(now) {
                const fill = boardFillRatio();
                if (fill >= 0.8) return 'anxious';
                if (fill >= 0.65) return 'angry';
                if (now - lastActionTime > 15000) return 'bored';
                return 'idle';
            }

            function onMoodChange(mood) {
                if (mood === 'angry') showSpeech("Γεμίζει το ταμπλό! 😠", 2200);
                if (mood === 'anxious') showSpeech("ΠΑΝΙΚΟΣ!! 😱", 2200);
                if (mood === 'bored') showSpeech("Βαριέμαι... 🥱", 2200);
            }

            let lastT = 0;

            function loop(t) {
                const dt = Math.min(0.05, (t - lastT) / 1000);
                lastT = t;
                if (!lastActionTime) lastActionTime = performance.now();
                stepAnims(dt);
                updateParticles(dt);
                updateBackground(dt);

                if (aziramPet) {
                    const core = aziramPet.children[0];
                    if (aziramBodyMesh.userData.isRainbow) aziramBodyMesh.material.color.setHSL((t * 0.0005) % 1, 1,
                        0.5);

                    if (aziramWinTime > 0) {
                        aziramWinTime -= dt;
                        core.position.y = Math.abs(Math.sin(t * 0.008)) * 1.2;
                        aziramPet.rotation.x -= 0.15;
                        aziramPet.rotation.y += 0.1;
                        sockets.handL.position.y = 0.8 + Math.sin(t * 0.015) * 0.2;
                        sockets.handR.position.y = 0.8 + Math.cos(t * 0.015) * 0.2;
                        sockets.handL.position.x = -0.3 + Math.sin(t * 0.015) * 0.2;
                        sockets.handR.position.x = 0.3 - Math.sin(t * 0.015) * 0.2;
                        mouthMesh.scale.set(0.85, 0.85, 0.35);
                        if (Math.random() < 0.25) {
                            let wp = new THREE.Vector3();
                            core.getWorldPosition(wp);
                            spawnBurst(wp.x + (Math.random() - 0.5) * 2, wp.y + 1, wp.z, 'confetti', 4);
                        }
                    } else if (aziramReactionTime > 0) {
                        aziramReactionTime -= dt;
                        aziramPet.rotation.x = 0.2;
                        core.position.y = 0.2 * Math.sin(t * 0.2);
                        core.position.x = 0.1 * Math.cos(t * 0.2);
                        aziramPet.rotation.y = -0.3 + Math.sin(t * 0.15) * 0.1;
                        core.scale.x = 1 + Math.sin(t * 0.2) * 0.1;
                        core.scale.y = 1 + Math.cos(t * 0.2) * 0.1;
                        sockets.handL.position.y = Math.sin(t * 0.25) * 0.5;
                        sockets.handR.position.y = Math.cos(t * 0.25) * 0.5;
                        mouthMesh.scale.set(0.7, 0.7, 0.35);
                        browL.visible = false;
                        browR.visible = false;
                    } else {
                        const now = performance.now();
                        aziramMood = computeMood(now);
                        if (aziramMood !== prevMood) { onMoodChange(aziramMood);
                            prevMood = aziramMood; }

                        if (aziramMood === 'angry' || aziramMood === 'anxious') {
                            if (petState === 'sleep' || petState === 'walk') { petState = 'stand';
                                petStateTimer = 2; }
                        } else {
                            petStateTimer -= dt;
                            if (petStateTimer <= 0) pickNextState();
                        }

                        if (petState === 'walk') {
                            const dir = Math.sign(wanderTargetX - aziramNdcX);
                            if (dir !== 0) faceDir = dir;
                            aziramNdcX += dir * 0.11 * dt;
                            if (Math.abs(wanderTargetX - aziramNdcX) < 0.02) {
                                petState = 'stand';
                                petStateTimer = 1.5 + Math.random() * 2.5;
                            }
                        }
                        updateAziramScreenPosition();

                        core.position.x = 0;
                        aziramPet.rotation.x = 0.2;

                        if (petState === 'sleep') {
                            aziramPet.rotation.z += (1.15 - aziramPet.rotation.z) * 0.06;
                            aziramPet.rotation.y += (-0.1 - aziramPet.rotation.y) * 0.06;
                            core.scale.y = 1 + Math.sin(t * 0.0015) * 0.05;
                            core.scale.x = 1 + Math.cos(t * 0.0015) * 0.05;
                            core.position.y = -0.15;
                            sockets.handL.position.y = -0.1;
                            sockets.handR.position.y = -0.1;
                            if (aziramEyes) aziramEyes.scale.set(1, 0.1, 1);
                            if (!isTalking) mouthMesh.scale.set(0.4, 0.18, 0.35);
                            browL.visible = false;
                            browR.visible = false;
                            if (Math.random() < 0.004) showSpeech("Zzz 💤", 1600);
                        } else if (petState === 'hop') {
                            aziramPet.rotation.z += (0 - aziramPet.rotation.z) * 0.15;
                            aziramPet.rotation.y += (-0.3 - aziramPet.rotation.y) * 0.1;
                            core.position.y = Math.abs(Math.sin(t * 0.012)) * 0.5;
                            core.scale.y = 1 + Math.sin(t * 0.012) * 0.08;
                            core.scale.x = 1;
                            sockets.handL.position.y = Math.abs(Math.sin(t * 0.012)) * 0.3;
                            sockets.handR.position.y = Math.abs(Math.sin(t * 0.012)) * 0.3;
                            if (aziramEyes) aziramEyes.scale.set(1, 1, 1);
                            if (!isTalking) mouthMesh.scale.set(0.8, 0.5, 0.35);
                            browL.visible = false;
                            browR.visible = false;
                        } else if (petState === 'walk') {
                            aziramPet.rotation.z += (0 - aziramPet.rotation.z) * 0.15;
                            aziramPet.rotation.y += ((faceDir > 0 ? 0.55 : -1.1) - aziramPet.rotation.y) * 0.08;
                            core.position.y = Math.abs(Math.sin(t * 0.012)) * 0.12;
                            core.scale.set(1, 1, 1);
                            sockets.footL.position.y = -0.88 + Math.max(0, Math.sin(t * 0.012)) * 0.18;
                            sockets.footR.position.y = -0.88 + Math.max(0, -Math.sin(t * 0.012)) * 0.18;
                            sockets.handL.position.y = Math.sin(t * 0.012) * 0.12;
                            sockets.handR.position.y = -Math.sin(t * 0.012) * 0.12;
                            if (aziramEyes) aziramEyes.scale.set(1, 1, 1);
                            if (!isTalking) mouthMesh.scale.set(1, 0.35, 0.35);
                            browL.visible = false;
                            browR.visible = false;
                        } else {
                            aziramPet.rotation.z += (0 - aziramPet.rotation.z) * 0.1;
                            aziramPet.rotation.y += (-0.3 - aziramPet.rotation.y) * 0.1;
                            core.scale.y = 1 + Math.sin(t * 0.004) * 0.04;
                            core.scale.x = 1 + Math.cos(t * 0.004) * 0.04;
                            core.position.y = Math.sin(t * 0.002) * 0.15;
                            sockets.handL.position.y = Math.sin(t * 0.003) * 0.1;
                            sockets.handR.position.y = Math.cos(t * 0.003) * 0.1;
                            sockets.footL.position.y = -0.88 + Math.cos(t * 0.004) * 0.05;
                            sockets.footR.position.y = -0.88 + Math.sin(t * 0.004) * 0.05;

                            const showBrows = aziramMood === 'angry';
                            browL.visible = showBrows;
                            browR.visible = showBrows;
                            if (showBrows) { browL.rotation.z = -0.45;
                                browR.rotation.z = 0.45; }

                            if (aziramMood === 'angry') {
                                if (aziramEyes) aziramEyes.scale.set(1, 0.7, 1);
                                if (!isTalking) mouthMesh.scale.set(0.8, 0.12, 0.35);
                                if (now - lastSmokeTime > 1200) {
                                    lastSmokeTime = now;
                                    const wp = new THREE.Vector3();
                                    sockets.head.getWorldPosition(wp);
                                    spawnBurst(wp.x, wp.y + 0.2, wp.z, 'smoke', 2);
                                }
                            } else if (aziramMood === 'anxious') {
                                if (aziramEyes) aziramEyes.scale.set(1.3, 1.3, 1.3);
                                if (!isTalking) mouthMesh.scale.set(0.5, 0.55, 0.35);
                                aziramPet.position.x += (Math.random() - 0.5) * 0.05;
                                aziramPet.position.y += (Math.random() - 0.5) * 0.05;
                            } else if (aziramMood === 'bored') {
                                if (aziramEyes) aziramEyes.scale.set(1, 0.35, 1);
                                aziramPet.rotation.z = Math.sin(t * 0.0008) * 0.12;
                                const yawn = Math.max(0, Math.sin(t * 0.0012));
                                if (!isTalking) mouthMesh.scale.set(0.55 + yawn * 0.2, 0.2 + yawn * 0.55, 0.35);
                            } else {
                                if (aziramEyes) aziramEyes.scale.set(1, 1, 1);
                                if (!isTalking) mouthMesh.scale.set(1, 0.35, 0.35);
                            }
                        }

                        if (!aziramBodyMesh.userData.isRainbow) {
                            const target = (aziramMood === 'angry' || aziramMood === 'anxious') ? angryColor :
                                aziramBaseColor;
                            aziramBodyMesh.material.color.lerp(target, 0.06);
                        }
                    }

                    if (isTalking && mouthMesh) {
                        mouthMesh.scale.y = 0.25 + Math.abs(Math.sin(t * 0.025)) * 0.55;
                        mouthMesh.scale.x = 0.7 + Math.abs(Math.cos(t * 0.02)) * 0.2;
                    }

                    core.traverse(child => { if (child.userData && child.userData.onUpdate) child.userData
                            .onUpdate(t); });
                }

                if (currentCube && !busy) currentCube.rotation.y = Math.sin(t * 0.002) * 0.12;
                if (renderer) renderer.render(scene, camera);
                requestAnimationFrame(loop);
            }

            // ---------- INIT ----------
            (async function() {
                // Clean old saves
                const keys = ['drop2048-save-pure', 'drop2048-save-v2', 'drop2048-save-v3', 'drop2048-save-v4',
                    'drop2048-v5', 'drop2048-frankly-v1', 'drop2048-frankly-v2', 'drop2048-frankly-v3',
                    'drop2048-frankly-v4', 'drop2048-frankly-v5', 'drop2048-frankly-v6', 'drop2048-frankly-v7'
                ];
                keys.forEach(k => localStorage.removeItem(k));

                document.getElementById('btnShop').onclick = () => { renderShop();
                    document.getElementById('shopModal').classList.remove('hidden'); };
                document.getElementById('btnCloseShop').onclick = () => { document.getElementById('shopModal')
                    .classList.add('hidden'); };

                document.addEventListener('pointerdown', () => { if (audioCtx.state === 'suspended') audioCtx
                        .resume(); }, { once: true });
                document.addEventListener('pointerdown', () => {
                    try { const u = new SpeechSynthesisUtterance(' ');
                        u.volume = 0;
                        speechSynthesis.speak(u); } catch (e) {}
                }, { once: true });

                loadSave();
                coins = save.coins || 5000;
                level = save.level || 0;
                best = save.best || 0;
                score = save.score || 0;

                initThree();
                if (!renderer) return;
                newBoard();
                updateHUD();
                initMic();

                // Add expressive eyes
                addExpressiveEyes(0x111111);

                const cvs = document.getElementById("game");
                cvs.addEventListener("pointermove", (e) => {
                    if (!busy) {
                        const x = (e.touches ? e.touches[0].clientX : e.clientX);
                        const c = colFromPointer(x, 0);
                        setAim(c, false);
                    }
                });
                cvs.addEventListener("pointerdown", onTap);
                document.getElementById("btnNext").onclick = () => {
                    document.getElementById("winModal").classList.add("hidden");
                    level = Math.min(level + 1, LEVELS.length - 1);
                    winShown = false;
                    busy = false;
                    updateHUD();
                };
                document.getElementById("btnRetry").onclick = () => {
                    document.getElementById("loseModal").classList.add("hidden");
                    busy = false;
                    newBoard();
                    winShown = false;
                };
            })();
        })();
    </script>
</body>
</html>
