<!DOCTYPE html> 
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Drop 2048 · FranklyGames Edition</title>
    <style>
        :root {
            --bg: #0B0C10;
            --panel: #8C6A4F;
            --panel-deep: #4A3423;
            --cream: #F7EFDC;
            --ink: #2F1B0D;
            --accent: #F2A03D;
            --good: #7FA653;
            --coin: #F5C542;
            --red: #C2542F;
            --blue: #4A7DBF;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html,
        body {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: "Baloo 2", system-ui, sans-serif;
            color: var(--ink);
            user-select: none;
            touch-action: none;
        }
        #game {
            position: fixed;
            inset: 0;
            display: block;
            z-index: 0;
            background: var(--bg);
        }

        /* ===== HUD (TOP) - ΜΕΓΑΛΩΜΕΝΟ ===== */
        .hud {
            position: fixed;
            left: 0;
            right: 0;
            top: 0;
            padding: 14px 18px 12px;
            display: flex;
            gap: 12px;
            align-items: center;
            pointer-events: none;
            z-index: 5;
            background: rgba(11, 12, 16, 0.85);
            backdrop-filter: blur(8px);
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            height: 76px;
            flex-wrap: nowrap;
        }
        .chip {
            background: var(--panel-deep);
            color: var(--cream);
            border-radius: 18px;
            padding: 8px 16px;
            font-weight: 800;
            font-size: 18px;
            box-shadow: 0 4px 0 rgba(0, 0, 0, .3);
            display: flex;
            align-items: center;
            gap: 6px;
            pointer-events: auto;
            line-height: 1.2;
            white-space: nowrap;
        }
        .chip small {
            font-weight: 600;
            opacity: .75;
            font-size: 12px;
            display: block;
            line-height: 1;
        }
        .chip .big {
            font-size: 24px;
            line-height: 1.1;
        }
        .spacer {
            flex: 1;
        }
        .hud-btn {
            background: var(--accent);
            border: none;
            cursor: pointer;
            color: #fff;
            border-radius: 18px;
            padding: 10px 18px;
            font-weight: 800;
            font-size: 18px;
            box-shadow: 0 5px 0 #b8742a;
            pointer-events: auto;
            transition: transform .08s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 5px;
            line-height: 1.3;
            white-space: nowrap;
        }
        .hud-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #b8742a;
        }
        .hud-btn.aziram-btn {
            background: #7c3aed;
            box-shadow: 0 5px 0 #5b21b6;
        }
        .hud-btn.aziram-btn:active {
            box-shadow: 0 2px 0 #5b21b6;
        }
        .hud-btn.mode-btn {
            background: #0ea5e9;
            box-shadow: 0 5px 0 #0369a1;
            font-size: 16px;
            padding: 8px 14px;
        }
        .hud-btn.mode-btn:active {
            box-shadow: 0 2px 0 #0369a1;
        }
        .hud-btn.mode-btn.missions-active {
            background: #f59e0b;
            box-shadow: 0 5px 0 #b45309;
        }

        /* ===== POWERUPS - ΜΕΓΑΛΩΜΕΝΑ ===== */
        .powerbar {
            position: fixed;
            top: 82px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            gap: 14px;
            z-index: 5;
            background: rgba(11, 12, 16, 0.75);
            backdrop-filter: blur(8px);
            padding: 14px 20px;
            border-radius: 26px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: none;
        }
        .pbtn {
            pointer-events: auto;
            border: none;
            cursor: pointer;
            width: 76px;
            height: 76px;
            border-radius: 24px;
            background: var(--good);
            box-shadow: 0 6px 0 #5c7a3a;
            color: #fff;
            font-size: 34px;
            line-height: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0px;
            font-family: inherit;
            transition: transform .08s;
        }
        .pbtn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #5c7a3a;
        }
        .pbtn .cost {
            font-size: 12px;
            font-weight: 800;
            background: rgba(0, 0, 0, .25);
            border-radius: 8px;
            padding: 3px 10px;
            margin-top: -2px;
        }
        .pbtn.armed {
            outline: 4px solid var(--accent);
            background: var(--red);
            box-shadow: 0 6px 0 #8f3c20;
        }
        .pbtn.listening {
            outline: 4px solid #ff5555;
            background: var(--red);
            box-shadow: 0 6px 0 #8f3c20;
            animation: pulse 1s infinite;
        }
        .pbtn.sound-muted {
            background: #888;
            box-shadow: 0 6px 0 #555;
            opacity: 0.7;
        }
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.08);
            }
        }

        /* ===== TOAST ===== */
        #toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            pointer-events: none;
            background: var(--panel-deep);
            color: var(--cream);
            font-weight: 700;
            font-size: 18px;
            border-radius: 20px;
            padding: 14px 28px;
            opacity: 0;
            transition: opacity .25s;
            white-space: nowrap;
            box-shadow: 0 8px 20px rgba(0, 0, 0, .5);
        }

        /* ===== SPEECH BUBBLE ===== */
        #speech {
            position: fixed;
            z-index: 10;
            pointer-events: none;
            font-weight: 800;
            font-size: 26px;
            background: #ffffff;
            color: #333;
            padding: 14px 24px;
            border-radius: 28px;
            border: 4px solid var(--panel-deep);
            box-shadow: 0 6px 0 var(--panel-deep);
            transform: translate(-50%, -120%);
            opacity: 0;
            transition: opacity 0.2s ease-in-out, transform 0.2s ease-in-out;
            max-width: 85vw;
            white-space: normal;
            text-align: center;
        }
        #speech.visible {
            opacity: 1;
            transform: translate(-50%, -140%);
        }
        #speech::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -14px;
            border-width: 16px;
            border-style: solid;
            border-color: #ffffff transparent transparent transparent;
            filter: drop-shadow(0 5px 0 var(--panel-deep));
        }

        /* ===== FULL-SCREEN OVERLAYS (Shop & Aziram) ===== */
        .full-overlay {
            position: fixed;
            inset: 0;
            background: rgba(11, 12, 16, .92);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            backdrop-filter: blur(10px);
        }
        .full-card {
            background: var(--cream);
            border: 6px solid var(--panel-deep);
            border-radius: 0;
            width: 100vw;
            height: 100vh;
            max-width: 100%;
            max-height: 100%;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: pop .3s cubic-bezier(.34, 1.56, .64, 1);
        }
        @keyframes pop {
            from {
                transform: scale(.8);
                opacity: 0;
            }
        }
        .full-card h2 {
            font-size: 30px;
            margin-bottom: 12px;
            font-weight: 800;
            flex-shrink: 0;
            text-align: center;
        }
        .shop-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            border-bottom: 2px solid rgba(0, 0, 0, 0.08);
            padding-bottom: 12px;
            overflow-x: auto;
            flex-shrink: 0;
            flex-wrap: nowrap;
        }
        .shop-tab {
            flex: 0 0 auto;
            padding: 10px 16px;
            font-weight: 800;
            font-size: 15px;
            border-radius: 14px;
            background: #E4D7BC;
            color: #8C6A4F;
            border: none;
            cursor: pointer;
            white-space: nowrap;
            transition: .1s;
        }
        .shop-tab.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 0 #b8742a;
            transform: translateY(-2px);
        }
        .pet-subtabs {
            display: none;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
            background: #f0e5d1;
            padding: 10px 12px;
            border-radius: 14px;
            justify-content: center;
            flex-shrink: 0;
        }
        .pet-subtabs.active {
            display: flex;
        }
        .pet-subtab {
            padding: 6px 14px;
            font-weight: 800;
            font-size: 13px;
            border-radius: 12px;
            background: var(--red);
            color: #fff;
            border: none;
            cursor: pointer;
            transition: .1s;
        }
        .pet-subtab.active {
            background: #5c7a3a;
            box-shadow: 0 3px 0 #3a4d25;
            transform: translateY(-1px);
        }
        .shop-items {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            overflow-y: auto;
            padding-right: 8px;
            flex: 1;
            min-height: 0;
        }
        .shop-items::-webkit-scrollbar {
            width: 6px;
        }
        .shop-items::-webkit-scrollbar-thumb {
            background: var(--panel-deep);
            border-radius: 6px;
        }
        .shop-item {
            background: #E4D7BC;
            border: 3px solid #8C6A4F;
            border-radius: 18px;
            padding: 12px 10px;
            cursor: pointer;
            transition: transform 0.1s;
            text-align: center;
        }
        .shop-item:active {
            transform: scale(0.95);
        }
        .shop-item h3 {
            font-size: 16px;
            margin-bottom: 4px;
            color: var(--ink);
            line-height: 1.2;
        }
        .shop-item .price {
            font-weight: 800;
            color: #b8742a;
            font-size: 15px;
        }
        .shop-item.owned .price {
            color: var(--good);
        }
        .shop-item.equipped {
            border-color: var(--accent);
            background: #FFF5E1;
            box-shadow: 0 0 16px rgba(242, 160, 61, 0.6);
        }
        .btn {
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-weight: 800;
            font-size: 20px;
            color: #fff;
            background: var(--accent);
            border-radius: 22px;
            padding: 14px 32px;
            box-shadow: 0 6px 0 #b8742a;
            transition: transform .08s;
            margin-top: 14px;
            width: 100%;
            flex-shrink: 0;
        }
        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #b8742a;
        }
        .btn.secondary {
            background: var(--blue);
            box-shadow: 0 6px 0 #2d5a7a;
        }
        .btn.secondary:active {
            box-shadow: 0 2px 0 #2d5a7a;
        }
        .hidden {
            display: none !important;
        }

        /* ===== AZIRAM TAMAGOTCHI ===== */
        .aziram-stats {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            flex-shrink: 0;
            flex-wrap: wrap;
            justify-content: center;
        }
        .aziram-stat {
            background: #E4D7BC;
            border-radius: 16px;
            padding: 8px 12px;
            font-size: 14px;
            font-weight: 700;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            min-width: 70px;
            flex: 1;
        }
        .aziram-stat .bar {
            width: 100%;
            height: 8px;
            background: #c9b899;
            border-radius: 8px;
            overflow: hidden;
        }
        .aziram-stat .bar>div {
            height: 100%;
            background: var(--good);
            border-radius: 8px;
            transition: width .3s;
        }
        .aziram-stat .bar>div.low {
            background: var(--red);
        }
        .aziram-stat .bar>div.warn {
            background: var(--accent);
        }
        .aziram-avatar-zone {
            flex-shrink: 0;
            text-align: center;
            margin: 10px 0 14px;
            position: relative;
            min-height: 160px;
        }
        .aziram-avatar-zone #aziramAvatarContainer {
            display: inline-block;
            position: relative;
            width: 120px;
            height: 140px;
            background: transparent;
            animation: floatAziram 4s ease-in-out infinite;
        }
        @keyframes floatAziram {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .aziram-avatar-zone .av-body {
            width: 85px;
            height: 95px;
            border-radius: 50%;
            margin: 22px auto 0;
            position: relative;
            transition: background 0.3s;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }
        .aziram-avatar-zone .av-face {
            position: absolute;
            top: 22px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 34px;
            line-height: 1;
        }
        .aziram-avatar-zone .av-head {
            position: absolute;
            top: -6px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 38px;
            line-height: 1;
        }
        .aziram-avatar-zone .av-clothes {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 36px;
            line-height: 1;
        }
        .aziram-avatar-zone .av-prop {
            position: absolute;
            right: -10px;
            bottom: 32px;
            font-size: 34px;
            line-height: 1;
        }
        .aziram-actions {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 10px;
        }
        .aziram-action-btn {
            border: none;
            font-family: inherit;
            font-weight: 800;
            font-size: 16px;
            color: #fff;
            background: var(--good);
            border-radius: 16px;
            padding: 12px 20px;
            box-shadow: 0 5px 0 #5c7a3a;
            cursor: pointer;
            transition: transform .08s;
            flex: 1;
            min-width: 80px;
            text-align: center;
        }
        .aziram-action-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #5c7a3a;
        }
        .aziram-action-btn:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: 0 5px 0 #5c7a3a;
            cursor: not-allowed;
        }
        .cooldown-text {
            font-size: 13px;
            color: var(--red);
            font-weight: 600;
            text-align: center;
            min-height: 20px;
        }

        /* ===== WIN / LOSE MODALS (Μεγάλα για κινητά) ===== */
        .win-lose-card {
            background: var(--cream);
            border: 6px solid var(--panel-deep);
            border-radius: 32px;
            width: min(92vw, 600px);
            max-height: 85vh;
            padding: 32px 28px;
            text-align: center;
            box-shadow: 0 16px 0 rgba(0, 0, 0, .5);
            animation: pop .35s cubic-bezier(.34, 1.56, .64, 1);
        }
        .win-lose-card h2 {
            font-size: 32px;
            margin-bottom: 12px;
            font-weight: 800;
        }
        .win-lose-card p {
            font-size: 22px;
            margin-bottom: 16px;
        }
        .win-lose-card .big-emoji {
            font-size: 72px;
            margin-bottom: 10px;
        }

        @media (max-width: 480px) {
            .hud {
                height: 64px;
                padding: 8px 12px;
                gap: 8px;
            }
            .chip {
                font-size: 14px;
                padding: 6px 10px;
                border-radius: 14px;
            }
            .chip .big {
                font-size: 18px;
            }
            .hud-btn {
                font-size: 14px;
                padding: 6px 12px;
                border-radius: 14px;
            }
            .hud-btn.mode-btn {
                font-size: 12px;
                padding: 5px 10px;
            }
            .powerbar {
                top: 68px;
                padding: 10px 14px;
                gap: 10px;
                border-radius: 20px;
            }
            .pbtn {
                width: 60px;
                height: 60px;
                font-size: 28px;
                border-radius: 18px;
            }
            .pbtn .cost {
                font-size: 10px;
            }
            .aziram-stat {
                font-size: 12px;
                min-width: 60px;
                padding: 6px 8px;
            }
            .aziram-stat .bar {
                height: 6px;
            }
            .aziram-avatar-zone #aziramAvatarContainer {
                width: 90px;
                height: 110px;
            }
            .aziram-avatar-zone .av-body {
                width: 65px;
                height: 75px;
                margin: 16px auto 0;
            }
            .full-card {
                padding: 12px 10px;
            }
            .shop-items {
                gap: 8px;
            }
            .shop-item h3 {
                font-size: 14px;
            }
            #speech {
                font-size: 20px;
                padding: 10px 18px;
                border-radius: 22px;
            }
            #toast {
                font-size: 16px;
                padding: 10px 20px;
                bottom: 80px;
            }
            .win-lose-card {
                width: 94vw;
                padding: 24px 18px;
                border-radius: 28px;
            }
            .win-lose-card h2 {
                font-size: 26px;
            }
            .win-lose-card .big-emoji {
                font-size: 60px;
            }
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>

    <!-- ===== HUD (TOP) ===== -->
    <div class="hud">
        <div class="chip"><div><small>ΕΠΙΠΕΔΟ</small><span class="big" id="hudLevel">1</span></div></div>
        <div class="chip"><div><small>ΣΚΟΡ</small><span class="big" id="hudScore">0</span></div></div>
        <div class="chip">🎯<span class="big" id="hudTarget">64</span></div>
        <div class="spacer"></div>
        <button class="hud-btn mode-btn" id="btnModeToggle">🎮 Games</button>
        <button class="hud-btn aziram-btn" id="btnAziram">🧪 Aziram</button>
        <button class="hud-btn" id="btnShop">🛒 Shop</button>
        <div class="chip">🪙 <span class="big" id="hudCoins">0</span></div>
    </div>

    <!-- ===== POWERUPS ===== -->
    <div class="powerbar">
        <button class="pbtn" id="btnMagnet">🧲<span class="cost">Δωρεάν</span></button>
        <button class="pbtn" id="btnHammer">🔨<span class="cost">Δωρεάν</span></button>
        <button class="pbtn" id="btnShuffle">🔄<span class="cost">Δωρεάν</span></button>
        <button class="pbtn" id="btnMic">🎤<span class="cost">Μίλα</span></button>
        <button class="pbtn" id="btnSound">🔊<span class="cost">Ήχος</span></button>
    </div>

    <div id="speech"><span id="speechText">WOW!</span></div>
    <div id="toast"></div>

    <!-- ===== SHOP MODAL ===== -->
    <div class="full-overlay hidden" id="shopModal">
        <div class="full-card">
            <h2>🛍️ Εξατομίκευση</h2>
            <div class="shop-tabs" id="mainTabs">
                <button class="shop-tab active" data-maintab="cubes">Κύβοι</button>
                <button class="shop-tab" data-maintab="boards">Ταμπλό</button>
                <button class="shop-tab" data-maintab="effects">Εφέ</button>
                <button class="shop-tab" data-maintab="sounds">Ήχοι</button>
                <button class="shop-tab" data-maintab="pets">Pet</button>
                <button class="shop-tab" data-maintab="clothes">Ρούχα</button>
            </div>
            <div class="pet-subtabs" id="petSubTabs">
                <button class="pet-subtab active" data-subtab="pet_color">Χρώμα</button>
                <button class="pet-subtab" data-subtab="pet_head">Κεφάλι</button>
                <button class="pet-subtab" data-subtab="pet_face">Πρόσωπο</button>
                <button class="pet-subtab" data-subtab="pet_body">Σώμα</button>
                <button class="pet-subtab" data-subtab="pet_hands">Χέρια</button>
                <button class="pet-subtab" data-subtab="pet_props">Αντικείμενο</button>
                <button class="pet-subtab" data-subtab="pet_feet">Πόδια</button>
            </div>
            <div class="shop-items" id="shopContainer"></div>
            <button class="btn" id="btnCloseShop">Κλείσιμο</button>
        </div>
    </div>

    <!-- ===== AZIRAM MODAL ===== -->
    <div class="full-overlay hidden" id="aziramModal">
        <div class="full-card" style="justify-content:space-between;">
            <h2>🧪 Aziram - Το Slime σου</h2>
            <div class="aziram-stats" id="aziramStats">
                <div class="aziram-stat">⚡ Ενέργεια<div class="bar"><div id="energyBar" style="width:70%"></div></div><span id="energyText">70</span></div>
                <div class="aziram-stat">🍽️ Πείνα<div class="bar"><div id="hungerBar" style="width:30%"></div></div><span id="hungerText">30</span></div>
                <div class="aziram-stat">🧼 Καθαριότητα<div class="bar"><div id="cleanBar" style="width:80%"></div></div><span id="cleanText">80</span></div>
                <div class="aziram-stat">🚽 Τουαλέτα<div class="bar"><div id="toiletBar" style="width:10%"></div></div><span id="toiletText">10</span></div>
            </div>
            <div class="aziram-avatar-zone">
                <div id="aziramAvatarContainer">
                    <div class="av-head" id="avHead"></div>
                    <div class="av-body" id="avBody"></div>
                    <div class="av-face" id="avFace"></div>
                    <div class="av-clothes" id="avClothes"></div>
                    <div class="av-prop" id="avProp"></div>
                </div>
                <div style="font-size:14px; color:#8C6A4F; margin-top:6px; font-weight:600;" id="petMoodText">😊 Χαρούμενο</div>
            </div>

                let coins = 0, level = 0, score = 0, best = 0;
                const audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                let isMuted = false;

                function playSound(type) {
                    if (isMuted) return;
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    if (type === 'win') { playWinSound(audioCtx); return; }
                    const s = save.equippedSound || 'snd_default';
                    const now = audioCtx.currentTime;
                    function tone(freq0, freq1, dur, wave, vol, delay) {
                        const o = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        o.connect(g); g.connect(audioCtx.destination);
                        o.type = wave;
                        const t0 = now + (delay || 0);
                        o.frequency.setValueAtTime(freq0, t0);
                        if (freq1) o.frequency.exponentialRampToValueAtTime(freq1, t0 + dur);
                        g.gain.setValueAtTime(vol, t0);
                        g.gain.exponentialRampToValueAtTime(0.01, t0 + dur);
                        o.start(t0); o.stop(t0 + dur + 0.05);
                    }
                    if (s === 'snd_default') { if (type === 'drop') tone(800, 400, 0.1, 'sine', 0.2); else tone(300, 800, 0.2, 'sine', 0.3); }
                    else if (s === 'snd_bass') { if (type === 'drop') tone(150, 60, 0.18, 'sawtooth', 0.3); else { tone(70, 200, 0.3, 'sawtooth', 0.35); tone(140, 400, 0.3, 'sine', 0.2); } }
                    else if (s === 'snd_bell') { if (type === 'drop') { tone(880, null, 0.35, 'sine', 0.15); tone(1760, null, 0.25, 'sine', 0.06); } else { tone(1046, null, 0.55, 'sine', 0.2); tone(2093, null, 0.4, 'sine', 0.08); tone(1568, null, 0.45, 'sine', 0.06, 0.05); } }
                    else if (s === 'snd_echo') { const f = type === 'drop' ? 600 : 900; for (let i = 0; i < 3; i++) tone(f, f * 0.8, 0.12, 'sine', 0.22 / (i + 1), i * 0.13); }
                    else if (s === 'snd_retro') { if (type === 'drop') tone(440, 220, 0.08, 'square', 0.12); else { tone(523, null, 0.07, 'square', 0.12); tone(659, null, 0.07, 'square', 0.12, 0.07); tone(784, null, 0.1, 'square', 0.12, 0.14); } }
                    else if (s === 'snd_pop') { if (type === 'drop') tone(1200, 300, 0.06, 'sine', 0.3); else { tone(400, 1600, 0.09, 'sine', 0.32); tone(600, 2000, 0.08, 'sine', 0.15, 0.06); } }
                    else if (s === 'snd_laser') { if (type === 'drop') tone(1800, 200, 0.15, 'sawtooth', 0.13); else tone(200, 2200, 0.2, 'sawtooth', 0.17); }
                    else if (s === 'snd_magic') { const base = type === 'drop' ? 700 : 950; for (let i = 0; i < 4; i++) tone(base + i * 180, null, 0.16, 'triangle', 0.11, i * 0.05); }
                }

                function playWinSound(ctx) {
                    if (isMuted) return;
                    for (let i = 0; i < 4; i++) {
                        setTimeout(() => {
                            const osc = ctx.createOscillator(); const gain = ctx.createGain();
                            osc.connect(gain); gain.connect(ctx.destination);
                            osc.type = 'sine'; osc.frequency.setValueAtTime(600 + (i * 250), ctx.currentTime);
                            gain.gain.setValueAtTime(0.15, ctx.currentTime);
                            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
                            osc.start(); osc.stop(ctx.currentTime + 0.2);
                        }, i * 100);
                    }
                }

                let isTalking = false;
                function speak(text) {
                    try {
                        if (!('speechSynthesis' in window)) return;
                        speechSynthesis.cancel();
                        const u = new SpeechSynthesisUtterance(text);
                        u.lang = 'el-GR';
                        const voices = speechSynthesis.getVoices();
                        const gr = voices.find(v => v.lang && v.lang.toLowerCase().startsWith('el'));
                        if (gr) u.voice = gr;
                        u.rate = 1.05; u.pitch = 1.5;
                        u.onstart = () => { isTalking = true; };
                        u.onend = () => { isTalking = false; };
                        u.onerror = () => { isTalking = false; };
                        speechSynthesis.speak(u);
                    } catch (e) { isTalking = false; }
                }
                if ('speechSynthesis' in window) {
                    speechSynthesis.getVoices();
                    speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
                }

                function stripAccents(s) { return s.normalize('NFD').replace(/[\u0300-\u036f]/g, ''); }
                function answerQuestion(raw) {
                    const q = stripAccents(raw.toLowerCase());
                    const has = (...w) => w.some(x => q.includes(x));
                    if (has('πως σε λενε', 'ονομα σου', 'ποιος εισαι', 'τι εισαι')) return "Με λένε Aziram και είμαι το slime φιλαράκι σου!";
                    if (has('τι κανεις', 'πως εισαι', 'εισαι καλα', 'ολα καλα')) return "Τέλεια είμαι! Έτοιμος για κύβους!";

                    if (has('νομισματα', 'λεφτα', 'χρηματα', 'κερματα')) return "Έχεις " + coins + " νομίσματα! Πάμε για ψώνια;";
                    if (has('αποστολη', 'στοχος', 'τι πρεπει')) return "Ο στόχος μας: κύβος " + getCurrentTarget() + "!";
                    if (has('ανεκδοτο', 'αστειο', 'πες κατι αστειο')) { const jokes = ["Γιατί ο κύβος πήγε σχολείο; Για να γίνει τετράγωνο μυαλό!", "Τι λέει το 2 στο 2; Έλα να γίνουμε 4άρι!", "Είμαι slime, αλλά δεν ζηλεύω κανέναν!", "Ξέρεις ποιο είναι το αγαπημένο μου φαγητό; Τα κυβάκια ζάχαρης!"]; return jokes[Math.floor(Math.random() * jokes.length)]; }
                    if (has('βοηθεια', 'συμβουλη', 'πως παιζ', 'τι να κανω')) return "Ένωσε ίδιους αριθμούς! Και κράτα τους μεγάλους κύβους στις άκρες!";
                    if (has('σε αγαπω', 'σ αγαπω', 'σε συμπαθω')) return "Κι εγώ σε αγαπώ πάρα πολύ!";
                    if (has('αντιο', 'τα λεμε', 'φευγω')) return "Γεια σου! Έλα πάλι γρήγορα, θα σε περιμένω!";
                    if (has('ευχαριστω')) return "Παρακαλώ! Ό,τι θες, εδώ είμαι!";
                    if (has('γεια', 'καλημερα', 'καλησπερα', 'καληνυχτα', 'χαιρετε')) return "Γεια σου! Χαίρομαι πολύ που σε ακούω!";
                    return "Είπες: " + raw + ". Ωραίο ακούγεται!";
                }

                let recognition = null, isListening = false;
                function initMic() {
                    const btn = document.getElementById('btnMic');
                    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                    if (!SR) { btn.onclick = () => toast("Το 🎤 δεν υποστηρίζεται εδώ"); return; }
                    btn.onclick = () => {
                        if (isListening) { try { recognition.stop(); } catch (e) {} return; }
                        recognition = new SR();
                        recognition.lang = 'el-GR';
                        recognition.interimResults = false;
                        recognition.maxAlternatives = 1;
                        recognition.onstart = () => { isListening = true; btn.classList.add('listening'); toast("🎤 Ρώτα με κάτι..."); };
                        recognition.onresult = (e) => {
                            const txt = e.results[0][0].transcript;
                            if (txt) { const reply = answerQuestion(txt); aziramReactionTime = 1.2; showSpeech(reply, Math.max(2800, reply.length * 80)); speak(reply); }
                        };
                        recognition.onerror = () => toast("Δεν σε άκουσα 😅 Ξαναδοκίμασε");
                        recognition.onend = () => { isListening = false; btn.classList.remove('listening'); };
                        try { recognition.start(); } catch (e) { toast("Δεν άνοιξε το 🎤"); }
                    };
                }

                function makeCube(value) { const tex = numberTexture(value); const m = new THREE.Mesh(new THREE.BoxGeometry(CELL * 0.92, CELL * 0.92, CELL * 0.92), new THREE.MeshLambertMaterial({ map: tex, color: 0xdddddd })); m.userData.value = value; return m; }
                function tween(obj, to, dur, ease, done) { const from = {}; for (const k in to) from[k] = obj[k]; anims.push({ obj, from, to, dur, t: 0, ease: ease || (t => 1 - Math.pow(1 - t, 3)), done }); }
                function stepAnims(dt) { for (let i = anims.length - 1; i >= 0; i--) { const a = anims[i]; a.t += dt / a.dur; const k = a.t >= 1 ? 1 : a.ease(a.t); for (const p in a.to) a.obj[p] = a.from[p] + (a.to[p] - a.from[p]) * k; if (a.t >= 1) { anims.splice(i, 1); a.done && a.done(); } } }
                function newBoard() { for (let c = 0; c < COLS; c++) for (let r = 0; r < ROWS; r++) { if (grid[c] && grid[c][r]) boardGroup.remove(grid[c][r].mesh); } grid = Array.from({ length: COLS }, () => Array(ROWS).fill(null)); score = save.score || 0; updateHUD(); const preset = getPresetCount(); for (let i = 0; i < preset; i++) { const c = Math.floor(Math.random() * COLS); const r = colHeight(c); if (r < 3) placeCube(c, r, [2, 4, 8, 16][Math.floor(Math.random() * 4)], true); } spawnCurrent(); lastActionTime = performance.now(); }
                function colHeight(c) { let h = 0; while (h < ROWS && grid[c][h]) h++; return h; }
                function placeCube(c, r, value, instant) { const cube = makeCube(value); const p = cellPos(c, r); cube.position.set(p.x, p.y, 0.1); boardGroup.add(cube); grid[c][r] = { value, mesh: cube }; if (!instant) { cube.scale.set(.4, .4, .4); tween(cube.scale, { x: 1, y: 1, z: 1 }, 0.22); } return grid[c][r]; }
                function spawnCurrent() { let maxOnBoard = 4; for (let c = 0; c < COLS; c++) for (let r = 0; r < ROWS; r++) if (grid[c][r]) maxOnBoard = Math.max(maxOnBoard, grid[c][r].value); const pool = []; for (let v = 2; v <= Math.min(32, Math.max(4, maxOnBoard / 2)); v *= 2) pool.push(v, v, v === 2 ? v : 0); const vals = pool.filter(Boolean); currentCube = makeCube(vals[Math.floor(Math.random() * vals.length)]); currentCube.position.set(cellPos(aimCol, 0).x, launchY, 0.1); currentCube.scale.set(.3, .3); boardGroup.add(currentCube); tween(currentCube.scale, { x: 1, y: 1, z: 1 }, 0.2); }
                function setAim(c, instant) { aimCol = Math.max(0, Math.min(COLS - 1, c)); if (currentCube && !busy) { const tx = cellPos(aimCol, 0).x; if (instant) currentCube.position.x = tx; else tween(currentCube.position, { x: tx }, 0.09); } }
                function launch() { if (busy || !currentCube) return; const c = aimCol; const h = colHeight(c); if (h >= ROWS) { gameOver(); return; } busy = true; lastActionTime = performance.now(); playSound('drop'); ... } // full resolveMerges/wing logic in final code.
                function isBoardFull() { for (let c = 0; c < COLS; c++) for (let r = 0; r < ROWS; r++) if (!grid[c][r]) return false; return true; }
                function boardFillRatio() { let filled = 0; for (let c = 0; c < COLS; c++) for (let r = 0; r < ROWS; r++) if (grid[c] && grid[c][r]) filled++; return filled / (COLS * ROWS); }

                let winTimer = null;
                function checkWin() { const target = getCurrentTarget(); let win = false; for (let c = 0; c < COLS; c++) for (let r = 0; r < ROWS; r++) if (grid[c][r] && grid[c][r].value >= target) { win = true; break; } if (!win) return false; playWinSound(audioCtx); const wp = new THREE.Vector3(); aziramPet.getWorldPosition(wp); spawnCelestialBurst(wp.x, wp.y + 1, wp.z, 25); spawnCelestialBurst(0, -1, 0, 15); if (gameMode === 'games') { gamesProgress++; save.gamesProgress = gamesProgress; coins += 30; save.coins = coins; best = Math.max(best, score); save.best = best; persist(); updateHUD(); aziramWinTime = 4.0; showSpeech("Νέος στόχος: " + getCurrentTarget() + "! 🚀", 3500); speak("Τέλεια! Πάμε για " + getCurrentTarget() + "!"); toast("🎯 Νέος στόχος: " + getCurrentTarget() + "! +30 🪙"); busy = false; if (!currentCube) { spawnCurrent(); setAim(aimCol); } return false; } else { busy = true; coins += 25; save.coins = coins; best = Math.max(best, score); save.best = best; save.level = Math.min(level + 1, MISSION_LEVELS.length - 1); persist(); updateHUD(); document.getElementById("winText").innerHTML = `Έφτιαξες κύβο ${target}!<br>+25 🪙<br>🎯 Επόμενος στόχος: ${MISSION_LEVELS[Math.min(level+1, MISSION_LEVELS.length-1)].target}`; aziramWinTime = 5.0; showSpeech("Αποστολή ολοκληρώθηκε! 🎉", 3800); speak("Μπράβο! Η αποστολή ολοκληρώθηκε!"); if (winTimer) clearTimeout(winTimer); winTimer = setTimeout(() => { document.getElementById("winModal").classList.remove("hidden"); winTimer = null; }, 3000); return true; } }
                function gameOver() { busy = true; best = Math.max(best, score); save.best = best; save.score = 0; persist(); showSpeech("Ωχ όχι! 😭", 2500); speak("Ωχ όχι! Γέμισε το ταμπλό!"); document.getElementById("loseText").innerHTML = `Σκορ: <b>${score}</b><br>Στόχος: ${getCurrentTarget()}`; document.getElementById("loseModal").classList.remove("hidden"); }

                function onTap(e) { if (document.querySelector(".full-overlay:not(.hidden)")) return; lastActionTime = performance.now(); const x = (e.touches ? e.touches[0].clientX : e.clientX) / innerWidth * 2 - 1; const y = -((e.touches ? e.touches[0].clientY : e.clientY) / innerHeight * 2 - 1); pointer.set(x, y); raycaster.setFromCamera(pointer, camera); if (aziramPet) { const hits = raycaster.intersectObject(aziramPet, true); if (hits.length > 0 && aziramWinTime <= 0) { if (petState === 'sleep') { petState = 'stand'; petStateTimer = 2.5; showSpeech("Ε; Ξύπνησα! 😳", 1800); speak("Ε; Ξύπνησα!"); return; } aziramReactionTime = 1.0; const greetings = ["Γεια σου! 😊", "Χι χι! 😄", "Παίζουμε; 🎮", "Είμαι ο Aziram! 💚", "Ο στόχος είναι " + getCurrentTarget() + "!"]; const pick = greetings[Math.floor(Math.random() * greetings.length)]; showSpeech(pick, 1800); speak(pick.replace(/[^\u0370-\u03FF\u1F00-\u1FFFa-zA-Z0-9; !?]/g, '').trim()); if (audioCtx.state !== 'suspended') playSound('drop'); return; } } const hit = new THREE.Vector3(); raycaster.ray.intersectPlane(new THREE.Plane(new THREE.Vector3(0, 0, 1).applyQuaternion(boardGroup.quaternion), 0), hit); boardGroup.worldToLocal(hit); const c = Math.max(0, Math.min(COLS - 1, Math.round((hit.x + BOARD_W / 2 - CELL / 2) / (CELL + GAP)))); const r = Math.round((BOARD_H / 2 - CELL / 2 - hit.y) / (CELL + GAP)); if (hammerMode) { if (r >= 0 && r < ROWS && grid[c][r]) { hammerMode = false; const m = grid[c][r].mesh; grid[c][r] = null; tween(m.scale, { x: .01, y: .01, z: .01 }, 0.18, null, () => boardGroup.remove(m)); busy = true; setTimeout(() => { resolveMerges([]).then(() => { busy = false; updateHUD(); persist(); }); }, 180); } else { hammerMode = false; updateHUD(); } return; } setAim(c, true); launch(); }

                function updateHUD() { document.getElementById("hudLevel").textContent = gameMode === 'missions' ? (level + 1) : (gamesProgress + 1); document.getElementById("hudScore").textContent = score; document.getElementById("hudCoins").textContent = coins; document.getElementById("hudTarget").textContent = getCurrentTarget(); document.getElementById("btnHammer").classList.toggle("armed", hammerMode); const modeBtn = document.getElementById("btnModeToggle"); modeBtn.textContent = gameMode === 'missions' ? '📋 Missions' : '🎮 Games'; modeBtn.classList.toggle('missions-active', gameMode === 'missions'); const soundBtn = document.getElementById("btnSound"); if (isMuted) { soundBtn.textContent = '🔇'; soundBtn.querySelector('.cost').textContent = 'Off'; soundBtn.classList.add('sound-muted'); } else { soundBtn.textContent = '🔊'; soundBtn.querySelector('.cost').textContent = 'Ήχος'; soundBtn.classList.remove('sound-muted'); } }
                let toastTimer;
                function toast(msg) { const t = document.getElementById("toast"); t.textContent = msg; t.style.opacity = 1; clearTimeout(toastTimer); toastTimer = setTimeout(() => t.style.opacity = 0, 2000); }

                let missionAnnounceInterval = null;
                function startMissionAnnouncements() { if (missionAnnounceInterval) clearInterval(missionAnnounceInterval); missionAnnounceInterval = setInterval(() => { if (aziramWinTime > 0 || aziramReactionTime > 0 || isTalking) return; const target = getCurrentTarget(); if (gameMode === 'missions') { const lvl = Math.min(level, MISSION_LEVELS.length - 1); showSpeech("🎯 Αποστολή: " + MISSION_LEVELS[lvl].text + "!", 3000); speak("Η αποστολή μας: " + MISSION_LEVELS[lvl].text); } else { showSpeech("🎯 Στόχος: κύβος " + target + "!", 2800); speak("Στόχος μας ο κύβος " + target); } }, 45000); setTimeout(() => { const target = getCurrentTarget(); if (gameMode === 'missions') { showSpeech("🎯 Αποστολή: " + MISSION_LEVELS[Math.min(level, MISSION_LEVELS.length - 1)].text + "!", 3500); } else { showSpeech("🎯 Στόχος: κύβος " + target + "!", 3000); } }, 8000); }

                let lastSmokeTime = 0;
                function computeMood(now) { const fill = boardFillRatio(); if (fill >= 0.8) return 'anxious'; if (fill >= 0.65) return 'angry'; if (now - lastActionTime > 15000) return 'bored'; return 'idle'; }
                function onMoodChange(mood) { if (mood === 'angry') showSpeech("Γεμίζει το ταμπλό! 😠", 2200); if (mood === 'anxious') showSpeech("ΠΑΝΙΚΟΣ!! 😱", 2200); if (mood === 'bored') showSpeech("Βαριέμαι... 🥱", 2200); }

                let lastT = 0;
                function loop(t) { const dt = Math.min(0.05, (t - lastT) / 1000); lastT = t; if (!lastActionTime) lastActionTime = performance.now(); stepAnims(dt); updateParticles(dt); updateCelestialObjects(dt); updateStarfield(0.8); if (Math.floor(t / 3000) > Math.floor((t - dt * 1000) / 3000)) { updateTamagotchiStats(); } /* ... animation loop for pet ... */ if (renderer) renderer.render(scene, camera); requestAnimationFrame(loop); }

                document.getElementById('btnShop').onclick = () => { renderShop(); document.getElementById('shopModal').classList.remove('hidden'); };
                document.getElementById('btnCloseShop').onclick = () => { document.getElementById('shopModal').classList.add('hidden'); };
                document.getElementById('btnAziram').onclick = () => { updateTamagotchiStats(); renderAziramStats(); renderAziramAvatar(); updateMoodDisplay(); document.getElementById('aziramModal').classList.remove('hidden'); };
                document.getElementById('btnCloseAziram').onclick = () => { document.getElementById('aziramModal').classList.add('hidden'); };
                document.getElementById('btnSleep').onclick = doSleep;
                document.getElementById('btnFeed').onclick = doFeed;
                document.getElementById('btnWash').onclick = doWash;
                document.getElementById('btnToilet').onclick = doToilet;

                document.getElementById('btnModeToggle').onclick = () => { gameMode = gameMode === 'games' ? 'missions' : 'games'; save.gameMode = gameMode; persist(); updateHUD(); busy = false; newBoard(); toast(gameMode === 'games' ? '🎮 Λειτουργία: Συνεχόμενο Παιχνίδι' : '📋 Λειτουργία: Αποστολές'); startMissionAnnouncements(); };
                document.getElementById('btnSound').onclick = () => { isMuted = !isMuted; updateHUD(); toast(isMuted ? '🔇 Ήχος απενεργοποιήθηκε' : '🔊 Ήχος ενεργοποιήθηκε'); };

                try {
                    await loadSave();
                    coins = save.coins || 5000; level = save.level || 0; best = save.best || 0; score = save.score || 0; gamesProgress = save.gamesProgress || 0; gameMode = save.gameMode || 'games';
                    if (save.energy === undefined) save.energy = 70; if (save.hunger === undefined) save.hunger = 30; if (save.cleanliness === undefined) save.cleanliness = 80; if (save.toilet === undefined) save.toilet = 0; if (!save.lastUpdate) save.lastUpdate = Date.now();

                    const threeOk = initThree();

                        // Αν το παιχνίδι 3D δεν φορτώσει, τουλάχιστον τα κουμπιά ανοίγουν με δοκιμή fallback!

                    } else {
                        newBoard();
                        updateHUD();
                        initMic();
                        startMissionAnnouncements();
                        equipPetSlot('pet_color', save.equippedPetColor);
                        equipPetSlot('pet_head', save.equippedPetHead);
                        equipPetSlot('pet_face', save.equippedPetFace);
                        equipPetSlot('pet_body', save.equippedPetBody);
                        equipPetSlot('pet_hands', save.equippedPetHands);
                        equipPetSlot('pet_props', save.equippedPetProps);
                        equipPetSlot('pet_feet', save.equippedPetFeet);
                        equipClothes(save.equippedClothes);
                        renderAziramAvatar(); updateMoodDisplay();

                        const cvs = document.getElementById("game");
                        cvs.addEventListener("pointermove", (e) => { if (!busy) setAim((e.touches ? e.touches[0].clientX : e.clientX) / innerWidth * 2 - 1); });
                        cvs.addEventListener("pointerdown", onTap);
                        document.getElementById("btnNext").onclick = () => { document.getElementById("winModal").classList.add("hidden"); level = Math.min(level + 1, MISSION_LEVELS.length - 1); save.level = level; persist(); busy = false; newBoard(); updateHUD(); startMissionAnnouncements(); };
                        document.getElementById("btnRetry").onclick = () => { document.getElementById("loseModal").classList.add("hidden"); busy = false; newBoard(); updateHUD(); };
                        tamagotchiInterval = setInterval(() => { updateTamagotchiStats(); }, 3000);
                    }
                } catch (e) {

                    toast("Σοβαρό σφάλμα, ελέγξτε την κονσόλα.");
                }
