
<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Connect Four - Galactic Edition</title>
    <meta name="theme-color" content="#0a0e27">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- YouTube SDK Integration (Προσθήκη 1) -->
    <script src="https://www.youtube.com/game_api/v1"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { overflow: hidden; height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            background: var(--bg-skin, #000010);
            position: relative; touch-action: manipulation;
            padding-bottom: 0; transition: background 0.4s ease;
        }

        /* YouTube Pause Override (Προσθήκη 2) */
        body.paused, body.paused *, body.paused *::before, body.paused *::after { animation-play-state: paused !important; }
        body.paused { pointer-events: none !important; user-select: none !important; }
        body.paused #starCanvas { display: none; }

        #homeBtn { position: absolute; top: 12px; left: 12px; z-index: 100; background: rgba(14,16,39,0.85); border: 2px solid #84cc16; color: #84cc16; font-weight: 800; padding: 8px 16px; border-radius: 30px; cursor: pointer; font-family: inherit; backdrop-filter: blur(8px); box-shadow: 0 0 15px rgba(132,204,22,0.3); font-size: 0.8rem; transition: all 0.2s; }
        #homeBtn:active { transform: scale(0.95); }

        #starCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .shooting-star { position: fixed; width: 3px; height: 80px; background: linear-gradient(to bottom, rgba(255,255,255,0.9), rgba(255,255,255,0)); border-radius: 50%; z-index: 1; pointer-events: none; animation: shoot linear forwards; transform-origin: top center; }
        @keyframes shoot { 0% { opacity: 1; transform: translate(0,0) rotate(-35deg); } 70% { opacity: 1; } 100% { opacity: 0; transform: translate(-400px,600px) rotate(-35deg); } }
        .nebula-particle { position: fixed; border-radius: 50%; z-index: 0; pointer-events: none; animation: nebulaFloat linear infinite; filter: blur(2px); }
        @keyframes nebulaFloat { 0% { transform: translate(0,0) scale(1); opacity: 0.6; } 50% { transform: translate(30px,-40px) scale(1.5); opacity: 0.2; } 100% { transform: translate(-20px,20px) scale(1); opacity: 0.6; } }

        .game-wrapper {
            display: flex; width: 100%; height: 100vh; height: 100dvh;
            justify-content: center; align-items: center;
            padding: 4px; position: relative; z-index: 50; overflow: hidden;
        }
        .game-container {
            text-align: center; background: rgba(14,16,39,0.92);
            border-radius: 22px; padding: 8px 10px 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            width: 100%; max-width: 440px;
            max-height: calc(100vh - 8px); max-height: calc(100dvh - 8px);
            overflow-y: auto; overflow-x: hidden;
            border: 2px solid rgba(132,204,22,0.3); backdrop-filter: blur(10px);
        }

        .hud-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; gap: 4px; flex-wrap: wrap; }
        .hud-level { font-size: 0.65rem; font-weight: 800; color: #84cc16; text-shadow: 0 0 10px rgba(132,204,22,0.6); background: rgba(132,204,22,0.1); border: 1px solid rgba(132,204,22,0.3); padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
        .hud-zone { font-size: 0.55rem; font-weight: 700; color: rgba(255,255,255,0.45); flex: 1; text-align: center; }
        .hud-match-score { font-size: 0.6rem; font-weight: 800; color: #e8e8ed; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 20px; white-space: nowrap; }

        .hud-resources { display: flex; align-items: center; justify-content: space-between; gap: 4px; margin-bottom: 6px; background: rgba(255,255,255,0.03); border-radius: 10px; padding: 4px 8px; border: 1px solid rgba(132,204,22,0.1); flex-wrap: wrap; }
        .hud-coins { display: flex; align-items: center; gap: 4px; font-size: 0.8rem; font-weight: 700; color: #fbbf24; }
        .hud-points { display: flex; align-items: center; gap: 4px; font-size: 0.8rem; font-weight: 700; color: #84cc16; }
        .hud-btns { display: flex; gap: 4px; }
        .res-btn { font-size: 0.6rem; font-weight: 700; color: white; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); padding: 3px 8px; border-radius: 10px; cursor: pointer; transition: all 0.2s; }
        .res-btn:active { transform: scale(0.95); }
        .res-btn.daily-btn { border-color: #fbbf24; color: #fbbf24; }
        .res-btn.shop-btn { border-color: #84cc16; color: #84cc16; }
        .res-btn.boost-active { border-color: #e81cff; color: #e81cff; animation: boostPulse 1.5s infinite; }
        @keyframes boostPulse { 0%,100% { box-shadow: 0 0 5px rgba(232,28,255,0.4); } 50% { box-shadow: 0 0 12px rgba(232,28,255,0.8); } }

        h1 { color: #84cc16; margin-bottom: 6px; font-size: 1.4rem; font-weight: 800; letter-spacing: 2px; text-shadow: 0 0 20px rgba(132,204,22,0.5); }
        .players-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; padding: 0 2px; gap: 4px; }
        .player { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 1; min-width: 50px; }
        .player-disc { width: 28px; height: 28px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.5); box-shadow: 0 2px 6px rgba(0,0,0,0.4); position: relative; transition: transform 0.2s ease; }
        .player-disc.red    { background: radial-gradient(circle at 30% 30%, #ff6b6b, #c0392b); }
        .player-disc.yellow { background: radial-gradient(circle at 30% 30%, #ffd93d, #f39c12); }
        .player-disc.tier2::after { content: ''; position: absolute; top: 50%; left: 50%; width: 130%; height: 40%; border: 2.5px solid rgba(255,255,255,0.55); border-radius: 50%; transform: translate(-50%,-50%) rotateX(70deg); box-shadow: 0 0 6px rgba(200,220,255,0.5); }
        .player-disc.tier3 { animation: discAura 2s ease-in-out infinite; }
        @keyframes discAura { 0%,100% { box-shadow: 0 0 10px 3px var(--aura,rgba(255,200,50,0.6)); } 50% { box-shadow: 0 0 22px 8px var(--aura,rgba(255,200,50,0.9)); } }
        .player-disc.red.tier3    { --aura: rgba(255,80,80,0.7); }
        .player-disc.yellow.tier3 { --aura: rgba(255,220,0,0.7); }
        .player-disc.tier4::after { content: ''; position: absolute; top: 50%; left: 50%; width: 140%; height: 45%; border: 3px solid rgba(255,255,255,0.7); border-radius: 50%; transform: translate(-50%,-50%) rotateX(68deg); box-shadow: 0 0 10px rgba(180,120,255,0.7); }
        .player-disc.tier4 { animation: discAura 1.2s ease-in-out infinite; }
        .player-disc.red.tier4    { --aura: rgba(200,50,255,0.8); }
        .player-disc.yellow.tier4 { --aura: rgba(255,120,0,0.8); }
        .player-disc.tier5 { animation: discAura5 0.9s ease-in-out infinite; position: relative; }
        .player-disc.tier5::after  { content: ''; position: absolute; top: 50%; left: 50%; width: 145%; height: 48%; border: 3px solid rgba(255,255,255,0.85); border-radius: 50%; transform: translate(-50%,-50%) rotateX(65deg); box-shadow: 0 0 14px rgba(255,50,50,0.9); }
        @keyframes discAura5 { 0%,100% { box-shadow: 0 0 14px 5px var(--aura5,rgba(255,50,50,0.8)); } 50% { box-shadow: 0 0 32px 12px var(--aura5,rgba(255,50,50,1)); } }
        .player-disc.red.tier5    { --aura5: rgba(255,30,30,0.9); }
        .player-disc.yellow.tier5 { --aura5: rgba(255,200,0,0.9); }
        .player span { font-size: 0.7rem; font-weight: bold; color: #e8e8ed; }
        .player.active span { color: #84cc16; font-weight: 800; }
        .player.active .player-disc { transform: scale(1.15); }
        .scores { flex: 1; display: flex; justify-content: center; align-items: center; }
        .scores .score { font-size: 1.2rem; font-weight: bold; color: #e8e8ed; background: rgba(255,255,255,0.05); padding: 4px 12px; border-radius: 16px; min-width: 60px; border: 1px solid rgba(132,204,22,0.2); }

        .board-container { 
            background: var(--board-skin, linear-gradient(145deg, #1565c0, #0d47a1)); 
            padding: 6px; border-radius: 12px; box-shadow: inset 0 0 20px rgba(0,0,0,0.4), 0 6px 20px rgba(0,0,0,0.5); 
            margin: 6px 0; position: relative; width: 100%; aspect-ratio: 7/6; border: 2px solid #0a3d91; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
        }
        .board { display: grid; grid-template-columns: repeat(7, 1fr); grid-template-rows: repeat(6, 1fr); gap: 4px; position: relative; z-index: 2; height: 95%; width: 95%; padding: 2px; }
        
        /* Particle Canvas - now below the discs to ensure discs are visible */
        #particleCanvas { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; 
        }
        
        .slot { background: transparent; border-radius: 50%; cursor: pointer; position: relative; z-index: 2; box-shadow: inset 0 4px 10px rgba(0,0,0,0.9), inset 0 -2px 4px rgba(255,255,255,0.04); display: flex; align-items: center; justify-content: center; overflow: hidden; transition: box-shadow 0.15s ease; }
        .slot::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,12,0.85); border-radius: 50%; z-index: 0; pointer-events: none; transition: background 0.15s; }
        .slot:hover::before, .slot:active::before { background: rgba(0,0,40,0.7); }
        .disc { 
            width: 85%; height: 85%; border-radius: 50%; z-index: 3; 
            box-shadow: inset 0 -4px 8px rgba(0,0,0,0.5), inset 0 2px 4px rgba(255,255,255,0.3), 0 3px 6px rgba(0,0,0,0.4); 
            border: 2px solid rgba(255,255,255,0.4); position: relative; opacity: 0; 
        }
        .disc::before { content: ''; position: absolute; top: 12%; left: 12%; right: 12%; bottom: 12%; background: rgba(255,255,255,0.22); border-radius: 50%; filter: blur(1px); z-index: 3; }
        .disc.red    { background: radial-gradient(circle at 35% 35%, #ff5252, #c62828); opacity: 1; }
        .disc.yellow { background: radial-gradient(circle at 35% 35%, #ffeb3b, #f9a825); opacity: 1; }
        .disc.ring::after { content: ''; position: absolute; inset: -4px; border: 2.5px solid rgba(200,230,255,0.55); border-radius: 50%; transform: rotateX(65deg) scaleY(0.4); box-shadow: 0 0 5px rgba(150,200,255,0.4); }
        .disc.glow { animation: glowPulse 1.8s ease-in-out infinite; }
        .disc.red.glow    { --g: rgba(255,80,80,0.8); }
        .disc.yellow.glow { --g: rgba(255,220,0,0.8); }
        @keyframes glowPulse { 0%,100% { box-shadow: 0 0 8px 2px var(--g,rgba(255,200,0,0.6)), inset 0 -4px 8px rgba(0,0,0,0.5); } 50% { box-shadow: 0 0 20px 6px var(--g,rgba(255,200,0,0.9)), inset 0 -4px 8px rgba(0,0,0,0.5); } }
        .disc.glow2 { animation: glowPulse2 1.1s ease-in-out infinite; }
        .disc.red.glow2    { --g2: rgba(200,50,255,0.9); }
        .disc.yellow.glow2 { --g2: rgba(255,120,0,0.9); }
        @keyframes glowPulse2 { 0%,100% { box-shadow: 0 0 10px 3px var(--g2,rgba(200,50,255,0.7)), inset 0 -4px 8px rgba(0,0,0,0.5); } 50% { box-shadow: 0 0 24px 8px var(--g2,rgba(200,50,255,1)), inset 0 -4px 8px rgba(0,0,0,0.5); } }
        .disc.glow3 { animation: glowPulse3 0.8s ease-in-out infinite; }
        .disc.red.glow3    { --g3: rgba(255,30,30,1); }
        .disc.yellow.glow3 { --g3: rgba(255,200,0,1); }
        @keyframes glowPulse3 { 0%,100% { box-shadow: 0 0 14px 5px var(--g3,rgba(255,30,30,0.8)), inset 0 -4px 8px rgba(0,0,0,0.5); } 50% { box-shadow: 0 0 32px 12px var(--g3,rgba(255,30,30,1)), inset 0 -4px 8px rgba(0,0,0,0.5); } }
        @keyframes discDrop { 0% { transform: translateY(-520px); opacity: 0; } 60% { transform: translateY(18px); opacity: 1; } 80% { transform: translateY(-7px); opacity: 1; } 100% { transform: translateY(0); opacity: 1; } }
        .disc.winner { animation: discPulse 0.9s infinite; }
        @keyframes discPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        .status { margin: 6px 0; font-size: 0.9rem; font-weight: 700; color: #e8e8ed; min-height: 20px; padding: 6px; background: rgba(255,255,255,0.05); border-radius: 8px; border: 1px solid rgba(132,204,22,0.2); text-align: center; }
        .ai-thinking { color: #fbbf24; font-weight: bold; }

        .game-buttons { display: flex; justify-content: center; align-items: center; gap: 4px; margin-top: 6px; padding: 0 2px; flex-wrap: wrap; }
        .game-btn { background: linear-gradient(135deg, #ff4081, #c51162); border: 2px solid #ff69b4; color: white; padding: 8px 14px; font-size: 0.75rem; border-radius: 30px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 0 #880e4f, 0 6px 12px rgba(0,0,0,0.4); font-family: inherit; font-weight: 700; flex: 1; min-width: 80px; max-width: 110px; }
        .game-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #880e4f; }
        .game-btn:disabled { opacity: 0.5; pointer-events: none; }
        .game-btn.new-game { background: linear-gradient(135deg, #84cc16, #65a30d); border: 2px solid #a3e635; box-shadow: 0 4px 0 #4d7c0f, 0 6px 12px rgba(0,0,0,0.4); }
        .game-btn.small-btn { background: linear-gradient(135deg, #f39c12, #d35400); border: 2px solid #f1c40f; box-shadow: 0 4px 0 #b9770e, 0 6px 12px rgba(0,0,0,0.4); font-size: 0.65rem; padding: 6px 8px; min-width: 60px; max-width: 80px; }

        @keyframes confettiFall { 0% { transform: translateY(-10px) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
        .confetti { position: fixed; width: 6px; height: 6px; top: -10px; animation: confettiFall 3s linear forwards; z-index: 200; border-radius: 50%; }
        .confetti:nth-child(2n){background:#f1c40f;} .confetti:nth-child(3n){background:#2ecc71;} .confetti:nth-child(4n){background:#3498db;} .confetti:nth-child(5n){background:#9b59b6;}

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 600; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-overlay.open { display: flex; }
        .modal-box { background: #0b0e26; border: 2px solid rgba(132,204,22,0.4); border-radius: 22px; padding: 20px; width: 92%; max-width: 380px; max-height: 85vh; overflow-y: auto; position: relative; box-shadow: 0 0 50px rgba(132,204,22,0.15); animation: modalIn 0.3s ease; }
        @keyframes modalIn { from { transform: scale(0.85) translateY(20px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
        .modal-galaxy-title { font-size: 1.25rem; font-weight: 800; letter-spacing: 1px; text-align: center; margin-bottom: 8px; text-shadow: 0 0 14px currentColor; }
        .modal-galaxy-title.win  { color: #84cc16; }
        .modal-galaxy-title.lose { color: #f87171; }
        .modal-galaxy-title.draw { color: #fbbf24; }

        .progress-wrap { margin: 14px 0 10px; }
        .progress-label { display: flex; justify-content: space-between; font-size: 0.7rem; color: rgba(255,255,255,0.5); margin-bottom: 5px; font-weight: 700; }
        .progress-track { background: rgba(255,255,255,0.08); border-radius: 20px; height: 12px; overflow: hidden; border: 1px solid rgba(132,204,22,0.2); }
        .progress-bar { height: 100%; border-radius: 20px; background: linear-gradient(90deg, #65a30d, #a3e635); width: 0%; transition: width 0.9s cubic-bezier(0.22,1,0.36,1); position: relative; }
        .progress-bar.full::after { content: '💥'; position: absolute; right: -10px; top: -6px; font-size: 1.1rem; animation: boom 0.4s ease 0.9s both; }
        @keyframes boom { 0% { transform: scale(0); } 60% { transform: scale(1.4); } 100% { transform: scale(1); } }
        .progress-next { text-align: center; margin-top: 6px; font-size: 0.72rem; color: #84cc16; font-weight: 700; letter-spacing: 1px; }
        .battle-stats { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px 14px; margin: 12px 0; text-align: left; }
        .battle-stats-title { font-size: 0.65rem; letter-spacing: 2px; color: rgba(255,255,255,0.4); font-weight: 700; text-transform: uppercase; margin-bottom: 8px; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.78rem; }
        .stat-row:last-child { border-bottom: none; }
        .stat-label { color: rgba(255,255,255,0.45); font-weight: 600; }
        .stat-value { color: #e8e8ed; font-weight: 700; }
        .modal-action-btn { display: block; width: 100%; margin-top: 12px; padding: 12px; border-radius: 30px; border: none; cursor: pointer; font-family: inherit; font-size: 0.9rem; font-weight: 800; letter-spacing: 1px; transition: all 0.2s; }
        .modal-action-btn.win-btn  { background: linear-gradient(135deg, #84cc16, #65a30d); color: #fff; box-shadow: 0 4px 0 #4d7c0f; }
        .modal-action-btn.lose-btn { background: linear-gradient(135deg, #f87171, #b91c1c); color: #fff; box-shadow: 0 4px 0 #7f1d1d; }
        .modal-action-btn.draw-btn { background: linear-gradient(135deg, #fbbf24, #d97706); color: #fff; box-shadow: 0 4px 0 #92400e; }
        .modal-action-btn:active { transform: translateY(3px); }
        .modal-action-btn:disabled { opacity: 0.6; pointer-events: none; }

        /* ===== IMPROVED SCORE HISTORY MODAL STYLES ===== */
        .score-modal-box { background: #0e1027; border: 2px solid rgba(132,204,22,0.4); border-radius: 20px; padding: 20px 16px; width: 92%; max-width: 420px; max-height: 80vh; overflow-y: auto; box-shadow: 0 0 40px rgba(132,204,22,0.15); }
        .modal-title { color: #84cc16; font-size: 1.2rem; font-weight: 800; letter-spacing: 2px; text-align: center; margin-bottom: 14px; text-shadow: 0 0 12px rgba(132,204,22,0.5); }
        
        .score-table { width: 100%; border-collapse: separate; border-spacing: 0 4px; margin-top: 6px; font-family: 'Segoe UI', -apple-system, sans-serif; }
        .score-table th { background: rgba(132,204,22,0.12); color: #a3e635; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 8px 6px; border-radius: 8px 8px 0 0; text-align: center; }
        .score-table td { background: rgba(255,255,255,0.04); color: #e8e8ed; padding: 8px 6px; font-size: 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; transition: background 0.2s; }
        .score-table tbody tr:hover td { background: rgba(255,255,255,0.07); }
        .score-table .today-row td { background: rgba(132,204,22,0.12); border-left: 3px solid #84cc16; }
        .score-table .win { color: #84cc16; font-weight: 700; }
        .score-table .loss { color: #f87171; font-weight: 700; }

        .endless-record { text-align: center; margin-top: 12px; padding: 10px; background: rgba(255,215,0,0.08); border-radius: 12px; border: 1px solid rgba(255,215,0,0.2); }
        .endless-record-label { font-size: 0.65rem; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 1px; }
        .endless-record-val { font-size: 1.4rem; font-weight: 800; color: #fbbf24; margin-top: 2px; }

        .modal-back-btn { display: block; width: 100%; margin-top: 14px; padding: 12px; background: linear-gradient(135deg, #84cc16, #65a30d); border: none; border-radius: 30px; color: #fff; font-size: 0.9rem; font-weight: 800; font-family: inherit; cursor: pointer; box-shadow: 0 4px 0 #4d7c0f; transition: all 0.2s; letter-spacing: 1px; }
        .modal-back-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #4d7c0f; }

        /* ===== SHOP MODAL STYLES ===== */
        .shop-category-title { font-size: 0.9rem; font-weight: 700; color: #fbbf24; margin-top: 12px; margin-bottom: 6px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 4px; }
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; }
        .shop-item { background: rgba(255,255,255,0.04); border: 2px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 8px 4px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .shop-item:active { transform: scale(0.95); }
        .shop-item.owned { border-color: #84cc16; background: rgba(132,204,22,0.1); }
        .shop-item.locked { opacity: 0.4; cursor: not-allowed; }
        .shop-item-title { font-size: 0.65rem; font-weight: 700; color: #e8e8ed; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .shop-item-price { font-size: 0.6rem; color: #fbbf24; font-weight: 600; }
        .shop-item .preview { width: 18px; height: 18px; border-radius: 50%; display: inline-block; margin: 4px 0; border: 1px solid rgba(255,255,255,0.3); }
        .shop-item .preview-board { width: 24px; height: 16px; border-radius: 4px; display: inline-block; margin: 4px 0; border: 1px solid rgba(255,255,255,0.3); }
        .shop-item .preview-bg { width: 24px; height: 16px; border-radius: 4px; display: inline-block; margin: 4px 0; border: 1px solid rgba(255,255,255,0.3); }

        @media (max-width: 600px) {
            .game-container { max-width: 100%; padding: 8px 6px; }
            h1 { font-size: 1.2rem; }
            .player span { font-size: 0.6rem; }
            .player-disc { width: 22px; height: 22px; }
            .scores .score { font-size: 1rem; padding: 4px 10px; min-width: 50px; }

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        function createStars(count) {
            stars = [];
            for (let i = 0; i < count; i++) stars.push({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                radius: Math.random()*2.5+0.5, baseBrightness: Math.random()*0.7+0.3,
                twinkleSpeed: Math.random()*0.02+0.005, twinkleOffset: Math.random()*Math.PI*2,
                driftX: (Math.random()-0.5)*0.3, driftY: (Math.random()-0.5)*0.3
            });
        }
        function drawStars(timestamp) {
            if (_bgPaused) { _rafId = null; return; }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(star => {
                const twinkle = Math.sin(timestamp * star.twinkleSpeed + star.twinkleOffset) * 0.3 + 0.7;
                const alpha = star.baseBrightness * twinkle;
                ctx.beginPath(); ctx.arc(star.x, star.y, star.radius, 0, Math.PI*2); ctx.fillStyle = `rgba(255,255,255,${alpha})`; ctx.fill();
                if (star.radius > 1.5) { ctx.beginPath(); ctx.arc(star.x, star.y, star.radius*2.5, 0, Math.PI*2); ctx.fillStyle = `rgba(180,200,255,${alpha*0.3})`; ctx.fill(); }
                star.x += star.driftX; star.y += star.driftY;
                if (star.x < 0) star.x = canvas.width; if (star.x > canvas.width) star.x = 0;
                if (star.y < 0) star.y = canvas.height; if (star.y > canvas.height) star.y = 0;

        // ============================================================

        class GameAudio {
            constructor() { this.audioCtx = null; this.initialized = false; this._muted = false; this._paused = false; }
            init() { if (this.initialized) return; try { this.audioCtx = new (window.AudioContext||window.webkitAudioContext)(); this.initialized = true; } catch(e) {} }
            _apply() {
                if (!this.audioCtx) return;
                try {
                    if (this._muted || this._paused) { if (this.audioCtx.state === 'running') this.audioCtx.suspend(); }
                    else { if (this.audioCtx.state === 'suspended') this.audioCtx.resume(); }
                } catch(e) {}
            }
            setMuted(m)  { this._muted  = !!m; this._apply(); }
            setPaused(p) { this._paused = !!p; this._apply(); }
            _silenced()  { return this._muted || this._paused; }
            _ensureRunning() { this.init(); if (this.audioCtx && this.audioCtx.state === 'suspended') { try { this.audioCtx.resume(); } catch(e) {} } }
            playDropSound() {
                if (this._silenced()) return; this._ensureRunning(); if (!this.audioCtx) return;
                try {
                    const now = this.audioCtx.currentTime;
                    const o = this.audioCtx.createOscillator(); const g = this.audioCtx.createGain();
                    o.connect(g); g.connect(this.audioCtx.destination); o.type = 'sine';
                    o.frequency.setValueAtTime(180,now); o.frequency.exponentialRampToValueAtTime(60,now+0.12);
                    g.gain.setValueAtTime(0.35,now); g.gain.exponentialRampToValueAtTime(0.01,now+0.18);
                    o.start(now); o.stop(now+0.18);
                } catch(e) {}
            }
            playVictorySound() {
                if (this._silenced()) return; this._ensureRunning(); if (!this.audioCtx) return;
                try {
                    const now = this.audioCtx.currentTime;
                    [{freq:523.25,time:0,dur:0.2},{freq:659.25,time:0.15,dur:0.2},{freq:783.99,time:0.3,dur:0.2},{freq:1046.50,time:0.45,dur:0.4}].forEach(note => {
                        const o = this.audioCtx.createOscillator(); const g = this.audioCtx.createGain();
                        o.connect(g); g.connect(this.audioCtx.destination); o.type = 'sine';
                        o.frequency.setValueAtTime(note.freq, now+note.time);
                        g.gain.setValueAtTime(0.2, now+note.time); g.gain.exponentialRampToValueAtTime(0.01, now+note.time+note.dur);
                        o.start(now+note.time); o.stop(now+note.time+note.dur);
                    });
                } catch(e) {}
            }
        }

        // ============================================================

        // ============================================================
        const POINTS_PER_LEVEL = 100;
        const OPENING_BOOK = [3, 2, 4, 1, 5, 0, 6];

        const ZONE_DEFS = [
            { min:1,  max:3,   name:'🚀 Rookie Astronaut',   diff:'easy',       tier:1 },
            { min:4,  max:6,   name:'🛸 Starship Commander', diff:'medium',     tier:2 },

        const ENDLESS_LEVEL = 16;

        function getZoneForLevel(lvl) {
            if (lvl >= ENDLESS_LEVEL) return { name:'🌌 Endless Deep Space', diff:'unbeatable', tier:5 };
            for (const z of ZONE_DEFS) if (lvl >= z.min && lvl <= z.max) return z;

            return ZONE_DEFS[0];

        function getAiParams(level) {
            const zone = getZoneForLevel(level);
            const posInZone = zone.min ? (level - zone.min) : 0;
            const zoneSize = zone.min ? (zone.max - zone.min + 1) : 3;
            const progress = zoneSize > 1 ? posInZone / (zoneSize - 1) : 0;

            switch (zone.diff) {
                case 'easy':
                    return { randomChance: Math.max(0.05, 0.80 - progress * 0.35), depth: 0, blockWeight: 0.3 + progress * 0.1 };
                case 'medium':
                    return { randomChance: Math.max(0, 0.25 - progress * 0.2), depth: progress < 0.5 ? 2 : 3, blockWeight: 0.7 + progress * 0.1 };
                case 'hard':

                case 'expert':

                case 'unbeatable':

                default:
                    return { randomChance: 0, depth: 5, blockWeight: 1 };

        // ============================================================
        // PARTICLE SYSTEM – FIRE TRAIL & EXPLOSION
        // ============================================================
        class ParticleSystem {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.particles = [];
                this.running = false;
                this.animId = null;
                this.resize();
                window.addEventListener('resize', () => this.resize());
            }

            resize() {
                const rect = this.canvas.parentElement.getBoundingClientRect();
                this.canvas.width = rect.width;
                this.canvas.height = rect.height;
                this.canvas.style.width = '100%';
                this.canvas.style.height = '100%';
            }

            start() {
                if (this.running) return;
                this.running = true;
                this.loop();
            }

            stop() {
                this.running = false;
                if (this.animId) {
                    cancelAnimationFrame(this.animId);
                    this.animId = null;
                }
                this.clear();
            }

            clear() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.particles = [];
            }

            loop() {
                if (!this.running) return;
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.update();
                this.draw();
                this.animId = requestAnimationFrame(() => this.loop());
            }

            update() {
                if (this.particles.length > 150) {
                    this.particles.splice(0, this.particles.length - 150);
                }
                
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= p.decay;
                    p.size *= 0.98;
                    if (p.life <= 0 || p.size < 0.5) {
                        this.particles.splice(i, 1);
                    }
                }
            }

            draw() {
                const ctx = this.ctx;
                for (const p of this.particles) {
                    const alpha = Math.max(0, p.life) * 0.7;
                    ctx.globalAlpha = alpha;
                    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
                    grad.addColorStop(0, p.color1);
                    grad.addColorStop(0.6, p.color2);
                    grad.addColorStop(1, p.color3);
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = grad;
                    ctx.fill();
                    ctx.shadowColor = p.color1;
                    ctx.shadowBlur = p.size * 1.2;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
                ctx.globalAlpha = 1;
            }

            emitTrail(fromX, fromY, toX, toY, effectType, player) {
                const count = 15;
                const dx = toX - fromX;
                const dy = toY - fromY;
                for (let i = 0; i < count; i++) {
                    const t = i / count;
                    const x = fromX + dx * t + (Math.random() - 0.5) * 6;
                    const y = fromY + dy * t + (Math.random() - 0.5) * 6;
                    const colors = this.getEffectColors(effectType, player);
                    this.particles.push({
                        x: x, y: y,
                        vx: (Math.random() - 0.5) * 1.5,
                        vy: (Math.random() - 0.5) * 1.5 - 1,
                        size: 3 + Math.random() * 5,
                        life: 0.6 + Math.random() * 0.3,
                        decay: 0.025 + Math.random() * 0.02,
                        color1: colors[0], color2: colors[1], color3: colors[2]
                    });
                }
                this.start();
            }

            emitExplosion(x, y, effectType, player) {
                const count = 25;
                const colors = this.getEffectColors(effectType, player);
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * 2 * Math.PI;
                    const speed = 2 + Math.random() * 4;
                    this.particles.push({
                        x: x, y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 1,
                        size: 2 + Math.random() * 6,
                        life: 0.6 + Math.random() * 0.4,
                        decay: 0.02 + Math.random() * 0.015,
                        color1: colors[0], color2: colors[1], color3: colors[2]
                    });
                }
                this.start();
            }

            getEffectColors(effectType, player) {
                const base = player === 1 ? ['#ff5252', '#d50000', '#4a0000'] : ['#ffeb3b', '#f9a825', '#4a3b00'];
                switch (effectType) {
                    case 'fire': return ['#ff4500', '#ff8c00', '#ffd700'];
                    case 'explosion': return ['#ffffff', '#ffdd00', '#ff6600'];
                    case 'plasma': return ['#b388ff', '#7c4dff', '#311b92'];
                    case 'ice': return ['#80deea', '#00bcd4', '#006064'];
                    case 'galaxy': return ['#e040fb', '#7b1fa2', '#1a237e'];
                    default: return base;
                }
            }
        }

        // ============================================================

        // ============================================================
        class ConnectFour {
            constructor() {
                this.ROWS = 6; this.COLS = 7;
                this.board = []; this.currentPlayer = 1;

                this.scores = {1:0, 2:0};
