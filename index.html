<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Gold Fest 2 – Full Screen Path</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #02021a;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    .game-container {
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 20%, #1a1a5e 0%, #0a0a3e 40%, #050528 100%);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
    }

    /* === DECORATIONS === */
    .spaceship {
      position: absolute;
      top: 3%;
      left: 4%;
      font-size: 8vw;
      filter: drop-shadow(0 6px 8px rgba(0, 0, 0, 0.3));
      transform: rotate(-20deg);
      z-index: 10;
      animation: float 3s ease-in-out infinite;
    }

    .meteor {
      position: absolute;
      top: 45%;
      left: 2%;
      width: 15vw;
      height: 15vw;
      background: radial-gradient(circle at 40% 40%, #ffcc80, #ff9100, #e65100);
      border-radius: 50%;
      box-shadow: -12px 12px 24px rgba(33, 150, 243, 0.5);
      z-index: 10;
      animation: float 4s ease-in-out infinite reverse;
    }

    .cloud {
      position: absolute;
      top: 15%;
      right: 4%;
      font-size: 10vw;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.2));
      z-index: 10;
      animation: float 3.5s ease-in-out infinite 0.5s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(var(--r, 0deg)); }
      50% { transform: translateY(-12px) rotate(var(--r, 0deg)); }
    }

    /* === BOARD AREA === */
    .board-area {
      flex: 1;
      width: 100%;
      position: relative;
      overflow: hidden;
      z-index: 20;
    }

    /* === WORLD CONTAINER === */
    .world {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transition: transform 0.3s cubic-bezier(0.22, 0.61, 0.36, 1);
      will-change: transform;
    }

    /* === TILE STYLING === */
    .tile {
      position: absolute;
      width: 20vw;
      height: 20vw;
      max-width: 70px;
      max-height: 70px;
      min-width: 55px;
      min-height: 55px;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 2.2vw;
      color: #fff;
      text-shadow: 0 2px 3px rgba(0, 0, 0, 0.3);
      box-shadow: 0 5px 0 rgba(0, 0, 0, 0.3), 0 8px 16px rgba(0, 0, 0, 0.4);
      background: linear-gradient(180deg, #1a1aff 0%, #0d0dbb 100%);
      z-index: 5;
    }

    .tile .icon {
      font-size: 7vw;
      line-height: 1;
      filter: drop-shadow(0 3px 3px rgba(0, 0, 0, 0.3));
    }

    .tile .label {
      font-size: 2vw;
      margin-top: 1px;
    }

    /* Tile reward colors */
    .tile.lightning { background: linear-gradient(180deg, #ffd54f 0%, #f9a825 100%); }
    .tile.xp { background: linear-gradient(180deg, #81c784 0%, #2e7d32 100%); }
    .tile.ticket { background: linear-gradient(180deg, #ce93d8 0%, #6a1b9a 100%); }
    .tile.box { background: linear-gradient(180deg, #ffb74d 0%, #e65100 100%); }

    /* === PLAYER === */
    .player {
      position: absolute;
      width: 18vw;
      height: 22vw;
      max-width: 65px;
      max-height: 80px;
      z-index: 60;
      filter: drop-shadow(0 8px 6px rgba(0, 0, 0, 0.4));
      pointer-events: none;
      transition: none;
    }

    .pawn-body {
      width: 100%;
      height: 65%;
      background: radial-gradient(circle at 35% 30%, #42a5f5, #1565c0);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      margin: 0 auto;
      box-shadow: 0 4px 0 #0d47a1;
    }

    .pawn-base {
      width: 70%;
      height: 15%;
      background: rgba(21, 101, 192, 0.6);
      border-radius: 50%;
      margin: 4px auto 0;
      filter: blur(2px);
    }

    .player.hop {
      animation: hop 0.3s ease-in-out;
    }

    @keyframes hop {
      0% { transform: scale(1); }
      40% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    /* === DICE POPUP === */
    .dice-popup {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.9);
      border: 3px solid #ffd54f;
      border-radius: 30px;
      padding: 8vw 12vw;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      box-shadow: 0 0 40px rgba(255, 215, 0, 0.6);
    }

    .dice-popup.show {
      opacity: 1;
    }

    .dice-number {
      font-size: 22vw;
      font-weight: 900;
      color: #ffd54f;
      text-shadow: 0 0 20px #ffb300;
    }

    .dice-text {
      font-size: 6vw;
      color: white;
      font-weight: bold;
    }

    /* === REWARD POPUP === */
    .reward-popup {
      position: absolute;
      top: 35%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      font-weight: 900;
      font-size: 5vw;
      padding: 3vw 6vw;
      border-radius: 40px;
      z-index: 150;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      text-align: center;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
    }

    .reward-popup.show {
      opacity: 1;
    }

    /* === BOTTOM BAR === */
    .bottom-bar {
      width: 96%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2vw 2vw;
      gap: 2vw;
      z-index: 100;
      flex-wrap: wrap;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      border-radius: 20px 20px 0 0;
    }

    .badge {
      background: linear-gradient(180deg, #1a1a1a 0%, #0d0d0d 100%);
      border-radius: 16px;
      padding: 2vw 3vw;
      display: flex;
      align-items: center;
      gap: 4px;
      color: #fff;
      font-weight: 800;
      font-size: 3.5vw;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      border: 1px solid #333;
      white-space: nowrap;
    }

    .energy-badge .bolt { color: #76ff03; font-size: 5vw; }
    .xp-badge .xp-icon { color: #81c784; font-size: 5vw; }
    .ticket-badge .tick-icon { color: #ce93d8; font-size: 5vw; }

    .roll-btn {
      background: linear-gradient(180deg, #ff4081 0%, #c51162 100%);
      border: none;
      border-radius: 30px;
      padding: 3vw 6vw;
      color: white;
      font-size: 6vw;
      font-weight: 900;
      display: flex;
      align-items: center;
      gap: 2vw;
      box-shadow: 0 6px 0 #880e4f, 0 10px 20px rgba(0, 0, 0, 0.4);
      cursor: pointer;
      transition: all 0.1s;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .roll-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #880e4f, 0 3px 8px rgba(0, 0, 0, 0.4);
    }

    .roll-btn .bolt { color: #76ff03; font-size: 6vw; }
  </style>
</head>
<body>
<div class="game-container">
  <!-- Decorations -->
  <div class="spaceship">🛸</div>
  <div class="meteor"></div>
  <div class="cloud">☁️</div>

  <!-- Board Area -->
  <div class="board-area" id="boardArea">
    <div class="world" id="world"></div>
    <div class="player" id="player">
      <div class="pawn-body"></div>
      <div class="pawn-base"></div>
    </div>
    <div class="dice-popup" id="dicePopup">
      <span class="dice-number" id="diceNumber">1</span>
      <span class="dice-text">ΖΑΡΙ</span>
    </div>
    <div class="reward-popup" id="rewardPopup"></div>
  </div>

  <!-- Bottom Bar -->
  <div class="bottom-bar">
    <div class="badge energy-badge">
      <span class="bolt">⚡</span>
      <span id="energy">135</span><span style="color:#666;">/25</span>
    </div>
    <div class="badge xp-badge">
      <span class="xp-icon">🔵</span>
      <span id="xp">0</span>
    </div>
    <button class="roll-btn" id="rollBtn" onclick="roll()">
      ROLL <span class="bolt">⚡</span>5
    </button>
    <div class="badge ticket-badge">
      <span class="tick-icon">🎟️</span>
      <span id="tickets">0</span>
    </div>
  </div>
</div>

<script>
  (function() {
    const world = document.getElementById('world');
    const player = document.getElementById('player');
    const boardArea = document.getElementById('boardArea');
    const energyEl = document.getElementById('energy');
    const xpEl = document.getElementById('xp');
    const ticketsEl = document.getElementById('tickets');
    const dicePopup = document.getElementById('dicePopup');
    const diceNumberEl = document.getElementById('diceNumber');
    const rewardPopup = document.getElementById('rewardPopup');

    let energy = 135;
    let xp = 0;
    let tickets = 0;
    let isRolling = false;

    const tileSize = Math.min(65, window.innerWidth * 0.2);
    const gap = 6;
    const step = tileSize + gap;

    // Path: sequence of directions following the pattern
    // 3 UP, 3 RIGHT, 3 UP, 3 LEFT, 3 UP, 3 RIGHT, ...
    let directions = [];
    let pathPoints = []; // store {x, y} grid coordinates
    let currentIdx = 0; // which tile the player stands on

    function generateDirectionPattern() {
      // Ensure we always have enough directions
      while (directions.length < pathPoints.length + 10) {
        const len = directions.length;
        const segment = Math.floor(len / 3) % 4;
        if (segment === 0 || segment === 2) {
          directions.push('up');
        } else if (segment === 1) {
          directions.push('right');
        } else if (segment === 3) {
          directions.push('left');
        }
      }
    }

    function buildPath() {
      // Start from some point, e.g., (0,0)
      if (pathPoints.length === 0) {
        pathPoints.push({ x: 0, y: 0 });
      }
      generateDirectionPattern();
      while (pathPoints.length < currentIdx + 15) {
        const last = pathPoints[pathPoints.length - 1];
        const dir = directions[pathPoints.length - 1];
        let newPoint = { x: last.x, y: last.y };
        if (dir === 'up') newPoint.y -= 1;
        else if (dir === 'right') newPoint.x += 1;
        else if (dir === 'left') newPoint.x -= 1;
        pathPoints.push(newPoint);
      }
    }

    // Reward types
    const rewardTypes = [
      { type: 'lightning', icon: '⚡', label: 'ΕΝΕΡΓΕΙΑ' },
      { type: 'xp', icon: '🔵', label: 'XP' },
      { type: 'ticket', icon: '🎟️', label: 'ΕΙΣΙΤΗΡΙΟ' },
      { type: 'box', icon: '📦', label: 'ΚΟΥΤΙ' }
    ];

    let tileRewards = {};

    function getReward(idx) {
      if (!tileRewards[idx]) {
        const rand = Math.floor(Math.random() * rewardTypes.length);
        tileRewards[idx] = { ...rewardTypes[rand] };
      }
      return tileRewards[idx];
    }

    // Fixed position of player on screen (center horizontally, 30% from bottom)
    function getPlayerScreenPos() {
      const rect = boardArea.getBoundingClientRect();
      return {
        x: rect.width / 2,
        y: rect.height * 0.72
      };
    }

    function renderAllTiles() {
      world.innerHTML = '';
      const screenPos = getPlayerScreenPos();
      const playerPoint = pathPoints[currentIdx];

      // Render tiles from currentIdx-10 to currentIdx+15 (so plenty visible)
      const start = Math.max(0, currentIdx - 8);
      const end = Math.min(pathPoints.length - 1, currentIdx + 18);

      for (let i = start; i <= end; i++) {
        const pt = pathPoints[i];
        const reward = getReward(i);
        const tile = document.createElement('div');
        tile.className = `tile ${reward.type}`;
        tile.innerHTML = `<span class="icon">${reward.icon}</span><span class="label">${reward.label}</span>`;

        // Calculate position relative to player's tile
        const relX = (pt.x - playerPoint.x) * step;
        const relY = (pt.y - playerPoint.y) * step;

        tile.style.left = (screenPos.x + relX - tileSize/2) + 'px';
        tile.style.top = (screenPos.y + relY - tileSize/2) + 'px';

        world.appendChild(tile);
      }

      // Position player exactly on screen
      player.style.left = screenPos.x + 'px';
      player.style.top = screenPos.y + 'px';
      player.style.transform = 'translate(-50%, -50%)';
    }

    function movePlayer(steps) {
      return new Promise(resolve => {
        let remaining = steps;
        function stepForward() {
          if (remaining <= 0) {
            resolve();
            return;
          }
          currentIdx++;
          buildPath(); // ensure path ahead
          renderAllTiles();

          // hop animation
          player.classList.remove('hop');
          void player.offsetWidth;
          player.classList.add('hop');

          remaining--;
          setTimeout(stepForward, 280);
        }
        stepForward();
      });
    }

    function showDice(number) {
      diceNumberEl.textContent = number;
      dicePopup.classList.add('show');
      setTimeout(() => dicePopup.classList.remove('show'), 900);
    }

    function showReward(text) {
      rewardPopup.textContent = text;
      rewardPopup.classList.add('show');
      setTimeout(() => rewardPopup.classList.remove('show'), 1400);
    }

    function applyReward(type) {
      switch(type) {
        case 'lightning':
          energy += 5; energyEl.textContent = energy;
          showReward('+5 ⚡ ΕΝΕΡΓΕΙΑ');
          break;
        case 'xp':
          xp += 10; xpEl.textContent = xp;
          showReward('+10 🔵 XP');
          break;
        case 'ticket':
          tickets += 1; ticketsEl.textContent = tickets;
          showReward('+1 🎟️ ΕΙΣΙΤΗΡΙΟ');
          break;
        case 'box':
          const r = Math.random();
          if (r < 0.4) { energy += 3; energyEl.textContent = energy; showReward('📦 +3 ⚡'); }
          else if (r < 0.7) { xp += 5; xpEl.textContent = xp; showReward('📦 +5 🔵 XP'); }
          else if (r < 0.9) { tickets += 1; ticketsEl.textContent = tickets; showReward('📦 +1 🎟️'); }
          else { showReward('📦 FREE SPIN!'); }
          break;
      }
    }

    async function roll() {
      if (isRolling) return;
      if (energy < 5) {
        rewardPopup.textContent = 'ΑΝΕΠΑΡΚΗΣ ΕΝΕΡΓΕΙΑ ⚡';
        rewardPopup.classList.add('show');
        setTimeout(() => rewardPopup.classList.remove('show'), 1200);
        return;
      }

      isRolling = true;
      energy -= 5;
      energyEl.textContent = energy;

      const diceResult = Math.floor(Math.random() * 3) + 1;
      showDice(diceResult);
      await sleep(700);
      await movePlayer(diceResult);

      const reward = getReward(currentIdx);
      applyReward(reward.type);

      isRolling = false;
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    // Initialization
    function init() {
      buildPath();
      renderAllTiles();
    }

    window.addEventListener('resize', () => {
      renderAllTiles();
    });

    window.roll = roll;
    init();
  })();
</script>
</body>
</html>
