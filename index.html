<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Drop 2048 · Deep Space Custom Edition</title>
<style>
  :root{
    --bg:#0B0C10; --panel:#8C6A4F; --panel-deep:#4A3423;
    --cream:#F7EFDC;
    --ink:#2F1B0D; --accent:#F2A03D; --good:#7FA653; --coin:#F5C542;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{
    background:var(--bg);
    font-family:"Baloo 2","Comic Sans MS",system-ui,sans-serif;
    color:var(--ink); user-select:none; touch-action:none;
  }
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap');
  
  #game{position:fixed;inset:0;display:block; z-index:0;}
  
  /* ---------- HUD ---------- */
  .hud{position:fixed;left:0;right:0;top:0;padding:10px 12px;display:flex;gap:8px;align-items:center;pointer-events:none;z-index:5}
  .chip{
    background:var(--panel-deep);color:var(--cream);border-radius:14px;padding:6px 12px;
    font-weight:800;font-size:15px;box-shadow:0 3px 0 rgba(0,0,0,.3);display:flex;align-items:center;gap:6px;
  }
  .chip small{font-weight:600;opacity:.75;font-size:11px;display:block;line-height:1}
  .chip .big{font-size:17px;line-height:1.1}
  .spacer{flex:1}
  #missionBar{
    position:fixed;top:65px;left:50%;transform:translateX(-50%);z-index:5;pointer-events:none;
    background:var(--cream);border:3px solid var(--panel-deep);color:var(--ink);
    border-radius:16px;padding:7px 16px;font-weight:700;font-size:14px;box-shadow:0 4px 0 rgba(0,0,0,.3);
    white-space:nowrap;
  }
  #missionBar b{color:#C2542F}
  
  /* ---------- power-ups ---------- */
  .powerbar{position:fixed;bottom:14px;left:0;right:0;display:flex;justify-content:center;gap:10px;z-index:5}
  .pbtn{
    pointer-events:auto;border:none;cursor:pointer;width:66px;height:66px;border-radius:18px;
    background:var(--good);box-shadow:0 4px 0 #5c7a3a;color:#fff;font-size:26px;line-height:1;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    font-family:inherit;transition:transform .08s;
  }
  .pbtn:active{transform:translateY(3px);box-shadow:0 1px 0 #5c7a3a}
  .pbtn .cost{font-size:11px;font-weight:800;background:rgba(0,0,0,.22);border-radius:8px;padding:1px 7px}
  .pbtn.armed{outline:4px solid var(--accent);background:#C2542F;box-shadow:0 4px 0 #8f3c20}
  
  /* ---------- Shop ---------- */
  .shop-tabs { display:flex; gap:5px; margin-bottom:10px; border-bottom:2px solid rgba(0,0,0,0.1); padding-bottom:10px;}
  .shop-tab { flex:1; padding:8px 5px; font-weight:800; font-size:13px; border-radius:10px; background:#E4D7BC; color:#8C6A4F; border:none; cursor:pointer;}
  .shop-tab.active { background:var(--accent); color:#fff; box-shadow:0 3px 0 #b8742a; transform:translateY(-2px);}
  
  .shop-items { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-height: 40vh; overflow-y: auto; padding-bottom: 10px; padding-right:5px;}
  .shop-item { 
    background: #E4D7BC; border: 3px solid #8C6A4F; border-radius: 14px; padding: 10px; 
    cursor: pointer; transition: transform 0.1s; text-align:center;
  }
  .shop-item:active { transform: scale(0.95); }
  .shop-item h3 { font-size: 14px; margin-bottom: 5px; color: var(--ink); line-height:1.2;}
  .shop-item .price { font-weight: 800; color: #b8742a; font-size:13px;}
  .shop-item.owned .price { color: var(--good); }
  .shop-item.equipped { border-color: var(--accent); background: #FFF5E1; box-shadow:0 0 10px rgba(242,160,61,0.5);}

  /* ---------- modals ---------- */
  .overlay{position:fixed;inset:0;background:rgba(11,12,16,.85);display:flex;align-items:center;justify-content:center;z-index:20;backdrop-filter:blur(4px)}
  .card{
    background:var(--cream);border:4px solid var(--panel-deep);border-radius:26px;padding:22px 20px;
    width:min(380px,92vw);text-align:center;box-shadow:0 10px 0 rgba(0,0,0,.4);
    animation:pop .25s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes pop{from{transform:scale(.7);opacity:0}}
  .card h2{font-size:22px; margin-bottom:6px;font-weight:800}
  .btn{
    border:none;cursor:pointer;font-family:inherit;font-weight:800;font-size:16px;color:#fff;
    background:var(--accent);border-radius:16px;padding:12px 30px;box-shadow:0 4px 0 #b8742a;transition:transform .08s; margin-top:10px; width:100%;
  }
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 #b8742a}
  .hidden{display:none!important}
  
  #toast{
    position:fixed;bottom:96px;left:50%;transform:translateX(-50%);z-index:15;pointer-events:none;
    background:var(--panel-deep);color:var(--cream);font-weight:700;font-size:14px;border-radius:14px;
    padding:8px 16px;opacity:0;transition:opacity .25s;white-space:nowrap;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div class="hud">
  <div class="chip"><div><small>ΕΠΙΠΕΔΟ</small><span class="big" id="hudLevel">1</span></div></div>
  <div class="chip"><div><small>ΣΚΟΡ</small><span class="big" id="hudScore">0</span></div></div>
  <div class="spacer"></div>
  <button class="chip" id="btnShop" style="cursor:pointer; border:none; outline:none; background:var(--accent); pointer-events:auto;">🛒 Κατάστημα</button>
  <div class="chip">🪙 <span class="big" id="hudCoins">0</span></div>
</div>
<div id="missionBar">🎯 Αποστολή: <b id="missionText"></b></div>

<div class="powerbar">
  <button class="pbtn" id="btnMagnet">🧲<span class="cost">Δωρεάν</span></button>
  <button class="pbtn" id="btnHammer">🔨<span class="cost">Δωρεάν</span></button>
  <button class="pbtn" id="btnShuffle">🔄<span class="cost">Δωρεάν</span></button>
</div>

<div id="toast"></div>

<div class="overlay hidden" id="shopModal">
  <div class="card">
    <h2 style="margin-bottom:15px;">🛍️ Εξατομίκευση</h2>
    <div class="shop-tabs">
      <button class="shop-tab active" data-tab="cubes">Κύβοι (10)</button>
      <button class="shop-tab" data-tab="boards">Ταμπλό (10)</button>
      <button class="shop-tab" data-tab="effects">Εφέ (10)</button>
      <button class="shop-tab" data-tab="sounds">Ήχοι (10)</button>
    </div>
    <div class="shop-items" id="shopContainer"></div>
    <button class="btn" id="btnCloseShop">Κλείσιμο</button>
  </div>
</div>

<div class="overlay hidden" id="winModal">
  <div class="card">
    <div style="font-size:40px; margin-bottom:10px;">🎉</div>
    <h2>Επίπεδο Ολοκληρώθηκε!</h2>
    <p id="winText"></p>
    <button class="btn" id="btnNext">Επόμενο επίπεδο ➜</button>
  </div>
</div>

<div class="overlay hidden" id="loseModal">
  <div class="card">
    <div style="font-size:40px; margin-bottom:10px;">😵</div>
    <h2>Γέμισε το ταμπλό!</h2>
    <p id="loseText"></p>
    <button class="btn" id="btnRetry">Ξαναπροσπάθησε</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* =====================================================
   Drop 2048 · Deep Space & Full Customization
   - 10 κύβοι, 10 ταμπλό, 10 εφέ, 10 ήχοι
   - Όλα ΔΩΡΕΑΝ
   - Βελτιωμένη ορατότητα αριθμών
   - Animation χοροπηδητού στη νίκη
===================================================== */

const COLS = 5, ROWS = 6, CELL = 1.0, GAP = 0.12; 
const BOARD_W = COLS * (CELL + GAP) - GAP;
const BOARD_H = ROWS * (CELL + GAP) - GAP;
const launchY = -BOARD_H/2 - 1.9;

const LEVELS = [
  { target: 64,   preset: 0, text: "Φτιάξε κύβο 64" },
  { target: 128,  preset: 4, text: "Φτιάξε κύβο 128" },
  { target: 256,  preset: 7, text: "Φτιάξε κύβο 256" },
  { target: 512,  preset: 9, text: "Φτιάξε κύβο 512" },
  { target: 1024, preset: 12, text: "Φτιάξε κύβο 1024" },
];

/* ---------------- Shop Data (10 items each, ALL FREE) ---------------- */
const SHOP = {
  cubes: [
    { id: 'wood', name: 'Ξύλο', price: 0, icon: '🪵' },
    { id: 'whitered', name: 'Άσπρο-Κόκκινο', price: 0, icon: '🍬' },
    { id: 'whitegreen', name: 'Άσπρο-Πράσινο', price: 0, icon: '🍵' },
    { id: 'zebra', name: 'Ζέβρα', price: 0, icon: '🦓' },
    { id: 'neon', name: 'Cyber Neon', price: 0, icon: '⚡' },
    { id: 'rainbow', name: 'Ουράνιο Τόξο', price: 0, icon: '🌈' },
    { id: 'gold', name: 'Καθαρός Χρυσός', price: 0, icon: '🏆' },
    { id: 'galaxy', name: 'Γαλαξίας', price: 0, icon: '🌌' },
    { id: 'ice', name: 'Παγωμένος', price: 0, icon: '🧊' },
    { id: 'lava', name: 'Λάβα', price: 0, icon: '🌋' }
  ],
  boards: [
    { id: 'board_wood', name: 'Ξύλινο', price: 0, icon: '🟫', back: '#4A3423', cell: '#2F1B0D' },
    { id: 'board_space', name: 'Βαθύ Διάστημα', price: 0, icon: '🟦', back: '#0B132B', cell: '#4A5A8A' }, // Adjusted for contrast
    { id: 'board_crimson', name: 'Πορφυρό', price: 0, icon: '🟥', back: '#3A0CA3', cell: '#A47CFF' },
    { id: 'board_emerald', name: 'Σμαράγδι', price: 0, icon: '🟩', back: '#004B23', cell: '#7BDF4B' },
    { id: 'board_white', name: 'Λευκός Καμβάς', price: 0, icon: '⬜', back: '#F5F5F5', cell: '#E0E0E0' },
    { id: 'board_neon', name: 'Νέον Σκοτάδι', price: 0, icon: '🟪', back: '#0A0A0A', cell: '#FF00FF' },
    { id: 'board_sunset', name: 'Ηλιοβασίλεμα', price: 0, icon: '🌅', back: '#FF7F50', cell: '#FFDAB9' },
    { id: 'board_ocean', name: 'Ωκεανός', price: 0, icon: '🌊', back: '#006994', cell: '#87CEEB' },
    { id: 'board_forest', name: 'Δάσος', price: 0, icon: '🌲', back: '#228B22', cell: '#90EE90' },
    { id: 'board_void', name: 'Το Κενό', price: 0, icon: '⬛', back: '#000000', cell: '#444444' }
  ],
  effects: [
    { id: 'eff_none', name: 'Χωρίς Εφέ', price: 0, icon: '✖️' },
    { id: 'eff_flame', name: 'Φλόγα (Βολή)', price: 0, icon: '🔥' },
    { id: 'eff_sparkle', name: 'Αστερόσκονη (Βολή)', price: 0, icon: '✨' },
    { id: 'eff_smoke', name: 'Καπνός (Βολή)', price: 0, icon: '💨' },
    { id: 'eff_explode', name: 'Έκρηξη (Συγχώνευση)', price: 0, icon: '💥' },
    { id: 'eff_confetti', name: 'Κομφετί (Συγχώνευση)', price: 0, icon: '🎊' },
    { id: 'eff_plasma', name: 'Πλάσμα (Συγχώνευση)', price: 0, icon: '🔮' },
    { id: 'eff_lightning', name: 'Κεραυνός (Συγχώνευση)', price: 0, icon: '⚡' },
    { id: 'eff_ice', name: 'Πάγος (Συγχώνευση)', price: 0, icon: '❄️' },
    { id: 'eff_magic', name: 'Μαγεία (Συγχώνευση)', price: 0, icon: '✨' }
  ],
  sounds: [
    { id: 'snd_default', name: 'Default', price: 0, icon: '🔊' },
    { id: 'snd_bass', name: 'Bass Drop', price: 0, icon: '🔊' },
    { id: 'snd_sci', name: 'Sci-Fi', price: 0, icon: '🤖' },
    { id: 'snd_drum', name: 'Drums', price: 0, icon: '🥁' },
    { id: 'snd_bell', name: 'Καμπάνα', price: 0, icon: '🔔' },
    { id: 'snd_glitch', name: 'Glitch', price: 0, icon: '📟' },
    { id: 'snd_swish', name: 'Swish', price: 0, icon: '🧹' },
    { id: 'snd_cymbal', name: 'Cymbal', price: 0, icon: '🪘' },
    { id: 'snd_dolby', name: 'Dolby Surge', price: 0, icon: '🌊' },
    { id: 'snd_choir', name: 'Choir', price: 0, icon: '🎤' }
  ]
};

let currentShopTab = 'cubes';

/* ---------------- state ---------------- */
let scene, camera, renderer, boardGroup, raycaster, pointer, bgElements = [];
let backMesh, cellMat; 
let grid = [];
let currentCube = null;
let aimCol = 2, busy = false, hammerMode = false, isLaunching = false;
let score = 0, coins = 500, level = 0, best = 0;
let anims = [];
let matCache = {};

let save = { 
  coins: 50, level: 0, best: 0, score: 0, 
  ownedCubes: ['wood'], equippedCube: 'wood',
  ownedBoards: ['board_wood'], equippedBoard: 'board_wood',
  ownedEffects: ['eff_none'], equippedEffect: 'eff_none',
  ownedSounds: ['snd_default'], equippedSound: 'snd_default'
};

async function loadSave(){
  try{
    const r = localStorage.getItem("drop2048-save-v4");
    if(r) save = Object.assign(save, JSON.parse(r));
  }catch(e){ }
}
function persist(){
  try{ localStorage.setItem("drop2048-save-v4", JSON.stringify(save)); }catch(e){ }
}

/* ---------------- Audio (10 Different Sounds) ---------------- */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
  if(audioCtx.state === 'suspended') audioCtx.resume();
  
  const soundId = save.equippedSound || 'snd_default';
  const soundData = SHOP.sounds.find(s => s.id === soundId);
  
  // Αν δεν βρεθεί, χρησιμοποιούμε default
  if(!soundData) {
    if(type === 'drop') playDropDefault(audioCtx);
    else if(type === 'merge') playMergeDefault(audioCtx);
    return;
  }

  // Καλούμε τη συνάρτηση αναλόγως
  if(type === 'drop') playSoundDrop(soundId, audioCtx);
  else if(type === 'merge') playSoundMerge(soundId, audioCtx);
}

// ---------- Sound Generators ----------
function playDropDefault(ctx) {
  const osc = ctx.createOscillator(); const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.1);
  gain.gain.setValueAtTime(0.2, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
  osc.start(); osc.stop(ctx.currentTime + 0.1);
}

function playMergeDefault(ctx) {
  const osc = ctx.createOscillator(); const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = 'sine'; osc.frequency.setValueAtTime(300, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.1);
  gain.gain.setValueAtTime(0.3, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
  osc.start(); osc.stop(ctx.currentTime + 0.1);
}

function playSoundDrop(id, ctx) {
  const osc = ctx.createOscillator(); const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  
  switch(id) {
    case 'snd_bass':
      osc.type = 'square'; osc.frequency.setValueAtTime(150, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.15, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
      break;
    case 'snd_sci':
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(600, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.08);
      gain.gain.setValueAtTime(0.1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.08);
      break;
    case 'snd_drum':
      osc.type = 'square'; osc.frequency.setValueAtTime(100, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(50, ctx.currentTime + 0.05);
      gain.gain.setValueAtTime(0.2, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.05);
      break;
    case 'snd_bell':
      osc.type = 'sine'; osc.frequency.setValueAtTime(1200, ctx.currentTime);
      gain.gain.setValueAtTime(0.2, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
      break;
    case 'snd_glitch':
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(400, ctx.currentTime); osc.frequency.linearRampToValueAtTime(200, ctx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
      break;
    case 'snd_swish':
      osc.type = 'sine'; osc.frequency.setValueAtTime(2000, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.05, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
      break;
    case 'snd_cymbal':
      osc.type = 'square'; osc.frequency.setValueAtTime(3000, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(1500, ctx.currentTime + 0.02);
      gain.gain.setValueAtTime(0.1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.02);
      break;
    case 'snd_dolby':
      osc.type = 'sine'; osc.frequency.setValueAtTime(500, ctx.currentTime); 
      gain.gain.setValueAtTime(0.25, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
      // Δημιουργία εφέ surround με δημιουργία 2ου ταλαντωτή (panning)
      const osc2 = ctx.createOscillator(); const gain2 = ctx.createGain();
      osc2.connect(gain2); gain2.connect(ctx.destination);
      osc2.type = 'sine'; osc2.frequency.setValueAtTime(300, ctx.currentTime);
      gain2.gain.setValueAtTime(0.15, ctx.currentTime); gain2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
      osc2.start(); osc2.stop(ctx.currentTime + 0.2);
      break;
    case 'snd_choir':
      osc.type = 'sine'; osc.frequency.setValueAtTime(400, ctx.currentTime);
      gain.gain.setValueAtTime(0.1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
      break;
    default: playDropDefault(ctx); return;
  }
  osc.start(); osc.stop(ctx.currentTime + 0.3);
}

function playSoundMerge(id, ctx) {
  const osc = ctx.createOscillator(); const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  
  switch(id) {
    case 'snd_bass':
      osc.type = 'square'; osc.frequency.setValueAtTime(300, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.2, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
      break;
    case 'snd_sci':
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(1000, ctx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.15, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
      break;
    case 'snd_drum':
      osc.type = 'square'; osc.frequency.setValueAtTime(80, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.08);
      gain.gain.setValueAtTime(0.2, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.08);
      break;
    case 'snd_bell':
      osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime); osc.frequency.linearRampToValueAtTime(1600, ctx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.2, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
      break;
    case 'snd_glitch':
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, ctx.currentTime); osc.frequency.linearRampToValueAtTime(800, ctx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.15, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
      break;
    case 'snd_swish':
      osc.type = 'sine'; osc.frequency.setValueAtTime(300, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(1800, ctx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
      break;
    case 'snd_cymbal':
      osc.type = 'square'; osc.frequency.setValueAtTime(2000, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(1000, ctx.currentTime + 0.05);
      gain.gain.setValueAtTime(0.15, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.05);
      break;
    case 'snd_dolby':
      osc.type = 'sine'; osc.frequency.setValueAtTime(600, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(900, ctx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.2, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
      const osc2 = ctx.createOscillator(); const gain2 = ctx.createGain();
      osc2.connect(gain2); gain2.connect(ctx.destination);
      osc2.type = 'sine'; osc2.frequency.setValueAtTime(400, ctx.currentTime); osc2.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.15);
      gain2.gain.setValueAtTime(0.1, ctx.currentTime); gain2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
      osc2.start(); osc2.stop(ctx.currentTime + 0.15);
      break;
    case 'snd_choir':
      osc.type = 'sine'; osc.frequency.setValueAtTime(500, ctx.currentTime); osc.frequency.linearRampToValueAtTime(1000, ctx.currentTime + 0.4);
      gain.gain.setValueAtTime(0.1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
      break;
    default: playMergeDefault(ctx); return;
  }
  osc.start(); osc.stop(ctx.currentTime + 0.4);
}

/* ---------------- Particles Engine (10 Effects) ---------------- */
const particles = [];
const pGeo = new THREE.BoxGeometry(0.12, 0.12, 0.12);
const pMats = {
  'flame': new THREE.MeshBasicMaterial({color: 0xff4500}),
  'sparkle': new THREE.MeshBasicMaterial({color: 0xffffff}),
  'smoke': new THREE.MeshBasicMaterial({color: 0x888888, transparent:true, opacity:0.7}),
  'explode': new THREE.MeshBasicMaterial({color: 0xffa500}),
  'confetti': [0xff0000, 0x00ff00, 0x0000ff, 0xffff00].map(c => new THREE.MeshBasicMaterial({color: c})),
  'plasma': new THREE.MeshBasicMaterial({color: 0x8a2be2}),
  'lightning': new THREE.MeshBasicMaterial({color: 0x00ffff}),
  'ice': new THREE.MeshBasicMaterial({color: 0xadd8e6}),
  'magic': new THREE.MeshBasicMaterial({color: 0xff69b4})
};

function spawnParticle(x, y, z, type) {
  let mat = pMats[type];
  if(Array.isArray(mat)) mat = mat[Math.floor(Math.random()*mat.length)];
  const p = new THREE.Mesh(pGeo, mat);
  p.position.set(x + (Math.random()-0.5)*0.5, y + (Math.random()-0.5)*0.5, z + (Math.random()-0.5)*0.2);
  
  let vx = (Math.random()-0.5)*3, vy = (Math.random()-0.5)*3, vz = Math.random()*2;
  if(type === 'flame' || type === 'sparkle' || type === 'smoke') { vx *= 0.2; vy = -Math.random()*2; vz = 0; } 
  if(type === 'smoke') { p.scale.set(1.5,1.5,1.5); vy = Math.random()*1; }
  if(type === 'lightning') { vx = (Math.random()-0.5)*8; vy = (Math.random()-0.5)*8; }
  
  scene.add(p);
  particles.push({ mesh: p, life: 1.0, vx, vy, vz, type });
}

function spawnBurst(x, y, z, type, count) {
  for(let i=0; i<count; i++) spawnParticle(x, y, z, type);
}

function updateParticles(dt) {
  for(let i=particles.length-1; i>=0; i--) {
    const p = particles[i];
    p.life -= dt * (p.type === 'smoke' ? 1.5 : 2.5); 
    if(p.life <= 0) {
      scene.remove(p.mesh); particles.splice(i, 1);
    } else {
      p.mesh.position.x += p.vx * dt;
      p.mesh.position.y += p.vy * dt;
      p.mesh.position.z += p.vz * dt;
      p.mesh.scale.setScalar(p.life * (p.type === 'smoke' ? 1.5 : 1));
      if(p.type === 'flame' || p.type === 'explode') p.mesh.material.color.setHSL(0.1*p.life, 1, 0.5);
      if(p.type === 'smoke') p.mesh.material.opacity = p.life * 0.7;
    }
  }
}

function cellPos(c, r){ return { x: -BOARD_W/2 + CELL/2 + c*(CELL+GAP), y: BOARD_H/2 - CELL/2 - r*(CELL+GAP) }; }

/* ---------------- Custom Cube Texture Generator (Improved Visibility) ---------------- */
function numberTexture(value){
  const cv = document.createElement("canvas"); cv.width = cv.height = 128;
  const g = cv.getContext("2d");
  const skin = save.equippedCube;

  // Σχεδίαση φόντου
  if(skin === 'wood') {
    g.fillStyle = value >= 128 ? "#8B4513" : "#D2B48C"; roundRect(g,4,4,120,120,22); g.fill();
    g.strokeStyle="rgba(0,0,0,0.1)"; g.lineWidth=2;
    for(let i=0;i<15;i++){ g.beginPath(); g.moveTo(4,Math.random()*128); g.bezierCurveTo(40,Math.random()*128,80,Math.random()*128,124,Math.random()*128); g.stroke(); }
  } 
  else if (skin === 'whitered' || skin === 'whitegreen') {
    g.fillStyle = "white"; roundRect(g,4,4,120,120,22); g.fill();
    g.fillStyle = skin === 'whitered' ? "#D32F2F" : "#388E3C";
    g.save(); g.clip(); 
    for(let i=-128; i<256; i+=32) { g.beginPath(); g.moveTo(i, 0); g.lineTo(i+20, 0); g.lineTo(i-108, 128); g.lineTo(i-128, 128); g.fill(); }
    g.restore();
  }
  else if (skin === 'zebra') {
    g.fillStyle = "white"; roundRect(g,4,4,120,120,22); g.fill();
    g.fillStyle = "#111"; g.save(); g.clip();
    for(let i=0; i<128; i+=24) { g.beginPath(); g.moveTo(0, i); g.bezierCurveTo(40, i+15, 80, i-15, 128, i); g.lineTo(128, i+10); g.bezierCurveTo(80, i-5, 40, i+25, 0, i+10); g.fill(); }
    g.restore();
  }
  else if (skin === 'rainbow') {
    let grad = g.createLinearGradient(0,0,128,128);
    ['red','orange','yellow','green','cyan','blue','purple'].forEach((c,i)=>grad.addColorStop(i/6, c));
    g.fillStyle = grad; roundRect(g,4,4,120,120,22); g.fill();
  }
  else if (skin === 'gold') {
    let grad = g.createRadialGradient(64,64,0, 64,64,90);
    grad.addColorStop(0,"#FFF59D"); grad.addColorStop(0.6,"#FBC02D"); grad.addColorStop(1,"#F57F17");
    g.fillStyle = grad; roundRect(g,4,4,120,120,22); g.fill();
  }
  else if (skin === 'neon') {
    g.fillStyle = "#111"; roundRect(g,4,4,120,120,22); g.fill();
    g.strokeStyle = `hsl(${(Math.log2(value)*30)%360}, 100%, 50%)`; g.lineWidth=6; g.stroke();
  }
  else if (skin === 'galaxy') {
    g.fillStyle = "#1A0B2E"; roundRect(g,4,4,120,120,22); g.fill();
    g.fillStyle = "white";
    for(let i=0; i<30; i++) { g.beginPath(); g.arc(Math.random()*128, Math.random()*128, Math.random()*2, 0, 7); g.fill(); }
  }
  else if (skin === 'ice') {
    let grad = g.createLinearGradient(0,0,128,128);
    grad.addColorStop(0, "#E0F7FA"); grad.addColorStop(1, "#00BCD4");
    g.fillStyle = grad; roundRect(g,4,4,120,120,22); g.fill();
  }
  else if (skin === 'lava') {
    let grad = g.createLinearGradient(0,0,128,128);
    grad.addColorStop(0, "#FF5722"); grad.addColorStop(1, "#FFC107");
    g.fillStyle = grad; roundRect(g,4,4,120,120,22); g.fill();
  }

  // Σχεδίαση αριθμού ΜΕΣΑ σε στρογγυλό πλαίσιο για συγκεκριμένα χρώματα
  let txtCol = (skin==='wood'&&value<128)||skin==='whitered'||skin==='whitegreen'||skin==='zebra' ? "#111" : "#FFF";
  if(skin==='gold') txtCol = "#3E2723";
  if(skin==='neon') txtCol = `hsl(${(Math.log2(value)*30)%360}, 100%, 65%)`;
  if(skin==='ice') txtCol = "#01579B";
  if(skin==='lava') txtCol = "#4E1500";

  // Αν ο κύβος είναι δίχρωμος ή ζέβρα, βάζουμε τον αριθμό σε κύκλο
  if (['whitered', 'whitegreen', 'zebra'].includes(skin)) {
      g.beginPath(); g.arc(64, 64, 40, 0, Math.PI * 2);
      g.fillStyle = "rgba(255, 255, 255, 0.85)"; g.fill();
      g.strokeStyle = "#333"; g.lineWidth = 3; g.stroke();
      txtCol = "#000"; // Σίγουρα μαύρο για αντίθεση
  }

  g.font = `800 ${value>=1024?42:value>=128?50:60}px 'Baloo 2', sans-serif`;
  g.textAlign="center"; g.textBaseline="middle";

  // Πρόσθετο λευκό περίγραμμα για όλους τους αριθμούς ώστε να φαίνονται παντού
  g.shadowColor = "rgba(0,0,0,0.8)"; g.shadowBlur = 10; 
  
  g.fillStyle = txtCol;
  g.fillText(value, 64, 68);
  
  const t = new THREE.CanvasTexture(cv); t.anisotropy = 4; return t;
}

function roundRect(g,x,y,w,h,r){ g.beginPath(); g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r); g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); }

function makeCube(value){
  const tex = numberTexture(value);
  const m = new THREE.Mesh(new THREE.BoxGeometry(CELL*0.92, CELL*0.92, CELL*0.92), new THREE.MeshLambertMaterial({map: tex, color:0xdddddd}));
  m.userData.value = value; return m;
}

/* ---------------- tweens ---------------- */
function tween(obj, to, dur, ease, done){
  const from = {}; for(const k in to) from[k] = obj[k];
  anims.push({obj, from, to, dur, t:0, ease: ease||(t=>1-Math.pow(1-t,3)), done});
}
function stepAnims(dt){
  for(let i=anims.length-1;i>=0;i--){
    const a = anims[i]; a.t += dt/a.dur; const k = a.t>=1 ? 1 : a.ease(a.t);
    for(const p in a.to) a.obj[p] = a.from[p] + (a.to[p]-a.from[p])*k;
    if(a.t>=1){ anims.splice(i,1); a.done && a.done(); }
  }
}

/* ---------------- gameplay ---------------- */
function newBoard(){
  for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++){ if(grid[c] && grid[c][r]) boardGroup.remove(grid[c][r].mesh); }
  grid = Array.from({length:COLS},()=>Array(ROWS).fill(null));
  score = save.score || 0; updateHUD();
  matCache = {}; 

  for(let i=0;i<LEVELS[Math.min(level, LEVELS.length-1)].preset;i++){
    const c = Math.floor(Math.random()*COLS); const r = colHeight(c);
    if(r < 3) placeCube(c, r, [2,4,8,16][Math.floor(Math.random()*4)], true);
  }
  spawnCurrent();
}
function colHeight(c){ let h=0; while(h<ROWS && grid[c][h]) h++; return h; }

function placeCube(c, r, value, instant){
  const cube = makeCube(value); const p = cellPos(c,r);
  cube.position.set(p.x, p.y, 0.1); boardGroup.add(cube);
  grid[c][r] = {value, mesh:cube};
  if(!instant){ cube.scale.set(.4,.4,.4); tween(cube.scale, {x:1,y:1,z:1}, 0.22); }
  return grid[c][r];
}

function spawnCurrent(){
  let maxOnBoard = 4;
  for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++) if(grid[c][r]) maxOnBoard = Math.max(maxOnBoard, grid[c][r].value);
  const pool = []; for(let v=2; v<=Math.min(32, Math.max(4, maxOnBoard/2)); v*=2) pool.push(v, v, v===2?v:0);
  const vals = pool.filter(Boolean);
  
  currentCube = makeCube(vals[Math.floor(Math.random()*vals.length)]);
  currentCube.position.set(cellPos(aimCol, 0).x, launchY, 0.1);
  currentCube.scale.set(.3,.3,.3); boardGroup.add(currentCube);
  tween(currentCube.scale, {x:1,y:1,z:1}, 0.2);
}

function setAim(c, instant = false){
  aimCol = Math.max(0, Math.min(COLS-1, c));
  if(currentCube && !busy){
    const tx = cellPos(aimCol,0).x;
    if (instant) currentCube.position.x = tx; else tween(currentCube.position, {x: tx}, 0.09);
  }
}

function launch(){
  if(busy || !currentCube) return;
  const c = aimCol; const h = colHeight(c);
  if(h >= ROWS){ gameOver(); return; }
  busy = true; isLaunching = true;
  
  playSound('drop'); // Ήχος πτώσης

  const targetR = h; const p = cellPos(c, targetR);
  const cube = currentCube; currentCube = null;
  
  tween(cube.position, {y:p.y}, Math.max(0.13, Math.abs(cube.position.y - p.y)*0.045), null, ()=>{
    isLaunching = false; boardGroup.remove(cube);
    const cell = placeCube(c, targetR, cube.userData.value, true);
    cell.mesh.scale.set(1.15,0.85,1.15); tween(cell.mesh.scale, {x:1,y:1,z:1}, 0.18);
    resolveMerges([{c, r:targetR}]).then(()=>{
      if(checkWin()) return;
      if(colHeight(c) >= ROWS){ gameOver(); return; }
      busy = false; spawnCurrent(); setAim(aimCol);
    });
  });
}

async function resolveMerges(queue){
  while(queue.length){
    const {c,r} = queue.shift(); const cell = grid[c][r];
    if(!cell) continue;
    const same = [{c:c-1,r},{c:c+1,r},{c,r:r-1},{c,r:r+1}].filter(n => n.c>=0&&n.c<COLS&&n.r>=0&&n.r<ROWS&&grid[n.c][n.r]&&grid[n.c][n.r].value===cell.value);
    if(!same.length) continue;

    const newVal = cell.value * Math.pow(2, same.length);
    score += newVal; save.score = score; coins += 1; save.coins = coins; updateHUD();
    
    await new Promise(res=>{
      let left = same.length; const tp = cellPos(c,r);
      same.forEach(n=>{
        const m = grid[n.c][n.r].mesh; grid[n.c][n.r] = null;
        tween(m.position, {x:tp.x, y:tp.y}, 0.14, null, ()=>{ boardGroup.remove(m); if(--left===0) res(); });
        tween(m.scale, {x:.5,y:.5,z:.5}, 0.14);
      });
    });
    
    playSound('merge'); // Ήχος συγχώνευσης
    const eff = save.equippedEffect;
    if(eff !== 'eff_none' && eff !== 'eff_flame' && eff !== 'eff_sparkle' && eff !== 'eff_smoke') { 
      const wp = new THREE.Vector3(); cell.mesh.getWorldPosition(wp);
      spawnBurst(wp.x, wp.y, wp.z, eff.replace('eff_',''), 15);
    } else if (eff === 'eff_smoke') {
      const wp = new THREE.Vector3(); cell.mesh.getWorldPosition(wp);
      spawnBurst(wp.x, wp.y, wp.z, 'smoke', 20);
    }

    boardGroup.remove(cell.mesh); grid[c][r] = null;
    const up = placeCube(c, r, newVal); up.mesh.scale.set(1.35,1.35,1.35); tween(up.mesh.scale, {x:1,y:1,z:1}, 0.22);

    const moved = [];
    for(let xc=0;xc<COLS;xc++){
      let write=0;
      for(let xr=0;xr<ROWS;xr++){
        if(grid[xc][xr]){
          if(xr!==write){
            grid[xc][write]=grid[xc][xr]; grid[xc][xr]=null;
            tween(grid[xc][write].mesh.position, {y:cellPos(xc, write).y}, 0.15);
            moved.push({c:xc, r:write});
          }
          write++;
        }
      }
    }
    queue.push({c,r}, ...moved); await new Promise(r=>setTimeout(r,120));
  }
  persist();
}

/* ---------------- levels / win / lose (Bounce on Win) ---------------- */
function checkWin(){
  const t = LEVELS[Math.min(level, LEVELS.length-1)].target;
  let win = false;
  for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++) if(grid[c][r] && grid[c][r].value >= t){
      win = true; break;
  }
  if(!win) return false;
  
  busy = true; coins += 25; save.coins = coins; best = Math.max(best, score); save.best = best;
  save.level = Math.min(level+1, LEVELS.length-1); persist(); updateHUD();
  document.getElementById("winText").innerHTML = `Έφτιαξες ${t}!<br>+25 🪙`;
  document.getElementById("winModal").classList.remove("hidden");
  
  // Χοροπηδητό (Bounce) όλων των κύβων
  for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++) {
    if(grid[c][r]) {
      const mesh = grid[c][r].mesh;
      const origY = mesh.position.y;
      // Δημιουργία αλυσίδας από tweens για bounce
      let delay = (c + r) * 50; // Καθυστέρηση για εφέ κύματος
      setTimeout(() => {
        tween(mesh.position, {y: origY + 0.3}, 0.15, null, () => {
          tween(mesh.position, {y: origY - 0.15}, 0.15, null, () => {
            tween(mesh.position, {y: origY}, 0.15);
          });
        });
      }, delay);
    }
  }
  return true;
}

function gameOver(){
  busy = true; best = Math.max(best, score); save.best = best; save.score = 0; persist();
  document.getElementById("loseText").innerHTML = `Σκορ: <b>${score}</b>`;
  document.getElementById("loseModal").classList.remove("hidden");
}

/* ---------------- input & powerups (ΔΩΡΕΑΝ) ---------------- */
function onTap(e){
  if(document.querySelector(".overlay:not(.hidden)")) return;
  const x = (e.touches ? e.touches[0].clientX : e.clientX) / innerWidth * 2 - 1;
  const y = -((e.touches ? e.touches[0].clientY : e.clientY) / innerHeight * 2 - 1);
  pointer.set(x,y); raycaster.setFromCamera(pointer, camera);
  const hit = new THREE.Vector3(); raycaster.ray.intersectPlane(new THREE.Plane(new THREE.Vector3(0,0,1).applyQuaternion(boardGroup.quaternion), 0), hit);
  boardGroup.worldToLocal(hit);
  const c = Math.max(0,Math.min(COLS-1, Math.round((hit.x + BOARD_W/2 - CELL/2) / (CELL+GAP))));
  const r = Math.round((BOARD_H/2 - CELL/2 - hit.y) / (CELL+GAP));
  
  if(hammerMode){
    if(r>=0 && r<ROWS && grid[c][r]){
      hammerMode=false;
      const m = grid[c][r].mesh; grid[c][r]=null; tween(m.scale, {x:.01,y:.01,z:.01}, 0.18, null, ()=> boardGroup.remove(m));
      busy=true; setTimeout(()=>{ resolveMerges([]).then(()=>{ busy=false; updateHUD(); persist(); }); }, 180);
    } else { hammerMode=false; updateHUD(); }
    return;
  }
  setAim(c, true); launch();
}

document.getElementById("btnHammer").onclick = ()=>{ if(busy)return; hammerMode=true; updateHUD(); toast("🔨 Επίλεξε κύβο"); }
document.getElementById("btnShuffle").onclick = ()=>{ if(busy||!currentCube)return; boardGroup.remove(currentCube); currentCube=null; spawnCurrent(); setAim(aimCol); updateHUD(); }
document.getElementById("btnMagnet").onclick = ()=>{
  if(busy)return;
  let tilesByVal = {};
  for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++) if(grid[c][r]) { let v=grid[c][r].value; if(!tilesByVal[v])tilesByVal[v]=[]; tilesByVal[v].push({c,r,cell:grid[c][r]}); }
  let mg = Object.values(tilesByVal).filter(g=>g.length>1); if(!mg.length)return toast("Κανένα ζευγάρι!");
  busy=true; let animsP=0;
  mg.forEach(group=>{
    const trg = group[0]; trg.newVal = trg.cell.value * Math.pow(2, group.length-1);
    group.slice(1).forEach(t=>{
      const m = t.cell.mesh; grid[t.c][t.r]=null; const tp=cellPos(trg.c,trg.r); animsP++;
      tween(m.position, {x:tp.x, y:tp.y, z:1.0}, 0.35, null, ()=>{ boardGroup.remove(m); if(--animsP===0) finMagnet(mg); });
      tween(m.scale, {x:0.3,y:0.3,z:0.3}, 0.35);
    });
  });
}
function finMagnet(mg){
  playSound('merge');
  mg.forEach(g=>{
    const trg=g[0]; boardGroup.remove(trg.cell.mesh); grid[trg.c][trg.r]=null; score+=trg.newVal; save.score=score;
    const up=placeCube(trg.c,trg.r,trg.newVal); up.mesh.scale.set(1.5,1.5,1.5); tween(up.mesh.scale,{x:1,y:1,z:1},0.25);
  });
  setTimeout(()=>{ resolveMerges([]).then(()=>{ busy=false; updateHUD(); persist(); }); }, 250);
}

/* ---------------- Shop System (ALL FREE) ---------------- */
function renderShop() {
  const container = document.getElementById('shopContainer'); container.innerHTML = '';
  const arr = SHOP[currentShopTab];
  
  arr.forEach(item => {
    let propOwned = currentShopTab === 'cubes' ? 'ownedCubes' : 
                     currentShopTab === 'boards' ? 'ownedBoards' : 
                     currentShopTab === 'effects' ? 'ownedEffects' : 'ownedSounds';
    let propEquip = currentShopTab === 'cubes' ? 'equippedCube' : 
                    currentShopTab === 'boards' ? 'equippedBoard' : 
                    currentShopTab === 'effects' ? 'equippedEffect' : 'equippedSound';
    
    const isOwned = save[propOwned].includes(item.id);
    const isEquipped = save[propEquip] === item.id;
    
    const el = document.createElement('div'); el.className = `shop-item ${isOwned?'owned':''} ${isEquipped?'equipped':''}`;
    el.innerHTML = `<div style="font-size:36px; margin-bottom:5px;">${item.icon}</div><h3>${item.name}</h3><div class="price">${isEquipped?'ΕΠΙΛΕΓΜΕΝΟ':isOwned?'ΕΠΙΛΟΓΗ':'Δωρεάν'}</div>`;
    
    el.onclick = () => {
      if (isOwned) { save[propEquip] = item.id; persist(); renderShop(); applyShopChanges(); }
      else {
        save[propOwned].push(item.id); save[propEquip] = item.id;
        persist(); updateHUD(); renderShop(); applyShopChanges(); toast("Αγόρασες το " + item.name + "!"); 
      }
    };
    container.appendChild(el);
  });
}
function applyShopChanges() {
  if(currentShopTab === 'boards') updateBoardColorsLive();
  if(currentShopTab === 'cubes') { matCache = {}; toast("Η εμφάνιση κύβου άλλαξε!"); }
  if(currentShopTab === 'sounds') toast("Ο ήχος άλλαξε!");
}

document.querySelectorAll('.shop-tab').forEach(btn => {
  btn.onclick = (e) => {
    document.querySelectorAll('.shop-tab').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active'); currentShopTab = e.target.dataset.tab; renderShop();
  }
});

/* ---------------- UI ---------------- */
function updateHUD(){
  document.getElementById("hudLevel").textContent = level+1; document.getElementById("hudScore").textContent = score;
  document.getElementById("hudCoins").textContent = coins; document.getElementById("missionText").textContent = LEVELS[Math.min(level, LEVELS.length-1)].text;
  document.getElementById("btnHammer").classList.toggle("armed", hammerMode);
}
let toastTimer; function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.style.opacity=1; clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.style.opacity=0, 1800); }

/* ---------------- main loop ---------------- */
let lastT = 0;
function loop(t){
  const dt = Math.min(0.05, (t-lastT)/1000); lastT = t; stepAnims(dt); updateParticles(dt);
  
  bgElements.forEach(el => {
    const u = el.userData;
    el.position.y += u.dirY * u.speed * dt * 3; 
    el.position.x += u.dirX * u.speed * dt * 3;

    if(u.wobbleSpeed) {
       el.position.x += Math.sin(t * 0.001 * u.wobbleSpeed + u.timeOffset) * u.wobbleAmp;
    }

    if(u.isStar) {
       const s = u.baseSize + Math.sin(t * 0.003 + u.timeOffset) * 0.4;
       el.scale.set(s, s, 1);
    }

    if(u.dirY < 0 && el.position.y < -20) { 
       el.position.y = 30 + Math.random()*10; 
       el.position.x = (Math.random()-0.5)*30; 
    } else if (u.dirY > 0 && el.position.y > 30) {
       el.position.y = -20 - Math.random()*10; 
       el.position.x = (Math.random()-0.5)*30;
    }
  });

  if(currentCube && !busy) currentCube.rotation.y = Math.sin(t*0.002)*0.12;
  
  // Εφέ κατά την πτώση (Φλόγα, Σπίθες, Καπνός)
  if(isLaunching && currentCube) {
    const eff = save.equippedEffect;
    if(eff === 'eff_flame') {
      const wp = new THREE.Vector3(); currentCube.getWorldPosition(wp);
      spawnParticle(wp.x, wp.y - 0.2, wp.z, 'flame');
    } else if (eff === 'eff_sparkle') {
      const wp = new THREE.Vector3(); currentCube.getWorldPosition(wp);
      spawnParticle(wp.x, wp.y - 0.2, wp.z, 'sparkle');
    } else if (eff === 'eff_smoke') {
      const wp = new THREE.Vector3(); currentCube.getWorldPosition(wp);
      spawnParticle(wp.x, wp.y - 0.2, wp.z, 'smoke');
    }
  }
  
  renderer.render(scene, camera); requestAnimationFrame(loop);
}

/* ---------------- boot ---------------- */
(async function(){
  document.getElementById('btnShop').onclick = () => { renderShop(); document.getElementById('shopModal').classList.remove('hidden'); };
  document.getElementById('btnCloseShop').onclick = () => { document.getElementById('shopModal').classList.add('hidden'); };
  document.addEventListener('pointerdown', ()=> { if(audioCtx.state === 'suspended') audioCtx.resume(); }, {once:true});

  await loadSave(); coins = save.coins; level = save.level; best = save.best;
  initThree(); newBoard(); updateHUD();
  
  const cvs = document.getElementById("game");
  cvs.addEventListener("pointermove", (e)=>{if(!busy)setAim((e.touches?e.touches[0].clientX:e.clientX)/innerWidth*2-1)});
  cvs.addEventListener("pointerdown", onTap);
  
  document.getElementById("btnNext").onclick = ()=>{ document.getElementById("winModal").classList.add("hidden"); level=Math.min(level+1,LEVELS.length-1); busy=false; newBoard(); };
  document.getElementById("btnRetry").onclick = ()=>{ document.getElementById("loseModal").classList.add("hidden"); busy=false; newBoard(); };
})();
</script>
