<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Drop 2048 · 3D</title>
<style>
  :root{
    --bg:#EADFC8; --panel:#8C6A4F; --panel-deep:#6E4F38; --cream:#F7EFDC;
    --ink:#4A3423; --accent:#F2A03D; --good:#7FA653; --coin:#F5C542;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{
    background:var(--bg);
    font-family:"Baloo 2","Comic Sans MS",system-ui,sans-serif;
    color:var(--ink); user-select:none; touch-action:none;
  }
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap');
  #game{position:fixed;inset:0;display:block}
  /* ---------- HUD ---------- */
  .hud{position:fixed;left:0;right:0;top:0;padding:10px 12px;display:flex;gap:8px;align-items:center;pointer-events:none;z-index:5}
  .chip{
    background:var(--panel-deep);color:var(--cream);border-radius:14px;padding:6px 12px;
    font-weight:800;font-size:15px;box-shadow:0 3px 0 rgba(0,0,0,.18);display:flex;align-items:center;gap:6px;
  }
  .chip small{font-weight:600;opacity:.75;font-size:11px;display:block;line-height:1}
  .chip .big{font-size:17px;line-height:1.1}
  .spacer{flex:1}
  #missionBar{
    position:fixed;top:58px;left:50%;transform:translateX(-50%);z-index:5;pointer-events:none;
    background:var(--cream);border:3px solid var(--panel-deep);color:var(--ink);
    border-radius:16px;padding:7px 16px;font-weight:700;font-size:14px;box-shadow:0 4px 0 rgba(0,0,0,.15);
    white-space:nowrap;
  }
  #missionBar b{color:#C2542F}
  /* ---------- power-ups ---------- */
  .powerbar{position:fixed;bottom:14px;left:0;right:0;display:flex;justify-content:center;gap:14px;z-index:5}
  .pbtn{
    pointer-events:auto;border:none;cursor:pointer;width:66px;height:66px;border-radius:18px;
    background:var(--good);box-shadow:0 4px 0 #5c7a3a;color:#fff;font-size:26px;line-height:1;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    font-family:inherit;transition:transform .08s;
  }
  .pbtn:active{transform:translateY(3px);box-shadow:0 1px 0 #5c7a3a}
  .pbtn .cost{font-size:11px;font-weight:800;background:rgba(0,0,0,.22);border-radius:8px;padding:1px 7px}
  .pbtn.armed{outline:4px solid var(--accent);background:#C2542F;box-shadow:0 4px 0 #8f3c20}
  .pbtn:disabled{filter:grayscale(.8);opacity:.6;cursor:default}
  /* ---------- modals ---------- */
  .overlay{position:fixed;inset:0;background:rgba(60,40,20,.55);display:flex;align-items:center;justify-content:center;z-index:20;backdrop-filter:blur(2px)}
  .card{
    background:var(--cream);border:4px solid var(--panel-deep);border-radius:26px;padding:26px 24px;
    width:min(340px,88vw);text-align:center;box-shadow:0 10px 0 rgba(0,0,0,.2);
    animation:pop .25s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes pop{from{transform:scale(.7);opacity:0}}
  .card h2{font-size:24px;margin-bottom:6px;font-weight:800}
  .card p{font-size:15px;margin-bottom:14px;line-height:1.45}
  .card .bear{font-size:52px;line-height:1;margin-bottom:8px}
  .btn{
    border:none;cursor:pointer;font-family:inherit;font-weight:800;font-size:17px;color:#fff;
    background:var(--accent);border-radius:16px;padding:12px 30px;box-shadow:0 4px 0 #b8742a;transition:transform .08s;
  }
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 #b8742a}
  .days{display:flex;gap:6px;justify-content:center;margin:12px 0 18px;flex-wrap:wrap}
  .day{
    width:40px;border-radius:10px;padding:5px 0;background:#E4D7BC;font-size:11px;font-weight:800;color:#8a7255;
    border:2px solid transparent;
  }
  .day .c{font-size:14px;color:var(--ink)}
  .day.today{background:var(--coin);border-color:#b8742a;color:#6b4a12;transform:scale(1.12)}
  .day.done{background:var(--good);color:#fff}
  .hidden{display:none!important}
  #toast{
    position:fixed;bottom:96px;left:50%;transform:translateX(-50%);z-index:15;pointer-events:none;
    background:var(--panel-deep);color:var(--cream);font-weight:700;font-size:14px;border-radius:14px;
    padding:8px 16px;opacity:0;transition:opacity .25s;white-space:nowrap;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div class="hud">
  <div class="chip"><div><small>ΕΠΙΠΕΔΟ</small><span class="big" id="hudLevel">1</span></div></div>
  <div class="chip"><div><small>ΣΚΟΡ</small><span class="big" id="hudScore">0</span></div></div>
  <div class="spacer"></div>
  <div class="chip">🪙 <span class="big" id="hudCoins">0</span></div>
</div>
<div id="missionBar">🎯 Αποστολή: <b id="missionText"></b></div>

<div class="powerbar">
  <button class="pbtn" id="btnHammer">🔨<span class="cost">15 🪙</span></button>
  <button class="pbtn" id="btnShuffle">🔄<span class="cost">5 🪙</span></button>
</div>

<div id="toast"></div>

<!-- Daily reward -->
<div class="overlay hidden" id="dailyModal">
  <div class="card">
    <div class="bear">🐻</div>
    <h2>Καθημερινό Δώρο!</h2>
    <p>Μέρα <b id="dailyDay">1</b> στη σειρά — συνέχισε το σερί για μεγαλύτερα δώρα!</p>
    <div class="days" id="dailyDays"></div>
    <button class="btn" id="btnClaim">Πάρε <span id="dailyAmt">10</span> 🪙</button>
  </div>
</div>

<!-- Level complete -->
<div class="overlay hidden" id="winModal">
  <div class="card">
    <div class="bear">🎉</div>
    <h2>Επίπεδο Ολοκληρώθηκε!</h2>
    <p id="winText"></p>
    <button class="btn" id="btnNext">Επόμενο επίπεδο ➜</button>
  </div>
</div>

<!-- Game over -->
<div class="overlay hidden" id="loseModal">
  <div class="card">
    <div class="bear">😵</div>
    <h2>Γέμισε το ταμπλό!</h2>
    <p id="loseText"></p>
    <button class="btn" id="btnRetry">Ξαναπροσπάθησε</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* =====================================================
   Drop 2048 · 3D  —  MVP prototype
   Μηχανισμός: εκτόξευση κύβων προς τα πάνω, συγχώνευση
   ίδιων αριθμών, levels/αποστολές, power-ups, daily rewards.
   ===================================================== */

const COLS = 5, ROWS = 7, CELL = 1.0, GAP = 0.12;
const BOARD_W = COLS * (CELL + GAP) - GAP;
const BOARD_H = ROWS * (CELL + GAP) - GAP;

const LEVELS = [
  { target: 64,   preset: 0, text: "Φτιάξε έναν κύβο 64" },
  { target: 128,  preset: 4, text: "Φτιάξε έναν κύβο 128" },
  { target: 256,  preset: 7, text: "Φτιάξε έναν κύβο 256" },
  { target: 512,  preset: 9, text: "Φτιάξε έναν κύβο 512" },
];

const TILE_COLORS = {
  2:"#E88A2E", 4:"#A3B03E", 8:"#B0489B", 16:"#4A90D9", 32:"#E85D5D",
  64:"#3FBFA8", 128:"#F2C038", 256:"#8A6FE8", 512:"#E8557F",
  1024:"#5CD65C", 2048:"#2F3B52"
};

/* ---------------- state ---------------- */
let scene, camera, renderer, boardGroup, raycaster, pointer;
let grid = [];            // grid[c][r] -> {value, mesh} | null   (r=0 = πάνω)
let currentCube = null;   // ο κύβος που ετοιμάζεται για ρίψη
let aimCol = 2, busy = false, hammerMode = false;
let score = 0, coins = 0, level = 0, best = 0;
let anims = [];
const matCache = {};

/* ---------------- persistent save ---------------- */
const SAVE_KEY = "drop2048-save";
let save = { coins: 30, level: 0, best: 0, lastDay: null, streak: 0 };

async function loadSave(){
  try{
    if(window.storage){
      const r = await window.storage.get(SAVE_KEY);
      if(r && r.value) save = Object.assign(save, JSON.parse(r.value));
    }
  }catch(e){ /* πρώτη φορά — δεν υπάρχει αποθήκευση ακόμα */ }
}
async function persist(){
  try{
    if(window.storage) await window.storage.set(SAVE_KEY, JSON.stringify(save));
  }catch(e){ console.warn("save failed", e); }
}

/* ---------------- three.js setup ---------------- */
function initThree(){
  const canvas = document.getElementById("game");
  renderer = new THREE.WebGLRenderer({canvas, antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  scene = new THREE.Scene();
  scene.background = new THREE.Color("#EADFC8");
  scene.fog = new THREE.Fog("#EADFC8", 18, 30);

  camera = new THREE.PerspectiveCamera(42, innerWidth/innerHeight, 0.1, 60);

  const amb = new THREE.AmbientLight(0xfff2dd, 0.75);
  scene.add(amb);
  const sun = new THREE.DirectionalLight(0xffffff, 0.85);
  sun.position.set(4, 8, 7);
  sun.castShadow = true;
  sun.shadow.mapSize.set(1024,1024);
  sun.shadow.camera.left=-6; sun.shadow.camera.right=6;
  sun.shadow.camera.top=8; sun.shadow.camera.bottom=-8;
  scene.add(sun);

  boardGroup = new THREE.Group();
  boardGroup.rotation.x = -0.10;           // ελαφριά 3D κλίση
  scene.add(boardGroup);

  // πλάτη ταμπλό
  const back = new THREE.Mesh(
    new THREE.BoxGeometry(BOARD_W + 0.7, BOARD_H + 0.7, 0.3),
    new THREE.MeshLambertMaterial({color:"#C9B18C"})
  );
  back.position.z = -0.65;
  back.receiveShadow = true;
  boardGroup.add(back);

  // κελιά
  const cellGeo = new THREE.BoxGeometry(CELL*0.96, CELL*0.96, 0.12);
  const cellMat = new THREE.MeshLambertMaterial({color:"#EFE6D2"});
  for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++){
    const m = new THREE.Mesh(cellGeo, cellMat);
    const p = cellPos(c,r);
    m.position.set(p.x, p.y, -0.42);
    m.receiveShadow = true;
    boardGroup.add(m);
  }

  raycaster = new THREE.Raycaster();
  pointer = new THREE.Vector2();

  onResize();
  addEventListener("resize", onResize);
  requestAnimationFrame(loop);
}

function onResize(){
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth/innerHeight;
  // τοποθέτηση κάμερας ώστε να χωράει όλο το ταμπλό + launcher
  const fit = Math.max(BOARD_H + 3.6, (BOARD_W + 1.4) / camera.aspect / Math.tan(THREE.MathUtils.degToRad(21)) * Math.tan(THREE.MathUtils.degToRad(21)));
  const dist = (BOARD_H/2 + 2.1) / Math.tan(THREE.MathUtils.degToRad(camera.fov/2));
  const distW = (BOARD_W/2 + 0.8) / (Math.tan(THREE.MathUtils.degToRad(camera.fov/2)) * camera.aspect);
  camera.position.set(0, -1.0, Math.max(dist, distW));
  camera.lookAt(0, -0.9, 0);
  camera.updateProjectionMatrix();
}

function cellPos(c, r){
  return {
    x: -BOARD_W/2 + CELL/2 + c*(CELL+GAP),
    y:  BOARD_H/2 - CELL/2 - r*(CELL+GAP)   // r=0 πάνω
  };
}
const launchY = -BOARD_H/2 - 1.15;

/* ---------------- cube visuals ---------------- */
function numberTexture(value){
  const cv = document.createElement("canvas");
  cv.width = cv.height = 128;
  const g = cv.getContext("2d");
  const col = TILE_COLORS[value] || "#333";
  // στρογγυλεμένο "καπάκι"
  g.fillStyle = col;
  roundRect(g, 4, 4, 120, 120, 22); g.fill();
  const grad = g.createLinearGradient(0,0,0,128);
  grad.addColorStop(0,"rgba(255,255,255,.30)");
  grad.addColorStop(0.4,"rgba(255,255,255,0)");
  grad.addColorStop(1,"rgba(0,0,0,.18)");
  g.fillStyle = grad;
  roundRect(g, 4, 4, 120, 120, 22); g.fill();
  g.fillStyle = "#fff";
  g.font = `800 ${value>=1024?42:value>=128?50:60}px 'Baloo 2', sans-serif`;
  g.textAlign="center"; g.textBaseline="middle";
  g.shadowColor="rgba(0,0,0,.25)"; g.shadowBlur=4; g.shadowOffsetY=3;
  g.fillText(value, 64, 68);
  const t = new THREE.CanvasTexture(cv);
  t.anisotropy = 4;
  return t;
}
function roundRect(g,x,y,w,h,r){
  g.beginPath();
  g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r);
  g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath();
}
function cubeMaterial(value){
  if(matCache[value]) return matCache[value];
  const tex = numberTexture(value);
  const side = new THREE.MeshLambertMaterial({color: TILE_COLORS[value] || "#333"});
  const face = new THREE.MeshLambertMaterial({map: tex});
  matCache[value] = [side, side, side, side, face, side]; // z+ πρόσοψη
  return matCache[value];
}
const cubeGeo = new THREE.BoxGeometry(CELL*0.92, CELL*0.92, CELL*0.92);
function makeCube(value){
  const m = new THREE.Mesh(cubeGeo, cubeMaterial(value));
  m.castShadow = true;
  m.userData.value = value;
  return m;
}

/* ---------------- tweens ---------------- */
function tween(obj, to, dur, ease, done){
  const from = {};
  for(const k in to) from[k] = obj[k];
  anims.push({obj, from, to, dur, t:0, ease: ease||easeOut, done});
}
const easeOut = t => 1-Math.pow(1-t,3);
const easeBack = t => 1 + 2.2*Math.pow(t-1,3) + 1.2*Math.pow(t-1,2);
function stepAnims(dt){
  for(let i=anims.length-1;i>=0;i--){
    const a = anims[i];
    a.t += dt/a.dur;
    const k = a.t>=1 ? 1 : a.ease(a.t);
    for(const p in a.to) a.obj[p] = a.from[p] + (a.to[p]-a.from[p])*k;
    if(a.t>=1){ anims.splice(i,1); a.done && a.done(); }
  }
}

/* ---------------- gameplay ---------------- */
function newBoard(){
  // καθάρισμα
  for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++){
    if(grid[c] && grid[c][r]) boardGroup.remove(grid[c][r].mesh);
  }
  grid = Array.from({length:COLS},()=>Array(ROWS).fill(null));
  score = 0; updateHUD();

  // προ-τοποθετημένα εμπόδια στα μεγαλύτερα levels
  const preset = LEVELS[Math.min(level, LEVELS.length-1)].preset;
  const vals = [2,4,8,16];
  for(let i=0;i<preset;i++){
    const c = Math.floor(Math.random()*COLS);
    const r = colHeight(c);
    if(r < 3){
      placeCube(c, r, vals[Math.floor(Math.random()*vals.length)], true);
    }
  }
  spawnCurrent();
}

function colHeight(c){
  let h=0; while(h<ROWS && grid[c][h]) h++;
  return h;
}

function placeCube(c, r, value, instant){
  const cube = makeCube(value);
  const p = cellPos(c,r);
  cube.position.set(p.x, p.y, 0.1);
  boardGroup.add(cube);
  grid[c][r] = {value, mesh:cube};
  if(!instant){
    cube.scale.set(.4,.4,.4);
    tween(cube.scale, {x:1,y:1,z:1}, 0.22, easeBack);
  }
  return grid[c][r];
}

function randomDropValue(){
  let maxOnBoard = 4;
  for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++)
    if(grid[c][r]) maxOnBoard = Math.max(maxOnBoard, grid[c][r].value);
  const cap = Math.min(32, Math.max(4, maxOnBoard/2));
  const pool = [];
  for(let v=2; v<=cap; v*=2) pool.push(v, v, v===2?v:0);
  const vals = pool.filter(Boolean);
  return vals[Math.floor(Math.random()*vals.length)];
}

function spawnCurrent(){
  const v = randomDropValue();
  currentCube = makeCube(v);
  const p = cellPos(aimCol, 0);
  currentCube.position.set(p.x, launchY, 0.1);
  currentCube.scale.set(.3,.3,.3);
  boardGroup.add(currentCube);
  tween(currentCube.scale, {x:1,y:1,z:1}, 0.2, easeBack);
}

function setAim(c){
  aimCol = Math.max(0, Math.min(COLS-1, c));
  if(currentCube && !busy){
    tween(currentCube.position, {x: cellPos(aimCol,0).x}, 0.09);
  }
}

function launch(){
  if(busy || !currentCube) return;
  const c = aimCol;
  const h = colHeight(c);
  if(h >= ROWS){ gameOver(); return; }
  busy = true;
  const targetR = h;
  const p = cellPos(c, targetR);
  const cube = currentCube;
  currentCube = null;
  const dist = Math.abs(cube.position.y - p.y);
  tween(cube.position, {x:p.x, y:p.y}, Math.max(0.13, dist*0.045), easeOut, ()=>{
    boardGroup.remove(cube);
    const cell = placeCube(c, targetR, cube.userData.value, true);
    // μικρό squash
    cell.mesh.scale.set(1.15,0.85,1.15);
    tween(cell.mesh.scale, {x:1,y:1,z:1}, 0.18, easeBack);
    resolveMerges([{c, r:targetR}]).then(()=>{
      if(checkWin()) return;
      if(colFull()){ gameOver(); return; }
      busy = false;
      spawnCurrent();
      setAim(aimCol);
    });
  });
}

function colFull(){
  let full = 0;
  for(let c=0;c<COLS;c++) if(colHeight(c) >= ROWS) full++;
  return full >= COLS;
}

function neighbors(c,r){
  const n = [];
  if(c>0) n.push({c:c-1,r});
  if(c<COLS-1) n.push({c:c+1,r});
  if(r>0) n.push({c,r:r-1});
  if(r<ROWS-1) n.push({c,r:r+1});
  return n;
}

async function resolveMerges(queue){
  while(queue.length){
    const {c,r} = queue.shift();
    const cell = grid[c][r];
    if(!cell) continue;
    const same = neighbors(c,r).filter(n => grid[n.c][n.r] && grid[n.c][n.r].value === cell.value);
    if(!same.length) continue;

    const newVal = cell.value * Math.pow(2, same.length);
    score += newVal;
    coins += 1; save.coins = coins;
    updateHUD();

    // animation: οι γείτονες "τρέχουν" στον κύβο-στόχο
    await new Promise(res=>{
      let left = same.length;
      const tp = cellPos(c,r);
      same.forEach(n=>{
        const m = grid[n.c][n.r].mesh;
        grid[n.c][n.r] = null;
        tween(m.position, {x:tp.x, y:tp.y}, 0.14, easeOut, ()=>{
          boardGroup.remove(m);
          if(--left===0) res();
        });
        tween(m.scale, {x:.5,y:.5,z:.5}, 0.14);
      });
    });

    // αναβάθμιση κύβου
    boardGroup.remove(cell.mesh);
    grid[c][r] = null;
    const up = placeCube(c, r, newVal);
    up.mesh.scale.set(1.35,1.35,1.35);
    tween(up.mesh.scale, {x:1,y:1,z:1}, 0.22, easeBack);

    // βαρύτητα προς τα πάνω + νέοι έλεγχοι
    const moved = applyGravity();
    queue.push({c,r}, ...moved);
    await wait(120);
  }
  persist();
}

function applyGravity(){
  const moved = [];
  for(let c=0;c<COLS;c++){
    let write = 0;
    for(let r=0;r<ROWS;r++){
      if(grid[c][r]){
        if(r !== write){
          grid[c][write] = grid[c][r];
          grid[c][r] = null;
          const p = cellPos(c, write);
          tween(grid[c][write].mesh.position, {y:p.y}, 0.15, easeOut);
          moved.push({c, r:write});
        }
        write++;
      }
    }
  }
  return moved;
}

const wait = ms => new Promise(r=>setTimeout(r,ms));

/* ---------------- levels / win / lose ---------------- */
function checkWin(){
  const target = LEVELS[Math.min(level, LEVELS.length-1)].target;
  for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++){
    if(grid[c][r] && grid[c][r].value >= target){
      busy = true;
      coins += 25; save.coins = coins;
      best = Math.max(best, score); save.best = best;
      save.level = Math.min(level+1, LEVELS.length-1);
      persist(); updateHUD();
      document.getElementById("winText").innerHTML =
        `Έφτιαξες τον κύβο <b>${target}</b>!<br>Κέρδισες <b>+25 🪙</b>`;
      document.getElementById("winModal").classList.remove("hidden");
      return true;
    }
  }
  return false;
}
function gameOver(){
  busy = true;
  best = Math.max(best, score); save.best = best; persist();
  document.getElementById("loseText").innerHTML =
    `Σκορ: <b>${score}</b> · Ρεκόρ: <b>${best}</b>`;
  document.getElementById("loseModal").classList.remove("hidden");
}

/* ---------------- power-ups ---------------- */
const HAMMER_COST = 15, SHUFFLE_COST = 5;
function tryHammer(){
  if(busy) return;
  if(hammerMode){ hammerMode=false; updateHUD(); return; }
  if(coins < HAMMER_COST){ toast("Δεν έχεις αρκετά 🪙"); return; }
  hammerMode = true; updateHUD();
  toast("🔨 Πάτησε έναν κύβο για να τον σπάσεις");
}
function hammerHit(c,r){
  if(!grid[c][r]) return;
  coins -= HAMMER_COST; save.coins = coins;
  hammerMode = false;
  const m = grid[c][r].mesh;
  grid[c][r] = null;
  tween(m.scale, {x:.01,y:.01,z:.01}, 0.18, easeOut, ()=> boardGroup.remove(m));
  busy = true;
  wait(180).then(()=>{
    const moved = applyGravity();
    resolveMerges(moved).then(()=>{ busy=false; updateHUD(); persist(); });
  });
}
function tryShuffle(){
  if(busy || !currentCube) return;
  if(coins < SHUFFLE_COST){ toast("Δεν έχεις αρκετά 🪙"); return; }
  coins -= SHUFFLE_COST; save.coins = coins; persist();
  boardGroup.remove(currentCube);
  currentCube = null;
  spawnCurrent(); setAim(aimCol); updateHUD();
}

/* ---------------- daily reward ---------------- */
function todayStr(){ return new Date().toISOString().slice(0,10); }
function showDailyIfDue(){
  const today = todayStr();
  if(save.lastDay === today) return;
  const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
  save.streak = (save.lastDay === yesterday) ? Math.min(save.streak+1, 7) : 1;
  const amt = save.streak * 10;
  document.getElementById("dailyDay").textContent = save.streak;
  document.getElementById("dailyAmt").textContent = amt;
  const wrap = document.getElementById("dailyDays");
  wrap.innerHTML = "";
  for(let d=1; d<=7; d++){
    const el = document.createElement("div");
    el.className = "day" + (d<save.streak?" done":"") + (d===save.streak?" today":"");
    el.innerHTML = `Day ${d}<div class="c">${d*10}🪙</div>`;
    wrap.appendChild(el);
  }
  document.getElementById("btnClaim").onclick = ()=>{
    coins += amt; save.coins = coins;
    save.lastDay = today;
    persist(); updateHUD();
    document.getElementById("dailyModal").classList.add("hidden");
  };
  document.getElementById("dailyModal").classList.remove("hidden");
}

/* ---------------- UI ---------------- */
function updateHUD(){
  document.getElementById("hudLevel").textContent = level+1;
  document.getElementById("hudScore").textContent = score;
  document.getElementById("hudCoins").textContent = coins;
  document.getElementById("missionText").textContent =
    LEVELS[Math.min(level, LEVELS.length-1)].text;
  document.getElementById("btnHammer").classList.toggle("armed", hammerMode);
}
let toastTimer;
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.opacity = 1;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.style.opacity = 0, 1800);
}

/* ---------------- input ---------------- */
function colFromEvent(e){
  const x = (e.touches ? e.touches[0].clientX : e.clientX) / innerWidth * 2 - 1;
  const y = -((e.touches ? e.touches[0].clientY : e.clientY) / innerHeight * 2 - 1);
  pointer.set(x,y); raycaster.setFromCamera(pointer, camera);
  // τομή με το επίπεδο του ταμπλό (z≈0 στο boardGroup)
  const plane = new THREE.Plane(new THREE.Vector3(0,0,1).applyQuaternion(boardGroup.quaternion), 0);
  const hit = new THREE.Vector3();
  raycaster.ray.intersectPlane(plane, hit);
  boardGroup.worldToLocal(hit);
  const c = Math.round((hit.x + BOARD_W/2 - CELL/2) / (CELL+GAP));
  const r = Math.round((BOARD_H/2 - CELL/2 - hit.y) / (CELL+GAP));
  return {c: Math.max(0,Math.min(COLS-1,c)), r, rawY: hit.y};
}
function onMove(e){
  if(busy) return;
  const {c} = colFromEvent(e);
  setAim(c);
}
function onTap(e){
  if(document.querySelector(".overlay:not(.hidden)")) return;
  const {c, r} = colFromEvent(e);
  if(hammerMode){
    if(r>=0 && r<ROWS && grid[c][r]) hammerHit(c,r);
    else { hammerMode=false; updateHUD(); }
    return;
  }
  setAim(c);
  launch();
}

/* ---------------- main loop ---------------- */
let lastT = 0;
function loop(t){
  const dt = Math.min(0.05, (t-lastT)/1000); lastT = t;
  stepAnims(dt);
  if(currentCube && !busy) currentCube.rotation.y = Math.sin(t*0.002)*0.12;
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}

/* ---------------- boot ---------------- */
(async function(){
  await loadSave();
  coins = save.coins; level = save.level; best = save.best;
  initThree();
  newBoard();
  updateHUD();
  showDailyIfDue();

  const canvas = document.getElementById("game");
  canvas.addEventListener("pointermove", onMove);
  canvas.addEventListener("pointerdown", onTap);
  document.getElementById("btnHammer").addEventListener("click", tryHammer);
  document.getElementById("btnShuffle").addEventListener("click", tryShuffle);
  document.getElementById("btnNext").addEventListener("click", ()=>{
    document.getElementById("winModal").classList.add("hidden");
    level = Math.min(level+1, LEVELS.length-1);
    hammerMode = false; busy = false;
    newBoard(); updateHUD();
  });
  document.getElementById("btnRetry").addEventListener("click", ()=>{
    document.getElementById("loseModal").classList.add("hidden");
    hammerMode = false; busy = false;
    newBoard(); updateHUD();
  });
})();
</script>
</body>
