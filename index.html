<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FranklyGames">
    <meta name="theme-color" content="#0a0e27">
    <title>FranklyGames - Board Adventure</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: linear-gradient(135deg, #0a0e27 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        .game-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .game-container {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #0f1f3f 0%, #1a3a5c 50%, #0d1e35 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        /* Decorations */
        .decoration {
            position: absolute;
            filter: drop-shadow(0 6px 10px rgba(0, 0, 0, 0.4));
            z-index: 15;
            pointer-events: none;
        }

        .decoration.rocket {
            top: 12%;
            left: 4%;
            font-size: 40px;
            animation: rocket-float 4s ease-in-out infinite;
            transform: rotate(-25deg);
        }

        .decoration.cloud {
            top: 8%;
            right: 4%;
            font-size: 50px;
            animation: cloud-float 5s ease-in-out infinite;
        }

        .decoration.crown {
            bottom: 18%;
            right: 4%;
            font-size: 40px;
            animation: crown-bounce 3s ease-in-out infinite;
        }

        .decoration.star1 {
            top: 20%;
            right: 15%;
            font-size: 30px;
            animation: star-twinkle 2s ease-in-out infinite;
        }

        .decoration.star2 {
            bottom: 25%;
            left: 10%;
            font-size: 25px;
            animation: star-twinkle 3s ease-in-out infinite 0.5s;
        }

        @keyframes rocket-float {
            0%, 100% { transform: translateY(0) rotate(-25deg); }
            50% { transform: translateY(-15px) rotate(-20deg); }
        }

        @keyframes cloud-float {
            0%, 100% { transform: translateX(0) translateY(0); }
            50% { transform: translateX(-10px) translateY(-8px); }
        }

        @keyframes crown-bounce {
            0%, 100% { transform: translateY(0) rotateZ(0deg); }
            50% { transform: translateY(-12px) rotateZ(5deg); }
        }

        @keyframes star-twinkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        /* Board Area */
        .board-area {
            flex: 1;
            width: 100%;
            position: relative;
            overflow: hidden;
            z-index: 20;
            margin-bottom: 100px;
        }

        .world {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: transform 0.3s cubic-bezier(0.22, 0.61, 0.36, 1);
            will-change: transform;
        }

        /* Tiles – 3D κύβοι */
        .tile {
            position: absolute;
            width: 80px;
            height: 80px;
            z-index: 5;
            transition: all 0.2s ease;
            perspective: 1000px;
        }

        .tile-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(20deg) rotateZ(45deg);
            transition: all 0.2s ease;
        }

        .tile:hover .tile-inner {
            transform: rotateX(20deg) rotateZ(45deg) scale(1.1);
        }

        .tile-top {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            border: 3px solid;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            box-shadow: 
                -10px 10px 20px rgba(0, 0, 0, 0.4),
                inset 0 1px 2px rgba(255, 255, 255, 0.2),
                0 0 20px rgba(0, 0, 0, 0.2);
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
        }

        .tile-side {
            position: absolute;
            width: 100%;
            height: 50%;
            border: 2px solid;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
            opacity: 0.8;
        }

        .tile-side.left {
            top: 50%;
            left: -50%;
            transform: rotateY(90deg);
            border-radius: 0 0 6px 0;
        }

        .tile-side.right {
            top: 50%;
            right: -50%;
            transform: rotateY(-90deg);
            border-radius: 0 0 0 6px;
        }

        /* Tile types */
        .tile.points .tile-top {
            background: linear-gradient(135deg, #42a5f5, #1565c0);
            border-color: #64b5f6;
        }

        .tile.points .tile-side {
            background: linear-gradient(90deg, #1565c0, #0d47a1);
            border-color: #1565c0;
        }

        .tile.stars .tile-top {
            background: linear-gradient(135deg, #f06292, #c2185b);
            border-color: #f48fb1;
        }

        .tile.stars .tile-side {
            background: linear-gradient(90deg, #c2185b, #880e4f);
            border-color: #c2185b;
        }

        .tile.rolls .tile-top {
            background: linear-gradient(135deg, #66bb6a, #2e7d32);
            border-color: #81c784;
        }

        .tile.rolls .tile-side {
            background: linear-gradient(90deg, #2e7d32, #1b5e20);
            border-color: #2e7d32;
        }

        .tile.empty .tile-top {
            background: linear-gradient(135deg, #455a64, #263238);
            border-color: #546e7a;
        }

        .tile.empty .tile-side {
            background: linear-gradient(90deg, #263238, #1a2327);
            border-color: #263238;
        }

        /* Mascot AZIRAM - Cyber Slime Style */
        .player {
            position: absolute;
            width: 60px;
            height: 70px;
            z-index: 60;
            filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.6));
            pointer-events: none;
        }

        .aziram-mascot {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* Slime Body with Jelly Animation */
        .aziram-body {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 85%;
            border-radius: 50% 50% 45% 45% / 60% 60% 40% 40%;
            animation: aziram-jelly 2s ease-in-out infinite;
            box-shadow: inset 0 -6px 12px rgba(0,0,0,0.3), inset 0 4px 8px rgba(255,255,255,0.4);
        }

        /* Eyes & Face */
        .aziram-face {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translateX(-50%);
            width: 36px;
            height: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .aziram-eye {
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .aziram-eye::after {
            content: '';
            width: 4px;
            height: 4px;
            background: #000;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
        }

        .aziram-blush {
            position: absolute;
            bottom: -4px;
            width: 6px;
            height: 3px;
            background: rgba(255, 105, 180, 0.6);
            border-radius: 50%;
        }
        .aziram-blush.left { left: -2px; }
        .aziram-blush.right { right: -2px; }

        /* Dynamic Color Themes for Aziram */
        .player.color-blue .aziram-body { background: linear-gradient(135deg, #00d4ff, #0066ff); border: 2px solid #00f0ff; }
        .player.color-gold .aziram-body { background: linear-gradient(135deg, #ffd700, #ff8c00); border: 2px solid #ffea00; }
        .player.color-purple .aziram-body { background: linear-gradient(135deg, #da70d6, #8a2be2); border: 2px solid #f000ff; }
        .player.color-red .aziram-body { background: linear-gradient(135deg, #ff4d4d, #cc0000); border: 2px solid #ff8080; }
        .player.color-green .aziram-body { background: linear-gradient(135deg, #52ff52, #009900); border: 2px solid #b3ffb3; }

        @keyframes aziram-jelly {
            0%, 100% { transform: scaleX(1) scaleY(1); }
            50% { transform: scaleX(1.08) scaleY(0.92); }
        }

        .player.hop {
            animation: avatar-hop 0.4s ease-in-out !important;
        }

        @keyframes avatar-hop {
            0% { transform: scale(1) translateY(0); }
            40% { transform: scale(1.15) translateY(-25px); }
            100% { transform: scale(1) translateY(0); }
        }

        /* Dice Popup */
        .dice-popup {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.95), rgba(20, 20, 40, 0.95));
            border: 4px solid #ffd54f;
            border-radius: 16px;
            padding: 14px 20px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.8);
        }

        .dice-popup.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .dice-display {
            font-size: 60px;
            font-weight: 900;
            animation: dice-roll 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            line-height: 1;
        }

        @keyframes dice-roll {
            0% { transform: rotateY(0deg) rotateX(0deg) scale(0.5); }
            50% { transform: rotateY(180deg) rotateX(180deg) scale(1.1); }
            100% { transform: rotateY(360deg) rotateX(0deg) scale(1); }
        }

        /* Toast Notification */
        .toast-notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
            padding: 12px 24px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 16px;
            z-index: 300;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        .toast-notification.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Particles */
        .particle {
            position: absolute;
            pointer-events: none;
            font-size: 18px;
            font-weight: 900;
            z-index: 100;
            animation: particle-burst 0.8s ease-out forwards;
        }

        @keyframes particle-burst {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
        }

        /* Bottom Bar */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 12px;
            gap: 12px;
            z-index: 100;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.9));
            backdrop-filter: blur(10px);
            border-top: 2px solid rgba(0, 212, 255, 0.3);
            height: auto;
            min-height: 80px;
        }

        .roll-btn {
            background: linear-gradient(135deg, #ff4081 0%, #c51162 100%);
            border: 2px solid #ff69b4;
            border-radius: 35px;
            padding: 14px 40px;
            color: white;
            font-size: 20px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 0 #880e4f, 0 12px 25px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            transition: all 0.1s;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            letter-spacing: 2px;
            -webkit-appearance: none;
            appearance: none;
        }

        .roll-btn:active {
            transform: translateY(4px);
            box-shadow: 0 3px 0 #880e4f, 0 6px 12px rgba(0, 0, 0, 0.4);
        }

        .roll-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Sound Toggle */
        .sound-toggle {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.6), rgba(20, 20, 40, 0.8));
            border: 2px solid #00d4ff;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 300;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(0, 212, 255, 0.3);
            -webkit-appearance: none;
            appearance: none;
        }

        /* Modals */
        .modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 500;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            border-radius: 16px;
        }

        .modal.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 3px solid #00d4ff;
            border-radius: 20px;
            padding: 22px 18px;
            text-align: center;
            color: #fff;
            max-width: 320px;
            width: 90%;
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.5);
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(-40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-title {
            font-size: 22px;
            font-weight: 900;
            margin-bottom: 14px;
            color: #ffeb3b;
        }

        .modal-text {
            font-size: 14px;
            margin-bottom: 16px;
            line-height: 1.5;
            color: #e8e8ed;
        }

        .modal-buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .modal-btn {
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            border: none;
            border-radius: 20px;
            padding: 12px 20px;
            color: #000;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            min-width: 110px;
            font-size: 14px;
            -webkit-appearance: none;
            appearance: none;
        }

        .modal-btn:hover {
            transform: scale(1.05);
        }

        .modal-btn.secondary {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: #fff;
        }

        .modal-btn.claim-btn {
            background: linear-gradient(135deg, #66bb6a, #2e7d32);
            color: #fff;
        }

        .modal-btn.double-btn {
            background: linear-gradient(135deg, #ffa726, #e65100);
            color: #fff;
        }

        @media (max-width: 480px) {
            .board-area {
                margin-bottom: 110px;
            }
            .tile { width: 65px; height: 65px; }
            .tile-top { font-size: 11px; }
            .player { width: 50px; height: 60px; }
            .roll-btn {
                font-size: 18px;
                padding: 12px 32px;
            }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="game-container">
            <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</button>

            <div class="decoration rocket">🚀</div>
            <div class="decoration cloud">☁️</div>
            <div class="decoration crown">👑</div>
            <div class="decoration star1">✨</div>
            <div class="decoration star2">✨</div>

            <div class="board-area" id="boardArea">
                <div class="world" id="world"></div>
                
                <div class="player" id="player">
                    <div class="aziram-mascot">
                        <div class="aziram-body">
                            <div class="aziram-face">
                                <div class="aziram-eye"><div class="aziram-blush left"></div></div>
                                <div class="aziram-eye"><div class="aziram-blush right"></div></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="dice-popup" id="dicePopup">
                    <div class="dice-display" id="diceDisplay">🎲</div>
                </div>
            </div>

            <div class="bottom-bar">
                <button class="roll-btn" id="rollBtn" onclick="rollDice()">🎲 ROLL</button>
            </div>

            <div class="modal" id="adModal">
                <div class="modal-content">
                    <div class="modal-title">📢 Out of Rolls</div>
                    <div class="modal-text">Watch an ad to get +3 Rolls</div>
                    <div class="modal-buttons">
                        <button class="modal-btn claim-btn" onclick="requestAd()">Watch Ad</button>
                        <button class="modal-btn secondary" onclick="closeModal('adModal')">Close</button>
                    </div>
                </div>
            </div>

            <div class="modal" id="dailyRewardsModal">
                <div class="modal-content">
                    <div class="modal-title">🎁 FranklyGames Bonuses</div>
                    <div class="modal-text">Claim your daily bonuses!</div>
                    <div class="modal-buttons">
                        <button class="modal-btn claim-btn" onclick="claimDaily('rolls')">+5 Rolls</button>
                        <button class="modal-btn claim-btn" onclick="claimDaily('stars')">+5 Stars</button>
                        <button class="modal-btn claim-btn" onclick="claimDaily('points')">+5 Points</button>
                    </div>
                    <div class="modal-buttons"><button class="modal-btn secondary" onclick="closeModal('dailyRewardsModal')">Close</button></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        'use strict';

        // Parent communication
        function sendToParent(msg) { window.parent.postMessage(msg, '*'); }

        // Listen for state & ad callbacks
        window.addEventListener('message', (event) => {
            const data = event.data;
            if (!data || !data.type) return;

            switch (data.type) {
                case 'setState':
                    gameState.stars = data.stars || 0;
                    gameState.points = data.points || 0;
                    gameState.spins = data.spins || 0;
                    if (gameState.spins === 0 && !localStorage.getItem('frankly_initial_rolls_given')) {
                        sendToParent({ type: 'initRolls' });
                        localStorage.setItem('frankly_initial_rolls_given', 'true');
                    }
                    break;
                case 'adWatched':
                    if (pendingReward) {
                        const r = pendingReward;
                        const doubled = r.value * 2;
                        if (r.type === 'points') sendToParent({ type:'addPoints', value: doubled });
                        else if (r.type === 'stars') sendToParent({ type:'addStars', value: doubled });
                        else if (r.type === 'rolls') { gameState.spins += doubled; sendToParent({ type:'addStars', value:0 }); }
                        showToast(`+${doubled} ${r.icon}`, r.type);
                        pendingReward = null;
                        gameState.totalScore++;
                        gameState.difficulty = Math.floor(gameState.totalScore/50)+1;
                    }
                    break;
                case 'adFailed':
                    if (pendingReward) { showToast('Ad cancelled', 'none'); pendingReward = null; }
                    break;
                case 'dailyClaimed':
                    break;
            }
        });

        // Sound Manager
        let audioCtx = null, soundEnabled = true;
        function initAudio() { if(!audioCtx) try { audioCtx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){} }
        function playTone(f,d,t='sine',v=0.3) { 
            if(!soundEnabled||!audioCtx) return; 
            try { 
                const ctx=audioCtx, o=ctx.createOscillator(), g=ctx.createGain(); 
                o.type=t; o.frequency.value=f; 
                g.gain.setValueAtTime(v, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime+d);
                o.connect(g); g.connect(ctx.destination);
                o.start(ctx.currentTime); o.stop(ctx.currentTime+d);
            } catch(e){}
        }
        function diceSound() { playTone(800,0.1); setTimeout(()=>playTone(600,0.1),50); setTimeout(()=>playTone(1000,0.2),100); }
        function rewardSound(type) { if(type==='points') playTone(1200,0.15); else if(type==='stars') playTone(1000,0.1); else playTone(1400,0.15); }
        function moveSound() { playTone(700,0.06,'sine',0.12); }
        function failSound() { playTone(300,0.25); }
        window.toggleSound = () => { soundEnabled=!soundEnabled; document.getElementById('soundToggle').textContent = soundEnabled ? '🔊' : '🔇'; };

        // DOM
        const world = document.getElementById('world'), player = document.getElementById('player'), boardArea = document.getElementById('boardArea');
        const dicePopup = document.getElementById('dicePopup'), diceDisplay = document.getElementById('diceDisplay');
        const rollBtn = document.getElementById('rollBtn');

        let gameState = { stars:0, points:0, spins:0, totalScore:0, difficulty:1 };
        let isRolling = false, pendingReward = null;
        const tileSize = 80, gap = 16, step = tileSize + gap;
        let directions = [], pathPoints = [], currentIdx = 0;

        function getRewardType(idx) {
            if (idx <= 0) return { type:'empty', icon:'', label:'' };
            if (idx % 4 === 0) return { type:'rolls', icon:'🎰', label:'+5 Rolls', value:5 };
            if (idx % 3 === 0) return { type:'stars', icon:'🌟', label:'+5 Stars', value:5 };
            if (idx % 2 === 0) return { type:'points', icon:'⭐', label:'+5 Points', value:5 };
            return { type:'empty', icon:'', label:'' };
        }

        function getPlayerScreenPos() { 
            const r = boardArea.getBoundingClientRect(); 
            return { x: r.width/2, y: r.height*0.5 };
        }

        function generateDirectionPattern() { 
            while(directions.length < pathPoints.length+10) { 
                const l=directions.length; 
                const s=Math.floor(l/3)%4; 
                if(s===0||s===2) directions.push('up'); 
                else directions.push(s===1?'right':'left'); 
            } 
        }

        function buildPath() { 
            if(pathPoints.length===0) pathPoints.push({x:0,y:0}); 
            generateDirectionPattern(); 
            while(pathPoints.length < currentIdx+15) { 
                const last=pathPoints[pathPoints.length-1]; 
                const dir=directions[pathPoints.length-1];
                let np={...last};
                if(dir==='up') np.y--;
                else if(dir==='down') np.y++;
                else if(dir==='left') np.x--;
                else np.x++;
                pathPoints.push(np);
            } 
        }

        function renderAllTiles() {
            world.innerHTML=''; 
            const sp=getPlayerScreenPos(); 
            const pp=pathPoints[currentIdx];
            const start=Math.max(0,currentIdx-6), end=Math.min(pathPoints.length-1,currentIdx+14);
            for(let i=start;i<=end;i++) {
                const pt=pathPoints[i]; 
                const rew=getRewardType(i); 
                const tile = document.createElement('div');
                tile.className=`tile ${rew.type}`;
                tile.innerHTML=`<div class="tile-inner"><div class="tile-top">${rew.label}</div><div class="tile-side left"></div><div class="tile-side right"></div></div>`;
                const rx=(pt.x-pp.x)*step, ry=(pt.y-pp.y)*step;
                tile.style.left=(sp.x+rx-tileSize/2)+'px'; 
                tile.style.top=(sp.y+ry-tileSize/2)+'px';
                world.appendChild(tile);
            }
            player.style.left=sp.x+'px'; 
            player.style.top=sp.y+'px'; 
            player.style.transform='translate(-50%,-50%)';
        }

        function movePlayer(steps) {
            return new Promise(resolve => { 
                let rem=steps; 
                const delay=Math.max(350, 500 - (gameState.difficulty * 8));
                function step() { 
                    if(rem<=0) { resolve(); return; } 
                    currentIdx++; 
                    buildPath(); 
                    renderAllTiles(); 
                    moveSound(); 
                    player.classList.remove('hop'); 
                    void player.offsetWidth; 
                    player.classList.add('hop');
                    rem--;
                    setTimeout(step, delay);
                }
                step();
            });
        }

        function showDice(n) { 
            const icons = ['🎲','1️⃣','2️⃣','3️⃣'];
            diceDisplay.textContent = icons[n] || '🎲'; 
            dicePopup.classList.add('show'); 
            diceSound(); 
            setTimeout(()=>dicePopup.classList.remove('show'), 600);
        }

        function showToast(text, type) { 
            const toast = document.createElement('div');
            toast.className = 'toast-notification';
            toast.innerHTML = `<span>${text}</span>`;
            document.body.appendChild(toast);
            
            toast.offsetHeight;
            toast.classList.add('show');
            rewardSound(type);
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        function handleReward(reward) {
            if (reward.type === 'empty') return;
            const overlay = document.createElement('div');
            overlay.className = 'modal show';
            overlay.innerHTML = `
                <div class="modal-content">
                    <div class="modal-title">🎉 Aziram Found ${reward.label}!</div>
                    <p class="modal-text">Claim your reward or double it with an ad?</p>
                    <div class="modal-buttons">
                        <button class="modal-btn claim-btn" id="claimBtn">Claim (+${reward.value})</button>
                        <button class="modal-btn double-btn" id="doubleBtn">Double (+${reward.value*2})</button>
                    </div>
                </div>
            `;
            boardArea.appendChild(overlay);
            document.getElementById('claimBtn').onclick = () => {
                overlay.remove();
                if (reward.type === 'points') sendToParent({ type:'addPoints', value:reward.value });
                else if (reward.type === 'stars') sendToParent({ type:'addStars', value:reward.value });
                else if (reward.type === 'rolls') { gameState.spins += reward.value; sendToParent({ type:'addStars', value:0 }); }
                showToast(`+${reward.value} ${reward.icon}`, reward.type);
                gameState.totalScore++;
                gameState.difficulty = Math.floor(gameState.totalScore/50)+1;
            };
            document.getElementById('doubleBtn').onclick = () => {
                overlay.remove();
                pendingReward = reward;
                sendToParent({ type:'watchAd', value:3 });
            };
        }

        // Randomly skins Aziram on load
        function randomizeMascotColor() {
            const colors = ['blue', 'gold', 'purple', 'red', 'green'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            player.className = `player color-${color}`;
        }

        window.rollDice = function() {
            if (isRolling) return;
            if (gameState.spins <= 0) {
                showToast('No Rolls! 😢', 'none');
                failSound();
                setTimeout(() => openModal('adModal'), 1000);
                return;
            }
            isRolling = true; 
            rollBtn.disabled = true;
            gameState.spins--;
            sendToParent({ type:'useSpin' });
            const dice = Math.floor(Math.random() * 3) + 1;
            showDice(dice);
            setTimeout(async () => {
                await movePlayer(dice);
                const rew = getRewardType(currentIdx);
                handleReward(rew);
                isRolling = false; 
                rollBtn.disabled = false;
            }, 700);
        };

        window.openModal = id => document.getElementById(id).classList.add('show');
        window.closeModal = id => document.getElementById(id).classList.remove('show');
        window.requestAd = () => { closeModal('adModal'); sendToParent({ type:'watchAd', value:3 }); };
        window.claimDaily = (type) => { closeModal('dailyRewardsModal'); sendToParent({ type:'claimDaily', rewardType: type }); };

        window.addEventListener('resize', renderAllTiles);

        initAudio();
        randomizeMascotColor();
        buildPath();
        renderAllTiles();

        // Daily modal limit check
        const lastReward = localStorage.getItem('frankly_board_lastReward');
        const now = Date.now();
        if (!lastReward || now - parseInt(lastReward) > 86400000) {
            setTimeout(() => openModal('dailyRewardsModal'), 1500);
            localStorage.setItem('frankly_board_lastReward', now);
        }
    </script>
</body>
</html>
