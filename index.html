                this.audio = new GameAudio(); this.aiFirst = false;
                this._pendingEndResult = null;
                
                // YouTube SDK State Variables (Προσθήκη 3)
                this._ytLoaded = false;
                this._ytReady = false;
                this._wasPaused = false;
                this._savedProgress = false;
                this._savedAiTurn = false;
                this._aiTimeoutId = null;

                this.gameData = loadSave();
                const extLevel = loadLevel();
                if (this.gameData.level !== extLevel) {
                    this.gameData.level = extLevel;
                }

                if (typeof this.gameData.xp !== 'undefined' && this.gameData.points === 0) {
                    this.gameData.points = (this.gameData.level - 1) * POINTS_PER_LEVEL;
                    delete this.gameData.xp;
                }
                if (typeof this.gameData.points === 'undefined') {
                    this.gameData.points = (this.gameData.level - 1) * POINTS_PER_LEVEL;
                }

                this.playerMoves = 0; this.gameStartTime = null;
                this.domBoard  = document.getElementById('board');
                this.domStatus = document.getElementById('status');
                this.domScore  = document.getElementById('scoreDisplay');
                this.restartBtn     = document.getElementById('restartBtn');
                this.newGameBtn     = document.getElementById('newGameBtn');
                this.toggleFirstBtn = document.getElementById('toggleFirstBtn');

                this.particleCanvas = document.getElementById('particleCanvas');
                this.particleSystem = new ParticleSystem(this.particleCanvas);

                this.initDOMEvents(); this.audio.init();

                checkDayReset();
                const t = loadToday();
                this.scores = {1: t.wins||0, 2: t.losses||0};

                this.applyTierToPlayerDiscs();
                this.applySkins();
                this.updateHUD();
                this.newGame();
                this.initScoreboardEvents();
                this.renderScoreboard();
            }

            get level() {
                return Math.floor(this.gameData.points / POINTS_PER_LEVEL) + 1;
            }
            get pointsInCurrentLevel() {
                return this.gameData.points % POINTS_PER_LEVEL;
            }
            get zone()    { return getZoneForLevel(this.level); }
            get isEndless(){ return this.level >= ENDLESS_LEVEL; }
            get tier()    { return this.zone.tier || 1; }
            get aiDiff()  { return this.zone.diff; }
            get effectType() {
                const id = this.gameData.activeEffectSkin;
                if (id === 'fire_effect') return 'fire';
                if (id === 'explosion_effect') return 'explosion';
                if (id === 'plasma_effect') return 'plasma';
                if (id === 'ice_effect') return 'ice';
                if (id === 'galaxy_effect') return 'galaxy';
                return 'standard';
            }

            applyTierToPlayerDiscs() {
                const t = this.tier;
                const p1 = document.getElementById('p1Disc');
                const p2 = document.getElementById('p2Disc');
                const tierClass = t >= 2 ? `tier${t}` : '';
                p1.className = `player-disc red ${tierClass}`.trim();
                p2.className = `player-disc yellow ${tierClass}`.trim();
            }

            applySkins() {
                const boardCont = document.querySelector('.board-container');
                const activeBoard = SHOP_ITEMS.find(i => i.id === this.gameData.activeBoardSkin);
                boardCont.style.setProperty('--board-skin', activeBoard ? activeBoard.css : 'linear-gradient(145deg, #1565c0, #0d47a1)');

                const activeBg = SHOP_ITEMS.find(i => i.id === this.gameData.activeBgSkin);
                document.body.style.setProperty('--bg-skin', activeBg ? activeBg.css : '#000010');

                const p1 = document.getElementById('p1Disc');
                const p2 = document.getElementById('p2Disc');
                const discStyle = (id, def1, def2) => {
                    if (id === 'cyber_disc') return {1: 'radial-gradient(circle at 30% 30%, #00ffff, #0066cc)', 2: 'radial-gradient(circle at 30% 30%, #ff00ff, #660099)'};
                    if (id === 'gold_disc') return {1: 'radial-gradient(circle at 30% 30%, #ffd700, #b8860b)', 2: 'radial-gradient(circle at 30% 30%, #c0c0c0, #808080)'};
                    if (id === 'lava_disc') return {1: 'radial-gradient(circle at 30% 30%, #ff4500, #8b0000)', 2: 'radial-gradient(circle at 30% 30%, #ff8c00, #4a0000)'};
                    if (id === 'galaxy_disc') return {1: 'radial-gradient(circle at 30% 30%, #d500f9, #4a148c)', 2: 'radial-gradient(circle at 30% 30%, #00e5ff, #006064)'};
                    return {1: def1, 2: def2};
                };
                const ds = discStyle(this.gameData.activeDiscSkin, 'radial-gradient(circle at 30% 30%, #ff6b6b, #c0392b)', 'radial-gradient(circle at 30% 30%, #ffd93d, #f39c12)');
                p1.style.background = ds[1];
                p2.style.background = ds[2];
            }

            updateCoinDisplay() {
                document.getElementById('coinDisplay').textContent = this.gameData.coins;
                document.getElementById('shopCoins').textContent = this.gameData.coins;
            }

            updatePointsDisplay() {
                document.getElementById('pointsDisplay').textContent = this.pointsInCurrentLevel;
                document.getElementById('pointsNeeded').textContent = POINTS_PER_LEVEL;
            }

            updateHUD() {
                document.getElementById('hudLevel').textContent =
                    this.isEndless ? '🌌 ENDLESS' : `LEVEL ${this.level}`;
                document.getElementById('hudZone').textContent = this.zone.name + ' (' + this.aiDiff.charAt(0).toUpperCase() + this.aiDiff.slice(1) + ')';
                document.getElementById('hudMatchScore').textContent =
                    `You ${this.matchScores[1]} – ${this.matchScores[2]} AI`;
                const labels = { easy:'AI (Easy)', medium:'AI (Medium)', hard:'AI (Hard)', expert:'AI (Expert)', unbeatable:'💀 Unbeatable' };
                document.getElementById('aiLabel').textContent = labels[this.aiDiff] || 'AI';
                this.updateCoinDisplay();
                this.updatePointsDisplay();

                const db = document.getElementById('dailyBtn');
                if (this.gameData.xpBoostActive && this.gameData.xpBoostGames > 0) {
                    db.classList.add('boost-active');
                    db.textContent = '⚡ DOUBLE POINTS';
                } else {
                    db.classList.remove('boost-active');
                    db.textContent = '🎁 Daily';
                }
            }

            updateScores() { this.domScore.textContent = `${this.scores[1]} - ${this.scores[2]}`; }
            setButtonsEnabled(enabled) {
                [this.restartBtn, this.newGameBtn, this.toggleFirstBtn].forEach(b => { if(b) b.disabled = !enabled; });
            }

            checkDailyReward() {
                const today = new Date().toDateString();
                if (this.gameData.lastLogin !== today) {
                    const prevDate = this.gameData.lastLogin ? new Date(this.gameData.lastLogin) : null;
                    let streak = 1;
                    if (prevDate) {
                        const diff = (new Date(today) - prevDate) / (1000 * 60 * 60 * 24);
                        if (diff <= 1) streak = this.gameData.streak + 1;
                        else streak = 1;
                    }
                    this.gameData.lastLogin = today;
                    this.gameData.streak = streak;
                    writeSave(this.gameData);
                    return streak;
                }
                return null;
            }

            claimDailyReward() {
                const streak = this.checkDailyReward();
                if (streak === null) { alert('Already claimed today!'); return; }
                const coins = 10 * streak;
                this.gameData.coins += coins;
                writeSave(this.gameData);
                this.updateCoinDisplay();
                alert(`🎁 Daily Reward claimed!\nStreak: ${streak}x\n+${coins} coins!`);
            }

            // ===== YOUTUBE SDK INTEGRATION (Προσθήκη 3) =====
            _showAdAndReward(callback) {
                const YT = (typeof ytgame !== 'undefined' && ytgame !== null) ? ytgame : null;
                if (YT && YT.game && typeof YT.game.showAd === 'function') {
                    YT.game.showAd()
                        .then(() => {
                            if (callback) callback();
                        })
                        .catch((err) => {
                            console.warn('Ad failed or rejected:', err);
                            if (callback) callback();
                        });
                } else {
                    if (callback) callback();
                }
            }

            activateXpBoost() {
                if (this.gameData.xpBoostActive) { alert('Double points boost is already active!'); return; }
                this._showAdAndReward(() => {
                    this.gameData.xpBoostActive = true;
                    this.gameData.xpBoostGames = 2;
                    writeSave(this.gameData);
                    this.updateHUD();
                    alert('⚡ Double points activated for the next 2 wins!');
                });
            }

            applySavedData(data) {
                try {
                    const s = JSON.parse(data);
                    if (s && typeof s === 'object') {
                        if (s.gameData) {
                            this.gameData = { ...this.gameData, ...s.gameData };
                            writeSave(this.gameData);
                            this.applySkins();
                            this.updateHUD();
                            this.updateCoinDisplay();
                            this.updatePointsDisplay();
                        }
                        if (s.scores) {
                            this.scores = {1: s.scores[1]||0, 2: s.scores[2]||0};
                            this.updateScores();
                        }
                    }
                } catch(e) {}
            }

            cloudSave() {
                const YT = (typeof ytgame !== 'undefined' && ytgame !== null) ? ytgame : null;
                if (YT && this._ytLoaded && YT.game && typeof YT.game.saveData === 'function') {
                    try {
                        YT.game.saveData(JSON.stringify({ gameData: this.gameData, scores: this.scores })).catch(function(){});
                    } catch(e) {}
                }
            }

            submitScore(score) {
                const YT = (typeof ytgame !== 'undefined' && ytgame !== null) ? ytgame : null;
                if (this._ytReady && YT && YT.game && typeof YT.game.sendScore === 'function') {
                    try {
                        YT.game.sendScore(score).catch(function(){});
                    } catch(e) {}
                }
            }

            handlePause() {
                this._wasPaused = true;
                this._savedProgress = this.gameInProgress;
                this._savedAiTurn   = this.isAiTurn;
                this.gameInProgress = false;
                this.isAiTurn = false;
                if (this._aiTimeoutId) {
                    clearTimeout(this._aiTimeoutId);
                    this._aiTimeoutId = null;
                }
                if (this.audio) this.audio.setPaused(true);
                pauseBackground();
                document.body.classList.add('paused');
            }

            handleResume() {
                if (this.audio) this.audio.setPaused(false);
                document.body.classList.remove('paused');
                resumeBackground();
                if (this._wasPaused) {
                    this.gameInProgress = !!this._savedProgress;
                    this._wasPaused = false;
                    if (this.gameInProgress && this._savedAiTurn) {
                        this._savedAiTurn = false;
                        this.triggerAiTurn();
                    }
                }
                this.updateStatus();
                this.updatePlayerIndicators();
            }

            setYtLoaded(loaded) { this._ytLoaded = loaded; }
            setYtReady(ready) { this._ytReady = ready; }

            // ===== CORE GAME =====
            initializeBoard() {
                this.board = Array(this.ROWS).fill(null).map(() => Array(this.COLS).fill(0));
                this.domBoard.innerHTML = '';
                for (let r = 0; r < this.ROWS; r++) {
                    for (let c = 0; c < this.COLS; c++) {
                        const slot = document.createElement('div');
                        slot.classList.add('slot');
                        slot.dataset.col = c;
                        const disc = document.createElement('div');
                        disc.classList.add('disc');
                        slot.appendChild(disc);
                        slot.addEventListener('click', () => this.handleSlotClick(c));
                        this.domBoard.appendChild(slot);
                    }
                }
                this.gameInProgress = true; this.currentPlayer = 1;
                this.playerMoves = 0; this.gameStartTime = Date.now();
                if (this.aiFirst) { this.currentPlayer = 2; this.updateStatus(); this.updatePlayerIndicators(); this.triggerAiTurn(); }
                else { this.updateStatus(); this.updatePlayerIndicators(); }
                this.particleSystem.stop();
                this.particleSystem.clear();
            }

            handleSlotClick(col) { if (!this.gameInProgress || this.isAiTurn) return; this.makeMove(col); }

            makeMove(col) {
                const row = this.getAvailableRow(col); if (row === -1) return;
                this.board[row][col] = this.currentPlayer;
                this.animateDiscDrop(row, col, this.currentPlayer);
                this.audio.playDropSound();
                if (this.currentPlayer === 1) this.playerMoves++;
                if (this.checkWinCondition(row, col)) { this.handleWinState(); return; }
                if (this.checkDrawCondition())         { this.handleDrawState(); return; }
                this.currentPlayer = this.currentPlayer === 1 ? 2 : 1;
                this.updateStatus(); this.updatePlayerIndicators();
                if (this.currentPlayer === 2 && this.gameInProgress) this.triggerAiTurn();
            }

            getAvailableRow(col) { for (let r = this.ROWS-1; r >= 0; r--) if (this.board[r][col] === 0) return r; return -1; }

            animateDiscDrop(row, col, player) {
                const slot = this.domBoard.children[row * this.COLS + col];
                const disc = slot.querySelector('.disc');
                const t = this.tier;
                const tierClass = t === 2 ? 'ring' : t === 3 ? 'glow' : t === 4 ? 'ring glow2' : t === 5 ? 'ring glow3' : '';

                let colClass = 'red';
                if (player === 1) {
                    if (this.gameData.activeDiscSkin === 'cyber_disc') colClass = 'cyber_red';
                    else if (this.gameData.activeDiscSkin === 'gold_disc') colClass = 'gold_red';
                    else if (this.gameData.activeDiscSkin === 'lava_disc') colClass = 'lava_red';
                    else if (this.gameData.activeDiscSkin === 'galaxy_disc') colClass = 'galaxy_red';
                    else colClass = 'red';
                } else {
                    if (this.gameData.activeDiscSkin === 'cyber_disc') colClass = 'cyber_yel';
                    else if (this.gameData.activeDiscSkin === 'gold_disc') colClass = 'gold_yel';
                    else if (this.gameData.activeDiscSkin === 'lava_disc') colClass = 'lava_yel';
                    else if (this.gameData.activeDiscSkin === 'galaxy_disc') colClass = 'galaxy_yel';
                    else colClass = 'yellow';
                }

                const style = document.createElement('style');
                if (this.gameData.activeDiscSkin === 'cyber_disc') {
                    style.innerHTML = `.disc.cyber_red { background: radial-gradient(circle at 35% 35%, #00ffff, #0066cc); opacity: 1; }
                                      .disc.cyber_yel { background: radial-gradient(circle at 35% 35%, #ff00ff, #660099); opacity: 1; }`;
                } else if (this.gameData.activeDiscSkin === 'gold_disc') {
                    style.innerHTML = `.disc.gold_red { background: radial-gradient(circle at 35% 35%, #ffd700, #b8860b); opacity: 1; }
                                      .disc.gold_yel { background: radial-gradient(circle at 35% 35%, #c0c0c0, #808080); opacity: 1; }`;
                } else if (this.gameData.activeDiscSkin === 'lava_disc') {
                    style.innerHTML = `.disc.lava_red { background: radial-gradient(circle at 35% 35%, #ff4500, #8b0000); opacity: 1; }
                                      .disc.lava_yel { background: radial-gradient(circle at 35% 35%, #ff8c00, #4a0000); opacity: 1; }`;
                } else if (this.gameData.activeDiscSkin === 'galaxy_disc') {
                    style.innerHTML = `.disc.galaxy_red { background: radial-gradient(circle at 35% 35%, #d500f9, #4a148c); opacity: 1; }
                                      .disc.galaxy_yel { background: radial-gradient(circle at 35% 35%, #00e5ff, #006064); opacity: 1; }`;
                }
                document.head.appendChild(style);

                disc.className = `disc ${colClass} ${tierClass}`.trim();
                disc.style.animation = 'discDrop 0.4s cubic-bezier(0.25,0.46,0.45,0.94) forwards';

                const boardRect = this.domBoard.getBoundingClientRect();
                const slotRect = slot.getBoundingClientRect();
                const canvasRect = this.particleCanvas.getBoundingClientRect();
                const x = slotRect.left + slotRect.width/2 - canvasRect.left;
                const yStart = slotRect.top - canvasRect.top - 50; 
                const yEnd = slotRect.top + slotRect.height/2 - canvasRect.top;

                this.particleSystem.emitTrail(x, yStart, x, yEnd, this.effectType, player);

                setTimeout(() => {
                    this.particleSystem.emitExplosion(x, yEnd, this.effectType, player);
                }, 350);
            }

            updatePlayerIndicators() {
                document.getElementById('player1').classList.toggle('active', this.currentPlayer === 1);
                document.getElementById('player2').classList.toggle('active', this.currentPlayer === 2);
            }

            updateStatus() {
                if (!this.gameInProgress) return;
                this.domStatus.innerHTML = this.currentPlayer === 2
                    ? '<span class="ai-thinking">🤔 AI is thinking...</span>'
                    : 'Your turn 👇';
            }

            checkWinCondition(row, col) {
                const p = this.board[row][col];
                for (let [dr,dc] of [[0,1],[1,0],[1,1],[1,-1]]) {
                    let count=1, cells=[[row,col]];
                    for (let step of [1,-1]) {
                        let r=row+dr*step, c=col+dc*step;
                        while (r>=0&&r<this.ROWS&&c>=0&&c<this.COLS&&this.board[r][c]===p) {
                            count++; cells.push([r,c]);
                            if (count >= 4) { this.highlightWinningSequence(cells); return true; }
                            r+=dr*step; c+=dc*step;
                        }
                    }
                }
                return false;
            }
            highlightWinningSequence(cells) {
                cells.forEach(([r,c]) => { const d = this.domBoard.children[r*this.COLS+c].querySelector('.disc'); if(d) d.classList.add('winner'); });
            }
            checkDrawCondition() { return this.board[0].every(c => c !== 0); }

            handleWinState() {
                this.gameInProgress = false;
                const won = this.currentPlayer === 1;
                this.matchScores[this.currentPlayer]++;
                if (won) { this.scores[1]++; } else { this.scores[2]++; }
                this.updateScores();

                const oldLevel = this.level;
                if (won) {
                    let pointsGain = 10;
                    if (this.gameData.xpBoostActive && this.gameData.xpBoostGames > 0) {
                        pointsGain = 20;
                        this.gameData.xpBoostGames--;
                        if (this.gameData.xpBoostGames <= 0) this.gameData.xpBoostActive = false;
                    }
                    this.gameData.points += pointsGain;
                    this.gameData.coins += pointsGain;

                    if (this.isEndless) {
                        this.endlessStreak++;
                        if (this.endlessStreak > loadEndlessRecord()) saveEndlessRecord(this.endlessStreak);
                    }

                    try {
                        let c4Wins = parseInt(localStorage.getItem('FRANKLY_C4_WINS') || '0');
                        localStorage.setItem('FRANKLY_C4_WINS', (c4Wins + 1).toString());
                    } catch(e) {}
                } else {
                    if (this.isEndless) this.endlessStreak = 0;
                }

                saveLevel(this.level);
                writeSave(this.gameData);

                this.updateHUD();
                this.audio.playVictorySound();
                if (won) this.triggerConfettiEffect();
                this.domStatus.textContent = won ? 'You Win! 🎉' : 'AI Wins! 😞';

                this.handleGameEnd();
                setTimeout(() => this.showEndModal(won ? 'win' : 'lose'), 600);
            }

            handleDrawState() {
                this.gameInProgress = false;
                this.domStatus.textContent = "It's a Draw! 🤝";
                this.handleGameEnd();
                setTimeout(() => this.showEndModal('draw'), 600);
            }

            showEndModal(result) {
                const titleEl  = document.getElementById('endTitle');
                const barEl    = document.getElementById('progressBar');
                const labelL   = document.getElementById('progressLabelLeft');
                const labelR   = document.getElementById('progressLabelRight');
                const nextEl   = document.getElementById('progressNext');
                const btnEl    = document.getElementById('endActionBtn');

                if (result === 'win') {
                    titleEl.textContent = '🎉 Galaxy Conquered!';
                    titleEl.className = 'modal-galaxy-title win';
                } else if (result === 'lose') {
                    titleEl.textContent = '💀 Lost in Space...';
                    titleEl.className = 'modal-galaxy-title lose';
                } else {
                    titleEl.textContent = '🤝 Stray Asteroid!';
                    titleEl.className = 'modal-galaxy-title draw';
                }

                barEl.classList.remove('full');
                const pct = (this.pointsInCurrentLevel / POINTS_PER_LEVEL) * 100;

                if (result === 'win') {
                    if (this.isEndless) {
                        labelL.textContent = '🌌 Endless Streak';
                        labelR.textContent = `${this.endlessStreak} wins`;
                        barEl.style.width = '0%';
                        setTimeout(() => { barEl.style.width = '100%'; barEl.classList.add('full'); }, 100);
                    } else {
                        labelL.textContent = `Level ${this.level} Progress`;
                        labelR.textContent = `${this.pointsInCurrentLevel}/${POINTS_PER_LEVEL} pts`;
                        barEl.style.width = '0%';
                        setTimeout(() => {
                            barEl.style.width = pct + '%';
                            if (pct >= 100) barEl.classList.add('full');
                        }, 100);
                    }
                    if (this.isEndless) nextEl.textContent = 'Continue in Endless Deep Space!';
                    else {
                        const nz = getZoneForLevel(this.level);
                        const oz = getZoneForLevel(this.level - 1);
                        if (this.level === ENDLESS_LEVEL) nextEl.textContent = '🌌 Next: Endless Deep Space!';
                        else if (this.level > 1 && nz.tier > (oz.tier || 0)) nextEl.textContent = `🔥 Zone Up! ${nz.name} — Disc Tier ${nz.tier}!`;
                        else nextEl.textContent = `${POINTS_PER_LEVEL - this.pointsInCurrentLevel} pts to Level ${this.level + 1}`;
                    }
                } else {
                    labelL.textContent = 'Level Progress';
                    labelR.textContent = `${this.pointsInCurrentLevel}/${POINTS_PER_LEVEL} pts`;
                    barEl.style.width = '0%';
                    setTimeout(() => barEl.style.width = pct + '%', 100);
                    nextEl.textContent = '';
                }

                document.getElementById('statMoves').textContent = this.playerMoves;
                const sec = Math.round((Date.now() - this.gameStartTime) / 1000);
                document.getElementById('statTime').textContent  = sec < 60 ? `${sec}s` : `${Math.floor(sec/60)}m ${sec%60}s`;
                document.getElementById('statFirst').textContent = this.aiFirst ? 'AI' : 'You';

                btnEl.textContent = '▶ Continue';
                btnEl.disabled = false;
                if (result === 'win') btnEl.className = 'modal-action-btn win-btn';
                else if (result === 'lose') btnEl.className = 'modal-action-btn lose-btn';
                else btnEl.className = 'modal-action-btn draw-btn';

                this._pendingEndResult = result;
                document.getElementById('endModal').classList.add('open');
            }

            // ===== INIT DOM EVENTS =====
            initDOMEvents() {
                // Restart Button
                this.restartBtn.addEventListener('click', () => {
                    this.restartGame();
                });
                
                // New Game Button
                this.newGameBtn.addEventListener('click', () => {
                    this.newGame();
                });

                this.toggleFirstBtn.addEventListener('click', () => this.toggleFirstPlayer());

                const modalBtn = document.getElementById('endActionBtn');
                modalBtn.addEventListener('click', () => {
                    if (this.gameInProgress) return;
                    const btn = document.getElementById('endActionBtn');
                    btn.disabled = true;
                    btn.textContent = '⏳ Loading Ad...';
                    
                    this._showAdAndReward(() => {
                        document.getElementById('endModal').classList.remove('open');
                        this.newGame();
                        btn.disabled = false;
                        btn.textContent = '▶ Continue';
                    });
                });

                document.getElementById('dailyBtn').addEventListener('click', () => this.claimDailyReward());

                document.getElementById('shopBtn').addEventListener('click', () => {
                    this.renderShop();
                    document.getElementById('shopModal').classList.add('open');
                });
                document.getElementById('closeShopBtn').addEventListener('click', () => {
                    document.getElementById('shopModal').classList.remove('open');
                });
                document.getElementById('shopModal').addEventListener('click', (e) => {
                    if (e.target === e.currentTarget) document.getElementById('shopModal').classList.remove('open');
                });
            }

            initScoreboardEvents() {
                const openBtn  = document.getElementById('openScoreboardBtn');
                const closeBtn = document.getElementById('closeScoreboardBtn');
                const modal    = document.getElementById('scoreModal');
                if (openBtn)  openBtn.addEventListener('click',  () => { this.renderScoreboard(); modal.classList.add('open'); });
                if (closeBtn) closeBtn.addEventListener('click', () => modal.classList.remove('open'));
                if (modal)    modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });
            }

            toggleFirstPlayer() {
                this.aiFirst = !this.aiFirst;
                this.toggleFirstBtn.textContent = this.aiFirst ? '👤 You First' : '🤖 AI First';
                this.newGame();
            }

            saveTodayScore() {
                const today = loadToday();
                today.wins    = this.scores[1];
                today.losses  = this.scores[2];
                today.maxLevel = Math.max(today.maxLevel || 1, this.level);
                saveToday(today);
            }

            saveProgress() {
                this.saveTodayScore();
                this.renderScoreboard();
                this.cloudSave(); // Cloud Save via SDK (Προσθήκη 3)
            }

            handleGameEnd() { this.saveProgress(); this.setButtonsEnabled(true); }

            renderScoreboard() {
                const content = document.getElementById('scoreboardContent');
                if (!content) return;
                const todayKey   = getTodayKey();
                const todayData  = loadToday();
                const allScores  = loadAll();
                const combined   = Object.assign({}, allScores);
                if (Object.keys(todayData).length > 0) combined[todayKey] = todayData;
                const rows = Object.keys(combined).sort().reverse();
                if (!rows.length) {
                    content.innerHTML = '<div class="no-history">No history yet.</div>';
                } else {
                    let html = '<table class="score-table"><thead><tr><th>📅 Date</th><th>Max Level</th><th class="win">✅ Wins</th><th class="loss">❌ Losses</th></tr></thead><tbody>';
                    rows.forEach(date => {
                        const d   = combined[date] || {};
                        const cls = date === todayKey ? 'today-row' : '';
                        const lbl = date === todayKey ? '🟢 Today' : date;
                        html += `<tr class="${cls}"><td>${lbl}</td><td>${d.maxLevel||1}</td><td class="win">${d.wins||0}</td><td class="loss">${d.losses||0}</td></tr>`;
                    });
                    html += '</tbody></table>';
                    content.innerHTML = html;
                }
                document.getElementById('endlessRecordDisplay').textContent = loadEndlessRecord();
            }

            triggerAiTurn() {
                this.isAiTurn = true; this.updateStatus();
                const baseDelay = { easy:700, medium:500, hard:350, expert:250, unbeatable:180 };
                const delay = (baseDelay[this.aiDiff] || 300) + Math.random() * 300;
                this._aiTimeoutId = setTimeout(() => {
                    if (!this.gameInProgress) { this.isAiTurn = false; return; }
                    const col = this.computeAiMove(); this.isAiTurn = false; this.makeMove(col);
                    this._aiTimeoutId = null;
                }, delay);
            }

            computeAiMove() {
                const valid = []; for (let c = 0; c < this.COLS; c++) if (this.getAvailableRow(c) !== -1) valid.push(c);
                const params = getAiParams(this.level);

                if (params.randomChance > 0 && Math.random() < params.randomChance) {
                    return valid[Math.floor(Math.random()*valid.length)];
                }

                for (let c of valid){let r=this.getAvailableRow(c);this.board[r][c]=2;if(this.checkWinSimulation(r,c,2)){this.board[r][c]=0;return c;}this.board[r][c]=0;}

                if (Math.random() < params.blockWeight) {
                    for (let c of valid){let r=this.getAvailableRow(c);this.board[r][c]=1;if(this.checkWinSimulation(r,c,1)){this.board[r][c]=0;return c;}this.board[r][c]=0;}
                }

                if (params.depth === 0) return valid[Math.floor(Math.random()*valid.length)];

                if (this.aiDiff === 'medium' && Math.random() < 0.15) return valid[Math.floor(Math.random()*valid.length)];

                if (params.openingBook) {
                    const moveCount = this.board.flat().filter(x => x !== 0).length;
                    if (moveCount < 4) {
                        for (const bc of OPENING_BOOK) {
                            if (valid.includes(bc)) return bc;
                        }
                    }
                }

                let best = -Infinity, cols = [valid[0]];
                const ordered = [...valid].sort((a,b) => Math.abs(a-3) - Math.abs(b-3));
                for (let c of ordered){
                    let r=this.getAvailableRow(c); this.board[r][c]=2;
                    let s=this.minimax(params.depth,false,-Infinity,Infinity);
                    this.board[r][c]=0;
                    if(s>best){best=s;cols=[c];}else if(s===best)cols.push(c);
                }
                return cols[Math.floor(Math.random()*cols.length)];
            }

            checkWinSimulation(row,col,p) {
                const dirs=[[0,1],[1,0],[1,1],[1,-1]];
                for(let[dr,dc]of dirs){let count=1;for(let step of[1,-1]){let r=row+dr*step,c=col+dc*step;while(r>=0&&r<this.ROWS&&c>=0&&c<this.COLS&&this.board[r][c]===p){count++;if(count>=4)return true;r+=dr*step;c+=dc*step;}}}
                return false;
            }
            minimax(depth,isMax,alpha,beta) {
                let score=this.evaluateBoardState(); if(depth===0||this.checkDrawCondition())return score; if(Math.abs(score)>5000)return score;
                const valid=[]; for(let c=0;c<this.COLS;c++) if(this.getAvailableRow(c)!==-1) valid.push(c);
                const ordered=[...valid].sort((a,b)=>Math.abs(a-3)-Math.abs(b-3));
                if(isMax){let m=-Infinity;for(let c of ordered){let r=this.getAvailableRow(c);this.board[r][c]=2;let e=this.minimax(depth-1,false,alpha,beta);this.board[r][c]=0;m=Math.max(m,e);alpha=Math.max(alpha,e);if(beta<=alpha)break;}return m;}
                else{let m=Infinity;for(let c of ordered){let r=this.getAvailableRow(c);this.board[r][c]=1;let e=this.minimax(depth-1,true,alpha,beta);this.board[r][c]=0;m=Math.min(m,e);beta=Math.min(beta,e);if(beta<=alpha)break;}return m;}
            }
            evaluateBoardState() {
                let score=0; const mid=Math.floor(this.COLS/2); let mc=0;
                for(let r=0;r<this.ROWS;r++){if(this.board[r][mid]===2)mc++;else if(this.board[r][mid]===1)mc--;}
                score+=mc*4;
                for(let r=0;r<this.ROWS;r++) for(let c=0;c<this.COLS-3;c++) score+=this.evaluateWindow([this.board[r][c],this.board[r][c+1],this.board[r][c+2],this.board[r][c+3]]);
                for(let c=0;c<this.COLS;c++) for(let r=0;r<this.ROWS-3;r++) score+=this.evaluateWindow([this.board[r][c],this.board[r+1][c],this.board[r+2][c],this.board[r+3][c]]);
                for(let r=0;r<this.ROWS-3;r++) for(let c=0;c<this.COLS-3;c++){score+=this.evaluateWindow([this.board[r][c],this.board[r+1][c+1],this.board[r+2][c+2],this.board[r+3][c+3]]);score+=this.evaluateWindow([this.board[r+3][c],this.board[r+2][c+1],this.board[r+1][c+2],this.board[r][c+3]]);}
                return score;
            }
            evaluateWindow(w) {
                let score=0; const ai=w.filter(c=>c===2).length,pl=w.filter(c=>c===1).length,em=w.filter(c=>c===0).length;
                if(ai===4)return 10000; if(pl===4)return -10000;
                if(ai===3&&em===1)score+=50; else if(ai===2&&em===2)score+=10;
                if(pl===3&&em===1)score-=80; else if(pl===2&&em===2)score-=15;
                return score;
            }

            triggerConfettiEffect() {
                let colors = ['#e74c3c', '#f1c40f', '#2ecc71', '#3498db', '#9b59b6'];
                if (this.gameData.activeEffectSkin === 'rainbow_effect') colors = ['#ff0000', '#ff7f00', '#ffff00', '#00ff00', '#0000ff', '#4b0082', '#9400d3'];
                if (this.gameData.activeEffectSkin === 'neon_effect') colors = ['#00ff00', '#ff00ff', '#00ffff', '#ff4500', '#adff2f', '#8a2be2'];

                for(let i=0;i<40;i++){
                    const c=document.createElement('div');
                    c.classList.add('confetti');
                    c.style.left=Math.random()*100+'vw';
                    c.style.animationDelay=Math.random()*0.5+'s';
                    c.style.animationDuration=(Math.random()*2+2)+'s';
                    c.style.background = colors[Math.floor(Math.random() * colors.length)];
                    document.body.appendChild(c);
                    setTimeout(()=>c.remove(),3500);
                }
            }

            restartGame() {
                // Full Reset
                this.currentPlayer = 1; 
                this.isAiTurn = false;
                if (this._aiTimeoutId) {
                    clearTimeout(this._aiTimeoutId);
                    this._aiTimeoutId = null;
                }
                
                this.initializeBoard(); 
                this.updateStatus(); 
                this.updatePlayerIndicators();
                this.updateHUD(); 
                this.applyTierToPlayerDiscs();
                
                this.particleSystem.stop();
                this.particleSystem.clear();
                document.querySelectorAll('.confetti').forEach(c=>c.remove());
                this.setButtonsEnabled(true);
            }
            
            newGame() {
                // Hard Reset (Full New Game, clear current session scores)
                this.matchScores = {1:0, 2:0};
                this.scores = {1:0, 2:0};
                this.updateScores();
                this.endlessStreak = 0;
                this.restartGame();
            }

            // ===== RENDER SHOP =====
            renderShop() {
                const container = document.getElementById('shopContainer');
                container.innerHTML = '';

                const groups = {};
                SHOP_ITEMS.forEach(item => {
                    if (!groups[item.category]) groups[item.category] = [];
                    groups[item.category].push(item);
                });

                for (const [cat, items] of Object.entries(groups)) {
                    const catDiv = document.createElement('div');
                    const title = document.createElement('div');
                    title.className = 'shop-category-title';
                    title.textContent = CAT_NAMES[cat] || cat.toUpperCase();
                    catDiv.appendChild(title);

                    const grid = document.createElement('div');
                    grid.className = 'shop-grid';

                    items.forEach(item => {
                        const div = document.createElement('div');
                        div.classList.add('shop-item');

                        const owned = this.gameData.ownedSkins.includes(item.id);
                        const isActive =
                            (item.category === 'pions' && this.gameData.activeDiscSkin === item.id) ||
                            (item.category === 'effects' && this.gameData.activeEffectSkin === item.id) ||
                            (item.category === 'board' && this.gameData.activeBoardSkin === item.id) ||
                            (item.category === 'bg' && this.gameData.activeBgSkin === item.id);

                        if (owned) div.classList.add('owned');
                        if (isActive) div.style.borderColor = '#e1bee7';

                        let previewHTML = '';
                        if (item.category === 'board' || item.category === 'bg') {
                            previewHTML = `<div class="preview-board" style="background:${item.css};"></div>`;
                        } else if (item.category === 'effects') {
                            const colors = this.getPreviewColors(item.id);
                            previewHTML = `<div class="preview" style="background:${colors[0]}; border:1px solid ${colors[1]}; box-shadow:0 0 6px ${colors[0]};"></div>`;
                        } else {
                            let clr = 'radial-gradient(circle at 30% 30%, #ff6b6b, #c0392b)';
                            if (item.id === 'cyber_disc') clr = 'radial-gradient(circle at 30% 30%, #00ffff, #0066cc)';
                            if (item.id === 'gold_disc') clr = 'radial-gradient(circle at 30% 30%, #ffd700, #b8860b)';
                            if (item.id === 'lava_disc') clr = 'radial-gradient(circle at 30% 30%, #ff4500, #8b0000)';
                            if (item.id === 'galaxy_disc') clr = 'radial-gradient(circle at 30% 30%, #d500f9, #4a148c)';
                            previewHTML = `<div class="preview" style="background:${clr};"></div>`;
                        }

                        div.innerHTML = `
                            <div class="shop-item-title">${item.name}</div>
                            ${previewHTML}
                            <div class="shop-item-price">${owned ? (isActive ? '✅ Active' : 'Owned') : (item.price === 0 ? 'Free' : `🪙 ${item.price}`)}</div>
                        `;

                        div.addEventListener('click', () => {
                            if (owned) {
                                if (item.category === 'pions') this.gameData.activeDiscSkin = item.id;
                                else if (item.category === 'effects') this.gameData.activeEffectSkin = item.id;
                                else if (item.category === 'board') this.gameData.activeBoardSkin = item.id;
                                else if (item.category === 'bg') this.gameData.activeBgSkin = item.id;
                                writeSave(this.gameData);
                                this.applySkins();
                                this.renderShop();
                                return;
                            }
                            if (item.price === 0) {
                                this.gameData.ownedSkins.push(item.id);
                                if (item.category === 'pions') this.gameData.activeDiscSkin = item.id;
                                else if (item.category === 'effects') this.gameData.activeEffectSkin = item.id;
                                else if (item.category === 'board') this.gameData.activeBoardSkin = item.id;
                                else if (item.category === 'bg') this.gameData.activeBgSkin = item.id;
                                writeSave(this.gameData);
                                this.applySkins();
                                this.renderShop();
                                return;
                            }
                            if (this.gameData.coins >= item.price) {
                                this.gameData.coins -= item.price;
                                this.gameData.ownedSkins.push(item.id);
                                if (item.category === 'pions') this.gameData.activeDiscSkin = item.id;
                                else if (item.category === 'effects') this.gameData.activeEffectSkin = item.id;
                                else if (item.category === 'board') this.gameData.activeBoardSkin = item.id;
                                else if (item.category === 'bg') this.gameData.activeBgSkin = item.id;
                                writeSave(this.gameData);
                                this.applySkins();
                                this.updateCoinDisplay();
                                this.renderShop();
                            } else {
                                alert('Not enough coins!');
                            }
                        });
                        grid.appendChild(div);
                    });
                    catDiv.appendChild(grid);
                    container.appendChild(catDiv);
                }

                // Add Ad Boost Button (Προσθήκη 3)
                const boostDiv = document.createElement('div');
                boostDiv.style.cssText = 'margin: 12px 0; text-align: center;';
                const boostBtn = document.createElement('button');
                boostBtn.className = 'modal-action-btn win-btn';
                boostBtn.style.cssText = 'background:linear-gradient(135deg,#e81cff,#7b1fa2);box-shadow:0 4px 0 #38006b;font-size:0.8rem;';
                boostBtn.textContent = '⚡ Watch Ad for Double Points';
                boostBtn.addEventListener('click', () => this.activateXpBoost());
                boostDiv.appendChild(boostBtn);
                container.appendChild(boostDiv);
            }

            getPreviewColors(effectId) {
                switch (effectId) {
                    case 'fire_effect': return ['#ff4500', '#ff8c00'];
                    case 'explosion_effect': return ['#ffffff', '#ffdd00'];
                    case 'plasma_effect': return ['#b388ff', '#7c4dff'];
                    case 'ice_effect': return ['#80deea', '#00bcd4'];
                    case 'galaxy_effect': return ['#e040fb', '#7b1fa2'];
                    default: return ['#ff6b6b', '#c0392b'];
                }
            }
        }

        // ============================================================
        // HELPER FUNCTIONS
        // ============================================================
        function getTodayKey() { const d = new Date(); return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; }
        function loadAll()   { try { return JSON.parse(localStorage.getItem('cf_allscores_v3') || '{}'); } catch(e) { return {}; } }
        function saveAll(a)  { try { localStorage.setItem('cf_allscores_v3', JSON.stringify(a)); } catch(e) {} }
        function loadToday() { try { return JSON.parse(localStorage.getItem('cf_todayscores_v3') || '{}'); } catch(e) { return {}; } }
        function saveToday(t){ try { localStorage.setItem('cf_todayscores_v3', JSON.stringify(t)); } catch(e) {} }
        function checkDayReset() {
            const last  = (function(){ try { return localStorage.getItem('cf_lastday_v3'); } catch(e) { return ''; } })() || '';
            const today = getTodayKey();
            if (last && last !== today) {
                const all = loadAll(), saved = loadToday();
                if (Object.keys(saved).length > 0) {
                    all[last] = saved;
                    const keys = Object.keys(all).sort().slice(-14);
                    const trimmed = {}; keys.forEach(k => { trimmed[k] = all[k]; }); saveAll(trimmed);
                }
                try { localStorage.removeItem('cf_todayscores_v3'); } catch(e) {}
            }
            try { localStorage.setItem('cf_lastday_v3', today); } catch(e) {}
        }

        // ============================================================
        // YOUTUBE SDK LIFECYCLE (Προσθήκη 3)
        // ============================================================
        const YT = (typeof ytgame !== 'undefined' && ytgame !== null) ? ytgame : null;
        let ytLoaded = false;
        let ytReady = false;

        async function initGameAssets() {
            if (!YT) return;
            if (YT.system) {
                try {
                    if (typeof YT.system.onAudioEnabledChange === 'function') {
                        YT.system.onAudioEnabledChange(function(enabled) {
                            if (window._game) window._game.audio.setMuted(!enabled);
                        });
                    }
                } catch(e) {}
                try {
                    if (typeof YT.system.isAudioEnabled === 'function') {
                        if (window._game) window._game.audio.setMuted(!YT.system.isAudioEnabled());
                    }
                } catch(e) {}
                try {
                    if (typeof YT.system.onPause === 'function') {
                        YT.system.onPause(function() {
                            if (window._game) window._game.handlePause();
                        });
                    }
                } catch(e) {}
                try {
                    if (typeof YT.system.onResume === 'function') {
                        YT.system.onResume(function() {
                            if (window._game) window._game.handleResume();
                        });
                    }
                } catch(e) {}
            }
            try {
                if (YT.game && typeof YT.game.loadData === 'function') {
                    const data = await YT.game.loadData();
                    if (data && window._game) window._game.applySavedData(data);
                }
            } catch(e) {}
            ytLoaded = true;
            if (window._game) window._game.setYtLoaded(true);
        }

        // ============================================================
        // START
        // ============================================================
        try { initBackgroundEffects(); } catch(e) {}
        try { window._game = new ConnectFour(); } catch(e) {}

        window.addEventListener('load', async function() {
            if (YT && YT.game && typeof YT.game.firstFrameReady === 'function') {
                try { YT.game.firstFrameReady(); } catch(e) {}
            }
            try { await initGameAssets(); } catch(e) { ytLoaded = true; }
            if (YT && YT.game && typeof YT.game.gameReady === 'function') {
                try {
                    YT.game.gameReady();
                    ytReady = true;
                    if (window._game) window._game.setYtReady(true);
                } catch(e) {}
            }
        });
    })();
    </script>
