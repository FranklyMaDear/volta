<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Drop 2048 · Starfield Pure</title>
<style>
  :root{ --bg:#0B0C10; --accent:#F2A03D; --good:#7FA653; --cream:#F7EFDC; }
  body{background:var(--bg); margin:0; font-family:sans-serif; overflow:hidden;}
  #game{position:fixed; inset:0; z-index:0;}
  
  /* HUD - Εμφάνιση Σκορ και Shop */
  .hud{position:fixed; top:10px; left:10px; right:10px; display:flex; justify-content:space-between; z-index:10;}
  #btnShop{padding:10px 20px; background:var(--accent); border:none; border-radius:15px; font-weight:bold; cursor:pointer;}
  
  /* Powerbar - Μεταφορά Αριστερά */
  .powerbar{position:fixed; bottom:20px; left:10px; display:flex; gap:10px; z-index:10;}
  .pbtn{width:55px; height:55px; border-radius:15px; background:var(--good); border:none; color:white; font-size:22px;}
  
  /* Shop UI */
  .overlay{position:fixed; inset:0; background:rgba(0,0,0,0.9); display:flex; align-items:center; justify-content:center; z-index:50;}
  .card{background:var(--cream); padding:20px; border-radius:20px; width:90%; max-width:400px; text-align:center;}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div class="hud">
  <div style="color:white">Σκορ: <span id="score">0</span></div>
  <button id="btnShop">🛒 Κατάστημα</button>
</div>

<div class="powerbar">
  <button class="pbtn">🧲</button>
  <button class="pbtn">🔨</button>
  <button class="pbtn">🔄</button>
</div>

<div id="shopModal" class="overlay hidden">
  <div class="card">
    <h2>Κατάστημα</h2>
    <div id="shopContainer" style="margin: 20px 0;">Εδώ θα μπαίνουν τα αντικείμενα.</div>
    <button onclick="document.getElementById('shopModal').classList.add('hidden')">Κλείσιμο</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  let scene, camera, renderer, aziramPet;

  function init() {
    // 1. Scene Setup
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
    camera.position.z = 10;
    
    renderer = new THREE.WebGLRenderer({canvas: document.getElementById('game'), antialias: true});
    renderer.setSize(innerWidth, innerHeight);
    
    // 2. AZIRAM (Θέση κάτω δεξιά)
    aziramPet = new THREE.Group();
    let body = new THREE.Mesh(new THREE.SphereGeometry(0.7), new THREE.MeshPhongMaterial({color: 0x33ffaa}));
    aziramPet.add(body);
    aziramPet.position.set(2.5, -3.5, 0); 
    scene.add(aziramPet);
    
    // 3. Φωτισμός
    scene.add(new THREE.DirectionalLight(0xffffff, 1));
    
    function animate() {
      aziramPet.rotation.y += 0.02;
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    animate();
  }

  document.getElementById('btnShop').onclick = () => {
    document.getElementById('shopModal').classList.remove('hidden');
  };

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  init();
</script>
</body>
</html>
