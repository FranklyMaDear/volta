<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Drop 2048 · FranklyGames Edition</title>
    <style>
        :root {
            --bg: #0B0C10;
            --panel: #8C6A4F;
            --panel-deep: #4A3423;
            --cream: #F7EFDC;
            --ink: #2F1B0D;
            --accent: #F2A03D;
            --good: #7FA653;
            --coin: #F5C542;
            --red: #C2542F;
            --blue: #4A7DBF;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html,
        body {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: "Baloo 2", system-ui, sans-serif;
            color: var(--ink);
            user-select: none;
            touch-action: none;
        }
        #game {
            position: fixed;
            inset: 0;
            display: block;
            z-index: 0;
        }

        /* ===== HUD (TOP) ===== */
        .hud {
            position: fixed;
            left: 0;
            right: 0;
            top: 0;
            padding: 6px 10px 4px;
            display: flex;
            gap: 6px;
            align-items: center;
            pointer-events: none;
            z-index: 5;
            background: rgba(11, 12, 16, 0.75);
            backdrop-filter: blur(4px);
            border-bottom: 2px solid rgba(255, 255, 255, 0.08);
            height: 48px;
        }
        .chip {
            background: var(--panel-deep);
            color: var(--cream);
            border-radius: 12px;
            padding: 4px 10px;
            font-weight: 800;
            font-size: 13px;
            box-shadow: 0 3px 0 rgba(0, 0, 0, .3);
            display: flex;
            align-items: center;
            gap: 4px;
            pointer-events: auto;
            line-height: 1.2;
        }
        .chip small {
            font-weight: 600;
            opacity: .75;
            font-size: 9px;
            display: block;
            line-height: 1;
        }
        .chip .big {
            font-size: 15px;
            line-height: 1.1;
        }
        .spacer {
            flex: 1;
        }
        .hud-btn {
            background: var(--accent);
            border: none;
            cursor: pointer;
            color: #fff;
            border-radius: 12px;
            padding: 4px 12px;
            font-weight: 800;
            font-size: 14px;
            box-shadow: 0 3px 0 #b8742a;
            pointer-events: auto;
            transition: transform .08s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 4px;
            line-height: 1.3;
        }
        .hud-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #b8742a;
        }
        .hud-btn.home-btn {
            background: var(--blue);
            box-shadow: 0 3px 0 #2d5a7a;
        }
        .hud-btn.home-btn:active {
            box-shadow: 0 1px 0 #2d5a7a;
        }

        /* ===== POWERUPS (BELOW HUD) ===== */
        .powerbar {
            position: fixed;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            gap: 10px;
            z-index: 5;
            background: rgba(11, 12, 16, 0.6);
            backdrop-filter: blur(4px);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            pointer-events: none;
        }
        .pbtn {
            pointer-events: auto;
            border: none;
            cursor: pointer;
            width: 64px;
            height: 64px;
            border-radius: 18px;
            background: var(--good);
            box-shadow: 0 4px 0 #5c7a3a;
            color: #fff;
            font-size: 28px;
            line-height: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0px;
            font-family: inherit;
            transition: transform .08s;
        }
        .pbtn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #5c7a3a;
        }
        .pbtn .cost {
            font-size: 9px;
            font-weight: 800;
            background: rgba(0, 0, 0, .25);
            border-radius: 6px;
            padding: 1px 7px;
            margin-top: -2px;
        }
        .pbtn.armed {
            outline: 3px solid var(--accent);
            background: var(--red);
            box-shadow: 0 4px 0 #8f3c20;
        }
        .pbtn.listening {
            outline: 3px solid #ff5555;
            background: var(--red);
            box-shadow: 0 4px 0 #8f3c20;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.08);
            }
        }

        /* ===== MISSION BAR (below powerups, 3D effect) ===== */
        #missionBar {
            position: fixed;
            top: 118px;
            left: 50%;
            transform: translate(-50%, -120%) perspective(600px) rotateX(15deg);
            transition: transform .55s cubic-bezier(.34, 1.5, .64, 1);
            z-index: 30;
            pointer-events: auto;
            cursor: pointer;
            background: var(--cream);
            border: 3px solid var(--panel-deep);
            border-top: none;
            color: var(--ink);
            border-radius: 0 0 20px 20px;
            padding: 8px 20px 6px;
            font-weight: 700;
            font-size: 14px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, .6);
            white-space: nowrap;
            letter-spacing: 0.3px;
            transform-origin: top center;
        }
        #missionBar.show {
            transform: translate(-50%, 0) perspective(600px) rotateX(0deg);
        }
        #missionBar b {
            color: var(--red);
        }

        /* ===== TOAST ===== */
        #toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            pointer-events: none;
            background: var(--panel-deep);
            color: var(--cream);
            font-weight: 700;
            font-size: 14px;
            border-radius: 14px;
            padding: 8px 18px;
            opacity: 0;
            transition: opacity .25s;
            white-space: nowrap;
            box-shadow: 0 4px 12px rgba(0, 0, 0, .4);
        }

        /* ===== SPEECH BUBBLE ===== */
        #speech {
            position: fixed;
            z-index: 10;
            pointer-events: none;
            font-weight: 800;
            font-size: 20px;
            background: #ffffff;
            color: #333;
            padding: 8px 18px;
            border-radius: 20px;
            border: 3px solid var(--panel-deep);
            box-shadow: 0 4px 0 var(--panel-deep);
            transform: translate(-50%, -120%);
            opacity: 0;
            transition: opacity 0.2s ease-in-out, transform 0.2s ease-in-out;
            max-width: 70vw;
            white-space: normal;
            text-align: center;
        }
        #speech.visible {
            opacity: 1;
            transform: translate(-50%, -140%);
        }
        #speech::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -10px;
            border-width: 12px;
            border-style: solid;
            border-color: #ffffff transparent transparent transparent;
            filter: drop-shadow(0 4px 0 var(--panel-deep));
        }

        /* ===== SHOP ===== */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(11, 12, 16, .85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            backdrop-filter: blur(4px);
        }
        .card {
            background: var(--cream);
            border: 4px solid var(--panel-deep);
            border-radius: 26px;
            padding: 20px 18px;
            width: min(400px, 92vw);
            max-height: 92vh;
            text-align: center;
            box-shadow: 0 10px 0 rgba(0, 0, 0, .4);
            animation: pop .25s cubic-bezier(.34, 1.56, .64, 1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        @keyframes pop {
            from {
                transform: scale(.7);
                opacity: 0;
            }
        }
        .card h2 {
            font-size: 22px;
            margin-bottom: 6px;
            font-weight: 800;
            flex-shrink: 0;
        }
        .shop-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 8px;
            border-bottom: 2px solid rgba(0, 0, 0, 0.08);
            padding-bottom: 8px;
            overflow-x: auto;
            flex-shrink: 0;
            flex-wrap: nowrap;
        }
        .shop-tab {
            flex: 0 0 auto;
            padding: 6px 10px;
            font-weight: 800;
            font-size: 12px;
            border-radius: 10px;
            background: #E4D7BC;
            color: #8C6A4F;
            border: none;
            cursor: pointer;
            white-space: nowrap;
            transition: .1s;
        }
        .shop-tab.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 3px 0 #b8742a;
            transform: translateY(-2px);
        }
        .pet-subtabs {
            display: none;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 8px;
            background: #f0e5d1;
            padding: 6px 8px;
            border-radius: 10px;
            justify-content: center;
            flex-shrink: 0;
        }
        .pet-subtabs.active {
            display: flex;
        }
        .pet-subtab {
            padding: 4px 8px;
            font-weight: 800;
            font-size: 10px;
            border-radius: 8px;
            background: var(--red);
            color: #fff;
            border: none;
            cursor: pointer;
            transition: .1s;
        }
        .pet-subtab.active {
            background: #5c7a3a;
            box-shadow: 0 2px 0 #3a4d25;
            transform: translateY(-1px);
        }
        .shop-items {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            overflow-y: auto;
            padding-right: 4px;
            flex: 1;
            min-height: 0;
        }
        .shop-items::-webkit-scrollbar {
            width: 4px;
        }
        .shop-items::-webkit-scrollbar-thumb {
            background: var(--panel-deep);
            border-radius: 4px;
        }
        .shop-item {
            background: #E4D7BC;
            border: 3px solid #8C6A4F;
            border-radius: 14px;
            padding: 8px 6px;
            cursor: pointer;
            transition: transform 0.1s;
            text-align: center;
        }
        .shop-item:active {
            transform: scale(0.95);
        }
        .shop-item h3 {
            font-size: 13px;
            margin-bottom: 3px;
            color: var(--ink);
            line-height: 1.2;
        }
        .shop-item .price {
            font-weight: 800;
            color: #b8742a;
            font-size: 12px;
        }
        .shop-item.owned .price {
            color: var(--good);
        }
        .shop-item.equipped {
            border-color: var(--accent);
            background: #FFF5E1;
            box-shadow: 0 0 10px rgba(242, 160, 61, 0.4);
        }
        .shop-item.in-room {
            border-color: var(--blue);
            background: #E1F0FF;
        }
        .btn {
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-weight: 800;
            font-size: 16px;
            color: #fff;
            background: var(--accent);
            border-radius: 16px;
            padding: 10px 24px;
            box-shadow: 0 4px 0 #b8742a;
            transition: transform .08s;
            margin-top: 10px;
            width: 100%;
            flex-shrink: 0;
        }
        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #b8742a;
        }
        .btn.secondary {
            background: var(--blue);
            box-shadow: 0 4px 0 #2d5a7a;
        }
        .btn.secondary:active {
            box-shadow: 0 1px 0 #2d5a7a;
        }
        .hidden {
            display: none !important;
        }

        /* ===== HOME / TAMAGOTCHI (FULL SCREEN) ===== */
        .home-overlay {
            position: fixed;
            inset: 0;
            background: rgba(11, 12, 16, .92);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            backdrop-filter: blur(6px);
            padding: 0;
        }
        .home-card {
            background: var(--cream);
            border: none;
            border-radius: 0;
            width: 100vw;
            height: 100vh;
            max-width: 100%;
            max-height: 100%;
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: pop .25s cubic-bezier(.34, 1.56, .64, 1);
        }

        .home-stats {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
            flex-shrink: 0;
            flex-wrap: wrap;
            justify-content: center;
        }
        .home-stat {
            background: #E4D7BC;
            border-radius: 12px;
            padding: 4px 8px;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            min-width: 60px;
            flex: 1;
        }
        .home-stat .bar {
            width: 100%;
            height: 6px;
            background: #c9b899;
            border-radius: 6px;
            overflow: hidden;
        }
        .home-stat .bar>div {
            height: 100%;
            background: var(--good);
            border-radius: 6px;
            transition: width .3s;
        }
        .home-stat .bar>div.low {
            background: var(--red);
        }
        .home-stat .bar>div.warn {
            background: var(--accent);
        }

        .home-avatar-area {
            flex-shrink: 0;
            text-align: center;
            margin: 4px 0 8px;
        }
        .home-avatar-area #homeAvatarContainer {
            display: inline-block;
            position: relative;
            width: 120px;
            height: 140px;
            background: transparent;
            transition: transform 0.3s;
        }
        /* Avatar Animations - same as game */
        .av-bounce {
            animation: avBounce 0.6s infinite alternate;
        }
        @keyframes avBounce {
            0% { transform: translateY(0px) scale(1,1); }
            100% { transform: translateY(-20px) scale(1.05,0.95); }
        }
        .av-sleep {
            animation: avSleep 2s infinite alternate;
        }
        @keyframes avSleep {
            0% { transform: rotate(0deg) scale(1,1); }
            100% { transform: rotate(6deg) scale(0.95,1.05); }
        }
        .av-walk {
            animation: avWalk 0.8s infinite alternate;
        }
        @keyframes avWalk {
            0% { transform: translateX(-15px) scale(1,1); }
            100% { transform: translateX(15px) scale(1,1); }
        }
        .av-idle {
            animation: avIdle 2s infinite alternate;
        }
        @keyframes avIdle {
            0% { transform: translateY(0px) scale(1,1); }
            100% { transform: translateY(-5px) scale(1.02,0.98); }
        }
        .av-hop {
            animation: avHop 0.4s infinite alternate;
        }
        @keyframes avHop {
            0% { transform: translateY(0px) scale(1,1); }
            100% { transform: translateY(-25px) scale(1.1,0.9); }
        }

        .home-avatar-area .av-body {
            width: 90px;
            height: 100px;
            border-radius: 50%;
            margin: 20px auto 0;
            position: relative;
            transition: background 0.3s;
            box-shadow: 0 6px 18px rgba(0,0,0,0.25);
        }
        .home-avatar-area .av-face {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 34px;
            line-height: 1;
        }
        .home-avatar-area .av-head {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 38px;
            line-height: 1;
        }
        .home-avatar-area .av-clothes {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 36px;
            line-height: 1;
        }
        .home-avatar-area .av-prop {
            position: absolute;
            right: -15px;
            bottom: 30px;
            font-size: 34px;
            line-height: 1;
        }

        .room-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        .room-tab {
            flex: 1;
            padding: 6px 4px;
            font-weight: 800;
            font-size: 12px;
            border-radius: 10px;
            background: #E4D7BC;
            color: #8C6A4F;
            border: none;
            cursor: pointer;
            transition: .1s;
            white-space: nowrap;
        }
        .room-tab.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 3px 0 #b8742a;
            transform: translateY(-2px);
        }

        .room-view {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
            background: #f0e5d1;
            border-radius: 16px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 3px solid #8C6A4F;
            margin-bottom: 6px;
        }
        .room-panel {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            gap: 6px;
        }
        .room-panel.active {
            display: flex;
        }
        .room-panel .room-icon {
            font-size: 48px;
        }
        .room-panel .room-label {
            font-weight: 700;
            font-size: 14px;
            color: var(--ink);
        }
        .room-panel .furniture-display {
            font-size: 24px;
            font-weight: 600;
            color: var(--panel-deep);
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .room-panel .action-btn {
            border: none;
            font-family: inherit;
            font-weight: 800;
            font-size: 14px;
            color: #fff;
            background: var(--good);
            border-radius: 14px;
            padding: 8px 20px;
            box-shadow: 0 3px 0 #5c7a3a;
            cursor: pointer;
            transition: transform .08s;
            margin-top: 4px;
        }
        .room-panel .action-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #5c7a3a;
        }
        .room-panel .action-btn:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: 0 3px 0 #5c7a3a;
            cursor: not-allowed;
        }
        .room-panel .cooldown {
            font-size: 10px;
            color: var(--red);
            font-weight: 600;
        }
        .room-panel.furnished {
            border-color: var(--accent);
        }

        .home-footer {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .home-footer .btn {
            margin-top: 0;
            flex: 1;
        }

        /* ===== WIN / LOSE MODALS ===== */
        .win-lose-overlay {
            z-index: 25;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .hud {
                height: 44px;
                padding: 4px 6px;
                gap: 4px;
            }
            .chip {
                font-size: 11px;
                padding: 2px 6px;
                border-radius: 8px;
            }
            .chip .big {
                font-size: 13px;
            }
            .hud-btn {
                font-size: 12px;
                padding: 2px 8px;
                border-radius: 8px;
            }
            .powerbar {
                top: 46px;
                padding: 6px 10px;
                gap: 6px;
                border-radius: 14px;
            }
            .pbtn {
                width: 52px;
                height: 52px;
                font-size: 22px;
                border-radius: 14px;
            }
            .pbtn .cost {
                font-size: 7px;
            }
            #missionBar {
                top: 104px;
                font-size: 11px;
                padding: 5px 12px 4px;
                border-radius: 0 0 14px 14px;
            }
            .home-stat {
                font-size: 10px;
                min-width: 40px;
                padding: 2px 4px;
            }
            .home-stat .bar {
                height: 4px;
            }
            .home-avatar-area #homeAvatarContainer {
                width: 90px;
                height: 110px;
            }
            .home-avatar-area .av-body {
                width: 70px;
                height: 80px;
                margin: 12px auto 0;
            }
            .room-tab {
                font-size: 10px;
                padding: 4px 2px;
            }
            .room-panel .room-icon {
                font-size: 36px;
            }
            .card {
                padding: 14px 12px;
                width: 96vw;
                border-radius: 18px;
            }
            .shop-items {
                gap: 5px;
            }
            .shop-item h3 {
                font-size: 11px;
            }
            #speech {
                font-size: 16px;
                padding: 6px 14px;
                border-radius: 16px;
            }
            #toast {
                font-size: 12px;
                padding: 6px 14px;
                bottom: 70px;
            }
        }
        @media (max-width: 380px) {
            .hud-btn {
                font-size: 10px;
                padding: 2px 5px;
            }
            .chip {
                font-size: 9px;
                padding: 2px 4px;
            }
            .chip .big {
                font-size: 11px;
            }
            .pbtn {
                width: 44px;
                height: 44px;
                font-size: 18px;
            }
            #missionBar {
                font-size: 9px;
                padding: 3px 8px 2px;
            }
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>

    <!-- ===== HUD (TOP) ===== -->
    <div class="hud">
        <div class="chip"><div><small>ΕΠΙΠΕΔΟ</small><span class="big" id="hudLevel">1</span></div></div>
        <div class="chip"><div><small>ΣΚΟΡ</small><span class="big" id="hudScore">0</span></div></div>
        <div class="spacer"></div>
        <button class="hud-btn home-btn" id="btnHome">🏠 Σπίτι</button>
        <button class="hud-btn" id="btnShop">🛒 Κατάστημα</button>
        <div class="chip">🪙 <span class="big" id="hudCoins">0</span></div>
    </div>

    <!-- ===== POWERUPS (BELOW HUD) ===== -->
    <div class="powerbar">
        <button class="pbtn" id="btnMagnet">🧲<span class="cost">Δωρεάν</span></button>
        <button class="pbtn" id="btnHammer">🔨<span class="cost">Δωρεάν</span></button>
        <button class="pbtn" id="btnShuffle">🔄<span class="cost">Δωρεάν</span></button>
        <button class="pbtn" id="btnMic">🎤<span class="cost">Μίλα</span></button>
    </div>

            const audioCtx = new(window.AudioContext || window.webkitAudioContext)();

            function playSound(type) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                if (type === 'win') { playWinSound(audioCtx); return; }
                const s = save.equippedSound || 'snd_default';
                const now = audioCtx.currentTime;

                function tone(freq0, freq1, dur, wave, vol, delay) {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.connect(g);
                    g.connect(audioCtx.destination);
                    o.type = wave;
                    const t0 = now + (delay || 0);
                    o.frequency.setValueAtTime(freq0, t0);
                    if (freq1) o.frequency.exponentialRampToValueAtTime(freq1, t0 + dur);
                    g.gain.setValueAtTime(vol, t0);
                    g.gain.exponentialRampToValueAtTime(0.01, t0 + dur);
                    o.start(t0);
                    o.stop(t0 + dur + 0.05);
                }
                if (s === 'snd_default') {
                    if (type === 'drop') tone(800, 400, 0.1, 'sine', 0.2);
                    else tone(300, 800, 0.2, 'sine', 0.3);
                } else if (s === 'snd_bass') {
                    if (type === 'drop') tone(150, 60, 0.18, 'sawtooth', 0.3);
                    else { tone(70, 200, 0.3, 'sawtooth', 0.35);
                        tone(140, 400, 0.3, 'sine', 0.2); }
                } else if (s === 'snd_bell') {
                    if (type === 'drop') { tone(880, null, 0.35, 'sine', 0.15);
                        tone(1760, null, 0.25, 'sine', 0.06); } else { tone(1046, null, 0.55, 'sine', 0.2);
                        tone(2093, null, 0.4, 'sine', 0.08);
                        tone(1568, null, 0.45, 'sine', 0.06, 0.05); }
                } else if (s === 'snd_echo') {
                    const f = type === 'drop' ? 600 : 900;
                    for (let i = 0; i < 3; i++) tone(f, f * 0.8, 0.12, 'sine', 0.22 / (i + 1), i * 0.13);
                } else if (s === 'snd_retro') {
                    if (type === 'drop') tone(440, 220, 0.08, 'square', 0.12);
                    else { tone(523, null, 0.07, 'square', 0.12);
                        tone(659, null, 0.07, 'square', 0.12, 0.07);
                        tone(784, null, 0.1, 'square', 0.12, 0.14); }
                } else if (s === 'snd_pop') {
                    if (type === 'drop') tone(1200, 300, 0.06, 'sine', 0.3);
                    else { tone(400, 1600, 0.09, 'sine', 0.32);
                        tone(600, 2000, 0.08, 'sine', 0.15, 0.06); }
                } else if (s === 'snd_laser') {
                    if (type === 'drop') tone(1800, 200, 0.15, 'sawtooth', 0.13);
                    else tone(200, 2200, 0.2, 'sawtooth', 0.17);
                } else if (s === 'snd_magic') {
                    const base = type === 'drop' ? 700 : 950;
                    for (let i = 0; i < 4; i++) tone(base + i * 180, null, 0.16, 'triangle', 0.11, i * 0.05);
                }
            }

            function playWinSound(ctx) {
                for (let i = 0; i < 4; i++) {
                    setTimeout(() => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(600 + (i * 250), ctx.currentTime);
                        gain.gain.setValueAtTime(0.15, ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
                        osc.start();
                        osc.stop(ctx.currentTime + 0.2);
                    }, i * 100);
                }
            }

            let isTalking = false;

            function speak(text) {
                try {
                    if (!('speechSynthesis' in window)) return;
                    speechSynthesis.cancel();
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = 'el-GR';
                    const voices = speechSynthesis.getVoices();
                    const gr = voices.find(v => v.lang && v.lang.toLowerCase().startsWith('el'));
                    if (gr) u.voice = gr;
                    u.rate = 1.05;
                    u.pitch = 1.5;
                    u.onstart = () => { isTalking = true; };
                    u.onend = () => { isTalking = false; };
                    u.onerror = () => { isTalking = false; };
                    speechSynthesis.speak(u);
                } catch (e) { isTalking = false; }
            }
            if ('speechSynthesis' in window) {
                speechSynthesis.getVoices();

            }

            function initMic() {
                const btn = document.getElementById('btnMic');
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SR) { btn.onclick = () => toast("Το 🎤 δεν υποστηρίζεται εδώ"); return; }
                btn.onclick = () => {
                    if (isListening) { try { recognition.stop(); } catch (e) {} return; }
                    recognition = new SR();
                    recognition.lang = 'el-GR';
                    recognition.interimResults = false;
                    recognition.maxAlternatives = 1;
                    recognition.onstart = () => { isListening = true;
                        btn.classList.add('listening');

                    recognition.onresult = (e) => {
                        const txt = e.results[0][0].transcript;
                        if (txt) {
                            const reply = answerQuestion(txt);
                            aziramReactionTime = 1.2;
                            showSpeech(reply, Math.max(2800, reply.length * 80));

                    recognition.onerror = () => toast("Δεν σε άκουσα 😅 Ξαναδοκίμασε");
                    recognition.onend = () => { isListening = false;

            const particles = [];

            const pMats = {
                'flame': new THREE.MeshBasicMaterial({ color: 0xff4500 }),
                'sparkle': new THREE.MeshBasicMaterial({ color: 0xffffff }),
                'smoke': new THREE.MeshBasicMaterial({ color: 0x888888, transparent: true, opacity: 0.7 }),
                'explode': new THREE.MeshBasicMaterial({ color: 0xffa500 }),
                'confetti': [0xff0000, 0x00ff00, 0x0000ff, 0xffff00].map(c => new THREE.MeshBasicMaterial({ color: c }))
            };

            function spawnParticle(x, y, z, type) {
                let mat = pMats[type];
                if (Array.isArray(mat)) mat = mat[Math.floor(Math.random() * mat.length)];
                const p = new THREE.Mesh(pGeo, mat);
                p.position.set(x, y, z);
                let vx = (Math.random() - 0.5) * 6,
                    vy = (Math.random() - 0.5) * 6,
                    vz = (Math.random() - 0.5) * 6;
                if (type === 'flame' || type === 'smoke') { vx *= 0.2;
                    vy = -Math.random() * 2 - 0.5;
                    vz = 0; }
                if (type === 'confetti') { p.scale.set(0.15, 0.15, 0.15);
                    vy = Math.random() * 5; }
                scene.add(p);
                particles.push({ mesh: p, life: 1.0, vx, vy, vz, type });
            }

            function spawnBurst(x, y, z, type, count) {
                for (let i = 0; i < count; i++) spawnParticle(x, y, z, type);
            }

            function updateParticles(dt) {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.life -= dt * (p.type === 'smoke' ? 1.5 : 2.5);
                    if (p.life <= 0) { scene.remove(p.mesh);
                        particles.splice(i, 1); } else {
                        p.mesh.position.x += p.vx * dt;
                        p.mesh.position.y += p.vy * dt;
                        p.mesh.position.z += p.vz * dt;
                        if (p.type === 'confetti') p.vy -= dt * 10;
                        p.mesh.scale.setScalar(p.life);
                        if (p.type === 'flame' || p.type === 'explode') p.mesh.material.color.setHSL(0.1 * p.life, 1, 0.5);
                    }
                }
            }

            let starField;

            function initStarfield() {
                const starCount = 8000;
                const starGeo = new THREE.BufferGeometry();
                const starPos = new Float32Array(starCount * 3);
                for (let i = 0; i < starCount * 3; i += 3) {
                    starPos[i] = (Math.random() - 0.5) * 500;
                    starPos[i + 1] = (Math.random() - 0.5) * 500;
                    starPos[i + 2] = (Math.random() - 0.5) * 300;
                }
                starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
                starField = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.25,
                    blending: THREE.AdditiveBlending, depthWrite: false }));
                starField.position.z = -50;
                scene.add(starField);
            }

            function updateStarfield(speed) {
                if (!starField) return;
                const positions = starField.geometry.attributes.position.array;
                for (let i = 2; i < positions.length; i += 3) {
                    positions[i] += speed;
                    if (positions[i] > 40) { positions[i] = -120;
                        positions[i - 2] = (Math.random() - 0.5) * 500;
                        positions[i - 1] = (Math.random() - 0.5) * 500; }
                }
                starField.geometry.attributes.position.needsUpdate = true;
            }

            function buildSlime() {
                slimeGroup = new THREE.Group();
                const items = [];
                [0xff6699, 0xff3366, 0xcc44aa].forEach(col => {
                    const h = new THREE.Mesh(new THREE.SphereGeometry(0.09, 10, 10), new THREE.MeshPhongMaterial(
                        { color: col, shininess: 150 }));
                    h.scale.set(1, 0.95, 0.55);
                    items.push(h);
                });
                [0xffdd55, 0x66ddff, 0x88ffcc].forEach(col => {
                    const s = new THREE.Mesh(new THREE.OctahedronGeometry(0.08), new THREE.MeshPhongMaterial(
                        { color: col, shininess: 150 }));
                    items.push(s);
                });
                const sprinkleColors = [0xffaacc, 0xaaddff, 0xffeeaa, 0xccffaa, 0xddaaff];
                for (let i = 0; i < 8; i++) {
                    const sp = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.1, 6), new THREE
                        .MeshBasicMaterial({ color: sprinkleColors[i % 5] }));
                    sp.rotation.set(Math.random() * 3, Math.random() * 3, Math.random() * 3);
                    items.push(sp);
                }
                const glitterMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                for (let i = 0; i < 22; i++) {
                    items.push(new THREE.Mesh(new THREE.SphereGeometry(0.018, 6, 6), glitterMat));
                }
                items.forEach(m => {
                    const r = 0.5 * Math.cbrt(Math.random());
                    const th = Math.random() * Math.PI * 2;
                    const ph = Math.acos(2 * Math.random() - 1);
                    m.position.set(
                        r * Math.sin(ph) * Math.cos(th) * 0.9,
                        r * Math.sin(ph) * Math.sin(th) * 1.05,
                        r * Math.cos(ph) * 0.8
                    );
                    m.userData.baseY = m.position.y;
                    m.userData.ph = Math.random() * 10;
                    slimeGroup.add(m);
                });
                slimeGroup.userData.onUpdate = (t) => {
                    slimeGroup.rotation.y = Math.sin(t * 0.0004) * 0.35;
                    slimeGroup.children.forEach(m => {
                        m.position.y = m.userData.baseY + Math.sin(t * 0.001 + m.userData.ph) * 0.03;
                        m.rotation.y += 0.006;
                    });
                };
                aziramCore.add(slimeGroup);
            }

            // ---- Tamagotchi Stats ----

            function updateTamagotchiStats() {
                const now = Date.now();
                const elapsed = (now - save.lastUpdate) / 1000;
                if (elapsed <= 0) return;

                const hour = new Date().getHours();

                // ENERGY: sleep 22:00-08:00, awake 08:00-22:00
                if (hour >= 8 && hour < 22) {
                    save.energy = Math.max(0, (save.energy || 50) - elapsed * 0.25);
                } else {
                    save.energy = Math.min(100, (save.energy || 50) + elapsed * 0.45);
                }

                // HUNGER: spikes at breakfast (7-8), lunch (12-13), dinner (19-20)
                let hungerRate = 0.15;
                if (hour >= 7 && hour <= 8) hungerRate = 0.9;
                else if (hour >= 12 && hour <= 13) hungerRate = 0.9;
                else if (hour >= 19 && hour <= 20) hungerRate = 0.9;
                save.hunger = Math.min(100, (save.hunger || 50) + elapsed * hungerRate);

                // CLEANLINESS: gradual decrease
                save.cleanliness = Math.max(0, (save.cleanliness || 80) - elapsed * 0.12);

                // TOILET: fills up only when awake (3 hours to fill = 100 / 10800 per sec)
                if (hour >= 8 && hour < 22) {
                    save.toilet = Math.min(100, (save.toilet || 0) + elapsed * (100 / 10800));
                } else {
                    save.toilet = Math.max(0, (save.toilet || 0) - elapsed * 0.3);
                }

                save.lastUpdate = now;
                persist();
                renderHomeStats();
                renderHomeAvatar();
            }

            function cellPos(c, r) {
                return {
                    x: -BOARD_W / 2 + CELL / 2 + c * (CELL + GAP),
                    y: BOARD_H / 2 - CELL / 2 - r * (CELL + GAP)
                };
