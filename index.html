<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Connect Four - Galactic Edition</title>
    <meta name="theme-color" content="#0a0e27">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://bridge.playgama.com/v1/stable/playgama-bridge.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: #000010; overflow: hidden; position: relative; touch-action: manipulation; }
        #starCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .shooting-star { position: fixed; width: 3px; height: 80px; background: linear-gradient(to bottom, rgba(255,255,255,0.9), rgba(255,255,255,0)); border-radius: 50%; z-index: 1; pointer-events: none; animation: shoot linear forwards; transform-origin: top center; }
        @keyframes shoot { 0% { opacity: 1; transform: translate(0,0) rotate(-35deg); } 70% { opacity: 1; } 100% { opacity: 0; transform: translate(-400px,600px) rotate(-35deg); } }
        .nebula-particle { position: fixed; border-radius: 50%; z-index: 0; pointer-events: none; animation: nebulaFloat linear infinite; filter: blur(2px); }
        @keyframes nebulaFloat { 0% { transform: translate(0,0) scale(1); opacity: 0.6; } 50% { transform: translate(30px,-40px) scale(1.5); opacity: 0.2; } 100% { transform: translate(-20px,20px) scale(1); opacity: 0.6; } }
        .game-wrapper { display: flex; width: 100%; min-height: 100vh; justify-content: center; align-items: center; padding: 10px; position: relative; z-index: 50; }
        .game-container { text-align: center; background: rgba(20,20,35,0.9); border-radius: 20px; padding: 20px 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); width: 100%; max-width: 500px; margin: 10px; border: 2px solid rgba(132,204,22,0.3); backdrop-filter: blur(8px); }
        h1 { color: #84cc16; margin-bottom: 15px; font-size: 2rem; font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 20px rgba(132,204,22,0.5); }
        .players-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 5px; gap: 5px; }
        .player { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; min-width: 80px; }
        .player-disc { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 3px 6px rgba(0,0,0,0.3); }
        .player-disc.red { background: radial-gradient(circle at 30% 30%, #ff6b6b, #c0392b); }
        .player-disc.yellow { background: radial-gradient(circle at 30% 30%, #ffd93d, #f39c12); }
        .player span { font-size: 0.9rem; font-weight: bold; color: #e8e8ed; }
        .player.active span { color: #84cc16; font-weight: 800; }
        .scores { flex: 1; display: flex; justify-content: center; align-items: center; }
        .scores .score { font-size: 1.6rem; font-weight: bold; color: #e8e8ed; background: rgba(255,255,255,0.05); padding: 8px 16px; border-radius: 20px; min-width: 80px; border: 1px solid rgba(132,204,22,0.2); }
        .board-container { background: linear-gradient(145deg, #1976d2, #1565c0); padding: 15px; border-radius: 15px; box-shadow: inset 0 0 20px rgba(0,0,0,0.3), 0 6px 15px rgba(0,0,0,0.4); margin: 15px 0; position: relative; width: 100%; aspect-ratio: 7/6; border: 3px solid #0d47a1; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .board { display: grid; grid-template-columns: repeat(7, 1fr); grid-template-rows: repeat(6, 1fr); gap: 6px; position: relative; z-index: 1; height: 95%; width: 95%; padding: 4px; }
        .slot { background: linear-gradient(145deg, #1976d2, #0d47a1); border-radius: 50%; cursor: pointer; position: relative; transition: all 0.2s ease; box-shadow: inset 0 -3px 6px rgba(0,0,0,0.6), inset 0 3px 6px rgba(255,255,255,0.1), 0 2px 4px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; border: 1px solid #0d47a1; }
        .slot:hover, .slot:active { background: linear-gradient(145deg, #1565c0, #0a3d91); transform: scale(1.05); }
        .disc { width: 85%; height: 85%; border-radius: 50%; box-shadow: inset 0 -4px 8px rgba(0,0,0,0.5), inset 0 2px 4px rgba(255,255,255,0.3), 0 3px 6px rgba(0,0,0,0.4); border: 2px solid rgba(255,255,255,0.4); position: relative; z-index: 2; opacity: 0; transform: translateY(-500px); }
        .disc::before { content: ''; position: absolute; top: 15%; left: 15%; right: 15%; bottom: 15%; background: rgba(255,255,255,0.25); border-radius: 50%; filter: blur(1px); z-index: 3; }
        .disc.red { background: radial-gradient(circle at 35% 35%, #ff5252, #c62828); opacity: 1; }
        .disc.yellow { background: radial-gradient(circle at 35% 35%, #ffeb3b, #f9a825); opacity: 1; }
        .disc.winner { animation: discPulse 1s infinite; }
        @keyframes discDrop { 0% { transform: translateY(-500px); opacity: 0; } 60% { transform: translateY(20px); opacity: 1; } 80% { transform: translateY(-8px); opacity: 1; } 100% { transform: translateY(0); opacity: 1; } }
        @keyframes discPulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
        .status { margin: 15px 0; font-size: 1.1rem; font-weight: 700; color: #e8e8ed; min-height: 25px; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 10px; border: 1px solid rgba(132,204,22,0.2); text-align: center; }
        .game-buttons { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 15px; padding: 0 5px; flex-wrap: wrap; }
        .game-btn { background: linear-gradient(135deg, #ff4081, #c51162); border: 2px solid #ff69b4; color: white; padding: 12px 20px; font-size: 0.9rem; border-radius: 40px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 0 #880e4f, 0 6px 12px rgba(0,0,0,0.4); font-family: inherit; font-weight: 700; flex: 1; min-width: 120px; max-width: 160px; }
        .game-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #880e4f; }
        .game-btn:disabled { opacity: 0.5; pointer-events: none; }
        .game-btn.new-game { background: linear-gradient(135deg, #84cc16, #65a30d); border: 2px solid #a3e635; box-shadow: 0 4px 0 #4d7c0f, 0 6px 12px rgba(0,0,0,0.4); }
        .game-btn.small-btn { background: linear-gradient(135deg, #f39c12, #d35400); border: 2px solid #f1c40f; box-shadow: 0 4px 0 #b9770e, 0 6px 12px rgba(0,0,0,0.4); font-size: 0.75rem; padding: 8px 12px; min-width: 80px; max-width: 120px; }
        @keyframes confettiFall { 0% { transform: translateY(-10px) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
        .confetti { position: fixed; width: 6px; height: 6px; top: -10px; animation: confettiFall 3s linear forwards; z-index: 200; border-radius: 50%; }
        .confetti:nth-child(1n) { background: #e74c3c; } .confetti:nth-child(2n) { background: #f1c40f; } .confetti:nth-child(3n) { background: #2ecc71; } .confetti:nth-child(4n) { background: #3498db; } .confetti:nth-child(5n) { background: #9b59b6; }
        .player.active .player-disc { transform: scale(1.15); }
        .ai-thinking { color: #fbbf24; font-weight: bold; }
        @media (max-width: 768px) { .game-container { padding: 15px 10px; margin: 5px; max-width: 95vw; } h1 { font-size: 1.6rem; } .board { gap: 5px; height: 92%; width: 92%; } .player-disc { width: 30px; height: 30px; } .scores .score { font-size: 1.3rem; padding: 6px 12px; } .game-btn { padding: 10px 15px; font-size: 0.85rem; } }
        @media (max-width: 480px) { .game-buttons { gap: 8px; } .game-btn { min-width: 100px; max-width: 130px; padding: 10px 12px; font-size: 0.8rem; } }
    </style>
</head>
<body>
    <canvas id="starCanvas"></canvas>

    <div class="game-wrapper" id="gameWrapper">
        <div class="game-container">
            <h1>🪐 CONNECT FOUR</h1>
            <div class="players-info">
                <div class="player" id="player1">
                    <div class="player-disc red"></div>
                    <span>You</span>
                </div>
                <div class="scores"><div class="score" id="scoreDisplay">0 - 0</div></div>
                <div class="player" id="player2">
                    <div class="player-disc yellow"></div>
                    <span>AI (Hard)</span>
                </div>
            </div>
            <div class="board-container"><div class="board" id="board"></div></div>
            <div class="status" id="status">Your turn</div>
            <div class="game-buttons">
                <button class="game-btn" id="restartBtn">Restart</button>
                <button class="game-btn new-game" id="newGameBtn">New Game</button>
                <button class="game-btn small-btn" id="toggleFirstBtn">🤖 AI First</button>
                <button class="game-btn small-btn" id="toggleDifficultyBtn">🧠 Hard</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            let bridge = null;

            // ---------- STARFIELD ----------
            const canvas = document.getElementById('starCanvas');
            const ctx = canvas.getContext('2d');
            let stars = [];
            function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            function createStars(count) {
                stars = [];
                for (let i = 0; i < count; i++) stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, radius: Math.random()*2.5+0.5, baseBrightness: Math.random()*0.7+0.3, twinkleSpeed: Math.random()*0.02+0.005, twinkleOffset: Math.random()*Math.PI*2, driftX: (Math.random()-0.5)*0.3, driftY: (Math.random()-0.5)*0.3 });
            }
            function drawStars(timestamp) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                stars.forEach(star => {
                    const twinkle = Math.sin(timestamp * star.twinkleSpeed + star.twinkleOffset) * 0.3 + 0.7;
                    const alpha = star.baseBrightness * twinkle;
                    ctx.beginPath(); ctx.arc(star.x, star.y, star.radius, 0, Math.PI*2); ctx.fillStyle = `rgba(255,255,255,${alpha})`; ctx.fill();
                    if (star.radius > 1.5) { ctx.beginPath(); ctx.arc(star.x, star.y, star.radius*2.5, 0, Math.PI*2); ctx.fillStyle = `rgba(180,200,255,${alpha*0.3})`; ctx.fill(); }
                    star.x += star.driftX; star.y += star.driftY;
                    if (star.x < 0) star.x = canvas.width; if (star.x > canvas.width) star.x = 0;
                    if (star.y < 0) star.y = canvas.height; if (star.y > canvas.height) star.y = 0;
                });
                requestAnimationFrame(drawStars);
            }
            function createShootingStar() {
                const star = document.createElement('div'); star.classList.add('shooting-star');
                star.style.left = Math.random()*80+'%'; star.style.top = Math.random()*40+'%';
                star.style.animationDuration = (Math.random()*1.5+1.5)+'s';
                document.body.appendChild(star); star.addEventListener('animationend', () => star.remove());
            }
            function scheduleShootingStar() { setTimeout(() => { createShootingStar(); scheduleShootingStar(); }, Math.random()*5000+3000); }
            function createNebulaParticles(count) {
                const colors = ['rgba(132,204,22,0.15)','rgba(25,118,210,0.15)','rgba(255,64,129,0.1)','rgba(156,39,176,0.12)','rgba(255,235,59,0.1)'];
                for (let i = 0; i < count; i++) {
                    const p = document.createElement('div'); p.classList.add('nebula-particle');
                    const size = Math.random()*120+60; p.style.width = size+'px'; p.style.height = size+'px';
                    p.style.left = Math.random()*100+'%'; p.style.top = Math.random()*100+'%';
                    p.style.background = colors[Math.floor(Math.random()*colors.length)];
                    p.style.animationDuration = (Math.random()*12+8)+'s'; p.style.animationDelay = Math.random()*5+'s';
                    document.body.appendChild(p);
                }
            }
            function initBackgroundEffects() {
                resizeCanvas(); createStars(200); requestAnimationFrame(drawStars);
                createNebulaParticles(15); scheduleShootingStar(); setTimeout(createShootingStar, 600);
            }
            window.addEventListener('resize', () => { resizeCanvas(); createStars(200); });

            // ---------- GAME AUDIO ----------
            class GameAudio {
                constructor() { this.audioCtx = null; this.initialized = false; }
                init() { if (this.initialized) return; try { this.audioCtx = new (window.AudioContext||window.webkitAudioContext)(); this.initialized = true; } catch(e) {} }
                playDropSound() {
                    if (!this.initialized) this.init(); if (!this.audioCtx) return;
                    try {
                        const now = this.audioCtx.currentTime;
                        const o = this.audioCtx.createOscillator(); const g = this.audioCtx.createGain();
                        o.connect(g); g.connect(this.audioCtx.destination); o.type = 'sine';
                        o.frequency.setValueAtTime(180,now); o.frequency.exponentialRampToValueAtTime(60,now+0.12);
                        g.gain.setValueAtTime(0.35,now); g.gain.exponentialRampToValueAtTime(0.01,now+0.18);
                        o.start(now); o.stop(now+0.18);
                    } catch(e) {}
                }
                playVictorySound() {
                    if (!this.initialized) this.init(); if (!this.audioCtx) return;
                    try {
                        const now = this.audioCtx.currentTime;
                        [{freq:523.25,time:0,dur:0.2},{freq:659.25,time:0.15,dur:0.2},{freq:783.99,time:0.3,dur:0.2},{freq:1046.50,time:0.45,dur:0.4}].forEach(note => {
                            const o = this.audioCtx.createOscillator(); const g = this.audioCtx.createGain();
                            o.connect(g); g.connect(this.audioCtx.destination); o.type = 'sine';
                            o.frequency.setValueAtTime(note.freq,now+note.time);
                            g.gain.setValueAtTime(0.2,now+note.time); g.gain.exponentialRampToValueAtTime(0.01,now+note.time+note.dur);
                            o.start(now+note.time); o.stop(now+note.time+note.dur);
                        });
                    } catch(e) {}
                }
            }

            // ---------- CONNECT FOUR ----------
            class ConnectFour {
                constructor() {
                    this.ROWS=6; this.COLS=7; this.board=[]; this.currentPlayer=1; this.gameInProgress=false;
                    this.isAiTurn=false; this.scores={1:0,2:0}; this.audio=new GameAudio(); this.aiFirst=false; this.difficulty='hard';
                    this.domBoard=document.getElementById('board'); this.domStatus=document.getElementById('status');
                    this.domScore=document.getElementById('scoreDisplay');
                    this.restartBtn=document.getElementById('restartBtn'); this.newGameBtn=document.getElementById('newGameBtn');
                    this.toggleFirstBtn=document.getElementById('toggleFirstBtn'); this.toggleDifficultyBtn=document.getElementById('toggleDifficultyBtn');
                    this.initDOMEvents(); this.audio.init(); this.updateDifficultyButton(); this.newGame();
                }
                initDOMEvents() {
                    this.restartBtn.addEventListener('click', () => this.restartGame());
                    this.newGameBtn.addEventListener('click', () => this.newGame());
                    this.toggleFirstBtn.addEventListener('click', () => this.toggleFirstPlayer());
                    this.toggleDifficultyBtn.addEventListener('click', () => this.toggleDifficulty());
                }
                setButtonsEnabled(enabled) { [this.restartBtn,this.newGameBtn,this.toggleFirstBtn,this.toggleDifficultyBtn].forEach(b => { if(b) b.disabled = !enabled; }); }
                toggleFirstPlayer() { this.aiFirst=!this.aiFirst; this.toggleFirstBtn.textContent=this.aiFirst?'👤 You First':'🤖 AI First'; this.newGame(); }
                toggleDifficulty() { this.difficulty=this.difficulty==='hard'?'medium':'hard'; this.updateDifficultyButton(); this.newGame(); }
                updateDifficultyButton() { this.toggleDifficultyBtn.textContent=this.difficulty==='hard'?'🧠 Hard':'🧠 Medium'; }
                initializeBoard() {
                    this.board=Array(this.ROWS).fill(null).map(()=>Array(this.COLS).fill(0));
                    this.domBoard.innerHTML='';
                    for (let r=0;r<this.ROWS;r++) for (let c=0;c<this.COLS;c++) {
                        const slot=document.createElement('div'); slot.classList.add('slot'); slot.dataset.col=c;
                        const disc=document.createElement('div'); disc.classList.add('disc');
                        slot.appendChild(disc); slot.addEventListener('click',()=>this.handleSlotClick(c)); this.domBoard.appendChild(slot);
                    }
                    this.gameInProgress=true; this.currentPlayer=1;
                    if (this.aiFirst) { this.currentPlayer=2; this.updateStatus(); this.updatePlayerIndicators(); this.triggerAiTurn(); }
                    else { this.updateStatus(); this.updatePlayerIndicators(); }
                }
                handleSlotClick(col) { if (!this.gameInProgress||this.isAiTurn) return; if (this.aiFirst&&this.currentPlayer===2) return; this.makeMove(col); }
                makeMove(col) {
                    const row=this.getAvailableRow(col); if (row===-1) return;
                    this.board[row][col]=this.currentPlayer; this.animateDiscDrop(row,col,this.currentPlayer); this.audio.playDropSound();
                    if (this.checkWinCondition(row,col)) { this.handleWinState(); return; }
                    if (this.checkDrawCondition()) { this.handleDrawState(); return; }
                    this.currentPlayer=this.currentPlayer===1?2:1; this.updateStatus(); this.updatePlayerIndicators();
                    if (this.currentPlayer===2&&this.gameInProgress) this.triggerAiTurn();
                }
                getAvailableRow(col) { for (let r=this.ROWS-1;r>=0;r--) if (this.board[r][col]===0) return r; return -1; }
                animateDiscDrop(row,col,player) {
                    const slot=this.domBoard.children[row*this.COLS+col]; const disc=slot.querySelector('.disc');
                    disc.className=`disc ${player===1?'red':'yellow'}`; disc.style.animation='discDrop 0.4s cubic-bezier(0.25,0.46,0.45,0.94) forwards';
                }
                updatePlayerIndicators() {
                    document.getElementById('player1').classList.toggle('active',this.currentPlayer===1);
                    document.getElementById('player2').classList.toggle('active',this.currentPlayer===2);
                }
                updateStatus() { if (!this.gameInProgress) return; this.domStatus.innerHTML=this.currentPlayer===2?'<span class="ai-thinking">AI is thinking...</span>':'Your turn'; }
                checkWinCondition(row,col) {
                    const p=this.board[row][col]; const dirs=[[0,1],[1,0],[1,1],[1,-1]];
                    for (let [dr,dc] of dirs) {
                        let count=1,cells=[[row,col]];
                        for (let step of [1,-1]) {
                            let r=row+dr*step,c=col+dc*step;
                            while (r>=0&&r<this.ROWS&&c>=0&&c<this.COLS&&this.board[r][c]===p) { count++; cells.push([r,c]); if(count>=4){this.highlightWinningSequence(cells);return true;} r+=dr*step;c+=dc*step; }
                        }
                    }
                    return false;
                }
                highlightWinningSequence(cells) { cells.forEach(([r,c])=>{ const d=this.domBoard.children[r*this.COLS+c].querySelector('.disc'); if(d) d.classList.add('winner'); }); }
                checkDrawCondition() { return this.board[0].every(c=>c!==0); }
                handleWinState() {
                    this.gameInProgress=false; this.scores[this.currentPlayer]++; this.updateScores();
                    this.audio.playVictorySound(); this.triggerConfettiEffect();
                    this.domStatus.textContent=this.currentPlayer===1?'You Win! 🎉':'AI Wins! 😞';
                    this.postGameAdFlow();
                }
                handleDrawState() { this.gameInProgress=false; this.domStatus.textContent="It's a Draw! 🤝"; this.postGameAdFlow(); }
                postGameAdFlow() {
                    this.setButtonsEnabled(false);
                    if (bridge && bridge.advertisement) {
                        bridge.advertisement.showInterstitial()
                            .then(() => { this.setButtonsEnabled(true); })
                            .catch(() => { this.setButtonsEnabled(true); });
                    } else { this.setButtonsEnabled(true); }
                }
                updateScores() { this.domScore.textContent=`${this.scores[1]} - ${this.scores[2]}`; }
                triggerAiTurn() {
                    this.isAiTurn=true; this.updateStatus();
                    setTimeout(() => { if (!this.gameInProgress) { this.isAiTurn=false; return; } const col=this.computeAiMove(); this.isAiTurn=false; this.makeMove(col); }, Math.random()*400+400);
                }
                computeAiMove() {
                    const valid=[]; for(let c=0;c<this.COLS;c++) if(this.getAvailableRow(c)!==-1) valid.push(c);
                    for(let c of valid){let r=this.getAvailableRow(c);this.board[r][c]=2;if(this.checkWinSimulation(r,c,2)){this.board[r][c]=0;return c;}this.board[r][c]=0;}
                    for(let c of valid){let r=this.getAvailableRow(c);this.board[r][c]=1;if(this.checkWinSimulation(r,c,1)){this.board[r][c]=0;return c;}this.board[r][c]=0;}
                    let best=-Infinity,cols=[valid[0]]; const depth=this.difficulty==='hard'?5:3;
                    for(let c of valid){let r=this.getAvailableRow(c);this.board[r][c]=2;let s=this.minimax(depth,false,-Infinity,Infinity);this.board[r][c]=0;if(s>best){best=s;cols=[c];}else if(s===best)cols.push(c);}
                    return cols[Math.floor(Math.random()*cols.length)];
                }
                checkWinSimulation(row,col,p) {
                    const dirs=[[0,1],[1,0],[1,1],[1,-1]];
                    for(let[dr,dc]of dirs){let count=1;for(let step of[1,-1]){let r=row+dr*step,c=col+dc*step;while(r>=0&&r<this.ROWS&&c>=0&&c<this.COLS&&this.board[r][c]===p){count++;if(count>=4)return true;r+=dr*step;c+=dc*step;}}}
                    return false;
                }
                minimax(depth,isMax,alpha,beta) {
                    let score=this.evaluateBoardState(); if(depth===0||this.checkDrawCondition())return score; if(Math.abs(score)>5000)return score;
                    const valid=[]; for(let c=0;c<this.COLS;c++) if(this.getAvailableRow(c)!==-1) valid.push(c);
                    if(isMax){let m=-Infinity;for(let c of valid){let r=this.getAvailableRow(c);this.board[r][c]=2;let e=this.minimax(depth-1,false,alpha,beta);this.board[r][c]=0;m=Math.max(m,e);alpha=Math.max(alpha,e);if(beta<=alpha)break;}return m;}
                    else{let m=Infinity;for(let c of valid){let r=this.getAvailableRow(c);this.board[r][c]=1;let e=this.minimax(depth-1,true,alpha,beta);this.board[r][c]=0;m=Math.min(m,e);beta=Math.min(beta,e);if(beta<=alpha)break;}return m;}
                }
                evaluateBoardState() {
                    let score=0; const mid=Math.floor(this.COLS/2); let mc=0;
                    for(let r=0;r<this.ROWS;r++){if(this.board[r][mid]===2)mc++;else if(this.board[r][mid]===1)mc--;}
                    score+=mc*4;
                    for(let r=0;r<this.ROWS;r++) for(let c=0;c<this.COLS-3;c++) score+=this.evaluateWindow([this.board[r][c],this.board[r][c+1],this.board[r][c+2],this.board[r][c+3]]);
                    for(let c=0;c<this.COLS;c++) for(let r=0;r<this.ROWS-3;r++) score+=this.evaluateWindow([this.board[r][c],this.board[r+1][c],this.board[r+2][c],this.board[r+3][c]]);
                    for(let r=0;r<this.ROWS-3;r++) for(let c=0;c<this.COLS-3;c++){score+=this.evaluateWindow([this.board[r][c],this.board[r+1][c+1],this.board[r+2][c+2],this.board[r+3][c+3]]);score+=this.evaluateWindow([this.board[r+3][c],this.board[r+2][c+1],this.board[r+1][c+2],this.board[r][c+3]]);}
                    return score;
                }
                evaluateWindow(w) {
                    let score=0; const ai=w.filter(c=>c===2).length,pl=w.filter(c=>c===1).length,em=w.filter(c=>c===0).length;
                    if(ai===4)return 10000; if(pl===4)return -10000;
                    if(ai===3&&em===1)score+=50; else if(ai===2&&em===2)score+=10;
                    if(pl===3&&em===1)score-=80; else if(pl===2&&em===2)score-=15;
                    return score;
                }
                triggerConfettiEffect() {
                    for(let i=0;i<60;i++){const c=document.createElement('div');c.classList.add('confetti');c.style.left=Math.random()*100+'vw';c.style.animationDelay=Math.random()*0.5+'s';c.style.animationDuration=(Math.random()*2+2)+'s';document.body.appendChild(c);setTimeout(()=>c.remove(),3500);}
                }
                restartGame() { this.currentPlayer=1;this.isAiTurn=false;this.initializeBoard();this.updateStatus();this.updatePlayerIndicators();document.querySelectorAll('.confetti').forEach(c=>c.remove());this.setButtonsEnabled(true); }
                newGame() { this.scores={1:0,2:0};this.updateScores();this.restartGame(); }
            }

            // ---------- PLAYGAMA BRIDGE ----------
            // ✅ Ξεκινάμε το παιχνίδι ΑΜΕΣΩΣ — χωρίς splash, χωρίς PLAY button
            // ✅ game_ready στέλνεται μόλις το Bridge αρχικοποιηθεί
            initBackgroundEffects();
            new ConnectFour(); // ← Παιχνίδι αμέσως!

            // ✅ ΑΚΡΙΒΩΣ όπως η τεκμηρίωση του Playgama Plain JS
            bridge.initialize()
                .then(() => {
                    // Αποστολή game_ready μόλις το SDK είναι έτοιμο
                    bridge.platform.sendMessage('game_ready');
                    console.log('✅ game_ready sent!');
                })
                .catch(error => {
                    console.error('Bridge error:', error);
                });

        })();
    </script>
</body>
