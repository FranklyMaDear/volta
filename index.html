<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/","cannon-es":"https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"}}</script>

<script type="module">
import * as THREE from 'three';
import * as CANNON from 'cannon-es';
import{EffectComposer}from'three/addons/postprocessing/EffectComposer.js';
import{RenderPass}from'three/addons/postprocessing/RenderPass.js';
import{UnrealBloomPass}from'three/addons/postprocessing/UnrealBloomPass.js';

/* ================= GAMEDISTRIBUTION SDK INIT ================= */
let gdSdkInitialized = false;
let isAdPlaying = false;
let lastAdTime = 0;
const AD_COOLDOWN = 30000;

// Callbacks για τα events
let rewardedResolve = null;
let rewardedReject = null;
let interstitialResolve = null;
let interstitialReject = null;

async function initGameDistribution() {
  try {
    if (typeof gdsdk === 'undefined') {
      console.warn('GameDistribution SDK not loaded.');
      return false;
    }
    await gdsdk.init({
      gameId: 'f5a3b91dd820482e91455c563cbf6dbc'
    });
    gdSdkInitialized = true;
    console.log('GameDistribution SDK initialized');

    gdsdk.on('SDK_GAME_PAUSE', () => {
      console.log('GD: Game paused');
      paused = true;
      audio.setPaused(true);
    });
    gdsdk.on('SDK_GAME_START', () => {
      console.log('GD: Game resumed');
      paused = false;
      audio.setPaused(false);
    });
    gdsdk.on('SDK_REWARDED_WATCH_COMPLETE', () => {
      console.log('GD: Rewarded ad completed');
      isAdPlaying = false;
      audio.setPaused(false);
      if (rewardedResolve) {
        rewardedResolve();
        rewardedResolve = null;
      }
    });
    gdsdk.on('SDK_REWARDED_WATCH_REJECTED', () => {
      console.log('GD: Rewarded ad rejected');
      isAdPlaying = false;
      audio.setPaused(false);
      if (rewardedReject) {
        rewardedReject(new Error('Ad rejected'));
        rewardedReject = null;
      }
    });
    gdsdk.on('SDK_AD_CLOSED', () => {
      console.log('GD: Ad closed');
      isAdPlaying = false;
      audio.setPaused(false);
      if (interstitialResolve) {
        interstitialResolve();
        interstitialResolve = null;
      }
      if (rewardedResolve) {
        rewardedResolve();
        rewardedResolve = null;
      }
    });
    gdsdk.on('SDK_AD_ERROR', (error) => {
      console.warn('GD: Ad error', error);
      isAdPlaying = false;
      audio.setPaused(false);
      if (interstitialReject) {
        interstitialReject(error);
        interstitialReject = null;
      }
      if (rewardedReject) {
        rewardedReject(error);
        rewardedReject = null;
      }
    });
    return true;
  } catch (error) {
    console.error('Failed to initialize GameDistribution SDK:', error);
    return false;
  }
}

// Helper για rewarded ad με Promise
function requestGDRewardedAd() {
  return new Promise((resolve, reject) => {
    if (!gdSdkInitialized) {
      console.warn('GD SDK not initialized. Using fallback.');
      resolve();
      return;
    }
    if (isAdPlaying) {
      alert('An ad is currently playing. Please wait.');
      reject(new Error('Ad already playing'));
      return;
    }
    isAdPlaying = true;
    audio.setPaused(true);
    rewardedResolve = resolve;
    rewardedReject = reject;
    gdsdk.showAd('rewarded');
  });
}

// Helper για interstitial ad με Promise
function requestGDInterstitialAd() {
  return new Promise((resolve, reject) => {
    if (!gdSdkInitialized) {
      console.warn('GD SDK not initialized. Skipping interstitial.');
      resolve();
      return;
    }
    if (isAdPlaying) return;
    const now = Date.now();
    if (now - lastAdTime < AD_COOLDOWN) {
      console.log('Ad cooldown active, skipping interstitial.');
      resolve();
      return;
    }
    isAdPlaying = true;
    lastAdTime = now;
    audio.setPaused(true);
    interstitialResolve = resolve;
    interstitialReject = reject;
    gdsdk.showAd();
  });
}

// Συνάρτηση για εύκολη κλήση rewarded ad με callback
function watchRewardedAd(callback) {
  requestGDRewardedAd()
    .then(() => {
      if (callback) callback();
    })
    .catch((error) => {
      console.warn('Rewarded ad error:', error);
      alert('Ad could not be shown. Please try again.');
    });
}

// ============================================================
// STARFIELD (αμετάβλητο)
// ============================================================
function buildStarfield(){
  const sf=document.getElementById('starfield');if(!sf)return;sf.innerHTML='';
  function layer(count,size,dur,op){
    const cv=document.createElement('canvas');cv.width=600;cv.height=600;const ctx=cv.getContext('2d');
    for(let i=0;i<count;i++){const x=Math.random()*600,y=Math.random()*600,r=Math.random()*size+0.3;
      ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${0.4+Math.random()*0.6})`;ctx.fill();}
    const div=document.createElement('div');div.className='star-layer';
    div.style.backgroundImage=`url(${cv.toDataURL()})`;div.style.backgroundRepeat='repeat';
    div.style.backgroundSize='600px 600px';div.style.opacity=op;div.style.animation=`warpStars ${dur}s linear infinite`;
    sf.appendChild(div);
  }
  layer(160,1.6,38,0.9);layer(220,1.0,68,0.7);layer(300,0.6,105,0.5);
}

// ============================================================
const SEQ=[2,4,8,16,32,64,128,256,512,1024,2048,4096,8192,16384];
const PAL={
  2:{hex:0x3ecf5a,glow:0x2aff5a},4:{hex:0x8b5cf6,glow:0xa070ff},8:{hex:0xf97316,glow:0xffaa44},
  16:{hex:0x14b8a6,glow:0x44e0c8},32:{hex:0xf5b50a,glow:0xffd24a},64:{hex:0x0ea5e9,glow:0x44ccff},
  128:{hex:0x3b82f6,glow:0x77aaff},256:{hex:0xe11d48,glow:0xff3366},512:{hex:0xec4899,glow:0xff66bb},

// AUDIO CLASS (με προσθήκη setPaused)

const audio=(()=>{
  let ctx=null,mg=null,muted=false;
  function init(){if(ctx)return;ctx=new(window.AudioContext||window.webkitAudioContext)();mg=ctx.createGain();mg.gain.value=.55;mg.connect(ctx.destination);}
  function env(g,pk,a,d,s,dur){const t=ctx.currentTime;g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(pk,t+a);g.gain.exponentialRampToValueAtTime(Math.max(.0001,pk*s),t+a+d);g.gain.exponentialRampToValueAtTime(.0001,t+dur);}
  function noise(dur,vol,freq,type='lowpass'){const n=ctx.createBufferSource(),buf=ctx.createBuffer(1,ctx.sampleRate*dur,ctx.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);n.buffer=buf;const fi=ctx.createBiquadFilter();fi.type=type;fi.frequency.value=freq;const g=ctx.createGain();g.gain.value=vol;n.connect(fi).connect(g).connect(mg);n.start();return n;}
  function launch(){if(muted)return;init();const o=ctx.createOscillator(),g=ctx.createGain();o.type='sawtooth';o.frequency.setValueAtTime(150,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(600,ctx.currentTime+0.12);o.connect(g).connect(mg);env(g,.18,.005,.02,.2,.16);o.start();o.stop(ctx.currentTime+.18);const o2=ctx.createOscillator(),g2=ctx.createGain();o2.type='triangle';o2.frequency.setValueAtTime(80,ctx.currentTime);o2.frequency.exponentialRampToValueAtTime(400,ctx.currentTime+0.1);o2.connect(g2).connect(mg);env(g2,.12,.003,.02,.2,.14);o2.start();o2.stop(ctx.currentTime+.16);noise(.14,.28,800,'bandpass');}
  function boom(){if(muted)return;init();noise(.5,.55,320,'lowpass');const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.setValueAtTime(130,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(38,ctx.currentTime+.4);o.connect(g).connect(mg);env(g,.55,.002,.1,.2,.5);o.start();o.stop(ctx.currentTime+.55);noise(.18,.35,2600,'bandpass');}
  function mergeBoom(){if(muted)return;init();noise(.45,.65,180,'lowpass');const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.setValueAtTime(90,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(18,ctx.currentTime+0.35);o.connect(g).connect(mg);env(g,0.9,0.005,0.08,0.3,0.55);o.start();o.stop(ctx.currentTime+0.6);noise(0.35,0.6,350,'bandpass');const o2=ctx.createOscillator(),g2=ctx.createGain();o2.type='square';o2.frequency.setValueAtTime(55,ctx.currentTime);o2.frequency.exponentialRampToValueAtTime(20,ctx.currentTime+0.3);o2.connect(g2).connect(mg);env(g2,0.7,0.004,0.06,0.2,0.45);o2.start();o2.stop(ctx.currentTime+0.5);noise(0.15,0.4,2800,'highpass');}
  function thud(){if(muted)return;init();noise(.2,.32,160,'lowpass');const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.setValueAtTime(80,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(45,ctx.currentTime+.16);o.connect(g).connect(mg);env(g,.32,.002,.06,.2,.2);o.start();o.stop(ctx.currentTime+.22);}
  function blip(f,dur=.12,type='sine',vol=.4){if(muted)return;init();const o=ctx.createOscillator(),g=ctx.createGain();o.type=type;o.frequency.value=f;o.connect(g).connect(mg);env(g,vol,.005,.04,.3,dur);o.start();o.stop(ctx.currentTime+dur+.05);}
  function milestone(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>blip(f,.2,'square',.28),i*90));}
  function gift(){[659,880,1175,1568].forEach((f,i)=>setTimeout(()=>blip(f,.18,'triangle',.3),i*80));}
  function gameOver(){[330,277,220,175].forEach((f,i)=>setTimeout(()=>blip(f,.3,'triangle',.3),i*120));}
  function toggleMute(){muted=!muted;if(mg)mg.gain.value=muted?0:.45;return muted;}
  function setPaused(p){if(p && ctx && ctx.state==='running')ctx.suspend();else if(!p && ctx && ctx.state==='suspended')ctx.resume();}
  return{launch,boom,thud,mergeBoom,milestone,gift,gameOver,toggleMute,init,setPaused};
})();

// triggerGameOver: show interstitial before lost modal
function triggerGameOver(){
  gameOn=false;gameStarted=false;
  if(shotCube){ shotCube.isShot=false; shotCube.body.collisionFilterGroup=GRP_TRACK; shotCube.body.collisionFilterMask=~0; shotCube=null; }
  if(readyCubeMesh){scene.remove(readyCubeMesh);readyCubeMesh=null;}
  saveHighScoreIfNeeded(score);addToWeeklyLeaderboard(score);updateRankScoreDisplay(score);
  audio.gameOver();
  document.getElementById('boosters').classList.remove('active');
  document.getElementById('hud').classList.remove('active');
  let bonus=0;
  if(roundScoreMet)bonus+=playerLevel*50;
  if(roundCubeMet)bonus+=playerLevel*100;
  if(bonus>0){coins+=bonus;roundCoins+=bonus;saveProgression();}

  // Interstitial ad, then show lost modal
  requestGDInterstitialAd().then(() => {
    showLostModal();
  }).catch(() => {
    showLostModal();
  });
}
