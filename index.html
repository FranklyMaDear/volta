<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Gold Fest 2 – Infinite Board</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #02021a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    .game-container {
      width: 100%;
      max-width: 430px;
      height: 100vh;
      max-height: 900px;
      background: radial-gradient(circle at 50% 20%, #1a1a5e 0%, #0a0a3e 40%, #050528 100%);
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(0, 0, 0, 0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* === DECORATIONS === */
    .spaceship {
      position: absolute;
      top: 4%;
      left: 6%;
      font-size: 50px;
      filter: drop-shadow(0 6px 8px rgba(0, 0, 0, 0.3));
      transform: rotate(-20deg);
      z-index: 10;
      animation: float 3s ease-in-out infinite;
    }

    .meteor {
      position: absolute;
      top: 52%;
      left: 4%;
      width: 60px;
      height: 60px;
      background: radial-gradient(circle at 40% 40%, #ffcc80, #ff9100, #e65100);
      border-radius: 50%;
      box-shadow: -12px 12px 24px rgba(33, 150, 243, 0.5);
      z-index: 10;
      animation: float 4s ease-in-out infinite reverse;
    }

    .meteor::before {
      content: '';
      position: absolute;
      top: -20px;
      left: -30px;
      width: 50px;
      height: 40px;
      background: linear-gradient(135deg, transparent, #29b6f6, #81d4fa);
      filter: blur(10px);
      transform: skewX(-35deg);
      opacity: 0.9;
    }

    .meteor::after {
      content: '• • •';
      position: absolute;
      top: 22%;
      left: 16%;
      font-size: 16px;
      letter-spacing: 8px;
      color: rgba(0, 0, 0, 0.35);
      font-weight: bold;
    }

    .cloud {
      position: absolute;
      top: 20%;
      right: 6%;
      font-size: 44px;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.2));
      z-index: 10;
      animation: float 3.5s ease-in-out infinite 0.5s;
    }

    .sparkle {
      position: absolute;
      color: #e1bee7;
      font-size: 14px;
      animation: twinkle 1.5s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(var(--r, 0deg)); }
      50% { transform: translateY(-12px) rotate(var(--r, 0deg)); }
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }

    /* === BOARD === */
    .board {
      width: 88%;
      height: 280px;
      margin: 0 auto;
      border-radius: 24px;
      background: rgba(0, 0, 0, 0.25);
      box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.6), 0 10px 30px rgba(0, 0, 0, 0.5);
      border: 2px solid rgba(255, 255, 255, 0.08);
      z-index: 20;
      overflow: hidden;
      position: relative;
    }

    .tiles-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(5, 70px);
      gap: 8px;
      padding: 8px;
      width: 100%;
      height: 358px;
      transition: transform 0.3s cubic-bezier(0.22, 0.61, 0.36, 1);
      will-change: transform;
    }

    .tile {
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 13px;
      color: #fff;
      text-shadow: 0 2px 3px rgba(0, 0, 0, 0.3);
      box-shadow: 0 5px 0 rgba(0, 0, 0, 0.3), 0 8px 16px rgba(0, 0, 0, 0.4);
      position: relative;
      transition: transform 0.2s;
    }

    .tile .icon {
      font-size: 30px;
      line-height: 1;
      filter: drop-shadow(0 3px 3px rgba(0, 0, 0, 0.3));
      margin-bottom: 2px;
    }

    .tile .label {
      font-size: 12px;
      letter-spacing: 0.3px;
    }

    /* Tile types – χρώματα από την ανάλυση */
    .tile.lightning {
      background: linear-gradient(180deg, #ffd54f 0%, #f9a825 100%);
      box-shadow: 0 5px 0 #f57f17, 0 8px 16px rgba(0, 0, 0, 0.4);
    }
    .tile.xp {
      background: linear-gradient(180deg, #81c784 0%, #2e7d32 100%);
      box-shadow: 0 5px 0 #1b5e20, 0 8px 16px rgba(0, 0, 0, 0.4);
    }
    .tile.ticket {
      background: linear-gradient(180deg, #ce93d8 0%, #6a1b9a 100%);
      box-shadow: 0 5px 0 #4a148c, 0 8px 16px rgba(0, 0, 0, 0.4);
    }
    .tile.box {
      background: linear-gradient(180deg, #ffb74d 0%, #e65100 100%);
      box-shadow: 0 5px 0 #bf360c, 0 8px 16px rgba(0, 0, 0, 0.4);
    }

    /* === PLAYER PAWN === */
    .player {
      position: absolute;
      width: 44px;
      height: 54px;
      z-index: 60;
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 8px 6px rgba(0, 0, 0, 0.4));
      pointer-events: none;
      transition: left 0.3s ease, top 0.3s ease;
    }

    .pawn-body {
      width: 36px;
      height: 36px;
      background: radial-gradient(circle at 35% 30%, #42a5f5, #1565c0);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      margin: 0 auto;
      box-shadow: 0 4px 0 #0d47a1;
    }

    .pawn-base {
      width: 28px;
      height: 10px;
      background: rgba(21, 101, 192, 0.6);
      border-radius: 50%;
      margin: 4px auto 0;
      filter: blur(2px);
    }

    .player.hop {
      animation: hop 0.3s ease-in-out;
    }

    @keyframes hop {
      0% { transform: translate(-50%, -50%) scale(1); }
      40% { transform: translate(-50%, -110%) scale(1.15); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    /* === REWARD POPUP === */
    .reward-popup {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      font-weight: 900;
      font-size: 22px;
      padding: 12px 24px;
      border-radius: 40px;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      text-align: center;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
    }
    .reward-popup.show {
      opacity: 1;
    }

    /* === BOTTOM BAR === */
    .bottom-bar {
      width: 92%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 24px;
      gap: 8px;
      z-index: 100;
      flex-wrap: wrap;
    }

    .badge {
      background: linear-gradient(180deg, #1a1a1a 0%, #0d0d0d 100%);
      border-radius: 20px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #fff;
      font-weight: 800;
      font-size: 15px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      border: 1px solid #333;
      white-space: nowrap;
    }

    .energy-badge .bolt { color: #76ff03; font-size: 20px; }
    .xp-badge .xp-icon { color: #81c784; font-size: 20px; }
    .ticket-badge .tick-icon { color: #ce93d8; font-size: 20px; }

    .roll-btn {
      background: linear-gradient(180deg, #ff4081 0%, #c51162 100%);
      border: none;
      border-radius: 32px;
      padding: 14px 24px;
      color: white;
      font-size: 24px;
      font-weight: 900;
      display: flex;
      align-items: center;
      gap: 4px;
      box-shadow: 0 6px 0 #880e4f, 0 10px 20px rgba(0, 0, 0, 0.4);
      cursor: pointer;
      transition: all 0.1s;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
      letter-spacing: 0.5px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .roll-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #880e4f, 0 3px 8px rgba(0, 0, 0, 0.4);
    }

    .roll-btn .bolt { color: #76ff03; font-size: 24px; margin: 0 2px; }
  </style>
</head>
<body>
<div class="game-container">
  <!-- Decorations -->
  <div class="spaceship">🛸</div>
  <div class="meteor"></div>
  <div class="cloud">☁️</div>
  <div class="sparkle" style="top:18%; right:10%; animation-delay:0s;">✨</div>
  <div class="sparkle" style="top:25%; right:16%; animation-delay:0.4s;">✨</div>
  <div class="sparkle" style="top:16%; right:22%; animation-delay:0.8s;">✨</div>

  <!-- Board -->
  <div class="board" id="board">
    <div class="tiles-container" id="tilesContainer"></div>
  </div>

  <!-- Player -->
  <div class="player" id="player">
    <div class="pawn-body"></div>
    <div class="pawn-base"></div>
  </div>

  <!-- Reward popup -->
  <div class="reward-popup" id="rewardPopup"></div>

  <!-- Bottom Bar -->
  <div class="bottom-bar">
    <div class="badge energy-badge">
      <span class="bolt">⚡</span>
      <span id="energy">135</span><span style="color:#666;">/25</span>
    </div>
    <div class="badge xp-badge">
      <span class="xp-icon">🔵</span>
      <span id="xp">0</span><span style="color:#666;"> XP</span>
    </div>
    <button class="roll-btn" id="rollBtn" onclick="roll()">
      ROLL <span class="bolt">⚡</span>5
    </button>
    <div class="badge ticket-badge">
      <span class="tick-icon">🎟️</span>
      <span id="tickets">0</span>
    </div>
  </div>
</div>

<script>
  (function() {
    const tilesContainer = document.getElementById('tilesContainer');
    const player = document.getElementById('player');
    const energyEl = document.getElementById('energy');
    const xpEl = document.getElementById('xp');
    const ticketsEl = document.getElementById('tickets');
    const rollBtn = document.getElementById('rollBtn');
    const board = document.getElementById('board');
    const rewardPopup = document.getElementById('rewardPopup');

    const rowHeight = 70;
    const cols = 3;
    const totalRows = 5; // 5 rows for smooth infinite scroll
    const totalTiles = totalRows * cols; // 15

    // Οι 4 τύποι ανταμοιβών σύμφωνα με την ανάλυση
    const rewardTypes = [
      { type: 'lightning', icon: '⚡', label: 'ΕΝΕΡΓΕΙΑ' },
      { type: 'xp', icon: '🔵', label: 'XP' },
      { type: 'ticket', icon: '🎟️', label: 'ΕΙΣΙΤΗΡΙΟ' },
      { type: 'box', icon: '📦', label: 'ΚΟΥΤΙ' }
    ];

    let boardData = [];
    let energy = 135;
    let xp = 0;
    let tickets = 0;
    let isRolling = false;

    function createTileData() {
      const rand = Math.floor(Math.random() * rewardTypes.length);
      return { ...rewardTypes[rand] };
    }

    function renderTiles() {
      tilesContainer.innerHTML = '';
      boardData.forEach((data, index) => {
        const tile = document.createElement('div');
        tile.className = `tile ${data.type}`;
        tile.innerHTML = `<span class="icon">${data.icon}</span><span class="label">${data.label}</span>`;
        tile.dataset.index = index;
        tilesContainer.appendChild(tile);
      });
    }

    function initBoard() {
      boardData = [];
      for (let i = 0; i < totalTiles; i++) {
        boardData.push(createTileData());
      }
      renderTiles();
      tilesContainer.style.transition = 'none';
      tilesContainer.style.transform = `translateY(-${rowHeight}px)`;
      positionPlayer();
    }

    function positionPlayer() {
      const tileIndex = 7; // middle tile of the 3rd row (0‑based)
      const tile = tilesContainer.children[tileIndex];
      if (!tile) return;
      const tileRect = tile.getBoundingClientRect();
      const boardRect = board.getBoundingClientRect();
      const left = tileRect.left + tileRect.width / 2 - boardRect.left;
      const top = tileRect.top + tileRect.height / 2 - boardRect.top;
      player.style.left = left + 'px';
      player.style.top = top + 'px';
    }

    function shiftUp() {
      return new Promise(resolve => {
        tilesContainer.style.transition = 'transform 0.3s cubic-bezier(0.22, 0.61, 0.36, 1)';
        tilesContainer.style.transform = `translateY(-${2 * rowHeight}px)`;

        const onTransitionEnd = () => {
          tilesContainer.removeEventListener('transitionend', onTransitionEnd);
          boardData.splice(0, cols);
          for (let i = 0; i < cols; i++) {
            boardData.push(createTileData());
          }
          renderTiles();
          tilesContainer.style.transition = 'none';
          tilesContainer.style.transform = `translateY(-${rowHeight}px)`;
          positionPlayer();
          resolve();
        };

        const fallback = setTimeout(() => {
          tilesContainer.removeEventListener('transitionend', onTransitionEnd);
          onTransitionEnd();
        }, 350);

        tilesContainer.addEventListener('transitionend', onTransitionEnd, { once: true });
      });
    }

    function hopPlayer() {
      return new Promise(resolve => {
        player.classList.add('hop');
        const onAnimEnd = () => {
          player.removeEventListener('animationend', onAnimEnd);
          player.classList.remove('hop');
          resolve();
        };
        player.addEventListener('animationend', onAnimEnd, { once: true });
        setTimeout(() => {
          player.removeEventListener('animationend', onAnimEnd);
          player.classList.remove('hop');
          resolve();
        }, 350);
      });
    }

    function showReward(text) {
      rewardPopup.textContent = text;
      rewardPopup.classList.add('show');
      setTimeout(() => rewardPopup.classList.remove('show'), 1200);
    }

    function applyReward(tileType) {
      switch (tileType) {
        case 'lightning':
          energy += 5;
          energyEl.textContent = energy;
          showReward('+5 ⚡ ΕΝΕΡΓΕΙΑ');
          break;
        case 'xp':
          xp += 10;
          xpEl.textContent = xp;
          showReward('+10 🔵 XP');
          break;
        case 'ticket':
          tickets += 1;
          ticketsEl.textContent = tickets;
          showReward('+1 🎟️ ΕΙΣΙΤΗΡΙΟ');
          break;
        case 'box':
          // Τυχαία ανταμοιβή μέσα από το κουτί
          const random = Math.random();
          if (random < 0.4) {
            energy += 3;
            energyEl.textContent = energy;
            showReward('📦 +3 ⚡ ΕΝΕΡΓΕΙΑ');
          } else if (random < 0.7) {
            xp += 5;
            xpEl.textContent = xp;
            showReward('📦 +5 🔵 XP');
          } else if (random < 0.9) {
            tickets += 1;
            ticketsEl.textContent = tickets;
            showReward('📦 +1 🎟️ ΕΙΣΙΤΗΡΙΟ');
          } else {
            showReward('📦 FREE SPIN!');
          }
          break;
        default: break;
      }
    }

    async function roll() {
      if (isRolling) return;
      if (energy < 5) {
        shakeElement(rollBtn);
        showReward('ΑΝΕΠΑΡΚΗΣ ΕΝΕΡΓΕΙΑ ⚡');
        return;
      }

      isRolling = true;
      energy -= 5;
      energyEl.textContent = energy;

      const steps = Math.floor(Math.random() * 3) + 1; // 1, 2 ή 3
      // Εμφάνιση ζαριού στο κουμπί
      const diceEmojis = ['', '🎲1', '🎲2', '🎲3'];
      rollBtn.innerHTML = `${diceEmojis[steps]}`;
      rollBtn.style.transform = 'scale(0.95)';
      setTimeout(() => rollBtn.style.transform = '', 100);

      for (let i = 0; i < steps; i++) {
        await Promise.all([shiftUp(), hopPlayer()]);
        await sleep(120);
      }

      // Ανταμοιβή από το tile που προσγειώθηκε (index 7)
      const currentTile = boardData[7];
      if (currentTile) {
        applyReward(currentTile.type);
      }

      rollBtn.innerHTML = 'ROLL <span class="bolt">⚡</span>5';
      isRolling = false;
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function shakeElement(el) {
      el.style.transform = 'translateX(5px)';
      setTimeout(() => el.style.transform = 'translateX(-5px)', 50);
      setTimeout(() => el.style.transform = 'translateX(5px)', 100);
      setTimeout(() => el.style.transform = '', 150);
    }

    window.addEventListener('resize', () => {
      positionPlayer();
    });

    // Expose roll globally
    window.roll = roll;

    // Εκκίνηση
    initBoard();
    setTimeout(positionPlayer, 100);
  })();
</script>
</body>
</html>
