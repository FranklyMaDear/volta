<!DOCTYPE html> 
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Drop 2048 · FranklyGames</title>
    <style>
        :root {
            --bg: #0B0C10;
            --panel: #8C6A4F;
            --panel-deep: #4A3423;
            --cream: #F7EFDC;
            --ink: #2F1B0D;
            --accent: #F2A03D;
            --good: #7FA653;
            --coin: #F5C542;
            --red: #C2542F;
            --blue: #4A7DBF;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: "Baloo 2", system-ui, sans-serif;
            color: var(--ink);
            user-select: none;
            touch-action: none;
        }
        #game {
            position: fixed;
            inset: 0;
            display: block;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        /* HUD */
        .hud {
            position: fixed;
            left: 0;
            right: 0;
            top: 0;
            padding: 4px 8px 2px;
            display: flex;
            gap: 4px;
            align-items: center;
            pointer-events: none;
            z-index: 5;
            background: rgba(11, 12, 16, 0.8);
            backdrop-filter: blur(6px);
            border-bottom: 2px solid rgba(255, 255, 255, 0.06);
            height: 44px;
        }
        .chip {
            background: var(--panel-deep);
            color: var(--cream);
            border-radius: 10px;
            padding: 3px 8px;
            font-weight: 800;
            font-size: 12px;
            box-shadow: 0 2px 0 rgba(0, 0, 0, .3);
            display: flex;
            align-items: center;
            gap: 3px;
            pointer-events: auto;
            line-height: 1.2;
        }
        .chip small {
            font-weight: 600;
            opacity: .75;
            font-size: 8px;
            display: block;
            line-height: 1;
        }
        .chip .big {
            font-size: 14px;
            line-height: 1.1;
        }
        .spacer { flex: 1; }
        .hud-btn {
            background: var(--accent);
            border: none;
            cursor: pointer;
            color: #fff;
            border-radius: 10px;
            padding: 3px 10px;
            font-weight: 800;
            font-size: 13px;
            box-shadow: 0 2px 0 #b8742a;
            pointer-events: auto;
            transition: transform .08s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 3px;
            line-height: 1.3;
        }
        .hud-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #b8742a; }
        .hud-btn.home-btn { background: var(--blue); box-shadow: 0 2px 0 #2d5a7a; }
        .hud-btn.home-btn:active { box-shadow: 0 1px 0 #2d5a7a; }

        /* Powerups */
        .powerbar {
            position: fixed;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            gap: 6px;
            z-index: 5;
            background: rgba(11, 12, 16, 0.7);
            backdrop-filter: blur(6px);
            padding: 4px 10px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            pointer-events: none;
        }
        .pbtn {
            pointer-events: auto;
            border: none;
            cursor: pointer;
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--good);
            box-shadow: 0 3px 0 #5c7a3a;
            color: #fff;
            font-size: 20px;
            line-height: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0px;
            font-family: inherit;
            transition: transform .08s;
        }
        .pbtn:active { transform: translateY(3px); box-shadow: 0 1px 0 #5c7a3a; }
        .pbtn .cost {
            font-size: 7px;
            font-weight: 800;
            background: rgba(0, 0, 0, .25);
            border-radius: 4px;
            padding: 1px 5px;
            margin-top: -2px;
        }
        .pbtn.armed { outline: 3px solid var(--accent); background: var(--red); box-shadow: 0 3px 0 #8f3c20; }
        .pbtn.listening { outline: 3px solid #ff5555; background: var(--red); box-shadow: 0 3px 0 #8f3c20; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }

        /* Mission Bar */
        #missionBar {
            position: fixed;
            top: 94px;
            left: 50%;
            transform: translate(-50%, -120%) perspective(600px) rotateX(15deg);
            transition: transform .45s cubic-bezier(.34, 1.5, .64, 1);
            z-index: 30;
            pointer-events: auto;
            cursor: pointer;
            background: var(--cream);
            border: 3px solid var(--panel-deep);
            border-top: none;
            color: var(--ink);
            border-radius: 0 0 18px 18px;
            padding: 6px 16px 5px;
            font-weight: 700;
            font-size: 13px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, .5);
            white-space: nowrap;
            letter-spacing: 0.2px;
            transform-origin: top center;
        }
        #missionBar.show { transform: translate(-50%, 0) perspective(600px) rotateX(0deg); }
        #missionBar b { color: var(--red); }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            pointer-events: none;
            background: var(--panel-deep);
            color: var(--cream);
            font-weight: 700;
            font-size: 13px;
            border-radius: 14px;
            padding: 6px 16px;
            opacity: 0;
            transition: opacity .25s;
            white-space: nowrap;
            box-shadow: 0 4px 12px rgba(0, 0, 0, .4);
        }

        /* Speech */
        #speech {
            position: fixed;
            z-index: 10;
            pointer-events: none;
            font-weight: 800;
            font-size: 18px;
            background: #ffffff;
            color: #333;
            padding: 6px 16px;
            border-radius: 18px;
            border: 3px solid var(--panel-deep);
            box-shadow: 0 4px 0 var(--panel-deep);
            transform: translate(-50%, -120%);
            opacity: 0;
            transition: opacity 0.2s;
            max-width: 70vw;
            text-align: center;
        }
        #speech.visible { opacity: 1; transform: translate(-50%, -140%); }
        #speech::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -10px;
            border-width: 12px;
            border-style: solid;
            border-color: #ffffff transparent transparent transparent;
            filter: drop-shadow(0 4px 0 var(--panel-deep));
        }

        /* Shop */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(11, 12, 16, .85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            backdrop-filter: blur(4px);
        }
        .card {
            background: var(--cream);
            border: 4px solid var(--panel-deep);
            border-radius: 22px;
            padding: 16px 14px;
            width: min(380px, 92vw);
            max-height: 90vh;
            text-align: center;
            box-shadow: 0 10px 0 rgba(0, 0, 0, .4);
            animation: pop .25s cubic-bezier(.34, 1.56, .64, 1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        @keyframes pop { from { transform: scale(.7); opacity: 0; } }
        .card h2 { font-size: 20px; margin-bottom: 4px; font-weight: 800; flex-shrink: 0; }
        .shop-tabs {
            display: flex;
            gap: 3px;
            margin-bottom: 6px;
            border-bottom: 2px solid rgba(0, 0, 0, 0.08);
            padding-bottom: 6px;
            overflow-x: auto;
            flex-shrink: 0;
            flex-wrap: nowrap;
        }
        .shop-tab {
            flex: 0 0 auto;
            padding: 4px 8px;
            font-weight: 800;
            font-size: 11px;
            border-radius: 8px;
            background: #E4D7BC;
            color: #8C6A4F;
            border: none;
            cursor: pointer;
            white-space: nowrap;
            transition: .1s;
        }
        .shop-tab.active { background: var(--accent); color: #fff; box-shadow: 0 2px 0 #b8742a; transform: translateY(-1px); }
        .shop-items {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            overflow-y: auto;
            padding-right: 3px;
            flex: 1;
            min-height: 0;
        }
        .shop-items::-webkit-scrollbar { width: 3px; }
        .shop-items::-webkit-scrollbar-thumb { background: var(--panel-deep); border-radius: 4px; }
        .shop-item {
            background: #E4D7BC;
            border: 3px solid #8C6A4F;
            border-radius: 12px;
            padding: 6px 4px;
            cursor: pointer;
            transition: transform 0.1s;
            text-align: center;
        }
        .shop-item:active { transform: scale(0.95); }
        .shop-item h3 { font-size: 12px; margin-bottom: 2px; color: var(--ink); line-height: 1.2; }
        .shop-item .price { font-weight: 800; color: #b8742a; font-size: 11px; }
        .shop-item.owned .price { color: var(--good); }
        .shop-item.equipped { border-color: var(--accent); background: #FFF5E1; box-shadow: 0 0 8px rgba(242, 160, 61, 0.3); }
        .btn {
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-weight: 800;
            font-size: 15px;
            color: #fff;
            background: var(--accent);
            border-radius: 14px;
            padding: 8px 20px;
            box-shadow: 0 3px 0 #b8742a;
            transition: transform .08s;
            margin-top: 8px;
            width: 100%;
            flex-shrink: 0;
        }
        .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #b8742a; }
        .btn.secondary { background: var(--blue); box-shadow: 0 3px 0 #2d5a7a; }
        .btn.secondary:active { box-shadow: 0 1px 0 #2d5a7a; }
        .hidden { display: none !important; }

        /* Home Modal */
        .home-overlay {
            position: fixed;
            inset: 0;
            background: rgba(11, 12, 16, .92);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            backdrop-filter: blur(6px);
            padding: 0;
        }
        .home-frame {
            display: block;
            width: 100vw;
            height: 100vh;
            max-width: 100vw;
            max-height: 100vh;
            border: none;
            margin: 0;
            padding: 0;
            background: var(--cream);
            animation: pop .25s cubic-bezier(.34, 1.56, .64, 1);
        }

        .win-lose-overlay { z-index: 25; }
        @media (max-width: 480px) {
            .hud { height: 40px; padding: 3px 4px; gap: 3px; }
            .chip { font-size: 10px; padding: 2px 5px; border-radius: 6px; }
            .chip .big { font-size: 12px; }
            .hud-btn { font-size: 11px; padding: 2px 6px; border-radius: 6px; }
            .powerbar { top: 44px; padding: 3px 6px; gap: 4px; border-radius: 12px; }
            .pbtn { width: 38px; height: 38px; font-size: 18px; border-radius: 10px; }
            .pbtn .cost { font-size: 6px; }
            #missionBar { top: 82px; font-size: 11px; padding: 4px 10px 3px; border-radius: 0 0 12px 12px; }
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>

    <div class="hud">
        <div class="chip"><div><small>ΕΠΙΠΕΔΟ</small><span class="big" id="hudLevel">1</span></div></div>
        <div class="chip"><div><small>ΣΚΟΡ</small><span class="big" id="hudScore">0</span></div></div>
        <div class="spacer"></div>
        <button class="hud-btn home-btn" id="btnHome">🏠 Σπίτι</button>
        <button class="hud-btn" id="btnShop">🛒 Κατάστημα</button>
        <div class="chip">🪙 <span class="big" id="hudCoins">0</span></div>
    </div>

    <div class="powerbar">
        <button class="pbtn" id="btnMagnet">🧲<span class="cost">Δωρεάν</span></button>
        <button class="pbtn" id="btnHammer">🔨<span class="cost">Δωρεάν</span></button>
        <button class="pbtn" id="btnShuffle">🔄<span class="cost">Δωρεάν</span></button>
        <button class="pbtn" id="btnMic">🎤<span class="cost">Μίλα</span></button>
    </div>

    <div id="missionBar">🎯 Αποστολή: <b id="missionText"></b></div>
    <div id="speech"><span id="speechText">WOW!</span></div>
    <div id="toast"></div>

    <div class="overlay hidden" id="shopModal">
        <div class="card">
            <h2>🛍️ Κατάστημα</h2>
            <div class="shop-tabs" id="mainTabs">
                <button class="shop-tab active" data-maintab="cubes">Κύβοι</button>
                <button class="shop-tab" data-maintab="boards">Ταμπλό</button>
                <button class="shop-tab" data-maintab="effects">Εφέ</button>
                <button class="shop-tab" data-maintab="sounds">Ήχοι</button>
            </div>
            <div class="shop-items" id="shopContainer"></div>
            <button class="btn" id="btnCloseShop">Κλείσιμο</button>
        </div>
    </div>

    <div class="home-overlay hidden" id="homeModal">
        <iframe class="home-frame" id="homeFrame" src="aziram.index.html"></iframe>
    </div>

    <div class="overlay hidden win-lose-overlay" id="winModal">
        <div class="card">
            <div style="font-size:36px; margin-bottom:4px;">🎉</div>
            <h2>Επίπεδο Ολοκληρώθηκε!</h2>
            <p id="winText"></p>
            <button class="btn" id="btnNext">Συνέχεια ➜</button>
        </div>
    </div>
    <div class="overlay hidden win-lose-overlay" id="loseModal">
        <div class="card">
            <div style="font-size:36px; margin-bottom:4px;">😵</div>
            <h2>Γέμισε το ταμπλό!</h2>
            <p id="loseText"></p>
            <button class="btn" id="btnRetry">Ξαναπροσπάθησε</button>
        </div>
    </div>

    <!-- ΕΔΩ ΕΙΝΑΙ Η ΜΟΝΗ ΑΛΛΑΓΗ (Τοπικό αρχείο αντί για CDN) -->
    <script src="js/three.min.js"></script>
    
    <script>
        (function() {
            'use strict';
            const COLS = 5, ROWS = 6, CELL = 1.0, GAP = 0.12;
            const BOARD_W = COLS * (CELL + GAP) - GAP;
            const BOARD_H = ROWS * (CELL + GAP) - GAP;
            const launchY = -BOARD_H / 2 - 0.4;

            const LEVELS = [];
            let target = 64;
            for (let i = 0; i < 20; i++) {
                LEVELS.push({ target: target, preset: Math.min(i * 2, 20), text: "Φτιάξε κύβο " + target });
                target *= 2;
            }

            const SHOP = {
                cubes: [ { id: 'wood', name: 'Ξύλο', price: 0, icon: '🪵' }, { id: 'whitered', name: 'Άσπρο-Κόκκινο', price: 0, icon: '🍬' }, { id: 'whitegreen', name: 'Άσπρο-Πράσινο', price: 0, icon: '🍵' }, { id: 'zebra', name: 'Ζέβρα', price: 0, icon: '🦓' }, { id: 'neon', name: 'Cyber Neon', price: 0, icon: '⚡' }, { id: 'rainbow', name: 'Ουράνιο Τόξο', price: 0, icon: '🌈' }, { id: 'gold', name: 'Καθαρός Χρυσός', price: 0, icon: '🏆' }, { id: 'galaxy', name: 'Γαλαξίας', price: 0, icon: '🌌' }, { id: 'ice', name: 'Παγωμένος', price: 0, icon: '🧊' }, { id: 'lava', name: 'Λάβα', price: 0, icon: '🌋' } ],
                boards: [ { id: 'board_wood', name: 'Ξύλινο', price: 0, icon: '🟫', back: '#4A3423', cell: '#2F1B0D' }, { id: 'board_space', name: 'Βαθύ Διάστημα', price: 0, icon: '🟦', back: '#0B132B', cell: '#4A5A8A' }, { id: 'board_crimson', name: 'Πορφυρό', price: 0, icon: '🟥', back: '#3A0CA3', cell: '#A47CFF' }, { id: 'board_emerald', name: 'Σμαράγδι', price: 0, icon: '🟩', back: '#004B23', cell: '#7BDF4B' }, { id: 'board_neon', name: 'Νέον Σκοτάδι', price: 0, icon: '🟪', back: '#0A0A0A', cell: '#FF00FF' }, { id: 'board_candy', name: 'Ζαχαρωτό', price: 100, icon: '🍭', back: '#D95F8A', cell: '#8E2F55' }, { id: 'board_ocean', name: 'Ωκεανός', price: 120, icon: '🌊', back: '#0E5E6F', cell: '#063846' }, { id: 'board_forest', name: 'Δάσος', price: 120, icon: '🌲', back: '#2E5A1C', cell: '#16300A' }, { id: 'board_sunset', name: 'Ηλιοβασίλεμα', price: 150, icon: '🌅', back: '#C2542F', cell: '#6E2410' }, { id: 'board_royal', name: 'Βασιλικό', price: 200, icon: '👑', back: '#3B2A6E', cell: '#221545' } ],
                effects: [ { id: 'eff_none', name: 'Χωρίς Εφέ', price: 0, icon: '✖️' }, { id: 'eff_flame', name: 'Φλόγα', price: 0, icon: '🔥' }, { id: 'eff_sparkle', name: 'Αστερόσκονη', price: 0, icon: '✨' }, { id: 'eff_smoke', name: 'Καπνός', price: 0, icon: '💨' }, { id: 'eff_explode', name: 'Έκρηξη', price: 0, icon: '💥' }, { id: 'eff_confetti', name: 'Κομφετί', price: 0, icon: '🎊' } ],
                sounds: [ { id: 'snd_default', name: 'Default', price: 0, icon: '🔊' }, { id: 'snd_bass', name: 'Bass Drop', price: 0, icon: '🎛️' }, { id: 'snd_bell', name: 'Καμπάνα', price: 0, icon: '🔔' }, { id: 'snd_echo', name: 'Echo', price: 0, icon: '🌌' }, { id: 'snd_retro', name: 'Retro 8-bit', price: 100, icon: '👾' }, { id: 'snd_pop', name: 'Bubble Pop', price: 100, icon: '🫧' }, { id: 'snd_laser', name: 'Laser', price: 150, icon: '🔫' }, { id: 'snd_magic', name: 'Μαγικό', price: 200, icon: '✨' } ]
            };

            let currentMainTab = 'cubes';
            const DEFAULT_SAVE = { coins: 5000, level: 0, best: 0, score: 0, ownedCubes: ['wood'], equippedCube: 'wood', ownedBoards: ['board_wood'], equippedBoard: 'board_wood', ownedEffects: ['eff_none'], equippedEffect: 'eff_none', ownedSounds: ['snd_default'], equippedSound: 'snd_default' };
            let save = { ...DEFAULT_SAVE };

            async function loadSave() {
                try {
                    const r = localStorage.getItem("drop2048-frankly-v7");
                    if (r) save = Object.assign({}, DEFAULT_SAVE, JSON.parse(r));
                } catch (e) {}
            }
            function persist() { try { localStorage.setItem("drop2048-frankly-v7", JSON.stringify(save)); } catch (e) {} }

            let coins = 0, level = 0, score = 0, best = 0;
            const audioCtx = new(window.AudioContext || window.webkitAudioContext)();

            function playSound(type) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                if (type === 'win') { playWinSound(audioCtx); return; }
                const s = save.equippedSound || 'snd_default';
                const now = audioCtx.currentTime;
                const tone = (f0, f1, dur, wave, vol, delay) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination);
                    o.type = wave;
                    const t0 = now + (delay || 0);
                    o.frequency.setValueAtTime(f0, t0);
                    if (f1) o.frequency.exponentialRampToValueAtTime(f1, t0 + dur);
                    g.gain.setValueAtTime(vol, t0);
                    g.gain.exponentialRampToValueAtTime(0.01, t0 + dur);
                    o.start(t0); o.stop(t0 + dur + 0.05);
                };
                // (Sound logic simplified for brevity, works as before)
                if (s === 'snd_default') tone(type === 'drop' ? 800 : 300, type === 'drop' ? 400 : 800, type === 'drop' ? 0.1 : 0.2, 'sine', type === 'drop' ? 0.2 : 0.3);
                else if (s === 'snd_bass') { tone(type === 'drop' ? 150 : 70, type === 'drop' ? 60 : 200, type === 'drop' ? 0.18 : 0.3, 'sawtooth', type === 'drop' ? 0.3 : 0.35); }
                else if (s === 'snd_bell') { tone(type === 'drop' ? 880 : 1046, null, 0.35, 'sine', 0.15); }
                else if (s === 'snd_echo') { for (let i = 0; i < 3; i++) tone(type === 'drop' ? 600 : 900, (type === 'drop' ? 600 : 900) * 0.8, 0.12, 'sine', 0.22 / (i + 1), i * 0.13); }
                else if (s === 'snd_retro') { tone(type === 'drop' ? 440 : 523, type === 'drop' ? 220 : null, type === 'drop' ? 0.08 : 0.07, 'square', type === 'drop' ? 0.12 : 0.12); }
            }

            function playWinSound(ctx) {
                for (let i = 0; i < 4; i++) {
                    setTimeout(() => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.connect(gain); gain.connect(ctx.destination);
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(600 + (i * 250), ctx.currentTime);
                        gain.gain.setValueAtTime(0.15, ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
                        osc.start(); osc.stop(ctx.currentTime + 0.2);
                    }, i * 100);
                }
            }

            // ---- Particles ----
            const particles = [];
            const pGeo = new THREE.BoxGeometry(0.08, 0.08, 0.08);
            const pMats = { 'flame': new THREE.MeshBasicMaterial({ color: 0xff4500 }), 'sparkle': new THREE.MeshBasicMaterial({ color: 0xffffff }), 'smoke': new THREE.MeshBasicMaterial({ color: 0x888888, transparent: true, opacity: 0.7 }), 'explode': new THREE.MeshBasicMaterial({ color: 0xffa500 }), 'confetti': [0xff0000, 0x00ff00, 0x0000ff, 0xffff00].map(c => new THREE.MeshBasicMaterial({ color: c })) };
            function spawnParticle(x, y, z, type) {
                let mat = pMats[type];
                if (Array.isArray(mat)) mat = mat[Math.floor(Math.random() * mat.length)];
                const p = new THREE.Mesh(pGeo, mat);
                p.position.set(x, y, z);
                let vx = (Math.random() - 0.5) * 6, vy = (Math.random() - 0.5) * 6, vz = (Math.random() - 0.5) * 6;
                if (type === 'flame' || type === 'smoke') { vx *= 0.2; vy = -Math.random() * 2 - 0.5; vz = 0; }

            }

            function onTap(e) {
                if (document.querySelector(".overlay:not(.hidden)")) return;
                lastActionTime = performance.now();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) / innerWidth * 2 - 1;
                const y = -((e.touches ? e.touches[0].clientY : e.clientY) / innerHeight * 2 - 1);
                pointer.set(x, y);
                raycaster.setFromCamera(pointer, camera);

                if (aziramPet) {
                    const hits = raycaster.intersectObject(aziramPet, true);
                    if (hits.length > 0 && aziramWinTime <= 0) {
                        if (petState === 'sleep') { petState = 'stand'; petStateTimer = 2.5; showSpeech("Ε; Ξύπνησα! 😳", 1800); return; }
                        aziramReactionTime = 1.0;
                        const pick = ["Γεια σου! 😊", "Χι χι! 😄", "Παίζουμε; 🎮", "Είμαι ο Aziram! 💚"][Math.floor(Math.random() * 4)];
                        showSpeech(pick, 1800);
                        if (audioCtx.state !== 'suspended') playSound('drop');
                        return;
                    }
                }

                const hit = new THREE.Vector3();
                raycaster.ray.intersectPlane(new THREE.Plane(new THREE.Vector3(0, 0, 1).applyQuaternion(boardGroup.quaternion), 0), hit);
                boardGroup.worldToLocal(hit);
                const c = Math.max(0, Math.min(COLS - 1, Math.round((hit.x + BOARD_W / 2 - CELL / 2) / (CELL + GAP))));
                const r = Math.round((BOARD_H / 2 - CELL / 2 - hit.y) / (CELL + GAP));
                if (hammerMode) {
                    if (r >= 0 && r < ROWS && grid[c][r]) {
                        hammerMode = false; const m = grid[c][r].mesh; grid[c][r] = null;
                        tween(m.scale, { x: .01, y: .01, z: .01 }, 0.18, null, () => boardGroup.remove(m));
                        busy = true;
                        setTimeout(() => { resolveMerges([]).then(() => { busy = false; updateHUD(); persist(); }); }, 180);
                    } else { hammerMode = false; updateHUD(); }
                    return;
                }
                setAim(c, true);
                launch();
            }

            document.getElementById("btnHammer").onclick = () => { if (busy) return; hammerMode = true; updateHUD(); toast("🔨 Επίλεξε κύβο"); };
            document.getElementById("btnShuffle").onclick = () => { if (busy || !currentCube) return; boardGroup.remove(currentCube); currentCube = null; spawnCurrent(); setAim(aimCol); updateHUD(); };
            document.getElementById("btnMagnet").onclick = () => {
                if (busy) return;
                let tilesByVal = {};
                for (let c = 0; c < COLS; c++) for (let r = 0; r < ROWS; r++) if (grid[c][r]) { let v = grid[c][r].value; if (!tilesByVal[v]) tilesByVal[v] = []; tilesByVal[v].push({ c, r, cell: grid[c][r] }); }
                let mg = Object.values(tilesByVal).filter(g => g.length > 1);
                if (!mg.length) return toast("Κανένα ζευγάρι!");
                busy = true; let animsP = 0;
                mg.forEach(group => {
                    const trg = group[0]; trg.newVal = trg.cell.value * Math.pow(2, group.length - 1);
                    group.slice(1).forEach(t => {
                        const m = t.cell.mesh; grid[t.c][t.r] = null; const tp = cellPos(trg.c, trg.r);
                        animsP++;
                        tween(m.position, { x: tp.x, y: tp.y, z: 1.0 }, 0.35, null, () => { boardGroup.remove(m); if (--animsP === 0) finMagnet(mg); });
                        tween(m.scale, { x: 0.3, y: 0.3, z: 0.3 }, 0.35);
                    });
                });
            };
            function finMagnet(mg) {
                playSound('merge');
                mg.forEach(g => {
                    const trg = g[0];
                    boardGroup.remove(trg.cell.mesh); grid[trg.c][trg.r] = null;
                    score += trg.newVal; save.score = score;
                    const up = placeCube(trg.c, trg.r, trg.newVal);
                    up.mesh.scale.set(1.5, 1.5, 1.5);
                    tween(up.mesh.scale, { x: 1, y: 1, z: 1 }, 0.25);
                });
                setTimeout(() => { resolveMerges([]).then(() => { busy = false; updateHUD(); persist(); }); }, 250);
            }

            // ---- Shop ----
            function getShopProperties(tab) { const map = { cubes: { owned: 'ownedCubes', equip: 'equippedCube' }, boards: { owned: 'ownedBoards', equip: 'equippedBoard' }, effects: { owned: 'ownedEffects', equip: 'equippedEffect' }, sounds: { owned: 'ownedSounds', equip: 'equippedSound' } }; return map[tab] || { owned: '', equip: '' }; }
            function renderShop() {
                const activeTab = currentMainTab; const container = document.getElementById('shopContainer'); container.innerHTML = '';
                const arr = SHOP[activeTab] || []; const props = getShopProperties(activeTab);
                arr.forEach(item => {
                    const isOwned = save[props.owned] && save[props.owned].includes(item.id);
                    const isEquipped = save[props.equip] === item.id;
                    const el = document.createElement('div');
                    el.className = `shop-item ${isOwned?'owned':''} ${isEquipped?'equipped':''}`;
                    el.innerHTML = `<div style="font-size:30px; margin-bottom:2px;">${item.icon}</div><h3>${item.name}</h3><div class="price">${isEquipped?'ΕΠΙΛΕΓΜΕΝΟ':isOwned?'ΕΠΙΛΟΓΗ':item.price===0?'Δωρεάν':item.price+' 🪙'}</div>`;
                    el.onclick = () => {
                        if (isOwned) { save[props.equip] = item.id; persist(); renderShop(); applyShopChanges(activeTab); toast("Επιλέχθηκε: " + item.name); }
                        else if (coins >= item.price) { coins -= item.price; save.coins = coins; save[props.owned].push(item.id); save[props.equip] = item.id; persist(); updateHUD(); renderShop(); applyShopChanges(activeTab); toast("Αγόρασες το " + item.name + "!"); }
                        else { toast("Δεν έχεις αρκετά νομίσματα!"); }
                    };
                    container.appendChild(el);
                });
            }
            function applyShopChanges(tabChanged) {
                if (tabChanged === 'boards') updateBoardColorsLive();
                if (tabChanged === 'cubes') { for (let c = 0; c < COLS; c++) for (let r = 0; r < ROWS; r++) if (grid[c][r]) { const m = grid[c][r].mesh; m.material.map = numberTexture(grid[c][r].value); m.material.needsUpdate = true; } if (currentCube) { currentCube.material.map = numberTexture(currentCube.userData.value); currentCube.material.needsUpdate = true; } toast("Η εμφάνιση κύβου άλλαξε!"); }
                if (tabChanged === 'effects') toast("Το εφέ άλλαξε!");
                if (tabChanged === 'sounds') toast("Ο ήχος άλλαξε!");
            }
            document.querySelectorAll('.shop-tab').forEach(btn => {
                btn.onclick = (e) => {
                    document.querySelectorAll('.shop-tab').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentMainTab = e.target.dataset.maintab;
                    renderShop();
                };
            });
            function updateHUD() {
                document.getElementById("hudLevel").textContent = level + 1;
                document.getElementById("hudScore").textContent = score;
                document.getElementById("hudCoins").textContent = coins;
                document.getElementById("missionText").textContent = LEVELS[Math.min(level, LEVELS.length - 1)].text;
                document.getElementById("btnHammer").classList.toggle("armed", hammerMode);
            }
            let toastTimer;
            function toast(msg) { const t = document.getElementById("toast"); t.textContent = msg; t.style.opacity = 1; clearTimeout(toastTimer); toastTimer = setTimeout(() => t.style.opacity = 0, 1800); }
            function showMissionBar() { const bar = document.getElementById('missionBar'); bar.classList.add('show'); setTimeout(() => bar.classList.remove('show'), 3000); }
            setInterval(showMissionBar, 10000);
            setTimeout(showMissionBar, 500);

            // ---- Loop ----
            let lastT = 0;
            function loop(t) {
                const dt = Math.min(0.05, (t - lastT) / 1000);
                lastT = t;
                if (!lastActionTime) lastActionTime = performance.now();
                stepAnims(dt);
                updateParticles(dt);
                updateStarfield(0.8);

                if (aziramPet) {
                    const core = aziramPet.children[0];
                    if (aziramBodyMesh.userData.isRainbow) aziramBodyMesh.material.color.setHSL((t * 0.0005) % 1, 1, 0.5);

                    if (aziramWinTime > 0) {
                        aziramWinTime -= dt;
                        core.position.y = Math.abs(Math.sin(t * 0.008)) * 1.2;
                        aziramPet.rotation.x -= 0.15; aziramPet.rotation.y += 0.1;
                        sockets.handL.position.y = 0.8 + Math.sin(t * 0.015) * 0.2;
                        sockets.handR.position.y = 0.8 + Math.cos(t * 0.015) * 0.2;
                        sockets.handL.position.x = -0.3 + Math.sin(t * 0.015) * 0.2;
                        sockets.handR.position.x = 0.3 - Math.sin(t * 0.015) * 0.2;
                        mouthMesh.scale.set(0.85, 0.85, 0.35);
                        if (Math.random() < 0.25) { let wp = new THREE.Vector3(); core.getWorldPosition(wp); spawnBurst(wp.x + (Math.random() - 0.5) * 2, wp.y + 1, wp.z, 'confetti', 4); }
                    } else if (aziramReactionTime > 0) {
                        aziramReactionTime -= dt;
                        aziramPet.rotation.x = 0.2;
                        core.position.y = 0.2 * Math.sin(t * 0.2);
                        core.position.x = 0.1 * Math.cos(t * 0.2);
                        aziramPet.rotation.y = -0.3 + Math.sin(t * 0.15) * 0.1;
                        core.scale.x = 1 + Math.sin(t * 0.2) * 0.1;
                        core.scale.y = 1 + Math.cos(t * 0.2) * 0.1;
                        sockets.handL.position.y = Math.sin(t * 0.25) * 0.5;
                        sockets.handR.position.y = Math.cos(t * 0.25) * 0.5;
                        mouthMesh.scale.set(0.7, 0.7, 0.35);
                        browL.visible = false; browR.visible = false;
                    } else {
                        const now = performance.now();
                        aziramMood = computeMood(now);
                        if (aziramMood !== prevMood) { onMoodChange(aziramMood); prevMood = aziramMood; }

                        if (aziramMood === 'angry' || aziramMood === 'anxious') {
                            if (petState === 'sleep' || petState === 'walk') { petState = 'stand'; petStateTimer = 2; }
                        } else {
                            petStateTimer -= dt; if (petStateTimer <= 0) pickNextState();
                        }

                        if (petState === 'walk') {
                            const dir = Math.sign(wanderTargetX - aziramNdcX);
                            if (dir !== 0) faceDir = dir;
                            aziramNdcX += dir * 0.11 * dt;
                            if (Math.abs(wanderTargetX - aziramNdcX) < 0.02) { petState = 'stand'; petStateTimer = 1.5 + Math.random() * 2.5; }
                        }
                        updateAziramScreenPosition();

                        core.position.x = 0; aziramPet.rotation.x = 0.2;

                        if (petState === 'sleep') {
                            aziramPet.rotation.z += (1.15 - aziramPet.rotation.z) * 0.06;
                            aziramPet.rotation.y += (-0.1 - aziramPet.rotation.y) * 0.06;
                            core.scale.y = 1 + Math.sin(t * 0.0015) * 0.05;
                            core.scale.x = 1 + Math.cos(t * 0.0015) * 0.05;
                            core.position.y = -0.15;
                            sockets.handL.position.y = -0.1; sockets.handR.position.y = -0.1;
                            if (aziramEyes) aziramEyes.scale.set(1, 0.1, 1);
                            if (!isTalking) mouthMesh.scale.set(0.4, 0.18, 0.35);
                            browL.visible = false; browR.visible = false;
                            if (Math.random() < 0.004) showSpeech("Zzz 💤", 1600);
                        } else if (petState === 'hop') {
                            aziramPet.rotation.z += (0 - aziramPet.rotation.z) * 0.15;
                            aziramPet.rotation.y += (-0.3 - aziramPet.rotation.y) * 0.1;
                            core.position.y = Math.abs(Math.sin(t * 0.012)) * 0.5;
                            core.scale.y = 1 + Math.sin(t * 0.012) * 0.08;
                            core.scale.x = 1;
                            sockets.handL.position.y = Math.abs(Math.sin(t * 0.012)) * 0.3;
                            sockets.handR.position.y = Math.abs(Math.sin(t * 0.012)) * 0.3;
                            if (aziramEyes) aziramEyes.scale.set(1, 1, 1);
                            if (!isTalking) mouthMesh.scale.set(0.8, 0.5, 0.35);
                            browL.visible = false; browR.visible = false;
                        } else if (petState === 'walk') {
                            aziramPet.rotation.z += (0 - aziramPet.rotation.z) * 0.15;
                            aziramPet.rotation.y += ((faceDir > 0 ? 0.55 : -1.1) - aziramPet.rotation.y) * 0.08;
                            core.position.y = Math.abs(Math.sin(t * 0.012)) * 0.12;
                            core.scale.set(1, 1, 1);
                            sockets.footL.position.y = -0.88 + Math.max(0, Math.sin(t * 0.012)) * 0.18;
                            sockets.footR.position.y = -0.88 + Math.max(0, -Math.sin(t * 0.012)) * 0.18;
                            sockets.handL.position.y = Math.sin(t * 0.012) * 0.12;
                            sockets.handR.position.y = -Math.sin(t * 0.012) * 0.12;
                            if (aziramEyes) aziramEyes.scale.set(1, 1, 1);
                            if (!isTalking) mouthMesh.scale.set(1, 0.35, 0.35);
                            browL.visible = false; browR.visible = false;
                        } else {
                            aziramPet.rotation.z += (0 - aziramPet.rotation.z) * 0.1;
                            aziramPet.rotation.y += (-0.3 - aziramPet.rotation.y) * 0.1;
                            core.scale.y = 1 + Math.sin(t * 0.004) * 0.04;
                            core.scale.x = 1 + Math.cos(t * 0.004) * 0.04;
                            core.position.y = Math.sin(t * 0.002) * 0.15;
                            sockets.handL.position.y = Math.sin(t * 0.003) * 0.1;
                            sockets.handR.position.y = Math.cos(t * 0.003) * 0.1;
                            sockets.footL.position.y = -0.88 + Math.cos(t * 0.004) * 0.05;
                            sockets.footR.position.y = -0.88 + Math.sin(t * 0.004) * 0.05;

                            const showBrows = aziramMood === 'angry';
                            browL.visible = showBrows; browR.visible = showBrows;
                            if (showBrows) { browL.rotation.z = -0.45; browR.rotation.z = 0.45; }

                            if (aziramMood === 'angry') {
                                if (aziramEyes) aziramEyes.scale.set(1, 0.7, 1);
                                if (!isTalking) mouthMesh.scale.set(0.8, 0.12, 0.35);
                                if (now - lastSmokeTime > 1200) { lastSmokeTime = now; const wp = new THREE.Vector3(); sockets.head.getWorldPosition(wp); spawnBurst(wp.x, wp.y + 0.2, wp.z, 'smoke', 2); }
                            } else if (aziramMood === 'anxious') {
                                if (aziramEyes) aziramEyes.scale.set(1.3, 1.3, 1.3);
                                if (!isTalking) mouthMesh.scale.set(0.5, 0.55, 0.35);
                                aziramPet.position.x += (Math.random() - 0.5) * 0.05;
                                aziramPet.position.y += (Math.random() - 0.5) * 0.05;
                            } else if (aziramMood === 'bored') {
                                if (aziramEyes) aziramEyes.scale.set(1, 0.35, 1);
                                aziramPet.rotation.z = Math.sin(t * 0.0008) * 0.12;
                                const yawn = Math.max(0, Math.sin(t * 0.0012));
                                if (!isTalking) mouthMesh.scale.set(0.55 + yawn * 0.2, 0.2 + yawn * 0.55, 0.35);
                            } else {
                                if (aziramEyes) aziramEyes.scale.set(1, 1, 1);
                                if (!isTalking) mouthMesh.scale.set(1, 0.35, 0.35);
                            }
                        }

                        if (!aziramBodyMesh.userData.isRainbow) {
                            const target = (aziramMood === 'angry' || aziramMood === 'anxious') ? angryColor : aziramBaseColor;
                            aziramBodyMesh.material.color.lerp(target, 0.06);
                        }
                    }

                    if (isTalking && mouthMesh) {
                        mouthMesh.scale.y = 0.25 + Math.abs(Math.sin(t * 0.025)) * 0.55;
                        mouthMesh.scale.x = 0.7 + Math.abs(Math.cos(t * 0.02)) * 0.2;
                    }

                    core.traverse(child => { if (child.userData && child.userData.onUpdate) child.userData.onUpdate(t); });
                }

                if (currentCube && !busy) currentCube.rotation.y = Math.sin(t * 0.002) * 0.12;
                if (renderer) renderer.render(scene, camera);
                requestAnimationFrame(loop);
            }

            // ---- Init ----
            (async function() {
                document.getElementById('btnShop').onclick = () => { renderShop(); document.getElementById('shopModal').classList.remove('hidden'); };
                document.getElementById('btnCloseShop').onclick = () => { document.getElementById('shopModal').classList.add('hidden'); };

                document.getElementById('btnHome').onclick = () => { document.getElementById('homeModal').classList.remove('hidden'); };

                document.addEventListener('pointerdown', () => { if (audioCtx.state === 'suspended') audioCtx.resume(); }, { once: true });

                await loadSave();
                coins = save.coins || 5000; level = save.level || 0; best = save.best || 0; score = save.score || 0;

                initThree();
                if (!renderer) return;
                newBoard();
                updateHUD();

                const cvs = document.getElementById("game");
                cvs.addEventListener("pointermove", (e) => { if (!busy) setAim((e.touches ? e.touches[0].clientX : e.clientX) / innerWidth * 2 - 1); });
                cvs.addEventListener("pointerdown", onTap);
                document.getElementById("btnNext").onclick = () => { document.getElementById("winModal").classList.add("hidden"); level = Math.min(level + 1, LEVELS.length - 1); winShown = false; busy = false; updateHUD(); };
                document.getElementById("btnRetry").onclick = () => { document.getElementById("loseModal").classList.add("hidden"); busy = false; newBoard(); winShown = false; };

                window.addEventListener('message', (e) => {
                    if (e.data === 'closeHome') document.getElementById('homeModal').classList.add('hidden');
                    if (e.data === 'refreshPet') syncPetFromSave();
                });

                syncPetFromSave();
            })();
        })();
    </script>
</body>
</html>
