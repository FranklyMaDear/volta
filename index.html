<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Καφέ Βόλτα — Online Παραγγελίες</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,500;7..72,700;7..72,900&family=Commissioner:wght@400;500;600;700&display=swap&subset=greek" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --paper: #FDF8F0;
            --mocha: #5C3A21;
            --mocha-dark: #3E2723;
            --latte: #D4A373;
            --ink: #2C1810;
            --card: #FFFFFF;
            --line: #E6D5C3;
            --accent: #C7956D;
            --soft: #FBF4E4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Commissioner', sans-serif;
            background: var(--paper);
            color: var(--ink);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        h1,h2,h3 { font-family: 'Literata', serif; }
        .awning {
            height: 14px;
            background: repeating-linear-gradient(90deg, var(--mocha) 0 32px, var(--paper) 32px 64px);
        }
        header { position: sticky; top: 0; z-index: 50; background: var(--paper); border-bottom: 1px solid var(--line); }
        .bar {
            max-width: 1100px; margin: 0 auto; display: flex; align-items: center;
            justify-content: space-between; padding: 10px 16px; gap: 10px; flex-wrap: wrap;
        }
        .logo { display: flex; align-items: baseline; gap: 6px; text-decoration: none; color: var(--ink); }
        .logo .name { font-family: 'Literata', serif; font-weight: 900; font-size: 1.2rem; }
        .logo .name em { font-style: italic; color: var(--mocha); }
        .header-actions { display: flex; align-items: center; gap: 8px; }
        .points-badge { background: var(--accent); color: var(--ink); padding: 5px 10px; border-radius: 999px; font-weight: 700; font-size: 0.8rem; display: flex; align-items: center; gap: 4px; }
        .points-badge span { background: var(--mocha-dark); color: #fff; border-radius: 999px; padding: 1px 6px; font-size: 0.7rem; }
        .cart-btn { background: var(--mocha); color: #fff; border: none; cursor: pointer; padding: 7px 14px; border-radius: 999px; font-weight: 600; font-size: 0.85rem; }
        .hero { max-width: 1100px; margin: 0 auto; padding: 18px 16px 6px; }
        .hero h1 { font-size: clamp(1.5rem, 3.5vw, 2rem); font-weight: 900; }
        .hero .stroll { color: var(--mocha); font-style: italic; }
        .hero p { font-size: 0.85rem; color: #4d4336; margin-top: 4px; }
        .cats { position: sticky; top: 52px; z-index: 40; background: var(--paper); border-bottom: 1px solid var(--line); padding: 6px 0; }
        .cats-inner { max-width: 1100px; margin: 0 auto; padding: 0 16px; display: flex; gap: 6px; overflow-x: auto; }
        .chip { border: 1.5px solid var(--mocha); background: transparent; color: var(--mocha); padding: 5px 12px; border-radius: 999px; font-weight: 600; font-size: 0.8rem; cursor: pointer; white-space: nowrap; }
        .chip.active { background: var(--mocha); color: #fff; }
        main { max-width: 1100px; margin: 0 auto; padding: 16px; flex: 1; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .product { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 12px; display: flex; flex-direction: column; gap: 6px; }
        .p-name { font-family: 'Literata', serif; font-weight: 700; font-size: 0.9rem; }
        .p-options select, .flavor-row select { font-size: 0.75rem; padding: 5px; border-radius: 5px; border: 1px solid var(--line); width: 100%; }
        .flavor-row { display: flex; gap: 4px; }
        .p-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
        .p-price { font-weight: 700; color: var(--mocha); }
        .add { border: 1.5px solid var(--mocha); background: transparent; color: var(--mocha); border-radius: 999px; padding: 4px 10px; cursor: pointer; font-weight: 600; font-size: 0.75rem; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); opacity: 0; pointer-events: none; z-index: 60; }
        .overlay.open { opacity: 1; pointer-events: auto; }
        .drawer { position: fixed; top: 0; right: 0; bottom: 0; width: min(360px, 100%); background: #fff; z-index: 70; display: flex; flex-direction: column; transform: translateX(100%); transition: .25s; box-shadow: -4px 0 15px rgba(0,0,0,0.1); }
        .drawer.open { transform: translateX(0); }
        .drawer-head { padding: 14px 16px; border-bottom: 1px solid var(--line); background: var(--soft); display: flex; justify-content: space-between; }
        .drawer-body { flex: 1; overflow-y: auto; padding: 10px 16px; }
        .drawer-foot { padding: 14px 16px; background: var(--soft); border-top: 1px solid var(--line); }
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
        .form-group input, .form-group select, .form-group textarea { padding: 9px; border-radius: 6px; border: 1px solid var(--line); font-family: inherit; font-size: 0.85rem; }
        .checkout { width: 100%; background: var(--mocha); color: #fff; border: none; border-radius: 999px; padding: 11px; font-weight: 700; cursor: pointer; }
        .checkout:disabled { opacity: 0.5; }
        footer { background: var(--mocha-dark); color: #e7d7c4; padding: 16px; text-align: center; font-size: 0.85rem; margin-top: auto; }
        footer a { color: #fff; }
        .toast { position: fixed; left: 50%; bottom: 20px; transform: translate(-50%, 80px); background: var(--ink); color: #fff; padding: 8px 16px; border-radius: 999px; font-size: 0.8rem; z-index: 80; opacity: 0; transition: .25s; }
        .toast.show { transform: translate(-50%, 0); opacity: 1; }
    </style>
</head>
<body>
<div class="awning"></div>
<header>
    <div class="bar">
        <a class="logo" href="#"><span class="name">Καφέ <em>Βόλτα</em></span></a>
        <div class="header-actions">
            <div class="points-badge" id="pointsDisplay">⭐ <span id="pointsValue">0</span> πόντοι</div>
            <button class="cart-btn" id="openCart">🧺 Καλάθι <span id="cartCount">0</span></button>
        </div>
    </div>
</header>

<section class="hero">
    <h1>Ο τέλειος καφές, <span class="stroll">έτοιμος πριν φτάσεις.</span></h1>
    <p>Παράγγειλε online, κέρδισε 1 πόντο ανά 1€ και παρέλαβε χωρίς αναμονή.</p>
</section>

<nav class="cats">
    <div class="cats-inner" id="categoryNav">
        <div class="chip active" data-cat="coffee">Καφέδες & Ροφήματα</div>
        <div class="chip" data-cat="icecream">Παγωτό</div>
    </div>
</nav>

<main><div class="grid" id="productsGrid"></div></main>

<footer>
    <p><strong>Καφέ Βόλτα</strong> – Φήκη Τρικάλων</p>
    <p>📞 <a href="tel:2431052032">2431052032</a> | ⏰ 06:00 – 23:00</p>
</footer>

<div class="overlay" id="overlay"></div>
<aside class="drawer" id="drawer">
    <div class="drawer-head"><h2>Το καλάθι σου</h2><button id="closeCart">&times;</button></div>
    <div class="drawer-body" id="cartBody"></div>
    <div class="drawer-foot">
        <div class="totals"><span>Σύνολο</span><span id="cartTotal">0,00 €</span></div>
        <div class="reward-note" id="rewardNote" style="display:none;">🎁 Θα κερδίσεις <strong id="earnedPoints">0</strong> πόντους</div>
        <div class="form-group">
            <input type="text" id="nameField" placeholder="Ονοματεπώνυμο (προαιρετικό)">
            <input type="tel" id="phoneField" placeholder="Τηλέφωνο *">
            <textarea id="commentField" placeholder="Σχόλιο για την παραγγελία"></textarea>
            <select id="timeField">
                <option value="Σε 5 λεπτά">Παραλαβή σε 5'</option>
                <option value="Σε 10 λεπτά" selected>Παραλαβή σε 10'</option>
                <option value="Σε 15 λεπτά">Παραλαβή σε 15'</option>
                <option value="Σε 20 λεπτά">Παραλαβή σε 20'</option>
            </select>
        </div>
        <button class="checkout" id="checkout" disabled>Ολοκλήρωση παραγγελίας</button>
    </div>
</aside>
<div class="toast" id="toast"></div>

<script>
    const PRODUCTS = [
        { id: 'espresso', n: "Espresso", p: 1.50, cat: 'coffee', sugar: true },
        { id: 'espresso2', n: "Espresso Διπλός", p: 2.00, cat: 'coffee', sugar: true },
        { id: 'freddo', n: "Freddo Espresso", p: 2.50, cat: 'coffee', sugar: true },
        { id: 'cappuccino', n: "Cappuccino", p: 2.50, cat: 'coffee', sugar: true },
        { id: 'freddocap', n: "Freddo Cappuccino", p: 2.80, cat: 'coffee', sugar: true },
        { id: 'frappe', n: "Frappe", p: 2.00, cat: 'coffee', sugar: true },
        { id: 'latte', n: "Latte", p: 2.80, cat: 'coffee', sugar: true },
        { id: 'nescafe', n: "Nescafe", p: 2.00, cat: 'coffee', sugar: true },
        { id: 'ellinikos', n: "Ελληνικός Μονός", p: 1.50, cat: 'coffee', sugar: true },
        { id: 'ellinikos2', n: "Ελληνικός Διπλός", p: 2.00, cat: 'coffee', sugar: true },
        { id: 'gallikos', n: "Γαλλικός", p: 2.00, cat: 'coffee', sugar: true },
        { id: 'sokolata', n: "Σοκολάτα", p: 2.80, cat: 'coffee', sugar: true },
        { id: 'sokolatavien', n: "Σοκολάτα Βιεννουά", p: 3.00, cat: 'coffee', sugar: true },
        { id: 'kakao', n: "Κακάο", p: 2.20, cat: 'coffee', sugar: true },
        { id: 'tsai', n: "Τσάι", p: 2.00, cat: 'coffee', sugar: true },
        { id: 'granita', n: "Γρανίτα", p: 2.50, cat: 'coffee' }, 
        { id: 'icecone', n: "Παγωτό Χωνάκι (2 μπάλες)", p: 1.50, cat: 'icecream' },
        { id: 'icecup', n: "Παγωτό Κύπελλο (2 μπάλες)", p: 1.50, cat: 'icecream' }
    ];
    const FLAVORS = ['Βανίλια', 'Σοκολάτα', 'Φράουλα', 'Μπανάνα', 'Στρατσιατέλα', 'Καϊμάκι'];
    const euro = v => v.toFixed(2).replace('.', ',') + ' €';
    const cart = new Map();

    const LS_NAME = 'kv_name', LS_PHONE = 'kv_phone', LS_POINTS = 'kv_points';
    function loadData() {
        document.getElementById('nameField').value = localStorage.getItem(LS_NAME) || '';
        document.getElementById('phoneField').value = localStorage.getItem(LS_PHONE) || '';
        updatePointsDisplay();
    }
    function saveData() {
        const n = document.getElementById('nameField').value.trim();
        const p = document.getElementById('phoneField').value.trim();
        if (n) localStorage.setItem(LS_NAME, n);
        if (p) localStorage.setItem(LS_PHONE, p);
    }
    function getPoints() { return parseInt(localStorage.getItem(LS_POINTS) || '0'); }
    function addPoints(pts) { localStorage.setItem(LS_POINTS, getPoints() + pts); updatePointsDisplay(); }
    function updatePointsDisplay() {
        const pts = getPoints();
        document.getElementById('pointsValue').textContent = pts;
        document.getElementById('pointsDisplay').style.display = pts > 0 ? 'flex' : 'none';
    }

    let currentCat = 'coffee';
    document.getElementById('categoryNav').addEventListener('click', e => {
        const chip = e.target.closest('.chip');
        if (!chip) return;
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        currentCat = chip.dataset.cat;
        renderProducts();
    });

    const grid = document.getElementById('productsGrid');
    function renderProducts() {
        grid.innerHTML = '';
        PRODUCTS.filter(p => p.cat === currentCat).forEach(p => {
            const card = document.createElement('div');
            card.className = 'product';
            let opts = '';
            if (p.sugar) opts = `<div class="p-options"><select class="sugar"><option value="σκέτο">Σκέτο</option><option value="μέτριο" selected>Μέτριο</option><option value="γλυκό">Γλυκό</option></select></div>`;
            else if (p.cat === 'icecream') {
                const fl = FLAVORS.map(f => `<option>${f}</option>`).join('');
                opts = `<div class="p-options"><div class="flavor-row"><select class="flv1">${fl}</select><select class="flv2">${fl}</select></div></div>`;
            }
            card.innerHTML = `<div class="p-name">${p.n}</div>${opts}<div class="p-foot"><div class="p-price">${euro(p.p)}</div><button class="add">+</button></div>`;
            grid.appendChild(card);
        });
    }

    grid.addEventListener('click', e => {
        const btn = e.target.closest('.add');
        if (!btn) return;
        const card = btn.closest('.product');
        const prodName = card.querySelector('.p-name').textContent;
        const prod = PRODUCTS.find(p => p.n === prodName);
        if (!prod) return;
        if (prod.cat === 'icecream') {
            const f1 = card.querySelector('.flv1').value;
            const f2 = card.querySelector('.flv2').value;
            const key = `${prod.id}::${f1},${f2}`;
            const existing = cart.get(key);
            if (existing) existing.qty++; else cart.set(key, { qty: 1, prod, flavors: [f1, f2] });
        } else {
            const sugar = card.querySelector('.sugar')?.value || null;
            const key = `${prod.id}::${sugar || 'nosugar'}`;
            const existing = cart.get(key);
            if (existing) existing.qty++; else cart.set(key, { qty: 1, prod, sugar });
        }
        updateCart();
        showToast(`«${prod.n}» προστέθηκε`);
        btn.classList.add('added'); btn.textContent = '✓';
        setTimeout(() => { btn.classList.remove('added'); btn.textContent = '+'; }, 800);
    });

    const drawer = document.getElementById('drawer'), overlay = document.getElementById('overlay');
    document.getElementById('openCart').onclick = () => { drawer.classList.add('open'); overlay.classList.add('open'); };
    document.getElementById('closeCart').onclick = () => { drawer.classList.remove('open'); overlay.classList.remove('open'); };
    overlay.onclick = () => { drawer.classList.remove('open'); overlay.classList.remove('open'); };

    function updateCart() {
        let count = 0, total = 0;
        cart.forEach(v => { count += v.qty; total += v.qty * v.prod.p; });
        document.getElementById('cartCount').textContent = count;
        document.getElementById('cartTotal').textContent = euro(total);
        document.getElementById('checkout').disabled = count === 0;
        const earned = Math.floor(total);
        document.getElementById('earnedPoints').textContent = earned;
        document.getElementById('rewardNote').style.display = (count && earned) ? 'flex' : 'none';
        const cartBody = document.getElementById('cartBody');
        if (!count) { cartBody.innerHTML = '<div class="empty">Το καλάθι είναι άδειο.</div>'; return; }
        cartBody.innerHTML = '';
        cart.forEach((v, key) => {
            let desc = v.sugar ? `Ζάχαρη: ${v.sugar}` : (v.flavors ? `Γεύσεις: ${v.flavors.join(', ')}` : '');
            cartBody.innerHTML += `
                <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px dashed #ddd;">
                    <div style="flex:1"><strong>${v.prod.n}</strong>${desc ? `<br><small>${desc}</small>` : ''}</div>
                    <div style="display:flex;align-items:center;gap:4px;">
                        <button onclick="changeQty('${key}', -1)">−</button>
                        <span>${v.qty}</span>
                        <button onclick="changeQty('${key}', 1)">+</button>
                    </div>
                    <div style="min-width:45px;text-align:right;">${euro(v.qty * v.prod.p)}</div>
                </div>`;
        });
    }
    window.changeQty = (key, step) => {
        const entry = cart.get(key);
        if (!entry) return;
        entry.qty += step;
        if (entry.qty <= 0) cart.delete(key);
        updateCart();
    };

    async function sendTelegramMessage(chatId, text) {
        try {
            const response = await fetch('https://api.telegram.org/bot8991103662:AAEkcD1qR10eG4lG3T3Hy_YU-9Sz8EiqKF4/sendMessage', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chatId, text: text, parse_mode: 'HTML' })
            });

            if (!response.ok) {
                const errorData = await response.json();
                return { success: false, error: errorData.description };
            }
            return { success: true };
        } catch (error) {
            return { success: false, error: "Network Error (Δίκτυο)" };
        }
    }

    document.getElementById('checkout').onclick = async () => {
        const phone = document.getElementById('phoneField').value.trim();
        if (!phone) { alert('Συμπληρώστε τηλέφωνο'); return; }
        saveData();
        let totalAmount = 0; cart.forEach(v => totalAmount += v.qty * v.prod.p);
        const earned = Math.floor(totalAmount);
        if (earned > 0) addPoints(earned);

        const tgUser = window.Telegram?.WebApp?.initDataUnsafe?.user;
        const name = document.getElementById('nameField').value.trim();
        const comment = document.getElementById('commentField').value.trim();
        const time = document.getElementById('timeField').value;
        const customerName = name || (tgUser?.first_name || 'Πελάτης');
        const totalPoints = getPoints();

        let contactLink = tgUser ? (tgUser.username ? `\n💬 @${tgUser.username}` : `\n💬 <a href="tg://user?id=${tgUser.id}">Στείλε μήνυμα</a>`) : '';
        let itemsText = ''; 
        cart.forEach(v => { 
            let details = v.sugar ? `(Ζάχαρη: ${v.sugar})` : (v.flavors ? `(Γεύσεις: ${v.flavors.join(', ')})` : '');
            itemsText += `- ${v.qty}x ${v.prod.n} ${details}\n`; 
        });

        // Μήνυμα που θα σταλεί
        const fullOrderMessage = `🚨 <b>ΝΕΑ ΠΑΡΑΓΓΕΛΙΑ</b>\n👤 ${customerName}${contactLink}\n📞 ${phone}\n📝 ${comment || '-'}\n⏰ ${time}\n💰 Σύνολο: <b>${euro(totalAmount)}</b>\n\n📦 <b>Αναλυτικά:</b>\n${itemsText}\n\n⭐ <b>Πόντοι:</b>\n🔹 Κέρδισε: +${earned}\n💰 Σύνολο πόντων συσκευής: <b>${totalPoints}</b>`;

        // 1. Στέλνουμε ΠΡΩΤΑ στην ομάδα (Αυτό είναι το πιο σημαντικό)
        const groupResult = await sendTelegramMessage('-1004444414863', fullOrderMessage);

        if (groupResult.success) {
            // 2. Επιχειρούμε να στείλουμε και στον εαυτό σου (6968710468)
            // Αν αποτύχει, ΔΕΝ θα σταματήσει την ομάδα, απλά δεν θα σου έρθει σε εσένα (μέχρι να κάνεις /start στο bot)
            await sendTelegramMessage('6968710468', fullOrderMessage); 
            
            // Καθαρισμός καλαθιού
            cart.clear(); updateCart();
            document.getElementById('cartBody').innerHTML = `<div class="thanks"><h3>Ευχαριστούμε!</h3><p>Παραλαβή σε ${time}</p><p>Κέρδισες ${earned} πόντους</p></div>`;
            document.getElementById('commentField').value = '';
        } else {
            alert(`❌ Απέτυχε να σταλεί στην ΟΜΑΔΑ!\nΛόγος: ${groupResult.error}\n\nΒεβαιώσου ότι το bot @coffeevolta_bot είναι ΜΕΛΟΣ και ΔΙΑΧΕΙΡΙΣΤΗΣ της ομάδας.`);
        }
    };

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 1500);
    }

    loadData();
    renderProducts();
    updateCart();
    updatePointsDisplay();
</script>
</body>
</html>
