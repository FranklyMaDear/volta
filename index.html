    <style>
        :root {
            --bg-dark: #1a0533;
            --bg-card: #2d1b69;
            --border: #5b3ea8;
            --gold: #feca57;
            --gold-light: #ff9ff3;

            --shadow: 0 6px 24px rgba(0,0,0,0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            overflow: hidden;
            height: 100%;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            touch-action: manipulation;
        }

        body {
            background: #1a0533;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0;
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        /* ========== ΟΘΟΝΗ ΕΝΑΡΞΗΣ - ΜΑΓΙΚΟΣ ΚΗΠΟΣ ========== */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            background: linear-gradient(180deg, 
                #4FC3F7 0%,
                #81D4FA 20%,
                #B3E5FC 45%,
                #E1F5FE 55%,
                #A5D6A7 65%,
                #66BB6A 80%,
                #4CAF50 100%
            );
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            gap: 8px;
            padding: 20px;
            animation: fadeInSplash 1.2s ease;
            overflow: hidden;
            cursor: pointer;
        }

        .splash-screen.hidden {
            display: none !important;
        }

        @keyframes fadeInSplash {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ========== ΗΛΙΟΣ (ΠΙΟ ΚΑΤΩ) ========== */
        .sun-container {
            position: absolute;
            top: 8%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            pointer-events: none;
            filter: drop-shadow(0 0 30px rgba(255, 234, 0, 0.8));
        }

        .sun-wrapper {
            position: relative;
            animation: sunPulse 2.5s ease-in-out infinite;
        }

        .sun-core {
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at 40% 35%, 
                #FFF9C4 0%,
                #FFEA00 25%,
                #FFD600 50%,
                #FFC400 80%,
                #FFAB00 100%
            );
            border-radius: 50%;
            position: relative;
            z-index: 3;
            box-shadow: 
                0 0 40px #FFEA00,
                0 0 80px #FFD600,
                0 0 120px rgba(255, 234, 0, 0.6);
        }

        .sun-face {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 4;
            pointer-events: none;
        }

        .sun-eye {
            position: absolute;
            width: 10px;
            height: 12px;
            background: #5D4037;
            border-radius: 50%;
            top: -6px;
            animation: sunBlink 4s ease-in-out infinite;
        }

        .sun-eye.left { left: -12px; }
        .sun-eye.right { left: 6px; }

        .sun-mouth {
            position: absolute;
            width: 16px;
            height: 7px;
            border-bottom: 3px solid #5D4037;
            border-radius: 0 0 50% 50%;
            top: 4px;
            left: -5px;
        }

        @keyframes sunBlink {
            0%, 45%, 55%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.1); }
        }

        @keyframes sunPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.06); }
        }

        .sun-ray {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            pointer-events: none;
        }

        .ray {
            position: absolute;
            background: #FFEA00;
            border-radius: 8px;
            opacity: 0.7;
            animation: rayGlow 1.5s ease-in-out infinite;
            top: 50%;
            left: 50%;
        }

        .ray:nth-child(1) { width: 6px; height: 24px; transform: translate(-50%, -50%) rotate(0deg) translateY(-44px); animation-delay: 0s; }
        .ray:nth-child(2) { width: 5px; height: 20px; transform: translate(-50%, -50%) rotate(45deg) translateY(-42px); animation-delay: 0.15s; }
        .ray:nth-child(3) { width: 6px; height: 24px; transform: translate(-50%, -50%) rotate(90deg) translateY(-44px); animation-delay: 0.3s; }
        .ray:nth-child(4) { width: 5px; height: 20px; transform: translate(-50%, -50%) rotate(135deg) translateY(-42px); animation-delay: 0.45s; }
        .ray:nth-child(5) { width: 6px; height: 24px; transform: translate(-50%, -50%) rotate(180deg) translateY(-44px); animation-delay: 0.6s; }
        .ray:nth-child(6) { width: 5px; height: 20px; transform: translate(-50%, -50%) rotate(225deg) translateY(-42px); animation-delay: 0.75s; }
        .ray:nth-child(7) { width: 6px; height: 24px; transform: translate(-50%, -50%) rotate(270deg) translateY(-44px); animation-delay: 0.9s; }
        .ray:nth-child(8) { width: 5px; height: 20px; transform: translate(-50%, -50%) rotate(315deg) translateY(-42px); animation-delay: 1.05s; }

        @keyframes rayGlow {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) rotate(var(--r)) translateY(-42px) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) rotate(var(--r)) translateY(-42px) scale(1.2); }
        }

        /* ========== ΣΥΝΝΕΦΑ (ΠΙΟ ΚΑΤΩ) ========== */
        .cloud {
            position: absolute;
            background: #FFFFFF;
            border-radius: 50%;
            z-index: 8;
            pointer-events: none;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }

        .cloud::before,
        .cloud::after {
            content: '';
            position: absolute;
            background: #FFFFFF;
            border-radius: 50%;
        }

        .cloud-1 {
            width: 80px;
            height: 35px;
            top: 18%;
            left: 5%;
            animation: cloudFloat1 12s ease-in-out infinite;
        }
        .cloud-1::before { width: 40px; height: 40px; top: -20px; left: 12px; }
        .cloud-1::after { width: 32px; height: 32px; top: -14px; left: 40px; }

        .cloud-2 {
            width: 70px;
            height: 30px;
            top: 14%;
            left: 25%;
            animation: cloudFloat2 9s ease-in-out infinite;
        }
        .cloud-2::before { width: 35px; height: 35px; top: -18px; left: 8px; }
        .cloud-2::after { width: 28px; height: 28px; top: -12px; left: 32px; }

        .cloud-3 {
            width: 75px;
            height: 32px;
            top: 22%;
            left: 55%;
            animation: cloudFloat3 11s ease-in-out infinite;
        }
        .cloud-3::before { width: 38px; height: 38px; top: -20px; left: 10px; }
        .cloud-3::after { width: 30px; height: 30px; top: -14px; left: 36px; }

        .cloud-4 {
            width: 60px;
            height: 28px;
            top: 26%;
            left: 30%;
            animation: cloudFloat4 14s ease-in-out infinite;
        }
        .cloud-4::before { width: 32px; height: 32px; top: -16px; left: 6px; }
        .cloud-4::after { width: 24px; height: 24px; top: -10px; left: 28px; }

        @keyframes cloudFloat1 {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(15px); }
            50% { transform: translateX(-6px); }
            75% { transform: translateX(12px); }
        }
        @keyframes cloudFloat2 {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-12px); }
            50% { transform: translateX(14px); }
            75% { transform: translateX(-8px); }
        }
        @keyframes cloudFloat3 {
            0%, 100% { transform: translateX(0); }
            33% { transform: translateX(18px); }
            66% { transform: translateX(-12px); }
        }
        @keyframes cloudFloat4 {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(-20px); }
        }

        /* ========== ΛΟΥΛΟΥΔΙΑ (ΜΕΓΑΛΥΤΕΡΑ, ΠΙΟ ΠΙΣΩ) ========== */
        .flower {
            position: absolute;
            z-index: 4;
            pointer-events: none;
            animation: flowerSway 3.5s ease-in-out infinite;
        }

        .flower-center {
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #FFD54F 0%, #FFC107 100%);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
            box-shadow: 0 0 8px rgba(255,193,7,0.5);
        }

        .flower-petal {
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50% 50% 50% 0;
            top: 50%;
            left: 50%;
            transform-origin: center center;
        }

        .petal-1 { transform: translate(-50%, -50%) rotate(0deg) translateY(-14px); }
        .petal-2 { transform: translate(-50%, -50%) rotate(45deg) translateY(-14px); }
        .petal-3 { transform: translate(-50%, -50%) rotate(90deg) translateY(-14px); }
        .petal-4 { transform: translate(-50%, -50%) rotate(135deg) translateY(-14px); }
        .petal-5 { transform: translate(-50%, -50%) rotate(180deg) translateY(-14px); }
        .petal-6 { transform: translate(-50%, -50%) rotate(225deg) translateY(-14px); }
        .petal-7 { transform: translate(-50%, -50%) rotate(270deg) translateY(-14px); }
        .petal-8 { transform: translate(-50%, -50%) rotate(315deg) translateY(-14px); }

        .flower-stem {
            position: absolute;
            width: 4px;
            height: 40px;
            background: linear-gradient(180deg, #66BB6A, #4CAF50, #388E3C);
            top: 50%;
            left: 50%;
            transform: translate(-50%, 0);
            border-radius: 2px;
            z-index: 1;
        }

        .flower-leaf {
            position: absolute;
            width: 12px;
            height: 6px;
            background: #4CAF50;
            border-radius: 0 50% 50% 0;
            z-index: 2;
        }

        .flower-1 { bottom: 18%; left: 8%; animation-delay: 0s; }
        .flower-1 .flower-petal { background: #FF4081; }
        .flower-1 .flower-leaf { top: 55%; left: 55%; transform: rotate(-30deg); }

        .flower-2 { bottom: 18%; left: 22%; animation-delay: 0.7s; }
        .flower-2 .flower-petal { background: #FF6E40; }
        .flower-2 .flower-leaf { top: 60%; left: 50%; transform: rotate(25deg); }

        .flower-3 { bottom: 15%; right: 12%; animation-delay: 1.4s; }
        .flower-3 .flower-petal { background: #E040FB; }
        .flower-3 .flower-leaf { top: 52%; left: 48%; transform: rotate(-20deg); }

        .flower-4 { bottom: 18%; right: 28%; animation-delay: 2.1s; }
        .flower-4 .flower-petal { background: #FF5252; }
        .flower-4 .flower-leaf { top: 58%; left: 52%; transform: rotate(35deg); }

        .flower-5 { bottom: 15%; left: 38%; animation-delay: 2.8s; }
        .flower-5 .flower-petal { background: #FFD740; }
        .flower-5 .flower-leaf { top: 54%; left: 54%; transform: rotate(-15deg); }

        .flower-6 { bottom: 18%; left: 52%; animation-delay: 3.5s; }
        .flower-6 .flower-petal { background: #69F0AE; }
        .flower-6 .flower-leaf { top: 56%; left: 46%; transform: rotate(30deg); }

        @keyframes flowerSway {
            0%, 100% { transform: rotate(-4deg) translateY(0); }
            25% { transform: rotate(4deg) translateY(-3px); }
            50% { transform: rotate(-3deg) translateY(0); }
            75% { transform: rotate(5deg) translateY(-2px); }
        }

        /* ========== ΧΟΡΤΑΡΑΚΙΑ (ΜΠΡΟΣΤΑ) ========== */
        .grass-patch {
            position: absolute;
            bottom: 0;
            z-index: 8;
            pointer-events: none;
            display: flex;
            gap: 1px;
        }

        .grass-blade {
            background: linear-gradient(180deg, #81C784 0%, #4CAF50 40%, #388E3C 100%);
            border-radius: 40% 40% 0 0;
            animation: grassWave 2.5s ease-in-out infinite;
            transform-origin: bottom center;
        }

        @keyframes grassWave {
            0%, 100% { transform: rotate(-3deg) scaleY(1); }
            25% { transform: rotate(4deg) scaleY(1.08); }
            50% { transform: rotate(-2deg) scaleY(0.95); }
            75% { transform: rotate(5deg) scaleY(1.05); }
        }

        /* ========== ΠΕΤΑΛΟΥΔΕΣ (ΠΙΟ ΑΛΗΘΙΝΕΣ, ΜΕΓΑΛΥΤΕΡΟ Z-INDEX) ========== */
        .butterfly {
            position: absolute;
            z-index: 15;
            pointer-events: none;
            animation: butterflyFly 5s ease-in-out infinite;
        }

        .butterfly-body {
            width: 4px;
            height: 14px;
            background: #4A3B32;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
        }

        .butterfly-head {
            width: 6px;
            height: 6px;
            background: #4A3B32;
            border-radius: 50%;
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
        }

        .butterfly-antenna {
            position: absolute;
            width: 1px;
            height: 8px;
            background: #4A3B32;
            top: -14px;
            border-radius: 1px;
            transform-origin: bottom center;
            animation: antennaSway 1.5s ease-in-out infinite;
        }

        .butterfly-antenna::after {
            content: '';
            position: absolute;
            width: 4px;
            height: 4px;
            background: #5D4037;
            border-radius: 50%;
            top: -2px;
            left: -2px;
        }

        .antenna-left { left: 1px; transform: rotate(-20deg); animation-delay: 0s; }
        .antenna-right { right: 1px; transform: rotate(20deg); animation-delay: 0.2s; }

        @keyframes antennaSway {
            0%, 100% { transform: rotate(var(--angle)); }
            50% { transform: rotate(calc(var(--angle) * -1)); }
        }

        .butterfly-wing {
            position: absolute;
            border-radius: 50%;
            opacity: 0.9;
            animation: wingFlap 0.3s ease-in-out infinite;
            top: 50%;
            z-index: 1;
        }

        .wing-upper {
            width: 22px;
            height: 14px;
            border-radius: 50% 50% 0 0;
        }

        .wing-lower {
            width: 16px;
            height: 10px;
            border-radius: 0 0 50% 50%;
            top: 4px;
        }

        .wing-left { right: 2px; transform-origin: right center; }
        .wing-right { left: 2px; transform-origin: left center; }

        .wing-pattern {
            position: absolute;
            width: 60%;
            height: 60%;
            border-radius: 50%;
            top: 20%;
            left: 20%;
            opacity: 0.5;
        }

        @keyframes wingFlap {
            0%, 100% { transform: rotateY(0deg) scaleX(1); }
            50% { transform: rotateY(50deg) scaleX(0.8); }
        }

        .butterfly-1 {
            top: 28%;
            left: 12%;
            animation-delay: 0s;
        }
        .butterfly-1 .wing-upper { background: linear-gradient(180deg, #FF80AB, #FF4081); }
        .butterfly-1 .wing-lower { background: linear-gradient(180deg, #FF80AB, #F50057); }
        .butterfly-1 .wing-pattern { background: rgba(255,255,255,0.3); }

        .butterfly-2 {
            top: 32%;
            right: 15%;
            animation-delay: 1.2s;
        }
        .butterfly-2 .wing-upper { background: linear-gradient(180deg, #80D8FF, #40C4FF); }
        .butterfly-2 .wing-lower { background: linear-gradient(180deg, #80D8FF, #0091EA); }
        .butterfly-2 .wing-pattern { background: rgba(255,255,255,0.4); }

        /* Μόνο 2 πεταλούδες φαίνονται */
        .butterfly-3, .butterfly-4 { display: none; }

        @keyframes butterflyFly {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            20% { transform: translate(20px, -15px) rotate(5deg); }
            40% { transform: translate(45px, -30px) rotate(-3deg); }
            60% { transform: translate(15px, -18px) rotate(4deg); }
            80% { transform: translate(-8px, -10px) rotate(-4deg); }
        }

        /* ========== ΑΝΘΡΩΠΑΚΙΑ (ΠΙΟ ΜΕΓΑΛΑ, 120px) ========== */
        .character {
            position: absolute;
            z-index: 14;
            pointer-events: none;
            bottom: 2%;
            width: 70px;
            height: 120px;
        }

        .character-boy {
            right: 10%;
            animation-delay: 0s;
        }

        .character-girl {
            right: 35%;
            animation-delay: 0.3s;
        }

        .character-body-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            animation: characterDance 1.2s ease-in-out infinite;
        }

        @keyframes characterDance {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            25% { transform: translateY(-10px) rotate(3deg); }
            50% { transform: translateY(0) rotate(-1deg); }
            75% { transform: translateY(-6px) rotate(2deg); }
        }

        /* Κεφάλι */
        .character-head {
            width: 56px;
            height: 56px;
            background: #FFDAB9;
            border-radius: 50%;
            position: relative;
            margin: 0 auto;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            z-index: 2;
        }

        /* Μαλλιά */
        .character-hair {
            position: absolute;
            top: -8px;
            left: -4px;
            width: 64px;
            height: 32px;
            border-radius: 50% 50% 0 0;
            z-index: 3;
        }

        .hair-boy {
            background: #5D4037;
        }

        .hair-girl {
            background: #FF8A65;
            height: 36px;
            border-radius: 50% 50% 0 0;
        }

        /* Μαλλιά κορίτσι - κοτσίδες */
        .hair-girl::before,
        .hair-girl::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 24px;
            background: #FF8A65;
            border-radius: 50%;
            bottom: -16px;
            animation: pigtailSway 1.2s ease-in-out infinite;
        }

        .hair-girl::before { left: -6px; }
        .hair-girl::after { right: -6px; }

        @keyframes pigtailSway {
            0%, 100% { transform: rotate(-6deg); }
            50% { transform: rotate(6deg); }
        }

        /* Πρόσωπο */
        .character-face {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
        }

        .eye-left, .eye-right {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #333;
            border-radius: 50%;
            top: 16px;
        }

        .eye-left { left: 12px; }
        .eye-right { right: 12px; }

        .nose {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #F5CBA7;
            border-radius: 50%;
            top: 26px;
            left: 50%;
            transform: translateX(-50%);
        }

        .mouth {
            position: absolute;
            width: 18px;
            height: 9px;
            border-bottom: 3px solid #333;
            border-radius: 0 0 50% 50%;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Σώμα */
        .character-body {
            width: 56px;
            height: 36px;
            background: #6C5CE7;
            border-radius: 14px 14px 8px 8px;
            margin: -4px auto 0;
            position: relative;
            z-index: 1;
        }

        .character-girl .character-body { background: #FF6B9D; }
        .character-girl .character-head { background: #FFE0B2; }

        /* Χέρια */
        .character-arm {
            position: absolute;
            width: 10px;
            height: 22px;
            background: #FFDAB9;
            border-radius: 5px;
            top: -4px;
            transform-origin: top center;
            animation: armWave 0.8s ease-in-out infinite;
        }

        .character-girl .character-arm { background: #FFE0B2; }

        .arm-left { left: -8px; }
        .arm-right { right: -8px; }

        .character-boy .arm-left { animation-delay: 0s; }
        .character-boy .arm-right { animation-delay: 0.15s; }
        .character-girl .arm-left { animation-delay: 0.2s; }
        .character-girl .arm-right { animation-delay: 0.35s; }

        @keyframes armWave {
            0%, 100% { transform: rotate(-18deg); }
            50% { transform: rotate(22deg); }
        }

        /* Πόδια */
        .character-leg {
            position: absolute;
            width: 10px;
            height: 28px;
            background: #FFDAB9;
            border-radius: 5px;
            bottom: -24px;
            transform-origin: top center;
            animation: legWalk 0.8s ease-in-out infinite;
        }

        .character-girl .character-leg { background: #FFE0B2; }

        .leg-left { left: 14px; }
        .leg-right { right: 14px; }

        .character-boy .leg-left { animation-delay: 0s; }
        .character-boy .leg-right { animation-delay: 0.4s; }
        .character-girl .leg-left { animation-delay: 0.2s; }
        .character-girl .leg-right { animation-delay: 0.6s; }

        @keyframes legWalk {
            0%, 100% { transform: rotate(-12deg); }
            50% { transform: rotate(12deg); }
        }

        /* Παπούτσια */
        .character-shoe {
            position: absolute;
            width: 16px;
            height: 9px;
            background: #333;
            border-radius: 5px 5px 7px 7px;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* ========== ΛΟΓΟΤΥΠΟ ========== */
        .logo-wrapper {
            position: relative;
            z-index: 15;
            width: clamp(150px, 35vw, 200px);
            height: clamp(150px, 35vw, 200px);
            background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.15) 50%, transparent 75%);
            border-radius: 50%;
            padding: 8px;
            backdrop-filter: blur(5px);
            box-shadow: 
                0 0 30px rgba(255,255,255,0.4),
                0 0 60px rgba(255, 234, 0, 0.2);
        }

        .splash-logo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            box-shadow:
                0 0 40px rgba(255,159,243,0.4),
                0 0 60px rgba(72,219,251,0.3),
                0 8px 25px rgba(0,0,0,0.2);
            position: relative;
            z-index: 2;
            animation: logoFastSpinStop 1.2s cubic-bezier(0.25, 0.1, 0.1, 1) forwards;
        }

        @keyframes logoFastSpinStop {
            0% {
                transform: rotate(0deg) scale(0.2);
                opacity: 0;
                filter: blur(8px);
            }
            15% {
                transform: rotate(0deg) scale(1);
                opacity: 1;
                filter: blur(0);
            }
            45% {
                transform: rotate(1080deg) scale(1.08);
                opacity: 1;
                filter: blur(0);
            }
            65% {
                transform: rotate(720deg) scale(0.92);
                opacity: 1;
                filter: blur(0);
            }
            80% {
                transform: rotate(725deg) scale(1.04);
                opacity: 1;
                filter: blur(0);
            }
            100% {
                transform: rotate(720deg) scale(1);
                opacity: 1;
                filter: blur(0);
            }
        }

        /* Τίτλος */
        .splash-title {
            font-size: clamp(2rem, 6vw, 3rem);
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #E91E63 0%, #9C27B0 50%, #3F51B5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 3px 6px rgba(255,255,255,0.5));
            text-align: center;
            line-height: 1.2;
            position: relative;
            z-index: 15;
            animation: titleShine 2.5s ease-in-out infinite;
        }

        @keyframes titleShine {
            0%, 100% { filter: drop-shadow(0 3px 6px rgba(255,255,255,0.5)); }
            50% { filter: drop-shadow(0 3px 15px rgba(255,234,0,0.8)) drop-shadow(0 0 25px rgba(255,255,255,0.6)); }
        }

        .splash-subtitle {
            font-size: clamp(0.8rem, 2.5vw, 1.2rem);
            color: #E91E63;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 800;
            text-align: center;
            position: relative;
            z-index: 15;
            text-shadow: 0 2px 5px rgba(255,255,255,0.6);
        }

        /* Κουμπί START */
        .splash-btn {
            padding: 14px 45px;
            background: linear-gradient(180deg, #FFD740 0%, #FFC107 30%, #FF8F00 80%, #FF6D00 100%);
            border: 4px solid #FFF9C4;
            color: #4A148C;
            border-radius: 50px;
            font-weight: 900;
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow:
                0 8px 0 #E65100,
                0 10px 25px rgba(0,0,0,0.3),
                0 0 30px rgba(255,215,64,0.5),
                inset 0 2px 0 rgba(255,255,255,0.4);
            position: relative;
            z-index: 15;
            transition: all 0.15s ease;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            outline: none;
            animation: btnBounce 2s ease-in-out infinite;
        }

        @keyframes btnBounce {
            0%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); box-shadow: 0 14px 0 #E65100, 0 16px 30px rgba(0,0,0,0.3), 0 0 45px rgba(255,215,64,0.7), inset 0 2px 0 rgba(255,255,255,0.4); }
            50% { transform: translateY(0); box-shadow: 0 8px 0 #E65100, 0 10px 25px rgba(0,0,0,0.3), 0 0 30px rgba(255,215,64,0.5), inset 0 2px 0 rgba(255,255,255,0.4); }
            70% { transform: translateY(-3px); box-shadow: 0 11px 0 #E65100, 0 12px 25px rgba(0,0,0,0.3), 0 0 35px rgba(255,215,64,0.6), inset 0 2px 0 rgba(255,255,255,0.4); }
        }

        .splash-btn:active {
            top: 5px;
            box-shadow:
                0 3px 0 #E65100,
                0 5px 15px rgba(0,0,0,0.3),
                0 0 40px rgba(255,215,64,0.8),
                inset 0 2px 0 rgba(255,255,255,0.4);
            animation: none;
        }

        /* ========== ΕΠΙΛΟΓΗ ΓΛΩΣΣΑΣ / LANGUAGE SELECT ========== */
        .lang-select {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            position: relative;
            z-index: 15;
            margin-bottom: 4px;
        }

        .lang-btn {
            padding: 6px 14px;
            border: 3px solid #FFF9C4;
            border-radius: 40px;
            font-family: inherit;
            font-weight: 800;
            font-size: clamp(0.7rem, 2.5vw, 0.95rem);
            letter-spacing: 1px;
            cursor: pointer;
            color: #4A148C;
            background: rgba(255,255,255,0.75);
            box-shadow: 0 4px 0 rgba(230,81,0,0.4), 0 6px 14px rgba(0,0,0,0.2);
            transition: all 0.15s ease;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            outline: none;
        }

        .lang-btn.active {
            background: linear-gradient(180deg, #FFD740 0%, #FFC107 40%, #FF8F00 100%);
            color: #4A148C;
            border-color: #FFFFFF;
            box-shadow: 0 4px 0 #E65100, 0 6px 16px rgba(0,0,0,0.3), 0 0 18px rgba(255,215,64,0.6);
            transform: translateY(-2px);
        }

        .lang-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #E65100, 0 3px 10px rgba(0,0,0,0.3);
        }

        .splash-footer {
            font-size: clamp(0.6rem, 1.8vw, 0.8rem);
            color: rgba(74,20,140,0.7);
            letter-spacing: 2px;
            position: absolute;
            bottom: 15px;
            z-index: 15;
            font-weight: 700;
            text-shadow: 0 1px 3px rgba(255,255,255,0.4);
        }

        /* ========== ΚΥΡΙΟ ΠΑΙΧΝΙΔΙ ========== */
        .game-container {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            max-width: 100%;
            background: linear-gradient(180deg, #2d1b69 0%, #1a0533 100%);
            padding: 8px 8px 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .game-container.hidden {
            display: none !important;
        }

        .game-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 30%, rgba(72,219,251,0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255,107,157,0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(254,202,87,0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .title-section {
            text-align: center;
            position: relative;
            z-index: 1;
            width: 100%;
            padding-top: calc(env(safe-area-inset-top, 0px) + 16px);
            margin-bottom: 9px;
            flex-shrink: 0;
        }

        .title {
            font-size: clamp(1.15rem, 5.2vw, 1.7rem);
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #ff9ff3 0%, #feca57 40%, #48dbfb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 2px 4px rgba(72,219,251,0.4));
            line-height: 1.15;
        }

        .subtitle {
            font-size: clamp(0.55rem, 2vw, 0.72rem);
            color: #48dbfb;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
            text-shadow: 0 0 6px rgba(72,219,251,0.3);
            margin-top: 4px;
        }

        .hint-box {
            background: rgba(72,219,251,0.12);
            border: 2px solid rgba(72,219,251,0.5);
            color: #ffffff;
            padding: 8px 12px;
            border-radius: 10px;
            font-style: italic;
            font-size: clamp(1rem, 3.5vw, 1.4rem);
            font-weight: 600;
            text-align: center;
            width: 100%;
            box-shadow: 0 2px 12px rgba(72,219,251,0.15);
            position: relative;
            z-index: 1;
            line-height: 1.4;
            min-height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .level-bar-container {
            width: 100%;
            position: relative;
            z-index: 1;
            margin-bottom: 7px;
            flex-shrink: 0;
        }

        .level-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .level-text {
            font-size: clamp(0.7rem, 2.6vw, 0.92rem);
            font-weight: 800;
            color: #feca57;
            letter-spacing: 1px;
            text-shadow: 0 0 6px rgba(254,202,87,0.4);
        }

        .level-points {
            font-size: clamp(0.6rem, 2vw, 0.75rem);
            color: #48dbfb;
            font-family: 'SF Mono', 'Courier New', monospace;
            font-weight: 600;
        }

        .level-bar-outer {
            width: 100%;
            height: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
            border: 1px solid rgba(72,219,251,0.3);
            overflow: hidden;
        }

        .level-bar-inner {
            height: 100%;
            background: linear-gradient(90deg, #ff6b9d 0%, #ff9ff3 30%, #feca57 60%, #48dbfb 100%);
            border-radius: 4px;
            transition: width 0.4s ease;
            box-shadow: 0 0 10px rgba(255,159,243,0.5);
            width: 0%;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 3px;
            width: 100%;
            position: relative;
            z-index: 1;
            flex-shrink: 0;
        }

        .stat-box {
            flex: 1;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(72,219,251,0.3);
            border-radius: 8px;
            padding: 4px 3px;
            text-align: center;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .stat-label {
            font-size: clamp(0.45rem, 1.4vw, 0.55rem);
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #48dbfb;
            font-weight: 700;
            margin-bottom: 1px;
        }

        .stat-value {
            font-size: clamp(0.75rem, 3vw, 1rem);
            font-weight: 800;
            color: #ffffff;
            font-family: 'SF Mono', 'Courier New', monospace;
        }

        .score-highlight {
            color: #feca57 !important;
            text-shadow: 0 0 10px rgba(254,202,87,0.6);
        }

        .attempts-dots {
            display: flex;
            gap: 4px;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .attempt-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #2ed573;
            box-shadow: 0 0 5px rgba(46,213,115,0.6);
            transition: all 0.3s ease;
        }

        .attempt-dot.lost {
            background: #ff6b6b;
            box-shadow: 0 0 7px rgba(255,107,107,0.7);
            animation: pulseDot 0.35s ease;
        }

        @keyframes pulseDot {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.5); }
        }

        .word-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(255,255,255,0.06);
            padding: 12px 8px;
            border-radius: 14px;
            border: 2px solid rgba(72,219,251,0.4);
            width: 100%;
            flex: 1;
            min-height: 120px;
            position: relative;
            z-index: 1;
        }

        .word-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            width: 100%;
            flex-wrap: nowrap;
        }

        .word-slot {
            background: linear-gradient(180deg, #3d2a7a 0%, #2d1b69 100%);
            border: 2px solid #5b3ea8;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            text-transform: uppercase;
            color: #feca57;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.4), 0 0 10px rgba(72,219,251,0.15);
            text-shadow: 0 0 8px rgba(254,202,87,0.4);
            transition: all 0.3s ease;
            font-family: 'SF Mono', 'Courier New', monospace;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .word-slot.spinning .slot-inner { animation: spinSlot 0.6s ease-in-out; }

        @keyframes spinSlot {
            0% { transform: rotateX(0deg); opacity: 1; }
            25% { transform: rotateX(90deg); opacity: 0.3; }
            50% { transform: rotateX(180deg); opacity: 0.1; }
            75% { transform: rotateX(270deg); opacity: 0.3; }
            100% { transform: rotateX(360deg); opacity: 1; }
        }

        .word-slot.revealed {
            border-color: #feca57;
            background: linear-gradient(180deg, #1a6b3a 0%, #0d4a28 100%) !important;
            box-shadow: 0 0 18px rgba(46,213,115,0.7), inset 0 2px 4px rgba(0,0,0,0.4);
            animation: revealPop 0.4s ease;
            color: #2ed573 !important;
            text-shadow: 0 0 12px rgba(46,213,115,0.6);
        }

        @keyframes revealPop {
            0% { transform: scale(0.6); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        .word-slot.wrong-flash {
            animation: wrongShake 0.5s ease;
            border-color: #ff6b6b !important;
            background: linear-gradient(180deg, #4a1a1a 0%, #2d0d0d 100%) !important;
            box-shadow: 0 0 18px rgba(255,107,107,0.7), inset 0 2px 4px rgba(0,0,0,0.4) !important;
            color: #ff6b6b !important;
        }

        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-5px); }
            40% { transform: translateX(5px); }
            60% { transform: translateX(-3px); }
            80% { transform: translateX(3px); }
        }

        .word-slot.space {
            background: transparent; border: none; box-shadow: none;
            width: 10px; min-width: 10px; height: auto;
        }

        .slot-inner { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }

        .alphabet-container {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            background: rgba(255,255,255,0.05); padding: 6px 5px; border-radius: 12px;
            border: 1px solid rgba(72,219,251,0.3); width: 100%; position: relative; z-index: 1; flex-shrink: 0;
        }

        .keyboard-row { display: flex; justify-content: center; gap: 3px; width: 100%; }

        .letter-btn {
            flex: 1; max-width: 50px; height: clamp(32px, 7.5vw, 44px);
            background: linear-gradient(180deg, #6c5ce7 0%, #5a4bd1 100%);
            border: 2px solid #a55eea; border-radius: 10px;
            font-size: clamp(0.7rem, 2.2vw, 1rem); font-weight: 700; color: #ffffff;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 3px 0 #4a3db5, 0 3px 8px rgba(0,0,0,0.3);
            position: relative; top: 0; transition: all 0.1s ease; outline: none;
            -webkit-tap-highlight-color: transparent; user-select: none; touch-action: manipulation;
            min-width: 0; text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        .letter-btn:active, .letter-btn.pressed {
            top: 2px !important; box-shadow: 0 1px 0 #4a3db5, 0 2px 5px rgba(0,0,0,0.3) !important;
            background: linear-gradient(180deg, #a55eea 0%, #6c5ce7 100%) !important;
            border-color: #ff9ff3 !important; transform: scale(0.96);
        }

        .letter-btn.used-correct {
            background: linear-gradient(180deg, #2ed573 0%, #1a8a3a 100%) !important;
            border-color: #7bed9f !important; color: #ffffff !important; opacity: 0.9;
            pointer-events: none; box-shadow: 0 0 10px rgba(46,213,115,0.5), 0 2px 0 #1a6b3a;
            top: 2px; text-shadow: 0 0 6px rgba(255,255,255,0.4);
        }

        .letter-btn.used-wrong {
            background: linear-gradient(180deg, #ff6b6b 0%, #c44545 100%) !important;
            border-color: #ff9999 !important; color: #ffffff !important; opacity: 0.75;
            pointer-events: none; box-shadow: 0 0 10px rgba(255,107,107,0.5), 0 2px 0 #8b3030;
            top: 2px; text-decoration: line-through;
        }

        .guess-section { display: flex; flex-direction: column; align-items: center; gap: 3px; width: 100%; position: relative; z-index: 1; flex-shrink: 0; }

        .guess-input {
            width: 100%; padding: 10px 12px; background: rgba(255,255,255,0.08);
            border: 2px solid rgba(72,219,251,0.5); border-radius: 10px; color: #ffffff;
            font-size: clamp(1rem, 3vw, 1.4rem); text-align: center;
            font-family: 'SF Mono', 'Courier New', monospace; outline: none;
            text-transform: uppercase; letter-spacing: 2px; transition: all 0.2s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3); font-weight: 600;
        }

        .guess-input:focus { border-color: #feca57; box-shadow: 0 0 15px rgba(254,202,87,0.25), inset 0 2px 4px rgba(0,0,0,0.3); }
        .guess-input::placeholder { color: rgba(255,255,255,0.4); letter-spacing: 1px; font-size: clamp(0.8rem, 2.2vw, 1.1rem); }

        .btn-row { display: flex; gap: 5px; width: 100%; }

        .btn {
            flex: 1; padding: 10px 6px; border-radius: 20px; font-weight: 800;
            font-size: clamp(0.9rem, 2.8vw, 1.2rem); letter-spacing: 1px; text-transform: uppercase;
            cursor: pointer; transition: all 0.1s ease; border: 2px solid; position: relative; top: 0;
            -webkit-tap-highlight-color: transparent; touch-action: manipulation; outline: none;
            text-align: center;
        }

        .btn-submit {
            background: linear-gradient(180deg, #feca57 0%, #ffa502 100%); border-color: #ff9ff3;
            color: #1a0533; box-shadow: 0 4px 0 #e08e00, 0 4px 12px rgba(0,0,0,0.3); font-weight: 900;
        }
        .btn-submit:active { top: 2px; box-shadow: 0 2px 0 #e08e00, 0 3px 8px rgba(0,0,0,0.3); }
        .btn-submit:disabled { opacity: 0.4; pointer-events: none; top: 0; }

        .btn-new {
            background: linear-gradient(180deg, #6c5ce7 0%, #5a4bd1 100%); border-color: #a55eea;
            color: #ffffff; box-shadow: 0 4px 0 #4a3db5, 0 4px 12px rgba(0,0,0,0.3);
        }
        .btn-new:active { top: 2px; box-shadow: 0 2px 0 #4a3db5, 0 3px 8px rgba(0,0,0,0.3); }

        .message { font-weight: 700; font-size: clamp(0.55rem, 1.8vw, 0.7rem); min-height: 12px; color: #feca57; text-align: center; position: relative; z-index: 1; transition: all 0.3s ease; width: 100%; flex-shrink: 0; }

        .result-panel {
            background: rgba(254,202,87,0.12); border: 2px solid #feca57; padding: 5px 8px;
            border-radius: 10px; display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
            justify-content: center; animation: slideUp 0.4s ease; position: relative; z-index: 1;
            width: 100%; flex-shrink: 0;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .result-emoji { font-size: 1.2rem; }
        .result-text { font-weight: 800; font-size: 0.8rem; color: #feca57; }

            function __fold(text) {
                return text.toUpperCase()
                    .replace(/Ά/g,"Α").replace(/Έ/g,"Ε").replace(/Ή/g,"Η").replace(/Ί/g,"Ι").replace(/Ό/g,"Ο").replace(/Ύ/g,"Υ").replace(/Ώ/g,"Ω").replace(/Ϊ/g,"Ι").replace(/Ϋ/g,"Υ")
                    .replace(/[ÁÀÂÄÃÅĀ]/g,"A").replace(/[ÉÈÊËĒ]/g,"E").replace(/[ÍÌÎÏĪ]/g,"I").replace(/[ÓÒÔÖÕŌ]/g,"O").replace(/[ÚÙÛÜŪ]/g,"U").replace(/Ñ/g,"N").replace(/Ç/g,"C");
            }

            function normalizeGreek(text) {
                return __fold(text).replace(/\s+/g,"");
            }

            function displayCharsOf(text) {
                return text.toUpperCase().replace(/\s+/g,"");
            }

            function compareKey(text) {
                return __fold(text).replace(/[^0-9A-ZΑ-Ω]/g,"");
            }

            function spinAllSlots(callback) {

                isSpinning = true; 
                playSpinSound();
                const allSlots = wordDisplay.querySelectorAll(".word-slot:not(.space)");
                const allLetters = SPIN_LETTERS;
                allSlots.forEach((slot) => {
                    const inner = slot.querySelector(".slot-inner"); 
                    if (!inner) return;
                    slot.classList.add("spinning"); 
                    let spinCount = 0; 
                    const maxSpins = 8;
                    const spinInterval = setInterval(() => { 
                        inner.textContent = allLetters[Math.floor(Math.random() * allLetters.length)]; 
                        spinCount++; 
                        if (spinCount >= maxSpins) { 
                            clearInterval(spinInterval); 
                            slot.classList.remove("spinning"); 
                        } 
                    }, 50);
                });

                    isSpinning = false; 
                    updateWordDisplay(); 
                    if (callback) callback();

                        });
                        btn.addEventListener("click", function(e) { 
                            e.preventDefault(); 
                            e.stopPropagation(); 
                        });
                        
                        rowDiv.appendChild(btn);
                    });
                    alphabetContainer.appendChild(rowDiv);
                });
            }

            function updateAlphabetButtons() {
                const allButtons = alphabetContainer.querySelectorAll(".letter-btn"); 
                const nw = normalizeGreek(currentWord);
                allButtons.forEach(btn => { 
                    const l = btn.textContent; 
                    btn.classList.remove("used-correct", "used-wrong", "pressed"); 
                    if (usedLetters.includes(l)) btn.classList.add(nw.includes(l) ? "used-correct" : "used-wrong"); 
                });
            }

            function handleLetterClick(letter, btn) {
                if (!gameActive || usedLetters.includes(letter) || isSpinning) return;
                usedLetters.push(letter); 
                const nw = normalizeGreek(currentWord); 
                const positions = [];
                for (let i = 0; i < nw.length; i++) { 
                    if (nw[i] === letter) positions.push(i); 
                }
                
                spinAllSlots(() => {
                    if (positions.length > 0) {
                        playCorrectLetterSound(); 
                        const pointsEarned = positions.length * POINTS_PER_LETTER;
                        currentScore += pointsEarned; 
                        addXP(pointsEarned); 
                        correctLettersInCurrentWord += positions.length;
                        const __dc = displayCharsOf(currentWord);
                        positions.forEach(pos => { revealedLetters[pos] = __dc[pos]; });
                        updateWordDisplay(true, positions); 
                        updateAlphabetButtons(); 
                        updateScoreDisplay(); 
                        saveAllData();
                        
                        const rect = btn.getBoundingClientRect(); 
                        const containerRect = gameContainer.getBoundingClientRect();
                        showScorePop('+' + pointsEarned, rect.left - containerRect.left + rect.width/2, rect.top - containerRect.top);
                        messageBox.textContent = L().letterFound(letter, pointsEarned); 
                        messageBox.style.color = "#2ed573";
                        
                        const wordComplete = revealedLetters.every(ch => ch !== "");
                        if (wordComplete) {
                            setTimeout(() => { 
                                currentScore += POINTS_FULL_WORD; 
                                addXP(POINTS_FULL_WORD); 
                                updateScoreDisplay(); 
                                saveAllData(); 
                                const wdRect = wordDisplay.getBoundingClientRect(); 
                                showScorePop(L().wordBonusPop, wdRect.left - containerRect.left + wdRect.width/2, wdRect.top - containerRect.top); 
                                playWordCorrectSound(); 
                                setTimeout(() => playWinFanfare(), 600); 
                                spawnConfetti(); 
                                endGame(true); 
                            }, 400);
                        }
                    } else {
                        playWrongLetterSound(); 
                        wrongAttempts++; 
                        updateAttemptDots(); 
                        updateAlphabetButtons(); 
                        flashAllSlots();
                        messageBox.textContent = L().letterNotFound(letter, wrongAttempts, MAX_ATTEMPTS); 
                        messageBox.style.color = "#ff6b6b";
                        if (wrongAttempts >= MAX_ATTEMPTS) setTimeout(() => endGame(false, "attempts"), 400);
                    }
                });
            }

            function flashAllSlots() {
                wordDisplay.querySelectorAll(".word-slot:not(.space)").forEach(slot => { 
                    slot.classList.add("wrong-flash"); 
                    setTimeout(() => slot.classList.remove("wrong-flash"), 500); 
                });
            }

            function updateWordDisplay(animate = false, highlightPositions = []) {
                wordDisplay.innerHTML = ""; 
                const displayWord = currentWord.toUpperCase(); 
                const words = displayWord.split(" ");
                const wordLengths = words.map(w => normalizeGreek(w).length); 
                const maxWordLength = Math.max(...wordLengths);
                const containerWidth = wordDisplay.clientWidth - 16; 
                const gapPerSlot = 6;
                
                let slotSize;
                if (maxWordLength > MAX_LETTERS_PER_ROW) { 
                    slotSize = Math.floor((containerWidth - (maxWordLength - 1) * gapPerSlot) / maxWordLength); 
                    slotSize = Math.max(slotSize, 24); 
                    slotSize = Math.min(slotSize, 52); 
                } else { 
                    slotSize = Math.floor((containerWidth - (MAX_LETTERS_PER_ROW - 1) * gapPerSlot) / MAX_LETTERS_PER_ROW); 
                    slotSize = Math.max(slotSize, 30); 
                    slotSize = Math.min(slotSize, 52); 
                }
                
                const fontSize = Math.floor(slotSize * FONT_RATIO);
                
                const rows = []; 
                let currentRow = []; 
                let currentRowLetters = 0;
                
                for (let w = 0; w < words.length; w++) {
                    const wordLen = normalizeGreek(words[w]).length; 
                    const spaceNeeded = currentRow.length > 0 ? 1 : 0; 
                    const totalNeeded = currentRowLetters + spaceNeeded + wordLen;
                    
                    if (totalNeeded <= MAX_LETTERS_PER_ROW && wordLen <= MAX_LETTERS_PER_ROW) { 
                        if (currentRow.length > 0) { 
                            currentRow.push({ type: "space" }); 
                            currentRowLetters += 1; 
                        }
                        currentRow.push({ type: "word", wordIndex: w }); 
                        currentRowLetters += wordLen; 
                    } else { 
                        if (currentRow.length > 0) rows.push(currentRow);
                        currentRow = [{ type: "word", wordIndex: w }]; 
                        currentRowLetters = wordLen; 
                    }
                }
                if (currentRow.length > 0) rows.push(currentRow);
                
                let globalLetterIndex = 0; 
                const wordStartIndices = [];
                for (let w = 0; w < words.length; w++) {
                    wordStartIndices[w] = globalLetterIndex;
                    globalLetterIndex += normalizeGreek(words[w]).length;
                }
                
                rows.forEach((rowItems) => {
                    let rowMaxLen = 0; 
                    let totalLettersInRow = 0; 
                    let spaceCount = 0;
                    rowItems.forEach(item => { 
                        if (item.type === "word") { 
                            rowMaxLen = Math.max(rowMaxLen, normalizeGreek(words[item.wordIndex]).length); 
                            totalLettersInRow += normalizeGreek(words[item.wordIndex]).length; 
                        } else spaceCount++; 
                    });
                    
                    const totalSlots = totalLettersInRow + spaceCount; 
                    let rowSlotSize = slotSize;
                    if (rowMaxLen > MAX_LETTERS_PER_ROW || totalSlots > MAX_LETTERS_PER_ROW) { 
                        rowSlotSize = Math.floor((containerWidth - (rowMaxLen - 1) * gapPerSlot) / rowMaxLen); 
                        rowSlotSize = Math.max(rowSlotSize, 24); 
                        rowSlotSize = Math.min(rowSlotSize, 52); 
                    }
                    const rowFontSize = Math.floor(rowSlotSize * FONT_RATIO);
                    
                    const rowDiv = document.createElement("div"); 
                    rowDiv.className = "word-row";
                    
                    rowItems.forEach((item) => {
                        if (item.type === "space") { 
                            const spaceEl = document.createElement("span"); 
                            spaceEl.className = "word-slot space"; 
                            rowDiv.appendChild(spaceEl); 
                        } else {
                            const w = item.wordIndex;
                            const word = words[w];
                            const startIdx = wordStartIndices[w];
                            
                            for (let i = 0; i < word.length; i++) {
                                const letterIndex = startIdx + i;
                                const slot = document.createElement("span"); 
                                slot.className = "word-slot";
                                slot.style.width = rowSlotSize + "px"; 
                                slot.style.height = (rowSlotSize * 1.35) + "px";
                                slot.style.fontSize = rowFontSize + "px"; 
                                slot.style.minWidth = rowSlotSize + "px";
                                
                                const inner = document.createElement("span"); 
                                inner.className = "slot-inner";
                                inner.textContent = revealedLetters[letterIndex] || "_"; 
                                slot.appendChild(inner);
                                
                                if (animate && highlightPositions.includes(letterIndex)) { 
                                    slot.classList.add("revealed"); 
                                    setTimeout(() => slot.classList.remove("revealed"), 400); 
                                }
                                rowDiv.appendChild(slot);
                            }
                        }
                    });
                    wordDisplay.appendChild(rowDiv);
                });
            }

            function checkFullGuess() {
                if (!gameActive || isSpinning) return; 
                initAudio();
                const guessRaw = guessInput.value.trim();
                const guess = compareKey(guessRaw); 
                const target = compareKey(currentWord);
                if (guessRaw === "") { 
                    messageBox.textContent = L().typeAWord; 
                    messageBox.style.color = "#feca57"; 
                    return; 
                }
                
                spinAllSlots(() => {
                    if (guess === target) {
                        const remaining = revealedLetters.filter(x => x === "").length; 
                        const totalPoints = remaining * POINTS_PER_LETTER + POINTS_FULL_WORD;
                        currentScore += totalPoints; 
                        addXP(totalPoints); 
                        updateScoreDisplay(); 
                        saveAllData();
                        
                        const nw = normalizeGreek(currentWord);
                        const __dc = displayCharsOf(currentWord);
                        for (let i = 0; i < nw.length; i++) { 
                            if (!revealedLetters[i]) { 
                                revealedLetters[i] = __dc[i]; 
                                if (/[A-ZΑ-Ω]/.test(nw[i]) && !usedLetters.includes(nw[i])) usedLetters.push(nw[i]); 
                            } 
                        }
                        updateWordDisplay(true); 
                        updateAlphabetButtons();
                        const wdRect = wordDisplay.getBoundingClientRect(); 
                        showScorePop('+' + totalPoints + ' 🏆', wdRect.left + wdRect.width/2, wdRect.top);
                        playWordCorrectSound(); 
                        setTimeout(() => playWinFanfare(), 600); 
                        spawnConfetti(); 
                        endGame(true);
                    } else {
                        playWordWrongSound(); 
                        wrongAttempts++; 
                        updateAttemptDots(); 
                        flashAllSlots();
                        messageBox.textContent = L().wrongTryAgain(wrongAttempts, MAX_ATTEMPTS); 
                        messageBox.style.color = "#ff6b6b";
                        guessInput.value = ""; 
                        guessInput.focus();
                        if (wrongAttempts >= MAX_ATTEMPTS) setTimeout(() => endGame(false, "attempts"), 400);
                    }
                });
            }

            function endGame(won, reason = "time") {
                if (!gameActive) return; 
                gameActive = false; 
                stopTimer();
                const __dc = displayCharsOf(currentWord);
                for (let i = 0; i < __dc.length; i++) revealedLetters[i] = __dc[i];
                updateWordDisplay(); 
                updateAlphabetButtons();
                guessInput.disabled = true; 
                submitBtn.disabled = true; 
                resultPanel.classList.remove("hidden"); 
                saveAllData();
                resultEmoji.textContent = won ? "🌟" : (reason === "attempts" ? "💪" : "⏰");
                resultText.textContent = won ? L().resultWin : (reason === "attempts" ? L().resultAttempts : L().resultTime);
                messageBox.textContent = won ? L().msgWin : L().msgLose(currentWord);
                messageBox.style.color = won ? "#2ed573" : "#feca57";
                
                helpBtnContainer.style.display = 'none';
            }

            function resetGame() {
                stopTimer(); 
                const obj = getRandomWord();
                currentWord = obj.word; 
                currentHint = obj.hint;
                gameActive = true; 
                timeSeconds = START_TIME; 
                wrongAttempts = 0; 
                usedLetters = []; 
                isSpinning = false; 
                correctLettersInCurrentWord = 0;
                const nw = normalizeGreek(currentWord); 
                revealedLetters = new Array(nw.length).fill("");
                { const __dc = displayCharsOf(currentWord); for (let __i=0;__i<nw.length;__i++){ if(!/[A-ZΑ-Ω]/.test(nw[__i])) revealedLetters[__i]=__dc[__i]; } }
                
                timerDisplay.textContent = formatTime(timeSeconds); 
                timerDisplay.style.color = "#ffffff";
                hintText.textContent = "💡 " + currentHint;
                updateWordDisplay(); 
                createAlphabetButtons(); 
                updateAlphabetButtons(); 
                createAttemptDots();
                guessInput.value = ""; 
                guessInput.disabled = false; 
                submitBtn.disabled = false;
                resultPanel.classList.add("hidden"); 
                messageBox.textContent = ""; 
                messageBox.style.color = "#feca57"; 
                confettiContainer.innerHTML = "";
                helpBtnContainer.style.display = 'flex';
                
                timerInterval = setInterval(() => { 
                    if (!gameActive) return; 
                    timeSeconds--; 
                    timerDisplay.textContent = formatTime(timeSeconds); 
                    timerDisplay.style.color = timeSeconds <= 30 ? "#ff6b6b" : "#ffffff"; 
                    if (timeSeconds <= 0) { 
                        timeSeconds = 0; 
                        timerDisplay.textContent = "0:00"; 
                        endGame(false, "time"); 
                    } 
                }, 1000);
                
                window.scrollTo(0, 0); 
                guessInput.blur(); 
                setTimeout(() => guessInput.focus(), 100);
            }

            submitBtn.addEventListener("click", function(e) { 
                e.preventDefault(); 
                initAudio(); 
                checkFullGuess(); 
            });

            guessInput.addEventListener("keydown", function(e) { 
                if (e.key === "Enter") { 
                    e.preventDefault(); 
                    initAudio(); 
                    checkFullGuess(); 
                } 
            });
            guessInput.addEventListener("input", function(e) { 
                e.target.value = e.target.value.toUpperCase().replace(/[^\p{L}\p{N}\s]/gu, ""); 
            });
            guessInput.addEventListener("focus", function() { 
                window.scrollTo(0, 0); 
            });

            loadSavedData(); 
            applyLanguage(currentLang); 
            createAttemptDots(); 
            createAlphabetButtons();

            window.addEventListener('resize', () => { 
                if (!gameContainer.classList.contains("hidden")) updateWordDisplay(); 
            });
            document.addEventListener('touchmove', function(e) { 
                if (e.target.tagName !== 'INPUT') e.preventDefault(); 
            }, { passive: false });

            function playStartSound() {
                initAudio();
                if (!audioCtx) return;
                try { const now = audioCtx.currentTime; [261.63, 329.63, 392, 523.25].forEach((freq, i) => { const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = 'sine'; osc.frequency.setValueAtTime(freq, now + i * 0.15); gain.gain.setValueAtTime(0.25, now + i * 0.15); gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.15 + 0.5); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(now + i * 0.15); osc.stop(now + i * 0.15 + 0.5); }); } catch(e) {}
            }

            function playCorrectLetterSound() {
                initAudio();
                if (!audioCtx) return;
                try { const now = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, now); osc.frequency.setValueAtTime(659.25, now + 0.1); gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(now); osc.stop(now + 0.3); } catch(e) {}
            }

            function playWrongLetterSound() {
                initAudio();
                if (!audioCtx) return;
                try { const now = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); osc.frequency.linearRampToValueAtTime(100, now + 0.3); gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(now); osc.stop(now + 0.3); } catch(e) {}
            }

            function playWordCorrectSound() {
                initAudio();
                if (!audioCtx) return;
                try { const now = audioCtx.currentTime; [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => { const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = 'sine'; osc.frequency.setValueAtTime(freq, now + i * 0.15); gain.gain.setValueAtTime(0.3, now + i * 0.15); gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.15 + 0.4); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(now + i * 0.15); osc.stop(now + i * 0.15 + 0.4); }); } catch(e) {}
            }

            function playWordWrongSound() {
                initAudio();
                if (!audioCtx) return;
                try { const now = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = 'square'; osc.frequency.setValueAtTime(150, now); osc.frequency.setValueAtTime(100, now + 0.2); osc.frequency.setValueAtTime(80, now + 0.4); gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(now); osc.stop(now + 0.5); } catch(e) {}
            }

            function playWinFanfare() {
                initAudio();
                if (!audioCtx) return;
                try { const now = audioCtx.currentTime; [523.25, 659.25, 783.99, 1046.5, 1318.5].forEach((freq, i) => { const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = 'sine'; osc.frequency.setValueAtTime(freq, now + i * 0.12); gain.gain.setValueAtTime(0.25, now + i * 0.12); gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.12 + 0.35); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(now + i * 0.12); osc.stop(now + i * 0.12 + 0.35); }); } catch(e) {}
            }

            function playSpinSound() {
                initAudio();
                if (!audioCtx) return;
                try { const now = audioCtx.currentTime; for (let i = 0; i < 6; i++) { const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = 'triangle'; osc.frequency.setValueAtTime(200 + Math.random() * 400, now + i * 0.04); gain.gain.setValueAtTime(0.06, now + i * 0.04); gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.04 + 0.06); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(now + i * 0.04); osc.stop(now + i * 0.04 + 0.06); } } catch(e) {}
            }

            function playLevelUpSound() {
                initAudio();
                if (!audioCtx) return;
                try { const now = audioCtx.currentTime; [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => { const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = 'triangle'; osc.frequency.setValueAtTime(freq, now + i * 0.1); gain.gain.setValueAtTime(0.3, now + i * 0.1); gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.3); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(now + i * 0.1); osc.stop(now + i * 0.1 + 0.3); }); } catch(e) {}
            }

            function playNewGameSound() {
                initAudio();
                if (!audioCtx) return;
                try { const now = audioCtx.currentTime; [392, 523.25, 659.25, 783.99].forEach((freq, i) => { const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = 'sine'; osc.frequency.setValueAtTime(freq, now + i * 0.12); gain.gain.setValueAtTime(0.2, now + i * 0.12); gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.12 + 0.3); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(now + i * 0.12); osc.stop(now + i * 0.12 + 0.3); }); } catch(e) {}
            }

        })();
    </script>
