<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Drop 2048 · FranklyGames Edition</title>
    <style>
        :root {
            --bg: #87CEEB;
            --panel: #8C6A4F;
            --panel-deep: #4A3423;
            --cream: #F7EFDC;
            --ink: #2F1B0D;
            --accent: #F2A03D;
            --good: #7FA653;
            --coin: #F5C542;
            --red: #C2542F;
            --blue: #4A7DBF;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html,
        body {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: "Baloo 2", system-ui, sans-serif;
            color: var(--ink);
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        #game {
            position: fixed;
            inset: 0;
            display: block;
            z-index: 0;
        }

        /* ===== HUD (TOP) — 100% ΜΕΓΑΛΥΤΕΡΟ ===== */
        .hud {
            position: fixed;
            left: 0;
            right: 0;
            top: 0;
            padding: 8px 12px 6px;
            display: flex;
            gap: 10px;
            align-items: center;
            pointer-events: none;
            z-index: 5;
            height: 84px;
        }
        .chip {
            background: rgba(74, 52, 35, 0.92);
            color: var(--cream);
            border-radius: 18px;
            padding: 8px 18px;
            font-weight: 800;
            font-size: 24px;
            box-shadow: 0 5px 0 rgba(0, 0, 0, .3);
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: auto;
            line-height: 1.2;
        }
        .chip small {
            font-weight: 600;
            opacity: .75;
            font-size: 15px;
            display: block;
            line-height: 1;
        }
        .chip .big {
            font-size: 28px;
            line-height: 1.1;
        }
        .spacer {
            flex: 1;
        }
        .hud-btn {
            background: var(--accent);
            border: none;
            cursor: pointer;
            color: #fff;
            border-radius: 18px;
            padding: 10px 22px;
            font-weight: 800;
            font-size: 24px;
            box-shadow: 0 5px 0 #b8742a;
            pointer-events: auto;
            transition: transform .08s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 6px;
            line-height: 1.3;
        }
        .hud-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #b8742a;
        }

        /* ===== POWERUPS — 100% ΜΕΓΑΛΥΤΕΡΑ ===== */
        .powerbar {
            position: fixed;
            top: 92px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            gap: 16px;
            z-index: 5;
            padding: 10px 20px;
            border-radius: 30px;
            pointer-events: none;
        }
        .pbtn {
            pointer-events: auto;
            border: none;
            cursor: pointer;
            width: 108px;
            height: 108px;
            border-radius: 28px;
            background: var(--good);
            box-shadow: 0 7px 0 #5c7a3a;
            color: #fff;
            font-size: 48px;
            line-height: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            font-family: inherit;
            transition: transform .08s;
        }
        .pbtn:active {
            transform: translateY(6px);
            box-shadow: 0 1px 0 #5c7a3a;
        }
        .pbtn .cost {
            font-size: 15px;
            font-weight: 800;
            background: rgba(0, 0, 0, .25);
            border-radius: 10px;
            padding: 2px 12px;
            margin-top: 0;
        }
        .pbtn.armed {
            outline: 4px solid var(--accent);
            background: var(--red);
            box-shadow: 0 7px 0 #8f3c20;
        }
        .pbtn.listening {
            outline: 4px solid #ff5555;
            background: var(--red);
            box-shadow: 0 7px 0 #8f3c20;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.08);
            }
        }

        /* ===== TOAST ===== */
        #toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            pointer-events: none;
            background: var(--panel-deep);
            color: var(--cream);
            font-weight: 700;
            font-size: 15px;
            border-radius: 14px;
            padding: 9px 20px;
            opacity: 0;
            transition: opacity .25s;
            white-space: nowrap;
            box-shadow: 0 4px 12px rgba(0, 0, 0, .4);
        }

        /* ===== SPEECH BUBBLE ===== */
        #speech {
            position: fixed;
            z-index: 10;
            pointer-events: none;
            font-weight: 800;
            font-size: 20px;
            background: #ffffff;
            color: #333;
            padding: 8px 18px;
            border-radius: 20px;
            border: 3px solid var(--panel-deep);
            box-shadow: 0 4px 0 var(--panel-deep);
            transform: translate(-50%, -120%);
            opacity: 0;
            transition: opacity 0.2s ease-in-out, transform 0.2s ease-in-out;
            max-width: 72vw;
            white-space: normal;
            text-align: center;
        }
        #speech.visible {
            opacity: 1;
            transform: translate(-50%, -140%);
        }
        #speech::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -10px;
            border-width: 12px;
            border-style: solid;
            border-color: #ffffff transparent transparent transparent;
            filter: drop-shadow(0 4px 0 var(--panel-deep));
        }

        /* ===== SHOP — ΠΛΗΡΗΣ ΟΘΟΝΗ ===== */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(11, 12, 16, .85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            -webkit-backdrop-filter: blur(4px);
            backdrop-filter: blur(4px);
        }
        .card {
            background: var(--cream);
            border: 4px solid var(--panel-deep);
            border-radius: 26px;
            padding: 20px 18px;
            width: min(400px, 92vw);
            max-height: 92vh;
            text-align: center;
            box-shadow: 0 10px 0 rgba(0, 0, 0, .4);
            animation: pop .25s cubic-bezier(.34, 1.56, .64, 1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* fullscreen shop */
        #shopModal .card {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            max-height: none;
            border-radius: 0;
            border: none;
            box-shadow: none;
            padding-top: calc(14px + env(safe-area-inset-top));
            padding-bottom: calc(14px + env(safe-area-inset-bottom));
        }
        @keyframes pop {
            from {
                transform: scale(.7);
                opacity: 0;
            }
        }
        .card h2 {
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 800;
            flex-shrink: 0;
        }
        .shop-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
            border-bottom: 2px solid rgba(0, 0, 0, 0.08);
            padding-bottom: 8px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            flex-shrink: 0;
            flex-wrap: nowrap;
        }
        .shop-tab {
            flex: 0 0 auto;
            padding: 10px 16px;
            font-weight: 800;
            font-size: 15px;
            border-radius: 12px;
            background: #E4D7BC;
            color: #8C6A4F;
            border: none;
            cursor: pointer;
            white-space: nowrap;
            transition: .1s;
        }
        .shop-tab.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 3px 0 #b8742a;
            transform: translateY(-2px);
        }
        .pet-subtabs {
            display: none;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 8px;
            background: #f0e5d1;
            padding: 8px 10px;
            border-radius: 12px;
            justify-content: center;
            flex-shrink: 0;
        }
        .pet-subtabs.active {
            display: flex;
        }
        .pet-subtab {
            padding: 7px 12px;
            font-weight: 800;
            font-size: 13px;
            border-radius: 10px;
            background: var(--red);
            color: #fff;
            border: none;
            cursor: pointer;
            transition: .1s;
        }
        .pet-subtab.active {
            background: #5c7a3a;
            box-shadow: 0 2px 0 #3a4d25;
            transform: translateY(-1px);
        }
        .shop-items {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-right: 4px;
            flex: 1;
            min-height: 0;
        }
        .shop-items::-webkit-scrollbar {
            width: 4px;
        }
        .shop-items::-webkit-scrollbar-thumb {
            background: var(--panel-deep);
            border-radius: 4px;
        }
        .shop-item {
            background: #E4D7BC;
            border: 3px solid #8C6A4F;
            border-radius: 16px;
            padding: 12px 8px;
            cursor: pointer;
            transition: transform 0.1s;
            text-align: center;
        }
        .shop-item:active {
            transform: scale(0.95);
        }
        .shop-item h3 {
            font-size: 14px;
            margin-bottom: 4px;
            color: var(--ink);
            line-height: 1.2;
        }
        .shop-item .price {
            font-weight: 800;
            color: #b8742a;
            font-size: 13px;
        }
        .shop-item.owned .price {
            color: var(--good);
        }
        .shop-item.equipped {
            border-color: var(--accent);
            background: #FFF5E1;
            box-shadow: 0 0 10px rgba(242, 160, 61, 0.4);
        }
        .btn {
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-weight: 800;
            font-size: 18px;
            color: #fff;
            background: var(--accent);
            border-radius: 16px;
            padding: 12px 24px;
            box-shadow: 0 4px 0 #b8742a;
            transition: transform .08s;
            margin-top: 10px;
            width: 100%;
            flex-shrink: 0;
        }
        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #b8742a;
        }
        .hidden {
            display: none !important;
        }
        .win-lose-overlay {
            z-index: 25;
        }

        /* ===== RESPONSIVE (mobile) ===== */
        @media (max-width: 520px) {
            .hud {
                height: 72px;
                padding: 6px 8px;
                gap: 6px;
            }
            .chip {
                font-size: 18px;
                padding: 6px 12px;
                border-radius: 14px;
            }
            .chip small {
                font-size: 12px;
            }
            .chip .big {
                font-size: 22px;
            }
            .hud-btn {
                font-size: 18px;
                padding: 8px 14px;
                border-radius: 14px;
            }
            .powerbar {
                top: 78px;
                padding: 6px 8px;
                gap: 10px;
            }
            .pbtn {
                width: min(88px, 20vw);
                height: min(88px, 20vw);
                font-size: 38px;
                border-radius: 22px;
            }
            .pbtn .cost {
                font-size: 11px;
            }
            #speech {
                font-size: 16px;
                padding: 6px 14px;
                border-radius: 16px;
            }
            #toast {
                font-size: 13px;
                padding: 7px 14px;
                bottom: 70px;
            }
            .shop-items {
                grid-template-columns: 1fr 1fr;
            }
        }
        @media (max-width: 380px) {
            .hud-btn {
                font-size: 15px;
                padding: 6px 10px;
            }
            .chip {
                font-size: 14px;
                padding: 4px 8px;
            }
            .chip .big {
                font-size: 18px;
            }
            .pbtn {
                width: min(76px, 19vw);
                height: min(76px, 19vw);
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>

    <!-- ===== HUD (TOP) ===== -->
    <div class="hud">
        <div class="chip"><div><small>ΕΠΙΠΕΔΟ</small><span class="big" id="hudLevel">1</span></div></div>
        <div class="chip"><div><small>ΣΚΟΡ</small><span class="big" id="hudScore">0</span></div></div>
        <div class="spacer"></div>
        <button class="hud-btn" id="btnShop">🛒</button>
        <div class="chip">🪙 <span class="big" id="hudCoins">0</span></div>
    </div>

    <!-- ===== POWERUPS ===== -->
    <div class="powerbar">
        <button class="pbtn" id="btnMagnet">🧲<span class="cost">Δωρεάν</span></button>
        <button class="pbtn" id="btnHammer">🔨<span class="cost">Δωρεάν</span></button>
        <button class="pbtn" id="btnShuffle">🔄<span class="cost">Δωρεάν</span></button>
        <button class="pbtn" id="btnMic">🎤<span class="cost">Μίλα</span></button>
    </div>

    <!-- ===== SPEECH BUBBLE ===== -->
    <div id="speech"><span id="speechText">Γεια!</span></div>

    <!-- ===== TOAST ===== -->
    <div id="toast"></div>

    <!-- ===== SHOP MODAL (FULLSCREEN) ===== -->
    <div class="overlay hidden" id="shopModal">
        <div class="card">
            <h2 style="margin-bottom:10px;">🛍️ Εξατομίκευση</h2>
            <div class="shop-tabs" id="mainTabs">
                <button class="shop-tab active" data-maintab="cubes">Κύβοι</button>
                <button class="shop-tab" data-maintab="boards">Ταμπλό</button>
                <button class="shop-tab" data-maintab="effects">Εφέ</button>
                <button class="shop-tab" data-maintab="sounds">Ήχοι</button>
                <button class="shop-tab" data-maintab="pets">Λιλή</button>
            </div>
            <div class="pet-subtabs" id="petSubTabs">
                <button class="pet-subtab active" data-subtab="pet_hair">Μαλλιά</button>
                <button class="pet-subtab" data-subtab="pet_color">Φόρεμα</button>
                <button class="pet-subtab" data-subtab="pet_head">Καπέλα</button>
                <button class="pet-subtab" data-subtab="pet_face">Πρόσωπο</button>
                <button class="pet-subtab" data-subtab="pet_body">Πλάτη</button>
                <button class="pet-subtab" data-subtab="pet_props">Αντικείμενο</button>
                <button class="pet-subtab" data-subtab="pet_feet">Παπούτσια</button>
            </div>
            <div class="shop-items" id="shopContainer"></div>
            <button class="btn" id="btnCloseShop">Κλείσιμο</button>
        </div>
    </div>

    <!-- ===== WIN / LOSE MODALS ===== -->
    <div class="overlay hidden win-lose-overlay" id="winModal">
        <div class="card">
            <div style="font-size:40px; margin-bottom:6px;">🎉</div>
            <h2>Επίπεδο Ολοκληρώθηκε!</h2>
            <p id="winText"></p>
            <button class="btn" id="btnNext">Συνέχεια ➜</button>
        </div>
    </div>
    <div class="overlay hidden win-lose-overlay" id="loseModal">
        <div class="card">
            <div style="font-size:40px; margin-bottom:6px;">😵</div>
            <h2>Γέμισε το ταμπλό! Τέλος παιχνιδιού!</h2>
            <p id="loseText"></p>
            <button class="btn" id="btnRetry">Ξαναπροσπάθησε</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

            // ---- Audio (Safari/Chrome συμβατό: webkitAudioContext fallback) ----
            const AudioCtxClass = window.AudioContext || window.webkitAudioContext;
            const audioCtx = new AudioCtxClass();

            function tone(freq0, freq1, dur, wave, vol, delay) {
                const now = audioCtx.currentTime;
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.connect(g);
                g.connect(audioCtx.destination);
                o.type = wave;
                const t0 = now + (delay || 0);
                o.frequency.setValueAtTime(freq0, t0);
                if (freq1) o.frequency.exponentialRampToValueAtTime(freq1, t0 + dur);
                g.gain.setValueAtTime(vol, t0);
                g.gain.exponentialRampToValueAtTime(0.01, t0 + dur);
                o.start(t0);
                o.stop(t0 + dur + 0.05);
            }

            function playSound(type) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                if (type === 'win') { playWinSound(); return; }
                const s = save.equippedSound || 'snd_default';
                if (s === 'snd_default') {
                    if (type === 'drop') tone(800, 400, 0.1, 'sine', 0.2);
                    else tone(300, 800, 0.2, 'sine', 0.3);
                } else if (s === 'snd_bass') {
                    if (type === 'drop') tone(150, 60, 0.18, 'sawtooth', 0.3);
                    else { tone(70, 200, 0.3, 'sawtooth', 0.35); tone(140, 400, 0.3, 'sine', 0.2); }
                } else if (s === 'snd_bell') {
                    if (type === 'drop') { tone(880, null, 0.35, 'sine', 0.15); tone(1760, null, 0.25, 'sine', 0.06); }
                    else { tone(1046, null, 0.55, 'sine', 0.2); tone(2093, null, 0.4, 'sine', 0.08); tone(1568, null, 0.45, 'sine', 0.06, 0.05); }
                } else if (s === 'snd_echo') {
                    const f = type === 'drop' ? 600 : 900;
                    for (let i = 0; i < 3; i++) tone(f, f * 0.8, 0.12, 'sine', 0.22 / (i + 1), i * 0.13);
                } else if (s === 'snd_retro') {
                    if (type === 'drop') tone(440, 220, 0.08, 'square', 0.12);
                    else { tone(523, null, 0.07, 'square', 0.12); tone(659, null, 0.07, 'square', 0.12, 0.07); tone(784, null, 0.1, 'square', 0.12, 0.14); }
                } else if (s === 'snd_pop') {
                    if (type === 'drop') tone(1200, 300, 0.06, 'sine', 0.3);
                    else { tone(400, 1600, 0.09, 'sine', 0.32); tone(600, 2000, 0.08, 'sine', 0.15, 0.06); }
                } else if (s === 'snd_laser') {
                    if (type === 'drop') tone(1800, 200, 0.15, 'sawtooth', 0.13);
                    else tone(200, 2200, 0.2, 'sawtooth', 0.17);
                } else if (s === 'snd_magic') {
                    const base = type === 'drop' ? 700 : 950;
                    for (let i = 0; i < 4; i++) tone(base + i * 180, null, 0.16, 'triangle', 0.11, i * 0.05);
                }
            }

            let isTalking = false;

            function speak(text) {
                try {
                    if (!('speechSynthesis' in window)) return;
                    speechSynthesis.cancel();
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = 'el-GR';
                    const voices = speechSynthesis.getVoices();
                    const gr = voices.find(v => v.lang && v.lang.toLowerCase().indexOf('el') === 0);
                    if (gr) u.voice = gr;
                    u.rate = 1.05;
                    u.pitch = 1.5;
                    u.onstart = () => { isTalking = true; };
                    u.onend = () => { isTalking = false; };
                    u.onerror = () => { isTalking = false; };
                    speechSynthesis.speak(u);
                } catch (e) { isTalking = false; }
            }
            if ('speechSynthesis' in window) {
                speechSynthesis.getVoices();
                speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
            }

            function stripAccents(s) { return s.normalize('NFD').replace(/[\u0300-\u036f]/g, ''); }

                if (has('σκορ', 'ποντο')) return "Το σκορ σου είναι " + score + " πόντοι! Συνέχισε!";
                if (has('επιπεδο', 'πιστα')) return "Είμαστε στο επίπεδο " + (level + 1) + "!";
                if (has('νομισματα', 'λεφτα', 'χρηματα', 'κερματα')) return "Έχεις " + coins + " νομίσματα! Πάμε για ψώνια;";
                if (has('αποστολη', 'στοχος', 'τι πρεπει')) return "Η αποστολή μας: " + LEVELS[Math.min(level, LEVELS.length - 1)].text + "!";
                if (has('ανεκδοτο', 'αστειο', 'πες κατι αστειο')) {

                        "Γιατί ο κύβος πήγε σχολείο; Για να γίνει τετράγωνο μυαλό!",

                        "Τα κοτσιδάκια μου χορεύουν όταν χοροπηδάω!"
                    ];
                    return jokes[Math.floor(Math.random() * jokes.length)];
                }
                if (has('βοηθεια', 'συμβουλη', 'πως παιζ', 'τι να κανω')) return "Ένωσε ίδιους αριθμούς! Και κράτα τους μεγάλους κύβους στις άκρες!";
                if (has('σε αγαπω', 'σ αγαπω', 'σε συμπαθω')) return "Κι εγώ σε αγαπώ πάρα πολύ!";
                if (has('ποσο χρονων', 'ηλικια')) return "Είμαι έξι χρονών!";

                return "Είπες: " + raw + ". Ωραίο ακούγεται!";

            function initMic() {

            const pMats = {
                'flame': new THREE.MeshBasicMaterial({ color: 0xff4500 }),

                'smoke': new THREE.MeshBasicMaterial({ color: 0x888888, transparent: true, opacity: 0.7 }),
                'explode': new THREE.MeshBasicMaterial({ color: 0xffa500 }),

            };

            function spawnParticle(x, y, z, type) {
                let mat = pMats[type];
                if (Array.isArray(mat)) mat = mat[Math.floor(Math.random() * mat.length)];
                const p = new THREE.Mesh(pGeo, mat);
                p.position.set(x, y, z);
                let vx = (Math.random() - 0.5) * 6,
                    vy = (Math.random() - 0.5) * 6,
                    vz = (Math.random() - 0.5) * 6;
                if (type === 'flame' || type === 'smoke') { vx *= 0.2; vy = -Math.random() * 2 - 0.5; vz = 0; }
                if (type === 'confetti') { p.scale.set(0.15, 0.15, 0.15); vy = Math.random() * 5; }
                scene.add(p);
                particles.push({ mesh: p, life: 1.0, vx, vy, vz, type });
            }

            function spawnBurst(x, y, z, type, count) {
                for (let i = 0; i < count; i++) spawnParticle(x, y, z, type);
            }

            function updateParticles(dt) {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.life -= dt * (p.type === 'smoke' ? 1.5 : 2.5);
                    if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); } else {
                        p.mesh.position.x += p.vx * dt;
                        p.mesh.position.y += p.vy * dt;
                        p.mesh.position.z += p.vz * dt;
                        if (p.type === 'confetti') p.vy -= dt * 10;
                        p.mesh.scale.setScalar(p.life);
                        if (p.type === 'flame' || p.type === 'explode') p.mesh.material.color.setHSL(0.1 * p.life, 1, 0.5);
                    }
                }
            }

            function makeCanvas(w, h) {
                const cv = document.createElement('canvas');
                cv.width = w;
                cv.height = h;
                return cv;
            }

            function skyTexture() {
                const cv = makeCanvas(64, 512);
                const g = cv.getContext('2d');
                const grad = g.createLinearGradient(0, 0, 0, 512);
                grad.addColorStop(0, '#3f9ce8');
                grad.addColorStop(0.45, '#7ec4f2');
                grad.addColorStop(0.8, '#c8ecff');
                grad.addColorStop(1, '#eafaff');
                g.fillStyle = grad;
                g.fillRect(0, 0, 64, 512);
                return new THREE.CanvasTexture(cv);
            }

            function sunTexture() {
                const cv = makeCanvas(256, 256);
                const g = cv.getContext('2d');
                // ρεαλιστικό λαμπερό σώμα
                let grad = g.createRadialGradient(128, 118, 20, 128, 128, 120);
                grad.addColorStop(0, '#fff9d6');
                grad.addColorStop(0.4, '#ffe66b');
                grad.addColorStop(0.85, '#ffb52e');
                grad.addColorStop(1, 'rgba(255,160,30,0)');
                g.fillStyle = grad;
                g.beginPath();
                g.arc(128, 128, 120, 0, Math.PI * 2);
                g.fill();
                g.fillStyle = '#ffd94d';
                g.beginPath();
                g.arc(128, 128, 92, 0, Math.PI * 2);
                g.fill();
                // μάτια
                g.fillStyle = '#5a3a12';
                g.beginPath(); g.ellipse(96, 112, 9, 14, 0, 0, Math.PI * 2); g.fill();
                g.beginPath(); g.ellipse(160, 112, 9, 14, 0, 0, Math.PI * 2); g.fill();
                g.fillStyle = '#fff';
                g.beginPath(); g.arc(99, 106, 3.5, 0, Math.PI * 2); g.fill();
                g.beginPath(); g.arc(163, 106, 3.5, 0, Math.PI * 2); g.fill();
                // μάγουλα
                g.fillStyle = 'rgba(255,140,90,0.55)';
                g.beginPath(); g.arc(82, 142, 12, 0, Math.PI * 2); g.fill();
                g.beginPath(); g.arc(174, 142, 12, 0, Math.PI * 2); g.fill();
                // χαμόγελο
                g.strokeStyle = '#5a3a12';
                g.lineWidth = 8;
                g.lineCap = 'round';
                g.beginPath();
                g.arc(128, 130, 42, 0.25 * Math.PI, 0.75 * Math.PI);
                g.stroke();
                return new THREE.CanvasTexture(cv);
            }

            function cloudTexture() {
                const cv = makeCanvas(256, 128);
                const g = cv.getContext('2d');
                const blobs = [
                    [70, 85, 42], [120, 70, 52], [175, 82, 44], [100, 92, 40], [150, 95, 38]
                ];
                blobs.forEach(b => {
                    const gr = g.createRadialGradient(b[0], b[1] - 6, 4, b[0], b[1], b[2]);
                    gr.addColorStop(0, 'rgba(255,255,255,0.98)');
                    gr.addColorStop(0.75, 'rgba(250,252,255,0.92)');
                    gr.addColorStop(1, 'rgba(235,244,255,0)');
                    g.fillStyle = gr;
                    g.beginPath();
                    g.arc(b[0], b[1], b[2], 0, Math.PI * 2);
                    g.fill();
                });
                return new THREE.CanvasTexture(cv);
            }

            function grassTexture() {
                const cv = makeCanvas(1024, 300);
                const g = cv.getContext('2d');
                // βάση χορταριού με βάθος
                const grad = g.createLinearGradient(0, 0, 0, 300);
                grad.addColorStop(0, '#7cc24a');
                grad.addColorStop(0.35, '#5aa832');
                grad.addColorStop(1, '#3b7a1f');
                g.fillStyle = grad;
                g.fillRect(0, 0, 1024, 300);
                // λεπτομερή φυλλαράκια
                for (let i = 0; i < 900; i++) {
                    const x = Math.random() * 1024;
                    const y = 18 + Math.random() * 282;
                    const h = 10 + Math.random() * 26 * (y / 300);
                    const lean = (Math.random() - 0.5) * 10;
                    const shade = 90 + Math.random() * 90;
                    g.strokeStyle = 'rgb(' + Math.floor(shade * 0.55) + ',' + Math.floor(shade + 50) + ',' + Math.floor(shade * 0.35) + ')';
                    g.lineWidth = 1.6;
                    g.beginPath();
                    g.moveTo(x, y);
                    g.quadraticCurveTo(x + lean * 0.4, y - h * 0.6, x + lean, y - h);
                    g.stroke();
                }
                // λουλούδια
                const petalCols = ['#ffffff', '#ff7bac', '#ffd23e', '#b884ff', '#ff9a5c'];
                for (let i = 0; i < 46; i++) {
                    const x = 20 + Math.random() * 984;
                    const y = 60 + Math.random() * 220;
                    const r = 5 + Math.random() * 6 * (y / 300);
                    const col = petalCols[Math.floor(Math.random() * petalCols.length)];
                    // κοτσάνι
                    g.strokeStyle = '#2e6b18';
                    g.lineWidth = 2;
                    g.beginPath();
                    g.moveTo(x, y + r * 2.2);
                    g.lineTo(x, y);
                    g.stroke();
                    // πέταλα
                    g.fillStyle = col;
                    for (let p = 0; p < 6; p++) {
                        const a = p / 6 * Math.PI * 2;
                        g.beginPath();
                        g.ellipse(x + Math.cos(a) * r, y + Math.sin(a) * r, r * 0.75, r * 0.5, a, 0, Math.PI * 2);
                        g.fill();
                    }
                    g.fillStyle = '#f5b301';
                    g.beginPath();
                    g.arc(x, y, r * 0.55, 0, Math.PI * 2);
                    g.fill();
                }
                return new THREE.CanvasTexture(cv);
            }

            function flowerTexture(color) {
                const cv = makeCanvas(128, 160);
                const g = cv.getContext('2d');
                g.strokeStyle = '#2e6b18';
                g.lineWidth = 7;
                g.beginPath();
                g.moveTo(64, 158);
                g.quadraticCurveTo(58, 110, 64, 62);
                g.stroke();
                // φύλλο
                g.fillStyle = '#3f8a22';
                g.beginPath();
                g.ellipse(46, 116, 18, 8, -0.6, 0, Math.PI * 2);
                g.fill();
                g.fillStyle = color;
                for (let p = 0; p < 7; p++) {
                    const a = p / 7 * Math.PI * 2;
                    g.beginPath();
                    g.ellipse(64 + Math.cos(a) * 26, 52 + Math.sin(a) * 26, 20, 13, a, 0, Math.PI * 2);
                    g.fill();
                }
                g.fillStyle = '#f5b301';
                g.beginPath();
                g.arc(64, 52, 15, 0, Math.PI * 2);
                g.fill();
                g.fillStyle = 'rgba(120,70,0,0.35)';
                for (let d = 0; d < 8; d++) {
                    g.beginPath();
                    g.arc(64 + (Math.random() - 0.5) * 18, 52 + (Math.random() - 0.5) * 18, 1.6, 0, Math.PI * 2);
                    g.fill();
                }
                return new THREE.CanvasTexture(cv);
            }

            function ndcToWorld(nx, ny, dist) {
                const v = new THREE.Vector3(nx, ny, 0.5);
                v.unproject(camera);
                const dir = v.sub(camera.position).normalize();
                return camera.position.clone().add(dir.multiplyScalar(dist));
            }

            function initBackground() {
                // Ουρανός
                skyMesh = new THREE.Mesh(new THREE.PlaneGeometry(400, 260), new THREE.MeshBasicMaterial({ map: skyTexture(), depthWrite: false }));
                skyMesh.position.set(0, 0, -80);
                scene.add(skyMesh);

                // Ήλιος (πίσω από τα κουμπιά, στην κορυφή)
                sunGroup = new THREE.Group();
                const sunSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: sunTexture(), transparent: true, depthWrite: false }));
                sunSprite.scale.set(9, 9, 1);
                // ακτίνες
                sunRays = new THREE.Group();
                const rayMat = new THREE.MeshBasicMaterial({ color: 0xffd94d, transparent: true, opacity: 0.75 });
                for (let i = 0; i < 12; i++) {
                    const ray = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 2.6), rayMat);
                    const a = i / 12 * Math.PI * 2;
                    ray.position.set(Math.cos(a) * 5.4, Math.sin(a) * 5.4, -0.1);
                    ray.rotation.z = a + Math.PI / 2;
                    sunRays.add(ray);
                }
                sunGroup.add(sunRays, sunSprite);
                scene.add(sunGroup);

                // Σύννεφα
                const cTex = cloudTexture();
                for (let i = 0; i < 5; i++) {
                    const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: cTex, transparent: true, opacity: 0.95, depthWrite: false }));
                    const s = 6 + Math.random() * 6;
                    sp.scale.set(s, s * 0.5, 1);
                    sp.userData.speed = 0.25 + Math.random() * 0.4;
                    sp.userData.ny = 0.35 + Math.random() * 0.55;
                    clouds.push(sp);
                    scene.add(sp);
                }

                // Χορτάρι με λουλούδια (βάση οθόνης)
                grassMesh = new THREE.Mesh(new THREE.PlaneGeometry(60, 10), new THREE.MeshBasicMaterial({ map: grassTexture(), transparent: false, depthWrite: false }));
                scene.add(grassMesh);

                // Μεγάλα λουλούδια πρώτο πλάνο
                const fCols = ['#ff7bac', '#ffd23e', '#ffffff', '#b884ff'];
                for (let i = 0; i < 6; i++) {
                    const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: flowerTexture(fCols[i % fCols.length]), transparent: true, depthWrite: false }));
                    sp.scale.set(1.3, 1.65, 1);
                    sp.userData.nx = -0.92 + i * 0.37 + (Math.random() - 0.5) * 0.06;
                    sp.userData.ph = Math.random() * 10;
                    flowerSprites.push(sp);
                    scene.add(sp);
                }
                layoutBackground();
            }

            function layoutBackground() {
                if (!camera || !sunGroup) return;
                // Ήλιος στην κορυφή, πίσω από τα κουμπιά βοήθειας
                const sunPos = ndcToWorld(0, 0.98, 30);
                sunGroup.position.copy(sunPos);
                // Σύννεφα
                clouds.forEach((c, i) => {
                    const p = ndcToWorld(-0.9 + i * 0.45, c.userData.ny, 40);
                    c.position.copy(p);
                    c.userData.baseY = p.y;
                    c.userData.limitX = Math.abs(ndcToWorld(1.3, 0, 40).x);
                });
                // Χορτάρι στη βάση
                const gPos = ndcToWorld(0, -0.86, 18);
                grassMesh.position.copy(gPos);
                const gTop = ndcToWorld(0, -0.62, 18).y;
                const gBot = ndcToWorld(0, -1.15, 18).y;
                grassMesh.scale.set(1, Math.max(0.35, (gTop - gBot) / 10), 1);
                const gw = Math.abs(ndcToWorld(1.2, -0.86, 18).x) * 2;
                grassMesh.scale.x = gw / 60;
                // Λουλούδια πρώτο πλάνο
                flowerSprites.forEach(f => {
                    const p = ndcToWorld(f.userData.nx, -0.78, 8);
                    f.position.copy(p);
                });
            }

            function updateBackground(t, dt) {
                if (sunRays) {
                    sunRays.rotation.z += dt * 0.25;
                    const s = 1 + Math.sin(t * 0.0015) * 0.04;
                    sunGroup.scale.set(s, s, 1);
                }
                clouds.forEach(c => {
                    c.position.x += c.userData.speed * dt;
                    if (c.userData.limitX && c.position.x > c.userData.limitX + 6) c.position.x = -c.userData.limitX - 6;
                    c.position.y = c.userData.baseY + Math.sin(t * 0.0004 + c.userData.speed * 10) * 0.4;
                });
                flowerSprites.forEach(f => {
                    f.material.rotation = Math.sin(t * 0.0012 + f.userData.ph) * 0.07;
                });
            }

            // ============================================================
            //  ΤΟ ΚΟΡΙΤΣΑΚΙ «ΛΙΛΗ» — ξανθιά με κοτσιδάκια

                hairIsRainbow = false;
            let girlReactionTime = 0,
                girlWinTime = 0;
            let girlBasePosition = new THREE.Vector3(2.5, -3.8, 0.5);
            let girlMood = 'idle',
                prevMood = 'idle';
            let lastActionTime = 0;

            let girlNdcX = 0.55,
                wanderTargetX = -0.2,
                petState = 'stand',
                petStateTimer = 3,
                faceDir = -1;

            const SKIN = 0xffdbb4;

            function createGirl() {

                // αυτιά

                // στόμα
                mouthMesh = new THREE.Mesh(new THREE.SphereGeometry(0.13, 24, 16), new THREE.MeshBasicMaterial({ color: 0x8a2f2f }));

                // φρύδια

                // ροδαλά μάγουλα (μόνιμα, διακριτικά — πιο ζωντανή όψη)

                const cheekL = new THREE.Mesh(new THREE.SphereGeometry(0.09, 10, 10), cheekMat);
                cheekL.position.set(-0.28, -0.08, 0.4);
                cheekL.scale.z = 0.3;
                const cheekR = cheekL.clone();
                cheekR.position.x = 0.28;

                sockets.headObj = head;

                head.add(sockets.head);

                // --- Σώμα / Φόρεμα ---
                sockets.body = new THREE.Group(); // φτερά/κάπα
                core.add(sockets.body);
                const dressMat = new THREE.MeshPhongMaterial({ color: 0xE86FA4, shininess: 22 });
                dressMesh = new THREE.Mesh(new THREE.ConeGeometry(0.62, 1.05, 26), dressMat);

                // γιακάς
                const collar = new THREE.Mesh(new THREE.TorusGeometry(0.2, 0.05, 10, 20), new THREE.MeshPhongMaterial({ color: 0xffffff }));

                    arm.position.set(0, -0.22, 0);
                    arm.rotation.z = i === 0 ? 0.32 : -0.32;
                    const hand = new THREE.Mesh(new THREE.SphereGeometry(0.095, 12, 12), skinMat);
                    hand.position.set(i === 0 ? 0.14 : -0.14, -0.46, 0);
                    h.add(arm, hand);
                    core.add(h);
                });
                sockets.prop = new THREE.Group();
                sockets.prop.position.set(-0.14, -0.44, 0.15);
                sockets.handR.add(sockets.prop);

                // --- Πόδια & παπούτσια ---
                sockets.footL = new THREE.Group();

            function addExpressiveEyes(irisColor) {
                if (girlEyes) { sockets.face.remove(girlEyes); girlEyes = null; }
                const g = new THREE.Group();
                const scleraMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                const irisMat = new THREE.MeshBasicMaterial({ color: irisColor || 0x3d76c9 });
                const pupilMat = new THREE.MeshBasicMaterial({ color: 0x1a1a1a });
                const hlMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                [-0.19, 0.19].forEach(x => {
                    const eye = new THREE.Group();
                    const sclera = new THREE.Mesh(new THREE.SphereGeometry(0.115, 16, 16), scleraMat);
                    sclera.scale.z = 0.55;
                    const iris = new THREE.Mesh(new THREE.SphereGeometry(0.065, 14, 14), irisMat);
                    iris.position.z = 0.06;
                    iris.scale.z = 0.5;
                    const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.032, 10, 10), pupilMat);
                    pupil.position.z = 0.09;
                    const hl = new THREE.Mesh(new THREE.SphereGeometry(0.018, 8, 8), hlMat);
                    hl.position.set(0.025, 0.03, 0.1);
                    eye.add(sclera, iris, pupil, hl);
                    eye.position.set(x, 0.08, 0.42);
                    g.add(eye);
                });
                sockets.face.add(g);

            // ---- Μαλλιά (10 στυλ) ----
            function buildHair(hairId) {
                if (hairGroup) { sockets.hair.remove(hairGroup); hairGroup = null; }
                hairMats = [];
                const item = SHOP.pet_hair.find(h => h.id === hairId) || SHOP.pet_hair[0];
                hairIsRainbow = !!item.rainbow;
                const col = item.color;
                const mat = new THREE.MeshPhongMaterial({ color: col, shininess: 55 });
                const darkMat = new THREE.MeshPhongMaterial({ color: new THREE.Color(col).multiplyScalar(0.75), shininess: 55 });
                hairMats.push(mat, darkMat);
                const g = new THREE.Group();

                // βασικό «καπέλο» μαλλιών + αφέλειες (κοινό σε όλα)
                const cap = new THREE.Mesh(new THREE.SphereGeometry(0.545, 28, 20, 0, Math.PI * 2, 0, Math.PI * 0.62), mat);
                cap.position.y = 0.03;
                g.add(cap);
                for (let i = -2; i <= 2; i++) {
                    const bang = new THREE.Mesh(new THREE.SphereGeometry(0.12, 12, 12), mat);
                    bang.position.set(i * 0.16, 0.3 - Math.abs(i) * 0.035, 0.44);
                    bang.scale.set(0.85, 1.35, 0.55);
                    g.add(bang);
                }

                const tieMat = new THREE.MeshPhongMaterial({ color: 0xff4d6d, shininess: 40 });

                if (item.style === 'twintails') {
                    [-1, 1].forEach(s => {
                        const tail = new THREE.Group();
                        const seg1 = new THREE.Mesh(new THREE.SphereGeometry(0.15, 14, 14), mat);
                        seg1.scale.set(1, 1.7, 1);
                        seg1.position.y = -0.2;
                        const seg2 = new THREE.Mesh(new THREE.SphereGeometry(0.11, 12, 12), darkMat);
                        seg2.scale.set(1, 1.6, 1);
                        seg2.position.y = -0.5;
                        const tie = new THREE.Mesh(new THREE.TorusGeometry(0.09, 0.035, 8, 16), tieMat);
                        tie.position.y = 0.0;
                        tail.add(seg1, seg2, tie);
                        tail.position.set(s * 0.52, 0.18, -0.05);
                        tail.rotation.z = s * -0.35;
                        tail.userData.side = s;
                        tail.userData.isTail = true;
                        g.add(tail);
                    });
                } else if (item.style === 'buns') {
                    [-1, 1].forEach(s => {
                        const bun = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), mat);
                        bun.position.set(s * 0.4, 0.42, -0.08);
                        const tie = new THREE.Mesh(new THREE.TorusGeometry(0.13, 0.03, 8, 16), tieMat);
                        tie.position.copy(bun.position);
                        tie.rotation.x = Math.PI / 2;
                        tie.position.y -= 0.12;
                        g.add(bun, tie);
                    });
                } else if (item.style === 'long') {
                    const back = new THREE.Mesh(new THREE.SphereGeometry(0.5, 20, 20), mat);
                    back.scale.set(1.05, 1.9, 0.6);
                    back.position.set(0, -0.45, -0.28);
                    g.add(back);
                    [-1, 1].forEach(s => {
                        const strand = new THREE.Mesh(new THREE.SphereGeometry(0.12, 12, 12), darkMat);
                        strand.scale.set(0.8, 2.6, 0.8);
                        strand.position.set(s * 0.42, -0.35, 0.12);
                        g.add(strand);
                    });
                } else if (item.style === 'braid') {
                    const braid = new THREE.Group();
                    for (let i = 0; i < 5; i++) {
                        const seg = new THREE.Mesh(new THREE.SphereGeometry(0.13 - i * 0.012, 12, 12), i % 2 ? darkMat : mat);
                        seg.position.set(Math.sin(i * 1.4) * 0.05, -0.15 - i * 0.2, -0.3);
                        braid.add(seg);
                    }
                    const tie = new THREE.Mesh(new THREE.TorusGeometry(0.07, 0.03, 8, 14), tieMat);
                    tie.position.set(0, -1.08, -0.3);
                    braid.add(tie);
                    braid.userData.isTail = true;
                    braid.userData.side = 1;
                    g.add(braid);
                } else if (item.style === 'curly') {
                    for (let i = 0; i < 16; i++) {
                        const curl = new THREE.Mesh(new THREE.SphereGeometry(0.13 + Math.random() * 0.05, 10, 10), i % 2 ? darkMat : mat);
                        const a = Math.random() * Math.PI * 2;
                        const r = 0.42 + Math.random() * 0.14;
                        curl.position.set(Math.cos(a) * r, 0.12 + Math.random() * 0.32, Math.sin(a) * r * 0.8 - 0.05);
                        g.add(curl);
                    }
                }
                hairGroup = g;
                sockets.hair.add(g);
            }

            function setDress(colorId) {
                const item = SHOP.pet_color.find(c => c.id === colorId) || SHOP.pet_color[0];
                dressIsRainbow = !!item.rainbow;
                if (dressMesh) girlCore.traverse(o => {});
                // dressMesh & chest & μοιράζονται material
                if (dressMesh) dressMesh.material.color.setHex(item.color);
            }

            function setShoes(feetId) {
                const item = SHOP.pet_feet.find(f => f.id === feetId) || SHOP.pet_feet[0];
                [sockets.footL, sockets.footR].forEach(f => {
                    const old = f.children.filter(c => c.userData.isShoe);
                    old.forEach(o => f.remove(o));
                    const shoe = new THREE.Mesh(new THREE.SphereGeometry(0.13, 14, 14), new THREE.MeshPhongMaterial({ color: item.color, shininess: 60 }));
                    shoe.scale.set(1, 0.7, 1.35);
                    shoe.position.set(0, 0.02, 0.05);
                    shoe.userData.isShoe = true;
                    f.add(shoe);
                });
            }

            function equipPetSlot(slotCategory, itemId) {
                if (!girlPet) return;
                if (slotCategory === 'pet_hair') { buildHair(itemId); return; }
                if (slotCategory === 'pet_color') { setDress(itemId); return; }
                if (slotCategory === 'pet_feet') { setShoes(itemId); return; }
                if (slotCategory === 'pet_props') {
                    while (sockets.prop.children.length > 0) sockets.prop.remove(sockets.prop.children[0]);
                } else if (slotCategory === 'pet_head') {
                    while (sockets.head.children.length > 0) sockets.head.remove(sockets.head.children[0]);
                } else if (slotCategory === 'pet_face') {
                    while (sockets.face.children.length > 0) sockets.face.remove(sockets.face.children[0]);
                    girlEyes = null;
                } else if (slotCategory === 'pet_body') {
                    while (sockets.body.children.length > 0) sockets.body.remove(sockets.body.children[0]);
                }

                if (slotCategory === 'pet_props') {
                    if (itemId === 'prop_lollipop') {
                        const stick = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.5), new THREE.MeshBasicMaterial({ color: 0xffffff }));

                        sockets.prop.add(cone, scoop);

                    if (itemId === 'prop_teddy') {

                        const bhead = new THREE.Mesh(new THREE.SphereGeometry(0.11, 14, 14), bMat);

                    }
                    if (itemId === 'prop_wand') {
                        const stick = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.5), new THREE.MeshPhongMaterial({ color: 0x5a3a1a }));

                        const grp = new THREE.Group();
                        grp.add(stick, star);
                        grp.userData.onUpdate = (t) => { star.scale.setScalar(1 + Math.sin(t * 0.01) * 0.25); };
                        sockets.prop.add(grp);
                    }
                    if (itemId === 'prop_balloon') {
                        const grp = new THREE.Group();
                        const string = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.01, 0.65), new THREE.MeshBasicMaterial({ color: 0xdddddd }));
                        string.position.y = 0.32;
                        const balloon = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), new THREE.MeshPhongMaterial({ color: 0xff3355 }));
                        balloon.position.y = 0.78;
                        balloon.scale.y = 1.15;
                        grp.add(string, balloon);
                        grp.userData.onUpdate = (t) => {
                            balloon.position.y = 0.78 + Math.sin(t * 0.003) * 0.06;
                            balloon.position.x = Math.sin(t * 0.002) * 0.05;
                        };
                        sockets.prop.add(grp);
                    }
                    if (itemId === 'prop_flower') {
                        const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.018, 0.4), new THREE.MeshPhongMaterial({ color: 0x2e6b18 }));
                        const grp = new THREE.Group();
                        grp.add(stem);
                        const pMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
                        for (let p = 0; p < 6; p++) {
                            const a = p / 6 * Math.PI * 2;
                            const petal = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), pMat);
                            petal.position.set(Math.cos(a) * 0.08, 0.24, Math.sin(a) * 0.08);
                            petal.scale.set(1.3, 0.6, 1);
                            grp.add(petal);
                        }
                        const mid = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), new THREE.MeshBasicMaterial({ color: 0xf5b301 }));

            // ---- THREE.JS GAME ----

            function initThree() {

            function updateBoardColorsLive() {

            function onResize() {
                if (!renderer) return;

                layoutBackground();
