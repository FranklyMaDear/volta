<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Drop 2048 · FranklyGames Edition</title>
  <style>
    :root {
      --bg: #0B0C10;
      --panel: #8C6A4F;
      --panel-deep: #4A3423;
      --cream: #F7EFDC;
      --ink: #2F1B0D;
      --accent: #F2A03D;
      --good: #7FA653;
      --coin: #F5C542;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: "Baloo 2", system-ui, sans-serif;
      color: var(--ink);
      user-select: none;
      touch-action: none;
    }
    #game {
      position: fixed;
      inset: 0;
      display: block;
      z-index: 0;
    }
    .hud {
      position: fixed;
      left: 0;
      right: 0;
      top: 0;
      padding: 10px 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      pointer-events: none;
      z-index: 5;
    }
    .chip {
      background: var(--panel-deep);
      color: var(--cream);
      border-radius: 14px;
      padding: 6px 12px;
      font-weight: 800;
      font-size: 15px;
      box-shadow: 0 3px 0 rgba(0, 0, 0, .3);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .chip small {
      font-weight: 600;
      opacity: .75;
      font-size: 11px;
      display: block;
      line-height: 1;
    }
    .chip .big {
      font-size: 17px;
      line-height: 1.1;
    }
    .spacer {
      flex: 1;
    }
    #missionBar {
      position: fixed;
      top: 65px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      pointer-events: none;
      background: var(--cream);
      border: 3px solid var(--panel-deep);
      color: var(--ink);
      border-radius: 16px;
      padding: 7px 16px;
      font-weight: 700;
      font-size: 14px;
      box-shadow: 0 4px 0 rgba(0, 0, 0, .3);
      white-space: nowrap;
    }
    #missionBar b {
      color: #C2542F;
    }
    .powerbar {
      position: fixed;
      bottom: 18px;
      left: 14px;
      display: flex;
      justify-content: flex-start;
      gap: 10px;
      z-index: 5;
    }
    .pbtn {
      pointer-events: auto;
      border: none;
      cursor: pointer;
      width: 66px;
      height: 66px;
      border-radius: 18px;
      background: var(--good);
      box-shadow: 0 4px 0 #5c7a3a;
      color: #fff;
      font-size: 26px;
      line-height: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      font-family: inherit;
      transition: transform .08s;
    }
    .pbtn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #5c7a3a;
    }
    .pbtn .cost {
      font-size: 11px;
      font-weight: 800;
      background: rgba(0, 0, 0, .22);
      border-radius: 8px;
      padding: 1px 7px;
    }
    .pbtn.armed {
      outline: 4px solid var(--accent);
      background: #C2542F;
      box-shadow: 0 4px 0 #8f3c20;
    }
    .pbtn.listening {
      outline: 4px solid #ff5555;
      background: #C2542F;
      box-shadow: 0 4px 0 #8f3c20;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    /* Το μικρόφωνο έχει τη δική του θέση: δεξιά, πάνω από το Aziram */
    #btnMic {
      position: fixed;
      right: 14px;
      bottom: 225px;
      z-index: 6;
      width: 58px;
      height: 58px;
    }
    .shop-tabs {
      display: flex;
      gap: 5px;
      margin-bottom: 10px;
      border-bottom: 2px solid rgba(0, 0, 0, 0.1);
      padding-bottom: 10px;
      overflow-x: auto;
    }
    .shop-tab {
      flex: 1;
      padding: 8px 12px;
      font-weight: 800;
      font-size: 13px;
      border-radius: 10px;
      background: #E4D7BC;
      color: #8C6A4F;
      border: none;
      cursor: pointer;
      white-space: nowrap;
    }
    .shop-tab.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 3px 0 #b8742a;
      transform: translateY(-2px);
    }
    .pet-subtabs {
      display: none;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 10px;
      background: #f0e5d1;
      padding: 8px;
      border-radius: 10px;
      justify-content: center;
    }
    .pet-subtabs.active {
      display: flex;
    }
    .pet-subtab {
      padding: 6px 10px;
      font-weight: 800;
      font-size: 11px;
      border-radius: 8px;
      background: #C2542F;
      color: #fff;
      border: none;
      cursor: pointer;
    }
    .pet-subtab.active {
      background: #5c7a3a;
      box-shadow: 0 2px 0 #3a4d25;
      transform: translateY(-1px);
    }
    .shop-items {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      max-height: 40vh;
      overflow-y: auto;
      padding-bottom: 10px;
      padding-right: 5px;
    }
    .shop-item {
      background: #E4D7BC;
      border: 3px solid #8C6A4F;
      border-radius: 14px;
      padding: 10px;
      cursor: pointer;
      transition: transform 0.1s;
      text-align: center;
    }
    .shop-item:active {
      transform: scale(0.95);
    }
    .shop-item h3 {
      font-size: 14px;
      margin-bottom: 5px;
      color: var(--ink);
      line-height: 1.2;
    }
    .shop-item .price {
      font-weight: 800;
      color: #b8742a;
      font-size: 13px;
    }
    .shop-item.owned .price {
      color: var(--good);
    }
    .shop-item.equipped {
      border-color: var(--accent);
      background: #FFF5E1;
      box-shadow: 0 0 10px rgba(242, 160, 61, 0.5);
    }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(11, 12, 16, .85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      backdrop-filter: blur(4px);
    }
    .card {
      background: var(--cream);
      border: 4px solid var(--panel-deep);
      border-radius: 26px;
      padding: 22px 20px;
      width: min(400px, 92vw);
      text-align: center;
      box-shadow: 0 10px 0 rgba(0, 0, 0, .4);
      animation: pop .25s cubic-bezier(.34, 1.56, .64, 1);
    }
    @keyframes pop {
      from {
        transform: scale(.7);
        opacity: 0;
      }
    }
    .card h2 {
      font-size: 22px;
      margin-bottom: 6px;
      font-weight: 800;
    }
    .btn {
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-weight: 800;
      font-size: 16px;
      color: #fff;
      background: var(--accent);
      border-radius: 16px;
      padding: 12px 30px;
      box-shadow: 0 4px 0 #b8742a;
      transition: transform .08s;
      margin-top: 10px;
      width: 100%;
    }
    .btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #b8742a;
    }
    .hidden {
      display: none !important;
    }
    #toast {
      position: fixed;
      bottom: 96px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 15;
      pointer-events: none;
      background: var(--panel-deep);
      color: var(--cream);
      font-weight: 700;
      font-size: 14px;
      border-radius: 14px;
      padding: 8px 16px;
      opacity: 0;
      transition: opacity .25s;
      white-space: nowrap;
    }

    /* SPEECH BUBBLE */
    #speech {
      position: fixed;
      z-index: 10;
      pointer-events: none;
      font-weight: 800;
      font-size: 20px;
      background: #ffffff;
      color: #333;
      padding: 8px 16px;
      border-radius: 20px;
      border: 3px solid var(--panel-deep);
      box-shadow: 0 4px 0 var(--panel-deep);
      transform: translate(-50%, -120%);
      opacity: 0;
      transition: opacity 0.2s ease-in-out, transform 0.2s ease-in-out;
      max-width: 70vw;
      white-space: normal;
      text-align: center;
    }
    #speech.visible {
      opacity: 1;
      transform: translate(-50%, -140%);
    }
    #speech::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      margin-left: -10px;
      border-width: 12px;
      border-style: solid;
      border-color: #ffffff transparent transparent transparent;
      filter: drop-shadow(0 4px 0 var(--panel-deep));
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div class="hud">
    <div class="chip"><div><small>ΕΠΙΠΕΔΟ</small><span class="big" id="hudLevel">1</span></div></div>
    <div class="chip"><div><small>ΣΚΟΡ</small><span class="big" id="hudScore">0</span></div></div>
    <div class="spacer"></div>

    <div class="chip">🪙 <span class="big" id="hudCoins">0</span></div>
  </div>
  <div id="missionBar">🎯 Αποστολή: <b id="missionText"></b></div>

  <!-- SPEECH BUBBLE ELEMENT -->
  <div id="speech"><span id="speechText">WOW!</span></div>

  <div class="powerbar">
    <button class="pbtn" id="btnMagnet">🧲<span class="cost">Δωρεάν</span></button>
    <button class="pbtn" id="btnHammer">🔨<span class="cost">Δωρεάν</span></button>
    <button class="pbtn" id="btnShuffle">🔄<span class="cost">Δωρεάν</span></button>
    <button class="pbtn" id="btnMic">🎤<span class="cost">Μίλα</span></button>
  </div>

  <div id="toast"></div>

  <div class="overlay hidden" id="shopModal">
    <div class="card">
      <h2 style="margin-bottom:15px;">🛍️ Εξατομίκευση</h2>
      <div class="shop-tabs" id="mainTabs">
        <button class="shop-tab active" data-maintab="cubes">Κύβοι</button>
        <button class="shop-tab" data-maintab="boards">Ταμπλό</button>
        <button class="shop-tab" data-maintab="effects">Εφέ</button>
        <button class="shop-tab" data-maintab="sounds">Ήχοι</button>
        <button class="shop-tab" data-maintab="pets">Pet</button>
      </div>
      <div class="pet-subtabs" id="petSubTabs">
        <button class="pet-subtab active" data-subtab="pet_color">Χρώμα</button>
        <button class="pet-subtab" data-subtab="pet_head">Κεφάλι</button>
        <button class="pet-subtab" data-subtab="pet_face">Πρόσωπο</button>
        <button class="pet-subtab" data-subtab="pet_body">Σώμα</button>
        <button class="pet-subtab" data-subtab="pet_hands">Χέρια</button>
        <button class="pet-subtab" data-subtab="pet_props">Αντικείμενο</button>
        <button class="pet-subtab" data-subtab="pet_feet">Πόδια</button>
      </div>
      <div class="shop-items" id="shopContainer"></div>
      <button class="btn" id="btnCloseShop">Κλείσιμο</button>
    </div>
  </div>

  <div class="overlay hidden" id="winModal">
    <div class="card">
      <div style="font-size:40px; margin-bottom:10px;">🎉</div>
      <h2>Επίπεδο Ολοκληρώθηκε!</h2>
      <p id="winText"></p>
      <button class="btn" id="btnNext">Επόμενο επίπεδο ➜</button>
    </div>
  </div>

  <div class="overlay hidden" id="loseModal">
    <div class="card">
      <div style="font-size:40px; margin-bottom:10px;">😵</div>
      <h2>Γέμισε το ταμπλό!</h2>
      <p id="loseText"></p>
      <button class="btn" id="btnRetry">Ξαναπροσπάθησε</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
  </script>

      async function loadSave() {
        try {
          const r = localStorage.getItem("drop2048-frankly-v3");
          if (r) save = Object.assign({}, DEFAULT_SAVE, JSON.parse(r));
        } catch (e) {}
      }

      function persist() {
        try { localStorage.setItem("drop2048-frankly-v3", JSON.stringify(save)); } catch (e) {}
      }

      const audioCtx = new(window.AudioContext || window.webkitAudioContext)();

      function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (type === 'win') { playWinSound(audioCtx); return; }
        const s = save.equippedSound || 'snd_default';
        const now = audioCtx.currentTime;

        function tone(freq0, freq1, dur, wave, vol, delay) {
          const o = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          o.connect(g);
          g.connect(audioCtx.destination);
          o.type = wave;
          const t0 = now + (delay || 0);
          o.frequency.setValueAtTime(freq0, t0);
          if (freq1) o.frequency.exponentialRampToValueAtTime(freq1, t0 + dur);
          g.gain.setValueAtTime(vol, t0);
          g.gain.exponentialRampToValueAtTime(0.01, t0 + dur);
          o.start(t0);
          o.stop(t0 + dur + 0.05);
        }

        if (s === 'snd_default') {
          if (type === 'drop') tone(800, 400, 0.1, 'sine', 0.2);
          else tone(300, 800, 0.2, 'sine', 0.3);
        } else if (s === 'snd_bass') {
          if (type === 'drop') tone(150, 60, 0.18, 'sawtooth', 0.3);
          else { tone(70, 200, 0.3, 'sawtooth', 0.35); tone(140, 400, 0.3, 'sine', 0.2); }
        } else if (s === 'snd_bell') {
          if (type === 'drop') { tone(880, null, 0.35, 'sine', 0.15); tone(1760, null, 0.25, 'sine', 0.06); }
          else { tone(1046, null, 0.55, 'sine', 0.2); tone(2093, null, 0.4, 'sine', 0.08); tone(1568, null, 0.45, 'sine', 0.06, 0.05); }
        } else if (s === 'snd_echo') {
          const f = type === 'drop' ? 600 : 900;
          for (let i = 0; i < 3; i++) tone(f, f * 0.8, 0.12, 'sine', 0.22 / (i + 1), i * 0.13);
        } else if (s === 'snd_retro') {
          if (type === 'drop') tone(440, 220, 0.08, 'square', 0.12);
          else { tone(523, null, 0.07, 'square', 0.12); tone(659, null, 0.07, 'square', 0.12, 0.07); tone(784, null, 0.1, 'square', 0.12, 0.14); }
        } else if (s === 'snd_pop') {
          if (type === 'drop') tone(1200, 300, 0.06, 'sine', 0.3);
          else { tone(400, 1600, 0.09, 'sine', 0.32); tone(600, 2000, 0.08, 'sine', 0.15, 0.06); }
        } else if (s === 'snd_laser') {
          if (type === 'drop') tone(1800, 200, 0.15, 'sawtooth', 0.13);
          else tone(200, 2200, 0.2, 'sawtooth', 0.17);
        } else if (s === 'snd_magic') {
          const base = type === 'drop' ? 700 : 950;
          for (let i = 0; i < 4; i++) tone(base + i * 180, null, 0.16, 'triangle', 0.11, i * 0.05);
        }
      }

      function playWinSound(ctx) {
        for (let i = 0; i < 4; i++) {
          setTimeout(() => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600 + (i * 250), ctx.currentTime);
            gain.gain.setValueAtTime(0.15, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
            osc.start();
            osc.stop(ctx.currentTime + 0.2);
          }, i * 100);
        }
      }

      /* ----- VOICE (TTS) ----- */
      let isTalking = false;

      function speak(text) {
        try {
          if (!('speechSynthesis' in window)) return;
          speechSynthesis.cancel();
          const u = new SpeechSynthesisUtterance(text);
          u.lang = 'el-GR';
          const voices = speechSynthesis.getVoices();
          const gr = voices.find(v => v.lang && v.lang.toLowerCase().startsWith('el'));
          if (gr) u.voice = gr;
          u.rate = 1.05;
          u.pitch = 1.5;
          u.onstart = () => { isTalking = true; };
          u.onend = () => { isTalking = false; };
          u.onerror = () => { isTalking = false; };
          speechSynthesis.speak(u);
        } catch (e) { isTalking = false; }
      }

      // Warm up voice list (iOS/Chrome load voices async)
      if ('speechSynthesis' in window) {
        speechSynthesis.getVoices();
        speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
      }

      /* ----- AZIRAM Q&A BRAIN (offline) ----- */
      function stripAccents(s) {
        return s.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
      }

      function answerQuestion(raw) {
        const q = stripAccents(raw.toLowerCase());
        const has = (...w) => w.some(x => q.includes(x));

        if (has('πως σε λενε', 'ονομα σου', 'ποιος εισαι', 'τι εισαι')) return "Με λένε Aziram και είμαι το slime φιλαράκι σου!";
        if (has('τι κανεις', 'πως εισαι', 'εισαι καλα', 'ολα καλα')) return "Τέλεια είμαι! Έτοιμος για κύβους!";
        if (has('σκορ', 'ποντο')) return "Το σκορ σου είναι " + score + " πόντοι! Συνέχισε!";
        if (has('επιπεδο', 'πιστα')) return "Είμαστε στο επίπεδο " + (level + 1) + "!";
        if (has('νομισματα', 'λεφτα', 'χρηματα', 'κερματα')) return "Έχεις " + coins + " νομίσματα! Πάμε για ψώνια;";
        if (has('αποστολη', 'στοχος', 'τι πρεπει')) return "Η αποστολή μας: " + LEVELS[Math.min(level, LEVELS.length - 1)].text + "!";
        if (has('ανεκδοτο', 'αστειο', 'πες κατι αστειο')) {
          const jokes = [
            "Γιατί ο κύβος πήγε σχολείο; Για να γίνει τετράγωνο μυαλό!",
            "Τι λέει το 2 στο 2; Έλα να γίνουμε 4άρι!",
            "Είμαι slime, αλλά δεν ζηλεύω κανέναν!",
            "Ξέρεις ποιο είναι το αγαπημένο μου φαγητό; Τα κυβάκια ζάχαρης!"
          ];
          return jokes[Math.floor(Math.random() * jokes.length)];
        }
        if (has('βοηθεια', 'συμβουλη', 'πως παιζ', 'τι να κανω')) return "Ένωσε ίδιους αριθμούς! Και κράτα τους μεγάλους κύβους στις άκρες!";
        if (has('σε αγαπω', 'σ αγαπω', 'σε συμπαθω')) return "Κι εγώ σε αγαπώ πάρα πολύ!";
        if (has('ποσο χρονων', 'ηλικια')) return "Είμαι νεογέννητο slime! Μόλις λίγων λεπτών!";
        if (has('αντιο', 'τα λεμε', 'φευγω')) return "Γεια σου! Έλα πάλι γρήγορα, θα σε περιμένω!";
        if (has('ευχαριστω')) return "Παρακαλώ! Ό,τι θες, εδώ είμαι!";
        if (has('τραγουδ')) return "Λα λα λα! Κύβοι κύβοι παντού! Χι χι!";
        if (has('γεια', 'καλημερα', 'καλησπερα', 'καληνυχτα', 'χαιρετε')) return "Γεια σου! Χαίρομαι πολύ που σε ακούω!";
        // Αν δεν κατάλαβε, επαναλαμβάνει αυτό που είπες
        return "Είπες: " + raw + ". Ωραίο ακούγεται!";
      }

      /* ----- MIC (Speech Recognition → pet answers) ----- */
      let recognition = null,
        isListening = false;

      function initMic() {
        const btn = document.getElementById('btnMic');
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) {
          btn.onclick = () => toast("Το 🎤 δεν υποστηρίζεται εδώ");
          return;
        }
        btn.onclick = () => {
          if (isListening) {
            try { recognition.stop(); } catch (e) {}
            return;
          }
          recognition = new SR();
          recognition.lang = 'el-GR';
          recognition.interimResults = false;
          recognition.maxAlternatives = 1;
          recognition.onstart = () => {
            isListening = true;
            btn.classList.add('listening');
            toast("🎤 Ρώτα με κάτι...");
          };
          recognition.onresult = (e) => {
            const txt = e.results[0][0].transcript;
            if (txt) {
              const reply = answerQuestion(txt);
              aziramReactionTime = 1.2;
              showSpeech(reply, Math.max(2800, reply.length * 80));
              speak(reply);
            }
          };
          recognition.onerror = () => toast("Δεν σε άκουσα 😅 Ξαναδοκίμασε");
          recognition.onend = () => {
            isListening = false;
            btn.classList.remove('listening');
          };
          try { recognition.start(); } catch (e) { toast("Δεν άνοιξε το 🎤"); }
        };
      }

      const particles = [];
      const pGeo = new THREE.BoxGeometry(0.08, 0.08, 0.08);
      const pMats = {
        'flame': new THREE.MeshBasicMaterial({ color: 0xff4500 }),
        'sparkle': new THREE.MeshBasicMaterial({ color: 0xffffff }),
        'smoke': new THREE.MeshBasicMaterial({ color: 0x888888, transparent: true, opacity: 0.7 }),
        'explode': new THREE.MeshBasicMaterial({ color: 0xffa500 }),
        'confetti': [0xff0000, 0x00ff00, 0x0000ff, 0xffff00].map(c => new THREE.MeshBasicMaterial({ color: c }))
      };

      function spawnParticle(x, y, z, type) {
        let mat = pMats[type];
        if (Array.isArray(mat)) mat = mat[Math.floor(Math.random() * mat.length)];
        const p = new THREE.Mesh(pGeo, mat);
        p.position.set(x, y, z);
        let vx = (Math.random() - 0.5) * 6,
          vy = (Math.random() - 0.5) * 6,
          vz = (Math.random() - 0.5) * 6;
        if (type === 'flame' || type === 'smoke') { vx *= 0.2;
          vy = -Math.random() * 2 - 0.5;
          vz = 0; }
        if (type === 'confetti') { p.scale.set(0.15, 0.15, 0.15);
          vy = Math.random() * 5; }
        scene.add(p);
        particles.push({ mesh: p, life: 1.0, vx, vy, vz, type });
      }

      function spawnBurst(x, y, z, type, count) {
        for (let i = 0; i < count; i++) spawnParticle(x, y, z, type);
      }

      function updateParticles(dt) {
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.life -= dt * (p.type === 'smoke' ? 1.5 : 2.5);
          if (p.life <= 0) { scene.remove(p.mesh);
            particles.splice(i, 1); } else {
            p.mesh.position.x += p.vx * dt;
            p.mesh.position.y += p.vy * dt;
            p.mesh.position.z += p.vz * dt;
            if (p.type === 'confetti') p.vy -= dt * 10;
            p.mesh.scale.setScalar(p.life);
            if (p.type === 'flame' || p.type === 'explode') p.mesh.material.color.setHSL(0.1 * p.life, 1, 0.5);
          }
        }
      }

      let starField;

      function initStarfield() {
        const starCount = 8000;
        const starGeo = new THREE.BufferGeometry();
        const starPos = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount * 3; i += 3) {
          starPos[i] = (Math.random() - 0.5) * 500;
          starPos[i + 1] = (Math.random() - 0.5) * 500;
          starPos[i + 2] = (Math.random() - 0.5) * 300;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        starField = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.25,
          blending: THREE.AdditiveBlending, depthWrite: false }));
        starField.position.z = -50;
        scene.add(starField);
      }

      function updateStarfield(speed) {
        if (!starField) return;
        const positions = starField.geometry.attributes.position.array;
        for (let i = 2; i < positions.length; i += 3) {
          positions[i] += speed;
          if (positions[i] > 40) { positions[i] = -120;
            positions[i - 2] = (Math.random() - 0.5) * 500;
            positions[i - 1] = (Math.random() - 0.5) * 500; }
        }
        starField.geometry.attributes.position.needsUpdate = true;
      }

      // Speech Bubble Variables

      function showSpeech(text, duration) {
        const el = document.getElementById("speechText");
        const bbl = document.getElementById("speech");

        if (speechTimer) clearTimeout(speechTimer);

        el.innerText = text;
        bbl.classList.add("visible");
        bbl.style.opacity = "1";

        updateSpeechPosition();

        speechTimer = setTimeout(() => {
          bbl.classList.remove("visible");
          bbl.style.opacity = "0";
        }, duration);

      function updateSpeechPosition() {
        if (!aziramPet) return;
        const vec = aziramPet.position.clone();
        vec.project(camera);
        const x = (vec.x * .5 + .5) * window.innerWidth;
        const y = (-vec.y * .5 + .5) * window.innerHeight;

        const bbl = document.getElementById("speech");
        bbl.style.left = x + "px";
        bbl.style.top = y + "px";
      }

      function createAziram() {

        sockets.head = new THREE.Group();

        sockets.handR = new THREE.Group();
        sockets.handR.position.set(1.0, 0, 0);
        sockets.hands.add(sockets.handR);

      function updateAziramScreenPosition() {
        if (!aziramPet || !camera) return;

        // Πιο αριστερά (0.58 αντί 0.73) ώστε να φαίνεται ολόκληρο
        const ndc = new THREE.Vector3(0.58, -0.75, 0.1);

        ndc.unproject(camera);
        const dir = ndc.clone().sub(camera.position).normalize();
        const pos = camera.position.clone().add(dir.multiplyScalar(5.0));
        aziramBasePosition.copy(pos);
        aziramPet.position.copy(aziramBasePosition);
        updateSpeechPosition();
      }

      // Slime Γαλαξίας: καρδούλες, αστεράκια, sprinkles και γκλίτερ μέσα στο σώμα
      function buildSlime() {
        slimeGroup = new THREE.Group();
        const items = [];
        // Καρδούλες (φλαταρισμένες σφαίρες)
        [0xff6699, 0xff3366, 0xcc44aa].forEach(col => {
          const h = new THREE.Mesh(new THREE.SphereGeometry(0.09, 10, 10),
            new THREE.MeshPhongMaterial({ color: col, shininess: 150 }));
          h.scale.set(1, 0.95, 0.55);
          items.push(h);
        });
        // Αστεράκια (οκτάεδρα)
        [0xffdd55, 0x66ddff, 0x88ffcc].forEach(col => {
          const s = new THREE.Mesh(new THREE.OctahedronGeometry(0.08),
            new THREE.MeshPhongMaterial({ color: col, shininess: 150 }));
          items.push(s);
        });
        // Sprinkles (μικροί χρωματιστοί κύλινδροι)
        const sprinkleColors = [0xffaacc, 0xaaddff, 0xffeeaa, 0xccffaa, 0xddaaff];
        for (let i = 0; i < 8; i++) {
          const sp = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.1, 6),
            new THREE.MeshBasicMaterial({ color: sprinkleColors[i % 5] }));
          sp.rotation.set(Math.random() * 3, Math.random() * 3, Math.random() * 3);
          items.push(sp);
        }
        // Γκλίτερ (λευκές κουκκιδίτσες)
        const glitterMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        for (let i = 0; i < 22; i++) {
          items.push(new THREE.Mesh(new THREE.SphereGeometry(0.018, 6, 6), glitterMat));
        }
        // Τυχαία τοποθέτηση ΜΕΣΑ στο σώμα
        items.forEach(m => {
          const r = 0.5 * Math.cbrt(Math.random());
          const th = Math.random() * Math.PI * 2;
          const ph = Math.acos(2 * Math.random() - 1);
          m.position.set(
            r * Math.sin(ph) * Math.cos(th) * 0.9,
            r * Math.sin(ph) * Math.sin(th) * 1.05,
            r * Math.cos(ph) * 0.8
          );
          m.userData.baseY = m.position.y;
          m.userData.ph = Math.random() * 10;
          slimeGroup.add(m);
        });
        // Αργή αιώρηση των στολιδιών
        slimeGroup.userData.onUpdate = (t) => {
          slimeGroup.rotation.y = Math.sin(t * 0.0004) * 0.35;
          slimeGroup.children.forEach(m => {
            m.position.y = m.userData.baseY + Math.sin(t * 0.001 + m.userData.ph) * 0.03;
            m.rotation.y += 0.006;
          });
        };
        aziramCore.add(slimeGroup);
      }

      // Μεγάλα εκφραστικά μάτια με λευκή γυαλάδα
      function addExpressiveEyes(color) {
        const g = new THREE.Group();
        const ballMat = new THREE.MeshBasicMaterial({ color: color || 0x111111 });
        const hlMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        [-0.26, 0.26].forEach(x => {
          const eye = new THREE.Group();
          const ball = new THREE.Mesh(new THREE.SphereGeometry(0.15, 16, 16), ballMat);
          const hl = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), hlMat);
          hl.position.set(0.05, 0.06, 0.11);
          eye.add(ball, hl);
          eye.position.set(x, 0.18, 0.56);
          g.add(eye);
        });
        sockets.face.add(g);
        aziramEyes = g;
      }

      function equipPetSlot(slotCategory, itemId) {
        if (!aziramPet) return;

        if (slotCategory === 'pet_color') {
          aziramBodyMesh.userData.isRainbow = false;
          if (slimeGroup) { aziramCore.remove(slimeGroup); slimeGroup = null; }
          aziramBodyMesh.material.opacity = 0.88;
          if (itemId === 'color_green') aziramBaseColor.setHex(0x33ffaa);
          if (itemId === 'color_blue') aziramBaseColor.setHex(0x00aaff);
          if (itemId === 'color_pink') aziramBaseColor.setHex(0xff00ff);
          if (itemId === 'color_gold') aziramBaseColor.setHex(0xffd700);
          if (itemId === 'color_red') aziramBaseColor.setHex(0xff4500);
          if (itemId === 'color_rainbow') aziramBodyMesh.userData.isRainbow = true;
          if (itemId === 'color_slime') {
            aziramBaseColor.setHex(0x55d8e8);
            aziramBodyMesh.material.opacity = 0.62;
            buildSlime();
          }
          aziramBodyMesh.material.color.copy(aziramBaseColor);
          return;
        }

        if (slotCategory === 'pet_hands') {
          while (sockets.handL.children.length > 0) sockets.handL.remove(sockets.handL.children[0]);
          while (sockets.handR.children.length > 0) sockets.handR.remove(sockets.handR.children[0]);
          sockets.handR.add(sockets.prop);
        } else if (slotCategory === 'pet_feet') {
          while (sockets.footL.children.length > 0) sockets.footL.remove(sockets.footL.children[0]);
          while (sockets.footR.children.length > 0) sockets.footR.remove(sockets.footR.children[0]);

        renderer.setSize(innerWidth, innerHeight);

        updateAziramScreenPosition();

        };

      function numberTexture(value) {
        const cv = document.createElement("canvas");
        cv.width = cv.height = 128;
        const g = cv.getContext("2d");
        const skin = save.equippedCube;
        if (skin === 'wood') { g.fillStyle = value >= 128 ? "#8B5A2B" : "#DEB887";
          roundRect(g, 4, 4, 120, 120, 22);
          g.fill(); } else if (skin === 'whitered' || skin === 'whitegreen') { g.fillStyle = "white";
          roundRect(g, 4, 4, 120, 120, 22);
          g.fill();
          g.fillStyle = skin === 'whitered' ? "#D32F2F" : "#388E3C";
          g.save();
          g.clip(); for (let i = -128; i < 256; i += 32) { g.beginPath();
            g.moveTo(i, 0);
            g.lineTo(i + 20, 0);
            g.lineTo(i - 108, 128);
            g.lineTo(i - 128, 128);
            g.fill(); }
          g.restore(); } else if (skin === 'zebra') { g.fillStyle = "white";
          roundRect(g, 4, 4, 120, 120, 22);
          g.fill();
          g.fillStyle = "#111";
          g.save();
          g.clip(); for (let i = 0; i < 128; i += 24) { g.beginPath();
            g.moveTo(0, i);
            g.bezierCurveTo(40, i + 15, 80, i - 15, 128, i);
            g.lineTo(128, i + 10);
            g.bezierCurveTo(80, i - 5, 40, i + 25, 0, i + 10);
            g.fill(); }
          g.restore(); } else if (skin === 'rainbow') { let grad = g.createLinearGradient(0, 0, 128, 128); ['red',
            'orange', 'yellow', 'green', 'cyan', 'blue', 'purple'
          ].forEach((c, i) => grad.addColorStop(i / 6, c));
          g.fillStyle = grad;
          roundRect(g, 4, 4, 120, 120, 22);
          g.fill(); } else if (skin === 'gold') { let grad = g.createRadialGradient(64, 64, 0, 64, 64, 90);
          grad.addColorStop(0, "#FFF59D");
          grad.addColorStop(0.6, "#FBC02D");
          grad.addColorStop(1, "#F57F17");
          g.fillStyle = grad;
          roundRect(g, 4, 4, 120, 120, 22);
          g.fill(); } else if (skin === 'neon') { g.fillStyle = "#111";
          roundRect(g, 4, 4, 120, 120, 22);
          g.fill();
          g.strokeStyle = `hsl(${(Math.log2(value)*30)%360}, 100%, 50%)`;
          g.lineWidth = 6;
          g.stroke(); } else if (skin === 'galaxy') { g.fillStyle = "#1A0B2E";
          roundRect(g, 4, 4, 120, 120, 22);
          g.fill();
          g.fillStyle = "white"; for (let i = 0; i < 30; i++) { g.beginPath();
            g.arc(Math.random() * 128, Math.random() * 128, Math.random() * 2, 0, 7);
            g.fill(); } } else if (skin === 'ice') { let grad = g.createLinearGradient(0, 0, 128, 128);
          grad.addColorStop(0, "#E0F7FA");
          grad.addColorStop(1, "#00BCD4");
          g.fillStyle = grad;
          roundRect(g, 4, 4, 120, 120, 22);
          g.fill(); } else if (skin === 'lava') { let grad = g.createLinearGradient(0, 0, 128, 128);
          grad.addColorStop(0, "#FF5722");
          grad.addColorStop(1, "#FFC107");
          g.fillStyle = grad;
          roundRect(g, 4, 4, 120, 120, 22);
          g.fill(); } else { g.fillStyle = "#111";
          roundRect(g, 4, 4, 120, 120, 22);
          g.fill(); }

        // Λευκό στρογγυλό background πίσω από τον αριθμό στα "πολύχρωμα" skins
        const badgeSkins = ['whitered', 'whitegreen', 'zebra', 'rainbow', 'galaxy', 'neon', 'ice', 'lava'];
        const hasBadge = badgeSkins.includes(skin);
        if (hasBadge) {
          g.save();
          g.shadowColor = "rgba(0,0,0,0.35)";
          g.shadowBlur = 7;
          g.shadowOffsetY = 2;
          g.beginPath();
          g.arc(64, 66, 37, 0, Math.PI * 2);
          g.fillStyle = "rgba(255,255,255,0.96)";
          g.fill();
          g.restore();
          g.lineWidth = 3;
          g.strokeStyle = "rgba(0,0,0,0.12)";
          g.beginPath();
          g.arc(64, 66, 37, 0, Math.PI * 2);
          g.stroke();
        }
        if (hasBadge) {
          g.font = `800 ${value>=1024?30:value>=128?36:44}px 'Baloo 2', sans-serif`;
        } else {
          g.font = `800 ${value>=1024?42:value>=128?50:60}px 'Baloo 2', sans-serif`;
        }
        g.textAlign = "center";
        g.textBaseline = "middle";
        g.fillStyle = hasBadge ? "#2F1B0D" : (skin === 'wood' ? (value >= 128 ? "#FFF" : "#000") : "#FFF");
        g.fillText(value, 64, hasBadge ? 66 : 68);
        const t = new THREE.CanvasTexture(cv);
        t.anisotropy = 4;
        return t;
      }

      function roundRect(g, x, y, w, h, r) {
        g.beginPath();
        g.moveTo(x + r, y);
        g.arcTo(x + w, y, x + w, y + h, r);
        g.arcTo(x + w, y + h, x, y + h, r);
        g.arcTo(x, y + h, x, y, r);
        g.arcTo(x, y, x + w, y, r);
        g.closePath();
      }

      function makeCube(value) {
        const tex = numberTexture(value);
        const m = new THREE.Mesh(new THREE.BoxGeometry(CELL * 0.92, CELL * 0.92, CELL * 0.92), new THREE
          .MeshLambertMaterial({ map: tex, color: 0xdddddd }));
        m.userData.value = value;
        return m;
      }

      function tween(obj, to, dur, ease, done) {
        const from = {};
        for (const k in to) from[k] = obj[k];
        anims.push({ obj, from, to, dur, t: 0, ease: ease || (t => 1 - Math.pow(1 - t, 3)), done });
      }

      function stepAnims(dt) {
        for (let i = anims.length - 1; i >= 0; i--) {
          const a = anims[i];
          a.t += dt / a.dur;
          const k = a.t >= 1 ? 1 : a.ease(a.t);
          for (const p in a.to) a.obj[p] = a.from[p] + (a.to[p] - a.from[p]) * k;
          if (a.t >= 1) { anims.splice(i, 1);
            a.done && a.done(); }
        }
      }

      function newBoard() {
        for (let c = 0; c < COLS; c++)
          for (let r = 0; r < ROWS; r++) { if (grid[c] && grid[c][r]) boardGroup.remove(grid[c][r].mesh); }
        grid = Array.from({ length: COLS }, () => Array(ROWS).fill(null));
        score = save.score || 0;
        updateHUD();
        for (let i = 0; i < LEVELS[Math.min(level, LEVELS.length - 1)].preset; i++) {
          const c = Math.floor(Math.random() * COLS);
          const r = colHeight(c);
          if (r < 3) placeCube(c, r, [2, 4, 8, 16][Math.floor(Math.random() * 4)], true);
        }
        spawnCurrent();
        lastActionTime = performance.now();
      }

      function colHeight(c) { let h = 0; while (h < ROWS && grid[c][h]) h++; return h; }

      function placeCube(c, r, value, instant) {
        const cube = makeCube(value);
        const p = cellPos(c, r);
        cube.position.set(p.x, p.y, 0.1);
        boardGroup.add(cube);
        grid[c][r] = { value, mesh: cube };
        if (!instant) { cube.scale.set(.4, .4, .4);
          tween(cube.scale, { x: 1, y: 1, z: 1 }, 0.22); }
        return grid[c][r];
      }

      function spawnCurrent() {
        let maxOnBoard = 4;
        for (let c = 0; c < COLS; c++)
          for (let r = 0; r < ROWS; r++)
            if (grid[c][r]) maxOnBoard = Math.max(maxOnBoard, grid[c][r].value);
        const pool = [];
        for (let v = 2; v <= Math.min(32, Math.max(4, maxOnBoard / 2)); v *= 2) pool.push(v, v, v === 2 ? v : 0);
        const vals = pool.filter(Boolean);
        currentCube = makeCube(vals[Math.floor(Math.random() * vals.length)]);
        currentCube.position.set(cellPos(aimCol, 0).x, launchY, 0.1);
        currentCube.scale.set(.3, .3);
        boardGroup.add(currentCube);
        tween(currentCube.scale, { x: 1, y: 1, z: 1 }, 0.2);
      }

      function setAim(c, instant = false) {
        aimCol = Math.max(0, Math.min(COLS - 1, c));
        if (currentCube && !busy) {
          const tx = cellPos(aimCol, 0).x;
          if (instant) currentCube.position.x = tx;
          else tween(currentCube.position, { x: tx }, 0.09);
        }
      }

      function launch() {
        if (busy || !currentCube) return;
        const c = aimCol;
        const h = colHeight(c);
        if (h >= ROWS) { gameOver(); return; }
        busy = true;
        lastActionTime = performance.now();
        playSound('drop');
        const eff = save.equippedEffect;
        if (eff !== 'eff_none' && eff !== 'eff_explode' && eff !== 'eff_confetti') {
          const wp = new THREE.Vector3();
          currentCube.getWorldPosition(wp);
          spawnBurst(wp.x, wp.y - 0.3, wp.z, eff.replace('eff_', ''), 8);
        }
        const targetR = h;
        const p = cellPos(c, targetR);
        const cube = currentCube;
        currentCube = null;
        tween(cube.position, { y: p.y }, Math.max(0.13, Math.abs(cube.position.y - p.y) * 0.045), null, () => {
          boardGroup.remove(cube);
          const cell = placeCube(c, targetR, cube.userData.value, true);
          cell.mesh.scale.set(1.15, 0.85, 1.15);
          tween(cell.mesh.scale, { x: 1, y: 1, z: 1 }, 0.18);
          resolveMerges([{ c, r: targetR }]).then(() => {
            if (checkWin()) return;
            if (isBoardFull()) { gameOver(); return; }
            busy = false;
            spawnCurrent();
            setAim(aimCol);
          });
        });
      }

      function isBoardFull() { for (let c = 0; c < COLS; c++)
          for (let r = 0; r < ROWS; r++) if (!grid[c][r]) return false; return true; }

      function boardFillRatio() {
        let filled = 0;
        for (let c = 0; c < COLS; c++)
          for (let r = 0; r < ROWS; r++)
            if (grid[c] && grid[c][r]) filled++;
        return filled / (COLS * ROWS);
      }

      async function resolveMerges(queue) {
        while (queue.length) {
          const { c, r } = queue.shift();
          const cell = grid[c][r];
          if (!cell) continue;
          const same = [{ c: c - 1, r }, { c: c + 1, r }, { c, r: r - 1 }, { c, r: r + 1 }].filter(n => n.c >= 0 && n.c <
            COLS && n.r >= 0 && n.r < ROWS && grid[n.c][n.r] && grid[n.c][n.r].value === cell.value);
          if (!same.length) continue;
          const newVal = cell.value * Math.pow(2, same.length);
          score += newVal;
          save.score = score;
          coins += 1;
          save.coins = coins;
          updateHUD();
          await new Promise(res => {
            let left = same.length;
            const tp = cellPos(c, r);
            same.forEach(n => {
              const m = grid[n.c][n.r].mesh;
              grid[n.c][n.r] = null;
              tween(m.position, { x: tp.x, y: tp.y }, 0.14, null, () => {
                boardGroup.remove(m);
                if (--left === 0) res();
              });
              tween(m.scale, { x: .5, y: .5, z: .5 }, 0.14);
            });
          });
          playSound('merge');
          // Το Aziram ενθουσιάζεται στα μεγάλα merges
          if (newVal >= 64 && aziramWinTime <= 0) {
            aziramReactionTime = 1.2;
            showSpeech("WOW! " + newVal + "! 🤩", 1800);
          }
          const eff = save.equippedEffect;
          if (eff === 'eff_explode' || eff === 'eff_confetti') {
            const wp = new THREE.Vector3();
            cell.mesh.getWorldPosition(wp);
            spawnBurst(wp.x, wp.y, wp.z, eff.replace('eff_', ''), 15);
          }
          boardGroup.remove(cell.mesh);
          grid[c][r] = null;
          const up = placeCube(c, r, newVal);
          up.mesh.scale.set(1.35, 1.35, 1.35);
          tween(up.mesh.scale, { x: 1, y: 1, z: 1 }, 0.22);
          const moved = [];
          for (let xc = 0; xc < COLS; xc++) {
            let write = 0;
            for (let xr = 0; xr < ROWS; xr++) {
              if (grid[xc][xr]) {
                if (xr !== write) {
                  grid[xc][write] = grid[xc][xr];
                  grid[xc][xr] = null;
                  tween(grid[xc][write].mesh.position, { y: cellPos(xc, write).y }, 0.15);
                  moved.push({ c: xc, r: write });
                }
                write++;
              }
            }
          }
          queue.push({ c, r }, ...moved);
          await new Promise(r => setTimeout(r, 120));
        }
        persist();
      }

      let winTimer = null;

      function checkWin() {
        const t = LEVELS[Math.min(level, LEVELS.length - 1)].target;
        let win = false;
        for (let c = 0; c < COLS; c++)
          for (let r = 0; r < ROWS; r++)
            if (grid[c][r] && grid[c][r].value >= t) { win = true; break; }
        if (!win) return false;

        busy = true;
        coins += 25;
        save.coins = coins;
        best = Math.max(best, score);
        save.best = best;
        save.level = Math.min(level + 1, LEVELS.length - 1);
        persist();
        updateHUD();
        document.getElementById("winText").innerHTML = `Έφτιαξες ${t}!<br>+25 🪙`;
        aziramWinTime = 3.0;
        showSpeech("Τα καταφέραμε! 🎉", 2800);
        speak("Μπράβο! Τα καταφέραμε!");
        if (winTimer) clearTimeout(winTimer);
        winTimer = setTimeout(() => { document.getElementById("winModal").classList.remove("hidden");
          winTimer = null; }, 3000);
        return true;
      }

      function gameOver() {
        busy = true;
        best = Math.max(best, score);
        save.best = best;
        save.score = 0;
        persist();
        showSpeech("Ωχ όχι! 😭", 2500);
        speak("Ωχ όχι! Γέμισε το ταμπλό!");
        document.getElementById("loseText").innerHTML = `Σκορ: <b>${score}</b>`;
        document.getElementById("loseModal").classList.remove("hidden");
      }

      function onTap(e) {
        if (document.querySelector(".overlay:not(.hidden)")) return;
        lastActionTime = performance.now();
        const x = (e.touches ? e.touches[0].clientX : e.clientX) / innerWidth * 2 - 1;
        const y = -((e.touches ? e.touches[0].clientY : e.clientY) / innerHeight * 2 - 1);
        pointer.set(x, y);
        raycaster.setFromCamera(pointer, camera);

        if (aziramPet) {
          const hits = raycaster.intersectObject(aziramPet, true);
          if (hits.length > 0 && aziramWinTime <= 0) {
            aziramReactionTime = 1.0;
            const greetings = ["Γεια σου! 😊", "Χι χι! 😄", "Παίζουμε; 🎮", "Είμαι ο Aziram! 💚"];
            const pick = greetings[Math.floor(Math.random() * greetings.length)];
            showSpeech(pick, 1800);
            speak(pick.replace(/[^\u0370-\u03FF\u1F00-\u1FFFa-zA-Z; !?]/g, '').trim());
            if (audioCtx.state !== 'suspended') playSound('drop');
            return;
          }
        }

        const hit = new THREE.Vector3();
        raycaster.ray.intersectPlane(new THREE.Plane(new THREE.Vector3(0, 0, 1).applyQuaternion(boardGroup.quaternion), 0),
          hit);
        boardGroup.worldToLocal(hit);
        const c = Math.max(0, Math.min(COLS - 1, Math.round((hit.x + BOARD_W / 2 - CELL / 2) / (CELL + GAP))));
        const r = Math.round((BOARD_H / 2 - CELL / 2 - hit.y) / (CELL + GAP));
        if (hammerMode) {
          if (r >= 0 && r < ROWS && grid[c][r]) {
            hammerMode = false;
            const m = grid[c][r].mesh;
            grid[c][r] = null;
            tween(m.scale, { x: .01, y: .01, z: .01 }, 0.18, null, () => boardGroup.remove(m));
            busy = true;
            setTimeout(() => { resolveMerges([]).then(() => { busy = false;
                updateHUD();
                persist(); }); }, 180);
          } else { hammerMode = false;
            updateHUD(); }
          return;
        }
        setAim(c, true);
        launch();
      }

      document.getElementById("btnHammer").onclick = () => { if (busy) return;
        hammerMode = true;
        updateHUD();
        toast("🔨 Επίλεξε κύβο"); };
      document.getElementById("btnShuffle").onclick = () => { if (busy || !currentCube) return;
        boardGroup.remove(currentCube);
        currentCube = null;
        spawnCurrent();
        setAim(aimCol);
        updateHUD(); };
      document.getElementById("btnMagnet").onclick = () => {
        if (busy) return;
        let tilesByVal = {};
        for (let c = 0; c < COLS; c++)
          for (let r = 0; r < ROWS; r++)
            if (grid[c][r]) { let v = grid[c][r].value; if (!tilesByVal[v]) tilesByVal[v] = [];
              tilesByVal[v].push({ c, r, cell: grid[c][r] }); }
        let mg = Object.values(tilesByVal).filter(g => g.length > 1);
        if (!mg.length) return toast("Κανένα ζευγάρι!");
        busy = true;
        let animsP = 0;
        mg.forEach(group => {
          const trg = group[0];
          trg.newVal = trg.cell.value * Math.pow(2, group.length - 1);
          group.slice(1).forEach(t => {
            const m = t.cell.mesh;
            grid[t.c][t.r] = null;
            const tp = cellPos(trg.c, trg.r);
            animsP++;
            tween(m.position, { x: tp.x, y: tp.y, z: 1.0 }, 0.35, null, () => { boardGroup.remove(m); if (--
                animsP === 0) finMagnet(mg); });
            tween(m.scale, { x: 0.3, y: 0.3, z: 0.3 }, 0.35);
          });
        });
      };

      function finMagnet(mg) {
        playSound('merge');
        mg.forEach(g => {
          const trg = g[0];
          boardGroup.remove(trg.cell.mesh);
          grid[trg.c][trg.r] = null;
          score += trg.newVal;
          save.score = score;
          const up = placeCube(trg.c, trg.r, trg.newVal);
          up.mesh.scale.set(1.5, 1.5, 1.5);
          tween(up.mesh.scale, { x: 1, y: 1, z: 1 }, 0.25);
        });
        setTimeout(() => { resolveMerges([]).then(() => { busy = false;
            updateHUD();
            persist(); }); }, 250);
      }

      function getShopProperties(tab) {
        if (tab === 'cubes') return { owned: 'ownedCubes', equip: 'equippedCube' };
        if (tab === 'boards') return { owned: 'ownedBoards', equip: 'equippedBoard' };
        if (tab === 'effects') return { owned: 'ownedEffects', equip: 'equippedEffect' };
        if (tab === 'sounds') return { owned: 'ownedSounds', equip: 'equippedSound' };
        if (tab === 'pet_color') return { owned: 'ownedPetColor', equip: 'equippedPetColor' };
        if (tab === 'pet_head') return { owned: 'ownedPetHead', equip: 'equippedPetHead' };
        if (tab === 'pet_face') return { owned: 'ownedPetFace', equip: 'equippedPetFace' };
        if (tab === 'pet_body') return { owned: 'ownedPetBody', equip: 'equippedPetBody' };
        if (tab === 'pet_hands') return { owned: 'ownedPetHands', equip: 'equippedPetHands' };
        if (tab === 'pet_props') return { owned: 'ownedPetProps', equip: 'equippedPetProps' };
        if (tab === 'pet_feet') return { owned: 'ownedPetFeet', equip: 'equippedPetFeet' };
        return { owned: '', equip: '' };
      }

      function renderShop() {
        const petSubTabs = document.getElementById('petSubTabs');
        if (currentMainTab === 'pets') petSubTabs.classList.add('active');
        else petSubTabs.classList.remove('active');

        const activeTab = currentMainTab === 'pets' ? currentPetSubTab : currentMainTab;
        const container = document.getElementById('shopContainer');
        container.innerHTML = '';
        const arr = SHOP[activeTab] || [];
        const props = getShopProperties(activeTab);

        arr.forEach(item => {
          const isOwned = save[props.owned] && save[props.owned].includes(item.id);
          const isEquipped = save[props.equip] === item.id;
          const el = document.createElement('div');
          el.className = `shop-item ${isOwned?'owned':''} ${isEquipped?'equipped':''}`;
          el.innerHTML =
            `<div style="font-size:36px; margin-bottom:5px;">${item.icon}</div><h3>${item.name}</h3><div class="price">${isEquipped?'ΕΠΙΛΕΓΜΕΝΟ':isOwned?'ΕΠΙΛΟΓΗ':item.price===0?'Δωρεάν':item.price+' 🪙'}</div>`;
          el.onclick = () => {
            if (isOwned) { save[props.equip] = item.id;
              persist();
              renderShop();
              applyShopChanges(activeTab); } else if (coins >= item.price) { coins -= item.price;
              save.coins = coins;
              save[props.owned].push(item.id);
              save[props.equip] = item.id;
              persist();
              updateHUD();
              renderShop();
              applyShopChanges(activeTab);
              toast("Αγόρασες το " + item.name + "!"); } else { toast("Δεν έχεις αρκετά νομίσματα!"); }
          };
          container.appendChild(el);
        });
      }

      function applyShopChanges(tabChanged) {
        if (tabChanged === 'boards') updateBoardColorsLive();
        if (tabChanged === 'cubes') { for (let c = 0; c < COLS; c++)
            for (let r = 0; r < ROWS; r++)
              if (grid[c][r]) { const m = grid[c][r].mesh;
                m.material.map = numberTexture(grid[c][r].value);
                m.material.needsUpdate = true; } if (currentCube) { currentCube.material.map = numberTexture(currentCube
                .userData.value);
              currentCube.material.needsUpdate = true; }
          toast("Η εμφάνιση κύβου άλλαξε!"); }
        if (tabChanged.startsWith('pet_')) equipPetSlot(tabChanged, save[getShopProperties(tabChanged).equip]);
      }

      document.querySelectorAll('.shop-tab').forEach(btn => {
        btn.onclick = (e) => {
          document.querySelectorAll('.shop-tab').forEach(b => b.classList.remove('active'));

      document.querySelectorAll('.pet-subtab').forEach(btn => {
        btn.onclick = (e) => {
          document.querySelectorAll('.pet-subtab').forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');

      function updateHUD() {
        document.getElementById("hudLevel").textContent = level + 1;
        document.getElementById("hudScore").textContent = score;
        document.getElementById("hudCoins").textContent = coins;
        document.getElementById("missionText").textContent = LEVELS[Math.min(level, LEVELS.length - 1)].text;
        document.getElementById("btnHammer").classList.toggle("armed", hammerMode);
      }

      let toastTimer;

      function toast(msg) { const t = document.getElementById("toast");
        t.textContent = msg;
        t.style.opacity = 1;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.style.opacity = 0, 1800); }

      /* ----- MOOD SYSTEM ----- */
      let lastSmokeTime = 0;

      function computeMood(now) {
        const fill = boardFillRatio();
        if (fill >= 0.8) return 'anxious';
        if (fill >= 0.65) return 'angry';
        if (now - lastActionTime > 15000) return 'bored';
        return 'idle';
      }

      function onMoodChange(mood) {
        if (mood === 'angry') showSpeech("Γεμίζει το ταμπλό! 😠", 2200);
        if (mood === 'anxious') showSpeech("ΠΑΝΙΚΟΣ!! 😱", 2200);
        if (mood === 'bored') showSpeech("Βαριέμαι... 🥱", 2200);
      }

      let lastT = 0;

      function loop(t) {
        const dt = Math.min(0.05, (t - lastT) / 1000);
        lastT = t;
        if (!lastActionTime) lastActionTime = performance.now();
        stepAnims(dt);
        updateParticles(dt);
        updateStarfield(0.8);

        if (aziramPet) {
          const core = aziramPet.children[0];
          if (aziramBodyMesh.userData.isRainbow) aziramBodyMesh.material.color.setHSL((t * 0.0005) % 1, 1, 0.5);

          if (aziramWinTime > 0) {
            /* --- ΝΙΚΗ: χορός --- */
            aziramWinTime -= dt;
            core.position.y = Math.abs(Math.sin(t * 0.008)) * 1.2;
            aziramPet.rotation.x -= 0.15;
            aziramPet.rotation.y += 0.1;
            sockets.handL.position.y = 0.8 + Math.sin(t * 0.01) * 0.2;
            sockets.handR.position.y = 0.8 + Math.cos(t * 0.01) * 0.2;
            mouthMesh.scale.set(0.85, 0.85, 0.35); // Τεράστιο χαμόγελο
            if (Math.random() < 0.25) {
              let wp = new THREE.Vector3();
              core.getWorldPosition(wp);
              spawnBurst(wp.x + (Math.random() - 0.5) * 2, wp.y + 1, wp.z, 'confetti', 4);
            }
          } else if (aziramReactionTime > 0) {
            /* --- ΕΝΘΟΥΣΙΑΣΜΟΣ: χοροπηδητό --- */
            aziramReactionTime -= dt;
            aziramPet.rotation.x = 0.2;
            core.position.y = 0.2 * Math.sin(t * 0.2);
            core.position.x = 0.1 * Math.cos(t * 0.2);
            aziramPet.rotation.y = -0.3 + Math.sin(t * 0.15) * 0.1;
            core.scale.x = 1 + Math.sin(t * 0.2) * 0.1;
            core.scale.y = 1 + Math.cos(t * 0.2) * 0.1;
            sockets.handL.position.y = Math.sin(t * 0.25) * 0.5;
            sockets.handR.position.y = Math.cos(t * 0.25) * 0.5;
            mouthMesh.scale.set(0.7, 0.7, 0.35);
            browL.visible = false;
            browR.visible = false;
          } else {
            /* --- ΣΥΝΑΙΣΘΗΜΑΤΑ --- */
            const now = performance.now();
            aziramMood = computeMood(now);
            if (aziramMood !== prevMood) {
              onMoodChange(aziramMood);
              prevMood = aziramMood;
            }

            aziramPet.position.copy(aziramBasePosition);
            core.position.x = 0;
            aziramPet.rotation.x = 0.2;
            aziramPet.rotation.y += (-0.3 - aziramPet.rotation.y) * 0.1;
            core.scale.y = 1 + Math.sin(t * 0.004) * 0.04;
            core.scale.x = 1 + Math.cos(t * 0.004) * 0.04;
            core.position.y = Math.sin(t * 0.002) * 0.15;
            sockets.handL.position.y = Math.sin(t * 0.003) * 0.1;
            sockets.handR.position.y = Math.cos(t * 0.003) * 0.1;
            sockets.footL.position.y = -0.85 + Math.cos(t * 0.004) * 0.05;
            sockets.footR.position.y = -0.85 + Math.sin(t * 0.004) * 0.05;

            // Χρώμα σώματος: κοκκινίζει όταν νευριάζει
            if (!aziramBodyMesh.userData.isRainbow) {
              const target = (aziramMood === 'angry' || aziramMood === 'anxious') ? angryColor : aziramBaseColor;
              aziramBodyMesh.material.color.lerp(target, 0.06);
            }

            // Φρύδια: ορατά μόνο όταν νευριάζει / αγχώνεται
            const showBrows = aziramMood === 'angry';
            browL.visible = showBrows;
            browR.visible = showBrows;
            if (showBrows) {
              browL.rotation.z = -0.45;
              browR.rotation.z = 0.45;
            }

            // Μάτια & λοιπές εκφράσεις ανά διάθεση
            if (aziramMood === 'angry') {
              if (aziramEyes) aziramEyes.scale.set(1, 0.7, 1);
              if (!isTalking) mouthMesh.scale.set(0.8, 0.12, 0.35); // Σφιγμένο στόμα
              // Καπνός από το κεφάλι κάθε ~1.2s
              if (now - lastSmokeTime > 1200) {
                lastSmokeTime = now;
                const wp = new THREE.Vector3();
                sockets.head.getWorldPosition(wp);
                spawnBurst(wp.x, wp.y + 0.2, wp.z, 'smoke', 2);
              }
            } else if (aziramMood === 'anxious') {
              if (aziramEyes) aziramEyes.scale.set(1.3, 1.3, 1.3); // Γουρλωμένα μάτια
              if (!isTalking) mouthMesh.scale.set(0.5, 0.55, 0.35); // Στόμα "Ο"
              // Τρέμει από αγωνία
              aziramPet.position.x += (Math.random() - 0.5) * 0.05;
              aziramPet.position.y += (Math.random() - 0.5) * 0.05;
            } else if (aziramMood === 'bored') {
              if (aziramEyes) aziramEyes.scale.set(1, 0.35, 1); // Μισόκλειστα μάτια
              // Γέρνει στο πλάι, χασμουριέται περιοδικά
              aziramPet.rotation.z = Math.sin(t * 0.0008) * 0.12;
              const yawn = Math.max(0, Math.sin(t * 0.0012));
              if (!isTalking) mouthMesh.scale.set(0.55 + yawn * 0.2, 0.2 + yawn * 0.55, 0.35);
            } else {
              // idle: χαλαρό χαμόγελο
              if (aziramEyes) aziramEyes.scale.set(1, 1, 1);
              aziramPet.rotation.z += (0 - aziramPet.rotation.z) * 0.1;
              if (!isTalking) mouthMesh.scale.set(1, 0.35, 0.35);
            }
          }

          // Το στόμα ανοιγοκλείνει όταν μιλάει (σε κάθε mood)
          if (isTalking && mouthMesh) {
            mouthMesh.scale.y = 0.25 + Math.abs(Math.sin(t * 0.025)) * 0.55;
            mouthMesh.scale.x = 0.7 + Math.abs(Math.cos(t * 0.02)) * 0.2;
          }

          core.traverse(child => { if (child.userData && child.userData.onUpdate) child.userData.onUpdate(t); });
        }

        if (currentCube && !busy) currentCube.rotation.y = Math.sin(t * 0.002) * 0.12;
        if (renderer) renderer.render(scene, camera);
        requestAnimationFrame(loop);
      }

      (async function() {
        localStorage.removeItem("drop2048-save-pure");
        localStorage.removeItem("drop2048-save-v2");
        localStorage.removeItem("drop2048-save-v3");
        localStorage.removeItem("drop2048-save-v4");
        localStorage.removeItem("drop2048-v5");
        localStorage.removeItem("drop2048-frankly-v1");
        localStorage.removeItem("drop2048-frankly-v2");

        document.getElementById('btnShop').onclick = () => { renderShop();
          document.getElementById('shopModal').classList.remove('hidden'); };
        document.getElementById('btnCloseShop').onclick = () => { document.getElementById('shopModal').classList.add(
          'hidden'); };
        document.addEventListener('pointerdown', () => { if (audioCtx.state === 'suspended') audioCtx.resume(); }, { once: true });

        await loadSave();
        coins = save.coins;
        level = save.level;
        best = save.best;
        initThree();
        if (!renderer) return;
        newBoard();
        updateHUD();
        initMic();

        equipPetSlot('pet_color', save.equippedPetColor);
        equipPetSlot('pet_head', save.equippedPetHead);
        equipPetSlot('pet_face', save.equippedPetFace);
        equipPetSlot('pet_body', save.equippedPetBody);
        equipPetSlot('pet_hands', save.equippedPetHands);
        equipPetSlot('pet_props', save.equippedPetProps);
        equipPetSlot('pet_feet', save.equippedPetFeet);

        const cvs = document.getElementById("game");
        cvs.addEventListener("pointermove", (e) => { if (!busy) setAim((e.touches ? e.touches[0].clientX : e.clientX) /
            innerWidth * 2 - 1) });
        cvs.addEventListener("pointerdown", onTap);
        document.getElementById("btnNext").onclick = () => { document.getElementById("winModal").classList.add("hidden");
          level = Math.min(level + 1, LEVELS.length - 1);
          busy = false;
          newBoard(); };
        document.getElementById("btnRetry").onclick = () => { document.getElementById("loseModal").classList.add("hidden");
          busy = false;
          newBoard(); };
      })();
    })();
  </script>
