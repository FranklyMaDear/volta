<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Drop 2048 · Starfield Deluxe</title>
<style>
  :root{
    --bg:#0B0C10; --panel:#8C6A4F; --panel-deep:#4A3423;
    --cream:#F7EFDC;
    --ink:#2F1B0D; --accent:#F2A03D; --good:#7FA653; --coin:#F5C542;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{
    background:var(--bg);
    font-family:"Baloo 2","Comic Sans MS",system-ui,sans-serif;
    color:var(--ink); user-select:none; touch-action:none;
  }
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap');
  
  #game{position:fixed;inset:0;display:block; z-index:0;}
  
  .hud{position:fixed;left:0;right:0;top:0;padding:10px 12px;display:flex;gap:8px;align-items:center;pointer-events:none;z-index:5}
  .chip{
    background:var(--panel-deep);color:var(--cream);border-radius:14px;padding:6px 12px;
    font-weight:800;font-size:15px;box-shadow:0 3px 0 rgba(0,0,0,.3);display:flex;align-items:center;gap:6px;
  }
  .chip small{font-weight:600;opacity:.75;font-size:11px;display:block;line-height:1}
  .chip .big{font-size:17px;line-height:1.1}
  .spacer{flex:1}
  #missionBar{
    position:fixed;top:65px;left:50%;transform:translateX(-50%);z-index:5;pointer-events:none;
    background:var(--cream);border:3px solid var(--panel-deep);color:var(--ink);
    border-radius:16px;padding:7px 16px;font-weight:700;font-size:14px;box-shadow:0 4px 0 rgba(0,0,0,.3);
    white-space:nowrap;
  }
  #missionBar b{color:#C2542F}
  
  .powerbar{position:fixed;bottom:14px;left:0;right:0;display:flex;justify-content:center;gap:10px;z-index:5}
  .pbtn{
    pointer-events:auto;border:none;cursor:pointer;width:66px;height:66px;border-radius:18px;
    background:var(--good);box-shadow:0 4px 0 #5c7a3a;color:#fff;font-size:26px;line-height:1;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    font-family:inherit;transition:transform .08s;
  }
  .pbtn:active{transform:translateY(3px);box-shadow:0 1px 0 #5c7a3a}
  .pbtn .cost{font-size:11px;font-weight:800;background:rgba(0,0,0,.22);border-radius:8px;padding:1px 7px}
  .pbtn.armed{outline:4px solid var(--accent);background:#C2542F;box-shadow:0 4px 0 #8f3c20}
  
  .shop-tabs { display:flex; gap:5px; margin-bottom:10px; border-bottom:2px solid rgba(0,0,0,0.1); padding-bottom:10px;}
  .shop-tab { flex:1; padding:8px 5px; font-weight:800; font-size:13px; border-radius:10px; background:#E4D7BC; color:#8C6A4F; border:none; cursor:pointer;}
  .shop-tab.active { background:var(--accent); color:#fff; box-shadow:0 3px 0 #b8742a; transform:translateY(-2px);}
  
  .shop-items { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-height: 40vh; overflow-y: auto; padding-bottom: 10px; padding-right:5px;}
  .shop-item { 
    background: #E4D7BC; border: 3px solid #8C6A4F; border-radius: 14px; padding: 10px; 
    cursor: pointer; transition: transform 0.1s; text-align:center;
  }
  .shop-item:active { transform: scale(0.95); }
  .shop-item h3 { font-size: 14px; margin-bottom: 5px; color: var(--ink); line-height:1.2;}
  .shop-item .price { font-weight: 800; color: #b8742a; font-size:13px;}
  .shop-item.owned .price { color: var(--good); }
  .shop-item.equipped { border-color: var(--accent); background: #FFF5E1; box-shadow:0 0 10px rgba(242,160,61,0.5);}

  .overlay{position:fixed;inset:0;background:rgba(11,12,16,.85);display:flex;align-items:center;justify-content:center;z-index:20;backdrop-filter:blur(4px)}
  .card{
    background:var(--cream);border:4px solid var(--panel-deep);border-radius:26px;padding:22px 20px;
    width:min(380px,92vw);text-align:center;box-shadow:0 10px 0 rgba(0,0,0,.4);
    animation:pop .25s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes pop{from{transform:scale(.7);opacity:0}}
  .card h2{font-size:22px; margin-bottom:6px;font-weight:800}
  .btn{
    border:none;cursor:pointer;font-family:inherit;font-weight:800;font-size:16px;color:#fff;
    background:var(--accent);border-radius:16px;padding:12px 30px;box-shadow:0 4px 0 #b8742a;transition:transform .08s; margin-top:10px; width:100%;
  }
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 #b8742a}
  .hidden{display:none!important}
  
  #toast{
    position:fixed;bottom:96px;left:50%;transform:translateX(-50%);z-index:15;pointer-events:none;
    background:var(--panel-deep);color:var(--cream);font-weight:700;font-size:14px;border-radius:14px;
    padding:8px 16px;opacity:0;transition:opacity .25s;white-space:nowrap;
  }
  #webgl-error { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:99; background:#0B0C10; color:#fff; font-family:inherit; padding:20px; text-align:center; font-size:18px; font-weight:bold;}

  #winModal .card { padding:0; overflow:hidden; background:rgba(0,0,0,0.5); border:none; box-shadow:none; width:min(420px,92vw); }
  .win-ribbon { background:#E63946; color:#fff; font-size:28px; font-weight:800; padding:10px 40px; position:relative; margin-top:20px; display:inline-block; border-radius:8px; box-shadow:0 4px 0 #9e2a2b; transform:rotate(-2deg); z-index:2; }
  .win-ribbon::before, .win-ribbon::after { content:''; position:absolute; top:0; width:20px; height:100%; background:inherit; z-index:-1; }
  .win-ribbon::before { left:-15px; transform:skewX(-20deg); border-radius:8px 0 0 8px; }
  .win-ribbon::after { right:-15px; transform:skewX(20deg); border-radius:0 8px 8px 0; }
  .win-subtitle { font-size:22px; font-weight:800; color:#FFD700; text-shadow:2px 2px 0 #b8742a; margin-top:5px; }
  .win-subtitle small { font-size:16px; color:#fff; text-shadow:1px 1px 0 #000; }
  .win-glow-box { margin:10px auto; width:130px; height:130px; background:#3F51B5; border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:48px; font-weight:800; color:#fff; box-shadow:0 0 40px rgba(255,215,0,0.8), inset 0 0 20px rgba(255,255,255,0.5); animation:pulseGlow 1s infinite alternate; }
  @keyframes pulseGlow { 0% { box-shadow:0 0 20px rgba(255,215,0,0.6); } 100% { box-shadow:0 0 60px rgba(255,215,0,1); } }
  #winPetContainer { margin:10px auto; width:120px; height:120px; border-radius:50%; background:#fff; display:flex; align-items:center; justify-content:center; box-shadow:inset 0 0 20px rgba(0,0,0,0.2); }
  #winPetCanvas { width:100%; height:100%; }
  .win-btn { background:#4CAF50; box-shadow:0 4px 0 #2E7D32; margin-bottom:20px; width:auto; padding:12px 30px; }
</style>

let currentShopTab = 'cubes';

/* ---------------- DEFAULT SAVE (Pet Arrays) ---------------- */
const DEFAULT_SAVE = { 
  coins: 50, level: 0, best: 0, score: 0, 
  ownedCubes: ['wood'], equippedCube: 'wood',
  ownedBoards: ['board_wood'], equippedBoard: 'board_wood',
  ownedEffects: ['eff_none'], equippedEffect: 'eff_none',
  ownedSounds: ['snd_default'], equippedSound: 'snd_default',
  ownedPets: ['base_planet'], equippedPets: ['base_planet']
};

let save = { ...DEFAULT_SAVE };

async function loadSave(){
  try{
    const r = localStorage.getItem("drop2048-save-v11");
    if(r) {
      const parsed = JSON.parse(r);
      save = Object.assign({}, DEFAULT_SAVE, parsed);
    }
  }catch(e){ }
}
function persist(){
  try{ localStorage.setItem("drop2048-save-v11", JSON.stringify(save)); }catch(e){ }
}

/* ---------------- Audio (Joyful Win Sound!) ---------------- */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
  if(audioCtx.state === 'suspended') audioCtx.resume();
  if(type === 'win') playWinSound(audioCtx);
  else {
    const soundId = save.equippedSound || 'snd_default';
    if(type === 'drop') playSoundDrop(soundId, audioCtx);
    else if(type === 'merge') playSoundMerge(soundId, audioCtx);
  }
}

function playDropDefault(ctx) {
  const osc = ctx.createOscillator(); const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.1);
  gain.gain.setValueAtTime(0.2, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
  osc.start(); osc.stop(ctx.currentTime + 0.1);
}

function playMergeDefault(ctx) {
  const osc = ctx.createOscillator(); const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = 'sine'; osc.frequency.setValueAtTime(300, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.1);
  gain.gain.setValueAtTime(0.3, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
  osc.start(); osc.stop(ctx.currentTime + 0.1);
}

// Happy Win Sound (Bells & Claps)
function playWinSound(ctx) {
  // Ding Ding (Bells)
  for(let i=0; i<4; i++) {
    setTimeout(() => {
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine'; 
      osc.frequency.setValueAtTime(600 + (i*250), ctx.currentTime);
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
      osc.start(); osc.stop(ctx.currentTime + 0.2);
    }, i * 100);
  }
  // Claps & Cheer
  for(let i=0; i<3; i++) {
    setTimeout(() => {
      const bufferSize = ctx.sampleRate * 0.08;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for(let j=0; j<bufferSize; j++) data[j] = (Math.random()*2-1) * Math.exp(-j/bufferSize);
      const noise = ctx.createBufferSource(); noise.buffer = buffer;
      const gain = ctx.createGain(); gain.gain.setValueAtTime(0.2, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
      noise.connect(gain); gain.connect(ctx.destination);
      noise.start();
    }, i * 200);
  }
}

function playSoundDrop(id, ctx) {
  const osc = ctx.createOscillator(); const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  switch(id) {
    case 'snd_bass': osc.type = 'square'; osc.frequency.setValueAtTime(150, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.15, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15); break;
    case 'snd_drum': osc.type = 'square'; osc.frequency.setValueAtTime(100, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(50, ctx.currentTime + 0.05);
      gain.gain.setValueAtTime(0.2, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.05); break;
    case 'snd_bell': osc.type = 'sine'; osc.frequency.setValueAtTime(1200, ctx.currentTime);
      gain.gain.setValueAtTime(0.2, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3); break;
    case 'snd_swish': osc.type = 'sine'; osc.frequency.setValueAtTime(2000, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.05, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1); break;
    case 'snd_cymbal': osc.type = 'square'; osc.frequency.setValueAtTime(3000, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(1500, ctx.currentTime + 0.02);
      gain.gain.setValueAtTime(0.1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.02); break;
    case 'snd_dolby': osc.type = 'sine'; osc.frequency.setValueAtTime(500, ctx.currentTime); 
      gain.gain.setValueAtTime(0.25, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
      const osc2 = ctx.createOscillator(); const gain2 = ctx.createGain();
      osc2.connect(gain2); gain2.connect(ctx.destination);
      osc2.type = 'sine'; osc2.frequency.setValueAtTime(300, ctx.currentTime);

      osc2.start(); osc2.stop(ctx.currentTime + 0.2); break;
    case 'snd_choir': osc.type = 'sine'; osc.frequency.setValueAtTime(400, ctx.currentTime);
      gain.gain.setValueAtTime(0.1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3); break;
    case 'snd_echo': osc.type = 'sine'; osc.frequency.setValueAtTime(600, ctx.currentTime); 
      gain.gain.setValueAtTime(0.25, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
      const oscE = ctx.createOscillator(); const gainE = ctx.createGain();

      gainE.gain.setValueAtTime(0.15, ctx.currentTime + 0.1); gainE.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
      oscE.start(ctx.currentTime + 0.1); oscE.stop(ctx.currentTime + 0.4); break;
    default: playDropDefault(ctx); return;
  }
  osc.start(); osc.stop(ctx.currentTime + 0.4);

      gain.gain.setValueAtTime(0.1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4); break;
    case 'snd_echo': osc.type = 'sine'; osc.frequency.setValueAtTime(400, ctx.currentTime); osc.frequency.linearRampToValueAtTime(1000, ctx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.2, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);

/* ---------------- Particles Engine (10 Effects) ---------------- */
const particles = [];
const pGeo = new THREE.BoxGeometry(0.08, 0.08, 0.08);
const pMats = {
  'flame': new THREE.MeshBasicMaterial({color: 0xff4500}),
  'sparkle': new THREE.MeshBasicMaterial({color: 0xffffff}),
  'smoke': new THREE.MeshBasicMaterial({color: 0x888888, transparent:true, opacity:0.7}),
  'explode': new THREE.MeshBasicMaterial({color: 0xffa500}),
  'confetti': [0xff0000, 0x00ff00, 0x0000ff, 0xffff00].map(c => new THREE.MeshBasicMaterial({color: c})),
  'plasma': new THREE.MeshBasicMaterial({color: 0x8a2be2}),
  'lightning': new THREE.MeshBasicMaterial({color: 0x00ffff}),
  'ice': new THREE.MeshBasicMaterial({color: 0xadd8e6}),
  'magic': new THREE.MeshBasicMaterial({color: 0xff69b4})
};
function spawnParticle(x, y, z, type) {
  let mat = pMats[type]; if(Array.isArray(mat)) mat = mat[Math.floor(Math.random()*mat.length)];
  const p = new THREE.Mesh(pGeo, mat); p.position.set(x, y, z);
  let vx = (Math.random()-0.5)*6, vy = (Math.random()-0.5)*6, vz = (Math.random()-0.5)*6;
  if(type === 'flame' || type === 'sparkle' || type === 'smoke') { vx *= 0.2; vy = -Math.random()*2 - 0.5; vz = 0; } 
  if(type === 'smoke') { p.scale.set(1.5,1.5,1.5); vy = Math.random()*1; }
  if(type === 'lightning') { vx = (Math.random()-0.5)*8; vy = (Math.random()-0.5)*8; }
  if(type === 'confetti') { p.scale.set(0.15,0.15,0.15); }
  scene.add(p); particles.push({ mesh: p, life: 1.0, vx, vy, vz, type });
}
function spawnBurst(x, y, z, type, count) { for(let i=0; i<count; i++) spawnParticle(x, y, z, type); }
function updateParticles(dt) {
  for(let i=particles.length-1; i>=0; i--) {
    const p = particles[i]; p.life -= dt * (p.type === 'smoke' ? 1.5 : 2.5); 
    if(p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
    else {
      p.mesh.position.x += p.vx * dt; p.mesh.position.y += p.vy * dt; p.mesh.position.z += p.vz * dt;
      p.mesh.scale.setScalar(p.life * (p.type === 'smoke' ? 1.5 : 1));
      if(p.type === 'flame' || p.type === 'explode') p.mesh.material.color.setHSL(0.1*p.life, 1, 0.5);
      if(p.type === 'smoke') p.mesh.material.opacity = p.life * 0.7;
    }
  }
}

/* ---------------- STARFIELD (6000+ Stars) ---------------- */
let starField;
function initStarfield() {
  const starCount = 6000;
  const starGeo = new THREE.BufferGeometry();
  const starPos = new Float32Array(starCount * 3);
  const starColors = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount * 3; i += 3) {
    starPos[i] = (Math.random() - 0.5) * 500;     starPos[i+1] = (Math.random() - 0.5) * 500;     starPos[i+2] = (Math.random() - 0.5) * 300;   
    const col = Math.random();
    if(col < 0.6) { starColors[i] = 1; starColors[i+1] = 1; starColors[i+2] = 1; }
    else if(col < 0.8) { starColors[i] = 1; starColors[i+1] = 0.8; starColors[i+2] = 0.6; }
    else { starColors[i] = 0.6; starColors[i+1] = 0.8; starColors[i+2] = 1; }
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
  starGeo.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
  const starMat = new THREE.PointsMaterial({ size: 0.25, vertexColors: true, blending: THREE.AdditiveBlending, depthWrite: false });
  starField = new THREE.Points(starGeo, starMat); starField.position.z = -50; scene.add(starField);
}
function updateStarfield(speed) {
  if (!starField) return;
  const positions = starField.geometry.attributes.position.array;
  for (let i = 2; i < positions.length; i += 3) {
    positions[i] += speed; 
    if (positions[i] > 40) { positions[i] = -120; positions[i-2] = (Math.random() - 0.5) * 500; positions[i-1] = (Math.random() - 0.5) * 500; }
  }
  starField.geometry.attributes.position.needsUpdate = true;
}

/* ---------------- PET ENGINE (31 Items, Proper Alignment) ---------------- */
function createPetTexture(isVictory = false, victoryTime = 0) {
  const cv = document.createElement("canvas"); cv.width = cv.height = 256;
  const g = cv.getContext("2d");
  const cx = 128, cy = 128, rad = 90;
  
  const parts = save.equippedPets || ['base_planet'];

  // 1. Base
  let baseColor = "#FFD700"; let baseColor2 = "#FF8C00";
  if(parts.includes('base_lava')) { baseColor = "#FF4500"; baseColor2 = "#8B0000"; }
  else if(parts.includes('base_ice')) { baseColor = "#00FFFF"; baseColor2 = "#0000FF"; }
  else if(parts.includes('base_space')) { baseColor = "#4B0082"; baseColor2 = "#00008B"; }
  else if(parts.includes('base_forest')) { baseColor = "#32CD32"; baseColor2 = "#006400"; }
  
  const grad = g.createRadialGradient(cx-20, cy-20, 20, cx, cy, rad);
  grad.addColorStop(0, baseColor); grad.addColorStop(0.7, baseColor2); grad.addColorStop(1, "#000000");
  g.fillStyle = grad; g.beginPath(); g.arc(cx, cy, rad, 0, Math.PI*2); g.fill();

  // Victory Animation Effect
  let yOff = 0, mouthHappy = false;
  if(isVictory) {
    yOff = Math.sin(victoryTime * 8) * 5; // Bounce
    mouthHappy = Math.sin(victoryTime * 10) > 0.2; // Laughing
  }

  // 2. Hats (Top)
  if(parts.includes('hat_top')) { g.fillStyle = "#000"; g.fillRect(cx-40, cy-110+yOff, 80, 10); g.fillRect(cx-25, cy-140+yOff, 50, 35); g.fillStyle = "#FF0000"; g.fillRect(cx-5, cy-105+yOff, 10, 5); }
  else if(parts.includes('hat_bow')) { g.fillStyle = "#FF1493"; g.beginPath(); g.arc(cx-40, cy-110+yOff, 20, 0, Math.PI*2); g.fill(); g.beginPath(); g.arc(cx+40, cy-110+yOff, 20, 0, Math.PI*2); g.fill(); g.fillStyle = "#FF69B4"; g.beginPath(); g.arc(cx, cy-105+yOff, 15, 0, Math.PI*2); g.fill(); }
  else if(parts.includes('hat_fro')) { g.fillStyle = "#A0522D"; g.beginPath(); g.arc(cx, cy-100+yOff, 65, 0, Math.PI*2); g.fill(); }
  else if(parts.includes('hat_helmet')) { g.fillStyle = "#FFA500"; g.beginPath(); g.arc(cx, cy-10+yOff, 85, Math.PI, 2*Math.PI); g.fill(); g.fillStyle = "#FFF"; g.fillRect(cx-10, cy-95+yOff, 20, 5); }
  else if(parts.includes('hat_crown')) { g.fillStyle = "#FFD700"; g.beginPath(); g.moveTo(cx-50, cy-90+yOff); g.lineTo(cx-30, cy-140+yOff); g.lineTo(cx, cy-110+yOff); g.lineTo(cx+30, cy-140+yOff); g.lineTo(cx+50, cy-90+yOff); g.closePath(); g.fill(); g.fillStyle = "#FF0000"; g.beginPath(); g.arc(cx, cy-110+yOff, 10, 0, Math.PI*2); g.fill(); }

  // 3. Eyes (Top Half)
  if(parts.includes('eyes_normal') || parts.includes('eyes_heart') || parts.includes('eyes_angry') || parts.includes('eyes_happy')) {
    let eyeY = -40 + yOff;
    if(parts.includes('eyes_happy')) { eyeY = -35 + yOff; }
    if(parts.includes('eyes_normal')) {
      g.fillStyle = "#FFF"; g.beginPath(); g.arc(cx-35, cy+eyeY, 25, 0, Math.PI*2); g.fill(); g.beginPath(); g.arc(cx+35, cy+eyeY, 25, 0, Math.PI*2); g.fill();
      g.fillStyle = "#000"; g.beginPath(); g.arc(cx-35, cy+eyeY+5, 10, 0, Math.PI*2); g.fill(); g.beginPath(); g.arc(cx+35, cy+eyeY+5, 10, 0, Math.PI*2); g.fill();
      g.fillStyle = "#FFF"; g.beginPath(); g.arc(cx-45, cy+eyeY-5, 4, 0, Math.PI*2); g.fill(); g.beginPath(); g.arc(cx+25, cy+eyeY-5, 4, 0, Math.PI*2); g.fill();
    } else if(parts.includes('eyes_heart')) {

      g.fillStyle = "#FF0000"; g.beginPath(); g.arc(cx-35, cy+eyeY+5, 12, 0, Math.PI*2); g.fill(); g.beginPath(); g.arc(cx+35, cy+eyeY+5, 12, 0, Math.PI*2); g.fill();

let winPetAnimId = null;
function animateWinPet() {
  const canvas = document.getElementById('winPetCanvas');
  const ctx = canvas.getContext('2d');
  let startTime = Date.now();
  if(winPetAnimId) cancelAnimationFrame(winPetAnimId);
  
  function draw() {
    const elapsed = (Date.now() - startTime) / 1000;
    ctx.clearRect(0, 0, 120, 120);
    const tex = createPetTexture(true, elapsed);
    ctx.drawImage(tex.image, 0, 0, 120, 120);
    winPetAnimId = requestAnimationFrame(draw);

  draw();

/* ---------------- Custom Cube Texture Generator ---------------- */
function numberTexture(value){ const cv = document.createElement("canvas"); cv.width = cv.height = 128; const g = cv.getContext("2d"); const skin = save.equippedCube;
  if(skin === 'wood') { g.fillStyle = value >= 128 ? "#8B5A2B" : "#DEB887"; roundRect(g,4,4,120,120,22); g.fill(); g.strokeStyle="rgba(0,0,0,0.2)"; g.lineWidth=3; for(let i=0;i<25;i++){ g.beginPath(); const x1 = 4 + Math.random()*120; const y1 = 4 + Math.random()*120; const x2 = x1 + (Math.random()-0.5)*40; const y2 = y1 + (Math.random()-0.5)*40; g.moveTo(x1,y1); g.quadraticCurveTo((x1+x2)/2 + (Math.random()-0.5)*20, (y1+y2)/2 + (Math.random()-0.5)*20, x2, y2); g.stroke(); } } 
  else if (skin === 'whitered' || skin === 'whitegreen') { g.fillStyle = "white"; roundRect(g,4,4,120,120,22); g.fill(); g.fillStyle = skin === 'whitered' ? "#D32F2F" : "#388E3C"; g.save(); g.clip(); for(let i=-128; i<256; i+=32) { g.beginPath(); g.moveTo(i, 0); g.lineTo(i+20, 0); g.lineTo(i-108, 128); g.lineTo(i-128, 128); g.fill(); } g.restore(); }
  else if (skin === 'zebra') { g.fillStyle = "white"; roundRect(g,4,4,120,120,22); g.fill(); g.fillStyle = "#111"; g.save(); g.clip(); for(let i=0; i<128; i+=24) { g.beginPath(); g.moveTo(0, i); g.bezierCurveTo(40, i+15, 80, i-15, 128, i); g.lineTo(128, i+10); g.bezierCurveTo(80, i-5, 40, i+25, 0, i+10); g.fill(); } g.restore(); }
  else if (skin === 'rainbow') { let grad = g.createLinearGradient(0,0,128,128); ['red','orange','yellow','green','cyan','blue','purple'].forEach((c,i)=>grad.addColorStop(i/6, c)); g.fillStyle = grad; roundRect(g,4,4,120,120,22); g.fill(); }
  else if (skin === 'gold') { let grad = g.createRadialGradient(64,64,0, 64,64,90); grad.addColorStop(0,"#FFF59D"); grad.addColorStop(0.6,"#FBC02D"); grad.addColorStop(1,"#F57F17"); g.fillStyle = grad; roundRect(g,4,4,120,120,22); g.fill(); }
  else if (skin === 'neon') { g.fillStyle = "#111"; roundRect(g,4,4,120,120,22); g.fill(); g.strokeStyle = `hsl(${(Math.log2(value)*30)%360}, 100%, 50%)`; g.lineWidth=6; g.stroke(); }
  else if (skin === 'galaxy') { g.fillStyle = "#1A0B2E"; roundRect(g,4,4,120,120,22); g.fill(); g.fillStyle = "white"; for(let i=0; i=30; i++) { g.beginPath(); g.arc(Math.random()*128, Math.random()*128, Math.random()*2, 0, 7); g.fill(); } }
  else if (skin === 'ice') { let grad = g.createLinearGradient(0,0,128,128); grad.addColorStop(0, "#E0F7FA"); grad.addColorStop(1, "#00BCD4"); g.fillStyle = grad; roundRect(g,4,4,120,120,22); g.fill(); }
  else if (skin === 'lava') { let grad = g.createLinearGradient(0,0,128,128); grad.addColorStop(0, "#FF5722"); grad.addColorStop(1, "#FFC107"); g.fillStyle = grad; roundRect(g,4,4,120,120,22); g.fill(); }
  if (['whitered', 'whitegreen', 'zebra', 'rainbow', 'ice', 'lava', 'galaxy', 'neon'].includes(skin)) { g.beginPath(); g.arc(64, 64, 40, 0, Math.PI * 2); g.fillStyle = "rgba(255, 255, 255, 0.85)"; g.fill(); g.strokeStyle = "#333"; g.lineWidth = 3; g.stroke(); }
  let txtCol = "#000"; if(skin === 'wood') { txtCol = value >= 128 ? "#FFF" : "#000"; } if(skin === 'gold') txtCol = "#3E2723";
  g.font = `800 ${value>=1024?42:value>=128?50:60}px 'Baloo 2', sans-serif`; g.textAlign="center"; g.textBaseline="middle"; g.shadowColor = "rgba(0,0,0,0.8)"; g.shadowBlur = 10; g.fillStyle = txtCol; g.fillText(value, 64, 68);
  const t = new THREE.CanvasTexture(cv); t.anisotropy = 4; return t;
}
function roundRect(g,x,y,w,h,r){ g.beginPath(); g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r); g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); }
function makeCube(value){ const tex = numberTexture(value); const m = new THREE.Mesh(new THREE.BoxGeometry(CELL*0.92, CELL*0.92, CELL*0.92), new THREE.MeshLambertMaterial({map: tex, color:0xdddddd})); m.userData.value = value; return m; }

/* ---------------- tweens ---------------- */
function tween(obj, to, dur, ease, done){ const from = {}; for(const k in to) from[k] = obj[k]; anims.push({obj, from, to, dur, t:0, ease: ease||(t=>1-Math.pow(1-t,3)), done}); }
function stepAnims(dt){ for(let i=anims.length-1;i>=0;i--){ const a = anims[i]; a.t += dt/a.dur; const k = a.t>=1 ? 1 : a.ease(a.t); for(const p in a.to) a.obj[p] = a.from[p] + (a.to[p]-a.from[p])*k; if(a.t>=1){ anims.splice(i,1); a.done && a.done(); } } }

/* ---------------- gameplay ---------------- */
function newBoard(){ for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++){ if(grid[c] && grid[c][r]) boardGroup.remove(grid[c][r].mesh); } grid = Array.from({length:COLS},()=>Array(ROWS).fill(null)); score = save.score || 0; updateHUD(); matCache = {}; for(let i=0;i<LEVELS[Math.min(level, LEVELS.length-1)].preset;i++){ const c = Math.floor(Math.random()*COLS); const r = colHeight(c); if(r < 3) placeCube(c, r, [2,4,8,16][Math.floor(Math.random()*4)], true); } spawnCurrent(); }
function colHeight(c){ let h=0; while(h<ROWS && grid[c][h]) h++; return h; }
function placeCube(c, r, value, instant){ const cube = makeCube(value); const p = cellPos(c,r); cube.position.set(p.x, p.y, 0.1); boardGroup.add(cube); grid[c][r] = {value, mesh:cube}; if(!instant){ cube.scale.set(.4,.4,.4); tween(cube.scale, {x:1,y:1,z:1}, 0.22); } return grid[c][r]; }
function spawnCurrent(){ let maxOnBoard = 4; for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++) if(grid[c][r]) maxOnBoard = Math.max(maxOnBoard, grid[c][r].value); const pool = []; for(let v=2; v<=Math.min(32, Math.max(4, maxOnBoard/2)); v*=2) pool.push(v, v, v===2?v:0); const vals = pool.filter(Boolean); currentCube = makeCube(vals[Math.floor(Math.random()*vals.length)]); currentCube.position.set(cellPos(aimCol, 0).x, launchY, 0.1); currentCube.scale.set(.3,.3,.3); boardGroup.add(currentCube); tween(currentCube.scale, {x:1,y:1,z:1}, 0.2); }
function setAim(c, instant = false){ aimCol = Math.max(0, Math.min(COLS-1, c)); if(currentCube && !busy){ const tx = cellPos(aimCol,0).x; if (instant) currentCube.position.x = tx; else tween(currentCube.position, {x: tx}, 0.09); } }
function launch(){ if(busy || !currentCube) return; const c = aimCol; const h = colHeight(c); if(h >= ROWS){ gameOver(); return; } busy = true; isLaunching = true; playSound('drop'); const eff = save.equippedEffect; if(eff === 'eff_flame') { const wp = new THREE.Vector3(); currentCube.getWorldPosition(wp); spawnBurst(wp.x, wp.y - 0.3, wp.z, 'flame', 8); } else if (eff === 'eff_sparkle') { const wp = new THREE.Vector3(); currentCube.getWorldPosition(wp); spawnBurst(wp.x, wp.y - 0.3, wp.z, 'sparkle', 12); } else if (eff === 'eff_smoke') { const wp = new THREE.Vector3(); currentCube.getWorldPosition(wp); spawnBurst(wp.x, wp.y - 0.3, wp.z, 'smoke', 10); }
  const targetR = h; const p = cellPos(c, targetR); const cube = currentCube; currentCube = null; tween(cube.position, {y:p.y}, Math.max(0.13, Math.abs(cube.position.y - p.y)*0.045), null, ()=>{ isLaunching = false; boardGroup.remove(cube); const cell = placeCube(c, targetR, cube.userData.value, true); cell.mesh.scale.set(1.15,0.85,1.15); tween(cell.mesh.scale, {x:1,y:1,z:1}, 0.18); resolveMerges([{c, r:targetR}]).then(()=>{ if(checkWin()) return; if(isBoardFull()){ gameOver(); return; } busy = false; spawnCurrent(); setAim(aimCol); }); }); }
function isBoardFull() { for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++) if(!grid[c][r]) return false; return true; }
async function resolveMerges(queue){ while(queue.length){ const {c,r} = queue.shift(); const cell = grid[c][r]; if(!cell) continue; const same = [{c:c-1,r},{c:c+1,r},{c,r:r-1},{c,r:r+1}].filter(n => n.c>=0&&n.c<COLS&&n.r>=0&&n.r<ROWS&&grid[n.c][n.r]&&grid[n.c][n.r].value===cell.value); if(!same.length) continue; const newVal = cell.value * Math.pow(2, same.length); score += newVal; save.score = score; coins += 1; save.coins = coins; updateHUD(); await new Promise(res=>{ let left = same.length; const tp = cellPos(c,r); same.forEach(n=>{ const m = grid[n.c][n.r].mesh; grid[n.c][n.r] = null; tween(m.position, {x:tp.x, y:tp.y}, 0.14, null, ()=>{ boardGroup.remove(m); if(--left===0) res(); }); tween(m.scale, {x:.5,y:.5,z:.5}, 0.14); }); }); playSound('merge'); const eff = save.equippedEffect; if(eff !== 'eff_none' && eff !== 'eff_flame' && eff !== 'eff_sparkle' && eff !== 'eff_smoke') { const wp = new THREE.Vector3(); cell.mesh.getWorldPosition(wp); spawnBurst(wp.x, wp.y, wp.z, eff.replace('eff_',''), 15); } boardGroup.remove(cell.mesh); grid[c][r] = null; const up = placeCube(c, r, newVal); up.mesh.scale.set(1.35,1.35,1.35); tween(up.mesh.scale, {x:1,y:1,z:1}, 0.22); const moved = []; for(let xc=0;xc<COLS;xc++){ let write=0; for(let xr=0;xr<ROWS;xr++){ if(grid[xc][xr]){ if(xr!==write){ grid[xc][write]=grid[xc][xr]; grid[xc][xr]=null; tween(grid[xc][write].mesh.position, {y:cellPos(xc, write).y}, 0.15); moved.push({c:xc, r:write}); } write++; } } } queue.push({c,r}, ...moved); await new Promise(r=>setTimeout(r,120)); } persist(); }

/* ---------------- levels / win / lose ---------------- */
let winTimer = null;
function checkWin(){ const t = LEVELS[Math.min(level, LEVELS.length-1)].target; let win = false; for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++) if(grid[c][r] && grid[c][r].value >= t){ win = true; break; } if(!win) return false; busy = true; coins += 25; save.coins = coins; best = Math.max(best, score); save.best = best; save.level = Math.min(level+1, LEVELS.length-1); persist(); updateHUD(); document.getElementById("winNumberBox").textContent = t; for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++) { if(grid[c][r]) { const mesh = grid[c][r].mesh; const origY = mesh.position.y; let delay = (c + r) * 50; setTimeout(() => { tween(mesh.position, {y: origY + 0.3}, 0.15, null, () => { tween(mesh.position, {y: origY - 0.15}, 0.15, null, () => { tween(mesh.position, {y: origY}, 0.15); }); }); }, delay); } } if(winTimer) clearTimeout(winTimer); winTimer = setTimeout(() => { playSound('win'); document.getElementById("winModal").classList.remove("hidden"); animateWinPet(); for(let i=0; i<5; i++) { setTimeout(() => { spawnBurst((Math.random()-0.5)*10, Math.random()*5, (Math.random()-0.5)*5, 'confetti', 30); }, i * 300); } winTimer = null; }, 3000); return true; }
function gameOver(){ busy = true; best = Math.max(best, score); save.best = best; save.score = 0; persist(); document.getElementById("loseText").innerHTML = `Σκορ: <b>${score}</b>`; document.getElementById("loseModal").classList.remove("hidden"); }

/* ---------------- input & powerups (ΔΩΡΕΑΝ) ---------------- */
function onTap(e){ if(document.querySelector(".overlay:not(.hidden)")) return; const x = (e.touches ? e.touches[0].clientX : e.clientX) / innerWidth * 2 - 1; const y = -((e.touches ? e.touches[0].clientY : e.clientY) / innerHeight * 2 - 1); pointer.set(x,y); raycaster.setFromCamera(pointer, camera); const hit = new THREE.Vector3(); raycaster.ray.intersectPlane(new THREE.Plane(new THREE.Vector3(0,0,1).applyQuaternion(boardGroup.quaternion), 0), hit); boardGroup.worldToLocal(hit); if(petMesh) { const petPos = new THREE.Vector3(); petMesh.getWorldPosition(petPos); const dist = hit.distanceTo(petPos); if(dist < 1.0) { document.getElementById('petBest').textContent = save.best; document.getElementById('petScore').textContent = score; document.getElementById('petLevel').textContent = level+1; document.getElementById('petCoins').textContent = coins; document.getElementById('petModal').classList.remove('hidden'); return; } } const c = Math.max(0,Math.min(COLS-1, Math.round((hit.x + BOARD_W/2 - CELL/2) / (CELL+GAP)))); const r = Math.round((BOARD_H/2 - CELL/2 - hit.y) / (CELL+GAP)); if(hammerMode){ if(r>=0 && r<ROWS && grid[c][r]){ hammerMode=false; const m = grid[c][r].mesh; grid[c][r]=null; tween(m.scale, {x:.01,y:.01,z:.01}, 0.18, null, ()=> boardGroup.remove(m)); busy=true; setTimeout(()=>{ resolveMerges([]).then(()=>{ busy=false; updateHUD(); persist(); }); }, 180); } else { hammerMode=false; updateHUD(); } return; } setAim(c, true); launch(); }
document.getElementById("btnHammer").onclick = ()=>{ if(busy)return; hammerMode=true; updateHUD(); toast("🔨 Επίλεξε κύβο"); }
document.getElementById("btnShuffle").onclick = ()=>{ if(busy||!currentCube)return; boardGroup.remove(currentCube); currentCube=null; spawnCurrent(); setAim(aimCol); updateHUD(); }
document.getElementById("btnMagnet").onclick = ()=>{ if(busy)return; let tilesByVal = {}; for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++) if(grid[c][r]) { let v=grid[c][r].value; if(!tilesByVal[v])tilesByVal[v]=[]; tilesByVal[v].push({c,r,cell:grid[c][r]}); } let mg = Object.values(tilesByVal).filter(g=>g.length>1); if(!mg.length)return toast("Κανένα ζευγάρι!"); busy=true; let animsP=0; mg.forEach(group=>{ const trg = group[0]; trg.newVal = trg.cell.value * Math.pow(2, group.length-1); group.slice(1).forEach(t=>{ const m = t.cell.mesh; grid[t.c][t.r]=null; const tp=cellPos(trg.c,trg.r); animsP++; tween(m.position, {x:tp.x, y:tp.y, z:1.0}, 0.35, null, ()=>{ boardGroup.remove(m); if(--animsP===0) finMagnet(mg); }); tween(m.scale, {x:0.3,y:0.3,z:0.3}, 0.35); }); }); }
function finMagnet(mg){ playSound('merge'); mg.forEach(g=>{ const trg=g[0]; boardGroup.remove(trg.cell.mesh); grid[trg.c][trg.r]=null; score+=trg.newVal; save.score=score; const up=placeCube(trg.c,trg.r,trg.newVal); up.mesh.scale.set(1.5,1.5,1.5); tween(up.mesh.scale,{x:1,y:1,z:1},0.25); }); setTimeout(()=>{ resolveMerges([]).then(()=>{ busy=false; updateHUD(); persist(); }); }, 250); }

/* ---------------- Shop System (Pet Multi-Part) ---------------- */
function renderShop() { const container = document.getElementById('shopContainer'); container.innerHTML = ''; const arr = SHOP[currentShopTab] || []; arr.forEach(item => { let propOwned = currentShopTab === 'cubes' ? 'ownedCubes' : currentShopTab === 'boards' ? 'ownedBoards' : currentShopTab === 'effects' ? 'ownedEffects' : currentShopTab === 'sounds' ? 'ownedSounds' : 'ownedPets'; let propEquip = currentShopTab === 'cubes' ? 'equippedCube' : currentShopTab === 'boards' ? 'equippedBoard' : currentShopTab === 'effects' ? 'equippedEffect' : currentShopTab === 'sounds' ? 'equippedSound' : 'equippedPets'; const isOwned = save[propOwned] && save[propOwned].includes(item.id); const isEquipped = save[propEquip] && save[propEquip].includes(item.id); const el = document.createElement('div'); el.className = `shop-item ${isOwned?'owned':''} ${isEquipped?'equipped':''}`; el.innerHTML = `<div style="font-size:36px; margin-bottom:5px;">${item.icon}</div><h3>${item.name}</h3><div class="price">${isEquipped?'ΦΟΡΕΜΕΝΟ':isOwned?'ΕΠΙΛΟΓΗ':'Δωρεάν'}</div>`; el.onclick = () => { if (currentShopTab === 'pets') { if (isEquipped) { save[propEquip] = save[propEquip].filter(id => id !== item.id); persist(); renderShop(); applyShopChanges(); toast("Αφαίρεσες το " + item.name); } else { if (!isOwned) { save[propOwned].push(item.id); } save[propEquip].push(item.id); persist(); renderShop(); applyShopChanges(); toast("Φόρεσες το " + item.name + "!"); } } else { if (isOwned) { save[propEquip] = item.id; persist(); renderShop(); applyShopChanges(); } else { save[propOwned].push(item.id); save[propEquip] = item.id; persist(); updateHUD(); renderShop(); applyShopChanges(); toast("Αγόρασες το " + item.name + "!"); } } }; container.appendChild(el); }); }
function applyShopChanges() { if(currentShopTab === 'boards') updateBoardColorsLive(); if(currentShopTab === 'cubes') { matCache = {}; toast("Η εμφάνιση κύβου άλλαξε!"); } if(currentShopTab === 'sounds') toast("Ο ήχος άλλαξε!"); if(currentShopTab === 'pets') { updatePetVisual(); toast("Το Pet σου ενημερώθηκε!"); } }
document.querySelectorAll('.shop-tab').forEach(btn => { btn.onclick = (e) => { document.querySelectorAll('.shop-tab').forEach(b => b.classList.remove('active')); e.target.classList.add('active'); currentShopTab = e.target.dataset.tab; renderShop(); } });

/* ---------------- UI ---------------- */
function updateHUD(){ document.getElementById("hudLevel").textContent = level+1; document.getElementById("hudScore").textContent = score; document.getElementById("hudCoins").textContent = coins; document.getElementById("missionText").textContent = LEVELS[Math.min(level, LEVELS.length-1)].text; document.getElementById("btnHammer").classList.toggle("armed", hammerMode); }
let toastTimer; function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.style.opacity=1; clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.style.opacity=0, 1800); }

/* ---------------- main loop ---------------- */
let lastT = 0;
function loop(t){ const dt = Math.min(0.05, (t-lastT)/1000); lastT = t; stepAnims(dt); updateParticles(dt); updateStarfield(2.0); bgElements.forEach(el => { const u = el.userData; el.position.z += u.dirZ * u.speed * dt * 3; if(el.position.z < -30) { el.position.z = 5 + Math.random()*10; el.position.x = (Math.random()-0.5)*60; el.position.y = (Math.random()-0.5)*60; u.dirZ = -Math.random()*3 - 1.5; u.speed = Math.random()*2 + 1; } }); if(currentCube && !busy) currentCube.rotation.y = Math.sin(t*0.002)*0.12; if(renderer) renderer.render(scene, camera); requestAnimationFrame(loop); }

/* ---------------- boot ---------------- */
(async function(){ document.getElementById('btnShop').onclick = () => { renderShop(); document.getElementById('shopModal').classList.remove('hidden'); }; document.getElementById('btnCloseShop').onclick = () => { document.getElementById('shopModal').classList.add('hidden'); }; document.getElementById('btnClosePet').onclick = () => { document.getElementById('petModal').classList.add('hidden'); }; document.addEventListener('pointerdown', ()=> { if(audioCtx.state === 'suspended') audioCtx.resume(); }, {once:true}); await loadSave(); coins = save.coins; level = save.level; best = save.best; initThree(); if(!renderer) return; newBoard(); updateHUD(); const cvs = document.getElementById("game"); cvs.addEventListener("pointermove", (e)=>{if(!busy)setAim((e.touches?e.touches[0].clientX:e.clientX)/innerWidth*2-1)}); cvs.addEventListener("pointerdown", onTap); document.getElementById("btnNext").onclick = ()=>{ document.getElementById("winModal").classList.add("hidden"); if(winPetAnimId) cancelAnimationFrame(winPetAnimId); level=Math.min(level+1,LEVELS.length-1); busy=false; newBoard(); }; document.getElementById("btnRetry").onclick = ()=>{ document.getElementById("loseModal").classList.add("hidden"); busy=false; newBoard(); }; })();
</script>
</body>
</html>
