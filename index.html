<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Gold Fest 2 – Full Screen Board</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #02021a;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    .game-container {
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 20%, #1a1a5e 0%, #0a0a3e 40%, #050528 100%);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
    }

    /* === DECORATIONS === */
    .spaceship {
      position: absolute;
      top: 3%;
      left: 4%;
      font-size: 8vw;
      filter: drop-shadow(0 6px 8px rgba(0, 0, 0, 0.3));
      transform: rotate(-20deg);
      z-index: 10;
      animation: float 3s ease-in-out infinite;
    }

    .meteor {
      position: absolute;
      top: 45%;
      left: 2%;
      width: 15vw;
      height: 15vw;
      background: radial-gradient(circle at 40% 40%, #ffcc80, #ff9100, #e65100);
      border-radius: 50%;
      box-shadow: -12px 12px 24px rgba(33, 150, 243, 0.5);
      z-index: 10;
      animation: float 4s ease-in-out infinite reverse;
    }

    .meteor::before {
      content: '';
      position: absolute;
      top: -20%;
      left: -30%;
      width: 80%;
      height: 60%;
      background: linear-gradient(135deg, transparent, #29b6f6, #81d4fa);
      filter: blur(10px);
      transform: skewX(-35deg);
      opacity: 0.9;
    }

    .cloud {
      position: absolute;
      top: 15%;
      right: 4%;
      font-size: 10vw;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.2));
      z-index: 10;
      animation: float 3.5s ease-in-out infinite 0.5s;
    }

    .sparkle {
      position: absolute;
      color: #e1bee7;
      font-size: 3vw;
      animation: twinkle 1.5s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(var(--r, 0deg)); }
      50% { transform: translateY(-12px) rotate(var(--r, 0deg)); }
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }

    /* === BOARD AREA === */
    .board-area {
      flex: 1;
      width: 100%;
      position: relative;
      overflow: hidden;
      z-index: 20;
    }

    .tiles-world {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transition: transform 0.3s cubic-bezier(0.22, 0.61, 0.36, 1);
      will-change: transform;
    }

    .tile {
      position: absolute;
      width: 18vw;
      height: 18vw;
      max-width: 70px;
      max-height: 70px;
      min-width: 50px;
      min-height: 50px;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 2.5vw;
      color: #fff;
      text-shadow: 0 2px 3px rgba(0, 0, 0, 0.3);
      box-shadow: 0 5px 0 rgba(0, 0, 0, 0.3), 0 8px 16px rgba(0, 0, 0, 0.4);
      background: linear-gradient(180deg, #1a1aff 0%, #0d0dbb 100%);
      z-index: 5;
    }

    .tile .icon {
      font-size: 6vw;
      line-height: 1;
      filter: drop-shadow(0 3px 3px rgba(0, 0, 0, 0.3));
    }

    .tile .label {
      font-size: 2vw;
      margin-top: 2px;
    }

    /* Tile types */
    .tile.lightning { background: linear-gradient(180deg, #ffd54f 0%, #f9a825 100%); }
    .tile.xp { background: linear-gradient(180deg, #81c784 0%, #2e7d32 100%); }
    .tile.ticket { background: linear-gradient(180deg, #ce93d8 0%, #6a1b9a 100%); }
    .tile.box { background: linear-gradient(180deg, #ffb74d 0%, #e65100 100%); }

    /* === PLAYER === */
    .player {
      position: absolute;
      width: 16vw;
      height: 20vw;
      max-width: 60px;
      max-height: 75px;
      z-index: 60;
      filter: drop-shadow(0 8px 6px rgba(0, 0, 0, 0.4));
      pointer-events: none;
      transition: left 0.3s ease, top 0.3s ease;
    }

    .pawn-body {
      width: 100%;
      height: 65%;
      background: radial-gradient(circle at 35% 30%, #42a5f5, #1565c0);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      margin: 0 auto;
      box-shadow: 0 4px 0 #0d47a1;
    }

    .pawn-base {
      width: 70%;
      height: 15%;
      background: rgba(21, 101, 192, 0.6);
      border-radius: 50%;
      margin: 4px auto 0;
      filter: blur(2px);
    }

    .player.hop {
      animation: hop 0.3s ease-in-out;
    }

    @keyframes hop {
      0% { transform: scale(1); }
      40% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    /* === DICE POPUP === */
    .dice-popup {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.9);
      border: 3px solid #ffd54f;
      border-radius: 30px;
      padding: 6vw 10vw;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      box-shadow: 0 0 40px rgba(255, 215, 0, 0.6);
    }

    .dice-popup.show {
      opacity: 1;
    }

    .dice-number {
      font-size: 20vw;
      font-weight: 900;
      color: #ffd54f;
      text-shadow: 0 0 20px #ffb300;
    }

    .dice-text {
      font-size: 5vw;
      color: white;
      font-weight: bold;
    }

    /* === REWARD POPUP === */
    .reward-popup {
      position: absolute;
      top: 35%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      font-weight: 900;
      font-size: 5vw;
      padding: 3vw 6vw;
      border-radius: 40px;
      z-index: 150;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      text-align: center;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
    }

    .reward-popup.show {
      opacity: 1;
    }

    /* === BOTTOM BAR === */
    .bottom-bar {
      width: 96%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2vw 2vw;
      gap: 2vw;
      z-index: 100;
      flex-wrap: wrap;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
      border-radius: 20px 20px 0 0;
    }

    .badge {
      background: linear-gradient(180deg, #1a1a1a 0%, #0d0d0d 100%);
      border-radius: 16px;
      padding: 2vw 3vw;
      display: flex;
      align-items: center;
      gap: 4px;
      color: #fff;
      font-weight: 800;
      font-size: 3.5vw;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      border: 1px solid #333;
      white-space: nowrap;
    }

    .energy-badge .bolt { color: #76ff03; font-size: 5vw; }
    .xp-badge .xp-icon { color: #81c784; font-size: 5vw; }
    .ticket-badge .tick-icon { color: #ce93d8; font-size: 5vw; }

    .roll-btn {
      background: linear-gradient(180deg, #ff4081 0%, #c51162 100%);
      border: none;
      border-radius: 30px;
      padding: 3vw 6vw;
      color: white;
      font-size: 6vw;
      font-weight: 900;
      display: flex;
      align-items: center;
      gap: 2vw;
      box-shadow: 0 6px 0 #880e4f, 0 10px 20px rgba(0, 0, 0, 0.4);
      cursor: pointer;
      transition: all 0.1s;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .roll-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #880e4f, 0 3px 8px rgba(0, 0, 0, 0.4);
    }

    .roll-btn .bolt { color: #76ff03; font-size: 6vw; }
  </style>
</head>
<body>
<div class="game-container">
  <!-- Decorations -->
  <div class="spaceship">🛸</div>
  <div class="meteor"></div>
  <div class="cloud">☁️</div>
  <div class="sparkle" style="top:12%; right:8%;">✨</div>
  <div class="sparkle" style="top:20%; right:15%; animation-delay:0.4s;">✨</div>
  <div class="sparkle" style="top:10%; right:22%; animation-delay:0.8s;">✨</div>

  <!-- Board Area -->
  <div class="board-area" id="boardArea">
    <div class="tiles-world" id="tilesWorld"></div>
    <div class="player" id="player">
      <div class="pawn-body"></div>
      <div class="pawn-base"></div>
    </div>
    <div class="dice-popup" id="dicePopup">
      <span class="dice-number" id="diceNumber">1</span>
      <span class="dice-text">ΖΑΡΙ</span>
    </div>
    <div class="reward-popup" id="rewardPopup"></div>
  </div>

  <!-- Bottom Bar -->
  <div class="bottom-bar">
    <div class="badge energy-badge">
      <span class="bolt">⚡</span>
      <span id="energy">135</span><span style="color:#666;">/25</span>
    </div>
    <div class="badge xp-badge">
      <span class="xp-icon">🔵</span>
      <span id="xp">0</span>
    </div>
    <button class="roll-btn" id="rollBtn" onclick="roll()">
      ROLL <span class="bolt">⚡</span>5
    </button>
    <div class="badge ticket-badge">
      <span class="tick-icon">🎟️</span>
      <span id="tickets">0</span>
    </div>
  </div>
</div>

<script>
  (function() {
    const tilesWorld = document.getElementById('tilesWorld');
    const player = document.getElementById('player');
    const boardArea = document.getElementById('boardArea');
    const energyEl = document.getElementById('energy');
    const xpEl = document.getElementById('xp');
    const ticketsEl = document.getElementById('tickets');
    const rollBtn = document.getElementById('rollBtn');
    const dicePopup = document.getElementById('dicePopup');
    const diceNumberEl = document.getElementById('diceNumber');
    const rewardPopup = document.getElementById('rewardPopup');

    // Game state
    let energy = 135;
    let xp = 0;
    let tickets = 0;
    let isRolling = false;

    // Board dimensions
    const tileSize = Math.min(70, window.innerWidth * 0.18);
    const gap = 8;
    const stepSize = tileSize + gap;

    // Path generation: pattern 3 up, 3 right, 3 up, 3 left, repeat
    let path = []; // {x, y} in grid coordinates, y negative means up
    let currentPathIndex = 0; // which tile the player is on

    // Player fixed position (center horizontally, 30% from bottom of board area)
    function getPlayerFixedPosition() {
      const areaRect = boardArea.getBoundingClientRect();
      const centerX = areaRect.width / 2;
      const bottomY = areaRect.height * 0.75; // 75% from top (25% from bottom)
      return { x: centerX, y: bottomY };
    }

    // Generate next tiles in the path (infinite)
    function ensurePath(length) {
      while (path.length < length) {
        const last = path.length > 0 ? path[path.length - 1] : { x: 0, y: 0 };
        const segmentType = Math.floor((path.length - 1) / 3) % 4; // 0: up, 1: right, 2: up, 3: left
        let newX = last.x;
        let newY = last.y;
        switch (segmentType) {
          case 0: newY -= 1; break; // up
          case 1: newX += 1; break; // right
          case 2: newY -= 1; break; // up
          case 3: newX -= 1; break; // left
        }
        path.push({ x: newX, y: newY });
      }
    }

    // Reward types
    const rewardTypes = [
      { type: 'lightning', icon: '⚡', label: 'ΕΝΕΡΓΕΙΑ' },
      { type: 'xp', icon: '🔵', label: 'XP' },
      { type: 'ticket', icon: '🎟️', label: 'ΕΙΣΙΤΗΡΙΟ' },
      { type: 'box', icon: '📦', label: 'ΚΟΥΤΙ' }
    ];

    // Store reward for each tile (by path index)
    let tileRewards = {};

    function getRewardForIndex(index) {
      if (!tileRewards[index]) {
        const rand = Math.floor(Math.random() * rewardTypes.length);
        tileRewards[index] = { ...rewardTypes[rand] };
      }
      return tileRewards[index];
    }

    // Render tiles currently visible around the player
    function renderTiles() {
      tilesWorld.innerHTML = '';
      const visibleRadius = 10; // tiles ahead and behind
      const startIdx = Math.max(0, currentPathIndex - 3);
      const endIdx = Math.min(path.length - 1, currentPathIndex + visibleRadius);
      
      for (let i = startIdx; i <= endIdx; i++) {
        const pos = path[i];
        const reward = getRewardForIndex(i);
        const tile = document.createElement('div');
        tile.className = `tile ${reward.type}`;
        tile.innerHTML = `<span class="icon">${reward.icon}</span><span class="label">${reward.label}</span>`;
        
        // Position relative to player's current tile
        const playerPos = path[currentPathIndex];
        const relX = (pos.x - playerPos.x) * stepSize;
        const relY = (pos.y - playerPos.y) * stepSize;
        
        const playerFixed = getPlayerFixedPosition();
        tile.style.left = (playerFixed.x + relX - tileSize/2) + 'px';
        tile.style.top = (playerFixed.y + relY - tileSize/2) + 'px';
        
        tilesWorld.appendChild(tile);
      }
    }

    // Update world transform to show movement (we keep player fixed, tiles move)
    function updateWorldTransform() {
      // The world position is based on the player's current tile
      const playerPos = path[currentPathIndex];
      const playerFixed = getPlayerFixedPosition();
      // We want the player's tile to be at playerFixed position
      // So we shift the world by the difference
      const offsetX = playerFixed.x - (playerPos.x * stepSize + tileSize/2);
      const offsetY = playerFixed.y - (playerPos.y * stepSize + tileSize/2);
      tilesWorld.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
      
      // Position the player element exactly at fixed position
      player.style.left = playerFixed.x + 'px';
      player.style.top = playerFixed.y + 'px';
      player.style.transform = 'translate(-50%, -50%)';
    }

    function movePlayerForward(steps) {
      return new Promise(resolve => {
        let stepsLeft = steps;
        const stepInterval = 300;
        
        function doStep() {
          if (stepsLeft <= 0) {
            resolve();
            return;
          }
          currentPathIndex++;
          ensurePath(currentPathIndex + 10);
          updateWorldTransform();
          renderTiles();
          
          // Animate player hop
          player.classList.remove('hop');
          void player.offsetWidth;
          player.classList.add('hop');
          
          stepsLeft--;
          setTimeout(doStep, stepInterval);
        }
        doStep();
      });
    }

    function showDice(number) {
      diceNumberEl.textContent = number;
      dicePopup.classList.add('show');
      setTimeout(() => dicePopup.classList.remove('show'), 1000);
    }

    function showReward(text) {
      rewardPopup.textContent = text;
      rewardPopup.classList.add('show');
      setTimeout(() => rewardPopup.classList.remove('show'), 1500);
    }

    function applyReward(tileType) {
      switch (tileType) {
        case 'lightning':
          energy += 5;
          energyEl.textContent = energy;
          showReward('+5 ⚡ ΕΝΕΡΓΕΙΑ');
          break;
        case 'xp':
          xp += 10;
          xpEl.textContent = xp;
          showReward('+10 🔵 XP');
          break;
        case 'ticket':
          tickets += 1;
          ticketsEl.textContent = tickets;
          showReward('+1 🎟️ ΕΙΣΙΤΗΡΙΟ');
          break;
        case 'box':
          const random = Math.random();
          if (random < 0.4) {
            energy += 3;
            energyEl.textContent = energy;
            showReward('📦 +3 ⚡');
          } else if (random < 0.7) {
            xp += 5;
            xpEl.textContent = xp;
            showReward('📦 +5 🔵 XP');
          } else if (random < 0.9) {
            tickets += 1;
            ticketsEl.textContent = tickets;
            showReward('📦 +1 🎟️');
          } else {
            showReward('📦 FREE SPIN!');
          }
          break;
      }
    }

    async function roll() {
      if (isRolling) return;
      if (energy < 5) {
        shakeElement(rollBtn);
        showReward('ΑΝΕΠΑΡΚΗΣ ΕΝΕΡΓΕΙΑ ⚡');
        return;
      }

      isRolling = true;
      energy -= 5;
      energyEl.textContent = energy;

      // Determine dice result (1-3)
      const diceResult = Math.floor(Math.random() * 3) + 1;
      showDice(diceResult);
      
      // Wait a bit for dice animation
      await sleep(800);
      
      // Move player
      await movePlayerForward(diceResult);
      
      // Apply reward from the tile we landed on
      const reward = getRewardForIndex(currentPathIndex);
      applyReward(reward.type);
      
      isRolling = false;
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function shakeElement(el) {
      el.style.transform = 'translateX(5px)';
      setTimeout(() => el.style.transform = 'translateX(-5px)', 50);
      setTimeout(() => el.style.transform = 'translateX(5px)', 100);
      setTimeout(() => el.style.transform = '', 150);
    }

    // Initialize
    function init() {
      ensurePath(20);
      currentPathIndex = 0;
      updateWorldTransform();
      renderTiles();
    }

    window.addEventListener('resize', () => {
      updateWorldTransform();
      renderTiles();
    });

    window.roll = roll;
    init();
  })();
</script>
</body>
</html>
