<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aziram · Σπίτι</title>
    <style>
        :root {
            --bg: #0B0C10;
            --panel: #8C6A4F;
            --panel-deep: #4A3423;
            --cream: #F7EFDC;
            --ink: #2F1B0D;
            --accent: #F2A03D;
            --good: #7FA653;
            --red: #C2542F;
            --blue: #4A7DBF;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--cream);
            font-family: "Baloo 2", system-ui, sans-serif;
            color: var(--ink);
            user-select: none;
            touch-action: none;
        }
        .home-container {
            width: 100vw;
            height: 100vh;
            padding: 10px 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        h2 {
            font-size: 20px;
            margin: 0 0 4px 0;
            text-align: center;
            flex-shrink: 0;
            color: var(--ink);
        }
        .home-stats {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
            flex-shrink: 0;
            flex-wrap: wrap;
            justify-content: center;
        }
        .home-stat {
            background: #E4D7BC;
            border-radius: 12px;
            padding: 4px 8px;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            min-width: 60px;
            flex: 1;
        }
        .home-stat .bar {
            width: 100%;
            height: 6px;
            background: #c9b899;
            border-radius: 6px;
            overflow: hidden;
        }
        .home-stat .bar > div {
            height: 100%;
            background: var(--good);
            border-radius: 6px;
            transition: width .3s;
        }
        .home-stat .bar > div.low { background: var(--red); }
        .home-stat .bar > div.warn { background: var(--accent); }

        .avatar-area {
            flex-shrink: 0;
            text-align: center;
            margin: 2px 0 6px;
            position: relative;
            height: 110px;
        }
        #avatarContainer {
            display: inline-block;
            position: relative;
            width: 90px;
            height: 100px;
            background: transparent;
            transition: transform 0.3s;
        }
        /* Detailed Jelly Slime Avatar */
        .jelly-body {
            width: 70px;
            height: 80px;
            border-radius: 50% 50% 45% 45%;
            margin: 15px auto 0;
            position: relative;
            background: radial-gradient(circle at 30% 30%, #88ffbb, #33ffaa 60%, #119977);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2), inset 0 -10px 20px rgba(0,80,60,0.3);
            transition: background 0.3s, transform 0.3s;
            transform-origin: center bottom;
        }
        .jelly-eye {
            position: absolute;
            width: 16px;
            height: 22px;
            background: #fff;
            border-radius: 50%;
            top: 28px;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.1);
        }
        .jelly-eye::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 14px;
            background: #1a1a1a;
            border-radius: 50%;
            top: 2px;
            left: 3px;
            transition: transform 0.2s;
        }
        .jelly-eye.left { left: 16px; }
        .jelly-eye.right { right: 16px; }
        .jelly-mouth {
            position: absolute;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
            width: 18px;
            height: 10px;
            border-bottom: 4px solid #5a1a1a;
            border-radius: 0 0 20px 20px;
            transition: all 0.2s;
        }
        .jelly-arms {
            position: absolute;
            top: 30px;
            width: 100%;
            height: 20px;
        }
        .jelly-arm {
            position: absolute;
            width: 16px;
            height: 40px;
            background: radial-gradient(circle at 50% 30%, #66ffaa, #2aaf77);
            border-radius: 50%;
            transition: transform 0.2s;
        }
        .jelly-arm.left { left: -12px; transform-origin: top center; }
        .jelly-arm.right { right: -12px; transform-origin: top center; }
        .jelly-prop {
            position: absolute;
            right: -10px;
            bottom: 35px;
            font-size: 28px;
            line-height: 1;
            transition: transform 0.3s;
        }
        .jelly-clothes {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
            line-height: 1;
            pointer-events: none;
        }

        /* Avatar Animations */
        .av-idle .jelly-body { animation: idlePulse 2s infinite alternate; }
        @keyframes idlePulse { 0% { transform: scale(1,1) translateY(0); } 100% { transform: scale(1.02,0.98) translateY(-4px); } }
        
        .av-walk .jelly-body { animation: walkMove 0.6s infinite alternate; }
        @keyframes walkMove { 0% { transform: translateX(-10px) scale(1,1); } 100% { transform: translateX(10px) scale(1,1); } }
        .av-walk .jelly-arm.left { animation: armSwing 0.6s infinite alternate; transform-origin: top; }
        .av-walk .jelly-arm.right { animation: armSwing 0.6s infinite alternate-reverse; transform-origin: top; }
        @keyframes armSwing { 0% { transform: rotate(20deg); } 100% { transform: rotate(-20deg); } }

        .av-sleep .jelly-body { animation: sleepBreathe 2s infinite alternate; transform-origin: center; }
        @keyframes sleepBreathe { 0% { transform: rotate(5deg) scale(0.98,1.02); } 100% { transform: rotate(-5deg) scale(1.02,0.98); } }
        .av-sleep .jelly-eye::after { transform: translateY(4px); }
        .av-sleep .jelly-mouth { width: 14px; height: 8px; border-bottom-color: transparent; border-radius: 50%; background: #5a1a1a; opacity: 0.5; }

        .av-hop .jelly-body { animation: hopMove 0.4s infinite alternate; }
        @keyframes hopMove { 0% { transform: translateY(0px) scale(1,1); } 100% { transform: translateY(-25px) scale(1.1,0.9); } }
        .av-hop .jelly-arm.left { animation: hopArm 0.4s infinite alternate; }
        .av-hop .jelly-arm.right { animation: hopArm 0.4s infinite alternate-reverse; }
        @keyframes hopArm { 0% { transform: rotate(30deg); } 100% { transform: rotate(-30deg); } }

        .av-cheer .jelly-body { animation: cheerMove 0.3s infinite alternate; }
        @keyframes cheerMove { 0% { transform: translateY(0px) scale(1,1); } 100% { transform: translateY(-10px) scale(1.05,0.95); } }
        .av-cheer .jelly-arm.left { animation: cheerArm 0.2s infinite alternate; }
        .av-cheer .jelly-arm.right { animation: cheerArm 0.2s infinite alternate-reverse; }
        @keyframes cheerArm { 0% { transform: rotate(40deg) scale(1); } 100% { transform: rotate(-30deg) scale(1.1); } }

        /* Room Tabs */
        .room-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        .room-tab {
            flex: 1;
            padding: 6px 4px;
            font-weight: 800;
            font-size: 12px;
            border-radius: 10px;
            background: #E4D7BC;
            color: #8C6A4F;
            border: none;
            cursor: pointer;
            transition: .1s;
            white-space: nowrap;
        }
        .room-tab.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 3px 0 #b8742a;
            transform: translateY(-2px);
        }

        .room-view {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
            background: #f0e5d1;
            border-radius: 16px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 3px solid #8C6A4F;
            margin-bottom: 6px;
        }
        .room-panel {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            gap: 6px;
        }
        .room-panel.active { display: flex; }
        .room-panel .room-icon { font-size: 44px; }
        .room-panel .room-label {
            font-weight: 700;
            font-size: 14px;
            color: var(--ink);
        }
        .room-panel .furniture-display {
            font-size: 22px;
            font-weight: 600;
            color: var(--panel-deep);
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            min-height: 32px;
        }
        .room-panel .action-btn {
            border: none;
            font-family: inherit;
            font-weight: 800;
            font-size: 14px;
            color: #fff;
            background: var(--good);
            border-radius: 14px;
            padding: 8px 20px;
            box-shadow: 0 3px 0 #5c7a3a;
            cursor: pointer;
            transition: transform .08s;
            margin-top: 4px;
        }
        .room-panel .action-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #5c7a3a;
        }
        .room-panel .action-btn:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: 0 3px 0 #5c7a3a;
            cursor: not-allowed;
        }
        .room-panel .cooldown {
            font-size: 10px;
            color: var(--red);
            font-weight: 600;
        }
        .room-panel.furnished { border-color: var(--accent); }

        .home-footer {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .home-footer .btn {
            flex: 1;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-weight: 800;
            font-size: 15px;
            color: #fff;
            background: var(--accent);
            border-radius: 14px;
            padding: 8px 20px;
            box-shadow: 0 3px 0 #b8742a;
            transition: transform .08s;
            margin-top: 0;
        }
        .home-footer .btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #b8742a;
        }
        .home-footer .btn.secondary {
            background: var(--blue);
            box-shadow: 0 3px 0 #2d5a7a;
        }
        .home-footer .btn.secondary:active {
            box-shadow: 0 1px 0 #2d5a7a;
        }
        .hidden { display: none !important; }

        #toast {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            pointer-events: none;
            background: var(--panel-deep);
            color: var(--cream);
            font-weight: 700;
            font-size: 13px;
            border-radius: 14px;
            padding: 6px 16px;
            opacity: 0;
            transition: opacity .25s;
            white-space: nowrap;
            box-shadow: 0 4px 12px rgba(0, 0, 0, .4);
        }
        @media (max-width: 480px) {
            .home-container { padding: 6px 4px; }
            .home-stat { font-size: 10px; min-width: 40px; padding: 2px 4px; }
            .home-stat .bar { height: 4px; }
            .avatar-area { height: 90px; }
            #avatarContainer { width: 70px; height: 80px; }
            .jelly-body { width: 55px; height: 65px; margin: 10px auto 0; }
            .jelly-eye { width: 12px; height: 18px; top: 22px; }
            .jelly-eye::after { width: 8px; height: 11px; top: 1px; left: 2px; }
            .jelly-mouth { width: 14px; height: 8px; bottom: 18px; border-bottom-width: 3px; }
            .jelly-arm { width: 12px; height: 30px; }
            .jelly-arm.left { left: -8px; }
            .jelly-arm.right { right: -8px; }
            .room-tab { font-size: 10px; padding: 4px 2px; }
            .room-panel .room-icon { font-size: 36px; }
        }
    </style>
</head>
<body>
    <div class="home-container">
        <h2>🏠 Το Σπίτι του Aziram</h2>

        <div class="home-stats" id="homeStats">
            <div class="home-stat">⚡ Ενέργεια<div class="bar"><div id="energyBar" style="width:70%"></div></div><span id="energyText">70</span></div>
            <div class="home-stat">🍽️ Πείνα<div class="bar"><div id="hungerBar" style="width:30%"></div></div><span id="hungerText">30</span></div>
            <div class="home-stat">🧼 Καθαριότητα<div class="bar"><div id="cleanBar" style="width:80%"></div></div><span id="cleanText">80</span></div>
            <div class="home-stat">🚽 Τουαλέτα<div class="bar"><div id="toiletBar" style="width:10%"></div></div><span id="toiletText">10</span></div>
        </div>

        <div class="avatar-area">
            <div id="avatarContainer" class="av-idle">
                <div class="jelly-body" id="jellyBody">
                    <div class="jelly-eye left"></div>
                    <div class="jelly-eye right"></div>
                    <div class="jelly-mouth"></div>
                    <div class="jelly-arm left"></div>
                    <div class="jelly-arm right"></div>
                    <div class="jelly-prop" id="jellyProp"></div>
                    <div class="jelly-clothes" id="jellyClothes"></div>
                </div>
            </div>
        </div>

        <div class="room-tabs">
            <button class="room-tab active" data-room="bedroom">🛏️ Υπνοδωμάτιο</button>
            <button class="room-tab" data-room="kitchen">🍳 Κουζίνα</button>
            <button class="room-tab" data-room="bathroom">🛁 Μπάνιο</button>
        </div>

        <div class="room-view" id="roomViewContainer">
            <!-- Υπνοδωμάτιο -->
            <div class="room-panel active" id="roomBedroom">
                <div class="room-icon">🛏️</div>
                <div class="room-label">Υπνοδωμάτιο</div>
                <div class="furniture-display" id="bedroomFurniture"></div>
                <button class="action-btn" id="btnSleep">😴 Ύπνος</button>
                <div class="cooldown hidden" id="sleepCooldown"></div>
            </div>
            <!-- Κουζίνα -->
            <div class="room-panel" id="roomKitchen">
                <div class="room-icon">🍳</div>
                <div class="room-label">Κουζίνα</div>
                <div class="furniture-display" id="kitchenFurniture"></div>
                <button class="action-btn" id="btnFeed">🍽️ Τάισμα</button>
                <div class="cooldown hidden" id="feedCooldown"></div>
            </div>
            <!-- Μπάνιο -->
            <div class="room-panel" id="roomBathroom">
                <div class="room-icon">🛁</div>
                <div class="room-label">Μπάνιο</div>
                <div class="furniture-display" id="bathroomFurniture"></div>
                <button class="action-btn" id="btnWash">🧼 Πλύσιμο</button>
                <button class="action-btn" id="btnToilet">🚽 Τουαλέτα</button>
                <div class="cooldown hidden" id="washCooldown"></div>
                <div class="cooldown hidden" id="toiletCooldown"></div>
            </div>
        </div>

        <div class="home-footer">
            <button class="btn secondary" id="btnCloseHome">Κλείσιμο</button>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        (function() {
            'use strict';

            const SAVE_KEY = 'drop2048-frankly-v7';
            const DEFAULT_SAVE = {
                coins: 5000,
                level: 0,
                best: 0,
                score: 0,
                ownedCubes: ['wood'],
                equippedCube: 'wood',
                ownedBoards: ['board_wood'],
                equippedBoard: 'board_wood',
                ownedEffects: ['eff_none'],
                equippedEffect: 'eff_none',
                ownedSounds: ['snd_default'],
                equippedSound: 'snd_default',
                ownedPetColor: ['color_green'],
                equippedPetColor: 'color_green',
                ownedPetHead: ['head_none'],
                equippedPetHead: 'head_none',
                ownedPetFace: ['face_none'],
                equippedPetFace: 'face_none',
                ownedPetBody: ['body_none'],
                equippedPetBody: 'body_none',
                ownedPetHands: ['hands_none'],
                equippedPetHands: 'hands_none',
                ownedPetProps: ['prop_none'],
                equippedPetProps: 'prop_none',
                ownedPetFeet: ['feet_none'],
                equippedPetFeet: 'feet_none',
                ownedPetClothes: ['cl_none'],
                equippedPetClothes: 'cl_none',
                ownedPetFurniture: ['fur_none'],
                equippedBedroomFurniture: [],
                equippedKitchenFurniture: [],
                equippedBathroomFurniture: [],
                ownedPetFood: [],
                energy: 70,
                hunger: 30,
                cleanliness: 80,
                toilet: 0,
                lastUpdate: Date.now(),
                sleepCooldown: 0,
                feedCooldown: 0,
                washCooldown: 0,
                toiletCooldown: 0
            };

            let save = { ...DEFAULT_SAVE };
            let toastTimer = null;
            let petState = 'idle';

            function loadSave() {
                try {
                    const r = localStorage.getItem(SAVE_KEY);
                    if (r) {
                        const parsed = JSON.parse(r);
                        save = Object.assign({}, DEFAULT_SAVE, parsed);
                        if (typeof save.equippedBedroomFurniture === 'string') {
                            save.equippedBedroomFurniture = save.equippedBedroomFurniture !== 'fur_none' ? [save.equippedBedroomFurniture] : [];
                        }
                        if (typeof save.equippedKitchenFurniture === 'string') {
                            save.equippedKitchenFurniture = save.equippedKitchenFurniture !== 'fur_none' ? [save.equippedKitchenFurniture] : [];
                        }
                        if (typeof save.equippedBathroomFurniture === 'string') {
                            save.equippedBathroomFurniture = save.equippedBathroomFurniture !== 'fur_none' ? [save.equippedBathroomFurniture] : [];
                        }
                        if (!save.ownedPetClothes) save.ownedPetClothes = ['cl_none'];
                        if (!save.ownedPetFurniture) save.ownedPetFurniture = ['fur_none'];
                        if (!save.ownedPetFood) save.ownedPetFood = [];
                    }
                } catch (e) {}
            }

            function persist() {
                try { localStorage.setItem(SAVE_KEY, JSON.stringify(save)); } catch (e) {}
                if (window.parent) window.parent.postMessage('refreshPet', '*');
            }

            function toast(msg) {
                const t = document.getElementById('toast');
                t.textContent = msg;
                t.style.opacity = 1;
                clearTimeout(toastTimer);
                toastTimer = setTimeout(() => t.style.opacity = 0, 1800);
            }

            function updateTamagotchiStats() {
                const now = Date.now();
                const elapsed = (now - save.lastUpdate) / 1000;
                if (elapsed <= 0) return;

                const hour = new Date().getHours();
                if (hour >= 8 && hour < 22) {
                    save.energy = Math.max(0, (save.energy || 50) - elapsed * 0.25);
                } else {
                    save.energy = Math.min(100, (save.energy || 50) + elapsed * 0.45);
                }
                let hungerRate = 0.15;
                if (hour >= 7 && hour <= 8) hungerRate = 0.9;
                else if (hour >= 12 && hour <= 13) hungerRate = 0.9;
                else if (hour >= 19 && hour <= 20) hungerRate = 0.9;
                save.hunger = Math.min(100, (save.hunger || 50) + elapsed * hungerRate);
                save.cleanliness = Math.max(0, (save.cleanliness || 80) - elapsed * 0.12);
                if (hour >= 8 && hour < 22) {
                    save.toilet = Math.min(100, (save.toilet || 0) + elapsed * (100 / 10800));
                } else {
                    save.toilet = Math.max(0, (save.toilet || 0) - elapsed * 0.3);
                }
                save.lastUpdate = now;
                persist();
                renderHomeStats();
                renderHomeAvatar();
            }

            function renderHomeStats() {
                const e = Math.round(save.energy || 50);
                const h = Math.round(save.hunger || 50);
                const c = Math.round(save.cleanliness || 80);
                const t = Math.round(save.toilet || 0);

                document.getElementById('energyText').textContent = e;
                document.getElementById('hungerText').textContent = h;
                document.getElementById('cleanText').textContent = c;
                document.getElementById('toiletText').textContent = t;

                const eBar = document.getElementById('energyBar');
                const hBar = document.getElementById('hungerBar');
                const cBar = document.getElementById('cleanBar');
                const tBar = document.getElementById('toiletBar');

                eBar.style.width = e + '%';
                eBar.className = e < 25 ? 'low' : e < 50 ? 'warn' : '';
                hBar.style.width = h + '%';
                hBar.className = h > 75 ? 'low' : h > 50 ? 'warn' : '';
                cBar.style.width = c + '%';
                cBar.className = c < 25 ? 'low' : c < 50 ? 'warn' : '';
                tBar.style.width = t + '%';
                tBar.className = t > 75 ? 'low' : t > 50 ? 'warn' : '';

                const now = Date.now();
                document.getElementById('btnSleep').disabled = (save.sleepCooldown || 0) > now;
                document.getElementById('btnFeed').disabled = (save.feedCooldown || 0) > now;
                document.getElementById('btnWash').disabled = (save.washCooldown || 0) > now;
                document.getElementById('btnToilet').disabled = (save.toiletCooldown || 0) > now;

                const cdSleep = document.getElementById('sleepCooldown');
                const cdFeed = document.getElementById('feedCooldown');
                const cdWash = document.getElementById('washCooldown');
                const cdToilet = document.getElementById('toiletCooldown');

                const remSleep = Math.max(0, ((save.sleepCooldown || 0) - now) / 1000);
                const remFeed = Math.max(0, ((save.feedCooldown || 0) - now) / 1000);
                const remWash = Math.max(0, ((save.washCooldown || 0) - now) / 1000);
                const remToilet = Math.max(0, ((save.toiletCooldown || 0) - now) / 1000);

                cdSleep.textContent = remSleep > 0 ? '⏳ ' + Math.ceil(remSleep) + 's' : '';
                cdSleep.classList.toggle('hidden', remSleep <= 0);
                cdFeed.textContent = remFeed > 0 ? '⏳ ' + Math.ceil(remFeed) + 's' : '';
                cdFeed.classList.toggle('hidden', remFeed <= 0);
                cdWash.textContent = remWash > 0 ? '⏳ ' + Math.ceil(remWash) + 's' : '';
                cdWash.classList.toggle('hidden', remWash <= 0);
                cdToilet.textContent = remToilet > 0 ? '⏳ ' + Math.ceil(remToilet) + 's' : '';
                cdToilet.classList.toggle('hidden', remToilet <= 0);
            }

            function renderHomeAvatar() {
                const container = document.getElementById('avatarContainer');
                if (!container) return;
                container.className = '';
                if (petState === 'sleep') container.classList.add('av-sleep');
                else if (petState === 'walk') container.classList.add('av-walk');
                else if (petState === 'hop') container.classList.add('av-hop');
                else if (petState === 'cheer') container.classList.add('av-cheer');
                else container.classList.add('av-idle');

                const bodyEl = document.getElementById('jellyBody');
                const colorMap = {
                    'color_green': 'radial-gradient(circle at 30% 30%, #88ffbb, #33ffaa 60%, #119977)',
                    'color_blue': 'radial-gradient(circle at 30% 30%, #88ccff, #00aaff 60%, #0066aa)',
                    'color_pink': 'radial-gradient(circle at 30% 30%, #ff88cc, #ff00ff 60%, #aa00aa)',
                    'color_gold': 'radial-gradient(circle at 30% 30%, #ffee88, #ffd700 60%, #aa8800)',
                    'color_red': 'radial-gradient(circle at 30% 30%, #ff8866, #ff4500 60%, #aa2200)',
                    'color_rainbow': 'conic-gradient(from 45deg, red, orange, yellow, green, cyan, blue, purple, red)',
                    'color_slime': 'radial-gradient(circle at 30% 30%, #88eeff, #55d8e8 60%, #2288aa)'
                };
                bodyEl.style.background = colorMap[save.equippedPetColor] || colorMap['color_green'];

                const headMap = {
                    'head_none': '', 'head_antenna': '📡', 'head_halo': '👼', 'head_propeller': '🚁',
                    'head_mohawk': '🤘', 'head_horns': '😈', 'head_crown': '👑', 'head_wizard': '🧙',
                    'head_pirate': '🏴‍☠️', 'head_santa': '🎅'
                };
                // Simple overlay for head props (placed above body)
                // We'll use a simple approach via pseudo-element or additional div. 
                // For simplicity in this revision, I'll use the existing structure.
                // Actually, let's just put it as a small overlay.
                let headHtml = document.querySelector('.jelly-head-prop');
                if (!headHtml) {
                    headHtml = document.createElement('div');
                    headHtml.className = 'jelly-head-prop';
                    headHtml.style.position = 'absolute';
                    headHtml.style.top = '-30px';
                    headHtml.style.left = '50%';
                    headHtml.style.transform = 'translateX(-50%)';
                    headHtml.style.fontSize = '34px';
                    headHtml.style.lineHeight = '1';
                    headHtml.style.pointerEvents = 'none';
                    bodyEl.appendChild(headHtml);
                }
                headHtml.textContent = headMap[save.equippedPetHead] || '';

                const faceMap = {
                    'face_none': '👁️', 'face_pixel': '🕶️', 'face_scouter': '📟', 'face_laser': '🔴',
                    'face_monocle': '🧐', 'face_ninja': '🥷', 'face_mustache': '👨', 'face_blush': '☺️'
                };
                // For face, we can replace the eyes/mouth or add a mask. 
                // Since we have a complex CSS face, we'll just set the mouth/eyes style based on face.
                const eyes = document.querySelectorAll('.jelly-eye');
                const mouth = document.querySelector('.jelly-mouth');
                if (save.equippedPetFace === 'face_pixel') {
                    eyes.forEach(e => e.style.background = '#000'); // pixel shades
                    mouth.style.borderBottom = 'none';
                } else if (save.equippedPetFace === 'face_laser') {
                    eyes.forEach(e => e.style.background = '#ff0000');
                    eyes.forEach(e => e.style.boxShadow = '0 0 10px #ff0000');
                } else {
                    eyes.forEach(e => e.style.background = '#fff');
                    eyes.forEach(e => e.style.boxShadow = 'inset 0 2px 6px rgba(0,0,0,0.1)');
                    mouth.style.borderBottom = '4px solid #5a1a1a';
                }

                const clothesMap = {
                    'cl_none': '', 'cl_scarf': '🧣', 'cl_bowtie': '🎀', 'cl_vest': '🧥', 'cl_apron': '👨‍🍳',
                    'cl_tie': '👔', 'cl_hoodie': '👕', 'cl_sunglasses': '🕶️', 'cl_hat': '🧢', 'cl_shirt': '👚',
                    'cl_pants': '👖', 'cl_shoes': '👟', 'cl_suit': '🕴️', 'cl_dress': '👗', 'cl_glasses': '👓',
                    'cl_crown': '👑'
                };
                document.getElementById('jellyClothes').textContent = clothesMap[save.equippedPetClothes] || '';

                const propMap = {
                    'prop_none': '', 'prop_lollipop': '🍭', 'prop_icecream': '🍦', 'prop_lightsaber': '🗡️',
                    'prop_wand': '🪄', 'prop_shield': '🛡️', 'prop_balloon': '🎈'
                };
                document.getElementById('jellyProp').textContent = propMap[save.equippedPetProps] || '';
            }

            function updateFurniture() {
                const roomMap = {
                    bedroom: save.equippedBedroomFurniture || [],
                    kitchen: save.equippedKitchenFurniture || [],
                    bathroom: save.equippedBathroomFurniture || []
                };
                const furnitureIconMap = {
                    'fur_bed': '🛏️', 'fur_lamp': '💡', 'fur_rug': '🧶', 'fur_painting': '🖼️',
                    'fur_table': '🪑', 'fur_plant': '🌿', 'fur_sofa': '🛋️', 'fur_fridge': '🧊',
                    'fur_bathtub': '🛁', 'fur_mirror': '🪞', 'fur_soap': '🧼', 'fur_toilet': '🚽', 'fur_towel': '🧣'
                };
                const renderItems = (ids) => ids.map(id => furnitureIconMap[id] || '🪑').join(' ');
                document.getElementById('bedroomFurniture').textContent = renderItems(roomMap.bedroom) || '🚫 Χωρίς έπιπλα';
                document.getElementById('kitchenFurniture').textContent = renderItems(roomMap.kitchen) || '🚫 Χωρίς έπιπλα';
                document.getElementById('bathroomFurniture').textContent = renderItems(roomMap.bathroom) || '🚫 Χωρίς έπιπλα';

                document.getElementById('roomBedroom').classList.toggle('furnished', roomMap.bedroom.length > 0);
                document.getElementById('roomKitchen').classList.toggle('furnished', roomMap.kitchen.length > 0);
                document.getElementById('roomBathroom').classList.toggle('furnished', roomMap.bathroom.length > 0);
            }

            function doSleep() {
                const now = Date.now();
                if ((save.sleepCooldown || 0) > now) return;
                save.energy = Math.min(100, (save.energy || 50) + 40);
                save.sleepCooldown = now + 8000;
                save.lastUpdate = now;
                persist();
                petState = 'sleep';
                renderHomeStats();
                renderHomeAvatar();
                toast("😴 Ο Aziram κοιμήθηκε! +40 Ενέργεια");
                setTimeout(() => { petState = 'idle'; renderHomeAvatar(); }, 5000);
            }

            function doFeed() {
                const now = Date.now();
                if ((save.feedCooldown || 0) > now) return;
                const foodItems = save.ownedPetFood || [];
                if (foodItems.length === 0) { toast("Δεν έχεις φαγητό! Αγόρασε από το κατάστημα."); return; }
                const foodDataMap = {
                    'food_apple': { name: 'Μήλο', icon: '🍎', reduction: 15 },
                    'food_pizza': { name: 'Πίτσα', icon: '🍕', reduction: 30 },
                    'food_cake': { name: 'Γλυκό', icon: '🍰', reduction: 20 },
                    'food_banana': { name: 'Μπανάνα', icon: '🍌', reduction: 12 },
                    'food_steak': { name: 'Μπριζόλα', icon: '🥩', reduction: 40 },
                    'food_sushi': { name: 'Σούσι', icon: '🍣', reduction: 35 }
                };
                const foodId = foodItems[0];
                const food = foodDataMap[foodId];
                if (!food) { toast("Άγνωστο φαγητό"); return; }
                foodItems.splice(0, 1);
                save.ownedPetFood = foodItems;
                save.hunger = Math.max(0, (save.hunger || 50) - food.reduction);
                save.feedCooldown = now + 6000;
                save.lastUpdate = now;
                persist();
                petState = 'hop';
                renderHomeStats();
                renderHomeAvatar();
                toast("🍽️ Ο Aziram έφαγε " + food.name + "! -" + food.reduction + " Πείνα");
                setTimeout(() => { petState = 'idle'; renderHomeAvatar(); }, 3000);
            }

            function doWash() {
                const now = Date.now();
                if ((save.washCooldown || 0) > now) return;
                save.cleanliness = Math.min(100, (save.cleanliness || 80) + 45);
                save.washCooldown = now + 7000;
                save.lastUpdate = now;
                persist();
                petState = 'hop';
                renderHomeStats();
                renderHomeAvatar();
                toast("🧼 Ο Aziram πλύθηκε! +45 Καθαριότητα");
                setTimeout(() => { petState = 'idle'; renderHomeAvatar(); }, 3000);
            }

            function doToilet() {
                const now = Date.now();
                if ((save.toiletCooldown || 0) > now) return;
                save.toilet = Math.max(0, (save.toilet || 0) - 80);
                save.toiletCooldown = now + 5000;
                save.lastUpdate = now;
                persist();
                petState = 'hop';
                renderHomeStats();
                renderHomeAvatar();
                toast("🚽 Ο Aziram πήγε τουαλέτα! -80 Τουαλέτα");
                setTimeout(() => { petState = 'idle'; renderHomeAvatar(); }, 3000);
            }

            function init() {
                loadSave();
                renderHomeStats();
                renderHomeAvatar();
                updateFurniture();

                setInterval(() => { updateTamagotchiStats(); }, 3000);

                document.querySelectorAll('.room-tab').forEach(tab => {
                    tab.onclick = (e) => {
                        document.querySelectorAll('.room-tab').forEach(t => t.classList.remove('active'));
                        e.target.classList.add('active');
                        const room = e.target.dataset.room;
                        document.querySelectorAll('.room-panel').forEach(p => p.classList.remove('active'));
                        document.getElementById('room' + room.charAt(0).toUpperCase() + room.slice(1)).classList.add('active');
                    };
                });

                document.getElementById('btnSleep').onclick = doSleep;
                document.getElementById('btnFeed').onclick = doFeed;
                document.getElementById('btnWash').onclick = doWash;
                document.getElementById('btnToilet').onclick = doToilet;

                document.getElementById('btnCloseHome').onclick = () => {
                    if (window.parent) window.parent.postMessage('closeHome', '*');
                };
            }

            document.addEventListener('DOMContentLoaded', init);
        })();
    </script>
</body>
</html>
